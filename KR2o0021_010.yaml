body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十己未周平王四十有九年魯隱公元春秋始此此後編年紀事自有春秋左氏經傳今特舉其事繫王室與關於天下之故者而后書東遷之後諸侯放恣春秋例書卒唯魯書薨蓋削諸侯也今不敢違例並皆書某公卒王曰書亡然後春秋作履祥謂書終於文侯之命平王之初也春秋始於仲子之賵平王之末也則平王之世蓋得失盛衰升降之㑹也鄭伯克段于鄢置其母姜氏于城潁左氏曰大叔又收二以為己邑至于廩延子封曰可矣厚將得衆公曰不義不䁥厚將崩大叔完聚將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京假入于鄢公伐諸鄢大叔出奔共遂置姜氏于城潁而誓之曰不及黃泉無相見也既而悔之履祥按莊公曰制巖邑也它邑唯命請京使居之曰姜氏欲之焉辟害莊公其初未有它意也然不為置良師傅是以段之惡日肆而祭仲子封輩交以為言故莊公之私亦日長曰子姑待之曰將自及曰可矣莊公於此始有執其罪而取之之意矣甚矣天理之易微而私欲之易長也王使宰咺錫魯惠公仲子之賵春秋曰秋七月天王使宰咺來歸惠公仲子之賵胡氏曰魯孝公之末幽王已為犬戎所斃惠公初年周既東矣春秋不作於孝公惠公者東遷之始流風遺俗猶有存者至其晚年乃以天王之尊下賵諸侯之妾於是三綱淪九法斁人望絶矣夫婦人倫之本朝廷風化之原平王子母親遭褒姒之難廢黜播遷而宗國顚覆亦可省矣又不是懲而賵人寵妾是拔本塞源自滅之也春秋於此蓋有不得已焉爾矣託始於隱公不亦深切著明也哉王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之天王紀法之宗冡宰紀法之守而承命以賵諸侯之妾是壞法亂紀自王朝始也故特貶而名之以見宰之非宰矣左氏曰天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀豫凶事非禮也陳氏曰緩且子氏未薨以下疑後人增益之雜記有大夫士訃於他國之君之禮則不但同位外姻也且文九年秦人歸成風之禭傳曰禮也諸侯相弔賀雖不當事茍有禮焉書也以無忘舊好則贈不及尸弔不及哀非禮也與文公傳自相違今不取履祥按左氏傳於隱公之篇多誤於莊公之篇多缺此考春秋者所當知也隱傳之誤如仲子之賵子氏之薨尹氏之卒是也左氏既誤以隱妻子氏之薨為仲子故此以仲子為未薨而王賵之其曰不及哀尸謂賵惠公之緩曰豫凶事謂賵仲子之豫也文之四年十有一月成風薨五年王使榮叔歸含且賵九年秦人來歸僖公成風之禭以此例之則歸賵當是惠公仲子俱殁之後其殁在春秋之前左氏蓋誤解矣惠公妻其妾嫡其庶王法所當正也平王不惟不之正而反成之且魯之於朝聘未數數然也平王將以懷魯而行此不正之禮其後隱弒桓篡桓之子孫又自相攘奪者終春秋之世焉平王在位五十年晚節舉措如此不足以懷魯而祇以敗王法成魯禍王室其有不衰乎然則王之正之將如何曰隱公上不敢違其父下不敢廢其弟而自以為攝天子於是錫命焉則是受天子之命為諸侯也隱定而桓之逆謀弭矣此所以正王法而懷諸侯也隱於王室多曠禮雖諸侯放恣積習之或者亦有憾於斯乎莊篇之缺當别言之於後鄭伯以王師虢師伐衛南鄙祭伯如魯春秋曰祭伯來左氏曰非王命也穀梁氏曰寰內諸侯非有天子之命不得出㑹諸侯不正其外交故弗與朝也有至尊者不二之也胡氏曰人臣義無私交大夫非君命不越境杜朋黨之原為後世二於君者之戒也此義不明然後有藉外權如繆留之語韓宣惠者交私議論如莊助之結淮南者倚强藩為援以脅朝廷如唐盧攜之於高駢崔𦙍之於宣武昭緯之於邠岐者矣五十年鄭伯始見其母于大隧左氏曰潁考叔為潁谷封人有獻於公公賜之食食舍肉公問之對曰小人有母未嘗君之羹請以遺之公曰爾有母遺繄我獨無考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之遂為母子如初吕氏曰物之逆其天者其終必還出於自然而莫知其所以然者天也茍以人力勝之及力既窮未有不復其初者子之於父母天也雖天下之大惡其天未嘗不存也莊公怒其弟而上及其母囚之城潁絶滅天理居之不疑觀其黃泉之盟終其身而無可移之理矣居無幾何而遽悔是悔果安從而生哉一朝之忿若可以勝天忿心稍衰愛親之念油然而不能已考叔特迎其端而發之耳愛其母者莊公考叔同一心也其啜羹舍肉皆天理之發見故不下席之間回滔天之惡是豈聲音笑貌能為哉惜夫考叔得其體而不得其用乃曲為之說俾莊公闕地及泉陷於文過飾非之地莊公天理方開而考叔遽以人欲蔽之可勝歎哉故開莊公之天理者考叔也蔽莊公之天理者亦考叔也向若莊公幸而遇孔孟擴其天理而大之豈止為鄭之莊公哉子王子曰鄭伯意雖悔而畏及泉之誓考叔意雖美而為闕地之迂古人重盟誓其流乃若此之悖且愚乎鄭人伐衛左氏曰鄭共叔之亂公孫滑出奔衛叔段之子衛人為之伐鄭取廩延鄭人以王師虢師伐衛南鄙隱元鄭人伐衛討公孫滑之亂也五十有一年二月己巳日有食之王崩孫林踐位胡氏曰春秋歷十有二王桓襄匡簡景志崩志葬者赴告及魯往㑹之也平惠定靈志崩不志葬者赴告雖及魯不㑹也莊僖頃崩葬皆不志者王室不告魯亦不往也諸侯為天王服斬衰禮當以所聞先後奔喪今平王崩周人來訃而隱公不往是無君也其罪應誅不書而自見矣尹氏卒公羊氏曰尹氏者何天子之大夫也其稱氏何貶曷為貶世卿非禮也外大夫不卒此何以卒天王崩諸侯之主也履祥按尹氏卒左氏作君氏謂聲子也為公故曰君氏非也古語氏猶今云家也君指公也國君之母卒而云公家卒則不詞甚矣故當從二傳然是時魯亦有尹氏隱公之獲於鄭也囚諸尹氏賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主則魯亦固有尹氏也春秋所書尹氏在周在魯不可知惟以為君氏則不可爾鄭祭足帥師入寇左氏曰鄭武公莊公為平王卿士王二于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡吕氏曰周天子也鄭諸侯也左氏序平王莊公之事並稱周鄭無尊卑之辨不責鄭之叛周而責周之欺鄭左氏之罪大矣然周亦不能無罪焉鄭伯為周卿士君之於臣賢則用不賢則去復何所隱哉平王欲退鄭伯而不敢退欲進虢公而不敢進固已失天子之體甚至與鄭交質勢均體敵周與鄭等諸侯耳嵗推月移豈知周之為君哉一旦用兵而不忌非諸侯之叛天子也是諸侯之攻諸侯也惟周以列國自處故鄭以列國待之左氏亦以列國待之無王之罪左氏固不得辭周亦分受其責可也武氏子求賻于魯春秋曰武氏子來求賻傳曰不言使穀王未葬也左履祥謂平王於魯猶歸惠公仲子之賵隱公於周不賻天王之喪於報施之禮且猶不可況君臣之際乎武氏子之求在周為屑然魯之不臣甚矣宋穆公卒立宣公之子與夷是為殤公左氏曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭宋穆公卒殤公即位公羊氏曰君子大居正宋之禍宣公為之也齊侯鄭伯盟于石門陳氏曰特相盟不書必關於天下之故而后書齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也履祥按春秋之初齊僖公小伯鄭內叛王而外挾之以合諸侯二國蓋相為用也齊自盟石門成三國㑹中丘伐宋又與鄭入郕入許㑹魯陳鄭以成宋亂與衛胥命與鄭謀紀與鄭伐衛盟向又與之戰魯與之盟惡曹與宋衛燕伐魯國語稱為小伯鄭自平王之末即以王師伐衛討公孫滑之亂桓公立四年而始朝六年以齊人朝王七年以王命伐宋以王命告諸侯取三師入郕討違王命九年成宋亂皆與齊僖相出入王奪其政而繻葛之矢中天子之肩矣故齊鄭之始盟春秋憂之壬戌桓王元年衛州吁弒其君桓公而自立宋陳蔡衛伐鄭左氏曰衛州吁弒桓公而立宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還履祥按春秋宋公陳侯蔡人衛人伐鄭是役也衛為之而春秋以宋為首宋穆公舍其子馮使出居於鄭以立殤公而殤公從衛伐鄭欲以除馮故春秋誅心以宋為首惡也州吁弒君之賊其於此役不足為誅矣魯翬帥師㑹宋陳蔡衛伐鄭春秋曰翬帥師㑹宋公陳侯蔡人衛人伐鄭左氏曰諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也諸侯之師敗鄭徒兵取其禾而還履祥按魯隱公唯不以君自處故諸大夫專擅非公命而為之者有矣如費伯城郎公子豫盟邾鄭作南門皆諸臣專之是以帥師雖大事翬或固請而行或不俟命而先行也諸臣猶不可以翬凶逆之性則其欲除桓而卒弒隱宜肆然不以為難也衛人殺州吁于濮衛人立晉是為宣公左氏曰州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳君方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國𥚹小老父耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖于衛衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳衛人逆公子晉于邢宣公即位二年晉曲沃以鄭邢之師攻晉侯于翼王使尹氏武氏助翼翼侯奔隨隨晉地履祥按晉文侯於平王有修扞之功其後嗣為曲沃所弱王室不能救已非矣桓王反使尹武氏助曲沃於君臣恩義邪正一切反之東遷以來諸侯放恣而周之舉措如此何以服諸侯之心乎曲沃叛王命虢公伐曲沃立翼侯子光于翼是為哀公邾人鄭人伐宋宋人伐鄭左氏曰宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役履祥按鄭以公孫滑之故用師于宋宋又以公子馮之故用師于鄭宋已為州吁所誘今鄭又為邾人所嗾宋志在於去馮故為人所誘邾心在於報怨故嗾人春秋前以宋主兵此以邾主兵皆誅心也然其時鄭伯猶未朝王也而左氏謂以王師㑹之或誤也鄭以王師伐宋則隱九年之事爾左氏隱篇之多誤此亦一事也甲子三年晉翼侯自隨入于鄂左氏曰翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯前年桓王立翼侯之子於翼故不復入翼而居鄂鄭輸平於魯魯侯齊侯盟于艾陳氏曰春秋之初宋魯衛陳蔡一黨也齊鄭一黨也於是鄭始平魯鄭方交惡於王而亟平齊魯將以合諸侯焉爾宋人取長葛京師饑左氏曰京師來告饑公為之請糴於宋衛齊鄭禮也鄭伯入朝左氏曰鄭伯如周始朝桓王也王不禮焉周桓公言於王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣履祥按周之東遷晉鄭焉依而王奪鄭伯政又嘗助曲沃伐翼此所以失諸侯也鄭伯不朝固有罪今其來朝與其進可也然鄭伯實利政權又有挾天子令諸侯之意周桓公之說未盡當時之事情也四年王使凡伯聘于魯戎伐凡伯于楚丘以歸左氏曰初戎朝于周發幣于公卿凡伯弗賓冬王使凡伯來聘還戎伐之于楚丘以歸胡氏曰楚丘衛地春秋書于楚丘罪衛不救王臣之患也以歸罪凡伯失節不能死於位也周之秩官敵國賓至關尹以告候人為導司徒具徒司寇詰姦佃人積薪火師監燎其貴國之賓至則以班加一等益䖍至於王吏則皆官正涖事今凡伯承王命以為過賓於衛而戎得伐之以歸是蔑先王之官而無君父也為狄所滅則有由矣陳及鄭平晉曲沃莊伯卒子稱嗣是為武公秦文公卒孫嗣是為寧公五年鄭伯歸祊田于魯公羊氏曰鄭湯沐之邑也天子有事于泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉左氏曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田蔡宣侯卒子封人嗣是為桓侯王命虢公忌父為卿士鄭伯爭政之由桓王伐鄭之故宋公齊侯衛侯盟于瓦屋左氏曰齊人卒平宋衛于鄭㑹于溫盟于瓦屋以釋東門之役穀梁氏曰諸侯之參盟於是始陳氏曰有參盟而後有主盟者矣鄭有志於叛王而合諸侯於是輸平於魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛所謂成三國也東諸侯之交盛矣鄭伯以齊人來朝六年王使南季聘于魯胡氏曰隱公即位九年于此而史䇿不書遣使如周是未嘗聘也亦不書公如京師是未嘗朝也貶爵削地可也刑則不舉遣使聘焉其斯以為不正乎春秋書公如京師者一朝于王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知矣書天王來聘者七錫命者三賵葬者四則問於他邦及齊晉秦楚諸大國又可知矣王之不正如此征伐安得不自諸侯出乎諸侯之不臣如此政事安得不自大夫出乎君臣上下之分易矣陪臣執國命夷狄制諸夏矣其原皆自天王失威福之柄也春秋於此蓋有不得已焉爾矣鄭伯為左卿士以王命伐宋以王命告于魯魯侯齊侯㑹于防左氏曰宋公不王鄭伯為王左卿士以王命討之伐宋鄭人以王命來告伐宋公㑹齊侯于防謀伐宋也履祥按自鄭公孫滋奔宋宋公子馮居鄭宋鄭交兵非一日矣鄭伯自交惡以來意本不王四年强入朝亦為王所不禮矣然其意在於挾天子以令諸侯故不禮而不退虢公分政而不退將以濟其私也於是以王命伐宋又以王命㑹齊魯之師以伐宋而不以王討之甚矣鄭伯之私也秦自汧渭之間徙居平陽史記曰文公五十年卒葬西山竫公子立是為寧公寧公二年徙居平陽伐蕩社三年滅之經世作徙居郿七年鄭伯齊侯魯侯㑹于中丘魯翬帥師㑹齊鄭伐宋魯侯敗宋師于菅取郜取防左氏曰春正月公㑹齊侯鄭伯于中丘盟于鄧為師期夏五月羽父先㑹齊侯鄭伯伐宋六月公㑹齊侯鄭伯于老桃公敗宋師于菅鄭師入郜歸于我鄭師入防歸于我履祥按三國伐宋取郜取防何以獨歸諸魯魯之於鄭本仇也於宋本好也魯以行人失詞而不救宋鄭於是始輸平今又㑹魯以伐宋故以二邑歸魯蓋欲堅其利鄭而絶宋也鄭魯茍以王命伐宋則削其地以為王土可也鄭安得以豫魯魯亦安得受之於鄭噫諸侯之行其私亦甚矣宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之左氏曰蔡人衛人郕人不㑹王命鄭師入郊猶在郊宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗齊人鄭人入郕八年鄭伯魯侯㑹于時來齊侯鄭伯魯侯入許左氏曰夏公㑹鄭伯于郲謀伐許也秋公㑹齊侯鄭伯伐許傅于許瑕叔盈以蝥弧登周麾而呼曰君登矣鄭師畢登遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞于許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其況能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒於地天其以禮悔禍于許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而況能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之桓之十五年許叔入于許履祥按齊侯以許讓魯而隱公曰君謂許不共故從君討之則入許者齊之志也鄭伯先登遂入許則入許者鄭之功也讓魯而魯不敢受固也與鄭以酬其功宜矣而鄭亦不有焉何也鄭以齊魯之師伐宋故齊亦以魯鄭伐許齊之志魯與有力而鄭自有之終必以此致隙安保齊之不終於爭故曰況敢以許自為功又曰其能久有許乎然則何不以歸之齊歸齊則恐其終逼己也故曰無滋他族實逼處此以與我鄭國爭此土也傳者謂其度德量力無纍後人或者謂得而弗有此豈其本心哉內防其患而外利其名爾王取塢劉蒍邘之田于鄭與鄭人溫原絺樊隰郕欑茅向盟州陘隤懷之田左氏曰君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎履祥按鄭之伐宋取三師又入郕為王命討也至是論功加邑可也而取其四邑之田與之以不能有之土何哉此可見鄭假王命以報怨非王意也桓王知其久假多俘是以有四邑之取知其長於用兵是以授之專據之邑桓王處此可謂以詐御詐者矣魯公子軌弒其君隱公而自立是為桓公左氏曰羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營莬裘吾將老焉羽父懼反譖公于桓公而請弒之公之為公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社圃館于寪氏羽父使賊弒公于寪氏立桓公而討寪氏有死者公羊氏曰何以不書葬隱之也何隱爾弒也弒則何以不書葬春秋君弒賊不討不書葬以為無臣子也子沈子曰君弒臣不討賊非臣也子不復讎非子也葬生者之事也春秋君弒賊不討不書葬以為不繫乎臣子也公薨何以不地不忍言也隱何以無正月隱將讓乎桓故不有其正月也九年魯桓公元魯侯鄭伯㑹于垂卒易祊田盟于越左氏曰公即位修好于鄭鄭人請復祀周公卒易祊田公許之鄭伯以璧假許田為周公祊故也公及鄭伯盟于越結祊成也盟曰渝盟無享國履祥按鄭以祊田易許田其請久矣故嘗先歸祊隱公受之已入祊矣而許田則未與也隱公豈以朝宿之邑重於豫鄭耶或者廣狹肥磽之非鈞也桓弒隱而立立即修好於鄭而鄭要之以許為垂之㑹且加璧焉於是卒與許田矣蓋鄭以貪易許而桓以餒賂鄭也燕穆侯卒子嗣是為宣侯十年宋督弒其君殤公及其大夫孔父立公子馮是為莊公左氏曰宋穆公卒召大司馬孔父而屬殤公焉宋殤公立十年十一戰民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂魯齊陳鄭皆有賂故遂相宋公魯取郜大鼎于宋納于太廟臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席太羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而況將昭違亂之賂器於太廟其若之何公不聽周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德公羊氏曰督將弒殤公孔父生而存則殤公不可得而弒也故於是先攻孔父之家孔父正色而立於朝則人莫敢過而致難於君者孔父可謂義形於色矣履祥按宋殤公立十年十一戰大抵皆與鄭戰耳其獨與鄭為仇者以馮之在鄭也宋宣公舍與夷而立穆公穆公又舍馮而立與夷意非不善也為殤公者迹穆公之轍雖復以國與馮可也而亟尋師於鄭唯恐馮之尚存卒以此斃其民而華督得借是弒之殤公蓋有以自取矣孔父無死節之義其不免於失諫之譏乎但左氏書孔父見殺之由起於內故非矣當從二傳為正魯侯齊侯陳侯鄭伯㑹于稷以成宋亂蔡侯鄭伯㑹于鄧左氏曰始懼楚也公羊氏曰鄧與㑹爾胡氏曰楚自西周已為中國之患宣王蓋嘗命將南征矣及周東遷僣號稱王憑陵江漢此三國者地與之鄰是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於理莫强於信義荆楚雖大何懼焉不知本此事醜德齊莫能相尚則以地之大小力之强弱分勝負矣十有一年春晉曲沃敗晉師于汾隰獲晉哀侯欒成死之晉人立哀侯子為小子侯左氏曰曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右逐翼侯于汾隰驂絓而止夜獲之及欒共叔國語曰武公伐翼殺哀侯止欒共子曰茍無死吾以子見天子令子為上卿制晉國之政辭曰成聞之民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故一事之唯其所在則致死焉報生以死報賜以力人之道也臣敢以私利廢人之道君何以訓矣且君知成之從也未知其待於曲沃也從君而二君焉用之遂鬭而死史記曰陘庭與曲沃武公伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯七月壬辰朔日有食之既魯侯迎婦于齊春秋曰公子翬如齊逆女齊侯送姜氏于歡公㑹齊侯于歡夫人姜氏至自齊左氏曰公㑹齊侯于嬴成昏于齊也公子翬如齊逆女修先君之好故曰公子齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之履祥按魯桓與翬弒隱而為君相歸許于鄭㑹齊鄭陳以成宋亂成昏于齊桓親㑹而翬為之逆桓又親為㑹以受之君相之間所以求寵於諸侯求援於大國者為謀亦至為禮亦恭矣而桓之所以自隕者卒以姜氏人力不可以勝天如此夫十有二年王使宰渠伯糾聘于魯王師秦師圍魏執芮伯左氏曰芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏秦師侵芮敗焉小之也王師秦師圍魏執芮伯以歸十八年秦人納芮伯萬于芮晉曲沃稱弒哀侯于曲沃史記曰小子侯元年曲沃武公使韓萬殺所虜晉哀侯賈逵曰韓萬桓叔之子莊伯之弟十有三年陳桓公卒文公子他殺世子免而自立齊侯鄭伯如紀左氏曰齊侯鄭伯朝于紀欲以襲之紀人知之王使仍叔之子聘于魯履祥按周衰篡弒之臣必假天子之命以自立天子從而命之此已周之失道矣魯桓之幼也王室常賵其母矣至是弒立求寵於諸侯未嘗有王覲之請也而居有之其無王益甚矣周何求於魯非惟不討其罪不責其朝聘也而反聘之於列國猶報聘也而朞年之內未聞魯有一大夫如京師者而周又聘之桓王拳拳於魯如此豈禮其能弒立耶王聘之不足重如此禮樂不出於天子而政令不行於天下亦王室自取焉爾王伐鄭蔡人衛人陳人從王伐鄭左氏曰王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬪心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛令二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人況敢陵天子乎茍自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右胡氏曰魯桓弒君而自立宋督弒君而得政則遣使聘焉而莫之討鄭伯不朝貶其爵可也而自將以攻之移此師以加宋魯誰曰非天討乎春秋不書天王端其本也三國以兵㑹伐則言從王以著君臣之義也戰于繻葛而不言戰王卒大敗而不書敗又以存天下之防也陳氏曰春秋不始於平王始於桓王也東周之不競鄭莊公為之也莊公相平王王二于虢至于交惡平王崩四年而鄭始朝於是鄭虢相桓為左右以王命討宋不庭而合齊魯之師于中丘入郕又入許魯翬之相桓宋督之相莊鄭有力焉王奪其政而遂不朝王固有以失鄭矣自將以討鄭討鄭而克是仲康之師也春秋可以無作而戰焉王卒大敗故曰伐鄭不服而後王命不行於天下十有四年楚子熊通侵隨俾請爵于王王不許左氏曰楚子侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬬伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐史記曰楚伐隨隨曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之固請尊楚王室不聽履祥按史記所載當是薳章求成之辭爾春秋之世馮陵諸夏惟楚為甚然觀熊通薳章所言則諸夏固有以自取也紀侯如魯左氏曰咨謀齊難也北戎伐齊左氏曰北戎伐齊齊侯使乞師于鄭鄭大子忽帥師救齊大敗戎師獲其二帥大良少良甲首三百以獻於齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師公之未昏於齊也齊侯欲以文姜妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯履祥按北戎伐齊齊至乞師于鄭求戍于諸侯則戎患亦熾矣向非他日桓公之霸則燕齊皆為戎矣初齊侯欲以文姜妻忽而忽辭文姜之淫不待他日忽之不取必知其故矣至是有功又欲以他女妻之而忽又辭則亦失計矣雖其辭正然魯以周班後鄭忽乃恃功而輕周班焉則其識量可知也其不終也宜哉蔡人殺陳他而立免之弟躍是為厲公左氏曰陳厲公蔡出也故蔡人殺五父而立之十有五年榖伯綏鄧侯吾離至魯春秋曰榖伯綏來朝鄧侯吾離來朝左傳曰何以名失國也履祥按是時楚方強大吞噬漢陽諸國鄧不再朞而大敗於楚此鄧國之君必為楚所逼去其國而來者故春秋名之不然豈其近患之不恤而逺朝于魯也哉春秋之初魯未見弱於齊固為强國紀有齊難榖鄧有楚難皆趨之而不知桓之不足與有為也失其所主惜哉然魯自桓公昏于齊為其所殺莊公昏于齊為其所制而魯世遂弱至于宣公益不足道矣鄭人齊人衛人伐盟向王遷盟向之民于郟左氏曰盟向求成於鄭既而背之鄭人齊人衛人伐盟向王遷盟向之民于郟履祥按盟向陽樊皆天子畿內諸侯祿而不嗣者周衰皆據為世嗣王不能有然桓王以盟向與鄭襄王以陽樊與晉其民皆願歸王而不願為鄭晉也此則王遷之彼則晉出之以是見周家忠厚於民而諸侯之不恤其民也惜也周衰不足以芘之此誠生靈之不幸矣晉曲沃稱誘弒其君小子侯左氏曰曲沃伯誘晉小子侯殺之明年春滅翼十有六年王使家父聘于魯楚子㑹諸侯于沈鹿楚子伐隨隨及楚平楚僣稱王左氏曰楚子合諸侯于沈鹿黃隨不㑹使薳章讓黃楚子伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠寇也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃擕矣少師曰不當王非敵也弗從戰于速杞隨師敗績隨侯逸鬬丹獲其戎車與其戎右少師隨及楚平楚子將不許鬬伯比曰天去其疾矣隨未可克也乃盟而還史記曰楚熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王與隨人盟而去於是始開濮地而有之王命虢仲伐曲沃立晉哀侯之弟緡于晉祭公如魯遂逆王后于紀杜氏曰天子娶於諸侯使同姓諸侯為之主秦寧公卒三父廢世子而立出子十有七年紀季姜歸于京師十有八年曹桓公卒子射姑嗣是為莊公虢詹父以王師伐虢虢公出奔虞左氏曰虢仲譖其大夫詹父於王詹父有辭以王師伐虢虢公出奔虞吕氏曰詹父虢大夫而命於天子非虢所能私討所以必借之王此王制之尚存也履祥謂使其大夫伐其國亦王制所未有也齊侯衛侯鄭伯與魯戰于郎左氏傳事始見十四年先書齊侯王爵也十有九年齊人衛人鄭人盟于惡曹陳氏曰此郎之諸侯也鄭敗王師齊滅后之母家衛亦抗子突而自立者其無王甚矣自有參盟莫甚於惡曹故略之而不爵鄭莊公卒世子忽嗣是為昭公陳氏曰春秋之初罪莫大於鄭莊宋魯齊衛次之而父子兄弟之禍亦莫甚於此五國者莊公卒高渠彌殺世子忽齊人殺子亹傅瑕殺子儀國亂者二十年魯隱公弒宋殤閔相繼弒衛桓公弒宣殺伋夀而立朔國人出朔而立黔牟齊襄公弒雍廪殺公孫無知小白殺子糾是可為不臣者之戒矣宋人執鄭祭仲突歸于鄭鄭忽出奔衛左氏曰鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之昭公奔衛厲公立榖梁氏曰宋公也曰人貶之也突賤之也歸易辭也祭仲易其事權在祭仲也死君難臣道也今立惡而黜正惡祭仲也鄭忽名失國也衛侯殺其二子伋壽左氏曰初衛宣公蒸於夷姜生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子宣姜與公子朔構急子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公朔也詩新臺篇曰新臺有泚河水瀰瀰燕婉之求籧篨不鮮新臺有灑河水浼浼燕婉之求籧篨不殄魚網之設鴻則離之燕婉之求得此戚施集傳曰言齊女本求與伋為燕婉之好而反得宣公醜惡之人也二子乘舟篇曰二子乘舟泛泛其景願言思子中心飬飬二子乘舟泛泛其逝願言思子不瑕有害衛宏詩序曰新臺刺衛宣公也納伋之妻作新臺於河上而要之國人惡之二子乘舟思伋壽也衛宣公二子爭相為死國人傷而思之二十年魯侯㑹宋公盟于榖丘又㑹于虛于龜魯侯㑹鄭伯盟于武父魯侯及鄭師伐宋左氏曰宋以立厲公故多責賂於鄭鄭不堪命公欲平宋鄭及宋公盟宋成未可知也故又㑹于虛于龜宋公辭平故與鄭伯盟于武父遂帥師而伐宋戰焉履祥按善惡各以類相為謀魯侯軌弒其君兄而得國前日成宋亂今日平宋鄭為鄭伐宋何其勤也陳厲公卒弟林立是為莊公衛宣公卒朔立是為惠公二十有一年楚屈瑕伐羅羅與盧戎敗楚師左氏曰楚屈瑕伐羅狥于師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父以聽刑楚子曰孤之罪也皆免之魯侯㑹紀侯鄭伯及齊侯宋公衛侯燕人戰齊宋衛燕師敗績履祥按是役也一則齊紀為讐也一則宋鄭為敵也魯為紀所主而與鄭突同惡故為紀鄭若齊前則謀紀後則德忽之功宋責賂於突而忽奔在衛故齊衛與宋合為一各有黨與以為此戰也紀無罪而鄭突有罪紀與魯鄭為黨則失所依矣故雖無罪而終至於失國也二十有二年魯侯鄭伯突㑹于曹鄭伯使其弟如魯盟秦三父弒出子復立故世子是為武公齊僖公卒子諸兒嗣是為襄公宋人以齊人蔡人衛人陳人伐鄭燕宣侯卒子嗣是為桓侯二十有三年王使家父如魯求車王崩子他踐位鄭伯突出奔蔡鄭世子忽復歸于鄭左氏曰祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也厲公出奔蔡昭公入履祥按春秋忽當喪未君而出奔故歸而復稱世子奔不書子以其不能為子也歸稱世子以其為前日當立者也世子當君而終不克君以是為忽之病矣其後雖見弒而春秋不書以為不能守國者之戒也昭公見弒在莊王二年鄭伯突入于櫟宋公魯侯衛侯陳侯㑹于袲伐鄭左氏曰將納厲公弗克秦伐彭戲氏至于華山史記曰武公元年伐彭戲氏至于華山下居平陽封宫乙酉莊王元年宋公魯侯蔡侯衛侯㑹于曹宋魯衛陳蔡伐鄭伐忽納突衛人立伋之弟黔牟衛侯朔出奔齊左氏曰事首見桓王十九年左公子泄右公子職怨惠公立公子黔牟惠公奔齊二年魯侯齊侯紀侯盟于黃魯侯邾儀父盟于趡魯師及齊師戰于奚魯及宋人衛人伐邾履祥按春秋於正月丙辰書公㑹齊侯紀侯盟于黃而五月丙午書及齊師戰于奚則黃之盟何為也左氏曰平齊紀且謀衛夫盟為紀衛而已不免於戰尚何能為紀衛謀哉春秋書二月丙午公㑹邾儀父盟于趡而於秋書及宋人衛人伐邾則趡之盟何為也左氏曰尋蔑之盟也夫方盟之而又伐之何蔑盟之能事哉屢盟長亂春秋比書之罪不言而著矣蔡桓侯卒弟獻舞立是為哀侯蔡季自陳歸于蔡胡氏曰季字也歸何以不有國劉敞曰志足以與權而不亂力足以得國而不居逺而不攜近而不逼者也是以見貴於春秋葬蔡桓侯蔡桓何以稱侯蓋蔡季之賢知請諡也人亦多愛其君者莫能愛君以禮而季能行之此賢者所以異於衆人也春秋諸侯雖伯子男葬皆稱公志其失禮之實爾秦夷三父族史記曰秦武公三年誅三父等而夷三族以其殺出子也十月朔日有食之左氏曰十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝鄭高渠彌弒其君昭公立其弟子亹左氏曰初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立懼其殺己也弒昭公而立公子亹君子謂昭公知所惡矣公子達曰高伯其為戮乎復惡已甚矣昭公之弒不見於春秋今據左氏經世書之蓋此所編欲著首尾不敢自同於春秋也三年魯侯與其夫人姜氏如齊齊侯殺魯桓公立其子同是為莊公左氏曰公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告享公使公子彭生乘公公薨于車史記曰齊襄公享公公醉使公子彭生抱公因命彭生摺其脅公死于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生齊侯師于首止殺鄭子亹及高渠彌祭仲立子儀左氏曰齊侯師于首止子亹㑹之高渠彌相齊人殺子亹而轘高渠彌祭仲逆鄭子于陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也史記謂渠彌亡歸經世從之王子克奔燕左氏曰周公黑肩欲弒莊王而立王子克辛伯告王遂與王殺周公王子克奔燕初子儀即克也有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也周公弗從故及四年魯莊公元使單伯送王姬魯築王姬之館于外王使榮叔錫魯桓公命王姬歸于齊公羊氏曰天子嫁女於諸侯必使諸侯同姓者主之胡氏曰有三年之喪天王於義不當使之主有不戴天之讎莊公於義不可為之主築之於外之為宜不若辭而弗主之為正也履祥按莊王初年有黑肩之難未遑諸侯之事也至是以王姬歸齊而使魯主之固常禮也然莊王豈不知齊襄鳥獸之行賊殺魯侯不能行九伐之法而反妻之耶又恐魯以桓公之讎怠於主禮而追命桓公焉然莊王豈不知魯桓弒君之賊生不能討幸其自斃而反追命之耶是其區區之意不過以齊襄之强妻之而又以是和齊魯爾東遷之後王命不行於天下而其所褒錫者如此於是王命益不足為重矣陳莊公卒弟杵臼立是為宣公齊師遷紀郱鄑郚履祥按齊之謀紀有日矣紀之季姜桓王之后則紀固莊王母家也莊王以王姬歸齊將以固昏姻爾王姬適至而遷紀三邑禽獸之人固無施而不悖也春秋書紀季姜與王姬之歸詳而不略則齊之罪自著矣五年齊王姬卒宋莊公卒子捷嗣是為閔公史記凡閔字或作湣六年五月葬桓王左傳曰改葬也或曰卻尸以求諸侯也陳氏曰㑹葬不書其人必有故也而後書其人文公使公子遂葬晉侯叔孫得臣葬襄王是均周晉也昭公使叔弓葬宋公滕侯叔鞅葬景王是均周宋滕也均猶可也晉景公卒成公弔喪而定王不書葬楚康王卒襄公送葬而靈王不書葬不臣於周而詘於晉楚春秋諱之是故春秋不徒志葬也紀季以􅈶入于齊左氏曰紀於是乎始判公羊氏曰請後五廟以存姑姊妹燕桓侯卒子嗣是為莊公七年王召隨侯責其尊楚楚武伐隨卒于師子熊資嗣是為文公始都郢史記曰周召隨侯數以立楚為王楚怒以隨背己伐隨左氏曰楚武王荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為㑹於漢汭而還濟漢而後發喪齊侯陳侯鄭伯遇于垂紀侯大去其國左氏曰紀侯不能下齊以與紀季紀侯大去其國違齊難也齊侯魯侯狩于禚春秋曰公及齊人狩于禚榖梁氏曰齊人者齊侯也其曰人卑公之敵所以卑公也卑公刺釋怨也履祥按文姜之亂與魯莊之忘讎其事情皆有自來姜之諡為文諒必有秀慧之質晨雊之才自其家而僖公已驕之觀其嫁而父親送之要其夫親受之可知己雄狐之事諒必已久鄭子忽之辭婚計必知此不然豈其已嫁中年與夫俱返而始通之耶詩序謂莊公不能防間其母以至淫亂為二國患夫自桓公已不能防間其妻與之如齊矣則莊公豈能防間其母禁其如齊乎夫母不可禁禁其僕從可矣程子固有是言亦詩意也防間其母借曰不能亦宜有所不忍矣何至躬與齊侯狩耶莊公忘父而制於母齊襄與文姜之謀巧矣慶父叔牙季友皆桓公子而季友之祥慶父之材皆不在人下也故齊襄殺桓而以立莊為德文姜又挾舅氏援立以固莊莊公而讎齊制母焉則三公子皆君也是以莊公俯首帖耳非惟狥其母之淫今年㑹于禚明年享于祝丘明年如齊師又明年㑹于防于榖也而已亦有禚之狩有伐衛之㑹有圍郕之㑹焉蓋制於其母以立己為齊之德而不讎也春秋之所諱惟史記略言其故而康節知之故經世書曰齊襄公殺魯桓于濼立其子同可謂得其情矣八年齊人宋人魯人陳人蔡人伐衛左氏曰納惠公也榖梁氏曰是齊侯宋公也其曰人逆天王之命也九年王使子突救衛衛侯朔入于衛黔牟來奔左氏曰王人救衛衛侯入放公子黔牟于周放寧跪于秦殺左公子泄右公子職乃即位公羊氏曰朔何以名犯命也其言入篡辭也十年秦滅小虢史記曰武公十年伐邽冀戎初縣之十一年初縣杜鄭滅小虢班固曰西虢十有一年魯侯及齊師圍郕郕降于齊師左氏曰師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由姑務修德以待時乎齊無知弒其君襄公左氏曰僖公之母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之公使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍請代弗許故二人因無知以作亂弒襄公而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白奔莒亂作管夷吾召忽奉公子紏奔魯十有二年齊人殺無知魯侯及齊大夫盟于蔇魯侯伐齊納紏齊小白入于齊是為桓公葬齊襄公魯侯及齊師戰于乾時魯師敗績左氏曰初公孫無知虐于雍廩雍廩殺無知公及齊大夫盟于蔇齊無君也公伐齊納子紏桓公自莒先入師及齊師戰于乾時我師敗績公喪戎路傳乘而歸秦子梁子以公旗辟于下道是以皆止齊人取子紏于魯殺之取其傅管夷吾以歸為相國語曰桓公自莒反于齊使鮑叔為宰辭曰君加惠於臣使不凍餒則君之賜也若必治國家則非臣之所能也其管夷吾乎臣所不若夷吾者五寬惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執枹鼓立於軍門使百姓加勇焉弗若也桓公曰夫管夷吾射寡人中鉤是以濱於死鮑叔對曰夫為其君動也君若宥而反之夫猶是也桓公曰若何對曰請諸魯桓公曰施伯魯君之謀臣也夫知吾將用之必不豫我若之何對曰使人請諸魯曰寡君有不令之臣在君之國欲以戮於羣臣故請之則豫我矣桓公使請諸魯如鮑叔之言莊公以問施伯對曰此非欲戮之也欲用其政也夫管子天下之才也所在之國則必得志於天下令彼在齊則必長為魯國憂矣莊公曰若何施伯曰殺而以其尸授之莊公將殺管仲齊使者請曰寡君欲親以為戮若不生得以戮於羣臣猶未得請也於是莊公使束縛以豫齊使比至三釁三浴之桓公親逆之于郊而與之坐問焉管子對曰昔者聖王之治天下也參其國而伍其鄙定民之居成民之事陵為之終而慎用其六柄焉桓公曰成民之事若何對曰四民者勿使雜處雜處則其言哤其事易昔聖王之處士也使就閒燕處工就官府處商就市井處農就田野令夫士羣萃而州處閒燕則父與父言義子與子言孝其事君者言敬其幼者言悌少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子恆為士令夫工羣萃而州處審其四時辨其功苦權節其用論比協材旦莫從事施於四方以飭其子弟相語以事相示以巧相陳以功令夫商羣萃而州處察其四時而監其鄉之資以知其市之賈負任儋何服牛軺馬以周四方以其所有易其所無市賤鬻貴旦莫從事於此以飭其子弟相語以利相示以賴相陳以知賈令夫農羣萃而州處察其四時權節其用耒耜枷芟及寒擊槀除田以待時耕及耕深耕而疾耰之以待時雨時雨既至挾其槍刈耨鎛以旦莫從事於田野脫衣就功茅管子作苧蒲襏襫霑體塗足暴其髮膚盡其四支之敏以從事於田野是皆少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故工之子恆為工商之子恆為商農之子恆為農農野處而不昵管子作慝其秀民管子作才之能為士者必足賴也故以耕則多粟以士則多賢是以敬畏戚農有司見而不以告其罪五公曰定民之居若何對曰制國以為二十一鄉公曰善管子於是制國以為二十一鄉工商之鄉六士鄉十五管子作士農之鄉十五公帥十一鄉焉國子帥五鄉焉高子帥五鄉焉參國起案以為三官案界也臣立三宰工立三族市立三鄉澤立三虞山立三衡桓公又問曰寡人欲修政以干時於天下其可乎對曰可公曰安始而可對曰始於愛民公曰愛民之道奈何對曰公修公族家修家族相連以事相及以祿則民相親矣赦舊罪修舊宗立無後則民殖矣省刑罰薄稅斂則民富矣鄉建賢士使教於國則民有禮矣出令不改則民正矣此愛民之道也公曰民富而以親則可以使之乎對曰舉財長工以止民用陳力尚賢以勸民知加刑無苛以濟百姓行之無私則足以容衆矣出言必信則令不窮矣此使民之道也以上參用管子管子書曰桓公曰吾何以富國管子對曰唯官山海為可耳謹鹽策與鐵官之數其餘輕重凖此而行然則舉臂勝事無不服籍者桓公曰然則國無山海不王乎管子曰因人之山海假之名有海之國讐鹽於吾國釜十五吾受而官出之以百我未與其本事也受人之事以重相推此人用之數也國語曰桓公曰吾欲從事於諸侯其可乎管子對曰未可國未安公曰安國若何曰修舊法擇其善者而業用之遂滋民與無財而敬百姓公曰諾遂修舊法擇其善者而業用之遂滋民與無財而敬百姓國既安矣公曰國安矣其可乎曰未可君若正卒伍修甲兵則大國亦將正卒伍修甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可以寄政公曰為之若何曰作內政而寄軍令焉公曰善管子於是制國五家為軌軌為之長十軌為里里置有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之鼓有國子之鼓有高子之鼓春以獀振旅秋以獮治兵是故卒伍整於里軍旅整於郊內教既成令勿使遷徙伍之人祭祀同福死喪同恤禍災共之人與人相疇家與家相疇世同居少同游故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同疆君有此士也三萬人以方行天下以誅無道以屏周室天下大國之君莫之能禦正月之朝鄉長復事君親問焉曰於子之鄉有居處為義好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告謂之敝明其罪五有司已於事而竣公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣公又問焉曰於子之鄉有不慈孝於父母不長悌於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣是故鄉長退而修德進賢公親見之遂使役官令官長期而書伐以告且選選其官之賢者而復用之退問其鄉以觀其所能而無大厲升以為上鄉之贊謂之三選國子高子退而修鄉鄉退而修連連退而修里里退而修軌軌退而修伍伍退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政既成鄉不越長朝不越爵罷士無伍罷女無家士三出妻逐於境外女三嫁入於舂榖夫是故民皆勉為善與其為善於鄉也不如為善於里與其為善於里也不如為善於家是故士莫敢言一朝之便皆有終嵗之計莫敢以終嵗之議皆有終身之功公曰伍鄙若何曰相地而起征則民不移政不旅舊則民不偷山澤各致其時則民不茍陸阜陵墐井田疇均則民不憾無奪民時則百姓富犧牲不略則牛羊遂公曰定民之居若何曰制鄙三十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬立五大夫各使治一屬焉立五正各使聽一屬焉是故正之政聽屬牧政聽縣下政聽鄉正月之朝五屬大夫復事桓公擇是寡功者而謫之曰制治分民如一何故獨寡功教不善則政不治一再則宥三則不赦公又親問焉曰於子之屬有居處為義好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不告謂之蔽明其罪五有司已於事而竣公又問焉曰於子之屬有拳勇股肱之力秀出於衆者有則以告有而不告謂之蔽賢其罪五有司已於事而竣公又問焉曰於子之屬有不慈孝於父母不長悌於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政既成以守則固以征則彊公曰吾欲從事於諸侯其可乎曰未可鄰國未吾親也君欲從事於天下諸侯則親鄰國公曰若何曰審吾疆場而反其侵地正其封疆無受其資而重為之皮幣以驟聘眺於諸侯以安四鄰則四鄰之國親我矣為游士八十人奉之以車馬衣裘多其資幣使周游於四方以號召天下之賢士皮幣玩好使人鬻之四方以監其上下之所好擇其淫亂者而先征之公曰夫軍令則寄諸內政矣齊國寡甲兵為之若何曰輕過而移諸甲兵制重罪贖以犀甲一㦸輕罪贖以鞼盾一㦸小罪謫以金分宥間罪索訟者三禁而不可上下坐成以束矢美金以鑄劒㦸試諸狗馬惡金羡以鑄鉏夷斤欘試諸壤土甲兵大足管子書曰桓公郊迎管子而問焉管子對以參國伍鄙立五鄉以崇化建五屬以厲武寄兵於政因罰備器械加兵無道諸侯以事周室桓公大說於是齊戒十日將相管仲管仲曰斧鉞之人也幸以獲生以屬其要領臣之祿也若知國政非臣之任也公曰子大夫受政寡人勝任不受政寡人恐崩管仲許諾再拜而受相三日公曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側莫不見禽而後反諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汚行不幸而好色而姑姊有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則惡有不可者矣對曰人君唯優與不敏為不可優則亡衆不敏不及事公曰善吾子就舍異日請與吾子圖之對曰時可將與夷吾何待異日乎公曰奈何對曰公子舉博聞而知禮好學而辭遜請使遊於魯以結交焉公子開方巧轉而兌利請使遊於衛以結交焉曹孫宿小廉而荷忕音逝荷密忕習言多所慣習也足恭而辭結正荆之則也與荆俗同請使往遊以結交焉遂立行三使者而後退相三月請論百官公曰諾管仲曰升降揖遜進退間習辨辭之剛柔臣不如隰朋請立為大行墾草入邑辟土聚粟多衆盡地之利臣不如寧戚請立為大司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺無辜不誣無罪臣不如賓胥無請立為大司理犯君顔色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官君若欲治國強兵則五子者存矣若欲霸王夷吾在此公曰善國語曰桓公曰吾欲南伐何主管子對曰以魯為主反其侵地堂濳曰西伐何主曰以衛為主反其侵地臺原姑與漆里曰北伐何主曰以燕為主反其侵地柴夫吠狗使海於有蔽渠弭於有渚環山於有牢四鄰大親既反侵地正封疆地南至陶隂西至于濟北至于河東至于紀酅有革車八百乘擇天下之甚淫亂者而先征之桓公從之而霸功立履祥按論語子路子貢之問皆謂桓公殺公子紏召忽死之管仲不死疑其非仁夫子謂管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒蓋許其仁之功也程子言此大約以桓兄紏弟為斷然荀子又有桓公殺兄之說觀當時事體子紏必弟也然其是非不待兄弟而後可斷顧子紏名義已失不得為正爾何者方齊之將亂也鮑叔牙奉小白奔莒矣襄公之弒子紏固在內也所當正君赴難明義討賊以靖國也而乃奔魯若能乞師復讐猶之可也及雍廪殺無知內難已定方圖再入既而桓公自莒先入靖國人葬襄公正位君齊矣紏何為者邪而管召方輔之用師伐國是真以亡公子而抗齊君耳前無正君討賊之義後有抗君爭國之非則是仲之輔紏為不義罪已可殺桓公不殺而用之則安得而讐桓乎故先師子何子謂猶今叛者既赦自無可死之理此夫子所以不責其死也或曰夫子答子路子貢之問不明言其所以是非何也曰聖人之言正如神化無迹而功用自見要在學者思而得之耳然其事之是非則明書於春秋書公伐齊納紏伐而納之內不受也紏不稱子不宜立也書齊小白入于齊係之齊可立也九月齊人取子紏殺之稱齊人國討也稱子譏齊也稱取弱魯也紏之死固當而桓公殺之為己甚耳然則管仲將得為仁乎曰夫子許管仲以有仁人之功耳使二子之始問也曰管仲仁乎則夫子所以答之者又必異乎此矣管子書稱齊使鮑叔傅小白不出而管仲勉之鮑叔乃出謂管仲之期待小白已久且述其所以自期者死齊不死紏是則後人傅㑹為管仲文其事而不知其義者也今取其內政諸說著于篇以見王制之變霸業之本而不取其傅㑹之說云十有三年魯侯敗齊師于長勺左氏曰齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之履祥按此齊桓修納紏之怨也魯事齊讐為所弱矣至是曹劌用而始勝齊然魯之用竒自是始春秋書敗齊師書其實亦以示貶也魯侯侵宋齊師宋師次于郎魯侯敗宋師于乘丘齊師還左氏曰齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出䝉臯比而先犯之公從之大敗宋師于乘丘齊師乃還陳氏曰其言次以桓公圖霸而未集也桓公所甚汲汲者魯也茍不得魯不可以合諸侯宿師于郎將以詘魯爾於是書次用見桓之未得志於諸侯也是故書齊師宋師次于郎以志齊伯之難書楚子蔡侯次于厥貉以志楚伯之難于此焉可以知人心矣不茍於從齊是人心猶有周也不茍於從楚是人心猶有晉也有王者作天下往歸之矣荆敗蔡師于莘以蔡侯獻舞歸左氏曰蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之楚敗蔡師于莘以蔡侯獻舞歸史記曰楚伐蔡虜蔡侯已而釋之楚彊陵江漢間小國小國皆畏之經世曰自是江漢之國皆服于楚陳氏曰是夷夏之大變也齊師滅談談子奔莒左氏曰齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至齊師滅談談無禮也談子奔莒同盟故也陳氏曰書滅始於此然則滅國自齊桓乎前乎此矣曷為以首亂罪齊微桓公則滅國之禍不接迹於天下春秋之際滅國三十六五霸為之也談子何以不名國滅而后書奔以不死社稷也奔非其罪莫甚於被兵者也雖不死社稷猶不名也十有四年魯侯敗宋師于鄑左氏曰宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑王姬歸于齊左氏曰齊侯來逆共姬杜氏曰魯主昏齊侯來逆不書不見公也十有五年王崩大子胡齊踐位履祥按莊王崩葬不書於春秋周不赴告魯不奔㑹也其時可知矣他國又可知矣宋萬弒其君閔公及其大夫仇牧宋人立公子御說是為桓公萬奔陳宋人醢之左氏曰乘丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之宋萬弒閔公于䝉澤遇仇牧于門批而殺之遇大宰督于東宫之西又殺之立子游羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公猛獲奔衛南宫萬奔陳以乘車輦其母一日而至宋人請猛獲于衛衛人歸之亦請南宫萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之御批資治通鑑綱目前編卷十
