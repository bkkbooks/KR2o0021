body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十三癸卯周頃王元年毛伯如魯求金二月葬襄王魯侯使叔孫得臣來㑹葬履祥按襄王之喪公孫敖之幣不至於是有求金之使焉頃王初政如此其後頃之崩葬遂不見於春秋矣魯固不恪而頃王為巳䙝也楚人伐鄭晉人宋人魯人衛人許人救鄭左氏曰范山言於楚子曰晉君少不在諸侯北方可圗也楚子師于狼淵以伐鄭鄭及楚平公子遂㑹晋趙盾宋華耦衛孔逹許大夫救鄭不及楚師卿不書緩也以懲不恪曹共公卒子壽嗣是為文公楚侵陳左氏曰楚侵陳克壺丘以其服於晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平燕襄公卒桓公立二年秦伐晉陳氏曰狄秦也歸成風之襚使術來聘秦習於禮矣則其狄之何楚之霸秦之力也自滅庸以後秦為楚役自晉主諸夏之盟舍秦無加兵於晉者也㑹于夷儀之歲秦晉成而不結又明年盟于宋而南北之勢成楚子曰釋齊秦他國請相見也是戰國之萌也於序書系秦於周末於作春秋由韓原之後秦師無君大夫皆夫子所以深致意於秦也吾聞用夏變夷矣未聞變於夷者也於是狄秦夏之變於夷秦人為之也又三十年而狄鄭又五十年而狄晉狄鄭猶可也狄晉甚矣蘇子盟魯于女栗左氏曰頃王立故也狄侵宋楚子蔡侯次于厥貉左氏曰陳侯鄭伯㑹楚子于息遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以狥或謂子舟曰國君不可戮也子舟曰當官而行何彊之有胡氏曰楚滅江六平陳與鄭於是乎為伐宋之舉次于厥貉當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已不已志從夷狄矣故削三國書蔡侯以惡之三年楚子伐麋晉人魯人㑹于承筐左氏曰叔仲惠伯㑹郤缺于承筐謀諸侯之從於楚者魯叔孫得臣敗狄于鹹左氏曰鄋瞞侵齊遂伐我公使叔孫得臣追之侯叔夏御綿房甥為右富父終甥駟乘敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御公子榖甥為右司寇牛父駟乘以敗狄于長丘獲長狄緣斯晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首於周首之北門衛人獲其季弟簡如鄋瞞由是遂亡四年楚人圍巢左氏曰楚成嘉為令尹羣舒叛楚子孔執舒子平及宗子遂圍巢秦伯使術聘于魯左氏曰秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之履祥按春秋自韓原之後秦師無君大夫秦康之戰伐狄之人之而於其聘魯也稱秦伯書其大夫焉惡其兵而嘉其禮也然其時秦楚交聘於魯前書椒後書術雖皆嘉之而不書其族以秦楚之未有族秦後封至穆公始文至是再加禮於魯且言將伐晉魯主晋而重違秦故厚賄之非徒以其文也晉人秦人戰于河曲左氏曰秦為令狐之役故秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師于河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦軍掩晉上軍趙穿追之不及反怒曰褁糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見也㬰駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕明年晉侯使詹嘉處瑕以守桃林之塞晉人患秦之用士㑹也六卿相見於諸浮趙宣子曰隨㑹在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勳郤成子曰賈季亂且罪大不如隨㑹能賤而有耻柔而不犯其知足使也且無罪乃使魏壽餘僞以魏叛者以誘士㑹執其帑於晉使夜逸請自歸于秦秦伯許之履士㑹之足於朝秦伯師于河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使士㑹士㑹辭曰晋人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑有如河乃行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏履祥按秦晉亟戰春秋之所深厭是以交人之秦晉亟戰而楚霸矣晋主夏盟而君幼國偷軍謀不一其始見於河曲之戰其甚見於邲之敗蓋一轍也五年陳共公卒子平國嗣是為靈公邾文公卒子貜且嗣是為定公左氏曰邾文公卜遷于繹史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命魯侯朝于晉衛侯㑹魯侯于沓狄侵衛魯侯及晉侯盟鄭伯㑹魯侯于棐左氏曰公如晉朝且尋盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之楚熊商臣死子旅嗣是為莊左氏曰楚莊立子孔潘崇將襲群舒使公子燮與子儀守而伐舒蓼二子作亂城郢而使賊殺子孔不克而還二子以楚子出將如商密廬戢黎及叔麇誘之遂殺鬭克及公子燮初鬭克囚于秦秦有殽之敗而使歸求成成而不得志公子燮求令尹而不得故二子作亂六年王崩子班踐位左氏曰頃王崩周公閲與王孫蘇爭政故不赴尹氏聃啓如晉左氏曰周公將與王孫蘇訟于晉王叛王孫蘇而使尹氏與聃啓訟周公于晉趙宣子平王室而復之齊昭公卒子舍嗣宋公魯侯陳侯衛侯鄭伯許男曹伯㑹晉趙盾同盟于新城左氏曰從於楚者服且謀邾也陳氏曰向也扈之盟不序諸侯此其復序何諸夏之志也晋救江無功救鄭無功與秦亟戰而楚浸强交聘于中國得蔡次厥貉矣而晉遂不競於是公朝晉衛侯來㑹公還自晉鄭伯來㑹諸夏之懼甚矣汲汲於晉而為此盟如之何勿序也以諸夏之汲汲於晉也而徒以趙盾主是盟書曰同盟衆辭也自幽以來未之有也則不豫晉以主是盟也晉人納捷菑于邾弗克納左氏曰邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納捷菑于邾邾人謂曰齊出貜且長宣子曰辭順而弗從不祥乃還榖梁氏曰其曰人微之也長轂五百乘綿地千里過宋鄭滕薛敻入千乘之國欲變人之主至城下然後知何知之晚也陳氏曰楚方交聘中國得蔡次厥貉矣而晉區區納亡公子於邾又以少陵長見辭於邾人自敗于令狐盟于扈救鄭戰河曲趙盾皆不書由是訖靈公之篇兵車之㑹自參以上貶人之趙盾為之也齊公子商人弒其君舍而自立是為懿公單伯如齊齊人執單伯執其君舍之母魯子叔姬左氏曰子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之昭公卒舍即位秋商人弒舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬榖梁氏曰舍未踰年而曰君成舍之為君所以重商人之弒也胡氏曰執王人執其母皆商人也而以為齊人何也商人弒君之罪已彰而齊人黨賊之惡未著商人以財誘國人而濟其惡齊人懷商人之私惠弒其君而不能討執其母而莫之救則舉國之人皆罪也己酉匡王元年魯季孫行父如晉宋司馬華孫如魯盟曹伯朝于魯履祥按魯晋宋曹之交畏齊楚也六月辛丑朔日有食之單伯自齊反于魯左氏曰齊人許單伯請而赦之使來致命十二月齊人來歸子叔姬王故也晉郤缺帥師伐蔡入之左氏曰新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠入蔡以城下之盟而還齊人侵魯諸侯盟于扈左氏曰齊人侵我西鄙故季文子告于晉晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難公不㑹書曰諸侯盟于扈無能為故也齊人侵魯遂伐曹左氏曰齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣蔡莊侯卒子申嗣是為文侯二年楚人秦人巴人滅庸左氏曰楚大饑戎伐其西南又伐其東南庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪高蒍賈曰不可我能往寇亦能往不如伐庸夫䴢與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廪同食次于句澨使廬戢梨侵庸及庸方城庸人逐之囚子楊窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯禆鯈魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸履祥按楚恃其强陵蔑小國其臣屬之者待之必無恩禮故一旦饑弱則群起而攻之矣庸小國也而幸其饑弱率羣蠻叛之此滅亡之招也楚莊初年內有鬬克公子燮之亂外有庸䴢之難而卒以霸禍患之有益於人國如此宋人弒其君昭公而立其弟鮑是為文公左氏曰宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也襄夫人助之施昭公無道夫人將使公田而殺之蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死冬將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之書曰宋人弒其君杵臼君無道也文公即位世家云襄夫人使衛伯殺昭公三年晉人衛人陳人鄭人伐宋諸侯㑹于扈左氏曰晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也晉侯搜于黃父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為二于楚也鄭子家使執訊而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入于敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克減侯宣多而隨蔡侯以朝于執事十二年六月歸生佐寡君之嫡夷以請陳侯于楚而朝諸君十四年七月寡君又朝以蕆陳事十五年五月陳侯自敝邑往朝于君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之密邇於楚而不敢二焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝于襄而再見于君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也德則其人也不德則其鹿也鋌而走險急何能擇命之罔極亦知亡矣將悉敝賦以待於鯈唯執事命之文公二年六月壬申朝于齊四年二月壬戍為齊侵蔡亦獲成於楚居大國之間而從於強令豈其罪也大國若弗圖無所逃命晉鞏朔行成於鄭趙穿公壻池為質焉冬鄭太子夷石楚為質于晉甘歜敗戎于邥垂四年魯文公卒子赤嗣左氏赤作惡秦康公卒子稻嗣是為共公齊人弒其君商人立公子元是為惠公左氏曰齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏公遊于申池二人浴于池歜以撲抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弒懿公納諸竹中歸舍爵而行齊人立公子元履祥按宋昭公不能其君祖母以及國人襄夫人使人殺之商人弒君之賊故邴歜閻職不書盜而二君皆稱國人以弒商人書君罪齊人嘗君之也魯公子遂弒其君之子赤及公子視立公子倭是為宣公左氏曰文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏夫人姜氏歸于齊將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜莒弒其君紀公左氏曰莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必逹公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之履祥按春秋弒君之罪自宋昭至齊莒書法皆變蓋自其君無道而亂臣賊子皆有所因也春秋之法弒君而變置則立者為首惡襄仲弒赤而立宣公季孫行父上不能為季友次不能為惠伯專莒僕之事以劫宣公之短已而為之使齊納賂自是政權卒歸季氏矣五年魯宣公元齊侯魯侯㑹于平州齊人取魯濟西田左氏曰公子遂如齊逆女遂以婦姜至自齊季文子如齊納賂以請㑹㑹于平州以定公位東門襄仲如齊拜成齊人取濟西之田為立公故以賂齊也履祥按魯昭姬適齊生舍為商人所弒而反魯齊哀姜適魯生赤為遂所弒而反齊二事蓋一類也然齊商人弒舍惠公之為公子也則惡之終不曰君曰夫巳氏及既自立矣則許襄仲之請而立魯宣公赤視其自出也見殺而不顧哀姜其姑姊妹也大歸而不恤徒以利重賂利嫁女利濟西之田故爾豈不思子赤之死猶舍之死宣之立猶商人之立哀姜之歸猶昭姬之歸乎在己則惡之在人則許之不能充羞惡之心以至於此也魯宣公之立重寶土田既輸之齊外為强齊所抑內為三家所專何樂於為君而為此哉吾故曰齊惠見利而忘義魯宣見利而忘害也楚子鄭人侵陳遂侵宋左氏曰宋人之弒昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉秋楚子侵陳遂侵宋胡氏曰楚書爵而人鄭者貶之也鄭伯本以晉之取賂為不足與而受盟于楚今乃附楚而亟病中國何義乎陳氏曰南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟于宋諸夏分為晉楚之從矣南北之勢於是始故謹書之也晉趙盾帥師救陳宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭左氏曰楚蒍賈救鄭遇于北林囚晉解揚晉人乃還晉人宋人伐鄭左氏曰報北林之役也於是晉侯侈趙宣子為政驟諫而不入故不競於楚履祥按趙宣子輔幼君不為置賢師𫝊而徒强諫此宣子之失也六年宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左氏曰鄭公子歸生受命于楚伐宋宋華元樂吕御之戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗宋人以兵車百乘文馬百駟以贖華元於鄭半入華元逃歸立于門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔秦師伐晉左氏曰晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉趙穿侵崇秦弗與成秦師伐晉以報崇也遂圍焦晉人宋人衛人陳人侵鄭左氏曰晉趙盾救焦遂自隂地及諸侯之師侵鄭楚鬭椒救鄭次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之又明年鬬椒將攻楚子遂滅若敖氏陳氏曰此晉趙盾以諸侯之師曷為貶稱人以晋為甚不競於楚也楚方圗伯而晉以大夫用諸侯由是兵車之㑹自參以上貶人之而自柳棼之役楚皆稱子矣胡氏曰鄭居大國之間從於强令豈其罪乎不能以德鎮撫而日爭之庸何愈於楚乎自是責楚益䡖罪在晉矣晉趙盾弒其君靈公迎襄公弟黑臀于周立之是為成公左氏曰晉靈公不君厚斂以雕牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之三進及澑而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉猶不改宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晋侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之鬬且出提彌明死之靈轍與為公介倒㦸以禦公徒而免之遂自亡也注謂靈轍亡當是宣子自出亡趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊戚其我之謂矣宣子使趙穿逆公子黑臀于周立之初麗姬之亂詛無畜羣公子自是晉無公族及成公即位乃宦卿之適而為之田以為公族又宦其餘子亦為餘子其庶子為公行晉於是有公族餘子公行趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之履祥按左氏引孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免此非夫子之言也方靈公欲殺趙盾至於伏甲攻之盾力鬬而出於是出亡而趙穿攻靈公於後穿何怨於公而為此是必有所受命矣盾非果奔也故未出山實使穿也故不討賊夫子書法因董狐之舊豈又為是言乎而反為趙盾謀也且盾成弒君之故矣縱使越竟又可免於弒逆之罪乎以是知决非夫子之言也十月王崩弟瑜立乙卯定王元年正月葬匡王胡氏曰四月而葬王室不君其禮略也楚子伐陸渾之戎王使王孫滿勞楚子左氏曰楚子伐陸渾之戎遂至於雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也胡氏曰夷狄相攻不志此其志何也為陸渾在王都之側戎夏雜處族類不分也而楚又至洛觀兵問鼎故特書于策以謹華夷之辨禁猾夏之階也履祥按傳所稱楚子窺周逼王為罪大矣而春秋書曰楚子伐陸渾之戎無貶辭何也自秦晋遷陸渾之戎于伊川世為周室之憂所謂逼我郊甸戎有中國誰之咎也以楚子伐戎為窺周則秦晋遷戎不亦逼周之甚乎夷狄相攻中國之福楚之伐戎未必非周室之幸也王城洛邑今河南之河南縣陸渾所居今河南之陸渾縣戎逼郊甸壤地蓋相入也則其觀兵于疆未必如秦師之過北門也而其問鼎亦未必如楚靈之求九鼎也亦不過以其為三代相傳之器諸侯未見之寶因語及之遂為王孫所警爾王孫滿之言蓋王室防制之意夫鼎實九州圗籍嫁言神姦國之利器不可以示人蓋周室之意也治春秋者當以經為斷子以為有王者作將比今之諸侯而誅之乎經無貶辭愚以是疑當時楚莊之心或無罪也且天下之罪莫大於逼王而楚國之利莫大於得陳鄭楚莊他日尚能縣陳而復陳得鄭而赦鄭而謂其首有逼周之師此必不然矣春秋誅心之書楚莊無是心宜春秋不以是為罪也楚人侵鄭左氏曰晉侯伐鄭鄭及晉平士㑹入盟夏楚人侵鄭鄭即晉故也鄭穆公卒子夷嗣是為靈公二年秦共公卒子嗣是為桓公鄭公子歸生弒其君靈公弟堅立是為襄公左氏曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏弒靈公鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舍之皆為大夫鄭七穆所以盛八年鄭子家卒鄭人討幽公之亂斫子家之棺而逐其族改葬幽公諡之曰靈楚子伐鄭三年魯侯朝于齊齊侯止之為高固請昏胡氏曰宣公比年如齊春秋皆致之蓋危之也夫以篡弒謀於齊而取國以土地賂齊而請㑹以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎至是如齊而高固使齊侯止公請叔姬焉秋高固來逆叔姬罪宣公也夫以鄭國褊小楚公子圍之貴驕强大來娶于鄭子産辭而郤之使館于外幾不得撫有其室而宣公以魯國周公之後逼於高固請昏其女强委禽焉而不能止惟不知以禮為守身之幹以定其位是以得此辱也楚人伐鄭四年晉趙盾衛孫免侵陳左氏曰往年楚子伐鄭陳及楚平晉衛侵陳陳即楚故也王使子服求后于齊召公逆王后于齊五年河徙西漢書曰王橫言往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也王使王叔㑹晉侯宋公衛侯鄭伯曹伯于黑壤諸侯盟于黑壤左氏曰春衛侯使孫良夫來盟謀㑹晉也鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟於黑壤王叔桓公臨之以謀不睦晋侯之立也公不朝焉又不使大夫聘晋人止公于㑹盟于黃父公不與盟以賂免故黑壤之盟不書諱之也燕桓公卒宣公立六年晉師白狄伐秦楚人滅舒蓼盟吳越七月甲子日有食之既楚師伐陳左氏曰陳及晉平楚師伐陳取成而還王使單子聘於宋遂自陳聘於楚國語曰定王使單襄公聘于宋遂假道於陳以聘於楚火朝覿矣道茀不可行候不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹墾田若藝膳宰不致餼司里不授館國無寄寓縣無施舍民將築臺於夏氏及陳陳靈公與孔寧儀行父南冠以如夏氏留賔弗見單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸木見而草木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁其時警曰收而場功偫而畚梮營室之中土功其始火之初見期於司里此先王之所以不用財賄而廣施德於天下者也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之教也周制有之曰列樹以表道立鄙食以守路國有郊牧疆有寓望藪有圃草囿有林池所以禦災也其餘無非榖土民無縣耜野無奧草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草間功成而不收民罷於逸樂是棄先王之法制也周之秩官有之曰敵國賔至關尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司寇詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致饔廪人獻餼司馬陳芻工人展車百官各以物至賓入如歸是故小大莫不懷愛其貴國之賓至則以班加一等益䖍至於王使則皆官正涖事上卿監之若王巡守則君親監之今雖朝也不才有分族於周承王命以為過賔於陳而司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰淫故凡我造國無從非彛無即慆淫各守爾典以承天休今陳侯不念𦙍續之常棄其伉儷妃嬪而帥其卿佐以淫於夏氏不亦瀆姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彜乎是又犯先王之令也昔先王之教懋帥其德也猶恐隕越若廢其教而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能久乎七年王使徵聘于魯魯侯朝于齊使仲孫蔑入聘左氏曰王使來徵聘夏孟獻子聘於周王以為有禮厚賄之晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳晉成公卒于扈子據嗣是為景公師還楚子伐鄭晉郤缺帥師救鄭左氏曰㑹于扈討不睦也陳侯不㑹晋荀林父以諸侯之師伐陳晉侯卒于扈乃還楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣胡氏曰楚兵加鄭數矣或稱人或稱爵何也鄭自晉成公初立舍楚而從中國正也楚人為是興師而加鄭不義矣故宣公三年書人書侵罪之也次年鄭公子歸生弒其君諸侯未有聲罪致討者而楚師至焉故特書爵與之也然興師動衆賊則不討惟服鄭之為事則非義舉矣故又次年傳稱楚子伐鄭而經書人再貶之也至是稱爵豈與之乎君將不言帥師是以重兵臨鄭矣下書帥師則知其非與之也衛成公卒子遫嗣是為穆公八年齊人歸魯濟西田四月丙辰日有食之齊惠公卒子無野嗣是為頃公陳夏徵舒弒其君靈公左氏曰陳靈公與孔寧儀行父通於夏姬皆衣其衵服以戲于朝泄冶諌曰公卿宣淫民無效焉且聞不令公告二子遂殺泄冶陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徵舒似汝對曰亦似君徵舒病之公出自其廄射而殺之二子奔楚晉人宋人衛人曹人伐鄭左氏曰鄭及楚平諸侯之師伐鄭取成而還王使王季子聘于魯國語曰定王八年使劉康公聘于魯發幣於大夫季文子孟獻子皆儉叔孫宣子東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寬肅宣惠君也敬恪恭儉臣也寬所以保本也肅所以濟時也宣所以教施也惠所以和民也本有保則必固時動而濟則無敗功教施而宣則遍惠以和民則阜若本固而功成施遍而民阜乃可以長保民矣其何事不徹敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以恭給事則寬於死以儉足用則逺於憂若承命不違守業不懈寬於死而逺於憂則可以上下無隙矣其何任不堪上作事而徹下能堪其任所以為令聞長世也今夫二子者儉其能足用矣用足則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之若是則必廣其身且夫人臣而侈國家弗堪亡之道也王曰幾何對曰東門之位不若叔孫而泰侈焉不可以事二君叔孫之位不若季孟而亦泰侈焉不可以事三君若皆蚤世猶可若登年以載其毒必亡十六年魯宣公卒赴者未及東門氏來告亂子家奔齊簡王十一年魯叔孫宣伯亦奔齊楚子伐鄭左氏曰楚子伐鄭晉士㑹救鄭逐楚師于潁北諸侯之師戍鄭九年楚子陳侯鄭伯盟于辰陵左氏曰楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏盟于辰陵陳鄭服也楚人殺陳夏徵舒楚子入陳納公孫寧儀行父于陳迎靈公子午于晉而立之是為成公左氏曰楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徵舒因縣陳陳侯在晉申叔時使於齊反曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎楚子曰善哉吾未之聞也反之可乎對曰吾儕小人所謂取諸其懷而與之也乃復封陳胡氏曰公孫寧儀行父從君於昏宣淫於朝誅殺諌臣使其君見弒蓋致亂之臣也而又使陳人用之故春秋外二人於陳而特書納納者不受而强納之者也為楚莊者宜如何瀦徵舒之宫封泄冶之墓尸孔寧儀行父于朝謀於陳衆定其君而去其庶幾乎甲子十年楚子圍鄭左氏曰厲之役鄭伯逃歸自是楚未得志焉鄭既受盟于辰陵又徼事于晋春楚子圍鄭旬有七日國人大臨楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圗之左右曰不可許也得國無赦楚莊曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尩入盟子良出質履祥按楚莊之於鄭圍之甚久然入而不取也故春秋罪其圍而不罪其入以楚莊為善於此矣晉荀林父帥師及楚子戰于邲晉師敗績左氏曰晉師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之隨武子曰善㑹聞用師觀釁而動德刑政事典禮不易不可敵也楚軍討鄭怒其二而哀其卑伐叛刑也柔服德也昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不奸矣軍行右轅左追蓐前茅慮無中權後徑百官象物而動軍政不戒而備能用典矣其君之舉也內姓選於親外姓選於舊舉不失德賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵强而退非夫也以中軍佐濟知莊子曰此師殆哉果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎師遂濟楚子北師次於郔沈尹將中軍子重將左子反將右將飲馬於河而歸聞晉師既濟欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔歲入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎南轅反斾伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆誰適從此行也晋師必敗且君而逃臣若社稷何楚子病之告令尹改乘轅而北次于管以待之晉師在敖鄗之間鄭皇戍使如晉師曰鄭之從楚社稷之故也未有二心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林針之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不德而徼怨於楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至于昏內官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子趙莊子曰欒伯善哉實其言必長晋國楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪於晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人彘子以為諂使趙括更之曰行人失辭寡君使羣臣遷大國之迹於鄭曰無辟敵羣臣無所逃命楚子又求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晋師晉人逐之晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰若二子怒楚楚人乘我喪師無日矣不如備之楚之無惡除備而盟若以惡來有備不敗且雖諸侯相見軍衛不徹警也彘子不可士季使鞏朔韓穿帥七覆于敖前趙嬰齊使其徒具舟于河趙旃夜至楚軍席於軍門之外使其徒入之乙卯楚子乘左廣以逐趙旃旃棄車而走林屈蕩搏之逢大夫授旃綏以免晋人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晋師至矣楚人亦懼楚子之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我遂疾進師車馳卒奔乘晋軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晋師右移上軍未動工尹齊將右拒卒以逐下軍楚子使告唐惠侯使潘黨率游闕四十乘從唐侯以為左拒以從上軍駒伯曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗楚熊負羈囚知罃知莊子以其族反之下軍之士多從之曰不以人子吾子其可得乎射連尹襄老載其尸射公子榖臣囚之以二者還及昏楚師軍於邲晋之餘師不能軍宵濟亦終夜有聲楚重至於邲遂次于衡雍潘黨曰君盍築武軍而收晋尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰夫文止戈為武夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晋在焉得定功所違民欲猶多民何安焉無德而强爭諸侯何以和衆利人之幾而安人之亂以為己榮何以豐財武有七德我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又何以為京觀乎祀于河作先君宫告成事而還晋師歸桓子請死晋侯欲許之士貞子諌曰城濮之役晋師三日榖文公猶有憂色曰得臣猶在憂未歇也困獸猶鬬况國相乎及楚殺子玉曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晋也而又殺林父以重楚勝無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也夫其敗也如日月之食焉何損於明晋侯使復其位明年晋殺其大夫先縠即彘子也晉屠岸賈殺趙朔于下宫史記曰晋景公時趙盾卒子朔嗣朔娶晋成公姊是為莊姬屠岸賈者始有寵於靈公至景公之三年賈為司寇乃治靈公之賊遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今誅其後非先君之意妄誅謂之亂臣有大事而君不聞是無君也賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨厥許諾賈擅與諸將攻趙氏於下宫殺趙朔朔妻有遺腹走公宫匿朔客公孫杵臼謂朔友程嬰曰胡不死程嬰曰朔之婦有遺腹幸而男吾奉之即女也吾徐死耳居無何而朔婦生男屠岸賈聞之索於宫中夫人置兒褲中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵臼曰今一索不得後必且復索之奈何杵臼曰立孤與死孰難程嬰曰死易立孤難耳杵臼曰趙氏先君遇子厚子彊為其難者吾為其易者請先死乃二人謀取他人嬰兒負之衣以文葆匿山中新序即程嬰子程嬰出謬謂諸將曰誰能與我千金吾告趙氏孤處諸將許之隨攻公孫杵臼杵臼謬曰小人程嬰昔下宫之難不能死與我謀匿趙孤今又賣之乎諸將遂殺杵臼與孤兒以為趙氏孤已死然趙氏真孤乃在程嬰卒與俱匿山中居十五年韓厥具以實告於是景公乃與韓厥謀召趙氏孤兒匿之宫中名曰武趙氏之禍左氏謂趙嬰通于趙莊姬原屏放諸齊莊姬以是怨原屏譖殺之而趙氏滅武從姬氏育于宫中史記則謂屠岸賈討靈公之賊殺朔與嬰齊同括而趙氏滅程嬰杵臼匿趙氏二說不同而史記之說人多不信以左氏所不載也獨邵氏經世厯書之履祥按屠岸賈殺趙朔自一事趙莊姬譖殺同括又一事但史記以為殺朔而盡滅同括嬰齊則傳聞之失遂與左氏謬戾爾楚子滅蕭左氏曰楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙楚子曰勿殺吾退蕭人殺之怒遂圍蕭蕭潰胡氏曰楚莊假於討賊而滅陳春秋以討賊之義重也末減而書入惡其二已而入鄭春秋以退師之情恕也末減而書圍至是肆其強暴滅無罪之國其志已盈雖欲赦之不得也故傳稱蕭潰經以滅書斷其罪也晉人宋人衛人曹人同盟于清邱宋師伐陳衛人救陳左氏曰晋原縠宋華椒衛孔逹曹人同盟于清邱曰恤病討二於是卿不書不實其言也宋為盟故伐陳衛人救之孔逹曰先君有約言焉若大國討我則死之十有一年楚子伐宋左氏曰以其救蕭也君子曰清邱之盟唯宋可以免焉晋以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔逹曰茍利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之縊而死衛人以說于晋而免履祥按邲之師士會欒書輩非不知楚之所以得不幸而為彘子之謀所敗為晋計者亦盍知所懲艾息民修政於國而布德加禮於諸侯庶為可耳顧汲汲於討二又使彘子主清邱之盟且楚方加恩於陳而使宋伐之衛方有恤陳之師而晋又討之遂使宋致楚師而不能救卒亦並宋失之矣傳稱清邱之盟唯宋可以免愚謂伐陳不可免惟救蕭可免耳十有二年曹文公卒子廬嗣是為宣公晉侯伐鄭左氏曰晉侯伐鄭為邲故也告於諸侯搜焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚鄭伯如楚謀晋故也鄭以子良為有禮故召之楚子圍宋左氏曰楚子使申舟聘于齊曰無假道於宋亦使公子馮聘于晋不假道于鄭申舟無畏也以孟諸之役惡宋曰鄭昭宋聾晋使不害我則必死楚子曰殺汝我伐之見犀而行及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋圍宋十有三年宋人及楚人平左氏曰宋人使樂嬰齊告急于晋晋侯欲救之伯宗曰雖鞭之長不及馬腹天方授楚未可與爭雖晋之彊能違天乎國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子賂之使反其言不許三而許之登諸樓車遂致其君命楚子將殺之曰爾既許不榖而反之速即爾刑對曰君能制命為義臣能承命為信信載義而行為利義無二信信無二命君之賂臣不知命也受命以出有死而已臣之許君以成命也死而成命臣之祿也楚子舍之以歸夏楚師將去宋申犀稽首於馬前曰毋畏知死而不敢廢命王棄言焉申叔時僕曰築室反耕者從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以㸑雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞王札子殺召伯毛伯左氏曰王孫蘇與召伯毛伯爭政使王子捷殺召戴公及毛伯衛卒立召襄榖梁氏曰兩下相殺不志乎春秋此其志何也矯王命以殺之故曰以王命殺也王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天之所以傾也晉侯使趙同來獻狄俘左氏曰潞子嬰兒之夫人晋景公之姊也酆舒為政而殺之又傷潞子之目晋荀林父敗赤狄于曲梁滅潞酆舒奔衛衛人歸諸晋殺之晋侯賞桓子狄臣千室亦賞士伯曰吾獲狄土子之功也微子吾喪伯氏矣晋侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎天奪之魄矣魯初稅畝左氏曰非禮也榖出不過藉杜氏曰公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初十有四年晉人滅赤狄甲氏及留吁來獻俘王以黻冕命晋士㑹左氏曰晋士㑹帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晋侯請于王以黻冕命士㑹將中軍且為太傅於是晋國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也成周宣榭火左氏曰人火之也人火曰火天火曰災王孫蘇奔晋晋侯使士㑹入聘國語作聘左氏曰為毛召之難故王室復亂王孫蘇奔晋晋人復之晉侯使士㑹平王室定王享之原襄公相禮殽蒸武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折爼公當享卿當宴王室之禮也武子歸而講求典禮以修晋國之法十有五年蔡文侯卒子固嗣是為景侯六月癸卯日有食之晋侯魯侯衛侯曹伯邾子同盟于斷道左氏曰晋侯使郤克徵㑹于齊齊頃公帷婦人使觀之郤子登婦人笑於房跛而登階故笑獻子怒出而誓曰所不此報無能涉河獻子先歸請伐齊弗許齊侯使髙固晏弱蔡朝南郭偃㑹及斂盂高固逃歸夏㑹于斷道討二也辭齊人執晏弱蔡朝南郭偃苖賁皇使見晏桓子歸言於晋侯曰舉言羣臣不信諸侯皆有二志齊君恐不得禮故不出而使四子來或沮之曰君不出必執吾使故高子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而來吾若善逆彼以懷來者又執之以信齊沮又久之以成其悔使反者得辭而害來者以懼諸侯將焉用之緩之逸范武子老郤獻子為政魯侯之弟叔肸卒榖梁氏曰春秋書公弟叔肸賢之也宣弒而非之也非之則胡為不去之兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋十有六年晋侯衛世子臧伐齊齊侯㑹晋侯盟于繒楚莊卒子審嗣是為共魯宣公卒子黑肱嗣是為成公左氏曰公孫歸父以襄仲之立宣公也有寵欲去三桓以張公室謀而聘于晋欲以晋人去之公薨季文子言於朝曰使我殺嫡立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪遂逐東門氏子家還及笙壇帷復命於介袒括髮即位哭踊奔齊十有七年魯成公元晋侯使瑕嘉來平戎王使單子如晋王子伐茅戎王師敗績于茅戎左氏曰晉侯使瑕嘉平戎于王單襄公如晋拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎敗績于徐吾氏魯作邱甲陳氏曰邱甲邱自為甲也二十五人為兩四兩為卒卒出長轂一乘也於甸乎取之於是有甲士邱十六井也而自為甲是邱賦一乘也大司馬之制上地家可用者三人中地二家五人下地家二人皆勝兵也必四邱之甸也而後備一卒出長轂一乘則是從征少而休多也作邱甲休少而從征多矣十有八年齊侯伐魯敗衛師于新築左氏曰齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢邱衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救孫桓子桓子是以免晉郤克魯季孫行父臧孫許叔孫僑如公孫嬰齊衛孫良夫曹公子首及齊侯戰于鞍齊師敗績左氏曰孫桓子還於新築不入遂如晋乞師臧宣叔亦如晋乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之郤克及士燮欒書韓厥將以救魯衛臧宣叔逆晋師且道之季文子帥師㑹之師從齊師于莘至于靡笄之下齊侯使請戰對曰晋與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命師陳於鞍邴夏御齊侯逢丑父為右晋解張御郤克鄭邱緩為右齊侯曰余姑剪滅此而後朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之逢丑父與公易位韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯求丑父三入三出入于狄卒狄卒皆抽戈楯冒之以入衛師衛師免之晉師從齊師入自邱輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為晋人不可曰必以蕭同叔子為質按二傳同叔子即笑郤克者使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晋君之母也吾子布大命於諸侯而曰必質其母其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝唯吾子戎車是利無顧土宜無乃非先王之命也乎反先王則不義何以為盟主其晋實有闕寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒橈敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先王之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諌曰齊疾我矣子若不許讐我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣晋人許之對曰羣臣帥賦輿以為魯衛請茍有以藉口而復於寡君敢不唯命是聽秋七月晉師及齊國佐盟于袁婁使齊人歸魯汶陽之田晋師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代師受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉宋文公卒子固嗣是為共公左氏曰宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為衛穆公卒子臧嗣是為定公左氏曰晋三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬晋侯使鞏朔獻齊捷王命委於三吏左氏曰晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功於齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又奸先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而太師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之曰非禮也勿籍楚師鄭師侵衛遂侵魯魯侯㑹楚公子嬰齊于蜀遂及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左氏曰宣公使求好于楚楚莊卒宣公薨不克作好成公即位受盟于晉㑹晋伐齊衛人不行使于楚而亦受盟于晋從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰師衆而後可乃大户已責逮鰥救乏赦罪悉師卒盡行彭名御戎蔡景公為左許靈公為右冬楚師侵衛遂侵我師于蜀侵及陽橋孟孫請往賂之公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晋而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也是行也晋辟楚畏其衆也十有九年晉侯宋公魯侯衛侯曹伯伐鄭左氏曰討邲之役也鄭公子偃帥師禦之使東鄙覆諸鄤敗諸邱輿皇戍如楚獻捷鄭公子去疾帥師伐許晋人歸公子榖臣于楚楚人歸知罃于晋左氏曰晉人歸楚公子榖臣與連尹襄老之尸于楚以求知罃於是荀首佐中軍矣故楚人許之楚子送知罃曰子歸何以報我對曰以君之靈纍臣得歸骨於晋寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也楚子曰晋未可與爭重為之禮而歸之晉作六軍杜氏曰僭王也鄭伐許陳氏曰狄鄭也楚之霸鄭為之也由齊桓以來爭鄭於楚桓公卒鄭始朝楚諸夏之變於夷鄭為亂階也至辰陵鄭帥諸夏而事楚矣敗晋于邲盟十四國之君大夫於蜀皆鄭為之是故狄秦而後狄鄭微秦鄭中國無左衽矣履祥按鄭之可狄久矣獨於是年貶貶必於甚者是歲也覆諸夏之師於鄤敗之於丘輿獻諸夏之俘于楚再動干戈於許於是狄之以為鄭之惡甚矣而明年襄公死襄公於是終於為狄矣二十年鄭襄公卒子費嗣是為悼公鄭伯伐許燕宣公卒昭公立二十有一年梁山崩王崩子夷踐位晉侯齊侯宋公魯侯衛侯鄭伯曹伯邾子杞伯同盟于蟲牢左氏曰往年鄭公孫申疆許田許人敗諸展陂鄭伯伐許晋欒書荀首救許伐鄭楚子反救鄭鄭伯與許男訟焉子反曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成許靈公訴鄭伯于楚鄭悼公如楚訟不勝楚人執皇戍及子國鄭伯歸使公子偃請成于晋秋鄭伯及晋趙同盟于垂棘冬同盟于蟲牢鄭服也宋公辭以難吳子去齊卒子乘嗣是為壽夢史記世家曰太伯作吳傳弟仲雍卒子季簡立歷叔逹周章熊遂柯相疆鳩夷餘橋疑吾柯盧周繇屈羽夷吾禽處轉頗髙句卑去齊壽夢凡十九世吳始益大稱王御批資治通鑑綱目前編卷十三
