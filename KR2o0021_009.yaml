body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷九己丑周昭王元年二年子滿生周內史過曰昔昭王娶於房曰房后實有爽德協于丹朱丹朱馮身以儀之生穆王焉按此說左氏不載别見國語事頗誣怪以儀禮黃氏傳取之今附其略十有四年魯侯弟沸弒其君幽公而自立是為魏公世家曰幽公十四年弟沸殺幽公而自立是為魏公世本作微公履祥按弒君爭國之禍自是始而昭王不能討失政甚矣史稱昭王之時王道微缺朱子亦謂周綱陵夷自昭王始有以也夫庚戌二十有二年釋氏生周書記異曰周昭王二十二年釋氏生甲子三十有六年五十有一年王崩于漢子滿踐位史記曰昭王之時王道微缺昭王南巡狩不返卒於江上其卒不赴告諱之也立昭王子滿是為穆王外紀曰昭王南巡狩反濟漢漢濵之人以膠船進王至中流膠液船解王及祭公溺焉大紀曰王在位久不能强於政治風化稍衰有光五色貫紫微井水溢是歲王征荆蠻軍旋涉漢梁敗王及祭公隕于漢王右辛餘靡振王北濟反振祭公王因是發疾崩朱子曰涇舟膠楚澤周綱已陵夷庚辰穆王元年三年命君牙為大司徒伯冏為太僕正大紀係之三年若史記則冏命是其初即位之年書君牙篇曰王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常古文尚書作君雅周禮司勳曰凡有功者銘書于王之太常司常云日月為常惟子小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾涉于春氷蹈虎尾恐噬涉春冰恐陷穆王初即政憂危求助之切如此今命爾豫翼作股肱心膂纘乃舊服無忝祖考膂吕通脊也穆王資世職之臣處腹心之寄舊服即謂篤忠服勞之事吕氏曰穆王方自憂危懼不克承故亦勉君牙無忝祖考各欲保其世業語益親切臣主蓋一體也𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中蔡氏曰𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長幼之序朋友之信是也典以設教言故曰𢎞敷則以民彛言故曰式和此司徒之教也然教之本則在君牙之身正也中也民則之體而人所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也愚謂五典之教司徒之常職然上之人無躬行心得之實則民不從其令而從其意矣此所以貴於爾身之正爾心之中也夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧祁大也夏而暑雨小民有暴身沾體之勞冬而大寒小民有裂靣龜手之勞故怨咨蓋自傷其衣食之艱難也厥惟艱哉嘆小民之誠為艱難也思小民之為艱難而為圖其易則小民乃安矣夫艱者饑寒之艱易者衣食之易古者司徒之職雖云掌教然土地人民之數制其田里教之樹畜辨其土宜以相民宅而知其利害以阜人民蕃鳥獸育草木凡養民之利無一不掌蓋教養並行未嘗有無養而教者也故穆王念小民之艱而以圖易為君牙告皆其職也嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人丕大也謨訓功烈文顯於前武承於後曰謨曰烈各指其盛言之文武以謨啓以烈佑我後人者無一事不出於正文武之道可謂大備但人亡政息爾惟敬明乃訓奉若文武之道答揚其光命則足以追配爾祖父所以事先王者矣然則思艱圖易不必他圖有文武之道與前人之法在王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂先正即乃祖乃父也君牙由祖父舊典而法之民之治亂在此而已法之則治否則亂惟循爾祖父之攸行則足以昭其君於有乂謂法之即治也蔡氏曰按此篇專以君牙祖父為言然則君牙之祖父嘗任司徒之職而其賢可知矣惜載籍之無傳也陳氏曰成康之時芮伯為司徒君牙豈其後耶冏命篇曰冏古文作臩史記同王若曰伯冏惟豫弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆思免厥愆此穆王知自克之難欲寡其過篇中此意為多昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾繆格其非心俾克紹先烈承上文欲免厥愆因言文武之聖猶有資於小大之臣故穆王自謂無良不可不賴前後左右有位之士以免己於愆而昭文武之烈今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮慎簡乃僚無以巧言令色便辟側媚其惟吉士此承上文以文武之聖亦有賴於僕從之承弼此所以命伯冏為太僕之正以正羣僕侍御上修主德下簡近僚逺小人用君子以弼后德而逺於愆也僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣此承上文以明得失之機穆王蓋深知僕御之邪正乃君德所係甚重非輕僕臣諛則后自聖自聖則愎諫妄作而天下之亂自是生矣吕氏曰陪僕􅉏御之臣後世視為賤品而不擇曽不知人主朝夕與居氣體移養常必由之濳消默奪於冥冥之中而明爭顯諫於昭昭之際抑末矣又曰僕臣諛厥后自聖自古小人之敗君德為昏為虐為侈為縱曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虛美熏心傲然自聖則謂人莫已若而欲豫言莫之違然後法家拂士日逺而快意肆情之事亦莫或齟齬其間自聖之證既見而百疾從之昏虐縱侈皆其枝葉不足論也爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟豫汝辜此皆其導君於愆者或以淫巧進或以賄進此近習小人進身之徑伯冏所當戒此二者吕氏曰自盤庚總于貨寶之戒至此篇乃復見之成湯文武之隆未間數數以貨飭其臣也意其商周之衰乎王曰嗚呼欽哉永弼乃后于彞憲此終篇首免愆之意而欲躋之於文武之道史記曰穆王即位春秋已五十矣王道衰微穆王閔文武之道缺乃命伯臩申誡太僕國之政作臩命復寧吕氏曰穆王之書存者三篇君牙冏命初年之書也吕刑末年之書也百年耄荒度作刑以詰四方固有明文君牙之篇曰惟豫小子嗣守文武成康遺緒冏命之篇曰惟豫弗克于德嗣先人宅丕后則皆初嗣歷服之言也與吕刑所謂仲叔季弟幼子童孫其辭氣新陳稚耄大有徑庭先後之次蓋無可疑者穆王中雖放逸不克保其始之祗畏然暮年哀敬初心復還謂之全德則駁猶不失為周之令王也又曰穆王之命望於伯冏者深且長矣此心不繼造父為御周逰天下將必有車轍馬迹導其侈者果出於僕御之間抑不知伯冏猶在職乎否也穆王豫知所戒憂思深長猶不免躬自蹈之人心操舍之無常可懼哉履祥按君牙之書穆王初年方新之書也冏命之書穆王中年自克之書也穆王初年承昭王南征不復之後憂危恐陷故資世家喬木之臣處股肱心膂之寄以行文武之政自稱曰豫小子曰嗣守遺緒皆初年語也至其中年境順心移雖其所為未必皆如列子及穆天子傳所載然楚右尹子革之言曰穆王欲肆其心周行天下將必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲沒于祗宫則穆王亦不能無逰逸之過特能聞善言而自克耳冏命之篇曰思免厥愆曰豫一人無良曰匡其不及曰繩愆紏繆格其非心則皆欲寡其過之辭又周禮太僕之官下大夫耳或曰大正正于羣僕侍御之臣此太御也太御亦中大夫耳何至特作命書申戒明切若便辟若側媚若諛若迪上非典此蓋穆王深悔造父八駿之御知導君於侈者皆僕御之微故重其選而戒其弊哀痛真切然則冏命之書真中年自悔之書也其在祈招之後乎若如史記所言冏命作於初年如此諄切而中年周逰自放乃如此躬言之而躬自蹈之尚安取冏命之書乎然則是篇當受之祈招之後史失其年姑以類附於君牙而述其所見如此以待後之君子冇考焉十有三年王西征紀年曰穆王十三年西征于青鳥之所憩山海經曰三危之山青鳥居之十有七年王西征征徐戎紀年曰穆王十七年西征見西王母賔于昭宫列子曰周穆王時西極之國有化人來入水火貫金石反山川移城邑千變萬化不可窮極既已變物之形又且易人之慮非實能變物之形能使人目眩心忘耳浮屠善幻多技蓋西域人自有此術穆王敬之若神居亡幾何謁王同游化人之宫王以為清都紫微鈞天廣樂帝之所居自以居數十年不思其國也化人復謁王同游所及之處仰不見日月俯不見河海光影所照王目眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還化人移之王若隕虛焉既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲扶貴反王問所從來左右曰王默存耳由此穆王自失者三月而復更問化人化人曰吾與王神游也形奚動哉且曩之所居奚異王之宫曩之所游奚異王之圃王間􅀈疑暫亡變化之極徐疾之間可盡模哉化人之術能使人心迷賈耳觀穆王所感與化人所言固自可見但穆王欲心內昏所主不存遂為所迷爾此肆心周游之病根也王大悅不恤國事不樂臣妾肆意逺遊命駕八駿之乘右服􅢒古華字騮而左緑耳右驂赤驥而左白􅠋古義字主車則造父為御離􅀢音泰丙字林􅀢作西為右次車之乘右服渠黃而左踰輪左驂盜驪而右山子柏夭主車參伯為御奔戎為右馳驅千里至于巨搜氏之國巨搜即禹貢渠搜巨搜氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足湩竹用反及二乘之人已飲而行遂宿于崑崙之阿赤水之陽别日升崑崙之丘以觀黃帝之宫而封之以詒後世遂賓于西王母觴于瑶池之上西王母為王謡曰白雲在天山陵自出道里悠逺山川間之將子無死尚能復來王和之曰豫歸東土和合諸夏萬民均平吾顧見汝比及三年將復而野其辭哀焉乃觀日之所入行萬里王乃嘆曰於乎豫一人不盈于德而諧於樂後世其追數吾過乎乃還以歸已上與穆天子傳略同列子多寓言而穆天子傳又多附會難信今以其末有自悔之辭姑存之以備考論史記曰蜚亷有子曰季勝季勝生孟增幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周繆王得驥溫驪驊騮騄耳之駟西巡狩樂而忘歸徐偃王作亂造父為御長驅歸周以救亂繆王以趙城封造父造父族由此為趙氏昌黎韓氏曰周穆王無道意不在天下好方士說得八龍騎之西遊同王母宴于瑶池之上歌謳忘歸四方諸侯之爭辨者無所質正咸賓祭於徐贄玉帛死生之物于徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍鬬其民走彭城武原山百姓隨而從之萬有餘家徐偃王事見史記後漢書博物志元和姓纂今止取昌黎所叙為稍詳密朱子曰不有祈招詩徐方御宸極履祥按穆王巡遊之事經史不載獨左氏有欲肆其心周行天下將皆必有車轍馬迹之說史記秦紀亦言其略惟列子過有形容而雜書頗有附㑹若穆天子傳之類是也漢武帝巡狩神仙之事史遷所叙亦備矣後世猶有謗書之說謂或過其實也而漢武遺事所載又過之果有如遺事所載史記豈反隱而不書乎是知此書好事者文其誕無疑也然則穆天子傳亦此類耳周制死而諡而傳為穆王之名曰穆滿則其他謬附從可知矣今考左氏所載右尹所言曰欲肆其心曰將必有轍迹焉欲與將皆欲然之辭而卒能聽祈招之詩以自克則穆王雖不無巡狩之過而未必皆如雜書所言也然則穆王雖不得為周之賢王亦不失為世之英主諸老謂論穆王者當以尚書為正此說得之三十有五年征犬戎大紀係此年周語曰穆王將征犬戎注曰犬戎西戎之别名在荒服祭公謀父諫曰不可祭畿內之國周公之後為王卿士謀父字也先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之先王之於民也懋正其德而厚其性阜其財求而利其器用明利害之鄉以文修之使務利而避害懷德而畏威故能保世以滋大昔我先世后稷以服事虞夏及夏之衰也棄稷弗務謂太康廢稷之官不復務農我先王不窋用失其官而自竄于戎翟之間堯封棄於邰至不窋失官去夏而遷於邠邠西接戎北近翟不敢怠業時序其德纂修其緒修其訓典朝夕恪勤守以敦篤奉以忠信奕世載德不忝前人至于武王昭前之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民辛紂名庶民弗忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制邦內甸服夏曰甸周曰畿此云甸服者古今通稱也故周襄王亦曰規方千里以為甸服邦外侯服侯衛賓服自侯服至衛服皆賓服於王者夷蠻要服戎翟荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王祭祀享貢王皆朝貢之名王則世一見者是所謂終王也日祭在甸服者供貢無時或時日貢之月祀時享歲貢終王先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修德序成而不至則修刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則增修於德無勤民於逺是以近無不聽逺無不服今自大畢伯仕之終也大畢伯仕犬戎之二君犬戎氏以其職來王天子曰豫必以不享征之且觀之兵犬戎於俗為荒服而於鎬京為近荒服者王今穆王以地近責其享其無乃廢先王之訓而王幾頓乎吾聞夫犬戎樹惇能帥舊德而守終純固其有以禦我矣王不聽遂征之得四白狼四白鹿以歸自是荒服者不至甲子四十有五年五十年作吕刑以詰四方吕刑篇曰惟吕命吕國名書傳多作甫刑蓋吕國其後為甫猶邾之為鄒也惟吕命與惟說命同文蓋穆王命吕侯為大司寇重修刑法更為五罰之制謂之吕刑至是頒之天下而申之誥命焉史記亦曰甫侯言於王作修刑辟蓋周制五刑凡二千五百未冇五刑之贖而此增至三千又為五罰皆吕侯所參定也王享國百年耄荒度作刑以詰四方穆王年五十即位至是百歲八十九十曰耄今百歲謂之耄荒蓋老而荒亂之謂穆王在位日久亦嘗肆遊觀之欲雖有善政而㢮張不常晚年不無荒廢故審度作刑以詰四方之為姦慝暴亂者王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍蚩尤炎帝之末榆罔之世霸諸侯者自洪荒以來風俗渾朴而蚩尤始為暴亂之事民俗因以敗壞奪人之寇殺人之賊鴟張為義亂外之姦亂內之宄奪攘之風於是皆有之矯者正也䖍者劉也此上下或有缺文謂聖人始制為刑以矯正䖍劉之蓋黃帝既制兵以殺蚩尤又制刑以矯正䖍劉其遺類也漢書武帝紀嬌䖍吏因藝以侵暴嬌音矯文意與下文同苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵㭬黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下苗民堯時諸侯因上古聖人有矯䖍之刑於是作五虐之刑以殺戮無辜又淫為劓刵㭬黥凡麗于刑制者更不差等其獄辭之曲直而例加之於是民更相漸于昏亂之習無復忠信互相詛盟矣詛者背相祝盟者靣質神此皆刑政不平曲直不明之故也凡苗民虐威所加衆庶被戮之人所在告無辜于上上帝降監下民罔有馨香之德但有淫虐發聞之腥穢堯舜於是哀矜衆庶被戮之非辜既是五刑報苗民君臣之虐以示其威用遏絶苖民使之不得繼世於下國言竄于三危也皇帝謂堯竄苖之事蓋堯老舜攝之時墨子曰昔者聖王制為五刑以治天下逮至有苗之制五刑以亂天下則此豈刑不善哉用刑之不善也是以先王之書以刑之道曰苖民否用諫折則刑唯作五殺之刑曰法此言善用刑者以治民不善用刑者以為五殺乃命重黎絶地天通罔有降格重黎即羲和也吕氏曰治世公道昭明為善得福為惡得禍民曉然知其所由不求之茫昧之間三苖昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地神人之典雜揉瀆亂此妖誕之所以興人心之所以不正也聖人當務之急莫先於正人心首命重黎修明祀典髙卑上下各有分限絶地天之通嚴幽明之分妖誕之說悉皆屏息楚語曰少皥氏之衰也九黎亂德民神雜揉夫人作享家為巫史無有要質蒸享無度民神同位民瀆齊盟無有嚴威顓頊受之乃命南正重司天以屬神命北正黎司地以屬民使復舊常無相侵瀆是謂絶地天通其後三苖復九黎之德堯復育重黎之後不忘舊者使復典之愚謂自蚩尤為亂而民有寇攘姦宄之習聖人是以有矯䖍之刑自三苗以刑為虐而民有巫祝詛盟之習聖人是以有重黎之命前後聖人其為民心計可謂至矣大指己見虞書之紀羣后之逮在下明明棐常鰥寡無蓋正人心固重黎之職然非二臣所能獨為亦惟羣后及在下有司各昭明政化有此非常之明雖鰥寡之情無不上逹蓋巫祝之興始於政化不明下情不得以上逹故爾皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民士制百姓于刑之中以教祗德穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彞承上文而言清問下民而民皆言有苗之暴虐與其風聲氣習之為害於是以德為威而人心知所畏以德明民而人心知所向先命三后以為教養之具此德明惟明之事也而復命士師以刑法之防此德威惟畏之事也聖人制刑之本如此伯夷降下典禮以示天下天神地祗人鬼既各有正禮然出禮則入刑降典所以折其民之入刑者而回入於禮也禹平水土以安民生為山川立主祭之典以正民心蓋既絶地天通於是修山川之正祀又各使有土之君主之不至於瀆稷降播種之法使農殖嘉榖蓋前此民猶雜食草木之實自稷教民稼穡而民始皆殖嘉榖矣三后成功民俗殷盛而後命臯陶為士師制百姓以刑法之中不偏於輕以惠姦不過於重以虐民立為中典亦所以使民祗敬為德而已蓋其君臣之間和敬示德於上而精明承德於下躬行心得其表裏政令皆可為民之法灼于四方人心觀感罔不惟德之勉而後明刑法之中治其民之非彝者而已蓋教養如此而猶或有非彞者然後刑之也又按虞書命臯陶之辭曰蠻夷猾夏而禹亦曰何遷乎有苗觀此篇所述則三苖之威焰氣習其始為天下之害可知蓋自上古之世風氣醇朴蚩尤始為亂而民始有為惡之習聖人始制刑以矯之其後有苖既為五虐之刑以殘其民其民又為詛盟之習以瀆其神於是暴虐妖誕二者威𦦨氣習得入中夏聖人始命重黎以止妖誕繼命羣后以通下情又命伯夷以降典禮命伯禹以安民生正祀典命后稷以豐民財而復命臯陶定為至中不偏之刑自是後世之言刑者自臯陶始傳所謂臯陶之刑也蓋以其為不偏不易之法也又按此篇始述有苖之刑以為暴虐之戒繼述聖人之刑以為後世之凖蓋聖人所以制刑者教養之具無一不至然後立刑以制之而刑法之中亦無非教此蓋發明聖人立刑之本末而後世遂謂臯陶不與三后之列為聖人吝於刑官失其指矣典獄非訖于威惟訖于富敬忌罔冇擇言在身惟克天德自作元命配享在下訖絶惟與忌畏也謂當時為典獄之官者非但絶于威勢之請託與絶于貨賄之賂遺而已且能以敬自將以理自畏其身無可擇之言上體天德所以能自作元命而上對于天享祀無窮于下蓋獄者民之司命天之所託生殺豫奪上與天對又臯陶明刑之功享有國土宗祀不絶而當時為典獄者亦必祀于理官蓋古者有道德者死則以為樂祖祭于瞽宗法家亦然至後漢時繫獄者猶祭臯陶此其證也或曰此章穆王蓋以勉其典獄之臣絶私懋德上配臯陶耳亦通王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苖民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苖苖民無辭于罰乃絶厥世此章總上章以唐虞之典刑為監以苖民之用刑為懲四方司政典獄孔氏謂即諸侯也此章詞語自相問答以發其意謂為司政典獄者豈非爾諸侯為天牧民者乎此欲諸侯以刑獄為重責也今爾何所觀法豈非伯夷所布典刑之道乎此謂典禮為刑之道蓋憲章無二出禮則入刑也其今爾何所懲戒豈非苗民所受妄刑之罰乎蓋苖民不察獄辭之所麗何刑又不擇吉人以審刑法之中正一為威勢之狥奪於貨賄之貪又以私意斷制五刑亂及無辜之人故上帝不蠲貸其罪苖民亦不得以自逭其罰遂至於絶世此用刑不當之禍所當懲也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永此下告諸侯也格如來格之格庶幾其能入吾教命之內也日勤孔氏作曰後儒見下文一日非終之說又讀為日蓋言日則勤在其中矣言勤不必言日也聽察審訊以求其情莫煩於獄一或不勤則職有不盡而民有不得其死者矣此章專告貴戚之臣憂其或怠故專以勤為主爾所以無不自慰者曰勤而已蓋其情得其事集而其職盡也爾罔或徒知戒而不勤蓋既任其職孰不知重其事然憚於勞而不勤則刑罰不中雖戒之或無及也蔡氏謂戒亦善心也而用刑豈可以或戒也哉此謂刑罰已施雖悔無及也蓋天以刑整齊其民既俾我君臣為之一日之間不能終其事與能終其事此其責在人矣爾尚敬謹以上順天命承我一人雖獄事情辭之煩可畏也勿以為畏惟勤而已雖得情聽斷之餘可休也勿以為休亦惟勤而已能謹審五刑之用則刑故無小所以成其剛德罪疑惟輕所以成其柔德刑罰得中所以成其正直之德則君慶於上民賴於下家國安寧之福久而不替矣此皆勤恤之效也王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及刑者不祥之器謂之祥刑者則以其為弼教之良法而用刑者又以慈祥之心行之也及者連及也何所當擇豈非司獄之人乎何所當謹豈非用刑之際乎何所當審豈非連及之人乎當及而及所以證獄不當及而及則連逮無辜矣兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之周禮以兩造聽民訟兩造謂兩爭者皆至也具備者詞證皆在也師衆也謂羣有司也五辭麗于五刑之獄辭也簡者核其實孚者無所疑也正猶漢書所謂當也五罰即五贖也獄辭核實無疑者則當於五刑於五刑而不應其實者五刑之疑者也則當于五罰以贖之當于五罰而不服者則五罰之疑者也故又當于五過以宥之然五過之法公也其為之病者則私也私者或以權勢或以報私或以婚姻女謁或以貨賄交通或以求千請託為是五者而廢法以出人之罪則治獄者與之同罪矣其審克之總結上文審者盡其心克者盡其力也五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威此承上文五刑不簡正于五罰此五刑之疑有赦也五罰不服正于五過此五罰之疑有赦也其審克之重言以丁寧之也簡孚有衆即師聽五辭之謂也惟貌有稽此簡孚之術也小司寇所謂色聽氣聽耳聽日聽者也至於不經衆人之簡核則上之人不可以聽斷所以求詳致嚴如此者蓋獄乃天討所係天威甚近而可畏其可有一毫不盡其心乎墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百此五罰之數也罰以黃鐡即今銅也六兩曰鍰一說每鍰六兩三分兩之二則一鍰半斤也倍一百曰二百倍二百而又差為五百辟疑赦之則從罰罰亦閲實其罪當於罰則罰之下文罰懲非死人極于病即此意也按舜典五刑有流而無贖正義謂古者五刑有降而無贖鞭作官刑撲作教刑又小於此則金作贖刑若今罰直耳穆王始制為五刑之贖蓋以贖代流也其弊便富而虐貧富者可贖貧者難免雖穆王申有司獄貨之戒其實開國家貨獄之塗蓋其弊必至于此然贖因於疑而穆王於贖之中又閲實其罪猶恐誤罰罰或不實其罪則正於五過矣其慈祥之意可見且罰猶不茍則刑必不茍矣又按周禮五辟之屬皆五百而此墨劓之屬各千宫減於舊二百大辟減於舊二百輕刑雖增而重刑則減矣然則穆王非獨制為贖刑之法又制為輕刑之法矣五刑之屬三千上下比罪無僣亂辭勿用不行惟察惟法其審克之上刑適輕下服下刑適重上服此言用五刑之宜也以情辭之上下比附其罪不可差亂其獄辭而妄為升降又不可引用久不行之法蓋古今更定不同舊有是條久已不用民不知而犯之既犯而復引用焉是陷民也察者審於心法者當其刑又云其審克之以致丁寧之意罪在上刑而情適輕則服下刑此減等也罪在下刑而情適重則服上刑此加罪也此又用刑之權宜也輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要此又論五罰之權而總言刑罰謂非獨五刑有上服下服至於輕重其五罰之用則亦有權焉蓋亦權其情而為之輕重也然刑與罰又有視世變而為輕重者如周禮刑新國用輕典刑平國用中典刑亂國用重典是也大抵情法時世參差不齊權所以齊之則各有條理各冇典要焉此用權合經之謂也罰懲非死人極于病此承上文論罰而言也穆王恐有司以論贖為輕而不加審故又云五罰所贖其懲人者雖非五刑軀命所關然民重出贖亦甚病矣非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑此申明折獄之方所以審刑罰之宜者佞辨給也不可以辨給之辭折獄惟當以慈良之心折獄從猶今律言承也察辭于差此古今聽獄之要訣也凡辭之非實者終必有差故察獄辭者必於其差而察之則囚之不承者承矣然既得其情則當以哀矜之心敬謹之意折之明啓刑書與羣有司共占視之則庶幾得其中正矣其當入于刑者其當降而罰者其詳審而盡心力焉獄之成既得其實然後可輸其實於上而上其斷獄之書者又當備述其情辭有兩述之人各有所犯則并兩刑而上之不可以輕重勝負而有所偏也王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尢永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下承上文折獄之說又總告之也官獄官伯諸侯族同姓姓異姓也單辭無證之偏辭也兩辭兩造之辭也家如不家於喪之家謂私財也府藏也辜功罪狀也猶釋氏云罪業也穆王享國之久老於世故晚復哀矜故其言多懼欲人知所重而聽之也朕敬于刑謹之至也惟有德者則可以用刑蓋天相佑下民立典獄之官以治之為民司命上與天配單辭者無證之辭人所難决者也惟有德者其心明且清則能得單辭之實兩辭者兩證之辭雖人所易决而一有偏狥之心則偏矣惟有德者其心中而不偏則能聽兩辭之獄然兩辭之易偏者亦或賄賂蔽之故戒之無或私取貨于獄之兩辭因獄取貨此貨非寶適以藏諸罪狀耳報應之理衆罪悉至則一時之得有永久可畏之罰是非天偏治鬻獄之人亦惟人自致其禍罰之命使天罰不至則獄吏皆得以行其私庶民無復被令政之澤于天下矣此申戒以警之也王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極成中有慶受王嘉師監于兹祥刑此總上文詔後世也嗣孫凡官伯族姓嗣世子孫也屬如屬有疆場之事之屬適也謂適或有時而用之也五極五刑也五刑者刑之極者也嘉師良民之衆也言繼世子孫自今以往何所監視豈非以德為民所取中乎此為要語不可不明聽之大抵賢哲用刑自有無窮之譽雖適有時而用極法然既合中正之理則亦有餘慶矣蓋世人每言寬刑有隂德之報而不知雖用大刑而合於中正亦有餘慶之報也故穆王明此以勉之受王良民之衆其監此慈祥之刑夫民本皆良民或因物有遷雖不免設刑以防之然無非慈祥之意則亦無非良善之法不可以忿疾之心行之也吕氏曰世衰則情僞繁人老則經歷熟穆王之時文武成康之澤浸微姦宄日勝其作書於既耄閲世故而察物情者亦熟矣故古今犴獄言之略盡用刑者所宜盡心焉又曰是書哀矜明練固夫子存以示後世而微見其意者亦不可不察也履祥按吕刑之書穆王晚年之書也自昭王南征不復周綱陵夷穆王在位日久中更荒廢雖能自克然風俗日陵情僞日繁逮至晚年命吕侯為大司寇重修刑法史謂甫侯言於王而修之也故曰吕刑至是作為誥命頒之天下大抵增墨劓之條以盡天下之惡而减宫刑大辟之條以逭犯死之衆既制五罰以贖五刑之疑又制五過以寬五罰之疑刑繁而輕此皆衰世之意也傳曰夏之衰也作禹刑商之衰也作湯刑今吕刑之作可以知世變矣然穆王老於世故備知獄事曲折之詳其哀矜惻怛之意敬審忠厚之風尚可法也子王子曰吕刑之書律書也法吏之辭也徒能精察乎典獄之姦而不識聖人制刑之本意首以五刑創于有苖而聖人用是報之遂為常法則是聖人之制刑反師有苖之為虐也斯言也豈不大害於義哉豫固知其為法吏之辭也舜之刑未嘗不輕而輕者本於罪之可疑穆王之刑亦未嘗不輕而輕者本於罪之不可宥舜之所以必刑者期於無刑穆王之所以必贖者導其起辟且大辟之刑而可贖則凡有千鍰之資者無所往而不可殺人矣烏得而不啓後世之亂哉但其盡折獄之情僞曲折而哀矜惻怛之意猶有三代之遺風焉聖人以其世之變法之變存之於書亦以其能精察乎典獄之姦尚可以為後世聽訟用刑之戒非以其贖刑之可取也五十有五年王崩于祗宫子繄扈踐位楚右尹子革曰昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王以是獲沒於祗宫其詩曰祈招之愔愔式昭德音思我王度式如玉式如金刑民之力而無醉飽之心杜氏曰祈父周司馬招其名蓋指司馬以諷王也陸氏曰招常遙反刑左氏作形家語作刑朱子謂當作刑招當如徴招角招之招詩歌之名也逸周書曰穆王思保位為難恐貽世羞欲自警寤作史記史記維正月王在成周昧爽召三公左史戎夫曰今朕寤遂事驚豫乃取遂事之要戒俾戎夫言之朔望以聞信不行義不立則哲士陵君政禁而生亂皮氏以亡古諸侯也愚謂後漢之亡其證亦然諂諛日近方正日逺則邪人專國政禁而生亂華氏以亡好貨財珍怪則邪人因財而進邪人因財而進則賢良日蔽而逺賞罰無位隨財而行夏后以亡嚴兵而不仁者其臣懾其臣懾而不敢忠不敢忠則民不親其吏刑始於親逺者寒心殷商以亡樂專於君者權專於臣權專於臣則刑專於民君娛於樂臣爭於權民盡於刑有虞氏以亡商均之後也奉孤以專丁命者謀主必畏其威而疑其前事謀主謂孤長大也前事謂專命者挾德而責數日疏位均而爭平林以亡挾其見奉之德而責其前專命之事此與成王周公反矣位均勢敵也大臣有錮職譁誅者危昔者質沙三卿朝而無禮君怒而久拘之譁而弗加諸卿謀變質沙以亡錮職專權也外內相間下撓其民民無所附三苖以亡弱小在强大之間存亡將由之則無天命矣不知命者死無天命命在强壯者也不知命則足以亡也有夏之方興也扈氏弱而不恭身死國亡嬖子兩重者亡昔義渠氏有兩子異母皆重君病大臣分黨而爭義渠以亡功大不賞者危昔平州之功大而不賞諂臣日賞貴功日怒而生變平州之君以走出召逺不親者危昔有林氏召離戎之君而朝之至而不禮留而弗親離戎逃而去之林氏誅之天下叛林氏昔者曲集之君伐智而專事强力而下賤其臣賢良皆伏愈州氏伐之君孤而無使曲集以亡昔者有巢氏有亂臣而貴任之以國假之以權擅國而主斷君已而奪之臣怒而生變有巢以亡斧小不勝柯者亡昔有鄶之君嗇儉減爵損祿羣臣卑讓上下不臨後君少弱禁罰不行重氏伐之鄶君以亡久空重位者危昔有共工自賢自以無臣久空大官下官交亂民無所附唐氏伐之共工以亡犯難爭攘疑者死昔有林氏上衡氏爭權爭為犯難不果為疑林氏再戰弗勝上衡氏僞義弗剋俱身死國亡知能均而不親並重事君者危昔有南氏有二臣貴寵力鈞勢敵競進爭權下爭朋黨君弗禁南氏以分昔有果氏好以新易故故者疾怨新故不和內爭朋黨隂事外權有果氏以亡爵重祿輕比己不成據注疑作取民自成者亡昔有畢程氏損祿增爵羣臣貌匱比而戾民畢程氏以亡有位無祿取民自成民不堪豫求尤而罪之好變故易常者亡昔陽氏之君自伐而好變事無故業官無定位民運於下運亂移也陽氏以亡業刑而愎者危昔穀平之君愎類無親破國弗剋業刑用國愎狠也類戾也國勝破以刑為業也外國相援榖平以亡武不止者亡昔阪泉氏用兵無已誅戰不休并兼無親文無所立智士寒心徙居至于獨鹿諸侯叛之阪泉以亡佷而無親者亡昔者縣宗之君佷而無聽不納忠言執事不從宗職者疑發大事羣臣解體國無立功縣宗以亡昔者𤣥都賢鬼道廢人事天謀臣不用龜䇿是從神巫用國哲士在外𤣥都以亡文武不行者亡昔西夏性仁非兵城郭不修武士無位惠而好賞屈而無以賞唐氏伐之城郭不守武士不用西夏以亡美女破國昔者續陽强力四征重丘遺之美女續陽之君悅之熒惑不治大臣爭權逺近不相聽國分為二宫室破國昔者有洛氏宫室無常池囿廣大工巧日進以後更前民不得休農失其時飢饉無食成湯伐之有洛以亡此篇諸本不一今以蜀本刋定以存遺事附本紀之後乙亥共王元年三年國語曰共王遊於涇上密康公從有三女奔之其母曰必致之於王夫獸三為羣人三為衆女三為粲王田不取羣公行不下衆王御不參一族夫粲美之物也衆以美物歸女而何德以堪之王猶不堪况爾小醜乎小醜備物終必亡康公不獻一年王滅密十有二年王崩子囏踐位丁亥懿王元年徙都槐里大紀曰自王為政王室始衰徙都槐里二十有五年王崩共王之弟辟方立史記曰懿王之時王室遂衰詩人作刺按詩之時世多不可考其時王風未作變小雅多有刺詩而莫知其時世衛氏詩序皆以為刺幽王太史公多見古書殆必有考胡氏大紀以齊哀公之立當在懿王之世而以詩序刺哀公之詩𨽻之然不可考矣壬子孝王元年甲子十有三年封非子為附庸邑之秦用大紀例以甲子為紀今附此年此周太史儋所謂始周與秦合者也史儋又曰合而别後五百歲復合按别者謂周東遷復合者謂秦並周也史記曰惡來革者蜚亷子也有子曰女防女防生旁臯旁臯生太凡太凡生大駱大駱生非子以造父之寵皆蒙趙城為氏非子居犬丘好馬善養息之犬丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言孝王曰昔我先驪山之女為戎胥軒妻生中潏中衍𤣥孫也在西戎保西垂生蜚亷蜚亷生惡來以親故歸周保西垂西垂以其故和睦今我復與大駱妻生適子成申駱重昏西戎皆服所以為王王其圖之於是孝王曰昔柏翳為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎十有五年王崩諸侯復立懿王太子夑大紀曰孝王之世大雹江漢氷牛馬死丁卯夷王元年始下堂而見諸侯大紀附元年禮記曰覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也自夷王以下經世曰國自此衰按史記懿王崩共王弟辟方立是為孝王孝王崩諸侯復立懿王太子燮是為夷王然則夷王本未必立而立於諸侯之手故為是加禮於諸侯下堂而見之又其時王室浸衰自是永為例矣八年楚子熊渠伐庸揚粵至于鄂大紀係此年楚世家曰周文王之時祝融之孫季連苖裔曰鬻熊事文王今書有鬻熊子載其事疑僞書其子熊麗生熊狂狂生熊繹熊繹當周成王時舉文武勤勞之後嗣而封熊繹於楚蠻封以子男之田姓芈氏居丹陽徐廣曰在南郡枝江楚子熊繹與魯公伯禽衛康叔子牟晉侯燮齊太公子吕伋俱事成王左傳俱服事康王熊繹生熊艾艾生熊䵣䵣生熊勝勝以弟揚為後熊揚生熊渠渠生子三人當周夷王之時王室微諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸揚粵至于鄂熊渠曰我蠻夷也不與中國之號諡乃立其長子康為句亶王張晏曰今江陵中子紅為鄂王九州記曰今武昌少子執疵為越章王皆在江上楚蠻之地十有六年王崩子胡踐位左氏曰至于夷王王愆于厥躬諸侯莫不並走其望以祈王身史記齊世家曰太公卒子丁公伋立丁公卒子乙公得立乙公卒子癸公慈母立癸公卒子哀公不辰立哀公時紀侯讚之周周烹哀公而立其弟靜是為胡公胡公徙都薄姑癸未厲王元年楚世家曰周厲王暴虐熊渠畏其伐楚亦去其王終前夷王八年楚事十有二年衛貞伯薨子嗣是為頃侯世家曰衛康叔卒子康伯立即左傳所稱王孫牟父是也康伯卒子考伯立考伯卒子嗣伯立嗣伯卒子康伯立康伯卒子靖伯立靖伯卒子貞伯立貞伯卒子頃侯立頃侯厚賂周夷王夷王命衛為侯按史記自頃侯始有年以年表考之當係此年非夷王之世古史曰按書康叔稱衛侯又曰孟侯蓋以侯為方伯故其子孫六世稱伯猶詩以召公為召伯而非伯爵也至頃侯蓋不復為方伯故但以爵稱非以賂故得侯也十有四年曹孝伯薨子喜嗣是為夷伯世家曰曹叔振鐸卒子太伯脾立太伯卒子仲君平立仲君平卒子宫伯侯立宫伯侯卒子孝伯雲立孝伯卒子夷伯喜立十有五年燕惠侯立世家曰燕自召公已下九世至惠侯蔡厲侯薨子嗣是為武侯世家曰蔡仲卒子蔡伯荒立蔡伯卒子宫侯立宫侯卒子厲侯立厲侯卒子武侯立十有九年齊公子山弒其君胡公而自立是為獻公世家曰哀公之同母少弟山怨胡公乃與其黨率營丘人襲攻殺胡公而自立是為獻公按史記獻公立在夷王之時以年表考之當係此年二十年齊侯徙治臨菑世家曰獻公元年盡逐胡公子因徙治臨菑宋厲公薨子舉嗣是為僖公史記凡僖字皆作釐世家曰微子卒立其弟衍是為微仲禮記曰微子舍其孫腯而立衍微仲卒子宋公稽立宋公卒子丁公申立丁公卒子湣公共立湣公卒弟煬公熙立湣公子鮒祀弒煬公而自立是為厲公厲公卒子釐公舉立晉厲侯薨子宜臼嗣是為靖侯世家曰唐叔子燮是為晉侯正義曰唐叔之子燮父徙居晉水傍改曰晉侯晉侯子寧族是為武侯武侯之子服人是為成侯成侯子福是為厲侯厲侯之子宜臼是為靖侯二十有一年秦嬴卒子秦侯嗣二十有四年陳慎公薨子寧嗣是為幽公世家曰胡公卒子申公犀侯立申公卒弟相公臯羊立相公卒立申公子突是為孝公孝公卒子慎公圉戎立慎公卒子幽公寧立衛頃侯薨子嗣是為僖侯二十有八年齊獻公薨子夀嗣是為武公三十年以榮公為卿用事國語曰厲王說榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉胡可專也所怨甚多而不避大難以是教王王能久乎夫王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來也故頌曰思文后稷克配彼天立我蒸民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至于今今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗既而榮公為卿士諸侯不享史記曰厲王即位三十年好利近榮夷公芮良夫諫不聽卒以榮公為卿士用事墨子曰厲王染於􅀈公長父榮夷終三十有一年秦侯卒子公伯嗣楚熊延卒子熊勇嗣世家曰熊渠長子母康早死熊渠卒中子熊摯紅立其弟熊延弒而代立三十有三年殺言者國語曰厲王虐大紀有曰時荆楚寇於南玁狁寇於北淮夷寇於東命虢公征之不克徴斂數起虐用其民民不堪命聚議而興謗召公告曰民不堪命矣王怒得衛巫使監謗者以告則殺之史記又曰其謗鮮矣諸侯不朝三十四年王益嚴國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川决之使導為民者宣之使言故天子聽政使公卿至于列士獻詩瞽獻典史獻書師針􅕓賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以阜財用衣食者也夫民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何王弗聽於是國人莫敢出言三年乃流王于彘三十有四年秦公伯卒子仲嗣三十冇六年西戎反滅犬丘大駱之族史記曰秦仲立三年周厲王無道諸侯或叛之西戎反王室滅犬丘大駱之族三十有七年國人叛襲王王出居于彘召公周公行政是為共和太子靖匿于召公之家本紀曰國莫敢出言三年乃相與畔襲厲王王出奔於彘厲王太子靖匿召公之家國人聞之乃圍之召公曰昔吾驟諫王王不從以及此難也今殺王太子王其以我為讎而懟怒乎夫事君者險而不懟怒而不怨况事王乎乃以其子代王太子國語大同小異太子竟得脫召公周公二相行政號曰共和按莊子竹書紀年及稽古録皆作共伯和莊子司馬注其事尤詳云其伯名和修其行好賢人諸侯皆以為賢周厲王之難天子曠絶諸侯皆請以為天子共伯不聽即于王位十四年大旱屋焚卜于太陽兆曰厲王為崇召公乃立宣王共伯復歸于宗逍遙得意共山之首共丘山今在河內共縣西魯連子云共伯後歸于國得意共山之首紀年云共伯和即于王位孟康注古今人表謂入為三公按此事經傳皆不言及今從史記庚申三十有八年共和行政史記自是事始有年稽古録稱共和九年晉靖侯薨子司徒嗣是為僖侯四十有一年蔡武侯薨子嗣是為夷侯楚熊勇卒弟熊嚴立甲子四十有二年王在彘四十有四年曹夷伯薨弟彊立是為幽伯四十有七年陳幽公薨子孝嗣是為僖公四十有八年宋僖公薨子覸嗣是為惠公五十有一年王死于彘周召二伯立太子靖左氏曰至于厲王王心厲虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官本紀曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周履祥按周自夷王王政不綱厲王初立諸侯畏之荆楚自去王號三十年間天下無他故其後好利用榮夷公又以監謗而殺言者雖芮良夫召穆公交有陳諫又皆有大雅之刺以感王心而皆不聽卒以流亡身死於彘彘在河汾之間詩所謂汾王是也嗜好用舍之間可不謹諸賴諸大臣彌縫其間王室不墜卒立宣王相之粲然復興蓋其時周室尚可振也至幽王再禍而宗周為墟訖不復振悲夫楚熊嚴卒子熊霜嗣甲戌宣王元年以秦仲為大夫誅西戎以尹吉甫為將北伐玁狁至于太原秦紀曰周宣王即位徐廣曰秦仲之十八年乃以秦仲為大夫誅西戎小雅六月之詩曰六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國集傳曰六月癸未之月也棲棲猶皇皇不安之貌騤騤强貌常服戎事之常服以韎韋為辨又以為衣而素裳白舄也玁狁即北狄也司馬法冬夏不興師今六月出師者以玁狁甚熾其事危急不得已而王命於是出征以正王國也比物四驪間之維則維此六月既成我服我服既成于三十里王于出征以佐天子集傳曰比物齊其力也凡大事毛馬而頒之軍事物馬而頒之毛馬齊其色物馬齊其力也三十里一舍也師行日三十里既比其物而曰四驪則其色又齊可以見馬之有餘矣間習之而皆中法則又可以見教之有素矣於是此月之中既成我服即日引道不徐不疾盡舍而止又見其應變之速從事之敏而不失其常度王命於此而出征欲其有以敵王所愾而佐天子耳四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國集傳曰顒大貌奏薦膚大公功嚴威翼敬也共與供同言將帥皆嚴敬以共武事也玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啓行集傳曰茹度整齊也焦穫鎬方皆地名焦未詳所在穫郭璞以為瓠中則今在耀州三原縣也鎬劉向以為千里之鎬則非鎬京之鎬矣亦未詳所在方疑即朔方涇陽涇水之北在豐鎬之西北言其深入為寇織幟字同鳥章鳥隼之章白斾繼旐者也央央鮮明貌戎戎車軍之前鋒啓開行道猶言發程也言玁狁不自度量深入為寇如此是以建此旌旗選鋒鋭進聲其罪而致討馬直而壯律而臧有所不戰戰必勝矣戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至于太原文武吉甫萬邦為憲集傳曰輊車之覆而前軒車之却而後凡車從後視之如輊從前視之如軒然後適調也佶壯健貌太原地名亦曰大鹵今在太原府陽曲縣至于太原言逐出之而已不窮追也先王治戎狄之法如此吉甫尹吉甫此時大將也非文無以附衆非武無以威敵能文能武則萬邦以之為法也吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友集傳曰御進侯維也張仲吉甫之友也此言吉甫燕飲喜樂多受福祉蓋以其歸自鎬而行永久也是以飲酒進饌於朋友而孝友之張仲在焉言其所與燕者之賢所以賢吉甫而善是燕也朱子曰成康既沒周室寢衰八世而厲王胡暴虐周人逐之出居于彘玁狁內侵逼近京邑王崩子宣王靖即位命尹吉甫帥師伐之有功而歸詩人作歌以叙其事燕惠侯薨子莊嗣是為僖侯二年以方叔為將南征荆蠻采芑之詩曰薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟笰魚服鉤膺鞗革集傳曰芑即今苦菜軍行采之人馬皆可食田一歲曰菑二歲曰新田三歲曰畬方叔宣王卿士受命為將者其車三千法當用三十萬衆蓋兵車一乘甲士三人步卒七十二人又二十五人將重車在後凡百人也此極其盛而言未必實有此數也師衆干扞試肄習也言衆且練也率總率之也翼翼順序貌奭赤貌簟笰以方文竹簟為車蔽也魚獸名似猪東海有之其皮可為弓鞬矢服鉤膺馬婁頷有鉤而在膺有樊有纓樊馬大帶纓鞅也鞗轡也革轡首也馬轡所把之外有餘而垂者也宣王之時蠻荆背叛王命方叔南征軍行采芑而食故賦其事以起興曰薄言采芑則于彼新田于此菑畝矣方叔涖止則其車三千師干之試矣又遂言其車馬之美以見軍容之盛薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩集傳曰中鄉民居其田尤治約束軝轂也以皮纒束兵車之轂而朱之也錯文也鈴在鑣曰鸞馬口兩旁各一四馬故八也瑲瑲聲也命服天子所命之服朱芾黃朱之芾皇猶煌煌瑲玉聲葱蒼色如葱珩佩首橫玉禮三命赤芾葱珩􅀈彼飛隼其飛戾天亦集爰止方叔涖止其車三千師千之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐集傳曰􅀈疾飛貌隼鷂屬急疾之鳥鉦鐃也鐲也伐擊也鉦以靜之鼓以動之鉦鼓各有人而言鉦人伐鼓互文也􅕦告也二千五百人為師五百人為旅此言將戰陳其師旅而誓告之陳師告旅亦互文淵淵鼓聲平和不暴怒也謂戰時進士衆也振止旅衆也言戰罷而止其衆以入也闐闐亦鼓聲或曰盛貌程子曰振旅亦以鼓行金止言隼飛戾天而亦集於所止以興師旅之盛而進退有節如下文所云蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威集傳曰蠢動而無知之貌蠻荆荆州之蠻大邦猶言中國元大猶謀也言方叔雖老而謀則壯也嘽嘽衆也焞焞盛也霆疾雷也方叔蓋嘗與於北伐之功者是以蠻荆聞其名而皆來畏服也命召虎征淮夷大雅江漢之詩曰江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪集傳曰宣王命召穆公平淮南之夷詩人美之浮浮水盛貌滔滔順流貌淮夷夷在淮上者鋪陳也陳師以伐之此章總叙其事言行者莫敢安徐而曰吾之來也惟淮夷是求是伐耳江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧集傳曰洸洸武貌庶幸也此章言既伐而成功江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海集傳曰虎召穆公名也辟與闢同徹井其田也疚病棘急也極中之表也居中而為四方所取正也言江漢既平王又命召公闢四方之侵地而治其疆界非病之非急之但使其來取正於王國而已於是遂疆理之盡南海而止也王命召虎來旬來宣文武受命召公維翰無曰豫小子召公是似肇敏戎公用錫爾祉集傳曰句遍宣布也自江漢之滸言之故曰來召公召康公奭也翰幹也豫小子王自稱肇開戎女公功也又言王命召虎來此江漢之滸遍治其事以布王命而曰昔文武受命惟召公為楨幹今女無曰以豫小子之故也但自為嗣女召公之事耳能開敏女功則我當錫女以祉福如下章所云也釐爾圭瓉秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年集傳曰釐賜卣尊也文人先祖之有文德者謂文王也周岐周也召祖穆公之祖康公也此叙王錫召公䇿命之詞言錫爾圭瓉秬鬯者使之以祀其先祖又告于文人而錫之山川土田以廣其封邑蓋古者爵人必於祖廟示不敢專也又使往受命於岐周從其祖康公受命於文王之所以寵異之而召公拜稽首以受王命之䇿書也人臣受恩無可以報謝但言使君夀考而已虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文德洽此四國集傳曰穆公既受賜遂答稱天子之美命作康公之廟器而勒王䇿命之詞以考其成且祝天子以萬夀也既又美其君之令聞而進之以不已勸其君以文德而不欲其極意於武功古人愛君之心於此可見矣王伐淮徐大雅常武之詩曰赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國集傳曰宣王自將以伐淮北之夷詩人美之卿士即皇父之官南仲周大將大祖始祖也大師皇父之兼官我宣王自我戎兵器也王命卿士之謂南仲為大祖兼大師而字皇父者整治其從行之六軍修其戎事以除淮夷之亂而惠此南方之國必言南仲大祖稱其世功以美大之王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒集傳曰尹氏吉甫也蓋為內史掌䇿命卿大夫也程伯休父周大夫三事未詳或曰三農之事也言王詔尹氏䇿命程伯休父為司馬使之左右陳其行列循淮浦而省徐州之土蓋伐淮北徐州之夷也上章既命皇父而此章又命程伯休父蓋王親命大師以三公治其軍事而使內史命司馬以六卿副之耳赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚集傳曰赫赫顯也業業大也嚴威也天子自將其威可畏王舒保作未詳其義或曰舒徐保安作行也言王師舒徐而安行也紹紏緊也遊遨遊繹連絡騷擾動也夷厲以來周室衰弱至是而天子自將以征不庭其師始出不疾不遲而徐方之人皆已震動如雷霆作於其上不遑安矣王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所集傳曰進鼓而進之也闞奮怒之貌虓虎之自怒也鋪布也布其師旅也敦厚也厚集其陳也仍就也老子曰攘臂而仍之截截然不可犯之貌王旅嘽嘽如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國集傳曰嘽嘽衆盛貌翰羽苞本也如飛如翰疾也如江如漢衆也如山不可動也如川不可禦也綿綿不可絶也翼翼不可亂也不測不可知也不克不可勝也濯大也王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸集傳曰猶道庭朝回違還歸班師而歸也前篇召公帥師以出歸告成功故備載其褒賞之詞此篇王實親行故於卒章反復其辭以歸功於天子言王道甚大而逺方懷之非獨兵威然也序所謂因以為戒者是也魯真公薨弟敖立是為武公世家曰魏公沸卒子厲公擢立厲公卒弟獻公具立獻公卒子真公濞立曹公子蘇弒其君幽伯而自立是為戴伯三年齊武公薨子無忌嗣是為厲公五年晉僖侯薨子籍嗣是為獻侯六年大旱大紀連年書旱大雅雲漢之詩曰倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽集傳曰舊說以為宣王承厲王之烈內有撥亂之志遇烖而懼側身修行欲消去之天下喜於王化復行百姓見憂故仍叔作此詩以美之雲漢天河也昭光回轉也言其光隨天而轉也薦荐通重也靡神不舉所謂國有凶荒則索鬼神而祭之也圭璧禮神之玉卒盡也寧猶何也言雲漢者夜晴則天河明故述王仰訴於天之詞如此旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬集傳曰藴蓄隆盛蟲蟲熱氣也郊祀天地宫宗廟也上祭天下祭地奠其禮瘞其物宗尊也克勝也言后稷欲救此旱災而不能勝也稷以親言帝以尊言丁當也何以當我之身而有是災也或曰與其耗斁下土寧使災害當我身也亦通旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧集傳曰推去也兢兢恐也業業危也如霆如雷畏之甚也孑無右臂貌言大亂之後周之餘民無復有半身之遺者而上天又降旱災使我亦不見遺也摧滅也言先祖之祀將自此而滅也旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍豫集傳曰沮止也無所無所容也大命近止死將至也瞻仰顧望也羣公先正月令所謂雩祀百辟卿士之有益於民者以祈穀實者也於羣公先正但言其不見助至父母先祖則以恩望之矣所謂垂涕泣而道之也旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遁集傳曰滌滌言山無木川無水如滌而除之也遁逃也言天又不肯使我得逃遁而去也旱既大甚黽勉畏去胡寧癲我以旱􅉃不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒集傳曰黽勉畏去出無所之也癲病􅉃曾也祈年孟春祈穀于上帝孟冬祈來年于天宗是也方祭四方也社祭土神也虞度也言天曾不度我之心如我之敬事明神宜可以無恨怒也旱既大甚散無友紀鞫哉庶正疚哉冡宰趣馬師氏膳夫左右靡人不周無不能止瞻印昊天云如何里集傳曰友紀猶言綱紀或曰友疑作有庶正衆官之長冡宰又衆長之長也趣馬掌馬之官師氏掌以兵守王門者膳夫掌食之官歲凶年穀不登則趣馬不秣師氏弛其兵馳道不除祭事不縣膳夫徹膳左右布而不修大夫不食梁士飲酒不樂周救也無不能止言諸臣無有一人不周救百姓者無有自言不能而遂止不為也里憂也與漢書無俚之俚同聊賴之意瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷惠其寧集傳曰久旱而仰天以望雨則有嘒然之明星未有雨徴也然羣臣竭其精誠而助王以昭假于天者已無餘矣雖今死亡將近然不可以棄其前功當益求所以昭假者而修之固非求為我之一身而已乃所以定衆正也於是語終又仰天而訴之曰果何時而惠我以安寧乎張子曰不敢斥言雨者畏懼之甚且不敢必云爾秦仲伐西戎死之王命其子莊伐戎破之秦紀曰西戎殺秦仲秦仲立二十三年死於戎有子五人其長者曰莊公周宣王乃召莊公昆弟五人與兵七千使伐西戎破之於是復豫秦仲後及其先大駱地犬丘并有之為西垂大夫莊公居其故西犬丘秦國風無衣之詩曰豈曰無衣與子同袍王于興師修我戈矛與子同仇集傳曰袍襺也戈長六尺六寸矛長二丈王于興師以天子之命而興師也秦人相謂曰豈以子之無衣而與子同袍乎蓋以王于興師則將修我戈矛而與子同仇也秦人之俗大抵尚氣槩先勇力忘生輕死故見於詩如此豈曰無衣與子同澤王于興師修我矛㦸與子偕作集傳曰澤裏衣也以其親膚近於垢澤故謂之澤㦸車㦸也長丈六尺豈曰無衣與子同裳王于興師修我甲兵與子偕行楚熊霜卒弟熊狥立世家曰楚熊霜元年周宣王初立卒三弟爭立仲雪死叔堪亡避難於濮而少弟季狥立是為熊狥十有二年魯侯來朝以其子括與戲見王王以戲為魯太子魯武公薨戲立是為懿公王不籍千畝史記曰十二年魯武公來朝宣王不修籍於千畝國語曰魯武公以括與戲見王王立戲史記曰武公九年與長子括少子戲西朝周宣王宣王愛戲欲立戲為太子樊仲山甫諫曰不可立也不順必犯犯王命必誅故出令不可不順也令之不行政之不立行而不順民將棄上夫下事上少事長所以為順也今天子立諸侯而建其少是教逆也若魯從之而諸侯效之王命將有所壅若不從而誅之是自誅王命也是事也誅亦失不誅亦失天子其圖之王卒立之又曰宣王不籍千畝虢文公諫曰不可夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎純固於是乎成是故稷為大官古者大史順時瓜見土陽疸丁佐反墳盈土氣震發農祥晨正日月底于天廟韋昭曰農祥房星也立春之日晨中於午農事之候故曰農祥天廟營室也孟春日月㑹于營室土乃脉發先時九日太史告稷曰自今至于初吉陽氣俱蒸土膏其動弗震弗渝脉其滿眚榖乃不殖稷以告王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民司空除壇于籍命農大夫咸戒農用先時五日瞽告有協風至王即齊宫百官御事各即其齊三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從及籍后稷監之膳夫農正陳籍禮大史贊王王敬從之王耕一墢鉢伐二音班三之庶人終于千畒其后稷省功大史監之司徒省民大師監之畢宰夫陳饗膳宰監之膳夫贊王王歆大牢班嘗之庶人終食是日也瞽帥音官以省風土廩于籍東南鍾而藏之而時布之于農稷則遍誡百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司寇乃命其旅日狥農師一之農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大狥耨穫亦如之民用莫不震動恪恭于農修其疆畔日服其鎛不解于時財用不乏民用和同是時也王事惟農是務無有求利於其官以于農功三時務農而一時講武故征則有威守則有財若是則能媚於神而和於民矣則享祀時至而布施優裕也今天子欲修先王之緒而棄其大功匱神之祀而困民之財將何以求福用民王弗聽齊胡公子弒厲公齊人誅之而立厲公之子赤是為文公誅弒君者七十人世家曰厲公暴虐故胡公子復入齊齊人欲立之乃與攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君是為文公而誅殺厲公者七十人十有五年衛釐侯薨少子和嗣是為武公世家曰釐侯卒太子共伯餘立共伯弟和有寵於釐侯多豫之賂和以其賂賂士攻共伯於墓上共伯入釐侯羡自殺衛人因葬之釐侯旁諡曰共伯而立和為衛侯是為武公武公修康叔之政百姓和集稽古録曰衛僖侯薨大子共伯早死立其弟和詩序曰柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之詩曰泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只集傳曰髧髮垂貌兩髦剪髮夾胸子事父母之飾親死然後去之蓋指共伯也我共姜自我也儀匹也言柏舟則在彼中河兩髦則實我之匹雖至於死誓無它心母之於我覆育之恩如天罔極而何其不諒我之心乎不及父者疑獨母在或非父意耳泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只古史曰武公賢者衛人謂之睿聖武公奪適之事未可遽以誣之且詩序言共伯蚤死初無篡奪之文故史遷所載疑而不録子王子曰武公少年奪適之罪晚年進修之功功罪自不相掩然武公少時必有俊邁之姿鍾愛於其父好施養士士以是置共伯於死以成武公之立則或有之為法受惡武公不能無罪其後共姜堅自誓之操武公亦有修革之學復康叔之政輸定難之忠晚年所至稱為睿聖是真有不可及者君子尚論固難以老少相掩也十有六年晉獻侯薨子費生嗣徙都于絳是為穆侯史記凡穆字或作繆十有八年蔡夷侯薨子所事嗣是為僖侯二十有一年魯懿公兄括之子伯御弒其君懿公而自立二十有二年王后姜氏諫王外紀係此年列女傳曰周宣姜后賢而有德事非禮不言行非禮不動宣王嘗早臥而晏起后夫人不出於房姜后既出乃脫簮珥待罪於永巷使其傅母通言於王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而忘德也夫茍樂色必好奢好奢必窮樂窮樂者亂之所興也原亂之興從婢子起婢子生亂當服其辜敢請婢子之罪唯君王之命王曰寡人不德實自生過過從寡人起非夫人之罪也遂復姜后而勤於政事早朝晏退繼文武之迹興周室之業卒成中興之功為周世宗封弟友于鄭鄭本西周畿內采邑其後東徙國于鄶虢之間為鄭又其遺民南保漢中者為南鄭史記世家曰鄭桓公友者周厲王少子而宣王庶弟也年表云母弟宣王立二十二年友初封于鄭二十有三年晉侯伐條生太子仇二十有四年齊文公薨子說嗣是為成公二十有六年晉師戰于千畒生子成師左氏曰晉穆侯之夫人姜氏以條之役生大子命之曰仇其弟以千畒之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣兄其替乎愚按師服初意蓋防奪嫡之漸耳仇即文侯異日受平王秬鬯圭瓉之命兄固未遽替也其後曲沃之封在昭侯之世師服之言防微慮漸始切事實而曲沃終至奪宗故後人服其先見並記其初命名之言云二十有七年宋惠公薨子嗣是為哀公二十有八年宋哀公薨子嗣是為戴公楚熊狥卒子熊咢嗣三十有二年春王伐魯誅伯御立懿公之弟稱是為孝公國語曰三十二年春宣王伐魯立孝公諸侯從是而不睦又曰宣王欲得國子之能導訓諸侯者賈逵注國子諸侯之嗣子韋昭曰國子謂同姓諸姬也導訓諸侯謂為州伯樊穆仲曰魯侯孝穆仲仲山父之諡王曰何以知之對曰肅恭明神而敬事耉老賦事行刑必問於遺訓而咨於故實不干所問不犯所咨王曰然則能訓治其民矣乃命魯孝公於夷宫祖夷王廟也世家曰宣王伐魯殺伯御問魯公子能導訓諸侯者以為魯後樊穆仲曰魯懿公弟稱云云語同國語宣王曰然能訓治其民矣乃立稱於夷宫二出大同小異世家似得之陳僖公薨子靈嗣是為武公曹戴伯薨子兕嗣是為惠伯三十有三年齊成公薨子贖嗣是為莊公三十有七年燕僖侯薨子嗣是為頃侯楚熊咢卒子熊儀嗣是為若敖三十有九年伐姜戎王師敗績于千畒國語與不籍千畒同事非也不籍千畒天子之籍田也此千畒地名也四十年料民于太原國語曰宣王既喪南國之師注謂即姜戎唐固曰南陽也乃料民于太原太原即今原州仲山甫諫曰民不可料也夫古者不料民而知其少多司民協孤終協考比也孤幼也終死也司商協民姓今五音姓氏是也古者置官别生分類官謂之司商者沈括曰商者人聲也故以律協民姓者名焉司徒協旅協民衆為師旅司寇協姦考比罪𨽻刑死之類牧協職物色之數工協革牛馬羊之皮革場協入知粟數廩協出知日數是則少多死生出入往來者皆可知也於是又審之以事事即下文籍田搜狩簡知其數王治農于籍摉于農隙耨穫亦于籍獮于既蒸狩于畢時是皆習民數者也又何料焉不為其少而大料之是示少而惡事也臨政示少諸侯避之治民惡事無以賦令且無故而料民天之所惡也害於政而妨於後嗣王卒料之及幽王乃滅四十有三年殺杜伯周春秋曰宣王殺杜伯而不辜後三年宣王㑹諸侯田于囿日中杜伯起於道左衣朱衣朱冠操朱弓朱矢射王中心折脊而死此說似怪見國語注大紀取之傳注曰杜伯為宣王大夫宣王殺之其子隰叔奔晉晉穆侯薨弟殤叔自立太子仇出奔四十有六年王崩太子涅踐位稽古録曰宣王能慎微接下用賢使能羣臣無不自盡以奉其上內修政事外攘夷狄復文武之竟土周室中興焉履祥按周自厲王亂政日久紀綱板蕩宣王初年有志撥亂董生謂其周道粲然復興然考之諸書似不克終者如廢魯適不籍千畒喪師南國料民太原殺杜伯而非其罪大略可見其後幽王繼之不踰十年而君弒國亡卒以東遷夫撥亂世反之正非百倍其功不足以興廢補弊況宣王末政止於如此哉傳謂夷厲宣幽而貪天禍不為無謂矣庚申幽王元年晉太子仇襲殺殤叔而立是為文公陳武公薨子說嗣是為夷公三年始嬖褒姒涇渭洛竭岐山崩按國語以為幽王三年獨史記拘於國亡不過十年之說係之二年今據國語為正本紀曰初褒人有罪請入女子於王以贖罪是為褒姒幽王三年入後宫見而愛之生子伯服國語曰幽王三年西周三川皆震伯陽父曰唐固曰伯陽父周柱下史老子也周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川實震是陽失其所而鎮隂也韋氏曰鎮為隂所鎮營也陽失而在隂源必塞源塞國必亡夫水土演而民用足也土無所演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川源又塞塞必竭夫國必依山川山崩川竭亡之徴也川竭山必崩若國亡不過十年數之紀也夫天之所棄不過其紀是歲也三川竭岐山崩十一年幽王乃滅周乃東遷四年陳夷公薨弟燮立是為平公秦莊公卒子嗣是為襄公秦紀曰莊公之子世父曰戎殺我大父我非殺戎王則不敢入邑遂將擊戎讓其弟襄公襄公為太子莊公卒襄公立甲子五年廢申后及太子宜臼以褒姒為后伯服為太子史蘇曰周幽王伐有褒褒人以褒姒女焉褒姒有寵生伯服於是乎與虢石甫比逐太子宜臼而立伯服太子出奔申申人繒人召西戎以伐周周於是乎亡小雅白華之詩曰白華管兮白茅束兮之子之逺俾我獨兮集傳曰幽王娶申后又得褒姒而黜申后故申后作此詩白華野菅也已漚為管之子斥幽王俾使也我申后自我言白華為菅則白茅為束二物至微猶必相須為用何之子之逺而俾我獨耶英英白雲露彼菅茅天步艱難之子不猶集傳曰英英輕明貌白雲水土輕清之氣當夜而上騰者露即其散而下降者也步行也天步猶言時運猶圖也或曰猶如也言雲之澤物無微不被今時運艱難而之子不圖不如白雲之露菅茅也滮池北流浸彼稻田嘯歌傷懷念彼碩人集傳曰滮流貌北流豐鎬之間水多北流碩人尊大之稱亦謂幽王也言小水微流尚能浸灌王之尊大而反不能通其寵澤所以使我嘯歌傷懷而念之也樵彼桑薪卬烘于煁維彼碩人實勞我心集傳曰桑薪薪之善者也卬我烘燎也煁無釜之竈可燎而不可烹飪者也桑薪宜以烹飪而但為燎燭以比嫡后之尊而反見卑賤也鼓鐘于宫聲聞于外念子懆懆視我邁邁集傳曰懆懆憂貌邁邁不顧也鼓鐘于宫則聲聞于外矣念子懆懆而反視我邁邁何哉有鶖在梁有鶴在林維彼碩人實勞我心集傳曰鶖秃鶖梁魚梁蘇氏曰鶖鶴皆以魚為食然鶴之於鶖清濁則有間矣今鶖在梁而鶴在林鶖則飽而鶴則饑矣幽王進褒姒而黜申后譬之養鶖而棄鶴也鴛鴦在梁戢其左翼之子無良二三其德集傳曰戢其左翼言不失其常也二三其德則鴛鴦之不如矣有扁斯石履之卑兮之子之逺俾我疷兮集傳曰扁卑貌疷病也有扁然而卑之石則覆之者亦卑矣如妾之賤則寵之者亦賤矣是以之子之逺而俾我疷也小辨之詩曰辨彼鸒斯歸飛提提民莫不榖我獨于罹何辜于天我罪伊何心之憂矣云如之何集傳曰幽王太子宜臼被廢而作此詩辨飛拊翼貌鸒雅烏小而多羣江東呼為鴨烏斯語詞提提羣飛安閒貌言辨彼鸒斯則歸飛提提矣民莫不善而我獨于憂則鸒斯之不如也何辜于天我罪伊何者怨而慕也舜號泣于旻天曰父母之不我愛於我何哉蓋如此矣心之憂矣云如之何則知其無可奈何而安之之詞也踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永嘆維憂用老心之憂矣疢如疾首集傳曰踧踧平易也周道大道也鞠窮惄思搗舂也不脫衣冠而寐曰假寐疢猶疾也踧踧周道則將鞠為茂草矣我心憂傷則惄焉如搗矣精神憒毦至於假寐之中而不忌永嘆憂之之深是以未老而老也疢如疾首則又憂之甚矣維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在集傳曰桑梓五畒之宅樹之牆下以遺子孫給蠶食具器用者也瞻者尊而仰之依者親而倚之屬連也毛膚體之餘氣末屬也離麗也裏心腹也辰猶時也言桑梓父母所植尚且必加恭敬況父母至尊至親宜莫不瞻依也然父母之不我愛豈我不屬於父母之毛乎豈我不離于父母之裏乎無所歸咎則推之於天曰豈我生時不善哉何不祥至是也菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦渒渒譬彼舟流不知所届心之憂矣不遑假寐集傳曰菀茂盛貌蜩蟬也漼深貌渒渒衆也菀彼柳斯則鳴蜩嘒嘒矣有催者淵則萑葦渒渒矣今我獨見棄逐如舟之流于水中不知其何所至乎是以憂之之深昔猶假寐而今不暇也鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知集傳曰伎伎舒貌宜疾而舒留其羣也雊雉嗚壞傷病鹿斯之奔則足伎伎然雉之朝雊亦知求其妃匹今我獨見棄逐如傷病之木憔悴而無枝是以憂之而人莫之知也相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之集傳曰投奔行道墐埋也相彼被逐而投人之兔尚或有哀其窮而先脫之者道有死人尚或有衰其暴露而埋藏之者蓋皆有不忍之心焉今王信讒棄逐其子曾視投兔死人之不如則其秉心亦忍矣是以心憂而涕隕也君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪杝矣舍彼有罪子之他矣集傳曰酬報掎倚也以物倚其巔也杝隨其理也他加也言王惟讒是聽如受酬爵得即飲之曾不加惠愛舒緩而究察之夫茍舒緩而究察之則讒者之情得矣伐木者尚倚其巔析薪者尚隨其理皆不妄挫折之今乃舍彼有罪之譛人而加我以非其罪曾伐木析薪之不若也莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後集傳曰山極髙矣而或陟其巔泉極深矣而或入其底故君子不可易於其言恐耳屬于垣者有所觀望左右而生讒譛也王於是卒以褒姒為后伯服為太子故告之曰無逝我梁無發我笱我躬不閲遑恤我後也高子曰小辨小人之詩也孟子曰何以言之曰怨曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕六年十月辛卯朔日有食之小雅十月之交篇曰十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀集傳曰十月以夏正言之建亥之月也交日月交㑹謂晦朔之間也歷法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一歲而一周天月二十九日有竒而一周天又逐及於日而與之㑹一歲凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速高下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽微當食必食雖曰行有常度而實為非常之變矣蘇氏曰日食天變之大者也然正陽之月古尤忌之夏之四月為純陽故謂之正月十月純隂疑其無陽故謂之陽月純陽而食陽弱之甚也純隂而食隂壯之甚也微虧也彼月則宜有時而虧矣此日不宜虧而今亦虧是亂亡之兆也日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧集傳曰行道也凡日月之食皆有常度矣而以為不用其行者月不避日失其道也然其所以然者則以四國無政不用善人故也如此則日月之食皆非常矣而以月食為常日食為不臧者隂亢陽而不勝猶可言也隂勝陽而掩之不可言也故春秋日食必書而月食則無紀焉亦以此爾􅏎􅏎震電不寧不令百川沸騰山冡崒崩高岸為谷深谷為陵哀今之人胡憯莫懲集傳曰􅏎􅏎電光貌寧安徐也令善沸出騰乘也山頂曰冢崒崔嵬也高岸崩陷故為谷深谷填塞故為陵憯曾也言非但日食而已十月而雷電山崩水溢亦災異之甚者是宜恐懼修省改紀其政而幽王曾莫之懲也董子曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也皇父卿士番維司徒家伯冡宰仲允膳夫棸子內史蹶維趣馬楀維師氏豔妻煽方處集傳曰皇父家伯仲允皆字也番棸蹶楀皆氏也卿士六卿之外更為都官以總六官之事也或曰卿士蓋卿之士周禮太宰之屬有上中下士公羊所謂宰士左氏所謂周公以蔡仲為已卿士是也蓋以宰屬而兼總六官位卑而權重也司徒掌邦教冡宰掌邦治皆卿也膳夫上士掌王之飲食膳羞者也內史中大夫掌爵祿廢置殺生豫奪之法者也趣馬中士掌王馬之政者也師氏亦中大夫掌司朝得失之事者也美色曰豔豔妻即褒姒也煽熾也方處方居其所未變徙也言所以致變異者由小人用事於外而嬖妾蠱惑王心於內以為之主故也抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣集傳曰抑發語詞時農隙之時作動即就卒盡也汙停水萊草穢戕害也言皇父不自以為不時欲動我以徙而不與我謀乃遽徹我墻屋使我田不獲治卑者汙而髙者萊又曰非我戕汝乃下供上役之常禮耳皇父孔聖作都于向擇三有事亶侯多藏不憖遺一老俾守我王擇有車馬以居徂向集傳曰孔甚聖通明都大邑也周禮畿內大都方百里小都方五十里皆天子公卿所封向地名在東都畿內今孟州河陽縣是也三有事三卿也亶信侯維藏蓄也憖者心不欲而自强之詞有車馬者亦富民也徂往也言皇父自以為聖而作都則不求賢而但取富人以為卿又不自强留一人以衛天子但有車馬者則悉與俱往不忠於上而但知貪利以自私也黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂㳫背憎職競由人集傳曰囂衆多貌孽災害噂聚沓重復職主競力也言黽勉從皇父之役未嘗敢告勞也猶且無罪而遭讒然下民之孽非天之所為也噂噂沓沓多言以相說而背則相憎專力為北者皆由讒口之人耳悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢效我友自逸集傳曰悠悠憂也里居痗病羡餘逸樂徹均也當是之時天下病矣而獨憂我里之甚病且以為四方皆有餘而我獨憂衆人皆得逸豫而我獨勞者以皇父病之而被禍尤甚故也然此乃天命之不均吾豈敢不安於所遇而必效我友之自逸哉虞􅒠曰小雅十月之交日有食之在周幽王六年八年以鄭伯友為司徒鄭語曰桓公為司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯對曰王室將卑戎翟必昌不可逼也逼迫也當成周者南有荆蠻申吕應鄧陳蔡隨唐北有衛燕翟鮮虞潞洛泉徐蒲西有虞虢晉隗霍揚魏芮東有齊魯曹宋滕薛鄒莒是非王之支子母弟甥舅也則皆蠻荆戎翟之人也非親則頑不可入也其濟洛河潁之間乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險是皆有驕侈怠慢之心而加之以貪冒君若以周難之故寄拏與賄焉不敢不許周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克二邑鄢蔽補丹依歷華君之土也若前莘後河右洛左濟莘莘國也主芣騩而食溱洧芣騩山名修典刑以守之唯是可以少固公曰南方不可乎對曰夫荆子熊嚴生子四人伯霜仲雪叔熊季紃叔逃難於濮而蠻季紃是立薳氏將起之禍又不克是天啓之心也又甚聰明和協蓋其先王臣聞之天之所啓十世不替夫其子孫必光啓土不可逼也且重黎之後也夫黎為高辛氏火正以淳耀惇大天明地德光昭四海故命之曰祝融其功大矣夫成天地之大功者其子孫未嘗不章虞夏商周是也虞幕能聽協風以成樂物生者也幕舜之失所謂自幕至于瞽叟無違命者也韋說非夏禹能單平水土以品處庶類者也商契能和合五教以保于百姓者也周棄能播殖百穀疏以衣食民人者也其後皆為王公侯伯祝融亦能昭顯天地之光明以生柔嘉材者也其後八姓於周未有侯伯佐制物於前代者昆吾為夏伯矣大彭豕韋為商伯矣當周未有已姓昆吾蘇顧溫董董姓鬷夷豢龍則夏滅之矣彭姓彭祖豕韋諸稽則商滅之矣秃姓舟人則周滅之矣妘姓塢鄶路逼陽曹姓鄒莒皆為采衛或在王室或在夷翟莫之數也而又無令聞必不興矣斟姓無後融之興者其在芈姓乎芈姓䕫越不足命也蠻芉蠻矣惟荆實有昭德若周衰其必興矣姜嬴荆芈實與諸姬代相干也姜伯夷之後也嬴伯翳之後也伯夷能禮於神以佐堯者也伯翳能議百物以佐舜者也其後皆不失祀而未有興者周衰其將至矣公曰謝西之九州何如謝宣王之舅申伯之國今在南陽二千五百家為州對曰其民沓貪而忍不可因也惟謝郟之間其冡君侈驕其民怠沓其君而未及周德若更君而周訓之是易取也且可長用也公曰周其弊乎對曰殆於必弊者太誓曰民之所欲天必從之今王棄髙明昭顯而好讒慝暗昧惡角犀豐盈而近頑童窮固去和而取同夫和實生物同則不繼以它平它謂之和故能豐長而物生之若以同禆同盡乃棄矣故先王以土與金木水火雜以成百物是以和五味以調口剛四支以衛體和六律以聰耳正七體以役心平八索以成人建九紀以立純德七體七竅也八索八體應八卦九紀九臟也合十數以訓百體出千品具萬方計億事材兆物收經入行姟極故王者居九畡之田收經入以食兆民周訓而能用之和樂如一夫如是和之至也於是乎先王聘后於異姓求財於有方擇臣取諫工而講以多物務和同也聲一無聽物一無文味一無果物一不講講校也王將棄是類而與剸同天奪之明欲無弊得乎夫虢石父讒諂巧從之人也而立以為卿士與剸同也棄聘后而立內妾好窮固也固陋也侏儒戚施實御在側近頑童也周法不昭而婦言是行用讒慝也不建立卿士而妖試幸措行暗昧也是物也不可以久且宣王之時有童謡曰檿弧箕服實亡周國於是宣王聞之有夫婦鬻是器者王使執而戮之府之小妾生女而非王子也懼而棄之此人也收以奔褒此下有褒神化為二龍藏漦於櫝三代傳之厲王發之化為𤣥黿入于王府童妾遭之遂生褒姒之說怪誕不取褒姁有獄而以為入于王王遂置之而嬖是女也使至於為后而生伯服天之生此久矣其為毒也大矣將俟淫德而加之焉毒之猶臘者其殺也滋速申繒西戎方强王室方騷將以縱欲不亦難乎王欲殺太子以成伯服必求之申申人弗畀必伐之若伐申而繒與西戎㑹以伐周周不守矣繒與西戎方將德申申吕方强其隩愛太子亦必可知也王師若在其救之亦必然矣王心怒矣虢公從矣凡周存亡不三稔矣君若欲避其難速規所矣時至而求用恐無及也公曰若周衰諸姬其孰興對曰臣聞之武實昭文之功文之祚盡武其嗣乎武王之子應韓不在其在晉乎距險而鄰於小若加之以德可以大啓公曰姜嬴其孰興對曰夫國大而有德者近興秦仲齊侯姜嬴之雋也且大其將興乎公說乃東寄孥與賄虢鄶受之十邑皆有寄地幽王八年而桓公為司徒九年而王室始騷十一年而斃及平王末而秦晉齊楚代興秦景襄於是乎取周土晉文侯於是乎定天子齊莊僖於是乎小伯楚蚡冒於是乎始啓濮履祥按史伯之言該矣周之士大夫大率多賢能守其職自幽厲聽用小人雖有賢士大夫在於其職而無救於亡甚矣君心所係大也史伯之言紀録者亦或有所附㑹其論和同謂幽王不能用衆而外專於虢石父內專於褒姒也其勸鄭伯寄孥於鄶虢蓋隂為取國之計而史謂鄶虢叛鄭鄭武公伐滅之夫寄孥賄以誘之伺隙而取之是術也而史不悟何哉於是南北之形勢在鄭而鄭在春秋亦無世無晉楚之爭矣十有一年申侯與犬戎入寇戎弒王于驪山之下鄭伯友死之晉衛秦皆以兵來救平戎與鄭子掘突共立故太子宜臼史記曰褒姒不好笑幽王欲其笑萬方致之不笑幽王為熢燧大鼓有寇至則舉熢火諸侯悉至至而無寇褒姒乃大笑幽王說之為數舉燧火其後不信諸侯益亦不至幽王以虢石父為卿用事國人皆怨石父為人佞巧善諛好利王用之又廢申后去太子也申侯怒與繒西夷犬戎攻幽王幽王舉燧火兵莫至遂殺幽王驪山下虜褒姒盡取周賂而去於是諸侯乃即申侯而共立故太子宜臼是為平王以奉周祀鄭世家曰犬戎殺幽王於驪山下并殺桓公鄭人共立其子掘突是為武公衛世家曰衛武公四十二年犬戎殺周幽王武公將兵佐周平戎甚有功平王命武公為公秦紀曰周幽王用褒姒廢太子數欺諸侯諸侯叛之西戎犬戎與申侯伐周殺幽王而秦襄公將兵救周戰甚力有功履祥按史遷不考之於書故晉文侯仇之功不紀劉道原曰汲冡紀年幽王死申侯立平王於申虢公立王子余二王並立余為晉文侯所殺是為攜王與舊史不同辛未平王元年王東遷雒邑始命秦列為諸侯取岐豐之地命衛侯和為公錫命晉侯鄭伯東取鄶虢十邑國之左氏曰我周之東遷晉鄭焉依大紀謂鄭武公收其父散兵東迎平王于申史記年表曰平王元年東徙雒邑本紀曰平王立東遷于雒邑辟戎寇平王之時周室衰微諸侯强并弱齊楚秦晉始大政由方伯秦紀曰周辟犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐即有其地與誓封爵之襄公於是始國與諸侯通使聘享之禮經世曰平王錫晉文秦襄命秦分岐西晉分河內書文侯之命篇曰王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王德指行而言明指知而言一說謹德指行而言明德指知而言吕氏曰文武之精藴平王何足以知之其言乃若知本原者蓋生長保𫝊之間老師宿儒之傳尚無差也平王徒舉其語而不能察爾降是則異端並作言帝王者始支矣蔡氏曰同姓故稱父文侯名仇義和其字不名尊之也愚按晉侯初名仇師服以為異今曰義和或其後改之也父猶尚父之謂蓋尊之也亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位先正指文武之臣小大謀猷猶云文武之道大者小者肆遂懷安也言文武以大德受命亦惟先正之臣又能左右之昭事之凡小大謨烈皆遵守而不失遂使成康以下先王得安厥位嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆夀俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位造作愆譴殄絶純大伊誰也平王自言嗣位之初自造天之大譴言父死國敗由已致之惟資澤竭於下民故犬戎得以侵伐我國家之大此戎禍之由也適我執事之人無有耆夀俊傑之在職者而豫又無克亂之才惟曰諸侯之在我祖父列者其誰恤我乎嗚呼使有能致績於豫一人者則可以安吾位矣章內兩嗚呼大亂之餘不覺嘆傷之意也父義和汝克昭乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉乃祖唐叔也肇始刑法也謂文侯能昭光唐叔之功文武之道已墜而自文侯始能刑法之用㑹合諸侯立已以紹周之統使追孝於前文人汝多能修補扞衛我于艱危之交若汝文侯豫所深嘉蓋平王望諸侯而不至故深有感於文侯也當時秦鄭衛皆來救而此獨歸於晉曰用㑹紹乃辟必文侯首倡大義㑹合之也王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德秬黑黍鬯香草用黑黍為酒釀以香草卣中尊諸侯受錫命當告于祖廟故錫之弓矢乘馬皆所以賞之簡謂閲士恤謂愛民大紀曰賜以河內附庸晉於是始大蘇氏曰豫讀文侯篇知東周之不復興也宗周傾覆禍敗極矣平王宜若衛文公越句踐然今其書乃施施焉與平康之世無異春秋傳曰厲王之禍諸侯釋位以間王政宣王有志而後效官讀文侯之命知平王之無志也吕氏曰風氣之推移治道之開塞必於其㑹而觀之此篇作於東遷之初由此而上則為成康為文武由此而下則為春秋為戰國乃消長升降之交㑹也故法語舊典尚有一二未泯而陵遲傾墮之意亦已見於辭命之間矣平王東遷之初大讎未報王略未復正君臣坐薪嘗膽之時奔亡之餘僅得茍安乃君臣釋然自以為足曰父義和其歸視爾師寧爾邦兵已罷矣曰用賚爾秬鬯一卣彤盧弓一矢百馬四匹功已報矣曰父往哉柔逺能邇惠康小民無荒寧教之以平世之政軍旅不復講矣曰簡恤爾都用成爾顯德勉之以本邦之治王室無復事矣嗚呼周之君臣如此周其終於東乎履祥按東遷之君臣皆非有中興之才志平王頽墮前儒固論之矣當是時定難立君惟秦晉鄭衛四國耳秦襄公與西戎世為不共戴天之讎其勢亦不兩立其與戎力戰固亦為已不獨為王室也平王以岐豐之地豫之使之自取當時犬戎盤據岐豐之郊平王不得不以許秦秦亦不得不取之然西戎方熾父子力戰二十一年而始得之固不暇東略矣觀其臚於郊祀則無王之心固可見也周室都洛則晉居河北表裏山河是為屏輔文侯固忠賢然其前有殤叔之難其後有曲沃之封晉之始替實自是始平王所望於文侯者亦固不以興復期之則其委任可知矣平王申出鄭武公娶于申武公當桓公敗亡之時收合餘衆已不能全又散為南鄭而武公以婚姻之故迎王于申立之東取虢鄶以為已國此其志願已足矣獨衛武公之賢足以有為然觀平王戌申之志則其依鄭之心可推也想其柄任在於鄭武所以終平王之世鄭伯父子世於其職衛武雖賢其柄任未必在是況周自中葉以後其公卿之士大率可以守常而短於制變當是時厲幽再世失民而犬戎之禍又熾類非諸公所能獨辦自四國之外又未有至者或謂平王當時何不奉辭伐罪以討不至之國則王威可以振是不然當時周室之大患在犬戎而不在諸侯而召戎之大罪又在申侯而不在諸侯也制戎固不暇矣平王懷申侯全已之功又依鄭武申好之國捨申不伐則何以伐其餘諸侯而令之哉東遷君臣事勢如此此所以不復中興也秦祠上帝於西畤畤者峙土為髙也史記曰秦用駵駒黃牛羝羊各三祠上帝西畤年表曰立西畤祠白帝太史公曰余讀至犬戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僭端見矣禮曰天子祭天地諸侯祭其域內名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚於郊祀君子懼焉二年魯孝公薨子弗湟嗣是為惠公四年燕頃侯薨子嗣是為哀侯五年秦襄公伐戎至岐薨子嗣是為文公太宗時秦襄公冡壞得銅鼎狀方而四足鉻曰天王遷洛岐酆錫公秦之幽宫鼎藏於中宋戴公薨子司空嗣是為武公詩序曰自微子至于戴公其間禮樂廢壞有正考甫者得商頌十二篇於周之大師以那為首六年燕哀侯薨子鄭侯嗣七年楚若敖卒子熊坎嗣是為霄敖九年蔡僖侯薨子興嗣是為共侯秦東徙汧渭之㑹史記曰秦襄公十二年伐戎至岐卒生文公文公元年居西垂宫三年文公以兵七百人東獵四年至汧渭之㑹曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之占曰吉即營邑之十有一年蔡共侯薨子嗣是為戴侯曹惠伯薨子石甫嗣其弟武弒之而自立是為穆公十有三年衛武公薨子揚嗣是為莊公楚左史倚相曰昔衛武公年數九十有五矣猶針警于國曰自卿以下至于師長士茍在朝者無謂我老耄而舍我必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我在輿有旅賁之規位寧有官師之典倚几有誦訓之諌居寢有暬御之針臨事有瞽史之道宴居有師工之誦史不失書曚不失誦以訓御之於是乎作懿戒以自警也及其沒也謂之睿聖武公懿即今大雅抑詩也韋昭曰懿讀為抑侯包曰衛武公行年九十有五猶使人日誦是詩而不離於側董氏曰序說為刺厲王者誤矣楚霄敖卒子熊眴嗣是為蚡冒十有四年曹穆公薨子終生嗣是為桓公十有五年秦作鄜畤史記曰秦文公夢黃蛇自天下屬地其口止於鄜衍文公問史敦敦曰此上帝之徴君其祠之於是作鄜畤用三牲郊祭白帝焉十有六年陳平公薨子圉嗣是為文公十有八年秦初有史以紀事秦紀曰秦文公十三年初有史以紀事民多化者陳氏曰秦自秦仲至文公而后始有史僻逺晚興者也至於史法亦不盡循周制晉竹書曲沃莊伯十一年十一月則用夏正為歲首本注云莊伯之十一年十一月隱公之元年正月也見左傳後序而秦譜至宣公初志閏月又改厯矣二十有一年秦伯大敗戎師收岐西之地自岐以東歸于王本紀曰秦文公十六年以兵伐戎戎敗走於是文公收周餘民有之地至岐岐以東獻之周蔡戴侯薨子者父嗣是為宣侯二十有三年宋武公薨子力嗣是為宣公二十有五年晉文侯薨子伯嗣是為昭侯秦初有三族之罪二十有六年晉侯封其叔父成師于曲沃左氏曰晉始亂故封桓叔于曲沃靖侯之孫欒賓傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室注衆子也得立此官大夫冇二宗士有𨽻子弟今晉甸侯也而建國本既弱矣其能久乎詩揚之水篇曰揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人集傳曰晉昭侯封桓叔于曲沃其後沃盛强而晉微弱國人將叛而歸之椒聊篇曰椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且椒聊之實蕃衍盈掬彼其之子碩大且篤椒聊且逺條且陳與可曰椒指晉昭也彼其之子指曲沃也聊微略之語也謂椒之微小其蕃衍不過盈升而已而彼其之子則碩大無朋椒之聊小乎其能逺條乎以比晉昭之微弱而曲沃之碩大如此晉其能久逺乎序義失之陳文公薨子鮑嗣是為桓公二十有七年鄭武公薨子寤生嗣是為莊公二十有八年鄭伯封其弟段于京左氏曰初鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名寤生惡之愛段欲立之亟請於武公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之莊公初意本美然不能處之祭仲只論利害不明義理莊公因此乃有養成其惡之意三十年衛公子州吁阻兵左氏曰衛莊公娶于齊曰莊姜美而無子衛人所為賦碩人也戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也為父者本非欲納其子於邪為寵過而驕此子之所由邪也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣眕重也且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之母乃不可乎弗聽其子厚與州吁遊禁之不可桓公立乃老楚蚡冒卒弟熊通弒太子而自立是為武王世家曰蚡冒十七年卒弟熊通弒蚡冒子而代立是為楚武王其僭王在春秋之世語見世家三十有二年晉大臣潘父弒其君昭侯納曲沃成師不克國人立昭侯之子平是為孝侯潘父伏誅世家曰昭侯元年成師封曲沃號為桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大於本而得民心不亂何待至是晉大臣潘父弒其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻之桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父子平經世大紀皆作弟世家稽古録作子為是三十有六年衛莊公薨子完嗣是為桓公三十有八年衛州吁出奔世家曰桓公二年弟州吁驕奢桓公絀之州吁出奔四十年齊莊公薨子祿甫嗣是為僖公晉曲沃成師卒子鱓代是為曲沃莊伯四十有二年宋宣公薨舍其子與夷而立弟和是為穆公大紀附正考父三命事燕鄭侯薨子嗣是為穆侯四十有四年鄭叔段命西鄙北鄙二於己左氏曰大叔命西鄙北鄙二於己公子吕曰國不堪二君將若之何欲與大叔臣請事之弗與則請除之無生民心公曰無庸將自及四十有七年晉曲沃鱓入翼弒其君孝侯國人逐之立其君之子郤是為鄂侯四十有八年魯初請郊廟之禮孔子曰我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣外紀曰初魯惠公使宰讓請郊廟之禮於天子王使史角往魯公止之其後在魯路史曰劉原父謂使魯郊者必周而必非成王蓋平王以下固亦未之悉爾始魯惠公使宰讓請郊廟之禮於天子天子使角往止之其後在魯於是有墨翟之學魯之用郊正亦始於此矣夫惠公之止之則是周不與之矣不與而魯用郊自用之也昔者荆人請大號周人不許荆人稱之然則魯之郊禘可知矣惠公之請由平王世也陳氏曰諸侯之有郊禘東遷之僭禮也史曰秦襄始列於諸侯作西畤祠白帝僭端見矣位在藩臣而臚於郊祀君子懼焉則平王以前未有也魯之郊禘惠公請之也惠公雖請之而魯郊猶未率為常也僖公始作頌以郊為夸焉記禮者以為魯禮皆成王賜之以康周公按衛祝鮀之言曰周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷氏六族以昭周公之德豫之土田陪敦祝宗卜史備物典冊官司彞器則成王命魯不過如此隱公考仲子之宫問羽數於衆仲周公閲來聘饗有昌歜白黑形鹽周公以為備物辭不敢受衛寧武子來聘宴之賦湛露及彤弓武子不答賦曰諸侯朝正於王於是賦湛露諸侯敵王所愾而獻其功於是乎賜之彤弓假如記禮之言得用郊禘兼四代服器則祝鮀不應不及況魯行天子之禮久矣隱公何以始問羽數閲何以辭備物之享寧武子何以致譏於湛露彤弓于以見魯僭未久上自天子之宰至于兄弟之國之卿茍有識者皆疑怪遜謝而魯人並無一語及於成王之賜以自解故郊禘之說當從劉恕倘自史角之事之外别有傳記與明堂位合則外紀豈獨遺佚乎魯惠公薨國人立其子息姑是為隱公左氏曰惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子有文在其手曰為魯夫人故仲子歸于魯生桓公而惠公薨是以隱公立而奉之陳氏曰古者諸侯不再娶再娶亦妾也隱桓之母俱不得為夫人子王子曰甚矣左氏之好誣也嬰兒之生其手安得有四字之文隱公將遜國焉而遇弒無後其後魯之君大夫皆桓子孫立為是說以證仲子之正桓之嫡而文其弒君之罪耳左氏不辨其誣而録之妄矣公羊氏曰隱長又賢諸大夫扳隱而立之隱於是焉而辭立則未知桓之將必得立也且如桓立則恐諸大夫之不能相幼君也故凡隱之立為桓立也穀梁氏曰孝子揚父之美不揚父之惡先君之欲與桓非正也邪也雖然既勝其邪心以與隱矣已探先君之邪志而遂以與桓則是成父之惡也兄弟天倫也為子受之父為臣受之君已廢天倫而忘君父以行小惠由小道也若隱者可謂輕千乘之國蹈道則未也履祥按古者諸侯一娶九女一嫡以其娣姪從他國亦以娣姪媵焉所以備內官防夭折繁子孫也故諸侯不再娶有嫡立嫡無嫡立庶庶鈞立賢賢鈞立長惠公元妃孟子卒繼室以聲子生隱公則隱公固當立者仲子之歸宋武公以夫人嫁之魯惠公以夫人逆之天王亦以夫人賵之非正矣於公議則非正然隱公則不敢以為非也惟有遜國而已矣隱公不敢自以為正攝位君國將以豫桓菟裘之營未畢而卒遇弒為善罹禍此世道之大變也此春秋所為託始也御批資治通鑑綱目前編卷九
