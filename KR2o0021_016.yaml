body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十六丁巳周景王元年夏五月葬靈王左氏曰夏四月葬楚康公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我葬靈王鄭上卿有事子展使印段往伯有曰弱子展曰與其莫往弱不猶愈乎堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周皇覽曰靈王冢在河南城西南柏亭西周山上蓋以王生而有髭而神故諡靈王其冢民祀之不絶衛獻公卒子惡嗣是為襄公閽弒吳子餘祭弟夷末立左氏曰吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之晉荀盈會齊髙止宋華定魯仲孫羯衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞左氏曰晉平公杞出也故治杞六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子大叔與伯石往子大叔見大叔文子與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已吳子使札聘于魯齊鄭衛晉春秋書曰吳子使札來聘左氏曰吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不擕遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聼琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難公羊氏曰吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也榖梁氏曰吳其稱子何也善使延陵季子故進之其名成尊於上也履祥按吳季子之賢也而不書公子猶曰吳無公子也而亦不書季獨名之夷於秦術楚椒焉夫子何以不賢季子與曰此所以賢季子也夫子之所賢宜春秋之所以責偹也胡氏曰以其辭位遜國不成父兄之志而終以成亂故貶之也夫季子宜立而又辭在夷末之卒爾此方夷末之初立也春秋安得先事而致貶貶必於夷末之卒因事而後可見也然則此夷末立使札聘於上國杜注謂餘祭使之至魯未聞喪非也吳至魯不為逺餘祭弒則赴至魯矣為季子安得猶未聞也通嗣君也則曷為貶孔子曰延陵季子吳之習於禮者而此行則越禮多矣夫當喪未君踰年而後即位禮也餘祭以弒殞臣子之至痛曾未踰時而出聘如常時猶曰夷末之命也而請觀於周樂雖為博聞好學於禮固未為得也豈夷狄之俗猶未盡除與然則夫子雖賢季子而於此行則未可也二年蔡世子般弒其君景侯而自立是為靈侯左氏曰蔡景侯為太子般娶于楚通焉太子弒景侯宋災宋伯姬卒公羊氏曰宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅姆不下堂傅至矣姆未至也逮乎火而死王殺其弟佞夫王子瑕奔晉左氏曰初王儋季卒其子括將見王而歎單公子愆期為靈王御士過諸廷聞其歎而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足高心在他矣不殺必害王曰童子何知靈王崩儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故左氏曰為宋災故諸侯之大夫會以謀歸宋財叔孫豹會晉趙武齊公孫蠆宋向戍衛北宮他鄭罕虎及小邾之大夫會于澶淵既而無歸於宋故不書其人明年春穆叔至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔又與季孫語晉故季孫不從及趙文子卒晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之會榖梁氏曰澶淵之會中國不侵伐夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也胡氏曰此遍刺天下之大夫也蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可謂知務乎穆叔趙孟向戍子皮諸侯之良也而所謀若是世衰道微邪説交作以利害謀國家而不知本於仁義也履祥按城杞之會為悼二者謂非恤小救患之人也澶淵之會為宋災也則不可然蔡般之事亂臣賊子之禍則又有大於此者而晉不之問以有弭兵之盟也蔡即楚久晉人以為討則懼有爭蔡之嫌再啓兵端若夫楚則圍為令尹亦將般矣此般之所以不討也存弭兵之小信而忘撥亂之大義詩云君子屢盟亂是用長其斯之謂與鄭使公孫僑為政左氏曰鄭伯有耆酒為窟室夜飲酒朝至未已朝者皆布路而罷既而朝又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之子産斂伯有氏之死者殯之而行印假從之子皮曰夫子禮於死者况生者乎遂自止之子産入子石入皆受盟于子晳氏鄭伯及其大夫盟于大宮盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣晨自墓門之瀆入介于襄庫伐舊北門駟帶率國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産襚之斂而殯子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是遊吉如晉還聞難不入復命于介奔晉駟帶追之盟而復歸子皮授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聼誰敢犯子子善相之國無小小能事大國乃寬子産為政有事伯石賂與之邑子大叔曰國皆其國奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往鄭書有之曰安定國家必大焉先姑安大以待其所歸既伯石懼而歸邑卒與之伯有既死使大史命伯石為卿辭大史退則請命焉又辭如是三乃受䇿入拜子産是以惡其為人也使次己位子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已子張怒退而徵役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事鄭人遊于鄉校以論執政然明謂子産毁鄉校何如子産曰夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然明曰今而後知吾子之信可事也若果行此鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也子皮使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也自今請雖吾家聼子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國三年魯襄公卒于楚宮子野立而卒稠立是為昭公左氏曰公作楚宮穆叔曰君欲楚也夫若不復適楚必死是宮六月公薨于楚宮立胡女敬歸之子子野卒毀也立敬歸之娣齊歸之子公子稠穆叔不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子卒立之比及葬三易衰衰衽如故衰於是昭公年十九矣猶有童心君子是以知其不能終也鄭伯如晉衛侯如楚左氏曰子産相鄭伯以如晉晉侯以魯喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以寇盜充斥是以令吏完客所館髙其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆以待賓客若皆毁之其何以共命對曰以敝邑𥚹小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見不敢輸幣亦不敢暴露恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳以崇大諸侯之館館如公寢庫廄繕修司空以時平易道路圬人以時塓館宮室諸侯賓至甸設庭燎僕人巡宮車馬有所賓從有代巾車脂轄𨽻人牧圉各瞻其事百官之屬各展其物公不留賓而亦無廢事教其不知而恤其不足賓至如歸無寧災患不畏寇盜而亦不患燥濕今銅鞮之宮數里而諸侯舍於𨽻人門不容車而不可踰越盜賊公行而夭癘不戒賓見無時命不可知若又勿壞是無所藏幣以重罪也雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也文伯復命趙文子曰信我實不德而以𨽻人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮乃築諸侯之館鄭子皮使印假如楚以適晉告北宮文子相衛襄公如楚宋之盟故也過鄭印假迋勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言於衛侯曰鄭有禮數世之福也其無大國之討乎衛侯在楚北宮文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云敬慎威儀惟民之則令尹無威儀民無則焉公曰何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀臣有臣之威儀順是以下皆如是是以上下能相固也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也莒人弒其君密州左氏曰莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也胡氏曰信斯言也則子弒父也春秋有不書乎故趙氏謂其文當曰展輿因國人之攻莒子弒之乃立其後傳寫誤以之為以字爾魯仲由生四年魯昭公元晉趙武楚公子圍齊國弱宋向戍魯叔孫豹衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人會于虢魯取鄆王使劉子勞趙武于潁左氏曰楚公子圍聘于鄭且娶於公孫段氏伍舉為介遂會于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋楚重得志於晉晉之耻也吾子其不可以不戒文子曰宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僣非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有飢饉必有豐年且吾聞之能信不為人下吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟楚令尹圍設服離衛季武子伐莒取鄆莒人告於會楚告於晉請戮其使樂桓子相趙文子欲求貨於叔孫而為之請弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨趙孟聞之曰臨患不忘國忠也思難不越官信也圗國忘死貞也謀主三者義也又可戮乎乃請諸楚曰魯雖有罪其執事不辟難子若免之以勸左右可也莒魯爭鄆為日久矣茍無大害於其社稷可無亢也楚人許之乃免叔孫天王使劉定公勞趙孟於潁館于雒汭劉子曰美哉禹功眀德逺矣微禹吾其魚乎吾與子辨冕端委以治民臨諸侯禹之力也子盍逺纘禹功而大底民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於𨽻人朝不謀夕棄神人矣何以能久邾悼公卒穿立是為莊公晉荀吳始用卒敗狄于大鹵左氏曰晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車為行荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之大敗之莒去疾自齊入于莒莒展輿出奔吳左氏曰莒展輿立而奪羣公子秩公子召去疾于齊齊公子鉏納去疾展輿奔吳楚子麇卒令尹圍實弒之而自立是為靈楚公子比奔晉左氏曰楚公子圍將聘于鄭伍舉為介未出竟聞楚子有疾而還伍舉遂聘圍至入問疾縊而弒之殺其二子幕及平夏子干出奔晉子晳出奔鄭葬楚子于郟謂之郟敖楚靈遂即位薳罷為令尹啓疆為太宰荀子曰以冠纓絞之杜氏曰以瘧疾赴履祥按楚令尹圍弒其君麇而代之春秋不書弒而書卒舊説曰從赴告也夫弒君而自立者必不以弒赴也而春秋正其弒此亂臣賊子無所逃其罪於天下後世所為懼也何獨於圍而從所赴曰春秋之筆微顯闡幽弒其君而以薨赴天下後世或不知其故則以弒書之若夫圍之弒天下知之久矣虢之會諸侯大夫皆料其篡於未弒之前朱方之師諸侯三軍之士皆笑其徇於已弒之後則夫從其赴而書之天下後世益知其偽赴之不可誣矣此或者聖人微顯闡幽之意蓋不可以一槩論也雖然楚之無君臣父子久矣熊通弒其君囏而自立是為楚成已而其子商臣又弒之而自立是為楚穆傳子及孫至此四世而莫之或討也然其兄弟子孫爭國而自相賊殺者僅存而無遺類矣聖人於此亦投畀有昊而已五年晉使韓起聘于魯齊衛左氏曰晉侯使韓宣子來聘且告為政而來見禮也觀書于大史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也鄭殺其大夫公孫黑左氏曰鄭公孫黑將作亂欲去遊氏而代其位疾作不果駟氏與諸大夫欲殺之子産在鄙聞之乘遽而至使吏數之曰伯有之亂以大國之事未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也兄弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三不速死大刑將至辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為禇師子産曰印也若才君將任之不才朝夕從女女罪之不恤而又何請焉不速死司寇將至縊尸諸衢加木焉蔡漆雕開生六年鄭遊吉如晉齊晏嬰如晉左氏曰鄭遊吉如晉送少薑之葬梁丙曰甚哉子之為此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令三歲而聘五歲而朝有事而會不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已今嬖寵之喪而數於守適唯懼獲戾豈敢憚煩少薑有寵而死齊必繼室今兹吾又將來賀不唯此行也張躍曰自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯二大夫退子大叔曰張躍有知其猶在君子之後乎齊侯使晏嬰請繼室於晉晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之將焉辟之叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宮室滋侈道殣相望而女富溢尤民聞公命如逃寇讐政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族惟羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀北燕伯欵出奔齊燕人立悼公左氏曰燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊七年楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚人執徐子楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴左氏曰前年冬鄭伯如楚春許男如楚楚子止之遂止鄭伯使椒舉如晉求諸侯二君待之椒舉致命晉侯欲勿許司馬侯曰楚子方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也君其許之而修德以待其歸若歸於德吾猶將事之況諸侯乎若適淫虐楚將棄之吾又誰與爭曰晉有三不殆其何敵之有國險而多馬齊楚多難對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉是以先王務修德音以享神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇齊有仲孫之難而獲桓公晉有里丕之難而獲文公衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以殞周是以興夫豈爭諸侯乃許楚使楚子問於子産曰晉其許我諸侯乎對曰晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之曰諸侯其來乎曰從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉其餘君之所及也曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟夏諸侯如楚曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待于申六月楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉楚子曰吾用齊桓使問禮於左師與子産左師曰敢不薦聞獻公合諸侯之禮六子産曰敢不薦守獻伯子男會公之禮六楚子使椒舉侍於後以規過卒事不規問其故對曰禮吾所未見者六焉又何以規宋大子佐後至久而弗見徐子吳出也故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緡叛之商紂為黎之搜東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎弗聼子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄德逺而後興秋楚子以諸侯伐吳宋太子鄭伯先歸宋華費遂鄭大夫從使屈申圍朱方克之執齊慶封而滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封其肯從於戮乎播於諸侯焉用之弗聼負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯使速殺之遂以諸侯滅賴遷賴於鄢楚子欲遷許於賴使鬬韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校民不堪命乃禍亂也鄭作丘賦左氏曰鄭子産作丘賦國人謗之曰其父死於路已為蠆尾以令於國國將若之何子寬以告子産曰茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣渾罕曰國氏其先亡乎君子作法於涼其敝猶貪作法於貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法政不率法而制於心民各有心何上之有魯有若生甲子八年魯舍中軍左氏曰卑公室也初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也公室四分民食於他難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎秦景公卒子嗣是為哀公楚子蔡侯陳侯許男頓子沈子徐人越人伐吳左氏曰吳早設備楚無功而還陳氏曰初書越而稱人越驟張也通吳以疲楚者晉謀之失也通越以困吳者楚謀之失也孔子志于學論語曰子曰吾十有五而志于學朱子曰古者十五而入大學心之所之謂之志此所謂學即大學之道志乎此則念念在此而為之不厭矣九年鄭人鑄刑書左氏曰叔向使詒子産書曰昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以強斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎國將亡必多制其此之謂乎復書曰僑不才不能及子孫吾以救世也既不承命敢忘大惠楚公子棄疾如晉左氏曰楚公子棄疾如晉報韓子也過鄭鄭伯勞諸柤辭固請見之見如見王禁芻牧採樵不入田不樵樹不採蓻不抽屋不強丐誓曰有犯命者君子廢小人降舍不為暴主不慁賓往來如是鄭三卿皆知其將為王也楚薳罷帥師伐吳吳人敗之齊侯伐北燕左氏曰齊侯伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未可也明年春齊侯次于虢燕人歸燕姬賂以瑶甕玉櫝斝耳而還十年四月甲辰朔日有食之衛襄公卒公子元嗣是為靈公衛齊惡來請命王使成子如衛弔追錫命左氏曰衛齊惡告喪于周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉十有一年陳侯之弟招殺陳世子偃師陳哀公卒楚師滅陳左氏曰陳哀公元妃生太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾招過殺悼太子偃師而立公子留哀公縊干徵師赴于楚且告有立君公子勝訴之楚人執而殺之留奔鄭公子招歸罪于過而殺之楚公子棄疾帥師奉孫吳圍陳冬十一月滅陳使穿封戍為陳公晉侯問於史趙曰陳其遂亡乎對曰未也陳顓頊之族也歲在鶉火是以卒滅陳將如之今在析木之津猶將復由自幕至于瞽瞍無違命舜重之以明德置德于遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣十有二年宋華亥魯叔弓鄭遊吉衛趙黶會楚子于陳許遷于夷左氏曰楚公子棄疾遷許于夷實城父取州來淮北之田以益之遷方城外人於許王使詹桓如晉晉侯使趙成來致閻田左氏曰周甘人與晉閻嘉爭閻田晉梁丙張躍率隂戎伐潁王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是為豈如辨髦而因以敝之先王居檮杌于四裔以禦魑魅故允姓之姦居於瓜州伯父惠公歸自秦而誘以來使逼我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圗之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕拔本塞原專棄謀主雖戎狄其何有余一人叔向謂宣子曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰德而暴滅宗周以宣示其侈諸侯之二不亦宜乎且王辭直子其圗之宣子説王有姻喪使趙成如周弔且致閻田與襚反潁俘王亦使賓滑執甘大夫以説於晉晉人禮而歸之十有三年齊陳氏鮑氏逐欒施高強左氏曰齊欒高氏皆耆酒信內多怨強於陳鮑氏而惡之有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲以如鮑氏則亦授甲矣遂伐欒高氏子良曰先得公陳鮑焉往遂伐虎門晏平仲端委立于虎門之外四族召之無所往公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之戰于稷欒高敗國人追之又敗諸鹿門欒施高強奔魯陳鮑分其室晏子謂桓子必致諸公讓德之主也義利之本也蕰利生孽桓子盡致諸公而請老于莒召子山而反棘焉子商反其邑子周與之夫于反子城子公公孫捷而益其祿凡公子公孫之無祿者私分之邑子山子商子周高氏所逐羣公子事在襄三十一年國之貧約者私與之粟公與桓子莒之旁邑辭穆孟姬為之請髙唐陳氏始大晉平公卒子夷嗣是為昭公左氏曰魯叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也鄭子皮將以幣行子産曰喪焉用幣不行必盡用之子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聼叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣宋平公卒子佐嗣是為元公孔子生伯魚家語曰孔子年十九娶于宋丌官氏一歲而生伯魚魚之生也魯昭公以鯉賜孔子榮君之貺故因以名曰鯉而字伯魚十有四年楚子虔誘蔡侯般殺之于申楚公子棄疾帥師圍蔡晉韓起會齊國弱宋華亥魯季孫意如衛北宮他鄭罕虎曹人杞人于厥憖王使單子命事於會楚師滅蔡執蔡世子有以歸用之左氏曰景王問於萇𢎞曰今兹諸侯何實吉凶對曰蔡凶此蔡侯般弒其君之歲也歲在豕韋矣楚將有之然壅也歲及大梁蔡復楚凶楚子在申召蔡靈侯將往大夫曰楚貪而無信惟蔡於憾今幣重言甘誘我也無往蔡侯不可楚子伏甲而饗蔡侯於申執而殺之公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聼命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷而隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也荀吳謂韓宣子曰不能救陳又不能救蔡己為盟主而不恤亡國將焉用之會于厥憖謀救蔡也鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之蔡必亡矣三年楚其有咎乎晉人使孤父請蔡于楚弗許楚子滅蔡用隱太子于岡山申無宇曰不祥五牲不相為用况用諸侯乎楚子城陳蔡不羹使棄疾為蔡公問於申無宇對曰五大不在邊五細不在庭親不在外羈不在內末大必折尾大不掉君所知也履祥按蔡般弒其君而立列於諸侯者十三年晉不能討使楚得借是以滅蔡而晉為請之名義皆不正矣何以復霸單成公卒左氏曰單子會韓宣子于戚視下言徐叔向曰單子其將死乎會朝之言必聞于表著之位所以昭事序也視不過結禬之中所以道容貌也今單子為王官伯而命事於會視不登帶言不過步貌不道容而言不昭無守氣矣十二月卒十有五年齊髙偃帥師納北燕伯于陽鄭簡公卒子寧嗣是為定公左氏曰鄭簡公卒將為葬除及遊氏之廟將毁焉子大叔使其除徒執用以立而無庸毁子産過女而問乃曰不忍廟也將毁矣子産使辟之司墓之室有當道者毁之則朝而塴弗毁則日中而塴子大叔請毁之曰無若諸侯之賓何子産曰諸侯之賓能來會吾喪豈憚日中無損於賓而民不害遂弗毁日中而葬齊侯魯侯衛侯鄭子如晉魯侯至河乃復魯公子憖遂如晉魯公子憖奔齊左氏曰齊侯衛侯鄭伯如晉朝嗣君也公如晉至河乃復初季平子伐莒取郠獻俘始用人於亳社莒訴于晉晉有平公之喪未之治也故辭公公子憖遂如晉晉侯享諸侯子産相鄭伯辭於享請免喪而後聼命禮也季平子不禮於南蒯南蒯謂公子憖吾出季氏而歸其室於公子更其位我以費為公臣子仲許之告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及郊聞費叛遂奔齊南蒯之將叛也其鄉人或知之過之而歎且言曰恤恤乎湫乎攸乎深思而淺謀邇身而逺志家臣而君圖有人矣哉南蒯枚筮之遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外強內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠率事以信為共供飬三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者耻乎已乎已乎非吾黨之士乎後二年費人叛南氏南蒯奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之履祥按春秋凡以地叛雖微必書而內叛不書內叛必有為也南蒯以費叛不書蓋欲張公室亦公意也忠有餘而知不足以至此爾左氏專以勢利成敗論人故其形容南蒯之叛獨詳而不知春秋所以不書之意季氏四分公室而取其二左氏不以為非昭公不以為悖而反譏昭公之不善子韓晳曰家臣而欲張公室大罪也左氏與當時之言如此則人心習俗之變久矣原伯絞奔郊成景之族弒甘公過左氏曰周原伯絞虐其輿臣輿人逐絞絞奔郊甘公過將去成景之族成景之族殺甘悼公杜氏曰傳言周衰原甘二族所以遂微楚子伐徐左氏曰楚子狩于州來次于潁尾使蕩侯潘子司馬督帥師圍徐以懼吳楚子次于乾溪以為之援右尹子革夕與之語曰昔我先王熊繹與呂伋王孫牟燮父禽父並事康王四國皆有分我獨無有今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔先王熊繹辟在荆山篳路籃縷以處草莾跋涉山林以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎楚子曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田楚子曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過楚子曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲沒於祇宮臣問其詩而不知也若問逺焉其焉能知之楚子曰子能乎對曰能其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心楚子不能自克以及於難十有六年楚公子比自晉歸於楚弒其君虔于乾溪楚公子棄疾殺公子比而自立是為平左氏曰楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於楚子楚之滅蔡也其父死焉楚子使與於守而行申之會越大夫戮焉楚子奪鬬韋龜中犫又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆楚子所不禮也因羣喪職之族啓越大夫常夀過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳蔡大夫曰今不封蔡蔡不封矣以蔡公之命召子干即比子晳及郊而告之情強與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚蔡公使須務牟史猈先入殺太子祿及公子罷敵公子比為王黑肱為令尹次于魚陂棄疾為司馬先除宮使觀從從師于乾溪而遂告之且曰先歸復所後者劓師及訾梁而潰楚子聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣楚子曰余殺人子多矣能無及此乎沿夏將入鄢芉尹無宇之子申亥求之以歸楚子縊于申亥氏觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君早自圗也又有呼而走至者二子皆自殺棄疾即位名曰熊居殺囚衣之王服流諸漢取而葬之以靖國人使子旗為令尹蔓成然封陳蔡復遷邑致羣賂施舍寬民宥罪舉職初楚靈卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患其無厭也故從亂如歸國語曰陳蔡及不羮之人納棄疾而殺靈王履祥按程子有言觀春秋者以傳考經之事迹以經别傳之真偽昭定哀之春秋自楚麇卒以來考之於傳則於春秋筆削之意多有可議如公子圍公子比許世子止之事則春秋於亂臣賊子其誅舍若可疑者或左氏所傳不盡得其實與今考公子比之事如傳所言則經當書公子比自晉歸于楚公子棄疾自蔡歸于楚弒其君虔于乾溪公子棄疾弒其君比而經書乃云爾者是或有可疑也蓋嘗反覆思之春秋誅心之法也以春秋誅心而言則子干有爭國之心而棄疾無起事之意以春秋書法而論則凡為弒君者所立則以首惡書之討賊而不以其罪則不以討賊之辭書之虔弒君而立比為是出奔則其歸也當正名討賊而不討賊則以亡公子爭國而已虔有弒君之罪而人莫之討徒以其暴而弒之則臣弒其君而已比一匹夫無親於楚無援於晉進不能正討賊之義退不能為曹子臧吳季子為人所用以立而立書法得以加首惡之名為人所怖以死棄疾得以歸弒君之獄所謂為人臣者不知春秋之義則陷於弒逆之罪其此之謂與然則用計以弒其君者獨無誅乎曰唐人有言春秋書王法不誅其人身書一事而兼衆義者有之然有難兼衆義者則舉一事以示戒而已若夫天下之理則未有弒其君親而無禍者虔之弒君也以縊而虔即自縊虔之弒麇也及其二子幕與平夏而祿與罷敵亦先死焉自投車下曰人之愛其子也亦如豫乎可謂出乎爾者反乎爾者矣棄疾歸罪於比而他日吳人卒鞭其墓而戮之天理可以監矣劉子晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子會于平丘同盟魯侯不與盟晉人執魯季孫意如以歸左氏曰晉成虒祁諸侯朝而歸者皆有二心叔向曰諸侯不可不示威乃並徵會告于吳水道不可吳子辭七月治兵于邾南甲車四千乘遂合諸侯於平丘次于衛地叔鮒求貨於衛淫芻蕘者衛人饋叔向羮與錦叔向受羮反錦曰晉有羊舌鮒者瀆貨無厭為此役也子若以君命賜之其已從之未退而禁之晉人將尋盟齊人不可晉侯使叔向告劉獻公公曰盟以砥信君茍有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告于齊對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰志業於好講禮於等示威於衆昭明於神自古以來未之或失也晉禮主盟懼有不治奉承齊犧而布諸君君曰余必廢之何齊之有唯君圗之齊人懼對曰小國言之大國制之敢不聼從叔向曰諸侯有間矣不可以不示衆辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人訴曰魯朝夕伐我我之不共魯故之以晉侯不見公使叔向辭子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君叔向曰寡君有甲車四千乘雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戍同盟于平丘子産爭承曰昔者天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也自日中以爭至于昏晉人許之既盟子大叔咎之子産曰晉政多門二偷之不暇何暇討國不競亦陵何國之為仲尼謂子産於是行也足以為國基矣公不與盟晉人執季孫意如以歸子服湫從履祥按晉之不明也甚矣季氏專魯昭公之意豈不欲去之南蒯之謀公子愸從昭公如晉豈不欲通此意也而以郠故辭公取郠正季孫之罪也公子愸又獨往而意又不逹以歸遂出奔齊至是執意如反以子仲南蒯之間脅魯矣又明年復以郠故止昭公而昭公之意卒不能自達也故胡氏謂當按邾莒所訴之狀究南蒯子仲奔叛之由告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公家之民則方伯之政修矣乃不能然卒使季氏復強而昭公客死惜哉晉大夫之賢孰與叔向其為此盟務力不務德以利不以義曰寡君甲車四千乘在牛雖瘠僨於豚上其畏不死春秋之辭令未是有也戰國秦人之辭氣昉乎此矣蔡侯廬歸于蔡陳侯吳歸于陳左氏曰楚之滅蔡也遷許胡沈道房申於荆焉楚平即位既封陳蔡而皆復之隱大子之子廬歸于蔡悼大子之子吳歸于陳禮也吳滅州來左氏曰吳滅州來令尹子旗請伐吳楚子弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之燕悼公卒共公立十有七年晉釋魯季孫意如左氏曰子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫曹武公卒子須嗣是為平公十有八年吳子夷末卒子僚立左氏曰初吳子夷末之立也使屈狐庸聘于晉趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啓之何如對曰不立若天所啓其在今嗣君乎有德而度德不失民度不失事其天所啓也有吳國者必此嗣君之子孫實終之季子守節者也雖有國不立史記曰餘昧卒欲授季札札辭逃去吳人曰先王有命兄卒弟立必致季子季子今逃位則王餘昧後立今卒其子當代乃立餘昧之子僚履祥按季子此時義可以立矣而不立則當告之國人命諸樊之子光而立之庶無異日之亂矣然觀狐庸及史記所言則餘昧為賢而其子僚亦為國人所屬當時事勢雖欲立光亦恐未可也不然則季子之義為未盡矣蔡朝吳出奔鄭左氏曰楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼飬老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勳合親任良物官使屈罷簡東國之兵於召陵亦如之好於邉疆息民五年而後用師費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭楚子怒曰余為信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以剪其翼也六月丁巳朔日有食之王太子夀卒王穆后崩左氏曰晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彛器於王晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也闕鞏之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彛器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對賓出王曰籍父其無後乎數典而忘其祖籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉於是乎以喪賓宴又求彛器樂憂甚矣且非禮也彛器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之十有九年齊侯伐徐徐子及郯人莒人會齊侯盟于蒲隧左氏曰齊侯伐徐至于蒲隧徐人行成徐子及郯人莒人會齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方會之有成而還莫之亢也無伯也夫楚子誘戎蠻子殺之左氏曰楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉晉昭公卒子去疾嗣是為頃公左氏曰前年冬公如晉平丘之會故也晉人止公夏公至自晉子服昭伯曰晉之公室其將遂卑矣君幼弱六卿強而奢傲將因是以習習實為常能無卑乎季平子曰爾幼惡識國秋晉昭公卒平子如晉葬昭公曰子服回之言猶信子服氏有子哉二十年六月甲戍朔日有食之郯子朝于魯左氏曰郯子來朝昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀共工氏以水紀大皥氏以龍紀我高祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也雎鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信晉侯使屠蒯來請有事於雒與三塗晉荀吳帥師滅陸渾之戎左氏曰晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備晉荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知師從之遂滅陸渾陸渾子奔楚其衆奔甘鹿周大獲楚人及吳戰于長岸左氏曰昭公之春秋莫辨於吳楚也於是始書戰則以吳楚敵言之也二十有一年毛得殺毛伯過左氏曰二月乙卯周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也侈故之以而毛得以濟侈於王都不亡何待曹平公卒子午嗣是為悼公宋衛陳鄭災左氏曰昭十有七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也今除於火火出必布焉諸侯其有火災乎梓慎曰火出於夏為三月於商為四月於周為五月夏數得天若火作其在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午鄭禆竈言於子産用瓘斚玉瓉鄭必不火子産弗與十八年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午火甚宋衛陳鄭皆火火作子産辭晉公子公孫于東門使司寇出新客禁舊客勿出於宮使子寬子上巡羣屏攝至于大宮使公孫登徙大龜使祝史徙主祏於周廟告于先君使府人庫人各警其事商成公警司宮出舊宮人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司寇各保其徵郊人助祝史除於國北禳火于玄冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告于諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也火之作也子産授兵登陴既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人荐為敝邑不利以重君之憂幸而不亡猶可説也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉既事晉矣其敢有二心禆竈曰不用吾言鄭又將火子産曰天道逺人道邇竈焉知天道是亦多言矣豈不或信不與亦不復火使原伯魯如曹葬曹平公左氏曰葬曹平公往者見周原伯魯焉與之語不説學歸以語閔子馬子馬曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎許遷于白羽楚遷之也鑄大錢國語曰景王二十一年將鑄大錢單穆公曰不可古者天災降戾於是乎量資幣權輕重以振救民民患輕則為之作重幣以行之於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取於民民不給將有逺志是離民也且夫備有未至而設之有至而後救之是不相入也可先而不備謂之怠可後而先之謂之召災周固羸國也天未厭禍而又離民以佐災無乃不可乎且絶民用以實王府猶塞川原而為潢汚也其竭也無日矣若民離而財匱災至而備亡王其若之何吾周官之於災備也其所怠棄者多矣而又奪之資以益其災是去其藏而翳其人也王其圗之王弗聽卒鑄大錢燕共公卒平公立二十有二年許世子止弒其君買葬許悼公左氏曰許悼公瘧飲大子止之藥卒榖梁氏曰止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死公羊氏曰許世子弒其君是君子之聽止也葬許悼公是君子之赦止也履祥按古今亂臣賊子弒其君者蓋亦多故有以藥物弒之者霍顯王莽梁冀之徒是也又有雖無弒逆之意而以竒藥誤其君者山人栁泌之徒是也故律謂醫藥不依本方致殺人者與故殺同而天子升遐侍醫者死蓋謹亂賊之防也止雖無弒君之心然不幸而進藥以卒故夫子因其所自咎者又立此法其諸以示萬世之防也與楚用費無極放世子建于城父左氏曰楚子生大子建使伍奢為之師費無極為少師無寵欲譛諸楚子曰建可室矣為聘於秦無極與逆勸王取之楚子為舟師以伐濮費無極曰晉之伯也邇於諸夏而楚辟陋故弗能與爭若大城城父而置大子焉以通北方王收南方是得天下也從之二十有三年孔子至京師既而反乎魯左氏曰昭之七年公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是鬻於是以糊余口其共也如是臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬説與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宮敬叔師事仲尼史記曰南宮敬叔言魯君曰請與孔子適周魯君與之一乘車兩馬一豎子俱適周家語曰敬叔與俱至周問禮於老聃訪樂於萇𢎞歷郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也史記曰孔子自周反于魯弟子稍益進焉履祥按史記孟僖子屬其子事仲尼時孔子年十七而云僖子死然僖子死之年孔子年三十四蓋孔子年十七時孟僖子相魯昭公適楚不能相禮以此為病其後使其二子師孔子非必在是年亦非必在其既死之後也所以南宮敬叔與孔子俱適周然適周亦不知何年但史記載孔子自周反魯乃與晉平楚靈同時則當在孔子二十歲餘又史記結語乃曰魯昭公之二十年而孔子蓋年三十矣則又似在昭公二十年今附昭公二十年之下孔子曰我欲觀夏道是故之杞而不足徵也我欲觀殷道是故之宋而不足徵也我觀周道幽厲傷之吾舍魯何適矣蓋孔子觀周在之宋之杞之後故齊侯晏嬰入魯問禮於孔子以孔子備考三代之禮故也楚世子建自城父奔宋楚子殺其傅伍奢及子尚伍員奔吳左氏曰費無極言於楚子曰建與伍奢將以方城之外叛齊晉輔之其事集矣問伍奢奢曰君一過多矣何信於讒楚子執伍奢使城父司馬奮揚殺大子未至而使遣之大子奔宋楚子召奮揚曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣事建如事余奉初以還不忍後命故遣之曰而敢來何也對曰使而失命召而不來是再姦也楚子曰歸從政如他日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來使召之棠君尚謂其弟員曰吾知不逮我能死爾能報奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可棄名不可廢爾其勉之伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員如吳言伐楚之利公子光曰是宗為戮而欲反其讐不可從也員曰彼將有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕於鄙齊侯與其大夫晏嬰入魯問禮於孔子史記曰齊景公與晏子狩因入魯問禮鄭大夫公孫僑卒左氏曰子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒仲尼聞之出涕曰古之遺愛也蔡平侯卒子朱嗣魯冉雍生魯冉求生二十有四年鑄無射國語作二十三年蓋單穆公之言乃在二十三年也國語曰王將鑄無射而為之大林單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼耳之察和也在清濁之間其察清濁也不過一人之所勝是故先王之制鐘也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出今王作鐘也聼之弗及比之不度鍾聲不可以知和制度不可以出節無益於樂而鮮民財將焉用之夫樂不過以聼耳而美不過以觀目若聼樂而震觀美而眩患莫甚焉夫耳目心之樞機也故必聼和而視正聼和則聰視正則明聰則言聼明則德昭聼言昭德則思慮純固以言德於民民歆而德之則歸心焉是以作無不濟求無不獲然後能樂夫耳內和聲而口出美言以為憲令而布諸民正之以度量樂之至也口內味而耳內聲聲味生氣氣在口為言在目為明若視聼不和而有以震眩則味入不精不精則氣佚氣佚則不和於是乎有狂悖之言有眩惑之明有轉易之名有過慝之度出令不信刑政放紛動不順時作則不濟求則不獲其何以能樂王弗聼問之泠州鳩對曰臣聞之琴瑟尚宮鐘尚羽石尚角匏竹利制大不踰宮細不過羽夫宮音之主也第以及羽聖人保樂以愛財財以備器樂以殖財故樂器重者從細輕者從大是以金尚羽石尚角瓦絲尚宮匏竹尚徵革木一聲夫政象樂樂從和和從平聲以和樂律以平聲於是乎氣無滯隂亦無散陽隂陽序次風雨時至嘉生繁祉人民和利今細過其主妨於正用物過度妨於財正害財匱妨於樂細抑大陵不容於耳非和也聼聲越逺非平也夫有和平之聲則有蕃殖之財若夫匱財用罷民力以逞淫心聼之不和比之不度無益於教而離民怒神非臣之所聞也王不聼卒鑄大鐘左氏曰泠州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鐘之輿以行之小者不窕大者不槬則和於物物和則嘉成故和聲入於耳而藏于心心億則樂窕則不咸槬則不容心是以感感實生疾今鐘槬矣王心弗堪其能久乎七月壬午朔日有食之左氏曰梓慎曰二至二分日有食之不為災日月之行分同道也至相過也其他月則為災陽不克也故常為水蔡平侯之弟東國攻蔡侯朱朱出奔楚東國自立是為悼侯魯顔回生齊髙柴生二十有五年王崩子猛踐位葬景王王室亂劉子單子以王猛居于皇秋入于王城冬王子猛卒是為悼王母弟丐立左氏曰王子朝賔起有寵於景王王與賔孟説之欲立之劉獻公之庶子伯蚠事單穆公惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之景王既殺子猛之傅下門子國語並注補入賔孟適郊見雄雞自斷其尾問侍者曰憚其犧也遽歸告王曰雞其憚為人用乎人異於是人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾崩于榮錡氏劉子摯卒單子立劉蚠五月見王遂攻賔起殺之盟羣王子于單氏葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂劉子奔揚單子逆悼王于莊宮以歸王子還夜取王以如莊宮單子出王子還與召莊公謀曰不殺單旗不捷劉子如劉單子奔平畤羣王子追之單子殺還及羣子子朝奔京伐之京人奔山劉子入于王城鞏簡公敗績于京甘平公亦敗焉單子欲告急於晉以王如平畤次于皇劉子如劉單子使王子處守于王城盟百工于平宮鄩肸伐皇大敗獲鄩肸焚諸王城之市司徒醜以王師敗績于前城百工叛伐單氏之宮敗焉反伐之冬十月晉籍談荀躒帥九州之戎及焦瑕溫原之師以納王於王城單子劉蚠以王師敗績于郊前城人敗陸渾于社十一月王子猛卒立其母弟王子丐敬王即位館于子旅氏十二月晉籍談荀躒賈辛司馬督帥師軍于隂于侯氏于溪泉次于社王師軍于汜于解次于任人晉人濟師取前城軍其東南王師伐京毁其西南十有二月癸卯朔日有食之衛端木賜生壬午敬王元年蔡悼侯卒于楚弟申立是為昭侯吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧左氏曰吳人伐州來楚薳越帥師及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師􅑒吳公子光曰諸侯從於楚者衆而皆小國也不獲已來胡沈之君幼而狂陳大夫壯而頑頓與許蔡疾楚政楚令尹死帥賤政令不一若分師先犯胡沈與陳必先奔諸侯之師搖楚必大奔請先者去備薄威後者敦陳整旅吳子從之戰于雞父三國敗獲胡沈之君及陳大夫楚師大奔王居狄泉尹氏立王子朝地震左氏曰正月壬寅二師圍郊郊鄩潰晉師在平隂王師在澤邑王使告間庚戍還夏四月單子取訾劉子取牆人直人六月王子朝入于尹尹圉誘劉他殺之單子劉子伐尹單子先至而敗劉子還召伯奐南宮極以成周人戍尹單子劉子樊齊以王如劉王子朝入于王城次于左巷鄩羅納諸莊宮尹辛敗劉師于唐取西闈攻蒯蒯潰八月丁酉南宮極震萇𢎞謂劉文公曰君其勉之周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克二年王在狄泉王子朝入于塢左氏曰召簡公南宮嚚以甘桓公見王子朝劉子謂萇𢎞曰甘氏又往矣對曰何害紂有億兆夷人亦有離德余有亂臣十人同心同德此周所以興也君其務德無患無人王子朝入于塢晉侯使士景伯來鄭伯如晉左氏曰三月晉侯使士景伯涖問周故士伯立于乾祭而問於介衆晉人乃辭王子朝不納其使鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯而憂宗周之隕為將及焉今王室實蠢蠢焉吾小國懼矣然大國之憂也詩曰瓶之罄矣惟罍之耻王室之不寧晉之耻也乃徵會諸侯期以明年十月王子朝用成周之寶圭于河津人得諸河上隂不侫以溫人南侵拘得玉者取將賣之則為石王定而獻之五月乙未朔日有食之吳滅巢三年晉趙鞅宋樂大心魯叔詣衛北宮喜鄭遊吉曹人邾人滕人薛人小邾人會于黃父左氏曰謀王室也趙簡子令諸侯之大夫輸王粟具戍人曰明年將納王宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不會而何盟之不同曰同恤王室子焉得辟之右師不敢對受牒而退魯侯攻其大夫季孫意如不克出奔齊宋元公如晉卒于曲棘子頭曼嗣是為景公左氏曰季平子以季姒之譛殺申夜姑公若為之請不得怨平子季郈之雞鬪季氏介其雞郈氏為之金距平子怒益宮於郈氏故郈昭伯亦怨平子臧會為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏大夫遂怨平子公若獻弓於公為與之出射於外而謀去季氏公為告公果公賁侍人僚柤告公公以戈懼之又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圗也公退之辭曰臣與聞命矣言若泄臣不獲死乃館於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚於費弗許請以五乘亡弗許子家子曰君其許之政自之出隱民多取食焉日入慝作弗可知也同求將合君必悔之弗聼郈孫曰必殺之公使郈孫逆孟懿子叔孫氏司馬鬷戾言於其衆曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往公徒釋甲執冰而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也遂孫於齊齊侯曰自莒疆以西請致千社寡人將帥敝賦以從執事唯命是聼君之憂寡人之憂也公喜子家子曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之繾綣從公無通外內公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通外內且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名不亦傷乎平子曰若使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之公與昭子言於幄內曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左師展將以公乘馬而歸公徒執之宋元公為公故如晉卒于曲棘孔子如齊史記曰昭公二十五年甲申孔子年三十五而昭公奔齊魯亂於是適齊為高昭子家臣以通乎景公有聞韶問政二事公欲封以尼溪之田晏嬰不可公惑之孔子遂行反乎魯論語曰齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行履祥按晏嬰賢者也夫子亦每賢之今景公將封孔子而晏子不可其必有意史記載其沮止之語後夾谷之會史記亦謂晏子與有謀焉朱子皆削不取或疑晏子心雖正而其學墨固自有不相為謀者與然論晏子者惟當以夫子之言為正他書未可盡信也當是時晉楚皆以賄失諸侯齊故伯國諸侯亦且歸之而景公不能用孔子惜哉四年王使單子如晉王次于滑晉知躒趙鞅以師至王入于成周尹氏召伯毛伯以王子朝奔楚左氏曰往年冬尹氏涉于鞏焚東訾弗克夏四月單子如晉告急五月劉人敗王城之師于尸氏王城人劉人戰于施谷劉師敗績劉子以王出王城人焚劉王宿于禇氏次于滑晉知躒趙鞅帥師納王使女寬守闕塞十月王起師于滑遂次于尸晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宮嚚奉周之典籍以奔楚隂忌奔莒以叛召伯逆王于尸及劉子單子盟遂軍圉澤次于隄上王入于成周盟于襄宮晉師使成公般戍周而還王入于莊宮王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周亦曰吾無專享文武之功且為後人之迷敗傾覆而溺入于難則振救之至于夷王王愆于厥身諸侯莫不並走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昏不若用愆厥位擕王姦命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至于惠王天不靖周生頽禍心施于叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剝亂天下一行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍姦齊盟傲狠威儀矯誣先王晉為不道是攝是贊思肆其罔極兹不榖震蕩播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圗不榖則所願也敢盡布其腹心及先王之經而諸侯實深圗之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及太子夀早夭即世單劉贊私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以專其志無禮甚矣文辭何為楚平卒子壬嗣是為昭左氏曰楚平卒令尹子常欲立子西曰太子壬弱其母非適也子建實聘之子西長而好善立長則順建善則治子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹乃立昭五年吳子使季札聘于晉吳弒其君僚諸樊之子光立是為闔閭左氏曰吳子欲因楚喪而伐之使公子掩餘燭庸帥師圍潛使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇帥師救潛左司馬沈尹戍帥都君子與王馬之屬以濟師左尹郤宛工尹夀帥師至于潛吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰上國有言不索何獲我王嗣也吾欲求之事克季子雖至不吾廢也鱄設諸曰王可弒也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享吳子吳子使甲坐於道及其門門階户席皆親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之光偽足疾入于堀室鱄設諸置劍於魚中以進遂弒吳子鈹交於胸闔廬以其子為卿季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待履祥按僚稱國以弒春秋不以光為賊也吳諸樊兄弟相傳凡以為季子爾季子不立則國固諸樊之子之國也僚恃餘祭以結國人而立固已非矣春秋不以弒罪歸光則季子亦難以弒罪讐光也然季子遜國而光弒君為季子者終於上國不亦可乎復命哭墓復位而待亦幾於過矣晉士鞅宋樂祁犂衛北宮喜曹人邾人滕人會于扈左氏曰會于扈令戍周且謀納魯公也初昭公之孫于齊也齊侯取鄆公至自齊居于鄆齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人高齮貨子猶齮以錦示子猶欲之齮曰魯人買之百兩一布先入幣財子猶受之言於齊侯曰宋元為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死君若待于曲棘使羣臣從魯君以卜焉師有濟也君而繼之無成君無辱焉從之秋會于扈宋衛皆利納公因請之范獻子取貨於季孫謂司城子梁與北宮貞子曰季孫未知其罪而君伐之請囚請亡不獲君弗克而自出也夫豈無備而能出君乎魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圗國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復冬公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出曹悼公卒弟露立是為靖公楚人誅費無極左氏曰郤宛直而和國人説之鄢將師為右領與費無極比而惡之子常賄而信讒無極謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人無以酬之無極曰令尹好甲兵取五甲五兵置諸門令尹必觀從以酬之謂令尹曰吾幾禍子甲在門矣令尹使視郤氏則有甲焉召鄢將師而告之將師退遂令攻郤氏爇之國人弗爇令尹炮之盡滅郤氏之族黨殺陽令終國言未已沈尹戍言於子常曰無極楚之讒人也民莫不知去朝吳出蔡侯朱喪太子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠恭儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗幾及子矣吳新有君疆場日駭國若有大事子其危哉子常殺費無極與鄢將師盡滅其族以説于國謗言乃止晉籍秦來致諸侯之戍六年魯侯如晉次于乾侯左氏曰公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聼使請逆於晉晉人曰天禍魯國君淹恤在外亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復于竟而後逆之鄭定公卒子蠆嗣是為獻公晉六卿殺公族分其邑各使其子為大夫七年殺召伯盈尹固及原伯魯之子王子趙車入于鄻以叛隂不佞討敗之皆子朝之黨八年晉頃公卒子午嗣是為定公左氏曰晉頃公卒鄭遊吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰吳滅徐徐子章禹奔楚左氏曰吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆吳公子使居飬莠尹然左司馬沈尹戌城之取於城父與胡田以與之將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又強其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濱不與姬通今而始大比于諸華光又甚文將自同於先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉楚子弗聽吳子怒執鍾吾子遂伐徐防山以水之滅徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戍帥師救徐弗及遂城夷使徐子處之吳子問伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸楚必道敝亟肄以罷之多方以誤之既罷然後以三軍繼之必大克之闔廬從之楚於是乎始病九年十有二月辛亥朔日有食之十年吳伐越左氏曰史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶王使富辛石張如晉晉韓不信齊高張宋仲幾魯仲孫何忌衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周左氏曰王使富辛與石張如晉請城成周天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不皇啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望歲懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父使伯父實重圗之俾我一人無徵怨于百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告於諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周士彌牟營成周計丈數揣高卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以令役於諸侯屬役賦丈書以授帥而效諸劉子韓簡子臨之以為成命魯昭公卒于乾侯季孫意如廢世子而立公子宋是為定公左氏曰昭公二十九年春公至自乾侯處于鄆齊侯使高張來唁稱主君子家子曰齊卑君矣君祗辱焉公如乾侯平子每歲賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公思於魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之以公衍為大子晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如會晉荀躒於適歷荀躒曰寡君使躒謂吾子何故出君周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命若得從君而歸則固臣之願也敢有異心季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒討於意如意如不敢逃死君其入也公曰君惠顧亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退謂季孫子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸三十二年公在乾侯取闞十有二月公薨明年夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聼命焉子家子不見叔孫叔孫請見子家子辭叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聼子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從者皆自壞隤反秋七月葬昭公於墓道南孔子之為司寇也溝而合諸墓十有一年魯定公元晉人執宋仲幾左氏曰正月城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟各復舊職仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦共職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徵於人宋徵於鬼宋罪大矣且已無辭而抑我以神誣我也必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍十有二年盜殺鞏簡公左氏曰周鞏簡公棄其子弟而好用逺人夏鞏氏之羣子弟賊簡公楚囊瓦伐吳吳敗楚師于豫章十有三年邾莊公卒益立是為隱公衛卜商生十有四年陳惠公卒子栁嗣是為懷公劉子晉侯宋公魯侯蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏會于召陵侵楚諸侯盟于臯鼬劉文公卒左氏曰蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於楚子楚子服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯目拘於司敗曰君以㺯馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以會晉於是乎失諸侯履祥按自二霸以來未有盛於召陵之會臯鼬之盟者劉文公定敬王城成周會十八國之君保夏懷逺攘楚尊王於是在矣乃壞於晉茍寅之取貨不能以義正諸侯而虛為此會也中國於是不復振矣春秋書劉卷卒蓋責之也楚人圍蔡蔡侯以吳子及楚人戰于柏舉楚師敗績吳入郢左氏曰沈人不會召陵晉人使蔡伐之滅沈楚故圍蔡伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無歲不有吳師蔡侯以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅𡨕厄子濟漢而伐之我自後擊之既謀而行史皇謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰乃濟漢而陳三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡説陳于柏舉夫槩晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之必奔而後大師繼之必克以其屬五千先擊子常之卒卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死吳從楚師五戰及郢楚子取其妹季芉畀我以出涉睢吳入郢以班處宫子山處令尹之宫夫槩欲攻之懼而去之夫槩入之左司馬戍及息而還敗吳師于雍澨三戰皆傷吳句卑剄而褁之藏其身而以其首免楚子濟江入于雲中盜攻之以戈擊之王孫由于以背受之楚子奔鄖鍾建負季芉以從鄖公辛之弟懷曰平王殺吾父昭十四年楚平殺蔓成然我殺其子不亦可乎辛曰君討臣誰敢讐之違強陵弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也鬪辛與其弟巢以楚子奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奬天𠂻君之惠也漢陽之田君實有之隨人辭曰以隨之辟小而密邇於楚楚實存之世有盟誓若難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聼命吳人乃退子西為王輿服以保路國于脾泄聞楚子所在而後從之初伍員與申包胥友其亡也謂申包胥曰我必復楚國包胥曰子能復之我必能興之及楚子在隨申包胥如秦乞師秦伯使辭焉曰子姑就館將圗而告對曰寡君越在草莽下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出明年申包胥以秦師至使楚人先與吳人戰而自稷會之吳師敗吳子乃歸榖梁氏曰壞宗廟徙陳器撻平王之墓君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻蓋有欲妻君之母者列女傳曰楚平伯嬴者昭王之母也吳入郢昭王亡吳王闔廬盡妻其後宫次至伯嬴伯嬴持刀曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端是以明王之制使男女不親授坐不同席食不共器殊椸枷異巾櫛所以絶之也若諸侯外淫者絶卿大夫外淫者放士庶人外淫者宫割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絶天子之所誅也今君王棄儀表之行縱亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱者不如死而榮於是吳王慙遂退舍伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復左氏曰吳之入楚也使召陳懷公懷公召國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逢滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝于兵暴骨如莽而未見德焉天其或者正訓楚也禍之適吳其何日之有陳侯從之吳言偃生御批資治通鑑綱目前編卷十六
