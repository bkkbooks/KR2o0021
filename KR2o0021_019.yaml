body:
  text: 欽定四庫全書御批資治通鑑綱目前編舉要卷一陶唐氏帝堯甲辰元載乃命羲和用邵氏經世厯漢晉天文志春秋文耀鉤尚書修二載定閏法用尚書朱子小傳修七載麒麟遊藪澤用路史修十有二載巡狩用家語路史修甲子二十有一載甲申四十有一載虞舜生於諸馮用經世張氏紀年修五十載帝遊於康衢用列子修六十載舜以孝聞用史紀本紀胡氏皇王大紀修六十有一載洪水咨四嶽舉鯀俾乂用尚書修六十有九載鯀績用弗成用尚書修七十載舉舜登庸用尚書及竹書紀年修謹徽五典納于百揆用尚書左傳修賔于四門流凶族殛鯀于羽山放歡兜于崇山用尚書左傳莊子釋文修七十有二載舜納于大麓使禹平水土用尚書史記本紀修益掌火棄教民播種契為司徒用孟子修丙辰七十有三載薦舜于天舜受終于文祖用尚書孟子經世張氏紀年修七十有四載巡狩用尚書修流共工于幽洲用尚書左傳莊子釋文修七十有六載竄三苖于三危用尚書左傳莊子釋文修八十載禹告成功用尚書大紀修甲子八十有一載肇十有二州用尚書吳越春秋胡氏大紀甲子紀例修封伯禹於有夏封四嶽於有吕用國語修加賜伯益用史記秦紀及索隱修封契於商用商頌史記本紀及索隱修封棄於邰用大雅史記本紀修九十載癸未一百載帝乃徂落用尚書修甲申百有一載乙酉百有二載舜避於南河之南用孟子張氏紀年大紀朱子文集修有虞氏帝舜丙戌元載月正元日格于文祖咨二十有二人用尚書修禹臯陶相與陳謨用史紀本紀修巡狩四嶽八伯用尚書大傳修三載考績用尚書修五載簫韶樂成用尚書及大傳修六載巡狩用尚書大傳修七載作大唐之歌用尚書大傳修九載三考黜陟幽明庶績咸熙分北三苗用尚書孔氏疏蘇氏古史修十有四載帝作歌用尚書及大傳修十有五載帝載歌用尚書大傳修十有六載九敘惟歌用尚書及大傳修丁巳三十有二載帝命禹總師用尚書及經世紀年修三十有三載正月朔旦禹受命于神宗率百官若帝之初用尚書修帝命禹敘洪範九疇用尚書大傳修復九州用經世厯修三十有五載咨禹征有苗用尚書路史修甲子三十有九載午會始此用邵氏經世修癸酉四十有八載帝陟方乃死用尚書史記本紀修甲戍四十有九載乙亥五十載禹避於陽城用孟子路史修夏后氏大禹丙子元嵗春正月即位會諸侯于塗山用稽古録經世厯大紀修二嵗臯陶薨用史記本紀路史修薦益於天用孟子修三嵗考功用吳越春秋修五嵗巡狩用吳越春秋漢書説苑修八嵗巡江南戮防風氏崩于會稽用國語史記本紀越外傳修甲申后啓元嵗二嵗益避於箕山之隂用孟子大紀越絶書修三嵗大戰于井用孔氏書傳楚辭修九嵗王崩子太康踐位用史記本紀經世修癸巳太康元嵗尸位用尚書修十有九嵗畋于洛表羿拒于河五弟御母以從遂都陽夏用尚書路史薛氏書傳修二十有九嵗王崩于陽夏弟仲康立用尚書路史修壬戌仲康元嵗肇位四海命胤侯掌六師用尚書修季秋月朔辰弗集于房用唐大衍厯日度議修胤侯承王命征羲和用尚書經世修甲子三嵗羿滅伯封用大紀修十有三嵗王崩子相踐位用經世修乙亥后相元嵗征畎夷用竹書修二嵗征黃夷用竹書修七嵗于夷來賓畎夷來賔用竹書東漢書修八嵗寒浞殺羿用左傳孟子路史離騷修二十有八嵗寒浞使其子澆弒王于帝丘后緡歸于有仍靡奔有鬲氏用左傳經世汲郡古文修癸卯少康元嵗相后緡生少康于有仍用經世大紀修甲子二十有二嵗少康自有仍奔虞用大紀修壬午四十嵗靡自有鬲氏收二斟之衆滅寒浞立少康王滅澆于過使季杼滅豷于戈復禹之績用左傳經世修方夷來賓用竹書修六十有一嵗王崩子季杼踐位用經世修少子無余封於越用吳越春秋修甲辰后杼元嵗五嵗征東海伐二夀用竹書路史修十有七嵗王崩子槐踐位用經世修辛酉后槐元嵗三嵗東九夷來御用路史修甲子四嵗二十有六嵗王崩子芒踐位用經世路史修丁亥后芒元嵗以玄圭賓于河路史乃東狩于海用路史修十有八嵗王崩子泄踐位用經世路史修乙巳后泄元嵗命東夷命西羌用竹書路史東漢書修十有六嵗王崩子不降踐位用經世大紀修辛酉后不降元嵗甲子四嵗六嵗伐九苑用路史修五十有九嵗王崩弟扄立用經世路史修庚申后扄元嵗甲子五嵗二十有一嵗王崩子厪踐位用經世路史修辛巳后厪元嵗二十有一嵗王崩不降之子孔甲立用經世修壬寅后孔甲元嵗三嵗甲子二十有三嵗戊辰二十有七嵗商主癸生子履用世紀修三十有一嵗王崩子臯踐位用經世修癸酉后臯元嵗十有一嵗王崩子發踐位用經世路史修甲申后發元嵗諸夷賓于王門用竹書修十有九嵗王崩子癸踐位用經世史記本紀修癸卯后癸元嵗甲子二十有二嵗公劉遷于豳用大紀例改入據漢書劉敬傳路史修三十有三嵗伐蒙山有施氏進妹喜用經世修三十有五嵗商主癸薨子履嗣用經世修湯始居亳用經世大紀張氏紀年修戊寅三十有六嵗商湯元商湯征葛用經世孟子修三十有七嵗商湯進伊尹用經世世紀路史孟子修四十嵗伊尹復歸于亳用經世書序修四十有二嵗囚商湯于夏臺已而釋之用經世史記本紀大紀修五十有一嵗太史令終古出奔商用淮南子大紀修甲午五十有二嵗用經世修乙未商王成湯十有八祀用大紀修王伐桀放之于南巢用尚書外紀修仲虺作誥用尚書修王歸自夏誕告萬方用尚書修三月王至東郊諸侯論功罪立禹後與聖賢古有功者之後封孤竹等國各有差用左傳世紀史記索隱等書修大旱用管子荀子淮南子漢書禮記疏大紀修十有九祀大旱用管子荀子淮南子漢書禮記疏大紀修二十祀大旱夏桀死于亭山用管