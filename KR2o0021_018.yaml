body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十八周敬王三十有九年魯人獲麟左氏曰西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之公羊氏曰麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反𬒮拭面涕沾袍曰吾道窮矣孔子作春秋史記世家曰孔子因史記作春秋上至隱公下訖哀公十四年十二公杜氏曰春秋者魯史記之名周之舊典禮經也周德既衰官失其守上之人不能使春秋昭明赴告䇿書諸所注記多違舊章仲尼因魯史䇿書成文考其真偽而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史不必改也據公羊經止獲麟麟鳯五靈王者之嘉瑞也今麟出非其時虛其應而失其歸此聖人所為感也絶筆於獲麟之一句者所感而起固所以為終也孟子曰世衰道微邪説暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋春秋天子之事也故孔子曰知我者其惟春秋乎罪我者其惟春秋乎昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼史記曰聞之董生撥亂世反之正莫近於春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰差之毫釐繆以千里故臣弒君子弒父非一旦一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通春秋之義則必蒙首惡之名為人臣子而不通春秋之義則必陷篡弒誅死之罪其實皆以為善為之而不知其義周子曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死於前所以懼生者於後也程子曰天之生民必有出類之才起而君長之治之而爭奪息道之而生飬遂教之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣夫子當周之末世以聖人不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之傳曰遊夏不能贊一辭辭不待贊也言不能與於斯耳斯道也惟顔子嘗聞之矣行夏之時乘殷之輅服周之冕樂則韶舞此其凖的也後世以史視春秋謂褒善貶惡而已至於經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其微辭隱義時措從宜者為難知也或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用於一事一義而欲窺聖人之用心非上智不能也故學春秋者必優遊涵泳默識心通然後能造其微也後王知春秋之義則雖德非禹湯尚可以法三代之治矣履祥按春秋之書夫子之所寓意非夫子之有意也太史公有意妄慕孔子上自五帝迄于麟止作為史記猶網羅遺聞求十二諸侯譜以盡諸國世家始末使夫子而有意於褒貶天下之諸侯大夫以成天下之書則必訪周室外史之藏論史記舊聞總諸國是非之故不使其有所遺佚止於一國之史也今乃不然獨因魯史修之蓋夫子因見魯史書法非舊是非失真舉其大者就加筆削其他比事而書國史之常必不盡改而舊史之外亦無增加至於襄昭而後國史未盡出或事所未審或人已共知如楚子麇卒之類不待刪削固不盡改也杜氏所謂上之人不能使春秋昭明記注多違舊章蓋謂春秋藏於史官人所不知而又典禮非舊自經夫子之手則典禮著明是非各得其所學者傳之於是天下亂臣賊子皆知所懼後之有國者有所據以為賞罰作史者有所守以為是非姦雄者有所懼而不敢肆遂與禹抑洪水周公兼夷驅獸同功蓋聖人功化之妙自如此爾自漢以來言春秋者一事一字而曲為之説則又鑿矣齊陳恆與闞止爭政殺之執簡公置于舒州左氏曰齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之諸御鞅言於公曰陳闞不可並也弗聼子我夕陳逆殺人逢之執以入陳氏方睦使疾而遺之酒肉醉守者殺之而逃陳豹為子我臣與之言政説謂之曰我盡逐陳氏而立女對曰我逺於陳氏矣且違者不過數人何盡逐焉遂告陳氏子行曰陳逆彼得君弗先必禍子子行舍於公宫成子兄弟四乘如公子我在幄出逆之遂入閉門侍人禦之子行殺侍人公與婦人飲酒于檀臺成子遷諸寢公將擊之子餘曰非不利也將除害也成子出舍於庫聞公猶怒將出子行抽劒乃止子我歸屬徒攻闈與大門皆不勝乃出陳氏追之豐丘人執之以告殺諸郭關執公于舒州公曰吾早從鞅之言不及此五月庚申朔日有食之宋向魋謀弒其君不克入于曹以叛自曹出奔衛向巢奔魯司馬牛致其邑而適齊左氏曰宋桓魋之寵害於公公將討之未及魋先謀公公知之告皇野曰魋將禍豫請即救司馬子仲以君命召左師魋之兄向巢也至告之故對曰魋之不共宋之禍也敢不唯命是聼請瑞焉以命其徒攻桓氏魋欲入子車止之曰不能事君而又伐國民不與也祗取死焉魋遂入于曹以叛使左師巢伐之亦入于曹向魋奔衛公文氏攻之奔齊向巢奔魯宋公使止之巢辭曰臣之罪大盡滅桓氏可也若以先臣之故而使有後君之惠也若臣則不可以入矣論語曰司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也集注曰牛之兄向魋作亂牛憂其為亂而將死也左氏曰司馬牛致其邑與圭而適齊向魋出於衛而奔齊陳成子使魋為卿司馬牛又致其邑焉而適吳吳人惡之而反趙簡子召之陳成子亦召之卒於魯郭門之外阮氏葬諸丘輿杜氏曰録其卒葬所在愍賢者失所履祥按向魋之亂司馬牛常以為憂夫子知之有內省不疚之訓矣而又直以無兄弟為憂子夏廣之胡氏病其意圓而語滯夫以牛之髙節人所招致史所愛愍然何以在宋留巢而不留牛適吳又何至為吳人所惡豈吳人所尚異歟不然則牛之所以敬而無失恭而有禮者亦容有所未至耶此亦牛之尚有疚子夏之言或切中其病也齊陳恆弒其君簡公于舒州立其弟驁是為平公孔子請魯侯討之三家不可論語曰陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也程子曰左氏記孔子之言曰陳恆弒其君民之不豫者半以魯之衆加齊之半可克也此非孔子之言誠若此言是以力不以義也若孔子之志必將正名其罪上告天子下告方伯而率與國以討之至於所以勝齊者孔子之餘事也豈計魯人之衆寡哉當是時天下之亂極矣因是足以正之周室其復興乎魯之君臣終不從之可勝惜哉履祥按弒君之賊人得討之孔子告老久矣而兩言從大夫之後則見音現大夫當何如也不敢不告猶湯曰豫畏上帝不敢不正蓋理不可泯而聖人職分不可不舉然兩曰以吾從大夫之後夫子蓋以自任也魯為齊弱其來固久使魯之君臣授之以兵而委其責於夫子則夫子固有處矣惜也夫子暮年有此一事又不得為而天下迄不得蒙聖人之力後世卒不見聖人有為之略深可歎哉魯飢論語曰哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足履祥按哀公之問年飢謂嵗凶而百姓飢餒也用不足謂賦少而國用缺乏也年飢不可加賦而用不足又不可不加賦有若對曰盍徹乎蓋且對年飢一句先以寬民力為重也及哀公有二吾猶不足之言則是因盍徹之對而專憂國用之不足故有子之意謂國家以民力為本民足則君自可與之俱足若民力不足君雖欲獨足其誰與守之則是有國者當以民力為重而已四十年齊髙無丕出奔北燕東萊吕氏大事記解題曰國髙天子之二守也田恆作亂故無丕出奔元王五年犂丘之役無丕復見于傳蓋田氏尋復之也史記年表是年書齊自是稱田氏謂諸侯不復知有齊也自陳敬仲奔齊以陳字為田氏應劭曰田始食邑也鄭伯伐宋晉趙鞅帥師伐衛吕氏曰晉趙鞅嘗納蒯瞶于戚此師其為蒯瞶而舉與齊及魯平子服回如齊端木賜為介齊歸魯侵地左氏曰孟懿子卒成人奔喪弗內袒免哭于衢聽共弗許成叛于齊武伯伐成不克齊陳瓘如楚過衛仲由見之曰天或者以陳氏為斧斤既斫喪公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎子玉曰吾受命矣子使告我弟冬及齊平子服景伯如齊子贛為介陳成子館客曰寡君使恆告曰寡人願事君如事衛君景伯揖子贛而進之對曰寡君之願也昔晉人伐衛齊為衛故伐晉因與衛地自濟以西禚媚杏以南書社五百吳人加敝邑以亂齊因其病取歡與闡寡君是以寒心若得視衛君之事君也則固願也乃歸成熒惑守心史記曰宋景公三十七年熒惑守心心宋之分野也景公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰君者待民曰可移於嵗公曰嵗飢民困吾誰為君子韋曰天髙聽卑君有君人之言三熒惑宜有動於是候之果徙三度四十有一年衛世子蒯瞶自戚入于衛是為莊公其子輒出奔魯衛侯使鄢肸來告左氏曰衛孔圉取大子蒯瞶之姊生悝孔氏之豎渾良夫長而美孔文子卒通於內大子在戚孔姬使之焉大子與之言曰茍使我入獲國服冕乘軒三死無與與之盟為請於伯姬良夫與大子入舍於孔氏之外圃昏二人蒙衣而乘寺人羅御孔氏之老欒寧問之稱姻妾以告遂入適伯姬氏既食孔伯姬杖戈而先大子與五人介輿豭從之迫孔悝於厠強盟之遂劫以登臺欒寧使告季子季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入及門公孫敢門焉曰無入為也季子曰求利焉而逃其難由不然利其祿必救其患有使者出乃入曰大子焉用孔悝雖殺之必或繼之且曰大子無勇若燔臺半必舍孔叔大子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立莊公召獲奉輒奔魯瞞成褚師比出奔宋衛侯使鄢武子告于周曰蒯瞶得罪于君父君母逋竄于晉晉以王室之故不棄兄弟置諸河上天誘其𠂻獲嗣守封焉使下臣肸敢告執事王使單平公對曰肸以嘉命來告余一人往謂叔父余嘉乃成世復爾祿次敬之哉方天之休弗敬弗休悔其可追衛侯飲孔悝酒於平陽而行出奔宋孔子卒于魯左氏曰夏四月己丑孔丘卒公誄之曰旻天不弔不憖遺一老俾屛余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子贛曰君其不沒於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之杜氏曰四月十八日乙丑無己丑己丑五月十二日日月必有誤魯襄公二十二年生至今七十三也禮記曰孔子蚤作負手曳杖消搖於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也豫疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗豫豫殆將死也蓋寢疾七日而沒孟子曰昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子遊以有若似聖人欲以所事孔子事之強曽子曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已史記曰孔子葬魯城北泗上弟子及魯人往從冡而家者百有餘室因命曰孔里魯世世相傳以嵗時奉祠孔子冢而諸儒亦講禮鄉飲大射於孔子冡故所居堂弟子後世因廟藏孔子衣冠琴車書皇覽曰冡去城一里塋百畝冡南北十步東西十三步髙一丈二尺前以瓴甓為祠壇方六尺與地平塋樹以百數皆異種傳言弟子異國人各持其方樹來種柞枌雒籬安貴五味毚檀之木不生荆棘刺人之草楚公孫勝殺令尹公子申司馬公子結執楚子置于髙府陳人侵楚沈諸梁率方城外人討勝誅之迎楚子復位左氏曰楚大子建之遇讒也奔宋又奔鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木建也請行而期焉鄭人省之得晉諜焉遂殺子木其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊竟使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處吳竟為白公請伐鄭子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讎不逺矣自厲劒子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛吳人伐慎白公敗之請以戰備獻許之遂作亂殺子西子期于朝而劫楚子子西以袂掩靣而死石乞曰焚庫弒王不然不濟白公曰不可弒王不祥焚庫無聚將何以守乞曰有楚國而治其民以敬事神可以得祥且有聚矣弗從葉公在蔡方城之外皆曰可以入矣子髙曰以險徼幸者其求無饜偏重必離聞其殺齊管修也而後入白公欲以子閭為王不可劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將專利以傾王室不顧楚國有死不能遂殺之而以楚子如髙府石乞尹門圉公陽穴宫負楚子以如昭夫人之宫葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾若見君靣是得艾也其亦夫有奮心猶將旌君以徇於國而又掩靣以絶民望乃免胄而進遇針尹固帥其屬將與白公子髙曰棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之生拘石乞而問白公之死對曰余知其死所而長者使余勿言曰不言將烹乞曰事克則卿不克則烹固其所也乃烹石乞沈諸梁兼二事國寧乃使寧為令尹子西子使寬為司馬子期子而老於葉衛侯逐大叔遺遺奔晉左氏曰衛侯占夢嬖人求酒於大叔僖子不得與卜人比而告公曰君有大臣在西南隅弗去懼害乃逐大叔遺遺奔晉四十有二年越子伐吳敗之于笠澤國語曰越子句踐即位三年興師伐吳戰于五湖不勝棲於會稽用范蠡計令大夫種行成於吳曰請士女女於士大夫女女於大夫隨之以國家之重器吳人不許大夫種來而復往曰請委管籥屬國家以身隨之君王制之吳人許諾越子曰蠡為我守於國對曰四封之內百姓之事蠡不如種也四封之外敵國之制立斷之事種不如蠡也越子曰諾令大夫種守於國與范蠡入宦於吳三年而吳人遣之句踐之地南至于句無北至于禦兒東至于鄞西至于姑蔑廣運百里乃致其父母昆弟而誓之曰寡人聞古之賢君四方之民歸之若水之歸下也今寡人不能將帥二三子夫婦以蕃命壯者無取老婦老者無取壯妻女子十七不嫁其父母有罪丈夫二十不取其父母有罪將免者以告公醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼當室者死三年釋其政支子死三月釋其政必哭泣葬埋之如子令孤子寡婦貧病者納宦其子其逹士潔其居美其服飽其食而摩厲之於義四方之士來者廟禮之句踐載稻與脂於舟以行國之孺子之遊者無不餔也無不啜也必問其名非其身之所種則不食非其夫人之所織則不衣十年不收於國民居有三年之食吳子夫差還自黃池息民不戒越大夫種曰吾謂吳王將遂涉吾地今罷師而不戒以忘我我不可以怠今吳民既罷而大荒荐飢市無赤米而囷鹿空虛其民必移就蒲螺於東海之濵王若今起師以會奪之利無使失悛夫吳之邊鄙逺者罷而未至吳王將恥不戰必不須至之會也而以中國之師與我戰我遂踐其地其至者亦將不能之會也已吾用禦兒臨之吳王若愠而又戰幸遂可出若不戰而結成王安厚取名而去之越子曰善乃大戒師伐吳吳子起師軍于江北越子軍于江南越子乃中分其師以為左右軍以其私卒君子六千人為中軍明日將舟戰於江及昏乃令左軍銜枚泝江五里以須亦令右軍銜枚踰江五里以須夜中乃命左軍右軍涉江鳴鼓中水以須吳師聞之大駭曰越人分為二師將以夾攻我師乃不待旦亦中分其師將以禦越越子乃令其中軍銜枚潛涉不鼓不譟以襲攻之吳師大北越之左軍右軍乃遂涉而從之又大敗於沒吕氏曰國語載此戰與圍吳相接按左傳後四年越乃圍吳以大夫種始謀考之必姑結成而退至於再舉始圍吳也晉趙鞅圍衛齊國觀陳瓘救衛晉師還左氏曰趙鞅使告于衛曰君之在晉也志父為主請君若大子來以免志父不然寡君其曰志父之為也衛侯辭以難大子又使椓之鞅圍衛齊國觀陳瓘救衛得晉人之致師者子玉使服而見之曰國子實執齊柄而命瓘曰無辟晉師子又何辱簡子曰我卜伐衛未卜與齊戰乃還楚滅陳殺陳湣公左氏曰楚白公之亂陳人恃其聚而侵楚楚既寧將取陳麥卜之武城尹子西子公孫朝也吉使帥師取陳麥陳人御之敗遂圍陳秋滅陳史記曰楚惠復國以兵北伐殺陳湣公楚滅陳而有之舜之德可謂至矣禪位於夏而後世血食者歷三代及楚滅陳而田常得政於齊卒為建國晉趙鞅復伐衛衛人出其君蒯瞶而與晉平晉立公孫般師莊公死于戎州巳氏左氏曰衛侯謂渾良夫曰吾繼先君而不得其器若之何良夫代執火者而言曰疾與亡君皆君之子也召之而擇材焉可也若不材器可得也豎告大子大子使五人輿豭劫公而強盟之且請殺良夫公曰其盟免三死曰請三之後有罪殺之公曰諾哉衛侯為虎幄於籍圃求令名者而與之始食焉大子請使良夫良夫乘衷甸兩牡紫衣狐裘至袒裘不釋劒而食大子使牽以退數之以三罪而殺之衛侯夢于北宫見人登昆吾之觀被髮北靣而譟曰登此昆吾之虛綿綿生之瓜余為渾良夫呌天無辜衛侯貞卜其繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰冬晉復伐衛入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出初公登城以望見戎州問之以告公曰我姬姓也何戎之有焉翦之公使匠久欲逐石圃未及石圃因匠氏攻公公闔門而請弗許踰于北方而隊折股戎州人攻之大子疾公子青踰從公戎州人殺之公入于戎州己氏初公自城上見己氏之妻髮美使髠之以為吕薑髢既入焉而示之壁曰活我我與女璧己氏曰殺女璧其焉往遂殺之衛人復公孫般師而立之齊人伐衛立公子起執般師而歸齊侯魯侯盟于蒙左氏曰公會齊侯盟于蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首甲子四十有三年衛石圃逐其君起起奔齊衛出公輒自齊復歸逐石圃復石魋與大叔遺齊陳恆殺鮑氏晏氏及公族之強者割齊安平以東至琅琊為封邑史記曰田常既殺簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使修功行賞親於百姓以故齊復定田常言於齊平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田常田常於是盡殺鮑晏及公族之強者而割齊自安平以東至琅琊自為封邑大於平公之所食秦悼公卒子嗣是為厲共公四十有四年越人侵楚楚公子慶公孫寬追越師不及左氏曰越以誤吳也楚沈諸梁伐東夷三夷男女及楚師盟于敖吕氏曰報越之侵也三夷越之屬也言男女無君長也王崩大子仁踐位吳伐楚吕氏曰為越所驕也楚世家書吳夫差強陵齊晉來伐楚魯叔青來京師丙寅元王元年齊人魯人鄭人會于廪丘左氏曰齊人來徴會夏會于廪丘為鄭故謀伐晉鄭人辭諸侯秋師還杜氏曰晉公室卑吳子殺公子慶忌左氏曰吳公子慶忌驟諫吳子曰不改必亡弗聼出居于艾遂適楚聞越將伐吳請歸平越遂歸欲除不忠者以説于越吳人殺之吕氏曰慶忌以勇聞於諸侯世之言慶忌者多異當以左氏為正越圍吳國語曰越子伐吳吳人出挑戰一日五反越子欲許之范蠡曰古之善用兵者贏縮以為常四時以為紀無過天極究數而止天道皇皇日月以為常明者以為法微者則是行陽至而隂隂至而陽日困而還月盈而匡古之善用兵者因天地之常與之俱行後則用隂先則用陽後無隂蔽先無陽察用人無藝往從其所剛強以禦陽節不盡不死其野彼來從我固守勿與若將與之必因天地之災又觀其民之飢飽勞逸以參之盡其陽節盈吾隂節而奪之利宜為人客剛強而力疾陽節不盡輕而不可取宜為人主安徐而重固隂節不盡柔而不可迫凡陳之道設右以為牝益左以為牡蚤晏無失必順天道周旋無究今其來也剛強而力疾王姑待之越子曰諾弗與戰居軍三年吳師自潰吕氏曰越語下篇所載范蠡之詞多與管子勢篇相出入在管子十五卷辭氣竒峻不類春秋時語意者戰國之初為管仲范蠡之學者潤色之然圍之三年以待其衰必蠡之謀也晉定公卒子錯嗣是為出公晉趙簡子卒立其次子無恤襄子按世家趙武生景叔景叔生簡子鞅鞅生無恤司馬公通鑑曰趙簡子之子長曰伯魯幼曰無恤將置後不知所立乃書訓戒之辭於二簡以授二子曰謹識之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤為賢立以為後以無恤為後在敬王二十年簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其户數簡子謂無恤曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸國語載此事在鐡之戰前則在敬王二十七年之前也蜀聘于秦吕氏曰蜀見於牧誓地與秦接秦記書蜀人來賂賂即聘也聘必有幣秦用夷不能盡行聘禮故其國史凡聘皆謂之賂晉荀瑶伐鄭取九邑吕氏曰荀瑶智伯也通鑑曰初智宣子將以瑶為後智果曰不如宵也瑶之賢於人者五其不逮者一也美鬚長大則賢射御足力則賢技藝畢給則賢巧文辨慧則賢強毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聽智果别族於大史為輔氏此事在前今以荀瑶初見於史故原其始二年晉趙無恤使楚隆如吳大事記在元王元年按史記世家在襄子元年則元王之二年也左氏曰越圍吳趙孟降於喪食楚隆曰三年之喪親昵之極也主又降之無乃有故乎趙孟曰黃池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之非晉之所能及也吾是以為降楚隆曰若使吳知之若何趙孟曰可乎隆曰請嘗之乃往先造于越軍曰吳犯間上國多矣聞君親討焉諸夏之人莫不欣喜請入視之許之告于吳子曰寡君之老無恤使陪臣隆敢展謝其不共黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之吳子拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱句踐將生憂寡人寡人死之不得矣又曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言曰宜哉晉趙無恤滅代史記曰襄子姊前為代王夫人簡子既葬未除服北登夏屋夏屋山在今代州鴈門縣東北三十五里與句注山相接乃北方之險請代王使厨人操銅枓以食代王及從者行斟隂令宰人各以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山山在今蔚州飛狐縣東北百五十里魏土地記所載死事甚詳與此不同見史記正義遂以代封伯魯子周為代成君伯魯者襄子兄故太子太子蚤死故封其子吕氏曰代北狄之别也世家曰翟犬代之先也其國在今蔚州襄子聞新稚狗之勝見國語而能戒念伯魯之廢而傳國於其子可謂有君子之資矣至於夏屋之役行如虎狼獨何歟蓋生於兼并無親之國而承簡子貪暴之規模遂以為臨大利決大計非用仁義之所也悠悠千載同陷一見豈不哀哉履祥按代今蔚代二州之地也夫結吳固簡子之盟而考之世家則取代亦簡子之志也簡子託之夢帝以賜代託之寶符而示無恤以取代為是立無恤也無恤居喪念簡子之志為吳之圍而降食為代之利而詐擊之可謂能成父之志矣然救吳善也而以力不及辭之滅代惡也則盡心力而為焉成其惡而不成其善是安得為繼志之孝乎越人聘于魯又聘于齊左氏曰越人始來杜氏曰越既勝吳欲霸中國始遣使適魯史記年表齊平公七年越人始來齊侯魯侯邾子盟于顧左氏曰齊人責稽首因歌之曰魯人之臯數年不覺使我髙蹈臯與蹈叶唯其儒書以為二國憂書與憂叶是行也公先至于陽榖三年越人納邾子益於邾大子革奔越左氏曰邾隱公自齊奔越曰吳為無道執父立子越人歸之大子革奔越越滅吳吳子夫差自殺國語曰越師遂入吳國夫差帥其賢良與其重祿以上姑蘇越圍王臺夫差懼使王孫雄行成於越曰昔不榖先委制於越君君告孤請成男女服從孤無奈越之先君何畏天之不祥不敢絶祀許君成以至于今今孤不道得罪於君王君王以親辱於敝邑孤敢請成男女服為臣御句踐弗忍將許之范蠡進諫曰聖人之功時為之庸得時弗成天有還形天節不逺五年復反小凶則近大凶則逺伐柯者其則不逺今君王不斷其忘會稽之事乎乃不許使者往復來辭愈卑禮愈尊句踐又欲許之蠡曰孰使我蚤朝而晏罷者非吳乎與我爭三江五湖之利者非吳邪十年謀之一朝而棄之其可乎王姑勿許其事將易兾巳句踐曰吾欲勿許而難對其使者子其對之蠡乃左提鼓右援枹以應使者曰昔天以越賜吳而吳不受今天以吳賜越越敢不聼天之命而聽君之令乎乃不許成因使人告于夫差曰天以吳賜越孤不敢不受以民生之不長王其無死民生於地上寓也其與幾何寡人其逹王於甬句東注曰今句章東海口外洲也夫婦三百唯王所安以沒王年夫差辭曰寡人禮先一飯君若不忘周室而為敝邑宸宇亦寡人之願也君若曰吾將殘汝社稷滅汝宗廟寡人請死吾何靣目以視於天下乎夫差將死曰使死者無知則巳若其有知吾何靣目以見員也乃縊越人以歸吳自太伯至夫差二十五世今日本國亦云吳太伯之後蓋吳亡其子孫支庶入海為倭也越子會齊晉及諸侯于俆州世家曰句踐已平吳乃以兵北渡淮與齊晉諸侯會於俆州吕氏曰俆州即舒州也字從人音舒越人致貢王賜越子胙命為伯世家曰致貢於周周元王使人賜句踐胙命為伯吳越春秋曰句踐乃使使號令齊楚秦晉皆輔周室血盟而去秦不如越之命句踐乃選吳越將士西渡河以攻秦軍士苦之會秦怖懼逆自引咎越乃還軍越子以江北地至泗上與楚以泗東地與魯歸吳所侵宋地世家曰句踐已會渡淮而南以淮上地與楚又與魯泗東方百里歸吳所侵地於宋越兵橫行於江淮東諸侯畢賀號稱霸王外紀曰越索卒於楚而攻晉左史倚相謂楚子曰越已破吳豪士死鋭卒盡大甲傷索兵攻晉示我病也不如起師與之分吳楚子曰善起師從之越伯怒將擊楚文種曰我􅉵矣與戰必不克不如賂之乃割露山之西五百里以與楚履祥按左史倚相見於楚靈之末歷平昭惠而今尚在是及見春秋以後也舊云左氏傳丘明所作前儒非之謂左丘姓而明名其人於夫子年輩為先此左氏非左丘明也文公疑左氏乃左史之氏意楚左史椅相之徒為之其信然乎越范蠡去越越伯殺其大夫文種大事記曰按史記國語范蠡與句踐深謀二十餘年竟滅吳北渡兵於淮以臨齊晉反國蠡以為大名之下難以久居且句踐可與同患難與處安及至五湖辭於句踐曰君王勉之臣不復入越國矣句踐曰不榖疑子之所謂者何也對曰臣聞之為人臣者君憂臣勞君辱臣死昔者王辱於會稽臣所以不死者為此事也今事已濟矣蠡請從會稽之罰句踐曰所不掩子之惡揚子之美者使其身無終沒於越國子聽吾言與子分國不聽吾言身死妻子為戮范蠡對曰臣聞命矣君行制臣行意遂乘輕舟以浮於五湖莫知其所終極史記曰范蠡去自齊遺大夫種書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸烏喙可與共患難不可與共安樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劒曰子教寡人伐吳七術寡人用其三而敗吳其四在子子為我從先王試之種自殺四年晉荀瑶告伐齊左氏曰晉荀瑶伐齊髙無丕帥師御之知伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢耀武也治英丘也以辭伐罪足矣何必卜戰于犂丘齊師敗績知伯親禽顔庚吕氏曰知伯賢於人者五犂丘之役見其三焉馬駭驅之親禽顔庚射御足力也拒長武子之辭巧文辨慧也決戰不卜強毅果敢也告於天子卜之守龜春秋之末猶如此魯叔青如越越諸鞅聘魯蔡成侯卒子産嗣是為聲侯楚人聘于秦五年晉侯及魯臧石伐齊取廪丘左氏曰晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取榖宣叔以晉師伐齊取汶陽寡君欲徼福於周公願乞靈於臧氏臧石帥師會之取廪丘軍吏令繕將進萊章曰君卑政暴往嵗克敵今又勝都天奉多矣又焉能進是躗言也役將班矣晉師乃還餼臧石牛大史謝之曰以寡君之在行牢禮不度敢展謝之越人執邾子以歸立公子何左氏曰邾子又無道越人執之以歸而立公子何何亦無道魯侯以公子荆之母為夫人荆為大子左氏曰公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為大子國人始惡之魯侯朝于越左氏曰公如越得大子適郢大子名也將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止吕氏曰嚭亡吳者也句踐不以為首誅而又寵秩之其不終伯也宜哉履祥按史記吳世家越滅吳誅大宰嚭以為不忠而左氏傳宰嚭復見於越為魯納賂二書必有一誤當以左氏為正句踐謂欲赦吳而范蠡卒滅之然范蠡得西施也以色而句踐之用宰嚭也以財與是又五伯之罪人也義渠聘秦六年衛侯輒出奔宋左氏曰初衛人翦夏丁氏以其帑賜彭封彌子彌子飲公酒納夏戊之女嬖為夫人其弟期大叔疾之從孫甥也少畜於公以為司徒夫人寵衰期得罪公之入也奪南氏邑奪司寇亥政使侍人納公文懿子之車于池使優狡盟拳彌而甚近信之使三匠久為靈臺于籍圃與諸大夫飲酒焉褚師聲子襪而登席公怒辭曰臣有疾異於人若見之君將殼之是以不敢公愈怒大夫辭之不可褚師出公戟其手曰必斷而足聞之與公孫彌牟公文要司寇亥司徒期因三匠與拳彌以作亂使拳彌入于公宫而自大子疾之宫譟以攻公鄄子士請禦之彌援其手曰不見先君乎君何所不逞欲且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也乃出將適蒲彌曰晉無信不可將適鄄彌曰齊晉爭我不可將適泠彌曰魯不足與請適城鉏以鉤越越有君乃適城鉏彌曰衛盜不可知也請速自我始乃載寶以歸公為支離之卒因祝史揮以侵衛衛人病之懿子知之請逐揮曰彼好專利而妄夫見君之入也將先道焉若逐之必出於南門而適君所夫越新得諸侯將必請師焉揮在朝遣諸其室乃館諸外里遂有寵使如越請師魯侯自越反左氏曰六月公至自越季康子孟武伯逆於五梧郭重僕見二子曰惡言多矣君請盡之公宴於五梧武伯為祝惡郭重曰何肥也季孫曰請飲彘也以魯國之密邇仇讎臣是以不獲從君克免於大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡七年越臯如后庸宋樂茷魯叔孫舒伐衛納衛侯輒衛人賂之不克納衛人立黚是為悼公左氏曰叔孫舒帥師會越臯如后庸宋樂茷納衛侯文子欲納之文子彌牟懿子曰君愎而虐少待之必毒於民乃睦於子矣師侵外州大獲出禦之大敗掘褚師定子之墓焚之於平莊之上文子使王孫齊私於臯如曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已文子致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出衆曰勿出重賂越人申開守陴而納公公不敢入師還立悼公南氏相之以城鉏與越人公曰期則為此令茍有怨於夫人者報之衛人使司徒期聘於越左氏曰司徒期聘於越為悼公聘公攻而奪之幣期告越伯越伯命取之期以衆取之公怒殺期之甥之為大子者出公自城鉏使以弓問子贛且曰吾其入乎子贛稽首受弓對曰臣不識也私於使者曰昔成公孫於陳寧武子孫莊子為宛濮之盟而君入獻公孫於齊子鮮子展為夷儀之盟而君入今君再在孫矣內不聞獻之親外不聞成之卿則賜不識所由入也詩曰無競惟人四方其順之若得其人四方以為主而國於何有遂卒于越履祥按有子曰本立而道生蒯聵與輒皆非孝子故其所以為國者顛錯妄謬事事足以取亡或謂輒初在國未見過舉其於孔子不失公飬之禮何其再入之多妄也是不然惡莫大於拒父其他小事則輒年齒尚少聽於孔叔而孔叔又聽於季子所以其惡未箸耳宋景公卒大尹立啓六卿逐啓及大尹而立得是為昭公左氏曰宋景公無子取公孫周之子得與啓元公曽孫畜諸公宫未有立焉於是六卿三族降聼政因大尹以逹大尹常不告而以其欲稱君命以令國人惡之公逰於空澤卒于連中大尹興空澤之士千甲奉公自空桐入如沃宫使召六子曰君請六子畫至以甲劫之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啓奉喪殯于大宫三日而後國人知之司城茷使宣言于國曰大尹惑蠱其君而專其利今君無疾而死又匿之是無他矣大尹之罪也六子在唐㿻皆歸授甲使徇于國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之使國人施于大尹大尹奉啓以奔楚乃立得王崩太子介踐位晉荀瑶城宅陽大事記曰水經注竹書紀年晉出公六年荀瑶城宅陽濟瀆之旁有故宅陽城也魏冉攻魏芒卯于北宅乃此地屬滎陽癸酉貞定王元年大事記曰史記作定王介世本司馬貞索隱蘇氏古史並作貞王皇甫謐經世稽古録並作貞定王今姑從稽古録紀年並列衆説以待知者越人使后庸聘魯且言邾田魯侯及越后庸盟于平陽左氏曰越子使后庸來聘且言邾田封于駘上盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰然何不召曰固將召之文子曰他日請念晉荀瑶帥師伐鄭齊陳恆帥師救鄭晉師還左氏曰晉荀瑶帥師伐鄭次于桐丘鄭駟𢎞請救于齊齊師將興陳成子屬孤子三日朝設乘車兩馬繫五邑焉召顔涿聚之子晉曰隰之役而父死焉顔庚以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違榖七里榖人不知及濮雨不涉子思曰國參大國在敝邑之宇下是以告急今師不行恐無及也成子衣製杖戈立於阪上馬不出者助之鞭之知伯聞之乃還曰我卜伐鄭不卜敵齊使謂成子曰大夫陳之自出陳之不祀鄭之罪也楚滅陳此誣故寡君使瑶察陳𠂻焉謂大夫其恤陳乎若利本之顛瑶何有焉成子怒曰多陵人者皆不在知伯其能久乎中行文子曰有自晉師告寅者將為輕車千乘以壓齊師之門成子曰寡君命恆曰無及寡無畏衆雖過千乘敢辟之乎將以子之命告寡君文子曰吾乃今知所以亡君子之謀也始𠂻終皆舉之而後入焉今我三不知而入之不亦難乎履祥按陳常智伯皆專國者其相遇如此學者當考其所以得失成敗之故也魯侯出奔越左氏曰季康子卒公弔焉降禮公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多間公遊于陵阪遇孟武伯於孟氏之衢曰請有問於子余及死乎對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋公如有陘氏因孫于邾乃遂如越魯哀公卒于有山氏魯人立其子寧是為悼公史記曰國人迎哀公復歸卒于有山氏子寧立是為悼公悼公之時三桓勝魯如小侯卑於三桓之家古史曰子貢言哀公不沒於魯而史記稱哀公自越歸卒於有山氏歸於有山而不歸國事未可信也履祥按魯昭公在外非不久魯未嘗别立君也今立其子寧則是哀公沒於外矣未及告立而沒於有山氏事容有之夫不薨於其位猶道死也雖謂之不沒於魯亦可也經世書三桓作難弒其君哀公蓋誅心之法不弒而實弒也二年魯悼公元今本年表在四年大事記辨云在二年經世同三年晉地震四年燕獻公卒孝公立越菼執卒子鹿郢嗣是為鼫與索隱曰紀年云晉出公十年十一月於粵子勾踐卒是為菼執次鹿郢立樂資云越語謂鹿郢為鼫與履祥按勾踐太子左氏作適郢紀年作鹿郢史記作鼫與當以左氏紀年為正鹿與適語訛爾鼫與必其號猶勾踐之號菼執也菼執越語如西域二合之音即華言德云五年晉荀瑶趙無恤帥師圍鄭左氏曰悼之四年晉荀瑶帥師圍鄭未至鄭駟𢎞曰知伯愎而好勝早下之則可行也乃先保南里以待之知伯入南里門于桔柣之門鄭人俘酅魁壘晉士也賂之以知政閉其口而死將門知伯謂趙孟入之對曰主在此知伯曰惡而無勇何以為子對曰以能忍恥庶無害趙宗乎知伯不悛趙襄子由是惎知伯六年晉人楚人聘秦鄭聲公卒子易嗣是為哀公晉河絶于扈八年秦塹阿旁秦伐大荔取其王城大事記曰大荔戎之别種也徐廣曰今之臨晉也按丐奴傳岐梁山涇漆之北有義渠大荔烏氏朐衍之戎外紀曰是時義渠大荔最強築城數十皆自稱王十年越鹿郢卒子不夀嗣是為盲姑十有一年晉荀瑶與趙氏韓氏魏氏分范中行氏之地以為已邑晉侯告于齊魯請伐四卿四卿反攻其君晉侯奔齊晉荀瑶滅夙繇大事記曰夙繇狄國也戰國䇿作厹由知伯欲攻夙繇而無道鑄大鐘方車二軌以遺之夙繇之君斬岸堙溪以迎鐘赤章蔓枝諫曰知伯貪而無信欲攻我而無道今師必隨之君曰大國為歡而子逆之不祥赤章蔓枝曰為人臣不忠貞罪也忠貞不用逺身可也斷轂而行至齊七月而夙繇亡外紀載於此年今從之十有二年晉出公卒于齊荀瑶立昭公曽孫驕是為哀公而專其政史記曰知伯與趙韓魏共分范中行地以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊道死故知伯乃立昭公曽孫驕為晉君是為哀公趙世家作懿公紀年作敬公哀公大父雍晉昭公少子也號戴子戴子生忌忌善知伯早死知伯欲盡并晉未敢乃立忌子驕為君當是時晉國政皆決知伯晉哀公不得有所制知伯遂有范中行地最強蔡聲侯卒子嗣是為元侯晉荀瑶襲衛還三卿宴於藍臺戰國䇿曰知伯欲伐衛遺衛君野馬四百白璧一羣臣皆賀南文子有憂色曰此小國之禮而大國致之君其圖之衛君以其言告邊境知伯果起兵襲衛至境而反曰衛有賢人先知吾謀也已而又欲襲衛亡其大子使奔衛南文子曰大子顔甚有寵亡必有故使人迎之於境曰車過五乘慎勿納知伯乃止南文子公孫彌牟也國語曰還自衛三卿宴于藍臺知襄子戲韓康子而侮假規知國聞之諫曰主不備難必至矣曰難將由我我不為難誰敢興之對曰郤氏有車轅之難趙有孟姬之讒欒有叔祁之訴范中行有函冶之難皆主之所知也夏書曰一人三失怨豈在明不見是圖周書曰怨不在大亦不在小君子能勤小物故無大患今主一宴而耻人之君相又弗備曰不敢興難夫誰不可喜而誰不可懼蚋蛾蜂蠆皆能害人况君相乎弗聽自是五年乃有晉陽之難假規反首難而殺知伯于師晉河水赤三日秦伯帥師與綿諸戰十有三年晉取秦武城史記秦紀曰晉取武城正義曰武城在華州鄭縣東北齊平公卒子積嗣是為宣公陳成子卒子盤代世家自陳完至成子恆七世大事記曰成子陳恆也春秋謂之陳史記謂之田蓋自春秋後遂稱田氏也盤相齊宣公宣公名年表作就田盤世本作班履祥按陳故國田齊之封邑陳未滅之前田氏猶稱陳陳既滅之後田氏遂稱田一國不再興其意蓋削故國之號而圖齊也荀瑶之譏正中其腹心之疾故成子無辭以對而言他十有四年晉荀瑶大治宫室國語曰知襄子為室美士茁夕焉知伯曰室美矣對曰美則美矣抑臣亦有懼也知伯曰何懼對曰臣以秉筆事君志有之曰髙山峻原不生草木松柏之地其土不肥今土木勝臣懼其不安人也室成三年而知氏亡晉荀瑶約魏駒韓虎攻趙無恤無恤奔晉陽經世係此年通鑑曰知伯請地於韓康子康子欲弗與假規曰知伯好利而愎不與將伐我不如與之彼狃於得地必請於他人他人不與必嚮之以兵然則我得免於患而待事之變矣康子曰善乃與之知伯悅又求地於魏桓子桓子欲弗與任章問焉桓子曰無故任章曰無故索地諸大夫必懼吾與之地知伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人知氏之命必不長矣不如與之以驕知伯然後可以擇交而圖之奈何獨以吾為知氏質乎桓子曰善亦與之知伯又求蔡臯狼之地於趙襄子襄子弗與知伯怒帥韓魏之甲以攻之襄子將出曰吾何走乎從者曰長子近且城厚完襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉庫實襄子曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寬也民必和矣乃走晉陽此下通鑑雜取國語史記戰國䇿而文不同今一以通鑑文公所節為正鄭人弒哀公而立聲公之弟丑是為共公十有五年晉荀瑶及韓魏圍晉陽通鑑曰三家圍而灌之城不浸者三板沈竈産蛙民無叛意十有六年晉趙無恤約魏駒韓虎攻荀瑶滅之三分其地通鑑曰知伯行水魏桓子御韓康子驂乘知伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也絺疵謂知伯曰韓魏必反矣知伯曰子何以知之對曰以人事知之夫從韓魏而攻趙趙亡難必及韓魏矣今約勝趙而三分其地城降有日而二子無喜志有憂色是非反而何明日知伯以其言告二子二子曰此讒臣欲為趙氏遊説使主疑二家而懈於攻趙也不然二家豈不利朝夕分趙氏之田而欲為此危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也知伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也知伯不悛趙襄子使張孟談潛出見二子曰臣聞脣亡則齒寒趙亡則韓魏為之次矣二子乃隂與約為之期日而遣之襄子夜使人殺守隄之吏而決水灌知伯軍知伯軍亂韓魏翼而擊之襄子將卒犯其前大敗其衆遂殺知伯滅其族而分其地唯輔果在殺知伯於藍臺之上左氏曰趙襄子惎知伯遂喪之知伯貪而愎故韓魏反而喪之通鑑曰趙襄子漆知伯之頭以為飲器知伯之臣豫讓欲為之報仇乃詐為刑人挾匕首入襄子宫中塗厠左右欲殺之襄子曰知伯死無後而此人欲為報仇真義士也吾謹避之耳讓又漆身為癩吞炭為啞行乞於市其妻不識也其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此讓曰委質為臣而求殺之是二心也吾所以為此者將以愧天下後世之為人臣而懷二心者也後又伏於橋下欲殺襄子襄子殺之履祥按豫子之忠壯矣然猶惜其出燕丹荆軻之計也知伯雖滅亡無後然知開知寬尚據邑未下也以豫子之勇相與殊死豈不足以興復知氏哉而顧死於刺客之靡邪邵子有言死天下之事易成天下之事難既能成之何憚於死乎豫子可謂能死事而已然往古事情又難隃度若開寬二子不能相任不足與有為異時未必有成則反不若今日之死得矣大事記曰假規謂韓康子曰分地必取成臯康子曰成臯石溜之地也寡人無所用之假規曰臣聞一里之厚而動千里之權者地利也千人之衆而破三軍者不意也君用臣言則韓必取鄭矣康子曰善果取成臯至韓之取鄭也果從成臯始趙襄子行賞髙共為上晉陽之難唯共無功功臣皆怒襄子曰方晉陽急群臣皆懈唯共不敢失人臣禮是以先之張孟談既固趙宗告襄子曰五霸之所以致天下者主勢能制臣無令臣能制主故貴為列侯者不令在相位自將軍以上不為近大夫今臣之名顯而身尊權重而衆服臣願捐功名去權勢以離衆襄子悵然曰何哉吾聞輔主者名顯功大者身尊任國者權重此先聖之所以集國家安社稷乎子何為然對曰臣觀成事聞往古臣主之權均能美未之有也君若弗圖則臣力不足愴然有決色乃納地釋事而耕於負親之丘大事記雜取史記戰國䇿外紀今止以大事記為正齊田盤使其宗人盡為齊都邑大夫與三晉通使晉趙無恤使新稚狗伐狄大事記曰按國語列子外紀趙襄子使新稚穆子伐狄勝之取左人中人遽人來告襄子方食而有憂色侍者曰狗之事大矣而主之色不怡何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之德行無所積一朝而兩城下亡其及我哉君子曰趙氏其昌乎夫憂者所以為昌也喜者所以為亡也勝非其難者也持之者其難者也唯有道之主為能持勝外紀載於此年今從之國語此事繼簡子之後外紀係此恐非然别無考十有七年晉知開奔秦大事記曰開荀瑶之族也荀氏自首以來或謂知氏按秦年表晉大夫知開率其邑人來奔十有八年秦左庶長城南鄭大事記曰史失其名庶長秦官見於左傳魯襄公十一年秦記則庶長弗忌當桓王二十二年則秦有此官久矣秦楚變於夷狄不用禮故官名異於他國衛悼公卒子弗嗣是為敬公蔡元侯卒子齊嗣十有九年燕孝公卒載立是為成公二十年越盲姑卒子翁嗣是為朱句越人迎女於秦履祥按此越子翁立而婚於秦也二十有一年晉知寬奔秦大事記曰按秦年表晉大夫知伯寬率其邑人來奔知伯既滅六年而寬始率邑人奔秦或者别守邑而未下若燕將守聊城之類歟二十有二年楚子滅蔡蔡侯齊出亡史記自蔡仲至侯齊二十四世二十有四年楚滅杞大事記曰杞東樓公者夏后禹之後周武王克殷封之於杞自東樓公至簡公春凡十九世楚惠王滅之史記曰舜之後周武王封之陳至楚惠王滅之禹之後周武王封之杞楚惠王滅之契之後為殷殷破周封其後於宋齊湣王滅之后稷之後為周秦昭王滅之臯陶之後或封英六楚穆王滅之伯夷之後至周武王復封於齊曰大公望陳氏滅之伯翳之後至周平王時為秦項羽滅之垂夔龍後不知所封右十人者皆唐虞之際名有功德臣也其五人之後皆至帝王餘乃為顯諸侯古史論曰宋杞皆天子之事守也蓋禮樂車服在焉故孔子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也宋雖不足徴然春秋之際晉楚大國有所不知未嘗不問焉如杞遂至於用夷無足言者昔孔子學官名於郯子郯至微矣而其先王之遺文於諸侯為詳孔子之於夏禮蓋猶有考於杞歟而國無君子不能自列悲夫楚與秦平楚東侵地至于泗史記曰楚滅杞與秦平是時越已滅吳而不能正江淮北楚東侵廣地至泗上二十有五年秦伐義渠執其君以歸晉韓虎魏駒伐伊洛隂戎滅之外紀曰秦伐義渠虜其君是時韓魏共滅伊洛隂戎其遺脫者皆西走踰汧隴自此中國無戎寇惟餘義渠一種焉二十有六年日有食之晝晦星見年表失其月秦厲共公卒子嗣是為躁公二十有八年王崩子去疾踐位弟叔弒之少弟嵬殺叔而立史記本紀曰貞定王崩子去疾立是為哀王三月弟叔襲殺去疾而自立是為思王立五月少弟嵬攻殺思王而自立封弟揭於河南以續周公之職是為河南桓公大事記曰河南即郟鄏周武王遷九鼎周公營以為都是為王城又遷殷民於洛陽下都是為成周平王東遷定都于王城王子朝之亂其餘黨多在王城敬王畏之徙都成周至是考王以王城故地封其弟桓公焉稽古録謂桓公為東周桓公非也平王東遷之後所謂西周者豐鎬也所謂東周者東都也威烈王之後所謂西周者河南也所謂東周者洛陽也河南桓公之時雖未有東西周之名推本而言之謂之西周桓公則可矣何以稱河南為西周自洛陽下都而視王城則在西也何以稱洛陽為東周自河南王城視下都則在東也君陳畢公尹殷民蓋在下都之地今書皆謂之東郊則下都在王城之東明矣秦南鄭反大事記曰水經漢水東過南鄭縣南酈道元注耆舊傳云南鄭之號始於鄭桓公桓公死於犬戎其民南奔故以南為稱即漢中郡治也按本紀秦惠王始取楚漢中置漢中郡今躁公之時已書南鄭反豈地之往來不常先嘗屬秦歟今屬興元府辛丑考王元年二年晉哀公卒子栁嗣是為幽公四年晉侯反朝于韓趙魏氏晉獨有絳曲沃史記曰幽公之時晉畏反朝韓趙魏獨有絳曲沃餘皆入三晉六年夏六月雪日有食之年表失其月七年燕成公卒閔公立八年彗星見九年楚惠卒子中嗣是為簡衛敬公卒子糾嗣是為昭公衛屬于晉韓趙魏氏世家曰是時三晉強衛如小侯屬之十年楚滅莒大事記曰楚世家簡元年北伐滅莒杜氏釋例曰莒國嬴姓少昊之後也周武王封兹輿期於莒今城陽莒縣是也世本自紀公以下為己姓不知誰賜之姓也十一世兹丕公始見春秋共公以下微弱不復見矣四世楚滅之魯悼公卒子嘉嗣是為元公禮記曰悼公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之逹禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食履祥按鄭氏曰生不能盡忠死不能盡禮孔子曰喪事不敢不勉鄭氏此言譏敬子不能企而及之也敬子其初為人如此曽子所以有逺暴慢鄙倍之戒與十有一年義渠伐秦侵至渭陽十有二年秦躁公卒弟立是為懷公秦紀曰懷公從晉來享國十有三年晉桃李冬實十有四年晉侯魯侯會于楚丘十有五年王崩太子午踐位衛公子亹弒其君昭公而自立是為懷公西周公封其少子班于鞏以奉王是為東周大事記曰此東西周分之始也初考王封其弟於河南是為河南桓公桓公卒子威公立威公卒子惠公立河南惠公復自封其少子於鞏以奉王號東周自河南桓公續周公之職而秉政三世益專所以别封少子使奉王者殆欲獨擅河南之地而不復奉王歟前漢地理志曰鞏東周所居非也東周者指威烈王所居之洛陽也鞏班之采邑也世本曰東周惠公名班居洛陽是班秉政於洛陽而采邑則在鞏安得遂指鞏為東周乎當是時東西周雖未分治然河南惠公既號奉王者為東周亦必自號為西周矣履祥按貞定王崩哀王立其弟思王弒哀王而立其弟考王又殺思王而立然而少弟揭在焉使揭而復迹其所為則考王殆未保也於是封之河南是分國以處之也而揭之子孫世執其政援立威烈之初又併封其少子於東以奉王為名於是東西二周分周亦猶三家之分魯矣考王固不得而制之也周室其時地不大於曹滕民不衆於邾莒而兄弟相殺以奪之又兄弟相分以處之是區區者果何樂乎為君而若此紛紛也其未取滅亡幸哉丙辰威烈王元年晉趙襄子卒以兄伯魯之孫浣為後獻子徙治中牟襄子之弟嘉逐浣而自立於代是為桓子史記曰襄子北有代南并知氏強於韓魏其後娶空同氏生五子襄子為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取代成君子浣立為大子襄子立三十三年卒浣立是為獻子獻子少即位治中牟吕氏曰汲冢竹書曰齊師伐趙東鄙圍中牟史記正義曰此中牟在河北非鄭之中牟也管子云狄滅邢衛齊築五鹿中牟鄴以衛諸夏按五鹿在魏州元城鄴即相州蕩隂縣西五十八里有牟山蓋中牟邑在此山側也後云魏欲通平邑中牟之道亦在牟山之側也秦庶長鼂弒其君懷公國人立其孫是為靈公大事記曰庶長鼂與大臣圍懷公懷公自殺懷公大子曰昭子蚤死大臣乃立大子昭子之子是為靈公秦記作肅靈公云居涇陽鄭共公卒子己嗣是為幽公晉韓康子卒子啓章代武子按左傳杜氏注國語曲沃桓叔生韓萬自萬至康子虎九世魏桓子卒子斯代是為文侯世家畢公髙之苖裔孫畢萬事晉獻公賜邑于魏為大夫自萬至桓子駒八世二年晉趙桓子卒國人殺其子迎浣復位史記曰襄子弟桓子逐獻子自立於代一年卒國人曰桓子立非襄子意乃共殺其子而復迎立獻子三年晉韓啓章伐鄭殺幽公鄭人立其弟駘是為繻公四年秦作上下畤大事記曰秦靈公作上下畤於吳陽上畤祭黃帝下畤祭炎帝六年盜殺晉幽公魏斯誅亂者立其子止是為烈公大事記曰幽公淫婦人夜竊出邑中盜殺幽公魏文侯以兵誅晉亂立幽公子止年表書魏誅晉幽公蓋有脫字皇極經世作魏文侯殺晉幽公因年表之誤也外紀威烈王四年晉幽公夫人秦嬴賊公於髙寢七年晉魏斯城少梁韓啓章都平陽趙浣城泫氏大事記曰按秦本紀靈公六年晉城少梁秦擊之年表靈公七年與魏戰少梁蓋出師在六年而戰在七年也竹書紀年晉烈公元年韓武子都平陽趙獻子城泫氏少梁故城在同州韓城縣南二十二里泫氏今澤州髙平縣八年秦人與晉魏氏戰少梁越滅郯大事記曰郯少皥氏之後也嬴姓國在東海郡今海州方春秋時大皥之後猶有任宿須句顓臾四國存而少皥之祀莒郯實司之至於戰國二皥之世獨任僅見於孟子之書而已此臧文仲所以發不祀忽諸之嘆也甲子九年晉魏氏復城少梁秦城塹河瀕秦初以君主妻河史記索隱曰謂初以此年取他女為君主君主猶公主也妻河謂嫁之河伯故魏俗猶為河伯取婦蓋其遺風殊異其事故云初大事記曰以君甥妻河用諸河以求福也戎狄之俗也魏文侯使西門豹為鄴令鄴民苦為河伯取婦豹始禁之正與同時魏與秦鄰意者染秦俗與十年晉趙氏城平邑水經注竹書紀年世家在十五年十有一年秦補龎城城籍姑履祥按魏城少梁而秦塹河瀕蓋相備也至是又城籍姑籍姑在同州韓城縣北三十五里而少梁在韓城縣南三十二里蓋對壘也衛公孫頽弒其君懷公而自立是為慎公頽敬公之孫也秦靈公卒國人廢其子而立其季父是為簡公大事記曰簡公懷公之子而昭子之弟也秦記曰簡公從晉來享國齊田居思伐晉趙氏鄙圍平邑十有二年中山武公初立大事記曰按左傳昭公十二年八月晉荀吳假道於鮮虞滅肥是冬晉復伐鮮虞杜預曰鮮虞白狄别種在中山新市縣中山名見於傳蓋始於此及定公四年晉合諸侯於召陵謀為蔡伐楚荀寅曰諸侯方二中山不服無損於楚而失中山不如辭蔡侯則中山是時勢已漸強能為晉之輕重矣史記趙世家是年書中山武公初立意者其勢益強遂建國備諸侯之制與諸夏抗歟索隱曰中山古鮮虞國姬姓也而徐廣曰中山武公周定王之孫西周桓公之子古史謂周衰已甚安能使子弟據中山乎其説是也或者徐廣徒聞中山姬姓遂傅會其世系歟十有三年齊田白伐晉毁黃城圍陽狐黃城在魏州冠氏縣南十里陽狐郭在魏州元城縣東北三十二里秦與晉戰敗于鄭下秦敗也晉河岸崩壅龍門至于底柱大事記曰春秋後河患見於史傳者始於此漢待詔賈讓曰隄防之作近起戰國壅防百川各以自利齊與趙魏瀕河齊地卑下作隄去河二十五里河東抵齊隄則西泛趙魏亦為隄去河二十五里雖非其正水尚有所遊蕩時至而去則填淤肥美民耕田之或久無害稍築室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也戰國之時河水潰圯隄岸如今嵗所書者蓋亦無幾至於秦漢以後河始為世大患賈讓之論可謂究其本末矣履祥按河壅龍門至底柱此西河東圯也其後東河轉而東南則河患始大十有四年齊田白伐魯莒及安陽大事記曰世家作伐魯葛及安陵史記正義曰後魏地形志云己氏有安陽城今宋州縣西北四十里安陽故城是晉魏斯使其子擊圍繁龎出其民越朱勾卒子翳嗣十有五年齊田白伐魯取一城年表作取都十有六年日有食之王命晉韓啓章趙浣伐齊入長城大事記曰按外紀王命韓趙伐齊入長城是時三晉自通王室亦如列國特未賜命耳後漢志濟北國有長城至東海史記蘇代説燕王曰齊有長城巨防巨防即防門在平隂魯元公卒子顯嗣是為穆公顯世本作衍齊田汾敗晉趙氏于平邑獲其將韓舉取平邑齊田莊子卒子和代是為太公禮記曰陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭焉得而弗哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏大事記曰和田太公也史記索隱曰按汲冢紀年田莊子卒明年立悼子悼子卒乃次立和是莊子後有悼子蓋歷年無幾所以世本及史記不得録也履祥按禮記所載則田莊子之卒當在魯穆公立之後而大事記書在前一年今姑改書於是年而悼子之有無長短又有所不暇考也十有七年魯侯尊禮孔伋孟子曰繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎又曰繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北靣稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也魯侯以公儀休為相泄栁申詳為臣董仲舒曰公儀子相魯入其家見織帛怒而出其妻食於舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利乎孟子曰昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身秦初令吏帶劒大事記曰佩玉三代也佩劒秦也秦與三代之分無他觀其所佩而已矣秦記七年又書百姓初帶劒晉魏斯伐秦築臨晉元里大事記曰臨晉按前漢地里志故大荔秦滅之更名臣瓚曰舊説秦築髙壘以臨晉國故曰臨晉元里失其地皆魏文侯伐秦所取築而守之也秦孝公所謂厲躁簡公出子之不寧三晉攻奪我河西地此類是也史記正義曰臨晉故城在同州馮翊縣西南二里元里故城在同州登城縣界晉韓武子卒子虔代是為景侯趙獻子卒子籍代是為烈侯十有八年晉魏斯擊宋使樂羊伐中山克之使其子擊守中山外紀曰魏文侯嘗借道於趙攻中山趙不許趙利曰魏攻中山而不能取則魏罷而趙重魏拔中山必不能越趙而守是用兵者魏而得地者趙也君不如許之彼知君利之必將輟行君不如借之道而示不得已也大事記曰按史記戰國䇿韓詩外傳古史樂羊攻中山其子在中山懸之以示羊羊不顧中山烹而為之羮羊啜之盡一杯中山知其忍下之文侯賞其功而疑其心文侯愛少子摯使太子擊守中山趙倉唐傅之居三年往來之使不通倉唐使於文侯以詩諷之文侯乃出少子摯封之中山而復太子擊通鑑曰文侯伐中山克之以封其子擊他日問於羣臣曰我何如主皆曰仁君任座曰君得中山不以封君之弟而以封君之子何謂仁君文侯怒任座趨出次問翟璜對曰仁君也文侯曰何以知之對曰君仁則臣直嚮者任座之言直是以知之文侯悅使璜召座而反之親下堂迎之以為上客大事記曰文侯子武侯之世趙世家書與中山戰于房子是時蓋已復國其後與諸國並稱王則其勢又強矣意者若鄭莊公克許雖有其地而不絶其祀所以能復興歟索隱之説亦然履祥按魏之攻中山也趙利已䇿其不能越趙而守之趙可以得地魏文侯亦豈不能察此故雖利其地以封其子亦必存中山以示趙而固子也此異時中山所以復強與秦塹洛城重泉大事記曰洛城失其地重泉屬馮翊括地志云重泉城在同州蒲城縣東南四十五里本紀書於七年今按洛城蓋以上洛水為名上雒漆沮也齊田和伐魯取成大事記曰淳于髠曰魯穆公之時公儀子為政子栁子思為臣魯之削滋甚質諸孟子皆非是穆公亟見於子思曰古千乘之國以友士子思不悅曰古之人有言曰事之云乎豈曰友之云乎是穆公欲友子思而不可得也况敢臣之乎以臺無餽之事觀之悅賢不能舉故不能飬無惑乎魯之削也穆公雖不能終用子思然尊賢尚德之意當時所罕而公儀之亷儉亦得相小國之道以魯之弱﨑嶇於強暴之間竟能與戰國相終始未必非其君相之力也履祥按魯自三家四分公室而魯君無民久矣孔子相魯亦季氏暫授之政而尋自取之哀公既死於外而悼公之立反卑於三家三十八年而至于元公元公之世齊田正熾魯於是乎失莒失安陽又失都則元公之世削已甚矣穆公立於失都之後二年而失郕則田氏之烈未戢也不知公儀子之為相其時三家之勢何如公儀子諸賢所以處之者何䇿然自失成之後又十五年而失最而韓又來救則諸賢所以交鄰固國者必有道矣又四年而敗齊于平陸又四年而為齊所破又十年而穆公卒卒之四年而伐齊入陽關則魯之勢其相為勝負者未為甚削也然自穆公之立以來凡百六十餘年而始亡則諸賢所與立者亦必有道矣不然則以魯之弱一日不可存况於百六十年乎秦初租禾大事記曰秦不用周禮所謂初租禾者變其國之舊制耳其增其損不可知也晉魏斯伐秦至鄭而還築洛隂合陽大事記曰鄭蓋長安之鄭乃桓公所始封非新鄭也史記正義曰雒漆沮水也雒隂城在水南合陽洽水之北括地志云合陽故城在同州河西縣南三里雒隂在同州西楚簡卒子當嗣是為聲晉韓虔伐鄭取雍丘史記正義曰雍丘今汴州縣也古杞國鄭城京大事記曰備韓也括地志云京縣故城在鄭州滎陽縣東南二十里十有九年晉魏斯受經于卜子夏友田子方敬假干木史記年表在此年世家在安王二年通鑑總在二十三年通鑑曰魏文侯以卜子夏田子方為師每過假干木之廬必式四方賢士多歸之子擊出遭田子方於道下車伏謁子方不為禮擊怒謂子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳富貴者安敢驕人國君而驕人則失其國大夫而驕人則失其家失其國家者未聞有以國家待之者也夫士貧賤言不用行不合則納履而去安往而不得貧賤哉擊乃謝之大事記曰文侯受子夏經藝客假干木過其閭未嘗不軾也史記以田子方為文侯師説苑載翟璜謂子方曰公孫成進子夏而君師之進假干木而君友之進先生而君敬之蓋得其實吕氏春秋曰魏文侯過假干木之閭而軾之其僕曰君胡為軾曰假干木賢者也未嘗肯以已易寡人也吾安敢不軾假干木光乎德寡人光乎地假干木富乎義寡人富乎財吾安敢驕之於是君請相之假干木不肯受乃致祿百萬而時往館之國人皆喜居無幾何秦欲攻魏司馬唐諫曰假干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君以為然乃不敢攻鄭人伐晉韓氏敗韓兵取負黍大事記曰括地志云負黍在洛州陽城西三十七里今屬河南府齊侯鄭伯會于西城齊宣公鄭繻公齊田和伐衛取毋丘大事記曰毋音貫即古貫國在曹州濟隂縣南五十六里晉魏斯以吳起為西河守西門豹為鄴令上地守李悝作盡地力之教及平糴法著法經通鑑曰吳起者衛人仕於魯齊人伐魯魯人欲以為將起取齊女魯人疑之起殺妻以求將大破齊師或譖之曰起始事魯參母死不奔喪曽參絶之又殺妻以求為將起殘忍薄行人也起恐得罪聞魏文侯賢乃往歸之文侯問諸李克克曰起貪而好色然用兵司馬穰苴弗能過也於是文侯以為將擊秦拔五城起之為將卧不設席行不騎乘親褁贏糧與士卒最下者同衣食分勞苦卒有病疽者起為吮之卒母聞而哭之或問之對曰往年吳公吮其父其父戰不還踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之大事記曰吳起事文侯為將拔秦五城乃以為西河守以拒秦李悝為上地守外紀載李悝事於威烈王十四年今并見於此下令曰人有狐疑之訟令射的中者勝不中者負令下而人皆習射及與秦人戰大敗之文侯以鄴為憂任西門豹守鄴而河內稱治按前漢晉志杜佑通典李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畝治田勤謹則畝益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬石又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧善平糴者必謹觀嵗有上中下孰上孰其收自四餘四百石上糴三而舍一中孰自三餘三百石上糴二而舍一下孰自倍餘百石上則糴一使民適足賈平則止小飢則發小孰之所斂中飢則發中孰之所斂大飢則發上孰之所斂而糶之又撰次諸國法著法經以為政莫急於盜賊故始於盜律盜賊須劾捕故著囚捕二篇其輕狡越城博戲借假不亷淫侈踰制以為雜律一篇終以具律具其加減凡六篇商君受之以相秦具律今之名例律也二十有一年晉魏斯以魏成為相通鑑曰文侯謂李克曰先生有言家貧思良妻國亂思良相今所置非成則璜二子何如對曰居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣文侯曰先生就舍吾之相定矣李克出翟璜曰聞君召先生而卜相果誰為之克曰魏成璜忿然曰西河守吳起臣所進也君內以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒以耳目之所睹記臣何負於魏成克曰子之言克於君者豈將比周以求大官哉君問相於克克之對如是所以知君之必相魏成者成食祿千鍾什九在外什一在內是以東得卜子夏田子方假干木此三人者君皆師之子所進五人者君皆臣之子惡得與魏成比也璜再拜曰鄙人失對願卒為弟子齊宣公卒子貸嗣是為康公齊田會以廪丘叛田氏大事記曰史記世家年表皆書田會以廪丘反會非叛齊也叛田氏也晉趙籍以公仲連為相史記曰趙烈侯好音謂公仲連曰寡人有愛可以貴之乎連曰富之可貴之則否君曰然鄭歌者槍石二人吾賜之田人萬畝連諾而不與烈侯屢問連乃稱疾不朝番吾君謂連曰君實好善而未知所持公仲亦有進士乎連曰未也曰牛畜荀欣徐越皆可連進之畜侍以仁義烈侯逌然明日欣侍以舉賢使能明日越侍以節財儉用察度功德所與無不充君説乃謂連曰歌者之田且止以畜為師欣為中尉越為內史賜連衣二襲大事記曰舊作相國公仲連相國非當時之官後人追書也年表書此事於威烈王二十四年以番吾君之言逆數公仲初相之嵗當載於此二十有二年宋昭公卒子購由嗣是為悼公大事記曰按外紀昭公嘗出亡謂其御曰吾被服而立侍御者數十人無不曰吾君麗也吾發言動事朝臣數百人無不曰吾君聖也內外不見吾過失是以亡也乃改操易行二年而美聞於宋宋人迎而復之戊寅二十有三年九鼎震履祥按九鼎三代相傳天下之形制圖籍也而震是天下之大異也司馬公通鑑始於是年而不書通鑑以人事為要也左氏終於趙韓魏之亡知伯而通鑑始於魏趙韓之為諸侯又推其始以及於趙魏韓之滅知伯又推其始以及知伯之立後舉數十年之事悉下附於二十三年之內年之不接於春秋者避續經之嫌也事之接於左氏者敘記事之實也然則吕成公大事記之年何以上接春秋曰通鑑為歷代史法之創始於續經為有嫌大事記用史記年表之名例於春秋為不犯二意固並行而不相悖也御批資治通鑑綱目前編卷十八
