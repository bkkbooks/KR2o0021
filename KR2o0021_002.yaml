body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷二有虞氏帝舜舜典粵若稽古帝舜曰重華協于帝濬哲文明溫恭允塞𤣥德升聞乃命以位放勳以成功言重華即重放勳之華也協于帝則自欽明而下皆與帝堯協矣然聖德則一而資質功力氣象自各不同故又以濬哲以下形容之光被至時雍君道也𤣥德至弗迷臣道也伏生以舜典合于堯典欽哉以下即受之以愼徽五典孔安國古文尚書復出此篇古文孝平時始列學官尋以亂廢終漢世不列學官東晉會稽內史梅賾始上其書而缺舜典學者以今文補之起自愼徽五典齊建武中吳人姚方興上孔傳舜典多曰若稽古以下二十八字未幾方興以罪誅人無信者江陵版蕩其文北入中原北方學者咸信之隋開皇中得為全書子王子曰史官本為虞作典推及堯爾蓋舜之功即堯之功故係之曰堯典孟子曰堯典曰二十有八載放勳乃殂落今皆載于舜典有以證孟子所讀堯典未嘗分也孔壁之分以册書舒卷之長分之無他義也自蕭齊姚方興以二十八字加於愼徽五典之上然後典分為二勢不得合矣且𤣥德二字六經無此語此莊老之言晉宋所尚愚知其非本語履祥按重華見於楚辭𤣥德見於淮南子則此二十八字虞書當已有之非至宋齊間方作此附㑹也今存之以俟來哲丙戍元載月正元日格于文祖咨二十有二人書曰月正元日舜格于文祖蘇氏曰受終告攝此告即位也詢于四嶽闢四門明四目逹四聰四嶽纍朝元老其職周知四方故首詢之闢四門者來四方之賢明四目者察四方之事逹四聰者通四方之言皆四嶽職也呂氏曰舜繼堯法度章禮樂著而又野無遺賢嘉言罔伏舜至此復詢闢明逹何哉天子初政如日之升方積隂之後日之初升則固光明精彩矣若常晴之後日之朝升其光明精彩亦自若也舜之繼堯其常晴之出日與愚謂天下之大一日照察之不及則一日有所遺是以聖人常慮其不及也况當初政之日乎咨十有二牧曰食哉惟時柔遠能邇惇德允元而難任人變夷率服牧養也每州以諸侯之長為牧專任養民之事諸侯固各牧其民然或各私其國曲防遏糴州牧所以通濟之也故曰食哉惟時柔遠能邇惟時言民食不可後時也養民者視年之上下而為之備視地之豐耗而為之通周知民之貧困孤寡者而為之恤不使民食之後時也崇厚道德信任元善畏難任佞牧率諸侯者意尚如此則當時治體風俗可知矣十二州冀豫為中餘州皆外邊四裔蠻夷率服蓋推言其效也舜曰咨四嶽特書舜曰則此前稱帝者堯也以後稱帝者舜也有能奮庸熙帝之載使宅百揆亮采惠疇舜前以百揆攝政至是即位而别命百揆焉庸民功謂愛民之功也載事也亮明也采亦事也即熙載也惠如安民則惠之惠即奮庸也二典之疇皆謂誰言有能奮起民功而明帝堯之事者使宅百揆以亮相吾之事與吾之仁其誰乎僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉平水土者司空之職惟時則指百揆之職朱子曰帝咨禹使仍作司空而兼行百揆之事録其舊績而勉其新功也以司空兼百揆如周以六卿兼三公後世以他官平章事知政事亦此類也禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉帝曰棄黎民阻饑汝后稷播時百穀棄之為稷久矣帝始即位因其職而申命之也舜典凡不咨而命命而不讓者皆因其職而申命之也阻饑謂或阻於饑時者不失農時也古者聖人以時教民稼穡常有再登三登之積不使之阻於饑也帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬契一作卨又作􅍛孟子曰使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之孟子所載初命契之詞也書則因其職而申命之也帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允朱子曰夏明而大也中國文明之地故曰華夏劫人曰寇殺人曰賊在外曰姦在內曰宄士理官也服服其罪也三就孔氏以為大罪於原野大夫於朝士於市不知何據竊恐惟大辟棄之於市宫辟則下蠶室餘刑亦就屏處蓋非死刑不欲使風中其瘡誤而至死聖人之仁也五流五等象刑之當宥者也五宅三居者流雖有五而宅之但為三等之居也孔氏以為大罪居於四裔次則九州之外次則千里之外雖亦未見其所據大槩當略近之此亦因禹之讓而申命之前后稷養之司徒教之其不化者則有士師之刑猾亂也謂蠻夷之氣習汙染華夏於是有寇賊姦宄也臯陶為士舊矣至此聖人又制為三就三居之等惟明克允蓋折獄不明豈能當其罪而服人心此最聖人之要㫖舊說二十二人不言兵政蓋總臯陶掌刑之職故蠻夷猾夏苗頑不率帝舜皆以委臯陶古者封建之世亦無大夷狄聖人在上亦無大征伐故外以蠻夷委州牧內以委刑官所謂大刑用甲兵也兵藏於田賦徒衆掌於司徒戎器制於共工馬政兼於朕虞則兵政無專官自不廢事帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧此教民利器用為國除器械也所謂審曲面勢以飾五材以辨民器者也凡百工之事共工主之凡言汝諧者謂能調和其徒屬也朱子曰若順其理而治之也曲禮六工有土工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工刮摩之工摶埴之工皆是也帝問誰能順治豫百工之事者垂臣名有巧思莊子曰攦工垂之指即此也共工官名共供也言供其事也殳斨伯與二臣名往哉汝諧言汝往和其職不聼其讓也路史曰殳國名伯陵之子所封其後有殳斨又作朱戕帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧此虞衡之職各順動植飛走之性而封植繁育之取之以時用之以節使材木不可勝用鳥獸魚鱉不可勝食馬畜繁息澤及萬物者也朱子曰上下山林澤藪也虞掌山澤之官周禮分為虞衡屬於夏官朱虎熊羆四臣名也高辛氏之子有曰仲虎仲熊意以獸為名者亦以其能服是獸而得名歟史記謂朱虎熊羆為伯益之佐前殳斨伯與當亦為垂之佐也帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于䕫龍帝曰俞往欽哉朱子曰典主也三禮祀天神享人鬼祭地祇之禮也伯夷臣名姜姓秩敘也宗祖廟也秩宗主叙次百神之官而專以秩宗名之者蓋以宗廟為主也周禮亦謂之宗伯而都家皆有宗人之官以掌祭祀之事亦此意也夙早寅敬畏也直者心無私曲之謂人能敬以直內不使少有私曲則其心潔清而無物欲之汚可以交於神明矣䕫龍二臣名按周太史曰姜伯夷之後也史記叙齊世家繫出四嶽及其叙十一國則又曰伯夷之後周封於齊豈伯夷四嶽之子與若是則嶽為能內舉矣夫禮樂之本同體異用伯夷遜于䕫龍則䕫亦固可掌禮矣而謂其達於樂不達於禮是豈夫子之言哉帝曰䕫命汝典樂教胄子胄子者自天子以至於士之長子也是皆將繼其父以有天下國家職位之責者故教之尤專古之教者非有簡編文字之多也而必以樂蓋簡編文字者聞見之粗而樂者轉移氣質之妙也所以消融其查滓滌蕩其血氣而涵暢乎中和者其妙機在乎是也今之教者皆其粗而已矣故程子曰古之成材也易今之成材也難直而溫寬而栗剛而無虐簡而無傲此教胄子之目也人之氣禀不同故其性質有異非數端所能盡者胄子生長富貴之家其性氣惟是數端為多也直而使之溫寬而使之栗所以濟其偏也剛而使之無虐簡而使之無傲所以防其過也然臯陶九德之目亦自是數端而細推之詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和此典樂之目也天理流行具於人心感而為詩者無非天理之真機也而况聖人在上治化清明則人心感而為詩者此固和氣之所發也聖人以其足以暢和氣感人心存啓發驗政化格人神於是採而播之樂夫其有詩也則必有聲音唱詠以歌之歌所以詠其言也夫其有歌也則必有清濁高下以節之五聲所以依其永也律呂者又清濁高下之度所以協其清濁高下而被之八音者也然既依諸聲則自有其節而可以協諸律吕既協諸律呂則聲有其度而可以諧之八音音有其諧則可以成其韻調也此作樂之原也帝曰龍朕墍讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允墍疾之也殄絶也讒邪之說使人昧於所聞是絶人為善之行也一曰殄者過絶之行中庸所謂行怪者也震驚朕師者謂其駭衆亂群也邪說之行其勢起於民情之不逹政化之不明故俗移於下而上不知令出於上而下不聞此讒說之所以行也納言所以伸民言而觀民風也出納朕命惟允所以審君言而播民教也此道化所以通於民民心所以化於上而邪說所以不行也夫邪說詖行古今要不能無顧唐虞之時風俗醇厚政化修明一有讒說殄行之興則衆以為駭上以為疾而觀民風修教化所以邪說者不得作後世上無教下無學邪說詖行肆然行於其間民皆安之而上之人又或從而助之此所以莫之禁也噫其來久矣書稱豫欲聞六律五聲八音在治忽以出納五言又曰工以納言時而揚之然則納言典樂二職固相關也此䕫龍所以並命與後世出納之司則有之納言則非矣帝曰咨汝二十有二人欽哉惟時亮天功欽之一辭堯舜之心法前後所以相傳君臣所以相警惟此一語二十二人之命雖人各有一職職各有所重而欽之一辭實總而終之無此心則職荒矣禹臯陶相與陳謨古者聖人君臣以有天下為重事不以位為樂方帝堯在上而舜登庸詢事考言既而堯老舜攝舜順堯於上而酌行於下二聖人在上禹臯未必有言也至是堯崩天下歸舜而舜既為天子矣一聖人在上故禹臯始相與陳謨以輔成之故史記曰臯陶作士以理民帝舜朝禹伯夷臯陶相與語帝前臯陶述其謨曰云云而帝又命禹曰汝亦昌言履祥按伯夷當作伯益蓋禹謨所載克艱之說而帝舜謂惟帝時允伯益亦復陳帝堯之德而又有警戒之謨禹曰帝愼乃在位有天其申命之說而帝又有臣鄰之咨有作股肱耳目之咨是皆舜始為天子君臣相警之辭故今繫臯陶謨益稷之篇於初年之下若禹謨則附格汝禹之年其實舜典為經而三謨乃其傳善觀書者亦當以謨附典而觀之臯陶謨粵若稽古臯陶曰允迪厥德謨明弼諧禹曰俞如何臯陶曰都愼厥身修思永惇叙九族庶明勵翼邇可遠在兹禹拜昌言曰俞允迪厥德勉君也謨明弼諧勉臣也有允迪厥德之君則有謨明弼諧之臣古人言行無二致臯陶以此二語為平日立言之首蓋其所允蹈之者故臯謨之首史記不假他語以贊臯而以此二語之謨為首愼厥身修思永惇叙九族允迪厥德之事也庶明勵翼謨明弼諧之義也自謹厥身修以至邇可遠在兹即大學之道也凡臯陶之言體用具備品節詳明簡而盡詳而粹前古以來未有若此篇者其萬古立言之法與後世稱臯陶者獨以謨名信乎不可及矣臯陶曰都在知人在安民此推明為治之綱要在此二者而知人又所以安民也終篇發明皆知人安民之目禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬哲惠二字古者聖仁之異稱哲者聖之資惠者仁之功也帝堯也言二事雖帝堯亦未易盡使二事而易盡則何以有工兜三苗之慮哉唐虞君臣皆自以為不足故其言如此臯陶曰都亦行有九德亦言其人有德乃言曰載采采此以下言知人也言人之德見於行者其凡有九而論其人之有德者固當歷述其於九德之行有幾事實也禹曰何臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞彊而義彰厥有常吉哉日宣三德夙夜浚明有家日嚴祇敬六德亮采有邦翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝此知人之目也以此九者定有德之名其别凡十有八字而合為九德者自寬以至彊九者其氣質之性也自栗以至義九者其變化進修之學也有上九者而無下九者以濟之是氣禀之偏非所以為德之中也寬者多不堅密是弛也故寬而栗則為德柔者多不能卓立是弱也故柔而立則為德願謹願也願者多同流合汚而不莊是鄉願也故願而恭則為德治亂曰亂謂有治亂解紛之材也能此者多恃材而易忽故亂而敬則為德擾者馴熟而易耎故擾而毅則為德直者徑行而易訐故直而溫則為德簡易者多不修亷隅故以簡而亷為德剛者多無止蓄故以剛而塞為德一曰塞實也實則非素厲也塞古文作寨彊者恃勇而不審宜故以彊而義為德有常者謂有是德而能持久者也若今日寬栗而後日不然一事彊毅而他事不爾則不常易變不足為成德也故雖有是九德必能有常則始足為有德之人用之則得矣小人勉彊於一時亦似有德然未幾而變用之豈可保其福哉凡是九德也得其三而用之則有家之事振舉矣得其六而用之則一國之事精明矣至於翕受敷施盡得而用之則職無不修治無不舉而裁成輔相之事無不成矣蓋以得人多寡為治道小大之差也日宣日嚴疑作曰無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之此章又自君心推之以結知人之本而起安民之端也天下之治雖散於條目顯設之間實在於戒謹恐懼之本無是心則雖有政不行焉此臯陶警切之意聖賢論治之本也天叙有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和𠂻哉天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉此安民之目也天敘者天理自然之倫敘也其典則君臣父子兄弟夫婦朋友之五典也敕則正之惇則厚之也民德之不厚以五典之未正正五典所以厚之也天秩者天理自然之品節也其禮吉凶軍賔嘉之五禮也自則自我制之庸則自我用之也禮之不行以制之非出於上也故自我制之所以庸之也同寅者即典禮以同人心之寅協人心之恭和人心之衷均有以全其降𠂻之初也舊說君臣則文意似不相入安民者先之以五典之教以導之繼之以五禮之制以齊之則斯民莫不安行乎天理之中矣全此者為德於是乎有賞悖是者為罪於是乎有刑政事則因刑賞而舉凡治民之事者言之也典禮賞刑安民之綱目始終本末備於此矣此固聖賢之所謂安民者與天聰明自我民聰明天明畏自我民明威逹于上下敬哉有土聰明聽其言視其行也明威監其德禍其淫也尚書古文威皆作畏此節言天心由於民而民心不可欺有民者不可以不敬前章言知人之目而以人之代天終之後章言安民之目而以天之自民終之警戒之意深矣臯陶曰朕言惠可砥行禹曰俞乃言砥可績臯陶曰豫未有知思曰贊贊襄哉臯陶之陳謨悉矣其切於悟主也故終之曰朕言惠可砥行欲人不以為空言而必行之也其切於自反也故又繼之曰豫未有知思曰贊贊襄哉欲已不為空言而輔行之也帝曰來禹汝亦昌言帝以臯陶既陳知人安民之謨因呼禹使亦陳其昌言伏生今文益稷合於臯陶謨篇末文勢相接史記亦同禹拜曰都帝豫何言豫思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載蔡氏書集傳曰四載水乘舟陸乘車泥乘輴山乘樏也輴史記作橇漢書作毳以板為之其狀如箕㰅行泥上樏史記作橋漢書作梮以鐵為之其形似錐長半寸施之履下以上山不蹉跌也蓋禹治水之時乘此四載以跋履山川踐行險阻者也隨山刋木暨益奏庶鮮食血食曰鮮豫决九川距四海濬畎澮距川此井地之原也蔡氏曰一畝之間廣丈深尺曰畎一同之間廣二尋深二仞曰澮畎澮之間有遂有溝有洫皆通田間水道以小注大言畎澮而不及遂溝洫者舉小大以包其餘也先决九川之水使各通於海次濬畎澮之水使各通於川也暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂隨山刊木之初益焚山澤為民奏魚獸之食此其初救民之權宜也决川濬畎之際稷降播種為民舉艱鮮之食此其中民食之兼舉也至於懋遷有無之後榖粟通行而蒸民皆乃粒之食此其末民食之皆足也古者民食素備雖有九年之水民無萊色然自鯀九載之後水患既久五榖不登民食竭矣聖人所以為通濟之術如此臯陶曰俞師汝昌言禹自敘其功云爾臯陶俞之可矣而復曰師之何也蓋禹所言者孜孜之實天下事功未有不自艱難辛苦孜孜而後能成之者此真實用功之語所以為可師與禹曰都帝愼乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉止者靜也謂未動之時也安猶保養也幾事端之微也康安靜而不為也大抵君心當靜止無為之時必安靜以存養之惟當察其幾微之端亦惟當守其康靖無為之規其為之輔弼者亦於此時而常致其忠直之益必如是而後可以善其動動而愜乎人心之同然而其心明白無瑕天命自與之悠久矣臣哉鄰哉鄰哉臣哉帝深感弼直之辭而又反復嘆咏以相資也鄰即四鄰詳見下文禹曰俞帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為左右有民導之也明倫齊禮所以扶持人心之中也宣力四方者安之也興利除害所以維持天下之勢也豫欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明蔡氏曰黃帝堯舜垂衣裳而天下治則上衣下裳之制創自黃帝而成於堯舜也日月星辰取其照臨山取其鎮龍取其變華蟲雉取其文㑹繪也六者繪之於衣宗彛虎蜼取其孝藻水草取其潔火取其明粉米白米取其養黼若斧形取其斷黻為兩已相背取其辨絺鄭氏讀為黹紩也紩以為繡也六者繡之於裳所謂十二章也采者青黃赤白黑也色者言施之於繒帛也繪於衣繡於裳皆雜施五采以為五色也汝明者汝當明其尊卑之差等也衣服繪畫之末聖人顧重之與左右宣力四方竝言之何也此制禮之凖也龜山楊氏曰衣服所以彰有德五服五章或加非所稱不明孰甚焉豫欲聞六律五聲八音在治忽以出納五言汝聽五言者言之比於五聲有清濁髙下之節者所謂詩也納之者采詩以知民俗出之者播之於樂以感人心也凡人情之感動為風土之歌謡於是有詩焉古有采詩之官采其詩以律呂諧其聲被之於金石絲竹匏土革木而謂之樂因其聲音之和平怨怒而後其政化之得失民俗之所感者可知也此其所謂納五言者也擇其所感者正其所道者雅其聲安以平其樂淡以和者用之鄉人邦國使里巷之間皆弦歌之音聽之者莫不淡且和焉淡則欲心平和則躁心釋優柔平中德之盛也天下化中治之至也此所謂出五言者也汝明以上聖人之制禮也汝聽以上聖人之作樂也禮莫先於服章之等故以作服為重樂本出於言志之詩故以五言為主豫違汝弼汝無面從退有後言欽四鄰漢伏生曰古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子中立而聽朝則四聖維之是以慮無失計舉無過事故書曰欽四鄰此之謂也履祥按書有四鄰而文王世子亦有設四輔及三公之言四輔即四鄰也三公者天子師之而不敢臣者也四輔者豈天子鄰之而不敢臣者故謂之鄰與庶頑讒說若不在時侯以明之撻以記之書用識哉欲竝生哉工以納言時而揚之格則承之庸之否則威之有虞之盛聖人屢以讒說為憂既墍之又撲以教刑蓋太平之世後生小子乃逸乃諺既誕雖士大夫或不免後世風流清談文詞放言皆此類也惟聖人則知生於其心播於其口必亂於其政故獨憂之而亦以命禹侯射侯也明教之也庶頑讒說教之而以射侯為先不其迂乎蓋古者世簡風質非有文字之繁古之教人者其義理寓於禮制猶今之教人者其義理寓於方䇿也故古之教者以射侯猶今之教者以書册也夫射者體欲其比於禮節欲其比於樂正其心而後可中多也此射之為教所以先也納言即所納之五言時而揚之則播之樂以出之所以教也射禮也納言樂也書識格庸政也撻記否威刑也禮樂刑政聖人所以同民心也百揆之職無所不總聞六律五聲所以命䕫者也化庶頑讒說所以命龍者也禮所以命秩宗刑所以命臯陶者也而皆以命禹相職無所不統所以總其綱維而經緯之者與禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功俞哉者與春秋傳公曰諾哉意同口然而心不然之辭黎獻黎民之賢者也敷納下陳而上納也明庶明其衆庶也禹俞舜之命而又有所言謂化頑讒者以明明德於天下為本以舉賢才為先以考功實為務則誰敢不讓敢不敬應而為此傲放縱誕之讒說哉不如是則頑讒之風浸淫於士大夫而敷同日奏罔功矣無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫於家用殄厥世讒說之興本於遨遊之習而人君身心又臣民政化之本一或以太平自縱則風化之壞端自是始故禹勉舜以明德為本又舉丹朱以傲德為戒舜與朱聖狂相遠然其幾本一間耳禹蓋用功於自治故言之懇切如此額額不休息貌所謂凶人為不善亦惟日不足也豫創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣豫弗子惟荒度土功塗山在今濠州吕氏春秋曰禹娶塗山氏女不以私害公自辛至甲四日復往治水履祥按禹娶塗山與生啓亦皆治水八年間事前後非一時新婚四日而不留是禹不暇顧其妻也生啓􅈱􅈱而不入是禹不暇顧其子也禹自言不暇顧其妻子耳而或者之說多妄矣弼成五服至于五千州十有二師孔氏曰治洪水一州用三萬庸大傳曰古者處師八家而為鄰三鄰而為朋三朋而為里五里而為邑十邑而為都十都而為師州十有二師焉鄭氏曰州凡四十三萬二千家此蓋虞夏之數也蔡氏曰十二師者每州立十二諸侯以為之師使之相牧以糾羣后也履祥按以下文考之蔡氏之說為正禮記所謂三十國之正傳所謂為諸侯師蓋此名猶存爾外薄四海咸建五長各迪有功苗頑弗即工帝其念哉九州之外迫於四海每方各建五人以為之長而統率之也聖人經理之制其詳內略外者如此謂十二師五長內外各迪有功而獨苗頑不即工則苗之頑又有大於庶頑者庶頑之讒轉移之機尚在我苗頑之頑為中國患而轉移之間有未易致力者故禹尤以苖頑為警也帝曰迪朕德時乃功惟敘臯陶方祇厥敘方施象刑惟明禹迪德臯陶刑帝舜化苗之機在此二者故兼以命禹臯巡狩四嶽八伯虞夏傳曰維元祀巡狩四嶽八伯鄭氏曰祀年也元年謂月正元日舜格于文祖之年也履祥按祀之與年歲古或通稱但各有所重與又曰四嶽之職出則為方伯後分置八伯履祥按八百蓋其時每方二伯也其名見下壇四奧鄭氏曰為壇祭四方之神沈四海鄭氏曰祭水曰沈封十有二山鄭氏曰祭者必封封亦壇也肇十有二州鄭氏曰肇域也為營域以祭十有二州之分星樂正定樂名元祀代泰山貢兩伯之樂焉代岱通東嶽陽伯之樂舞侏離其歌聲比余謡名曰晳陽鄭氏曰陽伯猶言春伯春官秩宗也伯夷掌之侏離舞曲名言象物生有離根株也徒歌謂之謡其聲清濁比如余謡然後應律也晳當作析春厥民析晳陽樂正所定也是時契為司徒掌地官矣又舉禹掌天官羲本作儀伯之樂舞鼚哉其歌聲比大謡名曰南陽鄭氏曰儀當為羲仲之後也鼚動貌哉始也言象物應雷而動始出見也南任也中祀大交霍山貢兩伯之樂焉鄭氏曰中仲也古字通春為元夏為仲五月南巡狩仲祭大交氣於霍山也南交稱大交書曰宅南交也夏伯之樂舞謾或其歌聲比中謡名曰初慮鄭氏曰夏伯夏官司馬也棄掌之謾猶曼也或長貌猶物象之滋曼或然也初慮陽上極隂始謀也謾或為謗羲伯之樂舞將陽其歌聲比大謡名曰朱于鄭氏曰將陽言象物之秀實動搖也干大也秋祀桞榖華山貢兩伯之樂焉鄭氏曰八月西巡狩祭桞榖之氣於華山也桞聚也齊人語秋伯之樂舞蔡俶其歌聲比小謡名曰苓落鄭氏曰秋伯秋官士臯陶掌之蔡猶衰也俶始也言象物之始衰也和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來鄭氏曰和伯和仲之後𤣥鶴象陽鳥之南也歸來言反其本也幽都𢎞山祀貢兩伯之樂焉鄭氏曰𢎞山恆山也十有一月朔巡狩祀幽都之氣於恆山也互言之者明祭山北稱幽都也冬伯之舞齊落鄭氏曰冬伯冬官司空也埀掌之齊落終也言象物之終也齊或為聚歌曰縵縵并論八音四㑹鄭氏曰此上下有脫辭其說未聞歸格于禰祖用特履祥按諸侯必貢詩於天子傳曰貢兩伯之樂焉是古者侯伯亦貢樂於天子也羲伯和伯豈羲和之後以其知四方之風土氣候分為方伯耶舜巡四嶽禮樂之盛伏生秦博士逮見古書其所述諒哉昔者子王子續儀禮經傳亦有取焉今附于此以廣異聞云三載考績發例於此後不屢書五載簫韶樂成書曰䕫曰戞擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀蔡氏曰戞擊考擊也鳴球玉磬名也搏彈拊循也樂之始作升歌於堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠蓋戞擊鳴球搏拊琴瑟以合詠歌之聲也虞賔丹朱也丹朱在位與助祭羣后以德相讓則人無不和可知矣下堂下之樂管猶周禮所謂孤竹之管絲竹之管隂竹之管也鼗鼓如鼓而小有柄持而搖之則旁耳自擊柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊敔狀如伏虎背上有二十七鉏鋙刻以籈櫟之籈長一尺以木為之始作則擊柷以合之將終則櫟敔以止之蓋節樂之器也笙以匏為之列管匏中又施簧於管端鏞大鐘也鐘與歌相應者曰頌鐘頌或謂之鏞大射禮樂人宿縣西階之西頌磬之南頌鐘即鏞鐘也上言以詠此言以間相對而言蓋與詠歌迭奏也蹌蹌行動貌言樂音不獨感神人至於鳥獸無知亦且相率而舞蹌蹌然也簫古文作簫舞者所執之物說文云樂名簫韶蓋舜樂之總名今文作簫故先儒誤以簫管釋之九成者樂之九成也功以九叙故樂以九成鳳凰羽族之靈來儀來舞而有容儀也戞擊鳴球搏拊琴瑟以詠堂上之樂也下管鼗鼓合止柷敔笙鏞以間堂下之樂也樂之作也依上下而遞奏間合而後曲成祖考尊神故言於堂上之樂鳥獸微物故言於堂下之樂九成致鳳尊異靈瑞故别言之也夔曰於豫擊石拊石百獸率舞庶尹允諧䕫論韶樂之所感備矣又申言之以明韶之所以感也韶之所以感有非樂正之所能與者此䕫所以深嘆之鳥獸蹌蹌在衆樂備作之後鳳凰來儀在簫韶九成之餘而此云擊石拊石即百獸率舞何也韶樂以球為主絲竹革匏金木皆次之䕫為樂正實掌鳴球而羣工以次舉之也故䕫自言豫擊石拊石而已而百獸自率舞庶尹自允諧是則非豫之所能知者是必有妙於聲音之間者矣蓋推本帝舜之德也千載之下韶有存焉者矣而不聞有來儀率舞之盛者蓋人亡政息音存而操變也虞夏傳曰維五祀定鐘石論人聲乃及鳥獸咸變於前鄭氏曰鳥獸率舞故更著四時推六律六吕詢十有二變而道𢎞廣鄭氏曰詢均也五作十道孝力為右鄭氏曰五作五教也十道謂君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽者也秋養耆老而春食餔子乃勃然招樂興於大鹿之野鄭氏曰興成也樂以致天神出地祗假人鬼為成也樂記曰舜作五弦之琴以歌南風䕫始制樂以賞諸侯故天子之為樂也以賞諸侯之有德者也德盛而教尊五榖時熟然後賞之以樂漢志曰帝舜命䕫曰女典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧又以外賞諸侯故聞其音而德和省其詩而志正論其數而法立是以薦之郊廟則鬼神饗作之朝廷則羣臣和立之學官則萬民協聽者無不虛已竦神說而承流是以海內遍知上德被服其風光輝日新化行遷善而不知所以然至於萬物不天天地順而嘉應降家語曰舜彈五弦之琴造南風之詩其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮六載巡狩書大傳曰五載一巡狩羣后德讓貢正聲而九族具成鄭氏曰族當為奏言諸侯貢其正聲而天子九奏之樂乃具成也雖禽獸之聲猶悉關於律鄭氏曰關猶入也樂者人性之所自有也故聖王巡十有二州觀其風俗習其性情因論十有二俗鄭氏曰今詩國風是也定以六律五聲八音七始著其素鄭氏曰五聲宫啇角徵羽也八音鐘鼓笙磬塤箎柷敔琴也七始黃鐘太蔟大吕南吕姑洗應鐘㽔賔也歌聲不應此則去之素猶始也履祥按此採詩作樂之始也蔟以為八此八伯之事也鄭氏曰蔟猶聚也樂音衆多聚之以為八也分定於五此五嶽之事也五謂塤在北方鼓在東方之屬五音天音也八聲天化也七始天統也鄭氏曰天所以理隂陽也七載作大唐之歌書大傳曰執事還歸二年䜎然作大唐之歌鄭氏曰䜎猶灼也大唐之歌歌美堯之禪也九載三考黜陟幽明庶績咸熙分北三苗書曰三載考績三考黜陟幽明庶績咸熙分北三苗唐孔氏曰考績法明人皆自勵故得衆功皆廣也分北三苗即是黜幽之事故於考績之下言其流之分謂别之云北者言相背舜之黜陟善惡明也古史曰三載考績三考黜陟幽明庶績咸熙惟三苗之遺民為惡不悛乃復分北處之以散其衆分北之者分其民順化者與違命者猶後世部分夷狄為生户熟户也履祥按有苗始末說者不同愚嘗綜其實書之所稱於前曰三苗於後曰有苗曰苗民書有異辭則事有不同矣蓋其始部落不一總謂三苗說見堯紀當堯之時竄三苗于三危罪其渠魁也當舜之時分北三苗則削其地分其民别其部落離其黨類於以黜陟亦以銷其勢也至其後徂征之時止曰有苗曰苗民而不復曰三苗云者蓋已竄之後既分之餘存者特其一種耳說者又謂分北之政在舜季年來格之後故係之舜典之末是又不然夫舜典之事初年之事也古者無事之世帝王有作其規模設施皆於其初年自是守之而天下治雖其間隨時消息蓋無幾也舜自初年即政分命羣賢三考黜陟庶績咸熙獨三苗以罪分北則自餘庶事可知矣故終之以陟方而餘不屢書焉且於典曰庶績咸熙分北三苗於謨曰各迪有功苗頑弗即工則分北之事為三考黜幽之典在衆功咸熙之後無疑也非季年之事也且季年之事莫大於禪禹而典不書徂征亦不書何獨於分苗而特書之然則典之所書止其初年之大政所以權輿五十年之治者也若征苗之事則薦禹之餘如舜巡狩四嶽肇州四罪之政不繫之堯而係之舜者也不然來格之後彼既服矣又從而分北之所謂如追放豚既入其苙又從而招之而謂聖人為之乎十有四載帝作歌帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉蔡氏曰勑戒勑幾事之微惟時者無時而不戒勑也惟幾者無事而不戒勑也蓋天命無常理亂安危相為倚伏頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也此舜將欲作歌而先述其所以歌之意也股肱臣也元首君也人臣樂於趨事赴功則人君之治為之興起而百官之功皆廣也拜手稽首者首至手又至地也大言而疾曰揚率總率也言人君當總率群臣以起事功又必謹其所守之法度屢數也興事而數考其成則有課功核實之效而無誕謾欺蔽之失兩言欽哉者興事考成二者皆所當深敬而不可忽也此臯陶將欲賡歌而先述其所以歌之意也賡續載成也叢脞煩碎也言君明則臣良而衆事皆安所以勸之也君行臣職煩瑣細碎則臣下懈怠不肯任事而萬事墮廢所以戒之也舜作歌而責難於臣臯陶賡歌而責難於君君臣之相責難者如此有虞之治兹所以為不可及也與虞夏傳曰惟十有四祀帝乃雍而歌者重篇於時俊乂百工相和而歌卿雲鄭氏曰卿當為慶天文志曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是為慶雲此和氣也帝乃偶之曰卿雲爛兮禮縵縵兮日月光華旦復旦兮八伯咸進稽首曰明明尚天爛然星陳日月光華𢎞于一人帝乃載歌旋持衡履祥按十有四載傳叙其君臣之歌盛矣然莫大於勑天之歌而不言何也所謂雍而歌者重篇必有所歌之篇所謂帝乃載歌必有載歌之語意者明良之歌其在此時與今繫之此年而以傳附之十有五載帝載歌虞夏傳曰維十有五祀祀者二尸日月有常星辰有行四時順經萬姓允誠於豫論樂配天之靈遷于賢聖莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之於是乃八風修通卿雲叢聚蟠龍賁信於其藏蛟魚踴躍於其淵龜鱉咸出其穴此歌汲冢竹書亦有之然誤在伊尹祀桐宫之下考其辭非啇歌也豈說經者以伊尹祀先王有古夏先后鳥獸魚鱉咸若之訓故以係之與鄭康成以為帝舜之歌宋書符瑞志亦謂當是時景星出房慶雲興帝乃載歌其辭若此是必它有考矣然愚玩其辭與其事以為登歌祀堯之詩不可考矣今具存之以俟知者子王子曰宋書慶雲之歌恐皆後人所託似不類賡歌氣象豈有重華君臣觀此雲瑞而動色作歌以慶之者乎十有六載九叙惟歌虞夏傳曰維十有四祀云云還歸二年鄭氏曰明十五年愚按當作十六年而廟中茍有歌大化大訓六府九原而夏道興原當作敘履祥按此九功之歌也大訓大化其三事之歌與九功之歌舊矣禹言於帝比音而樂之以勸其民使之不倦至是而歌之廟也其後禹有天下蓋常用之後世守之以為禹樂騷所謂啓九辨與九歌是也周官九德之歌九韶之舞以享人鬼蓋兼用虞夏之樂而說者以九歌為韶樂誤矣朱子曰九歌禹樂也所謂九德之歌也九韶舜樂也所謂九韶之舞是也瞽矇掌九德之歌比於六詩意其辭詳矣至戰國時騷亦屢言之豈及見其遺音耶後世不傳惜哉丁巳三十有二載帝命禹總師據張氏紀年丁巳書薦禹於天此三十二載也而書曰朕宅帝位三十三載則自喪畢之年通數也粵若稽古大禹曰文命敷于四海祇承于帝朱子曰文命敷於四海即禹貢所謂東漸西被朔南暨聲教訖于四海者也史臣言禹既已布其文教于四海矣於是陳其謨以敬承于舜如下文所云也文命史記以為禹名蘇氏曰以文命為禹名則敷于四海者為何事耶曰后克艱厥后臣克艱厥臣政乃乂黎民敏德朱子曰曰已下即禹祇承于帝之言也孔子曰為君難為臣不易即此意也敏速也禹言君而不敢易其為君之道臣而不敢易其為臣之職夙夜祗懼各務盡其所當為者則其政事乃能修治而無邪慝下民自然觀感速化於善而不容已矣帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍已從人不虐無告不廢困窮惟帝時克朱子曰舜然禹之言以為信能如此則必有以廣延衆論悉致羣賢而天下之民咸被其澤無不得其所矣然非忘私順理愛民好士之至無以及此而惟堯能之非常人所及也蓋為謙辭以對而不敢自謂其必能舜之克艱於此亦可見矣無告指民困窮指士程子曰舍已從人最為難事已者我之所有雖痛舍之猶懼守已者固而從人者輕也益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君朱子曰廣者大而無外運者行而不息大而能運則變化不測故自其大而化之而言則謂之聖自其聖而不可知而言則謂之神自其威之可畏而言則謂之武自其經緯政化而言則謂之文堯之初起不見於經傳稱其自唐侯特起為帝觀益之言理或然也或曰舜之所為帝者堯也羣臣之言帝者舜也蓋益因舜尊堯而遂美舜之德以勸之言不特堯能如此帝亦當然也今按此說固為有理但此語接連上句惟帝時克之下未應遽舍堯而譽舜又徒極稱其美而不見勸勉規戒之意唐虞之際未遽有此諛佞之風也依舊說贊堯為是此舜初年之謨所謂帝者皆述堯也禹曰惠迪吉從逆凶惟影響朱子曰惠從順迪道也逆反道也惠迪從逆猶曰順善從惡也禹言天道可畏吉凶之應於善惡猶影響之出於形聲也以見不可不艱者以此而終上文之意履祥謂舜因禹克艱之謨而論堯之克艱益因舜論堯之時而推堯之德業蓋舜明堯之心而益明堯之德禹因益言堯得天之效而推言感格之由則又以警舜也益曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從已之欲無怠無荒四夷來王無虞無可慮之時也無虞之時法度易弛逸樂易過故戒之疑謀勿成謂謀之未决者未可行凡事必已審决而後行也百志惟熙謂心之應事皆明而無所纍也益之言罔者五勿者三無者二皆警戒之目也失度逸樂戒其修諸身者也賢邪謀疑戒其施諸朝廷者也違道從欲戒其施於百姓者也無怠無荒四夷來王戒其不倦以終之雖逹之夷狄可也干百姓譽與咈百姓二句相反須是兼看戒其干譽則或至咈民戒其咈民則或至干譽要在道欲二字禹曰於帝念哉德惟善政政在養民此總言治之本原綱領也水火金木土榖惟修正德利用厚生惟和九功惟叙九叙惟歌水火金木土榖謂之六府正德利用厚生謂之三事此推言德政養民之目也所謂六府者府蓋官府之府六府所以裁成天地之性遂萬物之宜而致天下之利者也傳稱古者物有其官官修其方故有五行之官所謂木工火工金工水工土工是也其在唐虞豈非六府與禮記殷制天子之六府曰司土司木司水司草司器司貨典司六職蓋本有虞氏之舊制也土木水三司其名不易司草則榖府司貨則金府司器則火府鎔冶之事也鄭氏謂在周則司土土均也司木山虞也司水川衡也司草稻人也司貨草人也然則其在有虞豈非司空朕虞后稷共工之職與或九官之外自有專司六府者與或當時六府以事而名不必專職與六府各修其職矣而政事之大有三焉教之以正其德通之以利其用節之以厚其生此三事所以同天下也故謂之和正德則厚典庸禮之事如司徒敷教伯夷降典后䕫典樂士制百姓皆是也利用即同律度量衡懋遷有無化居之事厚生則制用均節之事如老者衣帛食肉黎民不飢不寒三年耕必餘一年之食以三十年之通雖有凶荒水旱民無菜色是也舊說三事既指人力之為而六府乃指五行自然之利如此則並為九功非類例矣縱曰修屬人事可列為功然修與和對耳非正利厚三言之比也且行有五府有六土爰稼穡而離於上於義不通不若從禮記天子六府之說則六府以職言三事以事言而九功之說得矣六府之所掌三事之所運謂之九功皆有成績功緒謂之九叙民樂其樂利其利沐其化而歌其事采而貢之上之人比而成章謂之九歌九歌也者太史公所謂沐浴膏澤而歌詠勤苦者也蘇氏謂其辭事若豳風之類其是與戒之用休董之用威勸之以九歌俾勿壞自水土既平以來六府之修三事之和久矣和豫之世人情易綏庶事易弛故禹於此論德政養民之事必戒之用休謂時戒喻之而使之休休者知樂業安常之為美也必董之用威威古文作畏謂時董督之而使之畏畏者知廢事失常之為惡也必勸之以九歌九歌者以其昔日之歌協之律吕播之聲音用之鄉人邦國以及閭巷莫不歌之使民樂而不忘思而不二勤而不倦焉此德政養民無窮之治也蘇氏謂九歌若豳風之類愚謂如此則周官吹豳詩以樂田畯吹豳頌以息老物亦勸民九歌之遺意與帝曰俞地平天成六府三事允治萬世永賴時乃功朱子謂舜因禹言養民之政而推其平水土之功以美之也帝曰格汝禹朕宅帝位三十有三載耋期倦于勤汝惟不怠總朕師朱子曰九十曰耋百年曰期舜至是年已九十三矣總率也舜自言既老血氣已衰故倦于勤勞之事汝當勉力不怠而總率我衆也蓋命之攝位之事堯命舜曰陟帝位舜命禹曰總朕師者蓋堯欲使舜真宅帝位舜讓弗嗣後惟居攝亦若是而已禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功虞廷大臣德之相似者禹臯耳故禹於命攝之時所遜惟臯禹懼帝舜惟見已之功而不見臯之為功也故勉帝以念念兹在兹釋兹在兹者謂念之也熟則雖捨之而不可易名言兹在兹允出兹在兹者謂言之也熟則雖外之而不可違禹以帝與已而不與臯或者言念之或遺而不見臯之功與如見臯之為功則自有不可捨臯而它與者此禹必欲遜臯之辭也一說我念臯陶固在臯陶舍之不念亦在臯陶名之於言固在臯陶允出於心亦在臯陶亦通但與上下句帝念不相應爾帝曰臯陶惟兹臣庶罔或干豫正汝作士明于五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉禹恐帝舜不念臯之功故反覆以念功勉之帝固未嘗不深知臯之功也故因禹言以推明臯之功焉大抵臯之知見密於禹而禹之勞績著於臯禹之功天下所共知而臯之為功非舜禹不知也然帝雖不聼禹之遜而亦不遺臯之美雖美臯陶之功而不為遜位之辭觀於此而聖人公平正大之心又可見矣臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司帝曰俾豫從欲以治四方風動惟乃之休舜方推美臯陶之功臯則歸美於帝舜之德而帝復以美臯焉君臣有功更相歸美此固虞廷之盛然君臣之體相須以成實有不可相無者故其成功之交相歸美也帝曰來禹降水警豫成允成功惟汝賢降孟子作洚洚水者洪水也成允成功者成實成之功也朱子曰允信也奏言而能踐其言試功而能有其功克勤于邦克儉于家不自滿假惟汝賢上惟汝賢美其功也此惟汝賢美其心也有是心能有是功者鮮矣有是功而又有是心抑尤鮮也汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功矜者自大伐者加人不矜不伐禹之所以為大豫懋乃德嘉乃丕績天之厯數在汝躬汝終陟元后朱子曰厯數者帝王相繼之次第猶歲時氣節之先後汝有盛德大功固知厯數當歸於汝汝終當升此大君之位不可辭也是時舜方命禹以居攝未即天位故以終陟言也人心惟危道心惟微惟精惟一允執厥中堯之授舜曰允執其中此授之以治天下之則也一人之治天下惟在於持此無過不及之則以裁天下之事使之各得而已爾舜之授禹也而益之以三言則又授之執中之則也天地一理運而為隂陽五行之氣其化生斯人也氣以成形而理亦賦焉而心者則理氣之㑹而知覺焉者也人心者知覺之生乎氣如耳目鼻口四肢與凡攻取之欲是也道心者知覺之生乎理如惻隱羞惡辭讓是非之端蓋管乎耳目鼻口四肢者也生乎氣者固亦理之所有而易流於欲故危原乎理者攝乎氣之中而不充則晦故微先言人心而後言道心蓋道心之所以微亦以人心之危有以微之也精則察此念之發為人心為道心也一則守道心之正而不二也如此則自吾心而逹之天下凡所云為皆有以得其中矣中即道之用也朱子曰心之虛靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微眇而難見耳人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝人欲之私矣精則擇夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有加於此哉無稽之言勿聽弗詢之謀勿庸言人之言也無考於實者勿聽謀已之計也不詢於衆者勿庸舊說謀亦人謀猶史所謂以一人之言而進退之者可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉愼乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰毋惟汝諧蔽斷也昆後也三十有三載正月朔旦禹受命于神宗率百官若帝之初履祥按禮稱有虞氏宗堯則神宗堯廟也古史稱舜之子孫乃更郊堯而宗舜此說非也當是禹郊堯而宗舜爾三聖揖遜以天下相傳祀以為宗以有天下之大統也自夏后氏子孫繼世以有天下啇周征伐以有天下固異於是而諸儒之說亦始膠矣帝命禹叙洪範九疇箕子曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸叙初一朱子曰此讀也全讀則是以一二為次第不見洛書本文又不見聖人法象之義故後人至以此章總為洛書本文者皆為句讀不明也下皆倣此曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極書大傳曰維王后元祀鄭氏曰王謂禹也禹始居攝為君之年也履祥按古者數年自人君即位為元亦有因事起年者元年即一年首年云爾非有它大義也時帝舜為天子三十三年禹攝其事而此稱元祀者謂攝政之一年爾自說春秋者始以改元為莫大之事於是後世之論膠矣帝令大禹步于上帝使禹推天道也禹乃共辟厥德受帝休令爰用五事建用王極鄭氏曰初禹治水得神龜負文于洛于以盡得天人隂陽之用至是奉帝命而陳之也履祥按此叙九疇也禹始攝天下之政故帝令其以所得洛書推為治天下之綱目也王皇義通九疇之數以皇極為中而九疇之用以五事為始蓋皇之建極本諸身也故九疇以此二疇為要然而漢伏生等傳失其真其後遂專言灾祥休咎之證其亦範之一用與銖分户析各指事應則失之拘矣易大傳曰洛出書聖人則之孔安國曰洛書者禹治水時神龜負文列於背有數自一至九禹遂因而第之劉歆曰禹治洪水錫洛書而陳之九疇是也關子明曰洛書之文九前一後三左七右四前左二前右八後左六後右朱子曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二是所謂參天兩地者也三二之合則為五矣此圖書之數所以皆以五為中也洛書以五竒數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也一三七九各居其五象本方之外而二四六八者各因其類以附于竒數之側蓋正者為君側者為臣有條而不紊也洛書主變故極於九而其位與實皆竒贏而偶乏虛其中也然後隂陽之數均其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而究于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也一六水也二七火也四九金也三八木也五土也縱橫十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉此變化無窮之所以為妙也履祥按洛出書而禹則之叙為九疇疇之取義者三焉一曰並義子王子曰洛書河圖相表裏故一六二七三八四九皆並位於是九疇之義相比而應一與六相並也係五行於一而係三德於六以天賦之氣有生克清濁之殊則人囿于質有剛柔善惡之異也二與七相並也係五事於二而係稽疑於七見於事者有得有失則驗于占者有吉有凶也四與九相並也係五紀於四而福極於九運於天者有經緯離合之不齊則賦於人者有五福六極之或異也三與八相並也係八政於三庶徴於八施於政者有善有惡則感於天者有變有常也二曰對義子王子曰一與九相對也係五行於一福極於九天之所賦有善惡厚薄則人之所禀有五福六極也二與六相對也係五事於二三德於六人身皆有當然之則本然之性也剛柔善惡之不同則氣質之性也四與八相對也係五紀於四庶徴於八五紀者天道之常經庶徴者天道之變化也三與七相對也係八政於三稽疑於七政有得有失則稽有吉有凶也箕子所陳五事庶徴相為感應則二與八又相對取義也四六亦然箕子蓋舉一隅以見義也今三縱而一衡而取義亦粲然矣三曰次第夫洛書之數連比對待縱橫錯綜然而履一則本之所以始戴九則表之所以終中五則上下左右錯綜回環而樞紐斡運於中也是亦自然之序故聖人亦因而次第之係五行於一以見化生人物之始也五行化生萬物人得其秀最靈而五行之在人者為五事故五事次之於二焉五性感動而善惡分萬事出矣而所以治之者其政有八故八政次之於三焉人事既繁庶政具舉因時作事則有天時之紀焉故五紀次之於四五行五事八政五紀天人之事備矣聖人成位乎其中立人極焉故皇極次之於五皇極者固所以順五行敬五事出八政贊五紀者以一人立極為天下之標凖其所以化民成俗因其氣習而治教之者則有三德焉故三德次之於六以一人而天下之標凖攸係至不輕也其中否吉凶小則質之神明故稽疑次之於七大則驗之於天地而五氣四時之運其休其咎有不可掩者矣故庶徴次之於八抑是理也君子修之吉小人悖之凶五福六極各以類應聖人又即以勸懲斯世焉蓋體天治人之用盡矣故次之於九終焉箕子陳洪範獨以次言之蓋獨陳其辭不可以無叙也至於五事敬又哲謀聖而驗諸庶徴則於對義固舉一隅矣或曰河圖之位圓圓者天也洛書之位方方者地也自一而次數之句連錯綜以至於九句連錯綜者地道之所以固也洛書之數其用深廣聖人叙疇於此未始數數言也然後世或以推灾異或以擬易占八陳太乙遁甲下至隂陽家者流以推八卦九宫八門黑白向背吉凶亦各得其末流之一節與抑天地自然之數周乎萬物固有所不能外也復九州經世歷日禹受命于神宗正天下水土分九州九山九川九澤按此年禹以十二州仍為九州此氣數邵子係之丁巳其必有考也三十有五載咨禹征有苗大禹謨曰帝曰咨禹惟時有苗弗率汝徂征禹乃㑹群后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆豫以爾衆士奉辭伐罪爾尚一乃心力其克有勳世之言有苗者多謂其負險阻抗衡中夏若後世荆楚之為觀舜禹吕刑之辭不過以其弗率反道賢否易置棄民虐刑耳初不為其抗衡而征之也於此見聖人之征伐其究以為民耳三旬苗民逆命禹之徂征也不必直搗其穴也奉辭以臨之警其悔悟耳苗之逆命也不必發兵拒守也不從辭命未知悔悟耳三旬而未奉令益猶欲其久而自悟故贊禹班師也聖人征代之師於此可見矣益贊于禹曰惟德動天無遠弗届滿招損謙受益時乃天道帝初于歷山往于田日號泣于旻天于父母負罪引慝祇載見瞽瞍䕫䕫齊栗瞽亦允若至諴感神矧兹有苗苗民之逆命也非舜禹德有未至亦非行之或滿也而益云然者古者聖賢行有不得反求諸已大率如此夫以苗之頑至於臨之兵又至於兵不可懼亦極矣豈必果進師以滅之哉又謙以處之又反求其所謂德而已矣以帝舜之事父豈有不至而不得於父帝亦惟自負罪引慝而終能底豫故凡自反誠切者終必有格又至諴之道可以感神而况有苗乎禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格誕敷文德大敷其文命德教使教化新明于諸侯交暢旁通謂之誕敷不必施之有苗也舞干羽者示之以禮樂也干武舞羽文舞蓋示反武敷文之意兩階賔階主階蓋舞之羣臣羣后朝㑹覲享之地也古人無文字書册之煩凡衣服物象器用禮樂之具皆所以示意向而明教化也路史曰於是命禹行天子之事三載釐苗弗恭命禹征之淮南子曰夫能理三苗朝羽民從祼國納肅愼未發號施令而移風易俗者其唯心行者乎法度刑罰何足以致之也履祥按舜之攝也覲諸侯巡四嶽行天子之事也不聞堯復命之也禹之攝也徂征之師帝猶命之而傳記亦有舜南巡之說是征伐巡狩禹不專也豈堯舜之事不詳見於經計舜每事亦必禀命與抑堯之命舜也曰陟帝位舜之命禹也曰總朕師終陟帝位云爾其攝復有不同與甲子三十有九載邵子皇極經世以運經世之二經元之甲一經㑹之午七經運之甲一百八十一經世之子二千一百六十一甲子夏王禹八年祝氏曰唐虞當第六㑹之終元經㑹之運卦在㑹之世同人上爻變而為革則天運推移矣當數之交堯舜知天之歷數以天下與賢茍非二聖之大德安能保灾度難洪水滔天非小沴也四凶稔惡非細故也惟堯舜能平定之故曰巍巍乎有天下而不與焉是年運之甲大畜節世之子大畜節年之甲子損節癸酉四十有八載帝陟方乃死書稱五十載蓋自堯萌之後通數也書曰舜生三十徵庸三十在位五十載陟方乃死言舜生三十而登庸又三十年而在位又五十年乃崩言其年數耳非是號也陟方猶言升遐也韓子曰竹書紀年帝王之沒皆曰陟陟升也謂升天也朱子曰方猶云徂乎方之方陟方乃死猶言殂落而死也史記曰南巡狩崩於蒼梧之野葬於江南九疑是為零陵皇覽曰舜冡在零陵營浦縣其山九溪皆相似故曰九疑傳曰舜葬蒼梧象為之耕禮記曰舜葬蒼梧之野蓋二妃未之從也西漢劉向傳舜葬蒼梧二妃不從東漢書引禮記作二妃今本曰三妃者誤也韓子曰堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之也禮有小君明其正自得稱君也大紀曰記稱舜葬蒼梧劉道原以為舜巡狩南裔往而不返者欲兆庶專意戴禹也夫舜本以耄期倦于勤使禹攝政使遠巡荒外而死是與經意相反也舜之授禹以天下者本乎民心與天意爾使禹有天命舜雖不死於荒外何病於禹使禹無天命舜雖死於荒外豈能有益於禹哉此記者謬誤道原習而未之察也履祥按淮漢以北上自伏羲下至近代帝王之墓尚皆可考獨舜冡不見於此而蒼梧去都最逺重以三苗之亂歷舜禹始克平之故舜禹於南方之化蓋數數然也是以舜至蒼梧今南方之地多其遺蹟而禹亦有㑹稽之㑹死亦葬焉聖人以天下為家不可以逺近論也甲戍四十有九載乙亥五十載禹避於陽城孟子曰舜崩三年之喪畢禹避舜之子於陽城天下諸侯朝覲訟獄謳歌者不之舜之子而之禹路史曰女罃生義均及季釐義均封商今商之商洛有堯女墓武關西北百有二十里商城是也禹封其子於虞季釐封於緡其後為夏桀所克舜庶子七人圭胡負遂廬蒲衛甄潘饒番𫝊鄒息有何母轅餘姚上虞濮陽餘虞西虞亡錫巴陵衡山長沙皆其裔也夏有箕伯箕伯之後箕子履祥按丹朱之不肖舜之子亦不肖然均之失德不見於經傳蓋德不若舜禹耳有禹則舜不以天下私均也舜處其子於啇而禹復封之虞古史謂服其服禮樂如之客見天子而不臣然古史又謂舜宗祀堯至舜之子孫則更郊堯而宗舜此據國語及韋昭之說也舜郊嚳宗堯則禹固當郊堯而宗舜矣而乃以堯舜之祀歸之舜之子孫顧自郊鯀焉何也曰此夏之末造也夫三聖以天下為公則皆承其祀三王之子孫以天下為家則各祖其祖舜之宗堯禹之宗舜一也舜之郊嚳禹之郊堯亦一也其郊鯀也則夏之末造也祀夏配天其諸始於少康乎於是郊堯宗舜則屬之虞思之國矣孔子曰杞之郊也禹也宋之郊也契也蓋啇周存二代之後猶尊賢也尊賢則把郊禹矣把而郊禹則虞郊舜而唐郊堯皆天子之事守也御批資治通鑑綱目前編卷二
