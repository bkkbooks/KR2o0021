body:
  text: 欽定四庫全書御批資治通鑑綱目前編舉要卷三庚寅靈王元年正月葬簡王春秋鄭師伐宋春秋鄭成公卒子髠頑嗣用左傳史記年表世家修晉師宋師衛寧殖侵鄭春秋晉荀罃宋華元魯仲孫蔑衛孫林父曹人邾人會于戚晉荀罃齊崔杼宋華元魯仲孫蔑衛孫林父曹人邾人滕人薛人小邾人會于戚用左傳修遂城虎牢春秋二年楚公子嬰齊師師伐吳春秋吳人伐楚左傳單子晉侯宋公魯侯衛侯鄭伯莒子邾子齊世子光同盟于雞澤用左傳修陳侯使袁僑如會春秋諸侯之大夫及袁僑盟用左傳修三年陳成公卒子溺嗣用左傳史記年表世家修陳人圍頓春秋晉大夫魏綘盟諸戎用左傳修四年王叔陳生如晉晉侯使士魴來京師用左傳修晉侯宋公魯侯陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人會于戚用左傳修諸侯戍陳用左傳修楚公子貞帥師伐陳春秋晉侯宋公魯侯衛侯鄭伯曹伯齊世子光救陳用左傳修五年莒人滅鄫春秋齊侯滅萊六年楚公子貞帥師圍陳春秋晉侯宋公魯侯陳侯衛侯曹伯莒子邾子會于鄬用左傳修鄭僖公如會未見諸侯卒于鄵見春秋公子騑實弒之而立其子嘉用左傳史記年表世家修陳侯逃歸春秋七年鄭人侵蔡獲蔡公子燮春秋晉侯鄭伯齊人宋人魯人衛人邾人會于邢丘用左傳修楚公子貞帥師伐鄭春秋八年晉侯宋公魯侯衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭用左傳修同盟于戲楚子伐鄭九年晉侯宋公魯侯衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤用左傳修遂滅逼陽春秋楚公子貞鄭公孫輒帥師伐宋春秋晉侯宋公魯侯衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭用左傳修戍鄭虎牢楚公子貞帥師救鄭春秋以單子為卿士用左傳修十年魯作三軍用左傳修鄭公孫舍之帥師侵宋春秋晉侯宋公魯侯衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭用左傳修同盟于亳城北楚子鄭伯伐宋春秋晉侯宋公魯侯衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭用左傳修會于蕭魚楚人執鄭行人良霄秦人伐晉春秋十有一年吳子壽夢卒長子諸樊立用左傳史記年表世家經世修楚公子貞帥師侵宋春秋王使隂里聘后于齊用左傳修十有二年晉作三軍用左傳修楚共卒子招立世子出奔吳用史記年表修吳侵楚敗績用左傳修十有三年晉士丐齊人宋人魯季孫宿叔老衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向用左傳修二月乙未朔日有食之春秋晉荀偃齊人宋人魯叔孫豹衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦用左傳修衛侯出奔齊春秋衛人立公孫剽用左傳修楚公子貞帥師伐吳春秋敗績用左傳修王使劉子賜齊侯命用左傳修晉士丐宋華閲魯季孫宿衛孫林父鄭公孫蠆莒人邾人會于戚用左傳修十有四年劉夏逆王后于齊春秋齊侯伐魯圍郕用左傳修八月丁巳日有食之春秋邾人伐魯南鄙用左傳修晉悼公卒子彪嗣用左傳史記年表世家修十有五年晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子會于溴梁用左傳修大夫盟晉人執莒子邾子以歸春秋鄭伯晉荀偃魯叔老衛寧殖宋人伐許見春秋齊侯再伐魯北鄙魯叔孫豹如晉用左傳修十有六年邾宣公卒華立見春秋宋人伐陳衛石買帥師伐曹春秋齊侯伐魯北鄙圍桃齊高厚帥師伐魯北鄙圍防邾人伐魯南鄙用左傳修十有七年齊師伐魯北鄙用左傳修晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊用左傳修曹成公卒于師見春秋子滕嗣見春秋兼用史記年表世家修楚公子午帥師伐鄭春秋燕武公卒文公立用史記年表世家修十有八年諸侯盟于祝阿晉人執邾子春秋齊靈公卒子光嗣用左傳史記年表世家經世修晉士丐帥師侵齊至穀聞齊侯卒乃還春秋王賜鄭大夫公孫蠆大路以葬用左傳修鄭殺其大夫公子嘉春秋子産為大夫用左傳修十有九年晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵用左傳修蔡殺其大夫公子燮春秋十月丙辰朔日有食之春秋二十年晉欒盈出奔楚春秋九月庚戌朔日有食之春秋十月庚辰朔日有食之春秋晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子會于商任用左傳修庚戌二十有一年晉人徵朝于鄭左傳晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子會于沙隨用左傳修鄭大夫公孫黑肱卒用左傳修孔子生用史記世家修二十有二年二月癸酉朔日有食之春秋晉欒盈復入于晉入于曲沃齊侯伐衛遂伐晉魯叔孫豹帥師救晉次于雍榆晉人殺欒盈齊侯襲莒春秋穀洛鬬國語二十有三年齊人來城郟魯叔孫豹來賀城用左傳修鄭伯如晉用左傳修齊楚交聘晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子會于夷儀用左傳修楚子蔡侯陳侯許男伐鄭春秋七月甲子朔日有食之既春秋八月癸巳朔日有食之春秋燕文公卒懿公立用史記年表世家修二十有四年齊崔杼弒其君莊公立其弟杵臼用左傳史記年表世家修晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子會于夷儀伐齊齊慶封如師用左傳修諸侯同盟于重丘鄭公孫舍之帥師入陳衛侯入于夷儀春秋晉使趙武為政用左傳修吳子遏伐楚門于巢卒春秋弟餘祭立用公羊傳史記年表世家經世修二十有五年衛寧喜弒其君剽衛孫林父入于戚叛衛侯衎復歸于衛春秋魯侯晉人鄭良霄宋人曹人會于澶淵用左傳修晉人執衛寧喜春秋許靈公卒于楚用左傳修楚子蔡侯陳侯伐鄭春秋晉侯使士起入聘用左傳修齊慶封誅崔杼之族專國政用經世修二十有六年晉趙武楚屈建魯叔孫豹蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人會于宋諸侯之大夫盟于宋用左傳修衛殺其大夫寧喜春秋十有一月乙亥朔日有食之用左傳杜氏長歷修二十有七年齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋公魯侯陳侯鄭伯許男朝于楚用左傳修楚康卒子麇嗣用左傳史記年表世家修王崩太子晉母弟貴踐位用史記本紀修燕懿公卒子欵嗣用史記世家修丁巳景王元年夏五月葬靈王左傳衛獻公卒子惡嗣用史記年表世家修閽弒吳子餘祭春秋弟夷末立見春秋晉荀盈會齊高止宋華定魯仲孫羯衛世叔儀鄭公孫假曹人莒人滕人薛人小邾人城杞用左傳修吳子使札聘于魯齊鄭衛晉用左傳史記年表經世修二年蔡公子般弒其君景侯而自立用左傳修宋災宋伯姬卒春秋王殺其弟佞夫用左傳修王子瑕奔晉春秋晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故春秋鄭使公孫僑為政用左傳修三年魯襄公卒于楚宫子野立而卒稠立用左傳史記年表世家經世修鄭伯如晉用左傳修衛侯如楚用左傳修莒人弒其君密州春秋魯仲由生用史記列傳修四年魯昭公元晉趙武楚公子圍齊國弱宋向戍魯叔孫豹衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人會于虢魯取鄆王使劉子勞趙武于潁用左傳修邾悼公卒穿立見春秋晉荀吳始用卒敗狄于大鹵用左傳修莒去疾自齊入于莒莒展輿出奔吳春秋楚子麇卒春秋令尹圍實弒之而自立楚公子比奔晉用左傳史記年表世家修五年晉使韓起聘于魯齊衛用左傳修鄭殺其大夫公孫黑春秋蔡漆雕開生用史記列傳家語修六年鄭遊吉如晉左傳齊晏嬰如晉用左傳修北燕伯欵出奔齊春秋燕人立悼公用左傳修七年楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚人執徐子楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴春秋鄭作丘賦用左傳修魯有若生用史記列傳家語修甲子八年魯舍中軍用左傳修秦景公卒子嗣見春秋兼用史記年表秦紀經世修楚子蔡侯陳侯許男頓子沈子徐人越人伐吳春秋孔子志于學用論語修九年鄭人鑄刑書用左傳修楚公子棄疾如晉用左傳修楚薳罷帥師伐吳春秋吳人敗之用左傳修齊侯伐北燕春秋十年四月甲辰朔日有食之春秋衛襄公卒公子元嗣衛齊惡來請命王使成子如衛弔追錫命用左傳史記世家修十有一年陳侯之弟招殺陳世子偃師春秋陳哀公卒用左傳修楚師滅陳春秋十有二年宋華亥魯叔弓鄭遊吉衛趙黶會楚子于陳用左傳修許遷于夷春秋王使詹桓如晉晉侯使趙成來致閻田用左傳修十有三年齊陳氏鮑氏逐欒施高強用左傳修晉平公卒子夷嗣用左傳史記年表世家修宋平公卒子佐嗣用左傳史記年表世家修孔子生伯魚用家語修十有四年楚子虔誘蔡侯般殺之于申楚公子棄疾帥師圍蔡春秋晉韓起會齊國弱宋華亥魯季孫意如衛北宫他鄭罕虎曹人杞人于厥憖王使單子命事於會用左傳修楚師滅蔡執蔡世子有以歸用之春秋單成公卒用左傳修十有五年齊高偃帥師納北燕伯于陽春秋鄭簡公卒子寧嗣用左傳史記年表世家修齊侯魯侯衛侯鄭伯如晉魯侯至河乃復魯公子憖遂如晉公子憖奔齊用左傳修原伯絞奔郊成景之族弒甘公過用左傳修楚子伐徐春秋十有六年楚公子比自晉歸于楚弒其君虔于乾溪春秋楚公子棄疾殺公子比而自立用左傳修劉子晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子會于平丘同盟魯侯不與盟用左傳修晉人執魯季孫意如以歸春秋蔡侯廬歸于蔡陳侯吳歸于陳春秋吳滅州來春秋燕悼公卒共公立用史記年表世家修十有七年晉釋魯季孫意如用左傳修曹武公卒子須嗣見春秋兼用史記年表世家修十有八年吳子夷末卒子僚立用史記世家修蔡朝吳出奔鄭春秋六月丁巳朔日有食之春秋王太子壽卒王穆后崩左傳十有九年齊侯伐徐春秋徐子及郯人莒人會齊侯盟于蒲隧左傳楚子誘戎蠻子殺之春秋晉昭公卒子去疾嗣用左傳史記年表世家修二十年六月甲戌朔日有食之春秋郯子朝于魯用左傳修晉侯使屠蒯來請有事於雒與三塗用左傳修晉荀吳帥師滅陸渾之戎春秋楚人及吳戰于長岸春秋二十有一年毛得殺毛伯過用左傳修曹平公卒子午嗣用左傳史記年表世家修宋衛陳鄭災春秋使原伯魯如曹葬曹平公用左傳修許遷于白羽春秋鑄大錢國語燕共公卒平公立用史記年表世家修二十有二年許世子止弒其君買葬許悼公春秋楚用費無極放世子建于城父用經世修二十有三年孔子至京師既而反乎魯用史記世家家語修楚世子建自城父奔宋楚子殺其傳伍奢及子伍尚伍員奔吳用左傳修齊侯與其大夫晏嬰入魯問禮於孔子用經世修鄭大夫公孫僑卒用左傳修蔡平侯卒子朱嗣用左傳史記年表世家修魯冉雍生魯冉求生用史記列傳反注修二十有五年王崩子猛踐位用左傳史記本紀修葬景王王室亂劉子單子以王猛居于皇春秋秋入于王城用左傳修冬王子猛卒春秋母弟丐立用史記本紀修十有二月癸卯朔日有食之用杜氏長歷修衛端木賜生用史記列傳修壬午敬王元年蔡悼侯卒于楚用史記世家修弟申立用史記年表世家修吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧春秋王居狄泉用左傳修尹氏立王子朝春秋地震用左傳杜氏注修二年王在狄泉王子朝入于塢用左傳修晉侯使士景伯來用左傳修鄭伯如晉左傳五月乙未朔日有食之春秋吳滅巢春秋三年晉趙鞅宋樂大心魯叔請衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人會于黃父用左傳修魯侯攻其大夫季孫意如不