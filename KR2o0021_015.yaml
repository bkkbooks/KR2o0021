body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十五庚寅周靈王元年正月葬簡王林氏曰五月而葬速也鄭師伐宋鄭成公卒子髠頑嗣是為僖公晉師宋師衛寧殖侵鄭晉荀罃宋華元魯仲孫蔑衛孫林父曹人邾人㑹于戚晉荀罃齊崔杼宋華元魯仲孫蔑衛孫林父曹人邾人滕人薛人小邾人㑹于戚遂城虎牢左氏曰鄭人侵宋楚令也鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰䁥我鄭伯卒於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改㑹于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊若不得請事將在齊吾子之請諸侯之福也冬復㑹於戚齊崔武子及滕薛小邾之大夫皆㑹遂城虎牢鄭人乃成二年楚公子嬰齊帥師伐吳吳人伐楚單子晉侯宋公魯侯衛侯鄭伯莒子邾子齊世子光同盟于雞澤陳侯使袁僑如㑹諸侯之大夫及袁僑盟左氏曰晉為鄭服故且欲修吳好將合諸侯使士丐告于齊齊侯欲勿許而難為不協乃盟於耐外六月公㑹單頃公及諸侯同盟於雞澤晉侯使荀㑹逆吳子于淮上不至楚子辛為令尹侵欲於小國陳成公使袁僑如㑹求成秋諸侯之大夫及陳袁僑盟穀梁氏曰諸侯盟又大夫相與私盟是大夫張也故雞澤之㑹諸侯始失正矣陳氏曰以大夫盟袁僑晉侯不欲袁僑詘諸侯也雖然有諸侯在而大夫盟於是始晉悼公為之也諸侯在焉而大夫自為盟而后大夫專盟矣大夫專盟自宋始三年陳成公卒子溺嗣是為哀公左氏曰楚司馬公子何忌侵陳春猶在繁陽韓獻子患之陳成公卒楚人將伐陳聞喪乃止陳人不聼命夏楚彭名侵陳陳人圍頓左氏曰楚人使頓間陳而侵伐之故陳人圍頓晉大夫魏絳盟諸戎左氏曰無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鍳于后羿而用德度遠至邇安五也君其圖之公說使魏絳盟諸戎修民事田以時四年王叔陳生如晉晉侯使士魴來京師左氏曰王使王叔陳生訴戎于晉晉人執之士魴如京師言王叔之二於戎也晉侯宋公魯侯陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人㑹于戚左氏曰吳子使壽越如晉辭不㑹于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先㑹吳且告㑹期故孟獻子孫文子㑹吳于善道九月盟于戚㑹吳且命戍陳也諸侯戍陳楚公子貞帥師伐陳晉侯宋公魯侯衛侯鄭伯曹伯齊世子光救陳左氏曰楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可五年莒人滅鄫齊侯滅萊六年楚公子貞帥師圍陳晉侯宋公魯侯陳侯衛侯曹伯莒子邾子㑹于鄬鄭僖公如㑹未見諸侯卒于鄵公子騑實弒之而立其子嘉是為簡公陳侯逃歸左氏曰楚子囊圍陳㑹于鄬以救之鄭僖公將㑹于鄬及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯簡公生五年奉而立之明年春鄭羣公子以僖公之死也謀子駟子駟先之殺子狐子熙子侯子丁陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之告陳侯于㑹曰楚人執公子黃矣君若不來群臣不忍社稷宗廟懼有二圖陳侯逃歸公羊氏曰鄭伯髠頑如㑹未見諸侯卒于鄵隱之也弒也不言弒為中國諱也鄭伯將㑹諸侯于鄬其大夫諫曰中國不足歸也則不若與楚鄭伯曰不可其大夫曰以中國為義則伐我喪以中國為彊則不若楚於是弒之未見諸侯其言如㑹何致其意也穀梁氏曰鄭伯將㑹中國其臣欲從楚不勝其臣弒而死其不言弒不使夷狄之民加乎中國之君也履祥按鄭僖公之卒春秋不以弒書疑獄也獄之疑霸主之不明也明年春鄭群公子以僖公之死也謀子駟子駟殺之其冬子駟卒建從楚之䇿然則弒僖之獄非疑也夫以霸主在焉諸侯皆在焉而鄭僖之來其卒不明從其瘧疾之赴以是為晉悼諸侯之病也春秋書㑹于鄬鄭伯髠頑如㑹未見諸侯卒于鄵蓋憐鄭伯之志以責於晉悼及諸侯也先王之禮薨于朝㑹加一等死王事加二等僖公加于人一二等矣七年鄭人侵蔡獲蔡公子燮晉侯鄭伯齊人宋人魯人衛人邾人㑹于邢丘左氏曰鄭子國子耳侵蔡獲司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣㑹于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戍衛寧殖邾大夫㑹之鄭伯獻捷于㑹故親聽命楚公子貞帥師伐鄭左氏曰楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之俟河之清人壽幾何姑從楚以紓吾民晉師至吾又從之犧牲玉帛待于二竟以待彊者而庇民焉子展曰小所以事大信也小國無信兵亂日至五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼遠糧食將盡必將速歸完守以老楚杖信以待晉不亦可乎子駟曰謀夫孔多是用不集請從楚騑也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵于蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟於楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之八年晉侯宋公魯侯衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭同盟于戲楚子伐鄭左氏曰秦景公使乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皂𨽻不知遷業韓厥老矣知罃禀焉以為政范丐少於中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可楚子曰吾既許之雖不及晉必將出師師於武城以為秦援秦人侵晉晉饑弗能報也冬諸侯伐鄭魯齊宋之大夫從荀罃士丐門于鄟門衛曹邾人從荀偃韓起門于師之梁滕薛人從欒黶士魴門于北門杞郳人從趙武魏絳斬行栗師于汜令於諸侯曰修器備盛餱糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰諸侯皆不欲戰乃許鄭成同盟于戲鄭服也士莊子為載書曰自今日既盟之後鄭國不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子曰我實不德而要人以盟豈禮也哉姑盟而退修德息師而來終必獲鄭我之不德民將棄我豈唯鄭若能休和遠人將至何恃於鄭乃盟而還楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云惟彊是從今楚師至晉不我救則楚彊矣且要盟無質背之可也乃及楚平楚莊夫人卒楚子未能定鄭而歸晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭履祥按秦將伐晉乞師于楚楚子囊言晉之不可敵可謂審矣然而歲有爭鄭之師何也蓋助秦則秦彊而得鄭則楚彊是以雖明於拒秦而昧於爭鄭也於是晉饑不能報秦而亦急於爭鄭蓋報秦不過得志於西戎而得鄭則可以得志於中國此又晉悼之大略也所以伐鄭而歸急於息民出積亦以饑故爾九年晉侯宋公魯侯衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤遂滅逼陽左氏曰㑹吳子壽夢也晉荀偃士丐請伐逼陽而封宋向戍荀罃曰城小而固勝之不武弗勝為笑固請圍之弗克逼陽人啓門諸侯之士門焉縣門發郰人紇抉之以出門者諸侯之師久於逼陽荀偃士丐請於荀罃曰水潦將降懼不能歸請班師知伯怒曰女既勤君而興諸侯牽帥老夫以至於此而又欲易余罪七日不克必爾乎取之荀偃士丐帥卒攻逼陽滅之以與向戌辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君群臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃豫宋公楚公子貞鄭公孫輒帥師伐宋晉侯宋公魯侯衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭戍鄭虎牢楚公子貞帥師救鄭左氏曰楚子囊鄭子耳伐宋圍之門于桐門衛師救宋鄭子展曰必伐衛不然是不與楚也使鄭皇耳侵衛衛人追之孫蒯獲皇耳于犬丘秋楚子囊鄭子耳伐我西鄙還圍蕭克之九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚諸侯伐鄭師于牛首初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭尉止帥賊以入晨攻執政于西宫之朝殺子駟子國子耳諸侯之師城虎牢而戍之鄭及晉平楚子囊救鄭諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之耻也師遂進與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也師還侵鄭北鄙而歸楚人亦還子王子曰天下之形勢亘古今猶一也非有人以用之未必不反為亡國之資虎牢之險鄭實有之鄭不能用晉城虎牢而鄭之勢遂窮犧牲玉帛待於二竟鄭之頑計弗能支也形勢之不可失也如此以單子為卿士左氏曰王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以說焉不入遂處之晉侯使士丐平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職若篳門閨竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無篳門閨竇乎唯大國圖之下而無直則何謂正矣范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉單靖公為卿士以相王室十年魯作三軍左氏曰季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之乃盟諸僖閎詛諸五父之衢三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍鄭公孫舍之帥師侵宋晉侯宋公魯侯衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭同盟於亳城北楚子鄭伯伐宋晉侯宋公魯侯衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚楚人執鄭行人良霄秦人伐晉左氏曰鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之疾急也何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆場之司惡於宋宋向戍侵鄭大獲夏子展侵宋諸侯伐鄭齊大子光宋向戍先至門于東門其莫晉荀罃至東侵舊許衛孫林父侵其北鄙六月諸侯㑹于北林師于向右還次於瑣圍鄭觀兵于南門鄭人懼乃行成同盟于亳范宣子曰不愼必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司愼司盟名山名川群神群祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家楚子囊乞旅于秦秦右大夫帥師從楚子將以伐鄭鄭伯逆之丙子伐宋九月諸侯悉師以復伐鄭鄭人使良霄石􅎢如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成晉趙武入盟鄭伯鄭子展出盟晉侯㑹于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鐘二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也夫樂以安德義以處之禮以行之信以守之仁以厲之而後殿邦國同福祿來遠人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也子其受之魏絳於是乎始有金石之樂胡氏曰程子曰㑹于蕭魚鄭又服而請㑹也不書鄭㑹謂其不可信也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥候禁侵掠遣叔肸告于諸侯而鄭自此不復背晉者二十四年至哉誠之能感人也而悼公又能謀於魏絳以息民聽於知武子而不與楚戰故三駕而楚不能與之爭雖城濮之績不越是矣十有一年吳子壽夢卒春秋作乘長子諸樊立史記曰壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可於是立長子諸樊左氏曰吳子諸樊既除喪將立季札季札曰有國非吾節也固立之棄其室而耕乃舍之楚公子貞帥師侵宋左氏曰報晉之取鄭也王使隂里聘后于齊左氏曰靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之十有二年晉作三軍左氏曰荀罃士魴卒晉侯搜于綿上以治兵使士丐將中軍辭曰伯游長荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和諸侯遂睦履祥按魯以三分公室而作三軍晉亦以新軍無帥而復三軍非能復古也然以魏絳之能而不以為帥初使佐新軍至是廢新軍而復佐下軍非特晉悼不以為帥而諸卿讓善亦不及焉又不知其何說也漢馬謖善謀孔明使為將而卒敗晉悼此舉或者其無孔明之失與楚共卒子招立是為康世子出奔吳左氏曰楚子疾告大夫曰不穀不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之吳侵楚敗績十有三年晉士丐齊人宋人魯季孫宿叔老衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向左氏曰吳告敗于晉㑹于向為吳謀楚故也范宣子數吳之不德也以退吳人執莒公子務婁以其通楚使也將執戎子駒支范宣子親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于瓜州乃祖吾離被苫蓋䝉荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由詰朝之事爾無與焉與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大德謂我諸戎是四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不二昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逖今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與於㑹亦無瞢焉賦青蠅而退宣子辭焉使即事於㑹成愷悌也陳氏曰向之㑹悼德衰矣數吳之不德以退吳人而卒㑹吳執莒公子務婁以其通楚使也而卒㑹莒諸侯之大夫從晉伐秦而悼不自將諸侯之師及涇不濟荀偃欒黶二帥爭而大還晉人謂之遷延之役是故伐秦之役不書晉侯志晉侯之怠也則諸侯之大夫有不親事於㑹者矣有伯者之令而大夫不親事於是始悼公為之也二月乙未朔日有食之晉荀偃齊人宋人魯叔孫豹衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦左氏曰諸侯之大夫從晉侯伐秦報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固若社稷何二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭子蟜帥鄭師以進師皆從之至於棫林不獲成荀偃令曰雞鳴而駕惟余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之伯游乃命大還晉人謂之遷延之役欒針曰此報櫟之敗也又無功晉之耻也與士鞅馳秦師死焉士鞅反欒黶謂士丐曰余弟死而子來是而子殺余弟也弗逐余亦將殺之士鞅奔秦秦伯問曰晉大夫其誰先亡對曰欒氏秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎武子之德在民如周人之思召公愛其甘棠况其子乎黶死盈之善未能及人武子所施沒矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之師歸自伐秦舍新軍衛侯出奔齊衛人立公孫剽左氏曰衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章辭師曹請歌之以怒孫子蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近關出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤子鮮從公公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪魯襄公使厚成叔弔于衛太叔儀對曰群臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔群臣又重恤之敢拜君命之辱重拜大貺厚孫歸復命語臧武仲曰衛君其必歸乎有太叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎齊人以郲寄衛侯及其復也以郲糧歸衛人立公孫剽孫林父寧殖相之以聽命於諸侯臧紇如齊唁衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫說謂其人曰衛君必入夫二子者或挽之或推之欲無入得乎師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂𨽻牧圉皆有親䁥以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸狥于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣胡氏曰寧殖將死曰吾得罪於君名在諸侯之策曰孫林父寧殖出其君諸侯之策則晉乘魯春秋之類是也今春秋書衛侯出奔齊而不曰孫林父寧殖出其君蓋仲尼筆削不因舊史之文也臣而逐君其罪已明矣人君擅一國之名寵神之主而民之望也所為見逐無乃肆於民上從其淫虐以失天地之性乎春秋端本清源之書故不書所逐之臣而以自奔為名所以警乎人君為後世鍳非聖人莫能修之為此類也楚公子貞帥師伐吳敗績王使劉子賜齊侯命左氏曰王使劉定公賜齊侯命曰昔伯舅太公右我先王股肱周室師保萬民世胙大師以表東海王室之不壞繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命杜氏曰因昏加褒王室不能命有功晉士丐宋華閲魯季孫宿衛孫林父鄭公孫蠆莒人邾人㑹于戚左氏曰晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯其定衛以待時乎㑹于戚謀定衛也十有四年劉夏逆王后於齊左氏曰卿不行非禮也齊侯伐魯圍成左氏曰范宣子假羽毛於齊而弗歸齊人始二齊人圍成二於晉故也八月丁巳日有食之邾人伐魯南鄙晉悼公卒子彪嗣是為平公左氏曰邾人伐魯南鄙使告于晉晉將為㑹以討邾莒襄十一年十三年莒人伐魯未之討也晉侯有疾乃止冬晉悼公卒遂不克㑹十有五年晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子㑹于溴梁大夫盟晉人執莒子邾子以歸左氏曰葬晉悼公平公即位羊舌肸為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官蒸于曲沃警守而下㑹于溴梁命歸侵田以我故執邾宣公莒犂比公且曰通齊楚之使晉侯與諸侯宴于溫高厚逃歸於是諸大夫盟曰同討不庭鄭伯晉荀偃魯叔老衛寧殖宋人伐許左氏曰許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜相鄭伯以從諸侯之師伐許次于函氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰于湛阪楚師敗績晉師遂侵方城之外復伐許而還齊侯再伐魯北鄙魯叔孫豹如晉左氏曰穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也十有六年邾宣公卒華立是為悼公宋人伐陳衛石買帥師伐曹齊侯伐魯北鄙圍桃齊高厚帥師伐魯北鄙圍防邾人伐魯南鄙左氏曰衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詢之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人訴于晉齊侯伐我北鄙高厚圍臧紇于防郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君之賜不終姑又使其刑臣禮於士以杙抉其傷而死邾人伐我南鄙為齊故也十有七年齊師伐魯北鄙晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊曹成公卒于師子滕嗣是為武公楚公子午帥師伐鄭左氏曰晉侯伐齊將濟河中行獻子以朱絲繫玉二㲄而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曽臣彪將率諸侯以討焉其官臣偃實先後之茍捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬㑹于魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入若入君必失國子家以告公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰皆襟甲面縛坐於中軍之鼓下荀偃士丐以中軍克京兹魏絳欒盈以下軍克邿趙武韓起以上軍圍盧及秦周伐雍門之萩范鞅門于雍門孟莊子斬其橁以為公琴焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木焚東郭北郭范鞅門于揚門州綽門于東閭左驂迫還于門中以枚數闔齊侯駕將走郵棠大子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劒斷鞅乃止東侵及濰南及沂鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不穀主社稷而不出師死不從禮不穀即位於今五年師徒不出人其以不穀為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次於魚陵右師城上棘遂涉潁次于旃然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉於魚齒之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之德也燕武公卒文公立十有八年諸侯盟于祝柯晉人執邾子齊靈公卒子光嗣是為莊公晉士丐帥師侵齊至穀聞齊侯卒乃還左氏曰春諸侯還自沂上盟于督揚曰大毋侵小執邾悼公以其伐我故遂次于泗上疆我田取邾田自漷水歸之于我晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乘馬先吳壽夢之鼎荀偃卒而視不可含宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰其為未卒事於齊故也乎乃復撫之曰主茍終所不嗣事于齊者有如河乃瞑受含宣子出曰吾淺之為丈夫也季武子如晉拜師歸以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彛器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也齊侯娶于魯曰顔懿姬其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東大子光使高厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔高唐以叛晉士丐侵齊及穀聞喪而還王賜鄭大夫公孫蠆大路以葬左氏曰鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也晉侯請於王王追賜之大路使以行鄭殺其大夫公子嘉子産為大夫十有九年晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵左氏曰齊成故也蔡殺其大夫公子燮左氏曰蔡公子燮欲以蔡之晉蔡人殺之初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死十月丙辰朔日有食之二十年晉欒盈出奔楚左氏曰范鞅以其亡怨欒氏欒祁與其老州賔通懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而專政矣范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺其黨羊舌虎十人囚伯華叔向籍偃祁奚乘馹而見宣子曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身若之何其以虎也棄社稷宣子說與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝叔虎美而有勇力欒懷子嬖之故羊舌氏之族及於難欒盈過於周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也九月庚戌朔日有食之十月庚辰朔日有食之晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子㑹于商任左氏曰錮欒氏也庚戍二十有一年晉人徵朝于鄭左氏曰晉人徵朝于鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨于執事以㑹歲終二於楚者子侯石盂歸而討之溴梁之明年子蟜老矣公孫夏從寡君以朝于君見於嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聽事期不朝之間無歲不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讐敝邑是懼其敢忘君命委諸執事執事實重圖之晉侯齊侯宋公魯侯衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子㑹于沙隨左氏曰欒盈自楚適齊晏平仲言于齊侯曰商任之㑹受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼鄭大夫公孫黑肱卒左氏曰鄭公孫黑肱有疾歸邑于公召室老宗人而使黜官薄祭曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也伯張卒孔子生史記世家曰孔子名丘字仲尼其先宋人父叔梁紇母顔氏以魯襄公二十二年庚戍之歲十一月庚子生孔子於魯昌平鄉陬邑生而墟頂因名曰丘為兒嬉戲常陳爼豆設禮容及長為委吏料量平掌委積之官為司職吏畜蕃息職讀為樴見周禮與杙同蓋繫養犧牲之所此官即孟子所謂乘田也又按公穀二傳皆謂魯襄公二十一年孔子生而史記獨曰二十二年或謂春秋用夏正史記如秦法然不可考按襄公二十一年日再食决非生聖人之年也當從史記本姓解曰孔子之先宋之後也微子啓帝乙之元子紂之庶兄以圻內諸侯入為王卿士微國名子爵初武王克殷封紂之子武庚于朝歌武王崩而與三叔作難周公相成王東征之乃命微子為殷後國于宋其弟曰仲思名衍或名泄嗣微子之後號微仲生宋公稽二微雖為宋公而猶以微之號自終至於稽乃稱公焉宋公生丁公申甲生緡公共及襄公熙熙生弗父何及厲公鮒祀弗父何以下世為宋卿何生宋父周周生勝勝生正考甫考甫生孔父嘉五世親盡别為公族故後以孔為氏焉一曰孔父者生時所賜號也是以子孫遂以氏族孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯防叔生伯夏伯夏生叔梁紇有九女無子其妾生孟皮一字伯尼有足病於是求㛰於顔氏顔氏三女其小曰徴在顔父問三女曰鄹大夫雖父祖為士然其先聖王之裔今其人身長十尺武力絶倫雖年長性嚴不足為疑三子孰能為之妻徵在進曰從父所制父曰即爾能矣遂以妻之徵在既廟見以夫之年大懼不時有男而私禱尼丘之山以祈焉生孔子故名丘字仲尼孔子三嵗而叔梁紇卒葬於防二十有二年二月癸酉朔日有食之晉欒盈復入于晉入于曲沃齊侯伐衛遂伐晉魯叔孫豹帥師救晉次于雍榆晉人殺欒盈齊侯襲莒左氏曰晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劒左援帶命驅之出僕請鞅曰之公宣子逆諸階賂之以曲沃欒氏之力臣曰督戎國人懼之斐豹𨽻也著於丹書謂宣子茍焚丹書我殺督戎督戎踰入豹自後擊而殺之范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劒以帥卒欒氏退攝車從之欒樂死欒魴傷欒盈奔曲沃晉人圍之秋齊侯伐衛先驅前鋒也申驅次軍也曹開御戎公車也晏父戎為右二廣公副車也啓左翼也胠右翼也大殿後軍也自衛將伐晉晏平仲曰君恃勇力以伐盟主不濟國之福也不德而有功憂必及君崔杼諫弗聽崔子曰羣臣若急君於何有文子退曰崔子將死乎謂君甚而又過之齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師追之獲晏氂魯叔孫豹帥師救晉次于雍榆晉人克欒盈于曲沃盡殺欒氏之族黨齊侯還自晉不入遂襲莒門于且于傷股而退莒人獲杞梁陳氏曰自袁婁以來齊世從晉於是始叛則晉伯之衰而諸侯二矣晉之衰諸夏之憂也書救晉則天下益多故矣盟于宋而南北之勢成㑹于申而淮夷至戰于雞父而吳之敗者六國於越入吳春秋終焉蓋於是焉始穀洛鬬國語曰靈王二十二年穀洛鬬將毁王宫王欲壅之大子晉諫曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚於高歸物於下疏為川谷以導其氣陂唐汚庳以鍾其美是故聚不阤崩而物有所歸氣不沈滯而亦不散越是以民生有財用而死有所葬然後無夭昏札瘥之憂而無饑寒乏匱之患故上下能相固以待不虞古之聖王惟此之愼今吾執政無乃實有所避而滑夫二川之神使至於爭明以妨王宫王而飾之無乃不可乎王將防鬬川以飾宫是飾亂而佐鬭也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至于今未弭我又章之懼長及子孫王室其愈卑乎自后稷以來寧亂及文武成康而僅克安民自后稷之始基靖民十五王而文始平之十八王而康克安之其難也如是厲始革典十四王矣基德十五而始平基禍十五其不濟乎吾惟警懼其何德之修而少光王室以逆天休將焉用飾宫以徼亂也度之天神則非祥也比之地物則非義也類之民則則非仁也方之時動則非順也上非天刑下非地德中非民則方非時動而作之者必不節矣作又不節害之道也王卒壅之二十三年齊人來城郟魯叔孫豹來賀城左氏曰齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路杜氏曰郟王城也於是穀洛鬬毁王宫齊叛晉欲求媚於天子故為王城之鄭伯如晉齊楚交聘晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子㑹于夷儀楚子蔡侯陳侯許男伐鄭左氏曰范宣子為政諸侯之幣重鄭伯如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以明德則令名載而行之是以遠至邇安毋寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子說乃輕幣鄭伯請伐陳齊侯既伐晉而懼欲見楚子楚子使薳啓疆如齊聘且請期齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒㑹于夷儀將以伐齊水不克楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭晉侯使張骼輔躒致楚師楚子自棘澤還使薳啓疆帥師送陳無宇七月甲子朔日有食之既八月癸巳朔日有食之燕文公卒懿公立二十有四年齊崔杼弒其君莊公立其弟杵臼是為景公晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子㑹于夷儀伐齊齊慶封如師諸侯同盟于重丘鄭公孫舍之帥師入陳衛侯入于夷儀左氏曰齊崔杼伐我以報孝伯之師襄二十四年仲孫羯帥師侵齊公患之孟公綽曰崔子將有大志不在病我必速歸其來也不寇使民不嚴異於他日齊師徒歸初崔杼娶齊棠公之妻莊公通焉驟如崔氏以崔子之冠賜人崔子因是又以其間伐晉也曰晉必將報欲弒公以說于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公崔子稱疾公問崔子遂從姜氏姜入于室與崔子自側戶出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近於公宫陪臣干掫有淫者不知二命公踰墻又射之中股反隊遂弒之賈舉八人皆死祝他父祭於高唐至復命死于崔氏申蒯侍漁者與其宰皆死晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭之興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民崔杼立景公而相之慶封為左相大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭葬諸士孫之里四翣不蹕下車七乘不以兵甲晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之同盟于重丘齊成故也初陳侯㑹楚子伐鄭當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城入之陳侯扶其大子偃師奔墓子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而耻大姬天誘其衷啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順乃受之子西復伐陳陳及鄭平晉侯使逆衛侯將使與之夷儀崔子止其帑以求五鹿衛獻公入于夷儀晉使趙武為政左氏曰趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭吳子遏伐楚門于巢卒弟餘祭立左氏曰吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒史記曰王諸樊卒有命授弟餘祭欲傳以次必致國於季札而止以稱先王壽夢之意且嘉季札之義兄弟皆欲致國令以漸至焉季札封於延陵故號延陵季子二十有五年衛寧喜弒其君剽衛孫林父入于戚以叛衛侯衎復歸于衛左氏曰襄之二十年衛寧惠子疾召悼子曰吾得罪於君名藏在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也悼子許諾遂卒獻公使與寧喜言寧喜曰必子鮮在不然必敗公使子鮮辭敬姒强命之對曰君無信臣懼不免敬姒曰以吾故也子鮮以公命與寧喜言曰茍反政由寧氏祭則寡人喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行告右宰穀穀曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二穀曰請使焉而觀之反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也悼子曰子鮮在穀曰何益多而能亡於我何為悼子曰雖然弗可以已大叔文子聞之曰寧子視君不如奕棋其何以免乎孫文子在戚孫襄居守寧喜右宰穀伐孫氏不克寧子出舍於郊伯國死孫氏夜哭國人召寧子復攻孫氏克之殺子叔即剽無諡及大子角孫林父以戚如晉衛侯入大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通外內之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之衛人侵戚東鄙孫氏訴于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之獲殖綽復訴于晉魯侯晉人鄭良霄宋人曹人㑹于澶淵晉人執衛寧喜左氏曰公㑹晉趙武宋向戍鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙六十以與孫氏於是衛侯㑹之晉人執寧喜衛侯如晉執之而囚於士弱氏齊侯鄭伯為衛侯故如晉晉侯兼享之齊侯賦蓼蕭鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也國子使晏平仲私於叔向曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何晉侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晉侯許歸衛侯衛侯歸衛姬于晉乃釋衛侯君子是以知平公之失政也許靈公卒于楚楚子蔡侯陳侯伐鄭左氏曰許靈公如楚請伐鄭襄十六年晉伐許他國皆大夫往獨鄭伯自行故許恚欲報之曰師不興孤不歸矣卒于楚楚子曰不伐鄭何以求諸侯乃伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚子是故昧於一來不如使逞而歸入南里墮其城涉于汜而歸而後葬許靈公晉侯使韓起入聘左氏曰晉韓宣子聘于周王使請事對曰晉士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊齊慶封誅崔杼之族專國政左氏在明年經世在此年左氏曰齊崔杼生成及疆而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾廢之而立明成請老于崔偃與無咎弗豫成與疆告慶封曰夫子唯無咎與偃是從父兄莫得進矣大恐害夫子慶封以告盧蒲嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰茍利夫子必去之難吾助女成疆殺偃無咎於朝崔子怒而出遂見慶封封曰崔慶一也請為子討之使盧蒲嫳帥甲以攻崔氏殺成與疆盡俘其家其妻縊遂滅崔氏嫳復命於崔子且御而歸至則無歸矣乃縊崔明奔魯慶封當國二十有六年晉趙武楚屈建魯叔孫豹蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人㑹于宋諸侯之大夫盟于宋左氏曰宋向戍善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣許之告於秦亦許之皆告於小國為㑹於宋五月甲辰晉趙武至於宋丙午鄭良霄至六月戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈至丙辰邾悼公至壬戍楚公子黑肱先至成言於晉丁卯宋向戍如陳從子木成言於楚戊辰滕成公至子木謂向戍請晉楚之從交相見也庚午向戍復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請于齊左師復言於子木子木使馹謁諸楚子楚子曰釋齊秦他國請相見也秋七月戊寅左師至趙孟及子晳盟以齊言庚辰子木至自陳陳孔奐蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡趙孟曰吾左還入於宋若我何辛巳將盟於宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信大宰退曰令尹將死矣趙孟患楚衷甲以告叔向叔向曰以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也季武子使以公命謂叔孫曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之乃盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向曰諸侯歸晉之德非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者乃先楚人書先晉晉有信也宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于䝉門之外子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭子木歸以語楚子楚子曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語楚子曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈如楚涖盟楚薳罷如晉涖盟宋左師請賞公與之邑六十以示子罕子罕曰凡小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞削而投之左師辭邑陳氏曰晉楚初同主諸夏盟也以諸侯分為晉楚之從而交相見也於是始則是南北二伯也此天下之大變也於溴梁而無君臣之分於宋而無夷夏之辨昭定哀之春秋將以終於吳越焉爾矣於是晉楚爭先乃先楚人則春秋書先晉何春秋不以夷狄先中國也自宋以來晉不專主盟矣虢之盟讀舊書加于牲上而已至鄟陵而齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙孟之偷也衛殺其大夫寧喜左氏曰衛寧喜專公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃攻寧氏殺寧喜及右宰穀尸諸朝子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公喪之如稅服終身公與免餘邑六十辭使為卿辭曰大叔儀不二能贊大事乃使文子為卿十有一月乙亥朔日有食之左氏曰辰在申司厯過也再失閠矣二十有七年齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋公魯侯陳侯鄭伯許男朝于楚楚康卒子麇嗣是為郟敖左氏曰宋之盟故也蔡侯之如晉也鄭伯使游吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以歲之不易聘於下執事今執事有命曰女何與政令之有必使而君棄而封守跋涉山川䝉犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚子大叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎公如楚及漢楚康卒公欲反叔仲昭伯曰我楚國之為豈為一人行也遂行宋向戍曰我一人之為非為楚也姑歸而息民待其立君而為之備宋公遂反楚人使魯公親襚乃使巫以桃茢先祓殯楚人悔之楚郟敖即位子圍為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖王崩大子晉母弟貴踐位左氏曰王人來告喪問崩日以甲寅告又曰至于靈王生而有頿王甚神聖無惡於諸侯逸周書曰晉平公使叔譽于周見大子晉而與之言五稱而五窮逡巡而退不遂歸告公曰大子晉行年十五而臣弗能與言君請歸䡰就復與之田若不反及有天下將以為誅師曠曰請使瞑臣往師曠見大子先稱曰吾聞王子之語高於泰山夜寢不寐晝居不安不遠長道願聞須一言王子曰吾聞太師將來吾甚喜既已見子喜而又懼吾年甚少見子而懾盡忘吾度師曠曰吾聞王子古之君子其成不驕自晉如周行不知勞王子曰古之君子其行至愼委積施門道路無限百姓悅之相將而遠遠人來歡視道如尺師曠告善又稱曰古之君子其行可則由舜而下其孰有廣德王子曰如舜者天舜盡其所以利天下奉翼遠人皆得已仁此之謂天如禹者聖勞而不居以利天下好善取與與必度正是之謂聖如文王者其大道仁其小道惠三分天下而有其二敬人無方服事於商既有其衆而延夫其身此之謂仁如武王者義殺一人而以利天下異姓同姓各得其儀此之謂義師曠告善又稱曰宣辨名命王侯君公何以為尊何以為尚王子曰人生而丈夫謂之胄子胄子成人能治上官謂之士士率衆時作謂之伯伯能移善於衆與百姓同謂之公公耐名物與天道俱謂之侯侯耐成羣謂之君君能廣德分任諸侯而敦信曰豫一人善至於四海曰天子達於四荒曰天王四荒皆至無有怨訾乃登為帝師曠罄然又稱曰溫恭敦敏方德不改開物成務下學以起尚登帝臣乃參天子自古誰巳王子曰穆穆虞舜明明赫赫立義治律萬物皆作分均天財萬民熙熙非舜而誰能師曠躅足曰善哉善哉王子請入敷席注瑟師曠歌無射曰國誠寧矣遠人來觀修義經矣好樂無荒乃注瑟於王子王子歌嶠曲名師曠請歸王子賜之乘車四馬曰太師亦善御之師曠對曰御吾未學也王子曰汝不為夫詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麀麀取豫不疑以是御之師曠對曰瞑臣無見為人辨也唯耳之恃而耳又寡聞而易窮王子汝將為天下宗乎王子曰太師何如戲我乎自太皥以下至于堯禹未有一姓而再有天下者且吾問汝人之年長短告也師曠對曰汝聲清汙汝色赤白火色不壽王子曰吾後二年上賔于帝所汝愼無言族將及汝師曠歸未及三年告死者至大子晉之賢觀於諫壅穀洛可見此篇雖淺陋亦或附㑹然存之以見其夙慧而早夭燕懿公卒子欵嗣是為簡公御批資治通鑑綱目前編卷十五
