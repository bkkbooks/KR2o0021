body:
  text: 欽定四庫全書御批資治通鑑綱目前編舉要卷二己未周平王四十有九年魯隱公元鄭伯克段于鄢春秋寘其母姜氏于城潁用左傳修王使宰咺錫魯惠公仲子之賵用左傳修鄭伯以王師虢師伐衞南鄙用左傳修祭伯如魯用左傳修五十年鄭伯始見其母于大隧史記年表鄭人伐衞春秋五十有一年二月己巳日有食之春秋王崩孫林踐位用左傳史記本紀修尹氏卒春秋鄭祭足帥師入寇用左傳修武氏子求賻于魯用左傳修宋穆公卒立宣公之子與夷用左傳史記年表世家修齊侯鄭伯盟于石門春秋壬戌桓王元年衞州吁弑其君桓公而自立宋陳蔡衞伐鄭用左傳史記年表世家修魯翬帥師㑹宋陳蔡衞伐鄭用左傳修衞人殺州吁于濮衞人立晉春秋二年晉曲沃以鄭邢之師攻晉侯于翼王使尹氏武氏助伐翼翼侯奔隨用左傳修曲沃叛王命虢公伐曲沃立翼侯子光于翼用左傳修邾人鄭人伐宋宋人伐鄭春秋甲子三年晉翼侯自隨入于鄂用左傳修鄭輸平於魯用公羊榖梁傳修魯侯齊侯盟于艾用左傳修宋人取長葛春秋京師饑用左傳修鄭人入朝用左傳修四年王使凡伯聘于魯戎伐凡伯于楚丘以歸用左傳修陳及鄭平左傳晉曲沃莊伯卒子稱代用史記年表世家修秦文公卒孫嗣用史記年表秦紀經世修五年鄭伯歸祊田于魯用左傳修蔡宣侯卒子封人嗣用史記年表世家修王命虢公忌父為卿士用左傳修宋公齊侯衞侯盟于瓦屋春秋鄭伯以齊人來朝用左傳修六年王使南季聘于魯見春秋鄭伯為左卿士以王命伐宋以王命告于魯魯侯齊侯㑹于防用左傳修秦自汧渭之間徙居平陽經世七年鄭伯齊侯魯侯會于中丘魯翬帥師㑹齊鄭伐宋魯侯敗宋師于菅取郜取防用左傳修宋人衞人入鄭宋人蔡人衞人伐戴鄭伯伐取之春秋齊人鄭人入郕春秋八年鄭伯魯侯㑹于時來齊侯鄭伯魯侯入許用左傳修王取鄔劉蒍邘之田于鄭與鄭人温原絺樊隰郕攅茅向盟州陘隤懐之田用左傳修魯公子軌弑其君隱公而自立用左傳史記年表世家經世修九年魯桓公元魯侯鄭伯㑹于垂卒易祊田盟于越用左傳修燕穆侯卒子嗣用史記年表世家修十年宋督弑其君殤公及其大夫孔父立公子馮用左傳史記年表世家修魯侯齊侯陳侯鄭伯會于稷以成宋亂用左傳修蔡侯鄭伯㑹于鄧春秋十有一年春晉曲沃敗晉師于汾隰獲晉哀侯欒成死之晉人立哀侯子為小子侯用左傳國語史記年表世家修七月壬辰朔日有食之既春秋魯侯迎婦于齊用左傳修十有二年王使宰渠伯糾聘于魯用左傳修王師秦師圍魏執芮伯用左傳修晉曲沃稱弑哀侯于曲沃用史記世家修十有三年陳桓公卒文公子佗殺世子免而自立用左傳史記年表世家修齊侯鄭伯如紀春秋王使仍叔之子聘于魯用左傳修王伐鄭蔡人衞人陳人從王伐鄭用左傳修十有四年楚子熊通侵隨俾請爵于王王不許用左傳史記修紀侯如魯用左傳修北戎伐齊左傳蔡人殺陳佗春秋而立免之弟躍用左傳修十有五年穀伯綏鄧侯吾離至魯用左傳修鄭人齊人衞人伐盟向王遷盟向之民于郟左傳晉曲沃稱誘弑其君小子侯用左傳史紀世家修十有六年王使家父聘于魯見春秋楚子會諸侯于沈鹿楚子伐隨隨及楚平楚僭稱王用左傳史記世家修王命虢仲伐曲沃立晉哀侯之弟緡于晉用左傳修祭公如魯遂逆王后于紀用左傳修秦寧公卒三父廢世子而立出子用史記年表秦紀經世修十有七年紀季姜歸于京師春秋十有八年曹桓公卒子射姑嗣用左傳史記年表世家修虢詹父以王師伐虢虢公出奔虞用左傳修齊侯衞侯鄭伯與魯戰于郎用左傳修十有九年齊人衞人鄭人盟于惡曹春秋鄭莊公卒世子忽嗣用左傳史記年表世家修宋人執鄭祭仲突歸于鄭鄭忽出奔衞春秋衞侯殺其二子伋夀經世二十年魯侯會宋公盟于穀丘又㑹于虚于龜魯侯會鄭伯盟于武父用左傳修魯侯及鄭師伐宋用左傳俢陳厲公卒見春秋弟林立用史記年表修衞宣公卒子朔立用史記年表世家修二十有一年楚屈瑕伐羅羅與盧戎敗楚師用左傳修魯侯㑹紀侯鄭伯及齊侯宋公衞侯燕人戰齊宋衞燕師敗績用左傳修二十有二年魯侯鄭伯突㑹于曹鄭伯使其弟如魯盟用左傳修秦三父弑出子復立故世子用史記年表秦紀經世修齊僖公卒子諸兒嗣用史記年表世家修宋人以齊人蔡人衞人陳人伐鄭春秋燕宣侯卒子嗣用史記年表世家修二十有三年王使家父如魯求車用左傳修王崩子佗踐位用史記修鄭伯突出奔蔡鄭世子忽復歸于鄭用左傳修鄭伯突入于櫟春秋宋公魯侯衞侯陳侯㑹于袲伐鄭用左傳修秦伐彭戲氏至于華山乙酉莊王元年宋公魯侯蔡侯衞侯會于曹宋魯衞陳蔡伐鄭用左傳修衞人立伋之弟黔牟用左傳史記年表世家經世修衞侯朔出奔齊春秋二年魯侯齊侯紀侯盟于黄魯侯邾儀父盟于趡魯師及齊師戰于奚魯及宋人衞人伐邾用左傳修蔡桓侯卒弟獻舞立用史記年表世家修蔡季自陳歸于蔡春秋秦夷三父族經世十月朔日有食之春秋鄭髙渠彌弑其君昭公立其弟子亹經世三年魯侯與其夫人姜氏如齊齊侯殺魯桓公立其子同用左傳史記年表世家經世修齊侯師于首止殺鄭子亹及高渠彌祭仲立子儀用左傳史記年表世家修王子克奔燕左傳四年魯莊公元使單伯送王姬見春秋魯築王姬之館于外用左傳修王使榮叔錫魯桓公命見春秋王姬歸于齊春秋陳莊公卒弟杵臼立用史記年表世家修齊師遷紀郱鄑郚春秋五年齊王姬卒春秋宋莊公卒見春秋子捷嗣用史記年表世家修六年五月葬桓王春秋紀季以酅入于齊春秋燕桓侯卒子嗣用史記年表世家修七年王召隨侯責其尊楚楚武伐隨卒於師子熊貲嗣始都郢用左傳史記年表世家修齊侯陳侯鄭伯遇于垂春秋紀侯大去其國春秋齊侯魯侯狩于禚用穀梁傳修八年齊人宋人魯人陳人蔡人伐衞用左傳修九年王使子突救衞用左傳修衞侯朔入于衞春秋黔牟來奔用左傳史記世家經世修十年秦滅小虢經世十有一年魯侯及齊師圍郕郕降于齊師用左傳修齊無知弑其君襄公用左傳史記年表世家修十有二年齊人殺無知春秋魯侯及齊大夫盟于蔇魯侯伐齊納糾用左傳修齊小白入于齊葬齊襄公春秋魯侯及齊師戰于乾時魯師敗績用左傳修齊人取子糾于魯殺之取其傅管夷吾以歸為相用左傳修十有三年魯侯敗齊師于長勺用左傳修魯侯侵宋見春秋齊師宋師次于郎春秋魯侯敗宋師于乗丘齊師還用左傳修荆敗蔡師于莘以蔡侯獻舞歸春秋齊師滅譚譚子奔莒春秋十有四年魯侯敗宋師于鄑用左傳修王姬歸于齊春秋十有五年王崩太子胡齊踐位用史記本紀經世修宋萬弑其君閔公及其大夫仇牧宋人立公子御說萬奔陳宋人醢之用左傳史記年表修庚子僖王元年齊侯宋人陳人蔡人邾人㑹于北杏春秋齊人滅遂春秋齊侯㑹魯侯盟于柯用左傳修二年齊人陳人曹人伐宋春秋齊侯使來請師王命單伯㑹伐宋用左傳修鄭人弑其君子儀鄭厲公自櫟入于鄭用左傳史記年表世家修荆入蔡春秋單伯㑹齊侯宋公衞侯鄭伯于鄄春秋三年齊侯宋公陳侯衞侯鄭伯㑹于鄄春秋宋人齊人邾人伐鄭鄭人侵宋春秋晉曲沃伯稱滅晉弑其君緡用史記年表修四年宋人齊人衞人伐鄭春秋荆伐鄭春秋齊侯宋公魯侯陳侯衞侯鄭伯許男滑伯滕子同盟于幽用左傳杜氏纂例修王使虢公命曲沃伯以一軍為晉侯左傳秦武公卒弟立用史記年表秦紀修楚滅鄧經世蒍國以晉師伐夷詭諸殺之周公忌父出奔虢用左傳修邾子克卒春秋子瑣立見春秋五年王崩太子閬踐位用史記本紀修晉武公卒子詭諸嗣用史記年表世家修秦徙居雍經世楚文卒子囏嗣用史記年表世家經世修乙巳惠王元年三月日有食之春秋虢公晉侯來朝用左傳修虢公晉侯鄭伯使原伯逆王后于陳用左傳修秦徳公卒子嗣用史記年表秦紀經世修二年蒍國邊伯詹父子禽祝跪奉王子頽作亂頹出奔温蘇子奉子頽奔衞衞人燕人入寇立頽用左傳修齊人宋人陳人伐魯西鄙見春秋蔡哀侯卒子肸嗣用史記年表世家修三年鄭伯執燕仲父王處于櫟用左傳修齊人伐戎春秋四年虢公鄭伯胥命于弭奉王復歸于王城殺子頽王與鄭伯虎牢以東用左傳修鄭厲公卒子捷嗣用左傳史記年表世家修王巡虢守左傳五年秦作密畤用史記修晉伐驪戎獲姬以歸用史記修陳人殺其公子御寇春秋公子完奔齊用左傳修楚熊惲弑其君杜敖而自立用史記年表世家修六年祭叔聘于魯見春秋楚人修好于諸侯使人入獻王賜楚子胙用史記世家修曹莊公卒用史記年表世家修子羈嗣用左傳杜氏注修七年魯侯逆姜氏于齊以入使宗婦覿用幣用左傳修戎侵曹曹羈出奔陳赤歸于曹春秋郭亡用春秋胡氏傅説苑修八年衞惠公卒子赤嗣用史記年表世家修六月辛未朔日有食之春秋晉侯盡殺羣公子用左傳修九年晉始都絳用史記年表世家修虢人侵晉左傳十有二月癸亥朔日有食之春秋十年齊侯宋公魯侯陳侯鄭伯同盟于幽用左傳修晉伐虢用左傳修王使召伯廖賜齊侯命左傳十有一年齊人伐衞衞人及齊人戰衞人敗績春秋邾子瑣卒春秋蘧蒢立見春秋荆伐鄭春秋齊人宋人魯人救鄭用左傳修晉侯驪姬子奚齊生使太子申生居曲沃重耳居蒲夷吾居屈用左傳史記世家修十有二年鄭人侵許春秋十有三年王命虢公討樊執樊皮歸于京師用左傳修九月庚午朔日有食之春秋齊人伐山戎春秋俾燕修貢于王用史記世家修秦宣公卒弟立用史記年表秦紀經世修十有五年魯人殺公子牙而立叔孫氏魯莊公卒子般嗣慶父弑子般季友奔陳公子慶父如齊啟立用左傳史記年表世家經世修狄伐邢春秋曹僖公卒子班嗣用史記年表世家修十有六年魯閔公元齊人救邢春秋魯侯及齊侯盟于落姑季子歸魯用左傳修晉侯作二軍滅耿霍魏為太子申生城曲沃封趙夙於耿畢萬於魏用左傳修十有七年魯慶父弑其君閔公季友以公子申如邾姜氏慶父皆出奔齊高子盟魯公子申入立取慶父于莒殺之而立仲孫氏用左傳史記年表世家經世修狄入衞春秋殺懿公衞衆潰濟河立戴公以廬于曹卒齊人立其弟燬用左傳史記年表世家修秦成公卒弟任好立用史記年表秦紀經世修十有八年魯僖公元齊師宋師曹伯次于聶北救邢邢遷于夷儀齊師宋師曹師城邢春秋楚人伐鄭春秋齊侯宋公魯侯鄭伯曹伯邾人㑹于檉謀救鄭用左傳修魯侯賜季友汶陽之田及費是為季孫氏用左傳修十有九年諸侯城楚丘以封衞用左傳修虞師晉師伐虢滅下陽用左傳修齊侯宋公江人黄人盟于貫春秋燕莊公卒子嗣用史記年表世家修甲子二十年徐人取舒春秋齊侯宋公江人黄人㑹于陽穀春秋楚人伐鄭春秋二十有一年齊侯宋公魯侯陳侯衞侯鄭伯許男曹伯侵蔡用左傳修蔡潰遂伐楚次于陘春秋許穆侯卒于師用左傳修楚屈完來盟于師盟于召陵春秋齊人執陳轅濤塗春秋魯及江人黄人伐陳用左傳修諸侯侵陳陳成歸轅濤塗用左傳修二十有二年晉侯殺其世子申生春秋王世子會齊侯宋公魯侯陳侯衞侯鄭伯許男曹伯于首止諸侯盟于首止鄭伯逃歸不盟用左傳修晉侯使寺人伐蒲公子重耳奔狄用左傳修楚人滅弦弦子奔黄春秋九月戊申朔日有食之春秋虞大夫百里奚奔秦用史記本紀修秦始得志於諸侯經世晉滅虢虢公醜奔京師遂滅虞執虞公歸其職貢於王用左傳修二十有三年晉人伐屈公子夷吾奔梁用左傳