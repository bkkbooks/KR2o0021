body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十七周敬王十有五年三月辛夘朔日有食之王使人殺王子朝於楚於越入呉於越猶言邾婁荀子有于越作于越者非陳氏曰向曰越人今曰於越復從其舊號也越未有聞也昭定之春秋呉楚争而后越入中國㑹于瑣也越常壽過始見於經而亟稱人後三十年而入呉不復稱人矣晉楚之初春秋未以敵言之戰于邲也則楚稱子矣呉楚之初春秋未以敵言之戰于柏舉也則呉稱子矣至於呉越終春秋不以敵言之也是故越入呉書呉入越不書魯陽虎囚季孫斯左氏曰陽虎囚季桓子及公父文伯而逐仲梁懐殺公何藐盟桓子于稷門之内大詛逐公父歜及秦遄皆奔齊楚子入于郢左氏曰賞鬬辛王孫由于王孫圉鍾建鬬巢申包胥王孫賈宋木鬬懐子西曰請舍懐也王曰大徳滅小怨道也申包胥曰吾為君非為身也君既定矣又何求遂逃賞将嫁季芉季芉曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹燕平公卒簡公立魯曾參生十有六年鄭㳺速帥師滅許以許男斯歸鄭㓂胥靡䓁六邑晉人入戍城胥靡冬王處于姑蕕左氏曰周儋翩率王子朝之徒因鄭人将以作亂于周鄭於是乎伐馮滑胥靡負黍狐人闕外晉閻沒戍周且城胥靡天王處于姑蕕辟儋翩之亂也十有七年儋翩入于儀栗以叛單子劉子敗尹氏於窮谷齊侯鄭伯盟于鹹左氏曰齊侯鄭伯盟于鹹徴㑹于衛衛侯欲叛晉諸大夫不可使北宮結如齊而私於齊侯曰執結以侵我齊侯從之陳氏曰此特相盟也特相盟自齊桓以來未之有也於是再見諸侯無主盟矣是故石門志諸侯之合也鹹志諸侯之判也齊人執衛行人北宮結以侵衛齊侯衛侯盟于沙齊國夏伐魯西鄙左氏曰齊人歸鄆陽闗陽虎居之以為政齊國夏伐我陽虎御季桓子公歛處父御孟懿子将宵軍齊師齊師聞之堕伏而待之處父曰虎不圗禍而必死苫夷曰虎陷二子於難不待有司余必殺女虎懼乃還不敗王入于王城左氏曰單子劉子逆王于慶氏晉籍秦送王王入于王城十有八年單子伐榖城簡城劉子伐儀栗盂曹靖公卒子伯陽嗣陳懐公卒于吳國人立其子越是為閔公史記曰呉復召懐公懐公恐如呉呉怒其前不往留之因卒呉陳乃立懐公之子越晉士鞅帥師侵鄭遂侵衛左氏曰晉師将盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉佗成何盟之衛人請執牛耳涉佗捘衛侯之手及捥衛侯怒歸而叛晉晉人請改盟弗許魯陽虎攻三家弗克奔齊左氏曰季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月壬辰将享季氏于蒲圃而殺之戒都車曰癸巳至公歛處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子備諸以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿将如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政違之徴死桓子曰而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壮者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎劫公與武叔以伐孟氏公歛處父帥成人自上東門入與陽氏戰于南門之内又戰于棘下陽氏敗陽虎説甲如公宮取寳玉大弓以出舎于五父之衢寝而為食其徒曰追其将至虎曰魯人聞余出喜於徴死何暇追余入于讙陽闗以叛明年歸寳玉大弓六月伐陽闗陽虎出奔齊請師以伐魯曰三加必取之齊侯将許之鮑文子諌曰魯未可取也陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而将殺季孫以不利魯國君富於季氏而大於魯國兹陽虎之所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎逃奔宋遂奔晋適趙氏仲尼曰趙氏其世有亂乎魯宓不齊生十有九年公山不狃召孔子欲往不果論語曰公山弗擾以費畔召子欲往子路不說曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎程子曰聖人以天下無不可有為之事亦無不可改過之人故欲往然而終不往者知其必不能改故也張氏曰子路昔者之所聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之召皆欲往者以天下無不可變之人無不可為之事也其卒不往者知其人之終不可變而事之終不可為爾一則生物之仁一則知人之智也履祥按公山不狃以費畔季氏佛肸以中牟畔趙氏皆家臣畔大夫也而召孔子孔子雖卒不往而云欲往者盖大夫畔諸侯而陪臣以張公室為名也子韓晳曰家臣而欲張公室罪莫大焉此當時流俗之言也抑大夫而張公室亦名義也故欲往以明其可也然二人者皆以己私為之非真可與有為也故卒不往以知其不可也魯用孔子為中都宰家語曰孔子初仕為中都宰制為養生送死之莭長幼異食强弱異任男女别塗路無拾遺器不彫偽為四寸之棺五寸之槨因邱陵為墳不封不樹行之一年而四方之諸侯則焉定公謂孔子曰學子此法以治魯國何如孔子對曰雖天下可平何但魯國而已哉鄭獻公卒于勝嗣是為聲公秦哀公卒孫嗣是為惠公魯閔損生二十年魯以孔子為大司㓂相魯侯㑹齊侯于夾谷齊人歸魯鄆讙龜隂田史記曰定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司㓂定公十年春及齊平齊大夫言於景公曰魯用孔丘其勢危齊乃使使告魯為好㑹㑹於夾谷魯定公且以乘車好往孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以􅀙請具左右司馬左氏曰公㑹齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯􅀙之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥於徳為愆義於人為失禮君必不然齊侯聞之遽辟之将盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯将享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭徳也不昭不如其已也乃不果享史記曰景公歸謫其羣臣曰魯以君子之道輔其君而子獨以夷狄之道敎寡人於是乃歸所侵魯鄆汶陽龜隂之田以謝過齊侯衛侯鄭㳺速㑹于安甫二十有一年宋公寵向魋弟辰及仲佗石彄公子地樂大心皆叛二十有二年魯墮郈及費墮成弗克左氏曰初叔孫成子欲立武叔公若藐諌不可成子立之而卒公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若侯犯以郈叛武叔懿子及齊師圍郈叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也駟赤謂侯犯以郈易於齊必倍與子地侯犯請易於齊齊有司觀郈将至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯侯犯請行許之駟赤納魯人侯犯奔齊齊人乃致郈武叔聘于齊齊侯享之曰郈與敝邑際故敢助君憂之對曰所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜史記曰孔子言於定公曰臣不蔵甲大夫無百雉之城使仲由為季氏宰将堕三都左氏曰於是叔孫氏堕郈季氏将堕費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宮登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂堕費将堕成公歛處父謂孟孫堕成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我将不堕冬十二月公圍成弗克履祥按魯自三家四分公室而魯公無民久矣孔子雖為大司㓂為其議事交隣可爾土地甲兵固皆三家有也縦堕三都三都之民豈遽為公室有哉去其城郭差可防三家之叛亂耳幸而公山不狃以費叛侯犯以郈叛二子自以為患故堕之易為勢至孟氏不肯堕成則成固未易堕矣成之不堕當時家臣知有其家不知有公室類如此然成終不可堕乎曰使孔子久于其位安知其不堕使孔子别有所為則雖不堕成亦可矣孔子用於魯于今一年堕三都而不盡則期月而可三年有成之説無乃已虛乎孔子固曰如有用我者此為授之以國家言也三家者於孔子豈有土地甲兵為之用哉其眀年始攝相事與聞國政二年而始曰攝曰與則前乎此年其權可知矣孟子謂孔子子此為見行可之仕盖謂其或可以行耳而不行而後去然則謂孔子得用於魯則未也學者忿聖人之失職幸聖人之見用方且以反侵疆誅正邜墮三都為誇皆未知孔子亦非知事勢者十有一月丙寅􅃋日有食之二十有三年齊侯衛侯次于垂葭左氏曰齊侯衛侯次于垂葭使師伐晋将濟河諸大夫不可邴意兹曰鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内齊侯皆歛諸大夫之軒唯邴意兹乘軒齊侯欲與衛侯乘與之宴而駕乘廣載甲焉使告曰晋師至矣齊侯曰比君之駕也寡人請攝乃介而與之乘驅之或告曰無晋師乃止履祥按齊故覇國也晋失覇則齊可以覇矣而其君輕率如此齊之所以不能復覇與晉趙鞅入于晋陽以叛荀寅士吉射入于朝歌以叛趙鞅歸于晋左氏曰晋趙鞅謂邯鄲午曰歸我衛貢五百家舎諸晋陽十一年趙鞅圍衛衛懼貢五百家鞅置之邯鄲今欲徙著已邑午許諾歸吿其父兄皆曰不可趙孟怒召午而囚諸晋陽使其􅀙者説劍而入渉賔不可乃使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷渉賔以邯鄲叛上軍司馬籍秦圍邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲将作亂董安于聞之告趙孟曰先備諸趙孟曰晋國有命始禍者死為後可也安于曰與其害於民寧我獨死請以我説趙孟不可范氏中行氏伐趙氏之宫趙鞅奔晋陽晋人圍之范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀将逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晋侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子将伐公齊高彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君将誰與若先伐君是使睦也弗聴遂伐公國人助公二子敗􅀙而伐之荀寅士吉射奔朝歌韓魏以趙氏為請趙鞅入于絳盟于公宫明年梁嬰父謂知文子曰不殺安于使終為政於趙氏趙氏必得晋國盍以其先發難也討於趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晋國有命始禍者死二子既伏其罪矣敢以告趙孟患之安于曰我死而晋國寧趙氏定将焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯従趙孟盟而後趙氏定祀安于於廟魯以孔子攝相事與聞國政史記曰孔子由大司㓂攝行相事於是誅魯大夫亂政者少正夘與聞國政四方之客至于邑者不求有司皆予之如歸荀子曰孔子為魯相攝朝七日而誅少正夘門人進問曰夫少正夘魯之聞人也夫子為政而始誅之得無失乎孔子曰人有惡者五而盗竊不與焉一曰心逆而險二曰行辟而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不得免於君子之誅而少正夘兼有之故居處足以聚徒成羣言談足以飾邪營衆彊足以反是獨立此小人之桀雄也不可以不誅也是以湯誅尹諧文王誅潘正周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史何此七子者皆異世同心不可不誅也參用家語家語曰初魯之販羊有沈猶氏者常朝飲其羊以詐市人有公慎氏者妻滛不制有慎潰氏者奢侈踰法魯之鬻六畜者飾之以儲價及孔子之為政也則沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏越境而徙三月則鬻牛馬者不儲價賣羔豚者不加飾男女行者别其塗道不拾遺男尚忠信女尚貞順朱子曰少正夘之事嘗竊疑之盖論語所不載子思孟子所不言雖以左氏春秋内外傳之誣且駁而猶不道也乃獨荀况言之是必齊魯諸儒憤聖人之失職故為此説以誇其權爾吾又豈敢輕信其言而遽稽以為决乎聊併記之以俟來者齊人歸女樂于魯孔子適衛論語曰齊人歸女樂季桓子受之三日不朝孔子行孟子曰孔子為魯司㓂不用從而祭燔肉不至不税冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以㣲罪行不欲為茍去君子之所為衆人固不識也史記曰齊人聞而懼曰孔子為政必覇覇則吾地近焉我為之先并矣盍致地焉犂鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂文馬於魯城南高門外季桓子㣲服往觀再三将受乃語魯君為周道逰往觀終日怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰於大夫則吾猶可以止桓子卒受女樂三日不聴政郊又不致膰爼於大夫孔子遂行履祥按孔子生長於魯至是五十餘年天下之士多􅀙之者魯之君臣豈有不知其賢者而未嘗能用孔子也定公之十年一旦起而用之莫有知其由者論語左氏皆不言其故獨孟子稱孔子於季桓子見行可之仕而論語謂季桓子受女樂不朝孔子行是孔子此時之行蔵係季桓子之用舎也何哉魯自三家四分公室而季氏取其二季氏専魯而魯公無民久矣使魯之君而欲用孔子豈能遽奪季氏之權以畀孔子季氏亦豈肯遜己之權以與孔子哉自定公初年季平子卒其家臣陽虎始用事五年執桓子囚之而専魯政辱之於晋陥之於齊師且盟且詛九年又将享桓子而殺之僅而獲免當是時非惟魯國不可為而季氏亦自不可支矣霜降水涸涯涘自見桓子於此亦謀所以為靖亂興衰之計故舉孔子于公而試用之已而政聲四達郤齊歸地於是攝行相事堕三都夫三都者三家强邑也當是時公山弗擾在費而郈侯犯之亂未久也三家之有三都已非公室之便而三都之為三都至是亦非三家之便也故仲孫氏始堕郈繼而季桓子堕費已而孟孫氏不肯堕成圍之弗克其不肯堕成也公歛處父之言曰無成是無孟氏也然則無費是亦無季氏也而堕之當是時桓子之心未敢自計其私也夫三都已堕其二則成之不堕固亦未害然亦豈終不克堕哉夫子久之必有處矣既而魯國方治而齊人歸女樂以沮之夫使孔子上下之交方固桓子之志未移則一女樂豈足以間之齊人素善謀功利者歸女樂而謂足以間魯之用孔子寧不㡬於兒戲乎是殆必得其間矣季氏權臣也桓子捨己權以聴孔子而堕其名都以强公室其中豈無介介者顧以衰敗之餘藉之振起為是降心以相􅀙也今紀綱既定外侮既却魯既治矣桓子豈甘于終絀者縦桓子甘之季氏私人必有以為不利者故其信任之意必已漸衰特未敢驟舎孔子而孔子顧亦無隙可行爾故齊人歸女樂以促之夫齊何懼於我而歸女樂于事可疑于禮不正有國者固不可㗖此為隣國所覘也使桓子而猶為孔子之聴豈其受此受之已非矣而又君臣荒滛其中三日不朝此其心術蠧壊不復可與有為而其心固亦已無孔子矣故孔子去之然考之孟子與史記盖為膰肉不至而行也而論語則為為女樂盖孔子之行决於此而特發于膰肉耳孟子之言曰孔子為魯司㓂不用􅀙而祭燔肉不至不税冕而行夫謂之不用則不用固久矣受女樂其一事也方其不朝也子路曰夫子可以行矣而夫子曰魯今且郊如致膰於大夫則吾猶可止吁此所謂去父母國之道也夫郊之必致膰於大夫彛禮也孔子何此之待哉待遇之衰必有日矣惟孔子於父母之邦不若是恝又不欲顯其君相之過已知其必不致膰猶且兾其能悔而或致膰也既而膰果不致矣使其致膰猶彛禮也而不致是昭然踈郤之也於是而行復何俟哉此夫子出處之本末事情也越子允常卒子句踐嗣是為菼執史記曰夏少康之庶子封於㑹稽號曰無余後二十餘世至於允常允常之時與吳王闔廬戰而相怨伐二十有四年於越敗吳于檇李吳闔廬卒子夫差嗣左氏曰吳伐越越子句踐禦之陳于檇李句踐患吳之整也使死士再禽焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃行敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬傷将指取其一屨還卒於陘去檇李七里夫差使人立於庭茍出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越齊侯魯侯衛侯㑹于牽齊侯宋公㑹于洮左氏曰晋人圍朝歌公㑹齊侯衛侯謀救范中行氏析成鮒小王桃甲率狄師以襲晋戰于絳中不克而還士鮒奔周小王桃甲入于朝歌齊宋㑹于洮范氏故也王使石尚歸脤于魯衛世子蒯瞶出奔宋左氏曰衛侯為夫人南子召宋朝太子蒯瞶獻㿻于齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰􅀙我而朝少君我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵将殺余公執其手以登臺太子奔宋盡逐其黨戲陽速吿人曰大子無道使余殺其母余不許将戕於余若殺夫人将以余説余是故許而弗為以紓余死晋人敗范中行氏之師於潞獲籍秦高彊又敗鄭師及范氏之師于百泉孔子自衛適陳畏於匡反衛史記曰孔子遂適衛主顔濁鄒家衛人致粟六萬居十月去衛将適陳過匡顔刻為僕以其策指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人孔子状類陽虎拘焉五日顔淵後子曰吾以汝為死矣曰子在回何敢死匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎天之将䘮斯文也後死者不得與於斯文也天之未䘮斯文也匡人其如予何孔子使􅀙者為寗武子臣於衛然後得去荘子曰孔子逰於匡匡人圍之數匝而絃歌不輟無㡬何将甲者辭曰以為陽虎也故圍之今非也請辭而退史記曰孔子去匡即過蒲月餘反乎衛主蘧伯玉家靈公夫人有南子者使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環佩玉聲璆然孔子曰吾鄉為弗見見之禮荅焉論語曰子見南子子路不説夫子矢之曰予所否者天厭之天厭之履祥按聖人道大徳全其見惡人固謂在我有可見之禮彼之不善我何與焉而此意有難以明言者盖孔子居是邦不非其大夫况其君夫人乎且此行也在聖人則可茍明言其為可則側媚由徑之人皆可借此説以藉口矣故但重言以誓之其􅊎之以天何也夫事一也而在聖人則可在他人則不可者亦論其心而已聖人此心光眀正大上通乎天故無不可彼無是心而假是事以自文者其如天何哉聖人指天以為誓欲學者知反此心也二十有五年孔子去衛過曹史記曰孔子居衛靈公與夫人同車宦者雍渠參乘出使孔子為次乘招揺市過之孔子曰吾未見好徳如好色者也於是醜之去衛過曹是嵗魯定公卒論語曰衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也明日遂行史記重出在去陳之後非也盖明年而衛靈公卒無自陳反衛冄見靈公之事也論語去衛在陳之前盖得其實履祥按南子之滛非必昬愚也往往機警秀慧有過人者特不能自制其欲而靈公之昬又徇其欲焉以至此爾靈公徇南子之欲故為其召公子朝于宋甚矣其昬也南子自知其行不為國人所與故借重於孔子而請見之靈公欲重南子而亦知其不為國人所與故又借重於孔子而使次乗焉夫孔子以聖聞天下而見南子則南子非滛人也公與夫人同車而孔子次乘則南子非滛而靈公非溺愛無禮也甚矣南子巧于文已惡而靈公雖昬亦巧於文南子之惡也見南子禮之所有故孔子可以久則久為次乗禮之所無故孔子可以速則速雖然孔子去魯為女樂也而以膰肉去孔子去衛為次乘也而以問陳行皆不欲招其君之惡而以㣲罪行此夫子義之盡而仁之至也魯定公卒子蒋嗣是為哀公左氏曰春邾隐公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也将左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏公薨仲尼曰賜不幸言而中是使賜多言者也八月庚辰􅃋日有食之孔子適宋及鄭至陳史記曰孔子去曹適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子伐其樹孔子去弟子曰可以速矣孔子曰天生徳於予桓魋其如予何孔子適鄭與弟子相失孔子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産然自要以下不及禹三寸纍纍若䘮家之狗子貢以實告孔子孔子笑曰形状末也似䘮家之狗然哉然哉孔子遂至陳主於司城貞子家履祥按史記匡人拘孔子益急弟子懼而後夫子有天未喪斯文匡人如予何之言所以觧弟子之懼也孔子於宋遭伐木而去弟子曰可以速矣而後夫子有天生徳於予桓魋如予何之説所以觧弟子之窘也有子曽子之門人㑹集夫子所言以為論語而事之首尾或有不具夫不載弟子懼之事則夫子之言似于露不載弟子可速之説則夫子之言似於誇朱子毎惜不見古文家語盖為此類也二十有六年魯哀公元楚子陳侯隨侯許男圍蔡左氏曰報栢舉也里而栽廣丈高倍夫屯書夜九日如子西之素蔡人男女以辨使疆于江汝之間而還蔡於是乎請遷于吴呉子敗越于夫椒左氏曰呉王夫差敗越于夫椒報檇李也遂入越越子以甲楯五千保于㑹稽使大夫種因吳大宰嚭以行成呉子将許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡昔夏少康有田一成有衆一旅能布其徳而兆其謀遂滅過戈復禹之績今呉不如過而越大於少康或将豐之不亦難乎句踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是乎克而弗取将又存之違天而長㓂讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長㓂讐以是求伯必不行矣弗聴退而吿人曰越十年生聚而十年教訓二十年之外呉其為沼乎越及呉平齊侯衛侯伐晋救邯鄲呉侵陳事始見十四年左氏曰脩舊怨也檀弓曰吳侵陳斬祀殺厲師還出竟陳行人儀使於師夫差謂大宰嚭曰是夫也多言盍嘗問焉曰師必有名人之稱斯師也者則謂之何行人儀曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎禮記人名互誤今正于此左氏曰吳師在陳椘大夫皆懼曰闔廬惟能用其民以敗我於栢舉今聞其嗣又甚焉将若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑厲親廵其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必􅀙珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我二十有七年衛靈公卒蒯瞶之子輒立是為出公晋趙鞅帥師納衛世子蒯瞶于戚左氏曰衛侯逰于郊子南僕公曰余無子将立女不對他日又謂之對曰郢不足以辱社稷君其改圗君夫人在堂三揖在下君命祗辱夏衛靈公卒夫人曰命公子郢為大子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒晋趙鞅納衛大子于戚宵迷陽虎曰右河而南必至焉使大子絻八人衰絰偽自衛逆者吿於門哭而入遂居之履祥按公子郢之辭國卒釀衛國之亂似亦賢者之過間嘗思之郢既支庶而外蒯内輒皆必争之人靈公之欲立郢不命之于朝廷之上而言之于郊野之間此郢之所以辭也觀其言曰君夫人在堂三揖在下君命祗辱則是謂靈公當與卿大夫命之於朝即名正言順亂源窒矣此亦夫子正名之意也而靈公不悟朝無明命及公歿夫人立之又辭此尤郢之眀也郢立於夫人之手即制於南子而事皆不可為矣况正犯蒯聵之所必爭乎吁此郢之所以為賢也晋趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績左氏曰齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後随而􅀙之彼見吾貌必有懼心於是乎㑹之必大敗之従之簡子誓曰范氏中行氏反易天眀斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天眀􅀙君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圗之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入于兆下卿之罰也将戰郵無恤御簡子衛大子為右登鐵上望見鄭師衆大子懼自投于車下子良授大子綏而乘之曰婦人也簡子廵列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下羣子勉之死不在㓂繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衛大子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂従晋午在難不能治亂使鞅討之蒯瞶不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人撃簡子中肩斃于車中獲其蠭旗大子救之以戈鄭師北獲温大夫趙羅太子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主徳追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也大子曰吾救主於車退敵於下我右之上也郵良曰我両靷将絶吾能止之我御之上也蔡遷于州來左氏曰吳洩庸如蔡納聘而稍納師師畢入衆知之蔡侯吿大夫殺公子駟以説哭而遷墓遷于州來燕簡公卒獻公立二十有八年齊國夏衛石曼姑帥師圍戚穀梁氏曰此衛事也其先國夏何也子不圍父也不係戚于衛子不有父也胡氏曰蒯聵前稱世子所以深罪輒之見立不辭而拒父也輒若可立則蒯瞶為未絶未絶則是世子尚存而可以拒乎主兵者衛也何以序齊為首罪齊人與衛為惡而黨之也公孫文仲主兵伐鄭而序宋為首以誅殤公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也古者孫􅀙祖不以父命辭王父命禮也輒雖由嫡孫得立然非有靈公之命安得云受之王父辭父命哉然則為輒者奈何宜辭於國曰若以父為有罪将従王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣烏有父不慈子不孝爭利其國滅天理而可為者乎魯桓僖宫災左氏曰夏五月辛夘司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬰攸従之蒙葺公屋自大廟始外内以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立于象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之稾道還公宫孔子在陳聞火曰其桓僖乎殺萇𢎞左氏曰劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討周人殺萇𢎞履祥按周之衰也受制於諸侯其益衰也受制於諸侯之大夫然周之益衰亦天子之自取也夫以萇𢎞之賢足以振起王室應對諸侯天子不能用之而使為劉子之屬劉范世姻於是乎右范趙鞅敢以為討而天子又殺之以説趙鞅之意噫此周之所以益衰與魯季孫斯卒左氏曰季孫有疾命正常曰無死南孺子之子男也則以吿而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝吿曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢吿遂奔衛康子請退公使共劉視之則或殺之矣乃討之召正常正常不反史記曰季桓子病輦而見魯城喟然嘆曰昔此國㡬興矣以吾獲罪於孔子故不興也顧謂其嗣康子曰我即死若必相魯相魯必召仲尼後數日桓子卒康子代立已𦵏欲召仲尼公之魚曰昔吾先君用之不終終為諸侯笑今又用之不能終是再為諸侯笑康子曰誰召而可曰必召冉求於是使召冉求晋趙鞅圍朝歌左氏曰晋趙鞅圍朝歌師于其南荀寅犯師而出奔邯鄲趙鞅殺士臯夷秦惠公卒子嗣是為悼公二十有九年盗殺蔡昭侯國人立其子􅃋是為成侯左氏曰蔡昭侯将如吳諸大夫恐其又遷也承公孫翩逐而射之卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之晋人執戎蠻子赤歸于椘左氏曰楚人既克夷虎乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函致方城之外於繒闗為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晋隂地司馬起豐析與狄戎以臨上雒左師軍于菟和右師軍于倉野使謂隂地之命大夫士蔑曰晋椘有盟好惡同之若将不廢寡君之願也不然将通于少習以聴命士蔑請諸趙孟趙孟曰晋國未寧安能惡于椘必速與之士蔑乃致九州之戎執蠻子以畀椘師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸孔子如蔡履祥按孔子稱危邦不入亂邦不居夫子既去魯矣以衛靈公之無道而居衛以陳國之小嵗有吳師而在陳以蔡侯死於盗國遷于吳民分于椘而如蔡不㡬乎居亂而入危與曰前日之言君子守身之常法今日之事夫子行道之大權也夫以聖人盛徳固無施不可夫使二三君者能用孔子委國而聴之則衛可正陳可强蔡可守也而皆不能惜哉雖然夫子既知其不能用矣其時椘昭之賢聞於天下夫子固将如椘也當在衛也特以衛靈公致粟有際可之禮而再主蘧伯玉之家當在陳也又以司城貞子為之主而陳侯亦有言議之適故為二國留行至其如蔡盖為如椘也何以知之有子曰孔子失魯司㓂将之荆先之以子貢又申之以冉有則知孔子去魯則将之椘矣聖人無固無必故為二國留行爾然而適椘又卒為子西所阻愚以為此皆非聖人意也三十年晉趙鞅逐荀寅士吉射奔齊左氏曰晋趙鞅圍邯鄲荀寅奔鮮虞齊國夏伐晉㑹鮮虞納荀寅于柏人晉圍柏人荀寅士吉射奔晉史記曰中行文子范昭子遂奔齊趙竟有邯鄲柏人范中行餘邑入于晋趙名晋卿實專晋權奉邑侔於諸侯齊景公卒少子荼立左氏曰齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為大子也言於公曰若之齒長矣未有大子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子高昭子立荼寘羣公子於萊齊景公卒公子嘉駒黔奔衛公子鉏陽生奔魯萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎三十有一年吳伐陳孔子自蔡如葉按世家孔子遷于蔡三嵗左氏曰吳伐陳椘子曰吾先君有盟不可以不救乃救陳師于城父史記曰椘救陳軍于城父聞孔子在陳蔡之間使人聘孔子孔子将往陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今者久留陳蔡之間諸大夫所設行皆非仲尼之意今椘來聘孔子用於椘則陳蔡用事大夫危矣於是相與發徒役圍孔子於野不得行絶糧使子貢至椘椘子興師迎孔子然後得行朱子曰是時陳蔡臣服於椘若椘來聘孔子陳蔡大夫安敢圍之魯語絶糧當去衛如陳之時履祥按陳蔡􅀙椘耳非為之臣兼蔡又両屬於吳當時諸侯大夫疑孔子得衆而不用又忌他國之用孔子大率如此孔子圍於陳蔡之間荘子荀子皆有此語今故存之楚子将以書社地封孔子史記作七百里朱子謂恐無此楚令尹子西曰王之使諸侯有如子貢者乎曰無有王之輔相有如顔囘者乎曰無有王之将率有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非椘之福也昭王乃止顔囘卒按顔囘卒當在三十年内但孔子自陳蔡至葉乃在此二年之間雖因春秋書於吴伐陳之下而其交聘酬酢則在前矣顔淵之死當在陳蔡之間正合顔子三十二嵗而卒之數然子西止昭王之辭猶以輔相有如顔囘之説則是顔子尚存也顔子之死或是在塗或是歸省而死於家皆不可考今以事相次附三十一年之下論語曰顔淵死子曰噫天喪予天喪予子哭之慟従者曰子慟矣曰有慟乎非夫人之為慟而誰為又曰顔淵死顔路請子之車以為之槨子曰才不才亦各言其子也鯉也死有棺而無槨吾不徒行以為之槨以吾􅀙大夫之後不可徒行也門人欲厚葬之子曰不可門人厚葬之子曰囘也視予猶父也予不得視猶子也非我也夫二三子也履祥按顔淵死顔路他無所請而至於請車夫子亦他無可與而至於拒之則顔路疑於干而夫子㡬於吝然今考其時則顔淵之死且葬適當厄于陳蔡之後自椘反陳之間此正夫子之窮也夫䘮事稱家之有無夫子既以之處其子安得不以處顔子乎夫子遇舊館人之䘮既脱驂以致賻矣而不能為顔子之槨彼一時此一時也貧富不同也雖然此猶可也孔門自顔子之外曾子卒傳聖人之道而顔子之歿已有䘮子之嘆後六七年反魯荅其君大夫之問獨稱顔子為好學且有今也則亡未聞好學者之説然則曾子非耶盖曾子之年少孔子四十六嵗其齒最在諸弟子之後當孔子對哀公之時方二十有二耳下逮孔子歿曾子方年二十有七則一貫之傳其夙悟不減于顔子暮年工夫殆或過之後之學者不考乎其時因未聞好學之説而遂不知曽子之學孟子稱誦其詩讀其書而必尚論其世盖又欲考論其時以知其言行之先後也此類是已楚昭卒羣臣立其子章是為惠左氏曰楚子在城父将救陳卜戰不吉曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申子西為王不可則命公子結子期亦不可則命公子啟子閭五辭而後許将戰有疾庚寅攻大㝠卒于城父子閭退曰君王舎其子而讓羣臣敢忘君乎􅀙君之命順也立君之子亦順也二順不可失也濳師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史曰其當王身乎若禜之可移於令尹司馬椘子曰除腹心之疾而置諸股肱何益不糓不有大過天其夭諸有罪受罰又焉移之遂弗禜初楚子有疾卜曰河為祟大夫請祭諸郊曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉由己率常可矣履祥按史記昭王病於軍中云然孔子在陳聞是言曰楚昭王通大道矣其不失國也宜哉盖是言乃在軍之初時孔子在陳聞之此孔子所為従椘之聘也而卒不遇是亦椘之不幸也列女傳曰楚昭越姬者越句踐之女椘昭之姬也楚昭讌逰既驩謂越姬曰吾願與子生若此死又若此越姬對曰樂則樂矣然不可久也先君荘王淫樂三年不聴政事終而能改卒覇天下妾以君王為能法吾先君将改斯樂而勤於政也今則不然而要婢子以死其可得乎妾聞之諸姑也婦女以死彰君之善益君之寵不聞其以茍從君闇死為榮不敢聞命楚子矍然而寤二十五年楚子救陳病在軍中有赤雲夾日史曰是害王身可以移於将相楚子曰将相之於孤猶股肱也今移禍焉庸為去是身乎不聴越姬曰大哉君王之徳妾願從王矣妾聞信者不負其心義者不虚設其事妾死王之義不死王之好也遂自殺楚子薨於軍子閭子西子期謀曰母信者其子必仁乃仗師閉塗迎越姬之子熊章立之是為惠王孔子自楚反按孔子至葉即至椘也葉者楚之縣也論語載荷蓧丈人長沮桀溺之事史記皆在陳蔡之間但史記於在衛之事蔡葉之事皆重出而不考今姑畧之史記曰其秋楚子卒于城父椘狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰往者不可諌來者猶可追巳而已而今之從政者殆而孔子下欲與之言趨而辟之不得與之言按歌鳳史記荘子皆不同今以論語為正於是自楚反史記自椘反衛今考之衛世家四年方至衛齊陽生入于齊是為悼公齊陳乞弑其君荼左氏曰陳僖子使召公子陽生闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至于齊國人知之僖子使子士之母養之與饋者皆入冬十月立之将盟鮑子醉而往其臣差車鮑㸃曰誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒公使朱毛告於陳子曰㣲子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圗其小可也使毛遷孺子於駘殺諸野幕之下事又見公羊氏傳三十有二年宋皇瑗帥師侵鄭晉魏曼多帥師侵衛魯侯㑹吳于鄫魯侯伐邾以邾子益歸經世曰吳㑹魯于鄫以伐齊左氏曰公㑹吳于鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晋大夫過十吳王百牢不亦可乎景伯曰晋范鞅貪而棄禮以大國懼敝邑故十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人弗聴景伯曰吳将亡矣棄天而背本不與必棄疾於我乃與之大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉有由然也反自鄫以吳為無能為也季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁失二徳者危将焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎杜氏以此二句為孟氏之言不樂而出秋伐邾及范門猶聞鐘聲大夫諌不聴茅成子請告于吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我且國内豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保于繹師宵掠以邾子益來獻于亳社邾茅夷鴻以束帛乘韋自請救於呉曰魯弱晋而逺呉馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之貳也邾賦六百乘君之私也以私奉貳唯君圗之呉子􅀙之三十有三年宋公入曹以曹伯陽歸左氏曰宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可不救鄭師救曹侵宋初曹人或夢衆君子立社宫謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之説説之因訪政事大説之有寵使為司城以聴政彊言霸説於曹伯曹伯􅀙之乃背晋而奸宋宋人伐之晋人不救将還褚師子肥殿曹人詬之公聞之怒命反之遂滅曹呉伐魯魯歸邾子益于邾左氏曰呉為邾故将伐魯問於叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隐且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王将使我王問於子洩對曰魯雖無與立必有與斃諸侯将救之未可以得志焉晋與齊椘輔之是四讎也夫魯齊晋之唇唇亡齒寒君所知也不救何為吳伐魯子洩率故道險􅀙武城初武城人或有因於吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之國人懼懿子謂㬌伯若之何對曰呉師來斯與之戰何患焉且召之而至又何求焉呉師克東陽而進舎於五梧眀日舍於蠶室明日舍于庚宗遂次于泗上㣲虎欲宵攻王舎私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害呉而多殺國士不如己也乃止之呉子聞之一夕三遷呉人行成邾子齊甥也齊侯使如呉請師将以伐魯乃歸邾子邾子又無道呉子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政後二年邾隐公奔魯又奔齊三十有四年楚人伐陳左氏曰陳即呉也呉城邗溝通江淮三十有五年魯侯會呉伐齊齊侯陽生卒齊人實弑之而立其子壬是為簡公左氏曰公㑹呉子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴于師呉子三日哭于軍門之外徐承帥舟師将自海入齊齊人敗之呉師乃還秋呉子使來復儆師楚公子結帥師伐陳左氏曰楚子期伐陳呉延州來季子救陳謂子期曰二君不務徳而力爭諸侯民何罪焉我請退以為子名務徳而安民乃還孔子自陳復至衛論語曰子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之冉有曰夫子為衛君乎子貢曰諾吾将問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也是時孔子在衛冉有為季氏宰於魯何以得問子貢盖魯衛地近冉有或請問省其師或以聘問出疆或未與其政事皆不可知朱子曰君子居是邦不非其大夫况其君乎故子貢不曰衛君而以夷齊為問夫子告之如此則其不為衛君可知矣盖伯夷以父命為尊叔齊以天倫為重其遜國也皆求所以合乎天理之正而即乎人心之安既而各得其志焉則視棄其國猶敝蹝爾何怨之有若衛輒之據國拒父而唯恐失之其不可同年而語明矣又曰夷齊雖賢而其所為或出於激發過中之行而不能無感慨不平之心則衛君之事猶未為甚得罪於天理也故問怨乎以審其趣而夫子告之如此則子貢之心曉然知夫二子之為是非其激發之之私而無纎芥之憾矣持是心以燭乎衛君之事其得罪於天理而見絶於聖人尚何疑哉論語曰子路曰衛君待子而為政子将奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知盖闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣胡氏曰蒯瞶欲殺母得罪於父而輒據國以拒父皆無父之人也其不可有國也明矣夫子為政而以正名為先必将具其事之始末請于天王告于方伯命公子郢而立之則人倫正天理得名正言順而事成矣夫子告之之詳而子路不悟故卒死孔悝之難而不知食其禄之為非也履祥按朱子有言當衛輒之時父爭於外子拒於内不知其國何以度日是謂君子於此不可一日處也孔子世家稱孔子自椘反衛在哀公六年其後自衛反魯首尾又計六年矣以衛父子之亂而夫子久於其國何邪豈居亂邦見惡人在聖人則可或待其得政而将借是以正名義也及考之陳世家則椘昭卒之年孔子在陳非返衛也考之衛世家則齊弑悼公之年孔子始自陳至衛眀年反魯則非久於衛也然猶至衛何也孔子在陳曰盍歸乎來盖思魯之狂士則自陳至衛盖過衛耳意則主於歸魯也以夫子門人如子夏子羔子貢之徒亦多衛人者孔子於魯為父母之邦其出也既以司㓂去國則其反也不可以無故而復國故明年召之即歸矣經世於丙辰書孔子自陳至衛於丁巳書自衛反魯可以訂孔子世家之謬而孔子久速之可於此見矣三十有六年齊國書帥師伐魯魯侯會吳伐齊齊國書帥師及吳戰于艾陵齊師敗績獲齊國書左氏曰齊為鄎故國書高無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子従公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使􅀙於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子强問之對曰小人慮材而言量力而共者也武叔曰是謂我不成文夫也退而蒐乘孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為己徒卒老幼守宫次于雩門之外五日右師􅀙之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰于郊齊師自稷曲師不踰溝樊遲請三刻而踰之衆􅀙之師入齊軍獲甲首八十齊人不能師宵諜曰齊人遁冉有請􅀙之三季孫弗許右師奔孟之側殿林不狃死公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊帥故能入其軍孔子曰義也為郊戰故公㑹吳子伐齊克博至于嬴陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死将戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約呉髪短東郭書曰三戰必死問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而已不聞金矣戰于艾陵呉展如敗高子國子敗胥門巢呉子卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于魯呉之将伐齊也越子率其衆以朝焉王及列士皆有饋賂呉人皆喜唯子胥懼曰是豢呉也夫諌曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼呉其冺矣使醫除疾而曰必遺類焉者未之有也弗聴使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死将死曰樹吾墓檟檟可材也呉其亡乎三年其始弱矣盈必毁天之道也履祥按義理不明而血氣用事無有不敗者闔廬傷於檇李而死夫差使人立於庭茍出入必謂之曰夫差而忘越王之殺而父乎則對曰唯不敢忘可謂有復讎之志矣僅有夫椒之敗而遽受其平今又受其豢子胥之諌利害雖明而復讎之義不及也子胥能報父讎於宗國獨不能使其君報父讎國乎夫差舎復讎之義而好大喜功爭衡上國訖為讎所乘以斃爭衡者血氣之用事也忘讎者義理之不明也子胥雖諌而以是死夫差亦以是敗矣孔子自衛反魯左氏曰魯人以幣召孔子乃歸史記世家曰冉有為季氏将師與齊戰克之季康子曰子之於軍旅學之乎性之乎冉有曰學之於孔子康子曰我欲召之可乎對曰欲召之則無以小人閒之則可矣季康子逐公華公賔公林以幣迎孔子孔子歸魯論語曰哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服謝氏曰好直而惡枉天下之至情也順之則服逆之則去必然之理也然或無道以照之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也季康子問使民敬忠以勸如之何子曰臨之以荘則敬孝慈則忠舉善而教不能則勸子言衛靈公之無道也康子曰夫如是奚而不䘮孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其䘮季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不竊季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃哀公問弟子孰為好學孔子對曰有顔囘者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也履祥按顔子之好學如博文約禮而欲罷不能克己復禮而請事斯語私足以發語之不惰皆是也而夫子荅哀公之問特舉不遷怒不貳過為言二事者固亦克己之功而未盡顔子好學之事盖借是以諌悟哀公也夫子荅問之間各切其人之病哀公為人躁妄故夫子荅其弟子之問而舉顔子不遷怒不貳過以諭曉之可謂切矣即顔子二事之功為哀公對病之藥惜哀公之不能繹且改也然今也則亡惜詞也未聞好學待詞也曾子宜可謂好學而夫子不及之此一時也曾子之年最在諸弟子之後其進學當在夫子暮年其成徳亦在夫子既歿之後也説又見前孔子叙書記禮刪詩正樂序易彖繫象説卦文言史記曰魯終不能用孔子孔子亦不求仕時周室㣲而禮樂廢詩書缺追迹三代之禮序書傳上紀唐虞之際下至秦繆編次其事觀殷夏所損益以一文一質周監二代郁郁乎文哉吾従周故書傳禮記自孔氏孔子語魯太師樂吾自衛反魯然後樂正雅頌各得其所古者詩三千餘篇及至孔子取可施於禮義上采契后稷中述殷周之盛至幽厲之缺始於衽席三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晚而喜易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣孔子以詩書禮樂教弟子盖三千焉身通六藝者七十有二人履祥按史記謂孔子序書編次其事夫書序非孔子作而周書諸篇多失其次愚於武王成王之篇皆嘗考正之矣計古者事時前後已具編年之史而書則每事自為首尾固未必諸篇相為次第也然或諸篇本有次第而孔安國伏生時失之前漢書言張覇作書首尾後漢書言衛宏作詩序自前儒以詩書之序皆出孔子朱子嘗引漢書以證詩序之偽矣獨書序疑而未斷方漢初時太誓且有偽書何况書序且孔傳古文其出最後則附㑹之作有所不免若書序果出壁中亦不可謂非附㑹者盖孔鮒兄弟藏書之時上距孔子歿􅂷三百年其同藏者論語孝經論語既有子曾子門人所集孝經又後人因五經之訓而􅄂引詩書旁取傳記之語附㑹成書何獨古書首尾尚是夫子舊本則其為齊魯諸儒次序附㑹而作序亦可知也子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣聖人於夏殷之禮不曰吾能知之矣曰吾能言之此盖記禮之時語也聖人生知之資其於禮之義理則知之素矣此其所言盖謂其制度文為之詳爾雖當時二代之禮失亡将盡而以聖人之資觸類旁通皆能歴歴言之但聖人謹重之意必欲得文獻以證成之足則吾能證成其書矣而卒不可得故終於􅀙周而幽厲傷之又終於􅀙魯而郊禘又非禮後世訖不得見成書之盛其間見於禮記之所以傳者又多􅄂以門人經師之説惜哉至於詩則子王子嘗謂今之三百篇非盡夫子之三百篇也夫子刪繁蕪之三千取雅正者三百而三千之中豈無播詠于世俗之口者諸儒傳夫子之詩而不全得見世俗之流傳管絃之濫在者概以為古詩取以足夫子三百之數而不辯其非也不然若孔門之誦詠如素絢唐棣諸詩經書之所傳如貍首轡柔先正繁渠諸詩何以皆不與於今之三百而夫子已放之鄭聲何為尚存而不削邪至於易彖繫象説卦文言魏伯陽顔師古所謂十翼者此則夫子之意而門人述以成書謂皆夫子所筆則亦非也彖傳例有發明中間豈無未盡之意象傳句多重複中間寧無填塞之詞盖門人得夫子之説而欲足成其書不得不爾何以知之以繫辭知之也十翼莫粹於繫辭繫辭或不以子曰起文或以子曰起文或引子曰以荅問或中引子曰以為證或末引子曰以為斷子王子謂與子思作中庸同體盖繫辭傳門人以夫子之意發明非夫子之親筆也果夫子之親筆則章首之子曰何以或有或無或問或荅篇中之子曰何以或引或斷邪然則繫辭傳之成文且非夫子之全筆則彖傳之具體小象之比辭安得為夫子之全筆耶獨大象乃夫子之筆辭簡義精體明用切三聖所作之外此自當為夫子之一經而門人得夫子之言獨文言無所附㑹夫子文言最為明白乾卦文言各以子曰荅問深宻明暢其後申述卦爻之義不以子曰起文者意便不及如所謂故或之或之者疑之也故无咎逈與前章不同其於六十四卦之中發明爻義者亦文言之體間舉數爻辭義俱明門人不敢足成三百八十四首故於乾坤二卦文言之外餘卦文言􅄂諸繫辭傳是為得之後之學者於禮記十翼但欲見夫子著述之多而不敢别其為門人發明之辭與其足成之體今姑論其梗概如此又當别為讀經者言之三十有七年魯用田賦左氏曰季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中歛􅀙其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦将又不足且子季孫若欲行而法則有周公之典在弗聴榖梁氏曰古者公田什一用田賦非正也履祥按魯自宣公初税畆而田税已倍作丘甲用田賦而兵賦又再倍矣左氏叙孔子之對似非盡聖人語今畧之呉子㑹魯侯衛侯宋皇瑗于橐臯左氏曰公㑹呉于橐臯吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟呉徴㑹于衛初衛人殺呉行人且姚而懼謀於行人子羽子羽曰呉方無道無乃辱吾君不如止也子木曰呉方無道國無道必棄疾於人呉雖無道猶足以患衛往也秋衛侯㑹呉于鄖公及衛侯宋皇瑗盟呉人藩衛侯之舎子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吴不行禮於衛而藩其君舎以難之子盍見大宰乃請束錦以行語及衛故大宰嚭曰寡君願事衛君衛君之來也緩寡君懼故将止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是堕黨而崇讎也且合諸侯而執衛君誰敢不懼堕黨崇讎而懼諸侯或者難以覇乎乃舎衛侯三十有八年單子晋侯魯侯㑹呉子于黄池呉子使駱來告勞楚公子申帥師伐陳於越入呉呉及越平左氏曰夏會單平公晋定公呉夫差于黄池六月丙子越子伐呉為二隧疇無餘謳陽自南方先及郊呉大子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讎而弗殺也大子曰戰而不克将亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗呉師獲大子友王孫彌庸夀於姚丁亥入呉呉人告敗于夫差夫差惡其聞也自剄七人於幕下秋七月辛丑盟呉晋争先呉人曰於周室我為長晋人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今呉王有墨國勝乎大子死乎且夷徳輕不忍久請少待之乃先晋人呉人将以公見晋侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於呉有豐於晋無不及焉以為伯也今諸侯㑹而君将以寡君見晋君則晋成為伯矣敝邑将改職貢魯賦於呉八百乘若為子男則将半邾以屬于呉而如邾以事晋且執事以伯召諸侯而以侯終之何利之有焉呉人乃止既而悔之囚㬌伯以還及户牖謂大宰曰魯将以十月上辛有事於上帝先王何世有職焉若不㑹祝宗将曰呉實然且謂魯不共而執其賤者何損焉大宰言於夫差曰無損於魯而祇為名不如歸之乃歸景伯夫差欲伐宋殺其丈夫而囚其婦人大宰嚭曰可勝也而弗能居也乃歸呉越春秋曰黄池之㑹呉既長晋而還未踰於黄池越聞呉王久留未歸乃悉士衆将伐之呉又恐齊宋之為害乃命王孫駱告勞于周曰昔楚之不承供貢辟逺兄弟之國吾前君闔閭不忍其惡帶劍挺鈹與楚昭相逐於中原天舎其衷楚師敗績今齊不鑒於楚又不恭王命以逺辟兄弟之國夫差不忍其惡被甲帶劍徑至艾陵天福於呉齊師還鋒而退夫差豈敢自多其功是文武之徳所祐助時歸呉不熟於嵗遂縁江泝淮開溝深水出於商魯之間而歸告於天子執事周王荅曰伯父令子來乎盟國一人則依矣余實嘉之伯父若能輔余一人則兼受永福周室何憂焉乃賜弓弩王阼以增號諡史記曰國亡大子内空王居外久士皆罷敝於是乃使厚幣以與越平御批資治通鑑綱目前編卷十七
