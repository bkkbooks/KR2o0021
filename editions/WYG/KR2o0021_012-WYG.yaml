body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十二周襄王十有七年衛侯燬滅邢秦伯師于河上晋侯辭秦師而下次于陽樊右師圍温取帯殺之左師逆王于鄭王入于王城晋侯入朝王賜晋侯陽樊温原欑茅之田左氏曰秦伯師于河上将納王狐偃言於晋侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業今為可矣晋侯辭秦師而下次于陽樊右師圍温左師逆王王入于王城取大叔于温殺之于隰城晋侯朝王王饗醴命之宥請隧弗許曰王章也未有代徳而有二王亦叔父之所惡也與之陽樊温原欑茅之田晋於是始啟南陽陽樊不服圍之倉葛呼曰徳以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民晋侯圍原命三日之糧原不降命去之諜出曰原将降矣軍吏請待之公曰信國之寳民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫于冀趙衰為原大夫狐溱為溫大夫衛文公卒子鄭嗣是為成公楚人圍陳納頓子于頓胡氏曰圍陳納頓子也納云者不與納也諸侯失國諸侯納之正也何以不與乎夫陳先代之後也不能以禮安靖鄰國保恤寡小中國諸侯又不能修方伯連率之職而楚人納之是夷狄仗義正諸夏也春秋之責中國深矣陳氏曰齊桓公卒楚始與諸夏盟于齊于鹿上執宋公納頓子侈然欲廢置諸侯矣春秋之所懼也魯侯衛子莒慶盟于洮十有八年魯侯莒子衛寗速盟于向齊人侵魯西鄙北鄙衛人伐齊魯公子遂如楚乞師楚人滅䕫以䕫子歸楚人伐宋圍緡魯以楚師伐齊取榖左氏曰公㑹莒兹㔻公寗荘子盟于向尋洮之盟也齊師伐我西鄙討是二盟也夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾将辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也䕫子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于䕫吾是以失楚又何祀焉楚成得臣鬬宜申帥師滅䕫以䕫子歸宋以其善於晋侯也叛楚即晋楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取榖凡師能左右之曰以寘桓公子雍於榖易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚履祥按自齊桓公之歿楚遂爭霸諸夏齊討魯衛之盟是又欲復霸也魯人知栁下惠之賢而不能用齊師壓境始使展喜受命焉如其言果退齊師矣而魯復乞師於楚是以先王之命退齊而又自犯先王之命也楚方西滅䕫北伐宋東取榖其勢益張微晋文之霸則楚遂霸諸夏矣果爾庸非魯導之與是行也臧文仲在焉可謂不仁不知甚矣十有九年齊孝公卒弟潘父殺世子而自立是為昭公楚人陳侯蔡侯鄭伯許男圍宋魯侯及諸侯盟于宋左氏曰楚子及諸侯圍宋宋公孫固如晋告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新昬於衛若伐曹衛楚必救之則齊宋免矣於是蒐于被廬作三軍謀元帥趙衰曰郤縠可謂說禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也乃使郤縠将中軍郤溱佐之使狐偃将上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝将下軍先軫佐之荀林父御戎魏犨為右陳氏曰此楚子也其稱人何嫌予楚伯也盟于齊楚猶序陳蔡之下于鹿上猶不先齊宋也㿻之㑹宋楚始竝為諸侯長矣楚之稱子而長於諸侯宋襄為之也齊桓公卒而衛從楚魯又從楚楚敗宋師于泓納頓子于頓滅䕫取齊之榖且合四國之君以圍宋春秋以是為夷狄之强而已矣故雖序於諸侯之上而人之二十年晋侯侵曹晋侯伐衛楚人救衛晋侯入曹執曹伯畀宋人晋侯齊師宋師秦師及楚人戰于城濮楚師敗績左氏曰晋侯将侵曹假道于衛弗許還自南河濟伐曹伐衛取五鹿郤縠卒原軫将中軍胥臣佐下軍晋侯齊侯盟于歛㿻衛侯請盟晋人弗許衛侯欲與楚國人不欲故出其君以說于晋衛侯出居于襄牛魯公子買戍衛楚人救衛不克魯懼於晋殺買以說焉謂楚人曰不卒戍也晋侯圍曹門焉多死曹人尸諸城上晋侯患之聼輿人之謀曰稱舍於墓師遷焉曹人兇懼因而攻之入曹數之以其不用僖負羈而乗軒者三百人也令無入僖負羈之宫而免其族報施也魏犫顚頡怒曰勞之不圖報於何有􅅡僖負羈氏魏犫傷於胷公欲殺之而愛其材使視之病犫束胷見使者距躍曲踊乃舍之殺顚頡以狥于師立舟之僑為戎右宋使門尹般如晋師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公說執曹伯分曹衛之田以畀宋人楚子入居于申使申叔去榖使子玉去宋曰無從晋師晋侯在外十九年矣而果得晋國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸知難而退有徳不可敵子玉使伯棼請戰楚子怒少與之師子玉使宛春告於晋師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎楚有三施我有三怨怨讎已多将何以戰不如私許復曹衛以携之執宛春以怒楚既戰而後圖之乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晋師晋師退軍吏曰以君辟臣辱也且楚師老矣子犯曰師直為壮曲為老㣲楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎我曲楚直我退而楚還我将何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晋侯宋公齊國歸父崔夭秦小子慭次于城濮楚師背􅈶而舍晋侯患之子犯曰戰也捷必得諸侯不捷表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大耻不如戰也子玉使鬭勃請戰晋侯使欒枝對曰楚君之惠未之敢忘是以在此為大夫退既不獲命敢煩大夫謂二三子戒爾車乗敬爾君事詰朝将見晋侯登有莘之虚以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晋師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒将中軍曰今日必無晋矣子西将左子上将右胥臣䝉馬以虎皮先犯陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族横撃之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晋師三日館榖及癸酉而還胡氏曰初公子重耳之出亡也曹衛皆不禮焉至是侵曹伐衛再稱晋侯者譏復怨也或曰曹衛背華即夷於是乎致武奚為不可曰楚人摟諸侯以圍宋陳蔡鄭許舉兵而同㑹魯公與㑹而同盟楚雖得曹新昬於衛然其君不在㑹其師不與圍方之諸國不猶愈乎又况衛已請盟而晋人弗之許也卒使衛侯竄身無所奔于荆蠻歸于京師兄弟相殘君臣交訟衛之禍文公為之也曹伯未狎晋政莫知所承晋文不修詞令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣得臣雖從晋師不過請復衛封曹臣亦釋宋未有必戰之意也及晋許曹衛以擕其黨拘宛春以激其怒而後楚請戰矣春秋書及在晋侯誅其意也夫荆楚恃强憑陵諸夏久矣以至執中國之盟主今又戍榖逼齊合兵圍宋非有城濮之敗則民其被髮左祍矣宜有美詞稱揚其績而春秋所書如此仁人正其誼不謀其利明其道不計其功文公一戰勝楚遂主夏盟以功利言則髙矣語道義則三王之罪人也陳氏曰城濮之戰宋公齊國歸父秦小子憖也宋公也則何以但稱師尊晋侯也尊晋者與晋以霸也楚得臣何以稱人楚未有大夫也左氏曰晋侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懐生矣将用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豊焉明徴其辭公曰可乎子犯曰民未知禮未生其共於是乎大蒐以示之禮作執秩以正其官民聼不惑而後用之出榖戍釋宋圍一戰而霸文之教也城濮之戰晋中軍風于澤亡大斾之左􅏧祁瞞奸命司馬殺之以狥于諸侯使茅茷代之師還濟河舟之僑先歸士㑹攝右秋七月振旅愷以入于晋獻俘授馘飲至大賞徴㑹討貳殺舟之僑以狥于國民於是大服君子謂文公其能刑矣三罪而民服履祥按晋文公勤王以示義伐原以示信大蒐以示禮所謂五霸假之也然霸圖猶有此後世併此無之矣晋文之霸子犯先軫之謀居多先軫報施救患取威定霸之說已不如管仲三不可之言惟子犯詩書義之府禮樂徳之則其言為精而又曰徳義利之本則皆霸佐之心矣夫有恩則有怨救宋固報施也至于分曹困衛報怨亦已甚矣稱舍於墓一譎分曹畀宋一譎私許復曹衛一譎執宛春又一譎退斾曵柴又一譎晋文公譎而不正於此一役亟是之在軍則殺顚頡祁瞞師入則殺舟之僑此軍法所以伸戰所以勝國人所以畏文公霸業於是乎備見矣晋侯作王宫于踐土獻楚俘于王王命尹氏王子虎内史叔興父䇿命晋侯為侯伯左氏曰甲午至于衡雍作王宫于踐土丁未獻楚俘于王駟介百乗徒兵千鄭伯傅王用平禮也己酉王饗醴命晋侯宥王命尹氏及王子虎内史叔興父䇿命晋侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晋侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲楚殺其大夫得臣左氏曰楚師既敗楚子使謂子玉曰大夫若入其如申息之老何子西孫伯曰得臣将死二臣止之曰君其将以為戮及連榖而死楚子使止子玉曰母死不及晋侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣衛侯出奔楚左氏曰衛侯聞楚師敗出奔楚遂適陳使元咺奉叔武以受盟晋侯齊侯宋公魯侯蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹諸侯朝于王所左氏曰王子虎盟諸侯于王庭要言曰皆奨王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼衛侯鄭自楚復歸于衛衛元咺出奔晋左氏曰或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晋人復衛侯寗武子與衛人盟于宛濮曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不貳衛侯先期入叔武将沐聞君至喜捉髮走出前驅歂犬射而殺之公知其無罪枕之股而哭之歂犬走出公使殺之元咺出奔晋陳穆公卒子朔嗣是為共公晋侯齊侯宋公魯侯蔡侯鄭伯陳子莒子邾人秦人㑹于温王狩于河陽諸侯朝于王所晋人執衛侯歸之于京師衛元咺自晋復歸于衛立公子瑕曹伯襄復歸于曹諸侯遂圍許左氏曰㑹于温討不服也晋侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽壬申公朝于王所衛侯與元咺訟不勝執衛侯歸之于京師寘諸深室寗子職納槖饘焉元咺歸于衛立公子瑕晋侯有疾曹伯之豎侯獳貨筮史使以曹為解曰齊桓公為㑹而封異姓今君為㑹而滅同姓且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君将若之何公説復曹伯遂㑹諸侯圍許晋侯作三行以禦狄荀林父将中行屠擊将右行先蔑将左行公羊氏曰衛侯之罪殺叔武也何以不書為叔武諱也春秋為賢者諱何賢乎叔武讓國也文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故於是已立然後為踐土之㑹始反衛侯衛侯得反曰叔武簒我元咺爭之曰叔武無罪終殺叔武元咺走而出執衛侯者晋侯也其稱人衛之禍文公為之也文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也元咺自晋復歸于衛自者何有力焉者也此執其君其言自何為叔武爭也履祥按是年晋文公始霸春秋所不書者二上則天王下臨踐土不書下則衛侯鄭殺叔武不書何也春秋之事所不書衆矣蓋舊史所書皆從赴告所不告者史固不得而書也夫子修春秋有改定而無增加蓋謹之也然踐土之天王不書於朝王所見之叔武之見殺不書於衛侯名元咺奔而晋執衛侯見之或曰叔武之殺非衛侯也公子歂犬也吾觀衛侯在外則殺元咺之子返國則已盟而先期以入是皆有忌叔武之心焉衛侯忌叔武之心久矣使衛侯無忌叔武之心則先驅何以殺叔武之遽哉春秋誅心之法必不以是末減衛侯也二十有一年王子虎魯侯晋人宋人齊人陳人蔡人秦人盟于翟泉左氏曰公㑹王子虎晋狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不㑹公侯陳氏曰晋初以大夫盟王子也向也踐土之役王子虎不書涖盟也今以大夫盟諸侯文公之志荒矣大夫之交政於是始文公為之也履祥按杜氏謂翟泉在洛陽城内洛陽去今河南王城二十五里耳諸大夫於此不入聘王室而魯侯於此㑹盟不朝天子是誠何為者宜春秋於此不書公而大夫皆人之二十有二年衛殺其大夫元咺及公子瑕衛侯鄭歸于衛左氏曰晋侯使醫衍酖衛侯寗俞貨醫使薄其酖不死公為之請納玉於王與晋侯王許之乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服将命周歂先人及門遇疾而死冶厪辭卿履祥按衛侯有罪則不當以醫誅衛侯無罪則不當以玉免此晋文之不正也衛侯初歸則殺叔武再歸則殺元咺公子瑕春秋於其出奔不名而歸名之比於失國滅同姓之罪矣元咺失事君之禮故以國討書有守國之功故以官書公子瑕之及也非其罪矣晋人秦人圍鄭左氏曰晋侯秦伯圍鄭以其無禮於晋且貳於楚也晋軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壮也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晋圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之徃來共其乏困君亦無所害且君嘗為晋君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晋何厭之有既東封鄭又欲肆其西封若不闕秦将焉取之闕秦以利晋唯君圖之秦伯說與鄭人盟使杞子逄孫楊孫戍之乃還子犯請擊之公曰不可㣲夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之履祥按晋文報怨而喜功故邀秦以伐鄭秦穆恃功而視利故私鄭以倍晋此一役也結怨交兵者數世晋主夏盟失秦之援而為楚所抗自是役始春秋之所憂在楚史記之所憂在秦二者居天下之大勢矣王使宰周公聘于魯魯公子遂入聘遂如晋陳氏曰自桓王以下周室無聘魯者於是再聘而宰周公實來則已重矣公子遂如京師遂如晋是夷周於晋也履祥謂夷周於晋猶未也其後知有晋而不知有周矣可勝誅哉二十有三年晋侯作五軍初王命曲沃伯以一軍為晋侯至獻公作二軍文公作三軍又作三行至是作五軍狄圍衛衛遷于帝丘履祥按齊桓公之時狄滅衛而封衛于楚丘晋文公之時狄圍衛而衛遷于帝丘桓文之優劣見矣二十有四年楚子使鬭章請平于晋晋侯使陽處父如楚鄭文公卒子蘭嗣是為穆公衛人侵狄及狄盟晋文公卒子驩嗣是為襄公履祥按晋文覇功不及齊桓之盛而晋世主夏盟齊桓止其身蓋齊桓之家不治而晋文之家事治也齊桓之夫人三内嬖如夫人者六人身死不及殯而即有五公子之亂齊遂以衰傳稱晋侯逆夫人嬴氏以歸狄人歸季隗杜祁以君故讓偪姞而上之以狄故讓季隗而己次之故班在四辰嬴賤班在九人但齊姜存否不見於傳而劉向列女傳稱晋文迎之以歸為夫人向博極羣書必有考也則晋文之家法大槩可見矣家法治所以無身後之亂也有國者當知治亂之本不可以是為迂二十有五年秦人入滑晋人及姜戎敗秦師于殽左氏曰杞子自鄭使告于秦曰鄭人使我掌其北門之管若濳師以来國可得也蹇叔曰師知所為鄭必知之勤而無所必有悖心且行千里其誰不知師勞力竭逺主備之無乃不可乎公辭召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也蹇叔之子與師哭而送之曰晋人禦師必於殽殽有二陵必死是間余收爾骨焉秦師遂東過周北門左右免胄而下超乗者三百乗王孫滿尚㓜觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脱又不能謀能無敗乎及滑鄭啇人弦髙将市於周遇之以乗韋先牛十二犒師曰寡君聞吾子将歩師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉杞子奔齊逄孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晋原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾䘮而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晋於是始墨文嬴請三帥許之先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長㓂讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年将拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一𤯝掩大徳陳氏曰晋之霸秦有力焉自城濮以來無役不從也文公未葬襄公墨衰及姜戎氏要秦師于殽敗之夫晋帥天下諸侯以攘夷狄存中國也秦有力焉而及姜戎敗之秦晋之構怨自是始更三君交兵無虚歳曾不十年晋遂不競而楚伯是故特書及而晋侯貶稱人然則善秦歟自韓原秦帥無君大夫則非善可知也晋遂不競而楚伯秦亦與有力焉耳晋人敗狄于箕魯僖公卒子興嗣是為文公左氏曰齊國荘子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也冬公如齊反薨于小寝即安也晋人伐陳鄭人伐許左氏曰討其貳於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭将納公子瑕門于桔柣之門瑕覆于周氏之汪外僕髠屯禽之以獻文夫人歛而葬之鄶城之下晋陽處父侵蔡楚子上救之與晋師夾泜而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晋人無信半渉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣􅉲子上曰受晋賂而辟之楚之恥也罪莫大焉王殺子上二十有六年魯文公元二月癸亥日有食之王使叔服如魯㑹葬使毛伯錫魯侯命胡氏曰諸侯終䘮入見則有錫歳時來朝則有錫能敵王所愾則有錫禮諸侯䘮畢以士服見天子已見錫之黻冕圭璧然後歸今文公繼世䘮制未終非能初見也何為而錫命乎晋侯來朝于温伐衛左氏曰晋文公之季年諸侯朝晋衛成公不朝使孔逹侵鄭伐緜訾及匡晋襄公既祥使告于諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晋侯朝王于温先且居胥臣伐衛圍戚取之獲孫昭子衛人使告于陳陳共公曰更伐之我辭之衛孔逹帥師伐晋魯侯使叔孫得臣來拜衛人伐晋楚世子商臣弑楚成而自立是為穆左氏曰初楚子将以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聼既又欲立子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也從之江芈怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬以宫甲圍楚子請食熊蹯而死弗聼縊諡之曰靈不瞑曰成乃瞑二十有七年晋侯及秦師戰于彭衙秦師敗績左氏曰殽之役晋人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聼言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政文之二年春秦孟明視帥師伐晋以報殽之役晋侯禦之先且居将中軍趙衰佐之王官無地御戎狐鞫居為右及秦師戰于彭衙秦師敗績晋人謂秦拜賜之師秦伯猶用孟明孟明增修國政重施於民趙成子言於諸大夫曰秦師又至将必辟之懼而増徳不可當也宋公陳侯鄭伯晋士縠魯公孫敖盟于垂隴左氏曰穆伯㑹諸侯及晋司空士縠盟于垂隴晋討衛故也書士縠堪其事也陳氏曰晋遂以大夫盟諸侯也大夫而與諸侯敵於是始故書大夫專盟自士縠也然則士縠主是盟也則曷為序於諸侯之下春秋不以大夫主盟也是故訖于宋不以大夫主盟翟泉貶此何以不貶貶不於其甚則於事端餘實録而已矣自書士縠而後凡役書大夫垂隴主士縠新城主趙盾而後大夫與諸侯序於是戚之盟書齊國佐隨之㑹書宋華元甚者無伯而君與大夫竝列於㑹矣晋人宋人陳人鄭人伐秦左氏曰晋先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇徳二十有八年晋人宋人魯人陳人衛人鄭人伐沈沈潰左氏曰以其服於楚也王叔文公卒王子虎也秦人伐晋左氏曰秦伯伐晋濟河焚舟取王官及郊晋人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之壹也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也秦伯師還誓于師書秦誓篇曰公曰嗟我士聼無譁予誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉穆公首援古人之言盤難艱凡四語三韻盤如盤樂怠傲之盤人惟多盤所以樂放恣憚檢束喜邪忌正不能受責穆公引此意主受責而多盤其病源也我心之憂日月逾邁若弗云來此穆公悔多盤之失也惟古之謀人則曰未就予忌惟今之謀人姑将以為親古今謀人猶云前輩後輩也前輩謂未可輕為乃反忌之於後輩則茍焉親信之此穆公悔其不能受責也雖則云然前過雖不可追後来尚可勉也尚猷詢兹黃髮則罔所愆番番良士旅力既愆我尚有之此復思用古人之謀也仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之勇夫諞言皆今之謀人也既不欲用此勇夫矣又悔用諞言之舊失懲創之深也如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若己有之人之彦聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉此因古謀人良士等而上之又思好賢樂善之人葢兼有受責如流之美者此良相之量善類之所以聚國家之福也穆公慨想形容殊有意味人之有技冒疾以惡之人之彦聖而違之俾不逹是不能容以不能保我子孫黎民亦曰殆哉反上文而言蔽賢疾能之人葢不但責人無難而已此善類之所以散而國家之禍也邦之杌隉曰由一人邦之榮懐亦尚一人之慶總言國家安危之效葢由所謂善惡之殊而思得君子以終之穆公之意悠哉史記秦紀曰穆公自茅津渡河封殽中尸為發䘮哭之三日乃誓於軍曰云云以申不用蹇叔百里傒之謀故作此誓令後世以記余過君子聞之皆為垂涕履祥按秦誓秦穆公晩年悔過之書也左氏記秦晋之故甚詳而不記作誓之事書序誤以為敗殽還歸之作惟史記繋作誓於取王官封殽尸之後葢穆公自是不復東征矣此篇穆公更歴懲創之言極為眞切穆公於五伯之功為末而晚年所悔庶㡬王者之意象焉但所少者剛明之力而或有悠緩之意所望於人者大而所以自為者或尚小爾楚人圍江晋以江故來告王使王叔㑹晋陽處父帥師伐楚以救江左氏曰楚師圍江晋先僕伐楚以救江晋以江故告于周王叔桓公晋陽處父伐楚以救江門于方城遇息公子朱而還胡氏曰當是時楚有覆載不容之罪晋主夏盟宜合諸侯聲罪致討命秦甲出武關齊以東兵略陳蔡而南處父等軍方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻強國豈能濟乎故春秋書伐楚以救江言救江雖善而所以救之者非其道矣二十有九年狄侵齊楚人滅江陳氏曰滅不言圍此其書圍何以病晋也王使召公過賜秦伯金鼓史記曰秦用由余謀伐戎益國十二開地千里遂霸西戎天子使召公過賀穆公以金鼓履祥按伐滅西戎益國十二此非一時葢史記總叙於此年之下以見天子賜賚之由自周室有犬戎之難東遷洛陽以滅戎之事委之秦自大夫而為諸侯於此又有賀賜之寵焉衛侯使寗武子聘于魯左氏曰衛寗武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾履祥按魯衛兄弟其聘使往來葢常事不悉書也而寗俞獨書葢賢俞以病魯也魯以天子禮樂祀周公而及於羣公之廟賔祭用之可謂僭且褻其來久矣而武子獨譏其不然魯之君臣亦慢不知省孔子曰魯之郊禘非禮也周公其衰矣春秋獨書寗俞其諸賢俞以病魯與三十年王使榮叔歸魯成風之含且賵使召伯㑹葬履祥按禮樂征伐自天子出而周之失政亦有以自致自平王忘讐戍申而征伐之義失繻葛之敗特不幸耳自仲子之賵天子自壊禮矣而子孫襲之追錫桓公之命歸成風之賵凡不正之禮即探諸侯之意數數然媚之何以服天下之心哉裴度有言韓𢎞輿疾討賊承宗歛手削地非朝庭之力能制其死命特以舉措得宜能服其心故爾周之舉措在後世猶不服况當時強諸侯何以服其心乎楚滅六滅蓼左氏曰臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉三十有一年晋舍二軍左氏曰晋蒐于夷舍二軍使狐射姑将中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟獄刑董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授太傅陽子與太師賈佗使行諸晋國以為常法秦穆公卒子罃嗣是為康公左氏曰秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黃鳥史記曰繆公卒葬雍從死者百七十七人秦之良臣子輿氏三人亦在從死之中秦人哀之子王子曰當時稱賢君固未有出穆公之右者而其卒也三良殉而黃鳥之詩哀或以為此穆公之遺命也其言過矣穆公之於晋也怨其君而矜其民不忍其饑而死也穆公之於秦也自悔其過不忍殺敗軍之三大夫豈以無罪之三良而命之從死必不然也以人殉葬葢出於戎翟之俗責穆公不察其非理無遺命以變其俗則可責穆公有遺命迫其從死則不可也惟孫泰山止責康公而不及其他此為得其情者至朱子之論而是非始定曰王政不綱諸侯擅命殺人不忌習以為常無明王賢伯以討其罪此為可歎耳晋襄公卒晋人逆公子雍于秦左氏曰晋襄公卒靈公少晋人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四徳者難必舒矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖滛也為先君子不能求大而出在小國辟也母滛子辟無威陳小而逺無援将何安焉杜祁以君故讓偪姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭不然将及弗聼賈季亦召公子樂于陳趙孟使殺諸郫賈季怨陽子之易其班也使續鞫居殺陽處父晋殺續簡伯賈季奔狄履祥按晋自文公始霸後世頼之公子雍親文公子年長而賢趙孟立之是矣而偪於穆嬴卒詐敗秦師而立靈公晋遂失霸其後靈公不君卒以欲殺趙盾見弑而盾亦卒被弑君之名見義而為之不終惜哉然則太子在而外立君事理人情豈不難乎曰太子幼而公子雍為攝主此亦先王之法春秋之初固有此例也亦何為而不可哉三十有二年魯取須句杜氏曰絶太皡之祀宋成公卒子杵臼嗣是為昭公宋人殺其大夫左氏曰宋成公卒昭公将去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以徳皆股肱也誰敢攜貳若之何去之不聼穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舍司馬以讓公子卬昭公即位而葬晋趙盾立世子夷臯是為靈公晋人及秦人戰于令狐先蔑士㑹奔秦左氏曰秦康公送公子雍于晋曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君将焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師箕鄭居守趙盾将中軍先克佐之荀林父佐上軍先蔑将下軍先都佐之歩招御戎戎津為右及堇隂宣子曰我若受秦秦則賔也不受宼也既不受矣而復緩師秦将生心先人有奪人之心軍之善謀也逐宼如追逃軍之善政也訓卒利兵秣馬蓐食濳師夜起敗秦師于令狐先蔑奔秦士㑹從之履祥按令狐之役曲在晋大夫也故春秋書晋人及秦人戰然秦伯在焉而亦人之也何居五伯莫賢於穆公穆公三置晋君皆以重賂征晋河東許君焦瑕率可見矣况康公之賢不及穆公其多公子雍之衛而親納之必非義舉要賂可知春秋之人秦伯為賂故也左氏雖不言其事而其事固可想矣狄侵魯西鄙左氏曰狄侵我西鄙公使告于晋趙宣子使因賈季問鄷舒且讓之齊侯宋公魯侯衛侯鄭伯許男曹伯㑹晋趙盾盟于扈春秋書曰公㑹諸侯晋大夫盟于扈左氏曰晋侯立故也公後至故不書所㑹凡㑹諸侯不書所㑹後也後至不書其國辟不敏也胡氏曰趙盾内專廢置君外強諸侯為此盟其不名何也見大夫之強也諸侯不序見公之不及於㑹也文公怠惰事多廢緩既約晋盟而復後至魯自是日益衰矣陳氏曰晋始失伯也三十有三年八月王崩子壬臣踐位晋趙盾魯公子遂盟于衡雍左氏曰襄仲㑹晋趙孟盟于衡雍報扈之盟也魯使公孫敖入弔不至奔莒左氏曰穆伯如周弔䘮不至以幣奔莒從巳氏焉御批資治通鑑綱目前編卷十二
