body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷三夏后氏大禹史記作帝禹丙子元嵗春正月夏小正曰夏小正夏時之書見大戴禮戴德作傳與正文合為一篇朱子儀禮别出之春正月啓蟄愚按今二月始驚蟄而漢始以驚蟄為正月中月令孟春蟄蟲始振豈古者陽氣特盛啓蟄獨早與國語謂陽癉憤盈土氣震發則蟄蟲之動固宜然啓者始振之謂非出蟄也鴈北鄉月令鴻鴈來傳曰鴈以北方為居生且長焉雉震呴震振也呴鳴也書曰越有呴雉蓋其音云魚陟負冰月令魚上冰是也魚冬則氣在腴故降春則氣在背故升負冰者春冰薄魚既升背若負之也農緯厥耒戴氏曰緯束也愚按古者立春先時命農大夫咸勸農用耒田器也初嵗祭耒祭始為耒耜之人也始用暢闗澮本作畼舊註音韔按暢木生也訓達作暢為是戴氏曰暢也者終嵗之用祭也愚按古者先立春王將耕籍則鬰人薦鬯王祼鬯鬯之言暢也祭耒而用鬯也囿有見韭韭陽菜春有之見露也時有俊風戴氏曰俊者大也大風南風也合冰必於南風解冰必於南風生必於南風收必於南風故大之也寒日滌凍塗日滌凍解而為塗泥也田䑕出戴氏曰嗛䑕也按爾雅疏頰能藏食者農率均田率相率也均月令所謂皆修封疆審端徑遂夏后氏一夫受田五十畝均田所以修其疆畔分其遂畝不相侵越同頼利澤也獺祭魚月令同鷹則為鳩月令仲春鷹化為鳩此在正月按月令鷹化在雨水之後漢始以雨水為二月節蓋因秦之舊故吕不韋以鷹化係之仲春耳農及雪澤雪澤猶凍解也及傳所謂汲汲也及此凍解便往治田農書曰土長冐橛陳根可㧞耕者急發是也初服于公田戴氏曰言先服公田而後服其私田也愚謂孟子曰詩云雨我公田遂及我私由此觀之雖周亦助也夏小正曰初服于公田由此觀之雖夏亦助也采芸雜禮圖云芸蒿也葉似邪蒿香美可食鞠則見戴氏曰星名也按天文書不見鞠星是時初昬參中則晨見者危室諸星耳古鞠菊通用蓋謂菊始苖故九月曰榮鞠則菊華也初昬參中斗柄縣在下是時初昬則日當在室壁之間與月令不相異也桺梯桺始綻如梯也梅杏杝桃則華戴氏曰杝桃山桃也􅀢薃戴氏曰薃莎也􅀢其實也鄭氏曰莎草也愚按爾雅薃候莎其實􅀢薃即莎又廣雅莎􅀢地毛也雞桴粥戴氏曰桴嫗伏也粥養也二月往耰黍耰覆種也耰當作種襌戴氏曰單也讀屬上愚謂二月漸暖耰黍者可單衣也初俊羔助厥母粥戴氏曰粥者養也言大羔能食草木而不食於母也綏多女士闗本作縘戴氏曰綏安也冠子取婦之時也愚按周禮㑹男女即此也女有家士有室所以安之也丁亥萬用入學萬舞也此月令所謂上丁命樂正習舞釋菜也二月不必皆有丁亥豈以是月釋菜卜日以干取丁或以支取亥與祭鮪戴氏曰祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時也按此所謂春獻王鮪者也呂令季春薦鮪榮堇郭璞爾雅註曰堇葵葉似桺子如米汋食之滑者本草唐本德云此菜野生非人所種俗謂之堇菜榮華也采蘩爾雅蘩皤蒿即白蒿也或曰蘩所以生蠶昆小蟲抵蚳蚔螘卵也按爾雅註疏嵦子在卵者名蚳然此云昆及小蟲之微大扺皆卵屬也來降燕乃睇戴氏曰莫能見其始出也故曰來降睇眄也視可為室者也按此呂令所謂𤣥鳥至也剥鱓大戴禮作􅀈曰以為鼓也有鳴鶬鶊黄鸝也榮芸芸至是華也時有見稊始收愚按爾雅疏稊一名苵䄺稗之草以其穢苗故其始生即收割也三月參則伏至此參初昬而西沒也唐開元厯推夏時季春日在昴十一度去參距星十八度故曰三月參則伏攝桑戴氏曰攝而記之急桑也萎楊舊註萎作苑戴氏曰楊則花䍷羊戴氏曰或曰䍷羝也􅕪音斛則鳴爾雅曰􅕪天螻注螻蛄也頒冰戴氏曰分冰以授大夫也愚按月令仲春開冰而夏用三月蘇氏曰古者藏冰發冰以節陽氣之盛夫陽氣之在天地譬猶火之著於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納冰於地中至於二月四陽作蟄蟲起陽始用事則始啓冰而廟薦之至於四月陽氣畢連隂氣將絶則冰於是大發食肉之祿老病䘮浴冰無不及是以冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無灾霜雹厲疾不降民無夭札也采識戴氏曰識草也愚按識當作蘵爾雅蘵黄蒢注蘵草葉似酸漿花小而白中心黄江東以作葅食妾子始蠶戴氏曰先妾而後子事有漸也言自卑事者始也執養宮事此句連上文言蠶事也祈麥實越有小旱所以祈麥實者恐或有小旱也正月於農事三月於蠶麥言之不厭其詳田䑕化為鴽戴氏曰鴽鵪也拂桐芭戴氏曰或曰言桐芭始生貌拂拂然也按吕令桐始華鳴鳩夏四月昴則見是時日在畢觜之間故旦昴則先見初昬南門正其時立夏日在井四度昬角中南門右星入角距西五度其左星入角距東六度故曰四月初昬南門正鳴蚻按爾雅如蟬而小有文者謂之蜻蜻蟬小者謂之麥蚻戴氏曰蚻者寧縣也鳴而後知之故先鳴而後蚻囿有見杏鳴蜮戴氏曰屈造之屬王萯莠按呂令注當作負秀王萯即王𤓰本草陶注云即今土𤓰也萯房九反取荼莠荼苦菜也爾雅疏云苦菜葉似苦苣而細斷之有白汁愚按即今苦蕒也莠當作秀即呂令苦菜秀幽戴𫝊莠幽為句越有大旱此上必有闕文執陟攻駒執者離之去毋陟者升之君也攻駒者教之服車五月參則見日在井鬼旦則參見浮游有殷蜉蝣也殷衆盛也一名渠畧陸云似甲蟲有角大如指長三四寸甲下有趐能飛夏月隂雨時地中出今人燒炙噉之美如蟬也樊光謂糞中蝎蟲隨隂兩時為之朝生夕死鴂則鳴離騷恐鵜鴂之先鳴兮使夫百草為之不芳蓋五月一隂生則鴂鳴乃百草不芳之候也時有養日戴氏曰養長也乃衣𤓰舊註作乃衣衣試新衣也良蜩鳴按爾雅當作蜋蜩五彩具者也匽之興五日翕望乃伏戴氏曰不知其生之時故曰興伏云者不知其死也啓灌藍蓼啓灌者取其汁也藍可以染者五月取以為澱蓼草名取以為麯鳩為鷹唐蜩鳴按爾雅當作螗蜩螗蜩者匽陸璣云唐一名蝘虭字林虭作嘹愚按良蜩者蟬聲清長者也唐蜩則今嘹也初昬大火中心星也今則亢中矣種黍菽穈前二月耰黍當作種黍此種當作耰菽豆也穈赤梁粟今陕西人作麻是也煑梅戴氏曰為豆實也愚按書曰若作和羮爾惟鹽梅古者飲食之用鹽梅猶今之必用醋也蓄蘭為沐浴及佩也即今澤蘭俗名厭草香可辟邪亦可為藥頒馬分夫婦之駒一曰分大夫卿之駒也六月初昬斗柄正在上煑桃以為豆實鷹始摰始攫摶也秋七月莠雚葦莠讀為秀狸子肇肆戴氏曰肆遂也始遂也或曰肆殺也按字林狸伏獸蓋至此時而始肆也湟潦生苹苹一名蓱大者名蘋郭氏曰水中浮萍江東謂之薸爽死未詳戴氏曰爽猶疏也苹莠苹亦有華者即蘋也漢案戸漢天河也起箕尾間分兩道其一道貫箕星之邊案户者直戸也古者戸皆南向則是時初昬天漢直南也寒蟬鳴戴氏曰蝭􅧽也按爾雅疏寒蜩也即蜺也一名寒螿似蟬而小青赤色者也初昬織女正東鄉織女二星時有霖雨夏小正四月越有大旱而霖雨在七月莊子亦有秋水時至之説今則霖雨在四五月呂令溽暑在季夏今則在仲夏蓋古今風氣不同而南北風土亦異凡書傳所載於今不同者於此可以類推灌荼荼雚葦之莠也為蔣楮之也莠未莠為菼葦未莠為蘆大戴禮作秀斗柄縣在下則旦八月剥𤓰𤣥校戴氏曰𤣥黒也校若綠色然婦人未嫁者衣之剥棗㮚零棗栗熟也丹鳥羞白鳥戴氏曰丹鳥者為丹良也白鳥者為蚊蚋也其謂之鳥者重其養也有翼為鳥羞也者不盡食也按呂令止曰羣鳥養羞與此不同闕疑當考辰則伏大火初昬而沒也鹿人從鹿人者古山虞掌獸之官從從禽也謂始從禽也鴽為䑕參中則旦當作參見九月納火古者三月大辰旦見故出火八月辰伏故九月納火遰鴻鴈遰音逓去也主夫出火夫當作火古者季春出火所以焚萊於是民之用火於田野者不禁季秋雖内大然而火之用有不可廢者如昆蟲既蟄而以火田之類於是主火度其用而出之民不得擅其用而不禁也陟𤣥鳥蟄古人重𤣥鳥當其至而祠之故其來也書降其去也書陟皆貴之也蟄者𤣥鳥去則多蟄於島岸間土穴中沈存中筆談嘗載其事熊羆豹貉鼬鼪則穴此周官所謂蟄獸也榮鞠呂令鞠有黄華是也樹麥王始裘雀入于海為蛤蚌屬冬十月豺祭獸呂令在季冬古人豺祭獸然後田獵蓋古人於禽獸每有不忍殺之意惟天地肅殺之時豺獸自相食故此時取之以為乾豆賔客之用初昬南門見黒鳥浴戴氏曰烏也浴者飛乍髙乍下也時有養夜雉入于淮為蜃大蛤也織女正北鄉則旦十有一月王狩冬獵謂之狩陳筋革弓甲器用之備也嗇人不從戴氏曰不從者弗行於時月也隕麋角夏至鹿角解冬至麋角解十有二月鳴弋按當作鳶今雪霽霜風之晨則鳶鳴一說鳴弋猶言鳴弦弋者以生絲繫矢而射謂獵禽也𤣥駒賁戴氏曰𤣥駒螘也賁走於地中也愚按螘方言齊魯之間謂之蚼蟓西南梁益之間謂之𤣥駒納卵蒜戴氏曰卵蒜者本如卵者地納者納之君也愚按納者収藏之虞人入梁隕麋角上文重論語曰顔淵問為邦子曰行夏之時朱子曰夏時謂以斗柄初昬建寅之月為嵗首也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則嵗月自當以人為紀故孔子嘗曰吾得夏時焉而説者以為謂夏小正之屬蓋取其時之正與其令之善而於此又以告顔子也縣子問子思曰顔回問為邦夫子曰行夏之時若時殷周異政為非乎子思曰夏數得天堯舜之所同也殷周征伐革命以應乎天因改正朔若云天時之改爾故不相因也夫受禪於人者則襲其統受命於天者則革之以神其事如天道之變然也三統之義夏得其正是以夫子云晉董巴曰昔伏羲始造八卦作三畫以象二十四氣黃帝因之初作調歴歴代十一更年五千凡有七歴顓帝以今之孟春正月為元其時正月朔旦立春五星㑹于天歴營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝聖人為歴宗也湯作殷歴弗復以正月朔旦立春為節更以十一月朔旦冬至為元首下至周魯及漢皆從其節據正四時夏為得天以承堯舜從顓帝故也禮記大戴曰虞夏之歴建正於孟春此之謂也唐大衍歴議曰夏小正雖頗疎簡失傳乃羲和遺跡何承天循大戴之説復用夏正更以正月甲子夜半合朔雨水為上元進乖夏厯退非周正故近代推月令小正者皆不與古合開元厯推夏時立春日在營室之末昬東井二度中古歴以參右肩為距方當南正故小正曰正月初昬斗杓懸在下魁枕參首所以著參中也季春在昴十一度半去參距星十八度故曰三月參則伏立夏日在井四度昬角中南門右星入角距西五度其左星入角距東六度故曰四月初昬南門正昴則見五月節日在輿鬼一度半參去日道最逺以渾儀度之參體始見其肩股猶在濁中房星正中故曰五月參則見初昬大火中八月參中則曙失傳也辰伏則參見非中也十月初昬南門見亦失傳也定星方中則南門伏非昬見也履祥按孔子曰我欲觀夏道是故之杞而不足證也吾得夏時焉學者多傳夏小正云小正者其紀候之書謂之小則固非其大者也豈亦夏時之一端與聖人得之以説夏禮則必有大於此者單子曰夏令曰九月除道十月成梁其時儆曰收而塲功偫而畚梮營室之中土功其始火之初見期於司里然則舉一端而推所謂夏時者當必有制度教條之詳不可得而聞矣即位㑹諸侯于塗山塗山在今濠州蘇氏曰有禹㑹村稽古錄禹即天子位㑹諸侯於塗山執玉帛者萬國履祥按玉帛萬國之説本魯諸君子而雜見於傳記朱子王制篇亦取焉夫塗山今濠夀蓋淮江之間非中土也禹何以㑹萬國於此意者東南之諸侯與古者萬國畢朝于都天子巡狩則其方之諸侯各朝于方嶽惟東南諸侯西至衡嶽北至泰嶽道里為逺故禹總為塗山之㑹其後又東南而為㑹稽之㑹也塗山萬國之傳或者史傳之侈辭與大紀曰為銘於簨簴曰告寡人以道者擊鼓以義者擊鐘以事者振鐸以憂者擊磬以獄者揮鞀事見鬻子又淮南子加詳於此外紀同二嵗臯陶薨史記曰帝禹立而舉臯陶薦之且授政焉而臯陶卒封臯陶之後於英六或在許而后舉益任之政臯陶堯舜已有封此或畢封其支庶路史曰臯陶乃少昊之後四世而庭堅則高陽氏之子六乃臯陶之後别有舒蓼宣八年始滅初陶漁于雷澤虞帝求旃以為士師造律執中封于臯為臯陶臯之子封􅅯為􅅯姓又有孫恩成恩成其後世為理以命族至紂時理徵為翼肄中呉伯弗合以死取契和氏逋難伊虛爲李氏其後世為伯陽父管子曰后土掌北方故使為李注李獄官也則李理字通此云理避難為李也薦益於天孟子曰禹薦益於天七年履祥按堯薦舜舜薦禹皆其末年禹即位才一年耳何以即薦益也世稱禹年百嵗蓋於是年九十有四矣然三聖授受事體不同堯之薦舜攝也舜之薦禹總百官也禹之薦益相之也三嵗考功呉越春秋曰禹哀民不得已即天子之位三載考功禮記曰禹立三年百姓以仁遂焉五嵗巡狩呉越春秋曰五嵗政定周行天下東漢書陳蕃傳曰昔禹巡狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人外紀曰禹見罪人下車問而泣之左右曰罪人不順道君王為何痛之禹曰堯舜之人皆以堯舜之心為心寡人為君百姓各自以其心為心是以痛之八嵗巡江南戮防風氏崩于㑹稽國語曰呉伐越墮㑹稽獲骨焉節專車呉子使來聘且問之仲尼曰無以吾命賔發幣於大夫及仲尼仲尼爵之既徹俎而宴客執骨而問曰敢問骨何為大仲尼曰丘聞之昔禹致羣神於㑹稽之山羣神謂主山川之君防風氏後至禹殺而戮之其骨節專車此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神社稷之守者為公侯皆屬於王者客曰防風何守也仲尼曰汪芒氏之君也一作注芒守封隅之山者也封隅山在今湖州武康縣為漆姓在虞夏商為汪芒氏於周為長狄今為大人經世以戮防風氏係初年與國語不合太史公曰禹㑹諸侯江南計功而崩因葬焉命曰㑹稽㑹稽者㑹計也越外傳曰禹始也到大越上茅山大㑹計爵有德封有功更名茅山曰㑹稽及其王也巡狩大越見耆老約詩書審銓衡平斗斛因病死亡葬㑹稽葦槨桐棺穿壙七尺上無瀉泄下無邸水壇髙三尺土階三等延袤一畝又曰越之先君無餘乃禹之世别封於越以守禹冡又見少康紀甲申后啓元嵗履祥按三代以來嗣君皆踰年而稱元與堯舜禹之間不同故胡氏大紀於甲申書元載今從之或曰是時三年之䘮未畢益未有箕山之避啓未膺朝覲訟獄之歸宜未王也何以稱為元年是不然古者稱元無大意義特以其君天下之始計年耳况益之相禹異於禹之相舜禹之相舜異於舜之攝堯其時異其事亦不同孟子之俱以薦言者推堯舜禹之心也其俱以避言者推舜禹益之心也當時事迹固自有不同故胡氏於明年書益歸政就國而不言避是為得之二嵗益避於箕山之隂大紀曰伯益歸政就國於箕山之隂也萬章曰人有言至於禹而德衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之䘮畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之䘮畢益避禹之子於箕山之隂朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歴年多施澤於民乆啓賢能敬承繼禹之道益之相禹也歴年少施澤於民未乆舜禹益相去乆逺逺當作近其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也匹夫而有天下者德必若舜禹而又有天子薦之者繼世以有天下天之所廢必若桀紂者也孔子曰唐虞禪夏后殷周繼其義一也越絶書曰夏啓獻犧於益啓者禹之子益與禹臣於舜舜傳之禹薦益而封之百里禹崩啓立曉知王事達於君臣之義益死之後啓嵗獻犧牲以祠之經曰夏啓獻犧於益此之謂也三嵗大戰于甘皇極經世元年伐有扈今按孔安國謂啓嗣禹位伐有扈之罪唐孔頴達謂禹崩益避箕山之隂天下諸侯歸啓啓遂即天子位史記稱啓立有扈氏不服故伐之蓋由唐虞受禪相承啓獨繼父以此不服愚按楚辭天問亦謂啓代益作后而卒然離有扈之􅖈集注如史記之説今故係之伯益歸政之後書甘誓曰大戰于甘乃召六卿古者四方有變專責之方伯方伯不能討然後天子親征之天子之兵有征無戰今啓既親率六軍以出而又書大戰于甘則有扈之怙强稔惡敢與天子抗衡豈特孟子所謂六師移之者書曰大戰蓋所以深著有扈不臣之罪按甘在京兆鄠縣有甘水甘亭蓋西方諸侯也時夏都安邑在闗河之東而有扈在闗西之地叛以天下大勢論之不為小變矣六卿六鄉之卿也按周禮鄉大夫每鄉卿一人六鄉六卿平居無事則各掌其鄉之政教禁令而屬於大司徒有事出征則各率其鄉之一萬二千五百人而屬於大司馬所謂軍將皆卿者是也意夏制亦如此王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正六事之人謂六鄉之卿六卿曰六事猶三公謂之三事也威侮五行者暴殄天物一説不順五行之理猶所謂狎侮五常也三正舊説天地人之正道天用勦絶其命今予惟恭行天之罰左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命左右御皆五伍之長在車者也汝六事之人也古者車戰之法五人為伍五伍為兩一車甲士三人歩卒七十二人則三其兩其甲士三人左主射右主擊刺中御馬蓋每兩之長也一鄉一軍則一萬二千五百人蓋五百兩也卿一人統之天子六軍則七萬五千人凡三千兩先王之師左右各攻其事而不以詭遇為功非惟師出以正然左死於射右死於刺甲者死車歩者死列故能為不敗之師此先王之軍法也左右御不職其事皆曰汝不恭命蓋責之卿也天子治軍惟責之卿卿各督其所部然亦至兩之長而止自兩以下則其長自治之此軍制之分數也用命賞于祖弗用命戮于社予則孥戮汝古者天子巡狩以遷廟主行征伐亦然軍行戮社釁左鼓是則天子出征必載遷廟之主與社主以行也祖陽也故賞于之社右隂也故戮于之戮辱也戮非為殺之凡罪以令衆皆戮也所謂殺而戮之所謂賜死而亡戮辱凡殺而不以令衆不曰戮罪不至殺而令衆亦曰戮孥戮者戮及其妻子所謂其孥男子入于罪𨽻女子入于舂槀是也古者罪人不孥而此曰孥戮蓋軍法尚嚴故誓師之詞云爾師之必用賞罰古今所同也至若左右不踰御必以正此則王者之師而已楚辭天問曰啓代益作后卒然離􅖈何啓惟憂而能拘是逹集註曰舊説禹以天下禪益天下去益而歸啓是代益作后也於是有扈不服啓遂與之大戰于甘故曰離􅖈問啓何以能思惟所憂而能伐扈以逹拘執之嫌乎九嵗王崩子太康踐位王孫滿曰昔夏之方有德也遠方圖物貢金九牧鑄鼎象物百物而爲之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休墨子曰夏后開命大廉折金山川鑄陶於昆吾作九鼎開卽啓也避漢景帝諱作開贊寧要言曰詳其禹鼎不止圖山川猛鷙之物又每州民戸地里寛狹皆可知也故後語云據九鼎按圖籍注云秦據執得周九鼎自然業次知九州戸籍圖書也履祥按諸家多謂禹鑄九鼎然於經無所考史亦不言九鼎之始觀方有德之辭似非指禹當從墨子之說然象物神姦之說滿蓋設辭以神之古之鐘鼎猶今之碑碣皆所以載事也九州圖籍之說近是鑄九州山川而併及其所産異物則有之矣爲其圖籍所以歴代寳之又按傳稱夏啓有鈞臺之享而書史不言其年嵗鈞臺在河南陽翟嵎水之東南歴大陵西連山亦曰啓筮亭謂啓享諸神於大陵之上或曰陽翟夏始封之地或曰禹都焉然河南固天下中或者啓卽位之後羣后四朝大㑹同於此與癸巳太康元嵗尸位王子卦數元年遇睽十有九嵗畋于洛表羿拒于河五弟御母以從遂都陽夏書曰太康尸位以逸豫滅厥德黎民咸貳禹之德在民深矣今一再傳而太康始爲逸豫黎民咸貳見所未見也蓋自五帝以來聖聖相傳至啓亦賢能敬承太康尸位而即爲逸豫生民所未見也故疑而貳焉又自堯舜禹以來數聖人之於民不啻父母於子其在太康猶父母死而不仁之兄暴棄之則父母之思爲何如也民心本非易叛恃祖宗德澤之厚而不知自反者亦可省於此乃盤遊無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河夏都河北太康遊畋無度逾河之南又自河而逾洛之外又流連十旬而弗反此羿所因以得志也羿者有窮之君世善射亦以世官爲名傳稱后羿自鉏遷於窮石因夏民以代夏政則鉏其始封窮其新國故曰有窮因民弗忍者即傳所謂因夏民距于河者即所謂代夏政蓋距太康于河不使反國而羿遂據夏舊都以代夏僣稱帝夷羿也厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌太康在外忘反而羿入都簒國故五子御母避難迹太康所之逾河而南以從之望太康以圖復國故于洛汭而不至洛表徯而不返哀宗國之顚覆痛社稷之危亡親親之愛不能自遏故述大禹之戒而爲歌也下文五章是其辭説者以五子各爲一章然首尾相應或共爲之其一其二者歌節也非指五子也其一曰皇祖有訓民可近不可下民惟邦本本固邦寜予視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圖予臨兆民懔乎若朽索之馭六馬爲人上者奈何不敬此章述大禹之戒櫽括以爲歌下叶戸予叶與圖叶杜馬叶姥一人三失之下似逸一句章末二語則五子之詞也與皇祖有訓自相叶其二曰訓有之内作色荒外作禽荒甘酒嗜音峻宇彫牆有一于此未或不忘此章亦大禹之訓五子櫽括其辭而爲歌也其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡自陶唐以來皆都河北是爲冀州之地今一朝失道而三聖相傳之都衆大之區遂乃失之爲羿所滅以至於亡也按左傳引此章曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡其四曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀有叶以百二十斤爲石大稱也三十斤爲鈞小稱也關通和平聖人所以同度量衡以一天下之制也藏在王府後世則之舉此一端以見典籍䂓制之備也其五曰嗚呼曷歸予懐之悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗愼厥德雖悔可追履祥按五子之歌五章一章言太康之失民也二章言太康之遊田也序所謂盤遊無度也三章哀京都之不保也四章痛故府舊章之淪喪宗廟社稷之不祀也而五章哀恫以終之夫失國固太康也而簒國則羿也五子之歌皆怨太康之辭無忿羿之辭者自反也傳曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉然則讀五子之歌君子是以知仲康之宜爲君而夏之復祀也然太康雖爲羿所拒不能濟河而猶立國於外以傳仲康豈亦因五子之歌而自悔者與二十有九嵗王崩于陽夏弟仲康立路史曰太康在位十有九嵗失政又十嵗而死履祥按自唐虞以來都于冀州而冀自有牧非天子自治則甸服之地跨河南北也羿拒太康于河不得復反舊都故五子之歌惟哀冀都之亡痛故府舊章之喪當時自河以南尚無恙也汲郡古文稱太康居斟尋酈道元謂河南有尋地薛氏謂今拱州太康縣漢之陽夏即太康故城而傳亦稱相居帝邱大抵皆兗豫之境大河東南之地耳然則太康爲羿所拒不能濟河而更都南夏以傳仲康迄于后相皆在兗豫之境古大河之東南羿據冀方之都因夏民以代夏政稱帝夷羿寒浞代之皆在冀州之境大河之北至浞滅相而夏始中斷後四十餘年少康遂復舊物云壬戌仲康元嵗肇位四海命𦙍侯掌六師履祥按仲康即五子之一也自太康畋于有洛之表而羿距太康于河仲康及其羣弟避有窮之難奉其母濟河而南徯太康于洛汭太康越在草莾不能返國城于甸服東南而居之至是太康崩而仲康立説者多稱羿廢太康而立仲康失之矣使羿廢太康而立仲康仲康既立使𦙍侯爲司馬兵柄有歸矣而不討羿是德羿也不返太康是紾兄也不然權出於羿是仲康爲虛位而𦙍侯爲羿黨也若是則𦙍征之書孔子奚取焉且傳稱羿代夏政號帝夷羿豈立仲康而爲之臣者其不然也明矣仲康繼立於外命𦙍侯掌六師其䂓模舉錯固已有大過人者無幾何時而使𦙍侯征羲和羲和遐棄厥司旅拒厥邑盖不共王職而歸于有窮者是以有徂征之師有殱厥渠魁之命然仲康迄不能移羲和之師而加之羿者或者勢未可與假之以年安知其不能討羿以羿之强僭而終仲康之世莫敢誰何者以仲康之賢有𦙍侯之助也仲康雖立國於外然肇位四海諸侯之尊夏固自若獨羲和以不臣受征然則夫子於書取𦙍征焉君子是以知仲康爲能自振而𦙍侯之爲王室倚重矣季秋月朔辰弗集于房唐大衍歴日度議曰書曰乃季秋月朔辰弗集于房劉炫曰房所舍之次也集㑹也㑹合也不合則日蝕可知或以房爲房星知不然者且日之所在正可推而知之君子謹疑寧當以日在之宿爲文近代善厯者推仲康時九月合朔已在房星北矣按古文集與輯義同日月嘉㑹而隂陽輯睦則陽不疚乎位以常其明隂亦含章示沖以應其形若變而相傷則不輯矣房者辰之所次星者所次之名其揆一也又春秋傳辰在斗柄天䇿焞焞降婁之初辰尾之末君子言之不以爲繆何獨謹疑於房星哉履祥按虞􅒠以季秋日食爲仲康元年而唐傅仁均等新厯以爲仲康五年癸巳之嵗九月庚戌朔日蝕在房二度夫以厯術求之則魯厯殷厯周厯已自不同慿此却求豈無抵忤故以厯較之經世紀年夏殷之年盈縮者二十有八嵗焉蓋厯家之説有嵗差之法乆近各殊新厯以五十餘年而差一度虞􅒠以百八十有六年而差一度盈縮之原其大致蓋由於此古者天官氏因時以治厯而後世言天者執厯以求天執厯以求天者既有差於將來豈無迷於既徃哉今從新厯之説則仲康五年嵗非癸巳從虞􅒠之説則合於經世之年且􅒠之言厯槩有活法焉如論合朔者曰朔在㑹合茍躔次既同何患於頻大日月相離何患於頻小此類可見雖然此猶以厯言厯不若以經斷厯以經言之則五年之説於經不同而元年之説於經爲合何則經書仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍侯承王命徂征書肇位以冠其首則徂征是其初即位之年而季秋月朔之變是其初年之秋無疑也以經爲正固無假於歴以厯而論則元年之説爲有合於經今從之繫於元年之下𦙍侯承王命征羲和皇極經世係壬戌又據子王子經世卦數仲康元年訟卦用事所以其間有日食之變而又有徂征之師與羿爭諸侯也惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍侯承王命徂征𦙍侯𦙍國之侯入爲王大司馬也羲和廢厥職者不共王職酒荒于厥邑者與羿同惡也告于衆曰嗟予有衆聖有謨訓明徵定保明徵定保者即謨訓之辭徵如庻徵之徵謂明天之徵以定保安之計也此一語以爲綱領克謹天戒以下皆明徵定保之事惟時羲和以下皆明徵之反先王克謹天戒臣人克有常憲百官修輔厥后惟明明每歲孟春遒人以木鐸狥于路官師相䂓工執藝事以諫工猶執藝事以諫豈有爲天官而日食不以告王其或不恭邦有常刑此明先王之制下證羲和之罪惟時羲和顚覆厥德沈亂于酒畔官離次俶擾天紀遐棄厥司此正羲和之罪也乃季秋月朔辰弗集于房瞽奏鼔嗇夫馳庻人走羲和尸厥官罔聞知昬迷于天象以干先王之誅説見上文古者日有食之伐鼔于社所以攻隂而助陽也其事則樂師掌之樂師瞽者也故瞽奏鼔嗇夫馳者供救日之役庻人走者爲救日之態以見日食之變天子恐懼乎上官民奔走于下變之甚也而羲和掌歴象之事乃罔聞知不以聞于上也其無天無君甚矣干先王之誅應上文政典曰先時者殺無赦不及時者殺無赦此以下徇師之辭政典者大司馬之法用之於軍旅者也故先時後時者皆殺無赦所以謹期㑹一師徒明節制也先時者邀功而亂陣不及時者失期而怯敵皆用兵之忌也是以兵法於此必嚴無赦之律焉今予以爾有衆奉將天罰爾衆士同力王室尚弼予欽承天子威命火炎崐岡玉石俱焚天吏逸德烈于猛火此戒其先時之過殱厥渠魁脅從罔治舊染汚俗咸與惟新嗚呼威克厥愛允濟愛克厥威允罔功此戒其不及時之失其爾衆士懋戒哉威克厥愛如公爾忘私奮不顧身也懋戒以殱魁威克爲勉以逸德愛克爲戒也或問羲和之罪不過失職耳何勤徂征之師曰王者之制諸侯三不朝則六師移之畔官離次棄厥司不甚於不朝乎曰沈亂于酒六師移之易爾曷爲申明軍律激勵威武若恐弗勝何也曰羲和畔夏即羿者也意必有聚衆拒命之事焉故下文有脅從罔治之戒也曰使果畔夏即羿也曷爲奉辭伐罪不名其爲賊而止於責其不職也曰先王之制官各有職以事一人不供其職即不臣其君矣而况俶擾天紀爲始亂乎曰俶擾天紀之爲始亂何也曰自顓帝以來羲氏和氏世其職先王頼之授時頒正以一天下之視聽乆矣一旦有羿入間王室天子播遷南夏而羲和首不爲用是使正朔不出于天子諸侯不禀正朔於王朝夏氏之失統將自是始而區區保邑拒命又其罪之細者爾故𦙍征之書始述其法以明其亂紀之罪終嚴其威以破其脅衆之勢也兵法莫整於𦙍征曰先時者殺無赦不及時者殺無赦也莫仁於𦙍征曰殱厥渠魁脅從罔治也莫勇於𦙍征曰威克厥愛允濟也此武之大經也甲子三歲羿滅伯封伯封后䕫之子也左傳所載伯封之事似失之誣路史禹命伯封叔及昭明作衍歴歳紀甲寅敬授人時則伯封夏之天官仲康征羲和而夷羿滅伯封是與王室爭諸侯耳十有三歲王崩子相踐位經世曰相繼立依同姓諸侯斟灌斟鄩氏乙亥后相元歲征畎夷二歲征黄夷七歲于夷來賔畎夷來賔竹書曰后相即位二年征黃夷七年于夷來賔東漢書曰昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賔八歲寒浞殺羿晉魏莊子曰昔有夏之方衰也后羿自鉏遷於窮石鉏在今澶州衛南縣窮石不知所在因夏民以代夏政恃其射也不修民事而滛于原獸棄武羅伯因熊髠尨圉四子皆羿之臣而用寒浞寒浞伯明氏之䜛子弟也寒國北海平壽縣東有寒亭在今濰州伯明后寒棄之夷羿收之夷氏信而使之以爲已相浞行媚于内杜注曰内宫人愚謂羿所以爲家衆所殺而浞所以因羿室者其原如此而施賂于外愚弄其民而虞羿于田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆殺而烹之以食其子其子不忍食死于窮門殺之於國門愚按羿入據夏仍號有窮故其國門亦謂窮門浞因羿室就其妃妾生澆及豷恃其䜛慝詐僞而不德於民澆論語作奡周虞人之箴曰芒芒禹迹畫爲九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冐于原獸亡其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫注曰羿雖有夏家而不能恢大之愚謂虞箴如此是猶惜羿之不能盡取夏也且從其僭而稱之曰帝虞人自以其官獻箴故止爲田獵而發可爾讀者不可以詞害意然君子之言不當如是也逄䝉學射於羿盡羿之道思天下惟羿爲愈已於是殺羿孟子曰是亦羿有罪焉朱子曰夷羿簒賊蒙乃逆儔其事無足論者孟子特以其取友而言爾天問曰浞娶純狐眩妻爰謀何羿之射革而交吞揆之此行媚于内殺羿因室之事也射革猶云貫革吞滅揆謀也集注曰言羿之射藝勇力而其衆乃交進而吞謀之乎離騷曰啓九辯與九歌兮夏康娛以自縱不顧難而圖後兮五子用失乎家衖羿淫遊以佚畋兮又好射夫封狐固亂流其尠終兮浞又貪夫厥家集注曰婦謂之家言羿因夏衰亂代之爲政娛樂田獵不恤民事信任寒浞使爲國相羿畋將歸浞使家衆逄蒙射而殺之貪取其家以爲已妻羿以亂得政身即滅亡故曰亂流鮮終也履祥按羿之亡也孟子述其取友之一端左氏述其亂亡之始末而騷之言爲盡騷之言曰羿淫遊以佚畋兮又好射夫封狐固亂流其尠終兮浞又貪夫厥家夫羿簒夏者逆亂之流理固尠終矣況又有遊田之荒䜛慝之蔽乎然則其前後本末俱足以戒矣二十有八歲寒浞使其子澆弑王于帝丘后緡歸于有仍靡奔有鬲氏經世以靡奔係此年足以正左氏之誤帝丘今開德府濮陽縣顓帝始居此地是名帝邱后相因之鬲在今德州平原魏莊子曰浞因羿室生澆及豷恃其䜛慝詐僞而不德于民使澆用師滅斟灌斟鄩二國夏同姓諸侯后相所依處澆于過處豷于戈伍員曰昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇后緡相妃娠懐身也歸于有仍生少康焉按子王子封數相即位之年世卦得暌終以弑隕至此世卦得歸妹是以后緡歸有仍少康在外氏者三十餘年汲郡古文曰相居斟灌漢書集注云今東郡灌是也明帝以封周後改曰衛皇甫謐曰灌衛也愚按帝邱衛地斟灌亦衛地相居帝邱與斟灌相近而依之非居斟灌也癸卯少康元歲相后緡生少康于有仍自此以後皇極經世缺四十年不書而皇王大紀即以少康生之年爲元歲蓋少康既生則夏統不絶今從之甲子二十有二歲少康自有仍奔虞伍員曰少康爲仍牧正惎澆能戒之惎毒也戒備也澆使椒求之椒澆臣逃奔有虞爲之庖正以除其害虞舜後諸侯也庖正掌膳饈之官頼以得除已害愚按爲仍牧正爲之庖正皆少康爲之以避禍非二國敢以是官之也虞即今應天府虞城縣虞思於是妻之以二姚思有虞君也而邑諸綸綸虞邑今應天虞城縣有綸城有田一成有衆一旅方十里爲成五百人爲旅能布其德而兆其謀以收夏衆撫其官職愚按夏衆者即帝邱二斟之遺民靡收二國之燼亦其助也官職者夏之士大夫播遷者若遺臣靡之類是也或曰古今言治者莫盛於唐虞三代然考之三代自禹傳啓已有大戰之變繼而太康失冀相帝弑隕絶四十年而少康始中興季杼之後鮮有可紀商有天下一傳而太甲幾墜沃丁以後比九世亂河患蕩覆轉徙不常西畧不知狄人内侵古公避狄高宗中興又幾何世紂遂亂亡周自文武成康以後昭王即有南征之禍穆王尤甚幸没祗宮夷衰厲暴宣王中興而非全治幽王又大亂平王東遷而天下無寧世矣然則語治者必曰三代何也履祥應之曰三代所以盛以其聖王代作其道化禮制有以漸磨人心維持風俗如是其乆與後世不同爾不謂其暴君亂主之咸無也夫以漢視三代光武明章視禹啓文武成康可謂碔砆之與美玉光武漢法舊防尚未盡復其紀綱天下之具可謂疎矣然以其起自諸生側席幽乂而明帝興學崇教臨雍拜老故其風聲興起二百年間雖庸君繼作宦戚專政而政亂於上俗清於下其民安於耕桑其士大夫厲於名節其故家遺族閑於禮法其姦雄之人懼於名義東漢猶然況三代之世聖人代作有井田以業民生有封建以定民主有道德以正民心有禮制以齊民行有詩樂以陶民風有教化以漸民俗制定而不可以卒搖化深而不可以卒變雖復有太康等此不善繼之君然所謂政亂於上俗清於下者當必十百倍於東漢矣故三代之亂猶日之有雲隂雨霾而不害其爲晝後世之治猶夜之有月星火燧而不救其為夜此古今之分也壬午四十歲靡自有鬲氏收二斟之衆滅寒浞立少康王滅澆于過使季杼滅豷于戈復禹之績魏莊子曰靡靡臯陶之後路史作伯靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼杼少康子也滅豷于戈有窮由是遂亡浞因羿室不改有窮之號伍員曰使女艾諜澆女艾太康臣諜候也使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物論語南宮适問於孔子曰羿善射奡盪舟俱不得其死子何子句然禹稷躬稼而有天下夫子不答南宮适出子曰君子哉若人尚德哉若人離騷曰澆身被服强圉兮縱欲而不忍日康娛而自忘兮厥首用夫顚隕集注曰强圉多力也言浞取羿妻而生澆强梁多力縱放其慾不能自忍也康安也自上而下曰顚隕墜也言澆既滅殺夏后相安居無憂日作淫樂忘其過惡卒爲相子少康所誅大紀論曰人殺其父子必欲死人辱其君臣必欲報忍死謀報能以天道爲定命不觀敵勢而改圖則庻幾焉茍顧其私内覬大利外畏大難雖有良心日銷月鑠其不忘君父者幾希矣少康靡鬲眞人臣子哉志在討賊行吾義而已非圖富貴者也故受困厄而不渝濵死亡而不怠兢兢業業經營四十年然後克殄元凶祀夏配天不失舊物嗚呼此眞可謂中興者矣故唐虞世南論歴代中興之主以少康爲冠噫前王之所爲後王之師也可不鑒哉廣漢張氏曰邵康節經世以寒浞滅相繫於壬寅是歲或癸邜少康生而克復舊物乃在癸未凡四十有一年方少康在襁褓而夏之臣靡固有滅浞而立之之心經營許乆乃遂其志若靡者可謂忠之盛者矣方寒浞在上澆豷縱横之時少康獨有田一成衆一旅其勢可謂堙微而卒用以興其間圖回謀慮必大有曲折惜不復傳於後猶幸有左氏傳所載耳要之靡與有鬲氏有仍氏皆佐少康以有爲者也若使少康之君臣此數十年中不忍而欲速則身且不保而况國乎惟其潛也若深淵之靚故其發也如春陽之振動惟其時者也方夷來賔竹書紀年曰少康即位方夷來賔東漢書曰夏后氏太康失德夷人始畔自少康已後世服王化遂賔於王門獻其樂舞六十有一歲王崩子季杼踐位少子無余封於越吳越春秋曰禹以下六世而得帝少康少康恐禹墓之絶祀乃封其庻子於越號曰無余隨陵陸而耕種逐禽鹿而給食不設宫室之飾從民所居居於秦餘春秋祠禹墓於㑹稽甲辰后杼元歲五歲征東海伐三壽竹書紀年曰夏伯杼子之東征獲九尾狐路史同十有七歲王崩子槐踐位國語曰杼能帥禹者也夏后氏報焉韋昭注曰能興夏道履祥按自古人主非天資絶異或親歴艱難而能成中興之功者鮮矣少康生長艱危備嘗險阻卒成再造之功信爲中興之主后杼之生遭家不競與其先王共歴艱險方其用師于戈計其年齡弱冠而已英毅之氣蓋可想見洎其即位又能帥禹而行卒爲夏家有德之宗夫以禹之明德懋功典則備具使得中主循而守之可以坐享安靖况以英毅之資帥循其道禹何逺之有惜乎年世堙逺書史失傳後之學者不得盡聞行事之詳爲可憾矣辛酉后槐元歲三歲東九夷來御甲子四歲二十有六歲王崩子芒踐位丁亥后芒元歲以𤣥圭賔于河路史註曰見紀年乃東狩于海十有八歲王崩子泄踐位乙巳后泄元歲命東夷命西羌竹書紀年曰后泄命畎夷白夷赤夷𤣥夷風夷陽夷后泄在位十六歲而竹書命六夷在二十一歲未詳路史曰六夷來御於是始加爵命東漢書西羌傳曰太康失國四夷背叛及相即位乃征畎夷七年然後來賔至于泄始加爵命由是服從桀之亂畎夷入居邠岐之間十有六歲王崩子不降踐位辛酉后不降元歲甲子四歲六歲伐九苑五十有九歲王崩弟扄立庚申后扄元歲甲子五歲二十有一歲王崩子厪踐位辛巳后厪元歲二十有一歲王崩不降之子孔甲立路史作帝𦙍甲謂爲孔甲者非壬寅后孔甲元歲三歲陶氏古今録曰夏孔甲八年九月歲次甲辰采牛首山鐡以鑄劒據經世紀年甲辰孔甲即位之三歲也今陶𢎞景曰八年豈考於古銘字書難辨誤以爲八年與蔡史曰昔有飂叔安飂古國也叔安其君名有裔子曰董父𤣥孫之後爲裔實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾于有帝帝賜之乗龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之今滑州有豢龍氏井即劉累畜龍之所夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷于魯縣范氏其後也杜元凱曰今魯陽也按汝州魯山縣有豢龍城魏獻子曰今何故無之對曰夫物物有其官官修其方方法術也朝夕思之一日失職則死及之失官不食官宿其業其物乃至水官修則龍至若泯棄之物乃坻伏鬱湮不育故有五行之官是謂五官實列受氏姓封爲上公祀爲貴神社稷五祀是尊是奉木正曰勾芒火正曰祝融金正曰蓐收水正曰𤣥㝠土正曰后土龍水物也水官棄矣故龍不生得甲子二十有三歲戊辰二十有七歲商主癸生子履帝王世紀曰主癸之妃扶都見白氣貫月意感而生湯三十有一歲王崩子臯踐位衛彪徯曰孔甲亂夏四世而隕韋昭曰亂禹法也孔甲至桀四世而亡大紀曰王好事鬼神肆行淫亂作破斧之歌是爲東音諸侯化之夏政始衰履祥按傳稱夏后孔甲擾于有帝古今所傳亦謂孔甲有盤盂之戒而國語世紀謂爲淫亂之君異乎所聞矣或曰孔甲人名非夏后孔甲祝氏經世解曰孔甲當星之甲一十二世之終自當有災況其卦爲兌但夏之文獻不足無以證之癸酉后臯元歲十有一歲王崩子發踐位蹇叔曰崤有二陵焉其南陵夏后臯之墓也甲申后發元歲諸夷賔于王門竹書紀年曰后發即位元年諸夷賔于王門諸夷入舞十有九歲王崩子癸踐位是爲桀癸卯后癸元歲甲子二十有二歲公劉遷于􅃎大紀附少康甲子之紀今附于此年甲子紀之内路史曰稷生斄蠒一作治蠒即邰字斄蠒生叔均叔均爲田祖公劉之去后稷已十餘世矣史記曰舜封后稷於邰别姓姬氏后稷之興在陶唐虞夏之際皆有令德國語曰昔我先王世后稷以服事虞夏及夏之衰也棄稷弗務我先王不窋用失其官而自竄于戎翟之間程㤗之曰慶州東南三里有不窋城不敢怠業時序其德纂修其緒修其訓典朝夕恪勤守以惇篤奉以忠信奕世載德不忝前人集傳曰譙周按國語云世后稷以服事虞夏言世稷官是失其世數也若以不窋親棄之子至文王千餘歲惟十五代實不合事情按史記契至湯四百餘年而十四世稷至文王千餘年而十五世自夏歴商凡四十五世而稷至文王止十五世焉歐陽氏容齋洪氏路史羅氏已辯其非今不悉録史記曰不窋卒子鞠立鞠卒子公劉立路史同又曰鞠生有文在手曰鞠大雅曰篤公劉匪居匪康廼場廼疆廼積廼倉廼裹餱糧于槖于囊思輯用光弓矢斯張干戈戚揚爰方啓行集傳曰舊説召康公以成王將涖政當戒以民事故詠公劉之事以告之曰厚哉公劉之於民也其在西戎不敢寧居治其田疇實其倉廪既富且强於是裹其餱糧思以輯和其民人而光顯其國家然後以其弓矢斧鉞之備爰方啓行而遷都於豳焉蓋亦不出其封内也篤公劉于胥斯原既庻既繁既順廼宣而無永嘆陟則在巘復降在原何以舟之維玉及瑶鞸琫容刀集傳曰言公劉至豳欲相土以居而帯此劍佩以上下於山原也東萊呂氏曰以如是之佩服而親如是之勞苦斯其所以爲厚於民也歟篤公劉逝彼百泉瞻彼溥原廼陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語集傳曰京髙邱也師衆也董氏曰所謂京師者蓋起於此其後世因以所都爲京師也此章言營度邑居也自下則徃百泉而望廣原自上則陟南岡而觀于京於是爲之居室於是廬其賔旅於是言其所言於是語其所語無不於斯焉篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之集傳曰此章言宫室既成而落之既以飲食勞其羣臣而又爲之君爲之宗焉呂氏曰既饗燕而定經制以整屬其民上則皆統於君下則各統於宗蓋古者建國立宗其事相須楚執戎蠻子而致邑立宗以誘其遺民即其事也篤公劉既溥既長既景廼岡相其隂陽觀其流泉其軍三單度其隰原徹田爲糧度其夕陽􅃎居允荒集傳曰徹通也一井之田九百畝八家皆私百畝同飬公田耕則通力而作收則計畝而分也周之徹法自此始其後周公蓋因而修之耳此言辨土宜以授所徙之民定其軍賦與其稅法又度山西之田以廣之而豳人之居於此益大矣篤公劉于􅃎斯館渉渭爲亂取厲取鍜止基廼理爰衆爰有夾其皇澗遡其過澗止旅廼宻芮鞫之即集傳曰此章又總叙其始終言其始來未定居渉渭取材而成宫室既止基於此矣乃疆理其田野則日益繁庻富足其居有夾澗者有遡澗者其止居之衆日以益宻乃復即芮鞫而居之而豳地日以廣矣漢書婁敬傳曰周之先自后稷堯封之邰積德累善十餘世公劉避桀居􅃎程泰之雍録曰公劉自慶州徙都于邠邠州新平縣即其地也匈奴傳曰夏道衰公劉失其稷官變于西戎邑于􅃎顔師古曰今􅃎州是也開元十三年槩改古文以爲今文又特詔書􅃎爲邠􅃎詩曰七月流火火大火心星也堯典仲夏火中月令則季夏昬心中季冬曉心中故周家有火中寒暑乃退之説謂季夏火昬中暑極而退季冬火曉中寒極而退也豳公之時上距堯未逺歲差未多故七月之昬則亦見火之西下矣九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲一之日謂斗建子一陽之月也不數月而言日以見此月之日一陽始生即開來歲發生之始矣集傳曰周之先公已用此紀候故周有天下遂以爲一代之正朔也三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜集傳曰此章前節言衣之始後節言食之始二章至五章終前節之意六章至八章終後節之意七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸集傳曰是時公子猶娶於國中而貴家大族連姻公室者亦無不力於蠶桑之務故其許嫁之女預以將及公子同歸而逺其父母爲悲也其風俗之厚而上下之情交相忠愛如此七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黃我朱孔陽爲公子裳八月於萑葦既成之時即收蓄爲來歲治蠶曲薄之具也集傳曰勞於其事而不自愛以奉其上蓋至誠惨怛之意上以是施下以是報之也四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸爲公子裘二之日其同載纉武功言私其豵獻豜于公爾雅豕一歲爲豵三歲爲豜私其小者而獻其大者亦愛上之心也五月斯螽動股六月莎雞振羽七月在野八月在宇九月在戸十月蟋蟀入我牀下穹窒熏䑕塞向墐戸嗟我婦子曰爲改歲入此室處呂氏曰十月而曰改歲三正之統于民俗尚矣周特舉而迭用之耳集傳曰此見老者之愛也六月食鬱及薁七月亨葵及菽八月剥棗十月穫稻爲此春酒以介眉壽七月食𤓰八月斷壺九月叔苴采荼薪樗食我農夫集傳曰自此至卒章皆言農圃飲食祭祀燕樂以終首章後節之意而此章果酒嘉蔬以供老疾奉賔祭𤓰瓠苴荼以爲常食少長之義豐儉之節也九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宮功晝爾于茅宵爾索綯亟其乘屋其始播百榖呂氏曰此章終始農事以極憂勤艱難之意二之日鑿冰冲冲三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆張子曰此章見民忠愛其君之意既勤趨其藏冰之役又相戒速畢場功殺羊以獻于公舉酒而祝其壽也王氏曰仰觀星日霜露之變俯察昆蟲草木之化以知天時以授民事女服事乎内男服事乎外上以誠愛下下以忠利上父父子子夫夫婦婦養老而慈㓜食力而助弱其祭祀也時其燕饗也節此七月之義也史記曰公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取材用行者有資居者有畜積民頼其慶百姓懷之多徙而保歸焉周道之興自此故詩人歌樂思其德也履祥按公劉之遷􅃎也史謂周道之興自此則國語所謂十五王而文始平之者自公劉數之爾不然則以有德之宗數之猶殷言賢聖之君六七漢言七制之主也大紀以世表計之係之少康甲子之紀而附以篤公劉之雅今以漢書計之係之夏桀甲子之紀而併附七月之詩焉讀篤公劉之雅可想見公劉度地建國和輯人民之䂓焉讀七月之詩可想見􅃎民因天力本孝慈忠愛之俗焉漢儒舊序以篤公劉爲召康公之所獻以豳七月爲周公之所陳意者􅃎之遺詩與召公獻之以備燕享之樂使成王知立國勤勞之故周公陳之以爲矇工之誦使成王知故國衣食之原故篤公劉列於雅而􅃎七月自爲風蓋自三聖相授其禮樂聲教之盛漸被四海后稷於此有邰家室子孫皆有令德其後雖當夏道衰微一再轉徙而修其訓典弈世載德加以公劉之賢生聚再繁邦家再盛故國人叙其建立之䂓道其風土歌謡之美吹之管籥和以土鼔周人世守之以爲其先公之樂至有天下而亦專官掌之周官籥章之職掌土鼔􅃎籥是也土鼔葦籥皆堯之遺音也而􅃎籥則公劉之遺音也􅃎籥所歌之詩則􅃎詩􅃎雅􅃎頌也􅃎詩七月之詩也豳頌雖不知其的爲何詩而篤公劉之篇豈非􅃎雅之詩與或者顧謂公劉之時夏道將墜國介戎狄之間計無文物篤公劉七月之詩蓋出周召之筆追述先公之事爾是獨不思夏當三聖之後義理素明言語素雅其文章爲最盛但載籍失傳耳其存者與其雜見傳記者可想見也雖當衰微之後然流風未泯商道將興篤公劉之詩下視商頌諸作同一蹈厲七月之詩上視五子之歌夏小正之屬與夏令時儆之辭皆同一文軌也豈至周召之時而後始有如此之文哉且周詩固有追述先公之事者然皆明著其爲後人之辭生民之詩述后稷之事也而終之曰以迄于今綿之詩述古公之事也而係之以文王之事此皆後人之作也若篤公劉之詩極道岡阜佩服物用里居之詳七月之詩上至天文氣候下至草木昆蟲其聲音名物圖畫所不能及安有去之七百歲而言情狀物如此之詳若身親見之者又其末無一語爲追述之意吾是以知其决爲豳之舊詩也況史氏已明言詩人歌樂思其德乎雖然七月爲豳之舊詩固也何以不居二南之前而居變風之末與曰詩皆采之當世而前世之詩存者不可泯也故􅃎七月附於十五國風之後猶商那附於三頌之末也七月既非周公之自作何以係周公諸詩曰􅃎周公之采邑也周公食邑於豳岐之間以其爲周之舊邑故曰周公然周既爲一代有天下之號則周公之詩不可謂之周而謂之􅃎焉猶晉而謂之唐衛而謂之邶􅅠也􅃎詩既周公之所陳故凡周公所作與爲周公而作者皆附之然則公劉爲雅七月獨不可爲雅與曰風雅固各有體矣噫自載籍之不傳後世槩以先公之事爲朴野不文之俗胡不即近世而觀之乎兩漢文物之乆而白狼之詩譯於朝李唐詞章樂府之行而凉州之編甘伊之聲列於樂況豳俗居雍土之中岐梁之虛而公劉接聞文教流傳之後又當變戎爲華之初爲諸夏方新之邦乎故篤公劉七月之詩端爲豳公當時之詩無疑也今列二詩於夏紀之季且述其大意如此於以考見夏商之世而周家之文固有自來矣三十有三歲伐䝉山有施氏進妹喜史蘇曰昔夏桀伐有施有施人以妹喜女焉韋昭曰有施喜姓之國妹其女也妹喜有寵於是乎與伊尹比而亡夏韋昭曰比比功也伊尹欲亡夏妹喜爲之作禍其功同也愚謂比者同比之比事雖不同同於亡夏也大紀曰自孔甲之後王室政德日衰諸侯或不朝桀能申鉤索鐡負恃其力不務德而武傷百姓有趙梁者教爲無道勸以貪狠伐䝉山有施氏有施氏進女妹喜桀嬖之所言皆聽為之為瓊室象廊瑤䑓玉牀行淫縱樂政事怠廢爲肉山脯林酒池可以運舟一鼔而牛飲者三千人以爲戲劇三十有五歲商主癸薨子履嗣位湯諡成號天乙姓子氏商頌長發之詩曰𤣥王桓撥受小國是逹受大國是逹率履不越遂視既發相土烈烈海外有截𤣥王契也𤣥者深微之稱王者追尊之號受小國受大國與下文受小球大球辭意同蓋古者諸侯有邦交之好相朝之禮契之爲國其四隣小大之國無不交朝聘之禮而契之受之德意通逹也率履不越其行事守禮度也遂視既發其觀瞻之者皆感發也至相土則又功烈盛大至於海外諸侯亦一切慕之帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍集傳曰商之先祖既有明德天命未嘗去之以至於湯湯之生也應期而降適當其時其聖敬又日躋升以至昭格于天乆而不息惟上帝是敬故上帝命之使爲法於九州也受小球大球爲下國綴旒何天之休不競不絿不剛不柔敷政優優百禄是遒集傳曰小球大球或曰小國大國所贄之玉也鄭氏曰小球鎭圭尺有二寸大球大圭三尺也皆天子之所執也下國諸侯也綴猶結也旒旗之垂者也言爲天子而爲諸侯所係屬如旗之縿爲旒所綴著也受小共大共爲下國駿厖何天之龍敷奏其勇不震不動不戁不竦百禄是總集傳曰小共大共駿厖之義未詳或曰小國大國所共之貢也鄭氏曰共執也猶小球大球也蘇氏曰共珙通合珙之玉也駿大厖厚董氏曰齊詩作駿駹謂馬也龍寵也敷奏其勇大進其武功也謂愚謂小球大球謂小國大國之贄玉小共大共小國大國之供貢也武王載斾有䖍秉鉞如火烈烈則莫我敢曷漢書作遏苞有三蘖莫遂莫逹九有有截韋顧既伐昆吾夏桀集傳曰武王湯也䖍敬也言恭行天罰也苞本也蘖旁生萌蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也鄭氏曰韋彭姓顧昆吾已姓言湯既受命載斾秉鉞以征不義桀與三蘖皆莫能遂其惡而天下截然歸商矣初伐韋次伐顧次伐昆吾乃伐夏桀當時用師之序如此昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王集傳曰昔在豈謂湯之前世中衰時與允也天子指湯也降言天賜之也卿士伊尹也言至於湯得伊尹而有天下也阿衡伊尹官號也愚按書曰肇我邦有夏小大戰戰罔不懼于非辜詩曰昔在中葉有震且業則是自湯而上蓋嘗中微矣而湯由七十里起又爲桀所囚卒能伐桀而代之則非勢之强也以德而已朱子曰序以此爲大禘之詩蓋祭其祖之所出而以其祖配也蘇氏曰大禘之祭所及者遠故其詩歴言商之先君又及其卿士伊尹蓋謂與於禘者也商書兹予大享于先王爾祖其從與享之是禮也豈其起於商之世與今按大禘不及羣廟之主此宜爲祫禘之詩然經無明文不可考矣殷本紀曰契興於唐虞大禹之際功業著于百姓百姓以平契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子㝠立㝠卒子振立振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子天乙立是爲成湯湯始居亳書序曰自契至于成湯八遷孔氏曰十四世凡八徙國都愚按八遷惟昭明居砥石相土居商邱見於傳餘無所考砥石今陜州底柱商丘今應天府宋城湯始居亳從先王居孔氏曰契父帝嚳都亳湯自商邱遷焉愚按嚳之説非也唐虞以上無王稱且契非嚳子借使嚳子不宜謂嚳先王也先王者必指𤣥王此商人追稱之辭也故大紀曰從先君居以正書序及注之失亳今應天之穀熟蓋南亳也作帝告釐沃孔氏曰告來居沃土二篇皆亡戊寅三十有六歲商湯元祀商湯征葛據經世張氏紀年然史記載征葛在聘伊尹之前葛今應天府寧陵縣孟子曰惟仁者爲能以大事小是故湯事葛朱子曰仁人之心寛洪惻怛而無計較大小强弱之私故小國雖或不恭而吾所以字之之心自不能已愚謂以是觀之則它日湯之征葛蓋不得已也又曰湯居亳與葛爲鄰穀熟去寧陵八十里葛伯放而不祀湯使人問之曰何爲不祀曰無以供犧牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何爲不祀曰無以供粢盛也湯使亳衆徃爲之耕老弱饋食愚按遺之牛羊使爲之耕皆以大事小之事也葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也大紀曰葛伯率其民要其有酒肉者奪之畏君命不敢校也有一童子校曰而不能耕吾爲汝耕又奪吾食不亦甚乎葛伯殺之爲其殺是童子而征之四海之内皆曰非富天下也爲匹夫匹婦復讐也朱子曰言湯之心非以天下爲富而欲得之也湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北狄怨曰奚爲後我民之望之若大旱之望雨也歸市者弗止芸者不變誅其君弔其民如時雨降民大悅書曰徯我后后來其無罰履祥按書序前乎湯誓有帝告釐沃之書有湯征汝鳩汝方之書今皆亡矣史記載湯征之辭而不類蓋非湯征之舊也孟子引亳衆徃耕之事疑出此書而五就湯桀之事意者於鳩方之書得之也其詳不可得而聞矣三十有七歲商湯進伊尹萬章問曰人有言伊尹以割烹要湯有諸集註曰要求也按史記伊尹欲行道以致君而無由乃爲有莘氏之媵臣負鼎爼以滋味説湯致於王道蓋戰國時有爲此説者愚按有莘氏之女爲湯妃莘亦作㜪國名也孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人樂堯舜之道蓋考迹以觀其用察言以求其心有所得而欣慕愛樂之也湯使人以幣聘之囂囂然曰我何以湯之聘幣爲哉我豈若處畎畝之中由是以樂堯舜之道哉湯三使徃聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君爲堯舜之君哉吾豈若使是民爲堯舜之民哉吾豈若於吾身親見之哉天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也思天下之民匹夫匹婦有不被堯舜之澤者若己推而内之溝中其自任以天下之重如此故就湯而說之以伐夏救民說湯以伐夏救民在去亳適夏復歸于亳之後非應聘之初即有是說也吾未聞枉已而正人者也況辱己以正天下者乎聖人之行不同也或遠或近或去或不去歸潔其身而已矣吾聞其以堯舜之道要湯未聞以割烹也伊訓曰天誅造攻自牧宮朕載自亳皇甫謐曰伊尹力牧之後呂氏春秋曰居伊水路史曰堯之後也又曰伊炎帝上世所國今洛之伊陽縣伊川堯之母家伊侯國按堯生於伊故爲伊祁氏伊尹恐其後雜書伊尹生於空桑蓋名諸說多孟子曰伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者如己推而内之溝中其自任以天下之重也伊尹聖之任者也又曰五就湯五就桀者伊尹也龜山楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心爲心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下爲心也以取天下爲心豈聖人之心哉大紀曰成湯薦伊尹于桀爲陳素王及九主之事桀不聽與羣臣沈湎于酒伊尹進諫曰君王以酒色之微壅天命而不理失人心而不圖反是爲善善則祥集習是爲不善不善則殃來君王宜留意焉伊尹自亳凡五適夏告以堯舜之道桀終不聽四十歲伊尹復歸於亳書序曰伊尹去亳適夏既醜有夏復歸于亳入自北門乃遇汝鳩汝方新序曰桀作瑤臺罷民力殫民財爲酒池糟隄縱靡靡之樂一鼔而牛飲者三千人羣臣相持歌曰江水沛沛兮舟檝敗兮我王廢兮趣歸薄兮薄亦大兮又曰樂兮樂兮四牡蹻兮六轡沃兮去不善而從善何不樂兮伊尹知天命之去舉觴而告桀曰君王不聽臣之言亡無日矣桀拍然而作啞然而笑曰子何妖言吾有天下如天之有日也日有亡乎日亡吾乃亡耳於是伊尹接履而趨遂適商就湯湯立爲相故伊尹去夏歸亳商王而夏亡甲申四十有二歲商湯七祀夏王桀囚商湯于夏臺既而釋之大紀曰昔先王之田也開三面而驅之順驅不逐逆驅則殺所以愛天物不惟務獲而已也是時田者張網四面合圍以殄天物於是成湯出田命去網三面曰欲左者左欲右者右惟不用命者乃入吾網復古制也漢南諸侯聞之曰湯仁及禽獸而况於人乎皆歸心焉桀疾其大得諸侯和也召之囚於重泉夏臺已而釋之其後湯伐桀遂放焉桀謂人曰吾悔不殺湯於夏臺使至此五十歲㑹諸侯于有仍氏有緡氏叛攻克之通志曰夏王桀欲肆其侈心爲有仍之㑹有緡氏見王汰侈不善也引師先歸桀怒帥諸侯之師攻克之愈自矜肆國人大崩諸侯韋氏顧氏昆吾氏黨桀之惡恣行亂政以虐其民五十有一歲太史令終古出奔商淮南子曰夏之將亡太史令終古先奔於商三年而夏桀乃亡大紀曰夏桀鑿池爲夜宫男女雜處三旬不朝太史令終古執其圖法泣諫不聽終古出奔商冬十月鑿山穿陵以通於河通志曰冬十月鑿山穿陵以通於河諫者曰洩天氣發地藏天子失道後必有敗桀殺之耆老或諫桀又殺之朞年瞿山崩爲大澤水深九尺山覆于谷下反在上桀見籙書云亡夏者桀于是大誅豪傑大費之裔曰費昌見二日東出熖西沉問于馮夷夷曰西夏東商費昌乃歸湯甲午五十有二歲商湯十有七祀瞿山崩殺諌臣關龍逢大紀曰桀窮其宗族恥其勲舊輕其賢良棄義聽䜛諸侯危其位大夫隱其道舉事戻於天發令逆其時諫者皆殺之關龍逢進諫曰人君謙恭敬信節用愛人故天下安而社稷宗廟固今王侈靡嗜殺民惟恐君之後亡夫人心已去天命不祐盍少悛乎不聽龍逢立而不去桀怒遂殺之通志曰桀有暴臣于辛陵轢諸侯䛕臣左師曹觸龍讒賊忠良關龍逢引黄圖以諫曰古之人君愛民節用享國之日長今君用財若無窮殺人若弗勝亡無日矣立而不去桀曰子又妖言矣於是焚黃圖殺龍逢夏亡通志曰桀之時至德滅而不揚帝道揜而不興發號逆四時春秋縮其和天地除其德樹社槁而崩裂容臺振而掩覆犬羣嘷而入淵豕御蓐而席隩兩日鬭五星錯行鬼哭于國枉矢流衆星隕地出黃霧泰山崩地震伊洛竭雷霆殺人胡氏曰五帝官天下三王家天下官天下者定於立賢家天下者定於立嫡然孟子固己言禹薦益於天未嘗不以官天下爲心異時謳歌朝覲訟獄者乃不之益而之啓幸而啓賢能敬承繼禹之道啓之再傳則循習而以傳子爲當然矣未幾而太康失邦釀成羿浞之禍夏統中絶者四十年非繼以少康之賢禹之宗祀不其殆乎陵遲至於履癸極矣何則嫡之分固前定也而嫡不能以必皆賢也天下生民之任則重也師保之説昉於商書湯尹之所以汲汲焉旁求俊彦啓迪後人者其慮固深遠矣大抵天之生大聖大賢固不數其生大奸大惡亦不常見天下唯中才最多是以不可無教太甲成王固中才之主也非有伊尹周公則敗度敗禮者誰能使之改㓜冲有過者又誰爲之亢世子之法哉厥後二君卒能克紹前烈爲商周之令主者夫豈其性然哉學問之功大師保之責隆也許氏曰五帝之禪三代之繼皆數然也其間如堯舜有子之不肖變也堯舜能通之以揖遜而不能使己子之不朱均湯武遇君之無道變也湯武能通之以征伐而不能使夏商之無桀紂聖人遇變而通之亦惟逹於自然之數而已而一毫之己私無與焉御批資治通鑑綱目前編卷三
