body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷四乙未商王成湯十有八祀大紀論曰古史不載湯改元獨劉道原載之非其實也夫人君即位之一年謂之元年一定而不可易也成湯之元立於桀之三十五載矣其所以克享天心受天明命以有九有之師爰革夏正本是而為之者也又可改乎元者義之所存非若一二之為數也後世以元為數而不知其義如漢武之初年曰建元元年既曰元年則元已建矣又曰建元豈不贅乎後又因事别建年號失其義也甚矣使人君知此義而體之則元原於一豈至如是紛紛乎王伐桀放之于南巢湯誓曰蔡氏曰夏桀暴虐湯往征之亳衆憚於征役故湯諭以弔伐之意王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之蔡氏曰以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也今爾有衆汝曰我后不恤我衆舍我穡事而割正夏予淮聞汝衆言夏氏有罪予畏上帝不敢不正蔡氏曰亳邑之民安於湯之徳政故不知夏氏之虐湯則畏上帝不敢不徃正其罪也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷䘮予及汝皆亡夏徳若兹今朕必往蔡氏曰湯又言夏王重役以窮民力嚴刑以殘民生民皆怠於奉上不和於國疾視其君指日而曰是日何時而亡吾寧與我之俱亡苦桀之虐而欲其亡之甚也桀之惡徳如此今所以必徃也爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦蔡氏曰禹之征苗曰爾尚一乃心力其克有勲至啓則曰用命賞罔于祖不用命戮于社予則孥戮汝此又益以朕不食言有攸赦亦可以觀世變矣履祥按讀湯誓者有三疑焉疑王曰以為追書也疑亳衆之怨后不恤也疑大賚孥戮之為己薄也夫湯武之稱王説者多矣有謂文王受命稱王至武王稱王凡十有一年者疑湯亦然有謂民無二王桀紂未絶則未可王者湯誓泰誓之稱王蓋追書也至於蘇氏則曰商周之王不王不係於桀紂之存亡也愚謂受命稱王之久其説失之僣而桀紂未絶未王之説則又失之拘至蘇氏之説不拘矣然通而無制也夫湯武興師之時是即受命之日張子所謂此事間不容髮一日之間天命未絶則為君臣天命既絶則為獨夫者其在此時乎夫天命已屬師徒既興則桀紂即獨夫矣豈待南巢之後牧野之餘而天命始絶哉且湯武既已興師矣而猶自稱曰諸侯以令於衆則是以諸侯而伐天子名實俱不可也然則稱王誓衆理固然也而必謂史臣追書不幾於嫌聖人而文之哉然則弔伐之師義也而亳衆有不恤之怨何也曰自亳衆而觀則如在春風如在慈母不知有天下之暴亂也自夏衆而觀則如水已溺如火將焚不可無聖人之拯救也故在此之怨雖曰我后不恤舍我穡事而在彼之怨則又曰徯我后奚為後我觀成湯辯曉之辭首之曰汝曰我后不恤我衆舍我穡事而割正夏予畏上帝不敢不正蓋亳衆知己事之小而不知天意之大在聖人則不可不順天也繼之曰今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰予及汝皆亡夏徳若兹今朕必徃蓋亳衆知商邑之安而不知夏民之危在聖人則不可不救民也常情蔽於茍且聖人廹於天民此其所以不同而已至若重賞而慮其不信嚴刑而至於孥戮則以亳衆久安喜逸惡動夫用久安惡動之民非重賞以誘之嚴刑以驅之它事且不可况以之戰而濟其弔伐之義哉然此亦誓師之令不得不云爾凡執禁以齊衆不赦過此軍律也而遽引罪人不孥以病之皆未可與語聖人之意也仲虺作誥仲虺之誥曰成湯放桀于南巢惟有慙徳曰予恐來世以台為口實仲虺臣名大戴作仲傀史記作仲􅣂荀子作中蘬奚仲之後為湯左相趙臺卿曰即萊朱也誥告也周禮誥用之會同此誥湯而亦曰誥唐孔氏謂仲虺必對衆而言非特釋湯之慙而且以曉其臣民衆庶也南巢今無為軍地桀奔于此因以處之故曰放焉放伐之事終不若傳授之美而又湯始為之故自以為有可愧之徳恐後世無君者指此為實以藉口也觀湯誥之書成湯憂以天下至此又憂後世聖人之心量如此陳氏曰堯舜以天下遜後世好名之士猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昬徳民墜塗炭天乃錫王勇智表正萬邦纉禹舊服兹率厥典奉若天命此明上天立君之理也天生聰明以乂生民而桀以徳昬墜民塗炭則不君矣故天生成湯以君之天乃錫王勇智者蓋氣化聚而生聖人聚清明之氣而使之智以無所不知聚剛厚之氣而使之勇以無所不能為也禹傳禪而湯征伐乃云纉禹舊服者禪繼征伐前後聖人俱一公天下之心桀墜禹之緒而湯承之又率其所以紀綱天下之典是則湯之興所以繼禹也所以承上天君天下之責也林氏曰齊宣王問孟子曰湯放桀武王伐紂有諸孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也夫立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實䘮矣非一夫而何孟子之言則仲虺之意也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師上言民塗炭湯受纉服之命作之君也此言桀誣天命湯受爽師之命作之師也武王所謂作之君作之師是也矯誣上天布命于下蓋假天以神其説以令於衆也大學所謂桀紂所令反其所好而民弗從者是也用爽厥師師衆也謂俾湯開明衆人之心也吳氏曰用爽厥師與下文簡賢附勢意不相貫疑有脱語簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之徳言足聼聞足滿也上文二節自理言之則湯固為所當為此章自勢言之則湯亦不得不為朱子嘗謂文武之勢當時亦住不得觀湯此時亦正如此惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民自此下二節因上文以述徳言足聽聞之實也湯於一身無所私而惟與天下為公如此有如此心人孰不信也乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉此亦承上文而言征伐一動而四面人心俱望王師之來則弔伐之事决不容已而鳴條之師至此終必為之也已上五節上明天命君師之理中明夏商疑忌之勢下明人心歸慕之極則湯不可不為亦不容不為矣此皆所以釋湯之慙也佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌此言命徳討罪之責撥亂反正之規夏之末造簡賢附勢者既繁則公道晦蝕是非不明久矣命徳討罪實在於湯鳴條之戰自不可已然又非可止於鳴條之戰而遽已也此章以上皆釋湯之辭此下皆勉湯之辭徳日新萬邦惟懐志自滿九族乃離夫仲虺方釋湯之慙而又勉其自新何也罪己責躬不可無亦不可長留在心為悔悔則不進矣然而猶慮其自滿何也人之常情有所慙者固多自阻而謂無所慙者又多自滿防其自阻也故釋其慙而勉之防其已釋而自滿也故又戒之忠愛之深則周防之宻湯固未必有是而仲虺之論亦不容疏也王懋昭大徳建中于民以義制事以禮制心垂裕後昆此承徳日新之意而言也懋昭即日新之推也中者無過不及之正理舉天下事物莫不各有自然之中民心所本具而不能自明故聖人建之以為凖焉以義制事以禮制心即建中之綱目也立之義以制天下之事使萬物各得其時中至善之宜而無過不及立之禮以制天下之心使人心各循於規矩凖䋲之内而不偏不倚經制既立人心風俗已正雖傳之於後世尚綽然有餘裕也豈有來世口實之憂哉予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小此承志自滿之意而言也嗚呼愼厥終惟其始殖有禮覆昬暴欽崇天道永保天命此總一篇之意以終之謹然惟始者謂勿失其不邇不殖改過寛仁之徳徳言來蘇之舊殖有禮覆昬暴謂益廣其顯遂兼攻凡撥亂反正之規欽崇天道即日新昭徳之謂而以永保天命終篇首之意然則湯之得天下也固天命人心理勢不可不為之宜其為天子也亦有得失興亡不可不謹之慮此篇之意最為深宻讀者詳之王歸自夏誕告萬方湯誥曰王歸自克夏至于亳誕告萬方王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降􅇆于下民若有恒性克綏厥猷惟后以形體謂之天以主宰謂之帝􅇆中也如六藝折􅇆於夫子之𠂻綏定也猷道也古文作繇蓋天以一理化生斯人舉凡人倫庶物莫不各有自然之中無過不及者付在人心故謂之降􅇆自其受於人心則謂之性自其達於事物之間莫不由之則謂之道劉子所謂民受天地之中以生是以有動作禮義之則是也以降𠂻而言則固同此不偏不易之性以氣禀而言則不能無清濁淳駁之殊故必有任撫定之責以各使之安行於是者此所以為之君也周子所謂聖人定之以仁義中正而主静立人極焉蓋綏猷之謂也蔡氏曰夫天生民有欲以情言也上帝降𠂻于下民以性言也仲虺即情以言人之欲成湯原性以明人之善聖賢之論互相發明然其意則皆言君道之係於天下者如此之重也夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇天道福善禍淫降災于夏以彰厥罪猶稱夏王從其始也此聖人忠厚之意也此叙夏桀不克綏猷殘民之性非天所命為天所棄也肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命此自叙其受命之事元聖伊尹也湯類上帝興師而學者以稱王誓衆為諱湯以元聖稱伊尹而學者不以伊尹為聖人夫不以成湯為王者避桀故爾不以伊尹為聖者避湯故爾此學者之病也程子有言聖人自至公何避嫌之有上天孚佑下民罪人黜伏天命弗僣賁若草木兆民允殖孚允皆信實之意謂上天之意信在於佑民故使罪人黜伏桀奔南巢也蓋上天為民之心無有僣差且以一草木之微上天且生長之此其心固昭然可見矣則夫兆民之衆天蓋信欲生殖之而不欲遏絶之也明矣蓋湯指天心之易見者以示人也俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵此承上文而言天意信在於民故黜夏而命我此其責亦重矣故惟恐其不足以當之也凡我造邦無從匪彛無即慆淫各守爾典以承天休此皆所以綏猷也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方簡如大閲簡車馬之簡萬方有罪蓋教之不豫養之不遂處之失宜皆不克綏猷也故曰在予一人朱子謂此意是湯見得此章尤見聖人正大光明之心公誠忠恕之道也嗚呼尚克時忱乃亦有終忱信實也呉氏曰此兼人已而言子王子曰自虞書危微精一數語之外惟湯誥惟皇上帝降𠂻于下民若有恒性克綏厥猷惟后數語足以亞之性之為言實昉乎此克綏厥猷惟后為一篇之綱領夏王滅徳作威以下即綏猷之反與衆請命輯寧邦家即任綏猷之責兹朕未知獲戾而下歛然戒謹恐懼之意凡我造邦無從匪彛無即慆淫各守爾典是乃所以綏猷而萬方有罪在予一人即自任以不克綏猷之咎是其為書辭忱義宻當為誥書第一與武成大不同矣書序曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓蔡氏曰以伊尹為首稱者得之咸有一徳亦曰惟尹躬暨湯咸有一徳陑在河曲之陽鳴條在安邑之西升自陑義未詳漢孔氏遂以為出其不意亦序意有以啓其陋與夏師敗績湯遂從之遂伐三朡俘厥寳玉誼伯仲伯作典寳三朡國名今定陶其地也蔡氏曰俘厥寳玉恐非聖人所急典寳詳見逸周書然不可信湯歸自夏至于大坰大坰即滎澤在衛州界仲虺作誥湯既黜夏命復歸于亳作湯誥咎單作明居孔氏曰咎單臣名主土地之官作居民法焉馬氏曰咎單湯司空明居民之法也愚謂二説皆因名生義俱不可考路史曰咎單臯陶之後咎讀作臯大紀曰三月歸于亳踐天子位定都焉國號曰商愚按商之為號久矣非至此而特建也其圖書曰歸藏坤乾震巽坎離艮兌今世有傳歸藏者言占筮吉凶之兆雖韻語而非古韻大率依説卦而托之及書傳所載筮語有薛氏叙述所以先坤之意以為立天之道先隂而後陽立地之道先柔而後剛立人之道先順而後義故歸藏先坤而後乾地道者元一之所藏妻道則父子君臣生焉坤道至順常靜而生曰無為者乃有為之母其説如此其書淺近若鄭漁仲則真以為古歸藏矣歸藏即今納甲歸魂等法古必有書以斗杓建丑冬十二月為歲首是謂地統以日中為朔改歲曰祀建大白乗大輅白馬黑首大事斂用日中戎事乘翰戎車曰寅車牲用白牡封夏后氏之後於杞行甲寅厯履祥按建丑雖曰地統然月建順天而右行日月不及天而左會惟建丑之月月建在丑日月會于丑故天文以丑為星紀蓋自是為始以經緯十二次也所以商正因之三月王至東郊論諸侯功罪立禹後與聖賢古有功者之後封孤竹等國各有差左氏傳曰商湯有景亳之命帝王世紀曰禹之時執玉帛者萬國及夏之衰有窮之亂孔甲以後至桀行暴諸侯相兼逮湯受命其能存者三千餘國史記曰還亳作湯誥惟三月王至於東郊告諸侯羣后毋不有功於民勤力廼事予乃大罰殛女毋予怨曰古禹臯陶久勞于外其有功乎民民乃有安四瀆已修萬民乃有居后稷降播農殖百榖三公咸有功于民故后有立徐廣曰立一作土索隠曰謂禹臯陶有功於人建立其後昔蚩尤與其大夫作亂百姓帝乃弗予有狀先王言不可不勉曰不道毋之在國女毋我怨以令諸侯索隠曰又誡諸侯汝為不道我則無令汝之在國又曰湯封夏之後至周封於杞也索隠曰孤竹君殷湯三月丙寅所封地理志在遼西令支應劭曰姓墨胎氏一作墨台路史曰公劉爵世諸侯湯周之先其上冠公者始此必至商而爵為公也史記曰伯翳生子二人次曰若木實費氏其𤣥孫曰費昌當夏桀之時去夏歸商為湯御以敗桀於鳴條故嬴姓多顯遂為諸侯左氏曰奚仲為夏車正封於薛至仲虺為湯左相王制曰王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子三公之田視公侯卿視伯大夫視子男元士視附庸制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庻人在官者其祿以是為差也諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士者數各居其上之三分凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為閒田凡九州千七百七十三國天子之元士諸侯之附庸不與天子百里之内以共官千里之内以為御千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯千里之内曰甸千里之外曰采曰流天子三公九卿二十七大夫八十一元士大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人天子使其大夫為三監監於方伯之國國三人天子之縣内諸侯祿也外諸侯嗣也制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一廵狩天子無事與諸侯相見曰朝考禮正刑一徳以尊于天子天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯於天子天子命之教然後為學小學在公宮南之左大學在郊天子曰辟廱諸侯曰頖宮王制與周禮不同舊説是殷禮故大紀盡入商湯之紀今附於此以見成湯紀綱天下之大規大旱十有九祀大旱二十祀大旱夏桀死于亭山荀子曰桀死於亭山淮南子曰放之歴山注云歴陽之山路史曰放桀南巢三年桀死於亭山其子淳維妻其衆妾遁於北野隨畜轉徙號葷育逮周曰玁狁漢書匃奴傳曰其先伯禹之苗裔二十有一祀大旱發莊山之金鑄幣賑民管子曰天以時為權地以財為權人以力為權君以令為權失天之權則人地之權亡湯七年旱禹五年水民之無􅕷賣子者湯以莊山之金鑄幣而贖民之無􅕷賣子者禹以歴山之金鑄幣而贖民之無􅕷賣子者故天權失人地之權皆失也大紀曰伊尹言於王發莊山之金鑄幣通有無於四方以賑救之民是以不困二十有二祀大旱二十有三祀大旱二十有四祀大旱禱于桑林以六事自責雨荀子曰湯旱而禱曰政不節與使民疾與何以不雨至斯極也宮室崇與女謁盛與何以不雨至斯極也包苴行與䜛夫興與何以不雨至斯極也說苑所載與此大同小異又東漢書注引帝王紀有剪髪斷爪已為犧牲之説外紀取之淮南子曰湯旱以身禱於桑山之林注曰桑山能興雲致雨大紀曰禱於桑林之社天油然作雲沛然下雨歲則大熟天下讙洽遂作桑林之樂名曰大濩作諸器用之銘以為警戒史失之其盤銘曰茍日新日日新又日新春秋傳疏曰湯樂大濩其曰桑林先儒無説唯書傳言大旱禱於桑林之社而雨或遂以桑林名樂也皇甫謐云殷樂一名桑林以桑林為大濩别名無文可憑未能察也愚按莊子云桑林之舞則桑林亦舞名也公孫𢎞曰湯之旱則桀之餘烈也鼂錯曰聖王在上而民不凍饑者非能耕而食之織而衣之為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也禮記曰厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷蔡墨曰周棄亦為稷自商以來祀之記疏曰夏末湯遭大旱七年欲變置社稷故廢農祀棄春秋疏曰書序云湯既勝夏欲遷其社不可作夏社湯於帝王年代猶近功之多少傳習可知故得量其優劣改易祀典意欲遷社而無及句龍棄功乃過於柱故廢柱以棄為稷也三十祀王崩嫡孫太甲踐位孟子曰湯崩太丁未立當有而卒二字外丙二年仲壬四年太甲顚覆湯之典刑程子曰古人謂歲為年湯崩之時外丙二歲仲壬四歲惟太甲差長故立之也按外丙仲壬疑太丁之子大紀曰成湯娶有莘氏生太丁為嫡子蚤卒有子曰太甲為世嫡孫以伊尹為太保湯崩壽百歲伊尹奉太甲即位葬成湯於亳北皇覽曰湯冡在濟隂亳縣北東郭去縣三里冢四方方各十歩高七尺上平大紀論曰太史公記湯崩太丁蚤死外丙立三年仲壬立四年相繼而崩然後伊尹立太甲非其實也何以知非其實二帝官天下定於與賢三王家天下定於立嫡立嫡者敬宗也敬宗者尊祖也尊祖者所以親親也兄死弟及非所以為敬宗尊祖且本支亂而爭奪起矣豈親親之道哉且成湯伊尹以元聖之徳戮力創業乃舍嫡孫而立諸子亂倫壊制開後嗣爭奪之端乎公儀仲子舍孫而立子言偃問曰禮歟孔子曰否立孫夫孔子殷人也宜知其先王之故矣而不以立弟為是此以義理知其非者一也夫賢君必能遵先王之道不賢者反之以殷世考之自三宗及祖乙祖甲皆立子其立弟者盤庚耳必有所不得已也豈有諸聖賢之君皆不遵先王之制而沃丁小甲諸中才之君反能耶此以人情知其非者二也商自沃丁始立弟太史公陽甲之紀曰自仲丁以來廢嫡而更立諸弟子諸弟子或争相代立比九世亂以其世考之自沃丁至陽甲立弟者九世則仲丁之名誤也沃丁既以廢嫡立諸弟子生亂為罪則成湯未嘗立外丙仲壬明矣不然是成湯首為亂制又可罪沃丁乎此以事實知其非者三也唐李淳風通於小數猶能逆知帝王世數以邵康節極數知來其作皇極經世史亦無外丙仲壬名世此以厯數知其非者四也經所傳者義也史所載者事也事有可疑則棄事而取義可也義有可疑則假事以證義可也若取事而無義則雖無經史可也戊申太宗太甲元祀十有二月乙丑伊尹祠于先王奉嗣王祇見厥祖百官總已以聼冢宰伊尹乃明言烈祖之徳以訓于王書曰惟元祀十有二月乙丑今文尚書曰惟太甲元年十有二月乙丑朔伊尹祀于先王誕資有牧乃明胡文定曰前乎周者以丑為正其書始即位曰元祀十有二月曰三祀十有二月朔則月不改也伊尹祠于先王奉嗣王祇見厥祖祠于先王殷禮蓋當䘮即位冢宰攝祭告也先王謂𤣥王以下祇見厥祖奠于殯宫告即位也䘮三年之内事死如事生故曰祇見厥祖舊説謂先王即成湯則書辭為重複而䘮奠亦不應言祠也侯甸羣后咸在孔氏曰在位次也百官總已以聽冢宰孔子曰古者君薨百官總已以聽冢宰三年伊尹乃明言烈祖之成徳以訓于王曰嗚呼古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若此言夏后氏之盛于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳此言夏桀之所以亡也造攻自鳴條者伐桀於鳴條之野朕哉自亳者哉始也始行天子之政於亳邑也惟我商王布昭聖武代虐以寛兆民允懷此言成湯所以承天造攻哉自亳之事也今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海此言太甲嗣位之初所以接續成湯之徳正在此時也天子當䘮雖未親政然愛親敬長此即所以立政之本自家而國而推之天下者也孟子曰親親仁也敬長義也無它達之天下也唐孔氏曰先愛其親推之以及疏先敬其長推之以及遠即孝經所云愛敬盡於事親徳教加於百姓刑于四海是也嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦茲惟艱哉此繼上章因言成湯之徳所以至于有天下者亦先自親親長長諸事始所謂肇修人紀也人紀即人倫謂之綱則舉其倫之大謂之紀則又盡其事之細從諫弗咈先民時若則順古今之善居上克明為下克忠則盡上下之道與人不求備則容衆檢身若不及則日新凡此亦皆愛敬之推積徳累行以至于有萬邦此豈易事也哉敷求哲人俾輔于爾後嗣制官刑儆于有位曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒于遊田時謂淫風敢有侮聖言逆忠直遠耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士上文言創業之事此又言垂統之道以警太甲也太甲上繼先王之徳必戒一己之病其病安在先王所戒詳矣昔先王求哲人以輔後嗣而又制官刑以警有位然其為戒則亦言言藥石人主尤不可忽也故因舉以戒太甲焉官刑之儆隔句韻語末句箴體此成湯所作以箴有國家者常使人誦之也殉隨死之謂殉謂其以身發財忘生縱慾也比頑童與遠耆徳相反謂媟近頑冥少年之人國語史伯常譏幽王近頑童窮困注謂童昬窮陋之人也卿士有家邦君有國有一于此足以致䘮亡而况於天子乎其責尤重而迹尤危矣具訓于蒙士蓋古人有國家者常使瞽誦詩工誦箴諫蒙即矇也謂使蒙士誦之以為戒也或云自其為童蒙之初固已訓之以此蓋養正於初也此伊尹所即之以告幼君也此已防其縱慾之漸也嗚呼嗣王祇厥身念哉聖謨洋洋嘉言孔彰此承上文官刑之戒使之敬身而念之也聖人謨訓固多廣大深妙之理若此官刑之訓則其嘉言甚明白易知易行王所當念初非高遠難行之説也凡此皆誘掖幼主之辭防其顛覆之行唯上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗上文嘗言皇天假手伐夏之事矣太甲嗣湯正當天命方新之際伊尹深恐其有所恃也故言惟上帝不常作善則凡福祥皆應之作不善則凡殃禍皆應之天命不可恃也恐太甲以湯徳至大小善無益而弗為也故又曰爾惟徳罔小萬邦惟慶恐太甲以十愆之戒為小節無傷而弗去也故又曰爾惟不徳罔大墜厥宗亦所以申愛親敬長終四海十愆有一必䘮亡之説也大抵徳雖小而意所趨者善故其效積至於萬邦惟慶不徳雖小而意之所趨者惡其效終至於墜厥宗伊尹誘掖太甲之意可謂卑而引之然亦理固爾也書序曰成湯既殁太甲元年伊尹作伊訓肆命徂后王徂桐宮居憂書太甲篇曰惟嗣王不惠于阿衡惠順也謂不順伊尹之言也阿即保也衡平也商尊伊尹為保衡猶周尊太公為尚父也伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祗肅天監厥徳用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見于西邑夏自君有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖顧孔氏曰常日在之朱子取之明命天之所以予我者即所謂明徳也顧諟明命謂常管顧吾心之天理勿使為人欲所昬也西邑夏夏都安邑商居商丘視夏為西也自君有終漢孔氏以來皆作自周有終子王子謂周當作君按古文君作商與周相似故誤之也清霞經説亦作君太甲之心為人欲所昬不能求其放心不復知所當敬故伊尹以先王顧諟明命之心法告之先王常存省此天理炯然在中對越天地鬼神遂為天所命尹於其時亦得以左右厥辟安定師衆之民則是成湯中心無為以守至正安民之事皆尹親之又恐太甲以天下之事恃有伊尹不復省也故又言夏之先君克終其責則其相亦得以終其責其後嗣王罔克有終則相亦不得終其責盖天下之本在君雖有賢相若其本既撥則相亦末如之何矣此以警太甲也王惟庸罔念聞伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啓廸後人無越厥命以自覆慎乃儉徳惟懐永圖若虞機張徃省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭昧晦爽明謂夜而初明之時丕顯者此心之清明發達不可遏也此即先王顧諟之功也日出曰旦坐以待旦須明行之也前篇曰敷求哲人俾輔于爾後嗣此曰旁求俊彦啓廸後人成湯所求之賢孰有大於伊尹所以託孤者亦孰有加於伊尹此言若伊尹自指者盖嗣王不惠阿衡惟庸罔念此必其不知以伊尹言為重也故尹言此且繼之曰無越厥命以自覆則不可失先王託孤之命以自顛覆也太甲之失必在驕侈故戒之曰謹乃儉徳必茍目前故曰惟懐永圖其為事也必輕發故又曰若虞機張徃省括于度則釋虞虞人掌射獵者也機弩牙也張漢書所謂蹶張徃將發矢也括于度沈存中曰頃海州人穿地得一弩機其望山甚長望山之側為小矩如尺之有分寸原其意以目注鏃端以望山之度擬之凖其高下正用筭家句股法以度高深書徃省括于度疑此乃度也欽厥止謂凡未接物之時此心須存敬畏此即顧諟丕顯之法若其行事則一循乃祖之跡勿妄為以顛覆之也然亦惟欽則能率乃祖攸行爾王未克變伊尹曰兹乃不義習與性成予弗狎于弗順營于桐宮宻邇先王其訓無俾世迷王徂桐宮居憂克終允徳伊尹所言事事藥石王未克變蓋人欲熾而不能自克也兹乃不義習與性成太甲顛覆非必禀賦之不善也其為不義習而熟之則若性自然矣此不可不慮也狎習見也不順言太甲所為不順義理也伊尹嘗見夏桀之為弗順矣今又見太甲所為不順覆亡之事豈可常見哉古者天子居憂則在梁闇太甲之為不善以其深居宮中有與之習者又其貴為天子心必有所恃而驕也故伊尹營桐宮以處之桐盖湯葬地使之居憂於此所以訓之無俾世迷勿使之終身迷也焄蒿悽愴以起其思悲哀哭泣以感其念服衰疏食以阻其驕􅇕墓之間未施哀於民而民哀之太甲此時驕奢淫泆之氣剝落殆盡此伊尹不言之教一大鑪冶太甲所以克終允徳也與伊尹之訓深切著明而不順不聼又不變則其説亦窮矣只得以桐宮為訓至於用此亦大臣之不幸也二祀王在桐宮三祀十有二月朔伊尹以冕服奉王歸于亳太甲篇曰惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥徳實萬世無疆之休伊尹奉迎太甲之辭本謂民不可無君耳而對舉君民相須之義盖言言警戒也已上皆伊尹慶懌之辭王拜手稽首曰予小子不明于徳自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既徃背師保之訓弗克于厥初尚賴匡救之徳圖惟厥終不明于徳謂不知有此心之天理此正與顧諟丕顯相反也底致也類肖也度者心之則禮者事之制欲者情之流縱者事之放也速戾謂自招放廢也孽災也太甲自述其受病之原惟不知有此天理是以自致其身於不肖而惟慾縱之狥以敗禮度自速放廢昔成湯以義制事以禮制心垂裕後昆所以為後人者俱有禮度惟太甲縱欲是以敗之觀此一節則太甲顛覆之由放廢之事怨艾之實求誨之真克終之美俱在言意之間矣伊尹拜手稽首曰修厥身允徳協于下惟明后先王子惠困窮民服厥命罔有不悦竝其有邦厥鄰乃曰徯我后后來無罰王懋乃徳視乃厥祖無時豫怠奉先思孝接下思恭視遠惟明聽徳惟聰朕承王之休無斁太甲一節顛覆今雖自悔豈能遽孚於天下亦惟反求諸身自修而已自修之實茍至則實徳自協於民心昔先王一意愛民視之如子此其實意故民悦服於下而鄰國之民亦戴之知其來則必有安無危此其允徳之協于下也太甲既自知受病之源自戒既徃之失但懋乃徳視乃厥祖勿一時怠豫可矣不必它求也改前日之顛覆則奉先思孝一為祖徳之循戒前日之驕悖則接下思恭一為賢徳之順視不蔽於媟近則明無不見聽不蔽於邪佞則聰無不聞盖所見遠大所聽徳言則聰明日開也此四言者尤羣言之要也伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠三者俱無常而皆不能外乎徳敬與誠分言者誠則真實之意而敬則加謹畏所以事天也天位艱哉徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后天位艱哉承上無常者而言也德即敬仁誠之謂徳惟治也而與之同道者無不興否徳亂也而與之同事者罔不亡治言道順理而行者也亂言事則悖道之為也然道無終窮安保其不與之異事機無極又安保其不與之同故必終始常慎其所與同者則惟明明之君能之一有不明則照察不及即有與治道異與亂事同而不自知者矣此所以君心常欲其明而不可有一息之昬也先王惟時懋敬厥徳克配上帝今王嗣有令緒尚監兹哉先王惟時懋敬厥徳此指明明之的亦惟時時懋敬其徳而已其極至於克配上帝則天之親之民懐神享不在言矣今王嗣令緒監兹則勉其與治同道之實也若升高必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始伊尹言成湯盛徳配天之盛又恐太甲或憚其高而難及或忽於近而躐等故又言若升高必自下若陟遐必自邇先於民事切近而加之意知天位之艱難而謹其身然欲謹於終必自始而謹之此皆為之有本行之有漸者也有言逆于汝心必求諸道有言遜于汝志必求諸非道此又勉以聽言之道也亦自下自邇之事逆心之言不可以其戾於已而不聽也必求諸道合於道則忠言也遜志之言不可以其順已而輕信也必求諸非道非道則䛕言也盖天下之言不一逆心之言雖未必皆道也但忠言多逆必先以道求之遜志之言亦未必皆非道也但䛕言多甘必先以非道求之若逆心而先以為悖遜志而即以為善則逆忠聽佞多自是始矣嗚呼弗慮胡獲弗為胡成一人元艮萬邦以貞先王之道固不可遽進其進之必自下自邇然亦不可不勇進盖不思則何以得不為則何以成弗慮胡獲致知之事也弗為胡成力行之事也元良大善也徳如先王則大善矣一人元良萬邦之所以正也君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休此又戒其與治同道之反亦因聽言而及之伊尹與成湯創造王業紀綱法度所以經理庶政者周矣使中材之主守之不害為至治但恐為辯言所惑輕有變動則政壊矣此伊尹所深憂也然尹為是言以勉其君也而及為臣之事何也意者功成身退伊尹其將歸乎抑人臣之奉君一有寵利之心則患失之念熾曲狥茍從以為固位之謀者或無所不至矣故尹之言亦萬世君臣之大戒也書序曰太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇孟子曰伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顚覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓己也復歸于亳艾音乂説文芟草也盖斬絶自新之意公孫丑曰伊尹曰予不狎于不順放太甲于桐民大悦太甲賢又反之民大悦賢者之為人臣也其君不賢則固可放與孟子曰有伊尹之志則可無伊尹之志則簒也朱子曰伊尹之志公天下以為心而無一毫人欲之私也伊尹既復政將告歸乃陳戒于王皇王大紀繫之七祀甲寅經世以返政即附庚戌之歲經文伊尹既復政厥辟按前篇奉嗣王歸亳申誥于王其辭事相接而書言今嗣王新服厥命皆為復亳初年之辭無疑也今係諸此唐孔氏曰太甲既復歸伊尹即應還政其告歸陳戒未知在何年也下云今嗣王新服厥命則是初始即政盖太甲歸亳之後即告老也君奭云在太甲時則有若保衡左氏云伊尹放太甲而相之則伊尹又相太甲盖伊尹此時將欲告歸太甲又留之為相如成王之留周公不得歸也沃丁序云沃丁葬伊尹于亳則伊尹卒在沃丁之世昔湯為諸侯之時已得伊尹比至沃丁時始卒伊尹夀年百歲比告歸之時已應七十左右矣咸有一徳篇曰伊尹既復政厥辟將告歸乃陳戒于王曰嗚呼天難諶命靡常常厥徳保厥位厥徳匪常九有以亡太甲既已克終厥徳但能有常而不變則進修功效自是生矣故伊尹告歸有一徳之誥焉諶信也言商受命方新而難信盖其眷命靡常也常厥徳常即一也常厥徳則能保厥位而不常者必亡此則天理之必可信者也夏王弗克庸徳慢神虐民皇天弗保監于萬方啓廸有命眷求一徳俾作神主朱子曰庸常皆一也此章言桀以不一而亡惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師爰革夏政非天私我有商惟天佑于一徳非商求于下民惟民歸于一徳一者有常不變之謂即誠敬之意也湯以元聖稱伊尹而尹於此乃曰惟尹躬暨湯咸有一徳則尹徳所到可知且湯於伊尹學焉而後臣之此先己後湯盖其真實工夫所自得之妙直以告太甲不避其辭之直也孟子言伊尹不有天下相湯以王於天下尹湯同徳而受天命聖賢於此以徳言不以位言也伊尹聖之任氣象又可見矣此章言商以一徳而興徳惟一動罔不吉徳二三動罔不凶惟吉凶不僣在人惟天降災祥在徳上文言桀之所以亡商之所以興此總結之以警太甲也今嗣王新服厥命惟新厥徳終始惟一時乃日新新者振作精明之謂然必終始惟一接續不已則其徳日新伊尹嘗言顧諟天之明命昧爽丕顯而此又言終始惟一時乃日新聖人心境工夫於此可見任官惟賢才左右惟其人臣為上為徳為下為民其難其慎惟和惟一篇首言尹湯咸有一徳上文既勉太甲以君之一徳故此又論臣之當有一徳也官百官也左右輔相也賢有徳才有能其人則通聖賢而為言也大抵任用庶官惟當擇其賢才左右輔相又惟當得其人而任之盖輔相之職此聖賢之職任不止於賢且材也四為字皆從去聲大抵為臣之任其為上也為輔其徳耳而非為君身之嗜好從欲也其為下也為利其民耳而非為一身之利祿妻孥也此臣之一徳也其難其慎謂君臣相遇之難則當謹審所任也惟和惟一謂君臣協和為貴則當咸有一徳也徳無常師主善惟師善無常主協于克一此論人君修徳擇善至一徳而止也徳指行而言善指理而言一指心而言師法也善是也常定也協如國語司民協孤終司徒協旅之協盖參會考比之意古今之徳皆可師也而制行不同不可拘一定之師惟在於擇其善而已天下之理雖善也而隨時取中則又不可拘一定之主所以參會考比之者又在於此心之克一而已盖古今徳行或柔或剛或正直或清或和或無為或勤勞在我不可拘一定之法必擇其善者從之所謂審其是也然善無定主均一事也或施之彼時則為是而施之此時則為否均一節也或用之此事則為非而用之彼事則為是者此古語所謂移是聖門所謂時中所以參比會同之者非純誠有定之心其孰能精擇而無差也哉廣漢張氏曰書自危微精一數語外惟此四言但舜大聖人言語渾淪伊尹之言較露鋒鋩耳朱子曰舜之語如春生伊尹之言如秋殺俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永底烝民之生此由一徳而推言其政化之效以申常徳保位之語嗚呼七世之廟可以觀徳萬夫之長可以觀政后非民罔使民非后罔事毋自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功此又發明餘意警戒以終之七世之廟可以觀徳即前可以知後萬夫之長可以觀政即小可以知大君民理本相須人主不可有自大而狹小它人之心一有是心則人有不得自輸其情者矣夫人一有不得自輸其情則上不盡下下不親上而事不行矣人主誰與成其功哉伊尹素志視一夫不獲則曰時予之辜故今所以告君者又若此履祥按咸有一徳之篇以論學言之前儒謂自危微精一四語之後惟主善協一四語足以繼之然此四語者即惟精惟一允執厥中二語耳而功夫加詳焉夫舜授禹精一執中之旨即繼之后衆守邦四海困窮之語伊尹告太甲一徳之旨即終之匹夫匹婦不獲自盡之戒今之君子語理者或遺事論心者或外天下國家毋乃與聖人之言有間與噫其弊也久矣又以成書之體觀之自臯陶謨之外惟一徳之書最為明整首論天命之靡定以徳之常不常為存亡之分常即一也以桀之亡證之不常其徳者也以商之興證之咸有一徳者也一興一亡既明則又以一與二三所以致興亡於天者總之遂勉太甲以一徳之工夫焉既勉君之一徳又求臣之一徳而以惟和惟一總之協于克一則一徳所以能擇天下之善而持天下之中焉者俾萬姓以下則一徳之效以終常徳保位之語然一徳無終始之間亦不可有小大之間故嗚呼以下又推其餘意警戒以終之終始相生枝葉相對其為書未有明整於此者伊尹以元聖之臣遇成湯之君君相俱聖其相與議論經綸之宻不傳於書太甲不明賴師保之訓伊尹於是始有書焉自伊訓太甲三篇皆已精切明白矣而終之一徳之書如此太甲所進於此亦可窺矣此皆萬世之幸後之君臣宜熟讀而精思之甲子十有七祀三十有三祀王崩廟號太宗子沃丁踐位辛巳沃丁元祀八祀伊尹薨葬于亳咎單訓伊尹事書序曰沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁薛氏曰湯冢去亳三里夷丘西北有伊尹墳去亳十里孔氏曰伊尹既致仕老終以三公禮葬世紀曰沃丁八年伊尹卒卒年百有餘歲大霧三日沃丁葬之以天子之禮祀以太牢親臨䘮以報大徳孔頴達曰伊尹本三公晉文請隧襄王不許沃丁不當以天子禮葬伊尹也孔言三公禮葬未必有文要情事當然也愚按成王賢王也世猶傳其命魯以天子禮樂祀周公沃丁雖賢世紀所言未必無此雖為非禮然唐孔氏以晉文請隧為比人與事俱擬非倫矣子王子曰成湯播告于衆以元聖稱伊尹愚考其大用誠聖人也有大徳量有大見識故能數用權而畧無沮禦扞格之患五就桀而桀不忌五就湯而湯不疑知桀之終不悛也創此大義主此大謀相成湯而伐放之天下不驚如探諸囊取物之易也湯學于伊尹尹之相湯格言至論宜不少矣而不傳於後至湯崩相太甲始有五篇之書典謨之後四百餘年再有此精微之論方伊訓與上篇之訓王未克變營桐之役此君臣之再變也惟其實徳光輝力量重厚朝廷服之而不敢議天下信之而不敢疑嗣王亦竟以是率徳為商令主伊尹之用權不可學也非聖人而能之乎古今善用權者莫如伊尹善論權者莫如孟子孟子曰有伊尹之志則可孟子亦不敢以此自任也況餘人哉二十有九祀王崩立弟太庚庚戌太庚元祀履祥按兄死弟及自太庚始謂為殷禮非也伊尹曰七世之廟可以觀徳父子相傳為一世若兄弟則昭穆紊矣沃丁及見伊尹之典刑死而傳弟當必有故而典籍無所考後世循襲諸弟子或爭立遂啓亂源是以聖人立法不立異以為高甲子十有五祀二十有五祀王崩子小甲踐位乙亥小甲元祀十有七祀王崩弟雍己立壬辰雍己元祀三祀史記曰殷道衰諸侯或不朝大紀曰王尸君位不能綱紀庻政號令不行諸侯或不朝十有二祀王崩弟太戊立唐孔氏曰太戊小甲之弟太庚之子甲辰中宗太戊元祀亳有祥用伊陟臣扈格于上帝巫咸乂王家大修成湯之政書序曰伊陟相太戊亳有祥桑榖共生于朝伊陟贊于巫咸作咸乂四篇太戊贊于伊陟作伊陟原命孔氏曰贊告也愚謂如益贊于禹之贊言佐其所未及也君奭曰在太戊時則有若伊陟臣扈格于上帝巫咸乂王家伊陟者伊尹之子雜書言伊尹有二子巫咸臣姓名言天者謂殷宣夜之法巫咸為之大紀取巫咸占繋之太戊紀以實之按書稱巫咸乂王家不在格帝之列後漢天文志言湯有巫咸不言太戊楚詞又有巫咸豈名氏偶同㦯此巫氏彼巫官與故大紀所書今不敢取史記曰帝太戊立伊陟為相亳有祥桑榖共生于朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕與帝其修徳太戊從之而祥桑枯死殷復興諸侯歸之三祀諸侯畢朝家語曰商王太戊側身修行思先王之政明養民之道三年之後遠方慕義重譯至者十有六國世紀曰桑榖共生于朝太戊問於伊陟伊陟曰臣聞妖不勝徳帝之政事闕與其修徳太戊退而占之曰桑榖野木不合生于朝意者其凶乎太戊懼修先王之政明養老之禮三年而遠方重譯而至者七十六國甲子二十有一祀史記曰柏翳生子二人一曰大廉實鳥俗氏其𤣥孫曰孟戯中衍帝太戊卜之使御吉遂致使御而妻之自太戊以下中衍之後遂世有功以佐殷國新序曰大業之後其趙氏乎夫自中行衍皆嬴姓也中行衍降佐太戊皆有明徳七十有五祀王崩廟號中宗子仲丁踐位書無逸曰昔在殷王中宗嚴恭寅畏天命自度治民祇懼不敢荒寧肆中宗之享國七十有五年己未仲丁元祀祝氏經世解曰運卦節歲卦明夷故戊午而中宗崩己未仲丁立明夷臨仲丁遷于嚻甲子六祀遷于嚻經世係之初立之年但太戊方崩仲丁未必遽遷也今以例附甲子之紀祝氏經世當歳升䝉書序曰仲丁遷于嚻作仲丁嚻史記作隞今河南敖倉在孟州河隂藍夷作宼東漢書曰至仲丁藍夷作宼自是或服或叛三百餘年十有三祀王崩國内亂弟外壬立壬申外壬元祀十有五祀王崩國復亂弟河亶甲立丁亥河亶甲元祀徙居相書序曰河亶甲居相作河亶甲相今相州大紀曰王之世遷都于相九祀王崩子祖乙踐位史記曰河亶甲時殷復衰丙申祖乙元祀圯于耿徙居邢巫賢為相書序曰祖乙圯于耿作祖乙耿在河中龍門縣經世曰祖乙踐位圯于耿徙居邢巫賢為相邢今邢州龍岡縣大紀曰王之世遷都于耿為水所圯王懼以巫咸之子賢為相諸侯賔服天下大和祝氏經世解曰祖乙之禍却不在卦乃後天之後二十四運之窮蓋七百二十年之將終生祖乙之末十有九祀王崩子祖辛踐位周書曰在祖乙時則有若巫賢史記曰祖乙立殷復興巫賢任職祖乙崩子祖辛立乙卯祖辛元祀甲子十祀十有六祀王崩弟沃甲立辛未沃甲元祀二十有五祀王崩國亂祖辛之子祖丁立丙申祖丁元祀甲子二十有九祀三十有二祀王崩國亂沃甲之子南庚立戊辰南庚元祀二十有五祀王崩國亂祖丁之子陽甲立癸巳陽甲元祀太史公曰帝陽甲之時殷衰自仲丁以來廢適而更立諸弟子諸弟子或爭相代立比九世亂於是諸侯莫朝胡氏曰仲丁字誤當作沃丁説見前經世曰陽甲立諸侯不朝七祀王崩弟盤庚立庚子盤庚元祀遷于殷改號曰殷經世曰盤庚立復歸于亳改號曰殷盤庚上篇曰盤庚遷于殷民不適有居殷在河南偃師所謂亳殷蓋西亳也遷于殷則宗廟朝市皆已改造但民未肯徃有其居耳率籲衆慼出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顚木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方此盤庚喻民之大旨也籲呼也衆慼民之以遷為憂者也五邦亳嚻相耿邢也史記經世皆謂盤庚自五遷者蓋信書序之誤也由古文作甹木生條也蘖芽也新邑殷也大意謂自我先王祖乙圯耿既來遷于兹舊邑矣重念我民又懼蕩析之患不可使之盡墊溺以死又其土俗不美不能胥與以正而生此所以必遷之意而卜以稽之所言亦如我意則天意可知矣昔先王凡有事為無不謹承天命猶不能常安於一邦不常其邑者至今凡五遷矣今不承前日先王之事去患即安則罔知上天之斷絶我命矣况能從先王之大功烈乎若我商家猶有生意則天其永我命于兹殷新邑於以紹復先王之大業而底綏四方乎蓋殷與亳皆在河南為天下中而京師者四方之本故云然盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸箴上文喻民之辭明矣然率籲衆慼蓋不欲遷者皆在位者訹之其有苦於蕩析而言遷者則又在位者蔽之故盤庚於此謂教民必由乃在位正其源也曰無或敢伏小人之攸箴防其蔽也常舊之服蓋先王遷都故事正其法度者今日遷都規模也王命衆悉至于庭王若曰格汝衆予告汝訓汝猷黜乃心無傲從康衆羣臣也汝猷黜乃心者此藥羣臣心術之病無傲者警羣臣氣習之悍從康者則謂其不遷之情也此二語一書之綱領蓋自沃丁来比九世亂其羣臣故家習為驕蹇不恭王事又利瀕河之地沃饒自豐此二語盖正其本爾古我先王亦惟圖任舊人共政王播告之脩不匿厥指王用丕欽罔有逸言民用丕變蔡氏曰盤庚言先王亦惟謀任舊人共政王播告之脩則奉承于内而能不隱匿其指意故王用大敬之宣化于外又無過言故民用大變此所謂舊人蓋世族舊家之人非謂老成人也阻遷都者皆世臣舊家之人下文人惟求舊一章可見今汝聒聒起信險膚予弗知乃所訟非予自荒兹徳惟汝含徳不惕予一人予若觀火予亦拙謀作乃逸蔡氏曰今爾在内則伏小人之攸箴在外則不和吉言于百姓聒聒多言以罔衆聽凡起信於民者皆險陂膚淺之説我不曉汝所言果何謂也非我輕易遷徙自荒廢此徳惟汝不宣布徳意不畏懼於我耳我視汝情明若觀火我亦拙謀不能制命而成汝過失也若網在綱有條而不紊若農服田力穡乃亦有秋綱舉則目張以喻下從上申前傲上之戒力穡則有獲喻勞遷永逸申前從康之戒汝克黜乃心施實徳于民至于婚友丕乃敢大言汝有積徳申前黜乃心之戒不仁者以其所不愛及其所爱當時在位之臣其婚姻僚友皆富貴巨室也占膏腴之地擅富貴之饒享安居觀遊之樂在位之臣顧婚友之利而忘蕩析之民以故唱為異議而不知遷焉抑不思大水時至都邑淪流人民漂没而爾之婚姻僚友其將焉徃故必黜爾重遷之心而以計安斯民為心都邑既定百姓安居則爾之婚姻僚友亦得以同其樂矣其可牽於私愛而第為目前計哉乃不畏戎毒于遠邇惰農自安不昬作勞不服田畆越其罔有黍稷戎大也昬强也當作敃蔡氏曰汝不畏沈溺大害於遠近而憚勞不遷如怠惰之農不强力為勞苦之事不事田畆安有黍稷之可望乎此章再以農喻申言從康之害汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于箴言其發有逸口矧予制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟汝衆自作弗靖非予有咎蔡氏曰奉承恫痛憸民小民也逸口過言也逸口尚可畏况我制爾生殺之命可不畏乎恐謂恐動之以禍患沈謂沈陷之於罪惡不可嚮邇其猶可撲滅者言其勢焰雖盛而殄滅之不難也靖安咎過也則惟爾衆自為不安非我有過也此章反覆申言傲上之禍遲任有言曰人惟求舊器非求舊惟新蔡氏曰遲任古之賢人人舊則習器舊則敝當常使舊人用新器也按盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云爾古我先王暨乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非徳蔡氏曰世非一世也勞勞于王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善兹我大享于先王爾祖亦以功而配食於廟作福作災皆簡在先王與爾祖父之心我亦豈敢動用非徳以加汝乎愚按非罰非所當罰徳恩也非徳非所當恩賞者也盤庚於世家舊臣固不敢動用非罰矣但其善者則用之而不掩其不善者乃古我先王之所必罰則亦不敢動用非徳恩非所當恩也人主用捨體神理之災福如何爾至篇末皆此意予告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽予一人之作猷蔡氏曰難言謀遷徙之難也蓋遷都固非易事而又當時臣民傲上從康不肯遷徙然我志决遷若射者之必於中有不容但己者弱少之也意當時老成孤幼皆有言當遷者故戒其老成者不可侮孤幼者不可少之也爾臣各謀長遠其居勉出汝力以聽我一人遷徙之謀也無有遠邇用罪伐厥死用徳彰厥善邦之臧惟汝衆邦之不臧惟予一人有佚罰此承上文之意謂不論近遠親疎用罪則伐之至於死非可輕用也用徳則彰其善而已非可以不善而倖恩也故邦之臧則惟汝衆之善邦之不臧則我一人之失罰蓋可罰而不罰也然則我亦將有不可不罰者矣故下文有罰及爾身弗可悔之戒凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告者使各相告戒也自今以徃各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也總篇内傲康險膚浮言之戒中篇曰盤庚作惟渉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭王庭行次之庭猶今云行宮周禮梐枑再重車宮轅門商制又簡質於此咸造勿䙝氣象可想盤庚乃登進厥民曰明聽朕言無荒失朕命嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時保衛也胥慼相與憂其所憂也浮先也此節言君民相體一篇大意殷降大虐先王不懐厥攸作視民利用遷汝曷弗念我古后之聞言上天降監于殷代有河决之患先王不敢懐居其所以遷者無非體民所利此爾民所聞也何不思之承汝俾汝惟喜康共非汝有咎比于罰予若籲懐兹新邑亦惟汝故以丕從厥志今予將試以汝遷安定厥邦承順也俾使之遷也康共康寧之樂上下同之也籲口所告懐心所思也謂今日非以遷汝為罰所以區區惟新邑是圖者亦惟爾民之故去危就安將以大適爾之志耳此節言君之體民汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乗舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上困謂思慮之勞也既不知體君心之勞又不直以所疑告於上祗自取窮苦何由自觧今已遷徙半塗若次且不行如乗舟弗濟自敗腐其所載之物矣故遷徙之忱不續又復淪胥以敗耳有今謂但為一時之計罔後謂不為後日之謀何以續生理於地上乎此章言民不體君祗以自誤今予命汝一無起穢以自臭恐人倚乃身迂乃心予迓續乃命于天予豈汝威用奉畜汝衆予念我先神后之勞爾先予丕克羞爾用懐爾然一專意於遷無有二志無復動於浮言以自斃也遷徙之時人心渙散姦宄之人易以投隙因汝遷徙之勞迂汝以不遷之見則生理滅矣故我之勉爾所以迓續乃命于天也進爾告之惟懐念爾故如此按此節言我之體民亦體先王之意失于政陳于兹高后丕乃崇降罪疾曰曷虐朕民陳久也謂不遷也崇厚也此節言君不體民之罪汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽徳自上其罰汝汝罔能廸爽亂也廸猶啓告也此節言民不體君之罪古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死戕害也汝有害政之念則在爾心耳而先后祖父已得而罰之所謂思慮一啓鬼神已知者也此節言君民相體之久以申明民不體君之罪兹予有亂政同位具乃貝玉乃祖乃父丕乃告我高后曰作丕刑于朕孫廸高后丕乃崇降弗祥商俗尚鬼故盤庚因其所畏以警之然福善禍淫理蓋如此此節言臣不體君體民之罪按漢石經弗祥作不祥蓋古文尚書凡弗不皆作並不字本平聲今讀入聲亦當音弗耳嗚呼今予告汝不易永敬大恤無胥絶遠汝分猷念以相從各設中于乃心古文尚書猷念作繇古字猷攸通用猷念所念耳分石經作比設中石經作翕中於義為長此節勉其體君乃有不吉不廸顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑遷徙之際服食器用子女臣妾皆寓道路不善不道之人易為姦宄盗竊之行此不可不防故痛警之按左氏引此文大同小異稱盤庚之誥然則今書篇目逸之誥二字爾徃哉生生今予將試以汝遷永建乃家下篇曰盤庚既遷奠厥攸居乃正厥位綏爰有衆曰毋戯怠懋建大命今予其敷心腹腎腸歴告爾百姓于朕志朱子謂書傳所云百姓多謂庶民非謂百官族姓也此篇凡二章前章告民後章告臣罔罪爾衆爾無共怒協比讒言予一人古我先王將多于前功適于山用降我凶徳嘉績于朕邦此章謂亳殷之地高爽依山古我先王將恢大前人之烈是以建都于亳用降我凶徳猶傳所謂有汾澮以流其惡國語所謂沃土民不才瘠土民好義之意盖消斯民沈溺重墜之疾而絶後世驕奢淫侈之風也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝將復我高祖之徳亂越我家朕及篤敬恭承民命用永地于新邑謂今日之遷亦天意將復我祖徳以治我王家而我及奉承之耳肆予沖人非廢厥謀弔由靈各非敢違卜用宏兹賁蔡氏曰沖童弔至由用靈善也宏賁皆大也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾盖盤庚於既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既徃之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉愚按此章以上喻民嗚呼邦伯師長百執事之人尚皆隱哉殷制五官之長曰伯是職方所以謂之邦伯此章以下喻臣予其懋簡相爾念敬我衆朕不肩好貨敢恭生生鞠人謀人之保居叙欽今我既羞告爾于朕志若否罔有弗欽無總于貨寳生生自庸式敷明徳永肩一心蔡氏曰相導也我懋勉簡擇導汝以念敬我之民衆也肩任敢勇也鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則叙而用之欽而禮之也羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也無毋同總聚也庸民功也此則直戒其所不可為勉其所當為也式敬也敬布為民之徳永任一心欲其久而不替也盤庚篇終戒勉之意一節嚴於一節而終以無窮期之鄭康成曰祖乙居耿以後奢侈踰禮土地廹近山川常圯焉至陽甲立盤庚為之臣乃謀徙居湯舊都民居耿久奢淫成俗故不樂徙王肅曰自祖乙五世至盤庚元兄陽甲宮室奢侈下民邑居墊隘水泉潟鹵不可以行政化故徙都于殷世紀曰耿在河北廹近山川自祖辛以来民皆奢侈故盤庚遷於殷唐孔氏曰三者之説皆言奢侈鄭氏既言君奢又言民奢王肅專謂君奢皇甫謐專言民奢言君奢者以天子宮室奢侈侵奪下民言民奢者以豪民室宇過度逼廹貧乏皆為細民弱者無所容居欲遷都改制以寛之富民戀舊故違上意不欲遷也按孔傳之意蓋以地勢洿下又久居水災水泉潟鹵不可行化故欲遷都不必為奢侈也此以君名名篇必是為君時事而鄭氏以為上篇是盤庚為臣時事何得輙謬也愚按鄭氏博極古書當必有据意者陽甲之世盤庚相之嘗議遷矣而陽甲卒不果故盤庚立遂决遷焉至謂上篇作於陽甲之世則誤爾蘇氏曰民不悦而猶為之先王未之有也祖乙圯于耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚徳之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆信反復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復興也後之君子厲民以用者皆以盤庚藉口予不可以不論大紀論曰自祖乙都耿之後三世有兄弟爭奪之禍宗族群下各有黨與蕩析離居罔有定極盤庚欲正名而誅罰之則傷親親召變亂聽其所為而縱之則不可以為國故必遷於亳理之以舊制參之以新民消散黨與使定于一也自是而後子弟更立十世無復爭奪之禍矣賢者所為盡善盡美如此哉後世人君欲有所為者既不能行其所無事則必更張舊制奬㧞新進沮格羣言誅責貴近以厲其餘矣方事未成則戒慎及事已成則安肆矣方遷之初道路阻長工力勞費有能以財濟國事者則必旌顯之矣此天下所以敗也盤庚三篇有六善焉以常舊服正法度一也圖任舊人二也無或敢伏小人之攸箴三也以人情事理反覆訓諭開導民心使之通曉無纎毫恃尊高憑威勢之意四也奠厥攸居始以無戯怠為戒五也敘欽有徳有謀之人而不肩好貨六也一舉而六善立彌禍亂之根此孔子所以取之訓後世也先儒謂商人尚神愚初疑之及觀湯誥盤庚之文然後知聖人以神道設教非如末世及夷教之妄誕也行妄誕而能成事者未之有也子王子曰土氣有厚薄風俗有盛衰冀之為都天下之形勢也山河險固沃壤廹隘民淳俗儉足以自固後世人民文物漸至繁阜風氣日耗遂自北而南勢使之然也夫契始封於商八遷而後都亳湯以七十里而有天下此興王本根之地後世子孫不可輕去者也是時濱河之地近古帝都地壤土豐民稠物饒人之所共趨亳在中土之東南去河為遠湯始大而未盛子孫無遠慮往往輕徙曰嚻曰相曰耿曰邢皆際河之境常人之心知利而不知患雖數有水禍時圯時壊而不悔者政以厚利奪其避患之心也盤庚賢君也不忍民之沈䧟淪没治亳殷而歸于先王創業之都非為己利也為民避患也故其言告戒諄勤而無一毫怒民之意然小民亦何敢逆君命而憚遷哉皆世家大室嗜利忘患動以浮言蠱惑百姓恐懼盤庚故盤庚知之喻百姓之言少而辯論反覆於世家舊臣者為詳其喻民曰爾謂朕曷震動萬民以遷今我民用蕩析離居罔有定極汝萬民乃不生生予迓續乃命于天予豈汝威用奉畜汝衆藹然溫厚之意淪浹心髓民之浮言烏得不息民之胥怨烏得不消民之生生烏得不裕自是高宗祖甲相繼百年殷邦嘉靖其後武乙復遷河北國内衰弊至紂竟以奢淫而亡是以知盤庚之遠慮絶識豈不賢乎甲子二十有五祀二十有八祀王崩弟小辛立戊辰小辛元祀史記曰小辛立殷復衰百姓思盤庚作盤庚三篇如此則盤庚之書亦追記也未詳是否二十有一祀王崩弟小乙立己丑小乙元祀甲寅二十有六祀􅃎亶父遷于岐改號曰周按遷岐之事據西漢書婁敬傳則古公遷岐下距伐商百有餘年當在廩辛之世據東漢書西羌傳序則古公遷岐又當武乙之時然皆年數促數該事不伸婁敬一時之言計不察察東漢書據竹書竹書載太丁歴年良久與經世厯不同皆不可考惟大紀係之小乙之年蓋以甲紀也下逮克商凡二百年按詩稱爰及姜女聿来胥宇則其時古公太姜之年尚少未有泰伯王季也至稱其治岐之後帝省其山斯㧞斯兑然後作邦作對則始生泰伯王季爾古公年夀甚高故號古公而王季文王皆且百年尚論其世則大紀之年近是今從之世本曰公劉詳見夏紀慶節史記曰慶節居􅃎皇僕差弗偽榆史記作毁隃公非辟方史記缺辟方皇甫氏謂公非字辟方者非高圉國語曰高圉能率稷者也周人報之侯牟史記缺皇甫氏云高圉字者非亞圉左傳注高圉亞圉受殷錫命雲都史記缺皇甫氏以為亞圉字者非漢書表云亞圉弟索隠曰上云辟方侯牟亦皆二人之名太公祖紺史記作公叔祖類世表作祖類皇甫氏云公祖一名祖紺諸盩史記缺路史號太公亶父號古公武王追王太王履祥按世本自不窋鞠公劉至季歴已十七世史記拘於十五王文始平之之数遂謂后稷之子為不窋曾孫為公劉前既缺代又自公非已後缺四世不書皇甫氏不得其説遂以四世為字而組紺又自有四名獨索隠覺其非而不明辯路史已明辯而不斷十五王之説今按公劉之世云周道之興自此而詩京師之名亦始此國語十五王之説自公劉數至文王爾然又安知非祖功宗徳之云周世世修徳者賢聖之君十五作而至文王乎孟子曰昔者太王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市莊子與此文大同小異至史記吳越春秋所記文滋不及矣又曰昔者太王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也茍為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也大雅綿之詩曰緜緜𤓰瓞民之初生自土沮漆古公亶父陶復陶穴未有家室集傳曰民周人也古公號也亶父名也或曰字也後乃追稱太王焉陶窰竈復重窰穴土室也􅃎地近西戎而土寒故其俗如此此亦周公戒成王之詩𤓰之先小後大以比周人始生於漆沮之上而古公之時居於窰竈土室之中其國甚小至文王時而後大也古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇集傳曰走馬避狄難也岐下岐山之下也姜女太王妃也周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹集傳曰周地名在岐山之南膴膴肥美貌堇烏頭荼苦菜飴餳也契所以然火而灼龜者也或曰以刀刻龜甲欲鑚之處言周原土地之美雖物之苦者亦甘於是太王始與邠人之從己者謀居之又契龜而卜之既得吉兆乃告其民曰可以止於是而築室矣或曰時謂土功之時也廼慰廼止廼左廼右廼疆廼理廼宣廼畝自西徂東周爰執事集傳曰慰安止居也左右東西列之也疆謂畫其大界理謂别其條理宣布散而居或曰導其溝洫也畝治其田疇也自西徂東自西水滸而徂東也周徧也言靡事不為也乃召司空乃召司徒俾立室家其繩則直縮板以載作廟翼翼集傳曰司空掌營國邑司徒掌徒役之事繩所以為直凡營度位處皆先以繩正之縮束也載上下相承也言以索束板投土築訖則自下而上以相承載也翼翼嚴正也捄之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝集傳曰捄盛土於器也陾陾衆也度投土於板也薨薨衆聲也登登相應聲削屢墻成而削治重複也馮馮墻堅聲五版為堵興起也此言治居室也鼛鼓長一丈二尺以鼓役事弗勝者言其樂事勸功鼔不能止也廼立臯門臯門有伉廼立應門應門將將廼立冢土戎醜攸行集傳曰王之郭門曰臯門正門曰應門太王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門冢土大社也亦太王所立而後因以為天子之制焉戎醜大衆也起大事動大衆必有事乎社而後出謂之宜皇矣之詩曰皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅集傳曰式廓猶言規模也此謂岐周之地也此詩叙太王泰伯王季之徳以及文王伐宻伐崇之事此其首章先言天之臨下甚明但求民之安定而已彼夏商之政既不得矣故求於四方之國茍上帝之所欲致者則增大其疆境之規模於是乃眷然顧視西土以此岐周之地與太王為居宅也作之屏之其菑其翳修之平之其灌其栵啟之辟之其檉其椐攘之剔之其檿其柘帝遷明徳串夷載路天立厥配受命既固集傳曰明徳謂明徳之君即太王也串夷載路未詳或曰串夷即昆夷載路謂滿路而去所謂昆夷駾矣者也配賢妃也謂太姜此章言太王遷於岐周之事盖岐周之地本皆山林險阻無人之境而近於昆夷太王居之人物漸盛然後漸次開闢如此乃上帝遷此明徳之君使居其地而昆夷遠遁天又為之立賢妃以助之是以受命堅固而卒成王業也帝省其山柞棫斯㧞松柏斯兑帝作邦作對自泰伯王季維此王季因心則友則友其兄則篤其慶載錫之光受祿無䘮奄有四方集傳曰對猶當也作對言擇其可當此國者以君之也泰伯太王之長子王季太王之少子也兄謂泰伯也言帝省其山而木㧞道通則知民之歸之者益衆矣於是既作之邦又與之賢君以嗣其業盖自其初生泰伯王季之時而已定矣於是泰伯見王季生文王又知天命之有在故適吳而不反太王殁而國傳於王季及文王而周道大興也然以泰伯而避王季則王季疑於不友故又特言王季之友其兄者乃因其心之自然而無待於勉强既受泰伯之讓則益修其徳以厚周家之慶而與兄以讓徳之光猶曰彰其知人之明不為徒讓耳其徳如是故能受天祿而不失至于文武而奄有四方也史記曰古公亶父復修后稷公劉之業積徳行義國人皆戴之及它旁國聞古公仁亦多歸之吳越春秋曰古公去邠處岐周居三月成城郭一年成邑二年成都而民五倍其初韋昭曰太姜太王之妃王季之母姜女也有逄伯陵之後也雍錄曰邠在岐西北二百五十餘里自邠而南一百三十里為奉天縣有梁山即所謂踰梁山也渭水在梁山之南循水西上可以達岐詩所謂率西水滸至于岐下也太王都岐在今鳯翔府西五十里是為岐周岐水之南今有周原南五十里又有周城云此為周公采邑也二十有八祀王崩子武丁踐位御批資治通鑑綱目前編卷四
