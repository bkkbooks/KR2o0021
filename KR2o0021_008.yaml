body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷八周成王七年二月乙未王朝步自周至于豐命太保先周公相宅召誥篇曰惟二月既望林氏曰漢志曰周公攝政七年二月乙亥朔庚寅望越六日乙未王朝步自周則至于豐惟太保先周公相宅傳曰於已望後六日乙未成王自鎬京至豐以遷都事告文王廟太保三公官名召公也淮南子曰武王克殷欲築宫於五行之山許氏曰今太行山也周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者廽也使我有暴亂之行則天下之伐我難矣左氏曰武王克商遷九鼎于雒邑史記曰武王徴九牧之君登豳之阜以望商邑武王至於周自夜不寐周公旦即王所曰曷為不寐王曰告女維天不饗殷自發未生於今六十年麋鹿在牧蜚鴻滿野天不享殷乃今有成今我未定天保何暇寐日夜勞來定我西土我維顯服及德方明自洛汭延于伊汭居易毋固其有夏之居我南望三塗北望嶽鄙顧詹有河粵詹洛伊毋逺天室營周居于洛邑而後去按文多不解亦出逸周書又曰成王使召公復營洛邑如武王之意周公復卜申視卒營築曰此天下之中四方入貢道里均它書又曰使有德易以興無德易以亡周官大司徒篇曰以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之鄭司農曰土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然鄭康成曰凡日景於地千里而差一寸地與星辰四遊升降於三萬里之中景尺有五寸者南戴日下萬五千里是以半之得地之中也履祥按二鄭之説本周髀之法詳見周髀算經然天有嵗差故古今日景亦自微差尺有五寸之景周在洛陽漢在陽城唐在浚儀宋在嶽臺三月戊申太保至于洛卜宅召誥曰越若來三月惟丙午朏朱子曰朏明也月三日明生之名林氏曰漢志曰是年三月甲辰朔三日丙午與上既望同意劉諫議曰越與粵同粵若發語聲也來三月猶言明月也越三日戊申太保朝至于洛卜宅厥既得卜則經營傳曰三月五日也葉氏曰周官太卜國大遷大師則貞龜傳曰經營規度其城郭郊廟朝市之位處王氏曰經其南北而四營之也越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成傳曰洛汭洛水之北疏曰庚戌三月七日甲寅三月十一日也庶殷言本是殷民也葉氏曰攻位者闢荆棘平髙下以定所經營之位也乙卯周公至于洛丁巳用牲于郊戊午社于新邑召誥曰若翼日乙卯周公朝至于洛則達觀于新邑營傳曰翼明也疏曰十二日也蘇氏曰遍觀所營也朱子曰按後篇是日再卜越三日丁巳用牲于郊牛二傳曰告立郊位于天以后稷配故牛二越翼日戊午乃社于新邑牛一羊一豕一傳曰告立社稷之位用太牢也社稷共牢疏曰十五日也禮成廟則釁之此其釁之禮與廟有土木之功故郊社先成而釁之朱子曰此間當有告卜語甲子周公朝用書命庶殷侯甸男邦伯召誥曰越七日甲子周公乃朝用書命庶殷侯甸男邦伯即多士之書也蓋以王命為書誥命庶殷故下文召公又曰誥告庶殷越自乃御事謂周公以王命告庶殷又當自治也侯甸男邦伯亦當有書其敘逸出康誥之首其書今梓材多士篇曰惟三月周公初于新邑洛用告商王士惟三月七年之三月也于往也於是周公以三月乙卯至新邑越十日甲子以書命庶殷所謂初于新邑洛也而舊説以為明年之書失之矣周公營洛至成王蒸于新邑命周公留後于洛矣奚為明年而曰初于又何為周公營洛與初政于洛二年之間皆以三月然則謂明年之書者孔氏之失也亦書序誤之也遷洛之意凡二一為土中二為化商召誥之敘以王都為重故不及化商之詳止曰以書命庶殷而多士自為一書云王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天明畏王若曰者周公以王命誥也爾殷遺多士稱之也弗弔不幸之辭也旻天以其仁覆閔下者言之天之喪殷閔民也弗弔大降喪于殷哀商之亡也周實亡商而奚哀之亡商非周之得已也伐商之誓曰豫弗順天厥罪惟鈞聖人全體天德者天欲亡商而周存之是悖德也商周之際天實為之聖人固不得不為也謂不幸旻天降喪于殷我有周受眷佑之命奉將天之明威致王者之罰勑殷命而使之終于帝自天言之曰明威自人言之曰王罰所從言者異而大公至正之理則一弋者繳矢射禽之謂以小國言之非有勝殷之勢以非敢言之非有剪商之心也天以體言帝以心言允罔固亂者謂其無保安之治下民秉為者民心秉彛之理其所以流行發用者也天之理栽者培之傾者覆之畀其治而不畀其不治者天之心善善惡惡即民之心也民之所亡亡之天之於商也天之所亡亡之周之於商也而一毫之私意不與存焉我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤成湯之於夏武王之於殷也其順天應人一也而商士未釋然於此然則成湯之伐夏非耶順其已知而開之也易為力強其未喻而告之也難為言於是以爾成湯之事告之然商之亡也商民思商夏之亡也未聞夏人之思夏何也夏自太康失邦帝相遇篡則夏之衰久矣而商賢聖之君六七作加之管蔡之啓商武庚之稱亂宜民之未服也苦紂之虐而歸周因武庚之亂而思商大抵商民之風聲氣習如此迹其攻位以營洛奔走以就遷非有悍然不服之態也而周家奚為屢告之聖賢之化貴於表裏之交孚凡其有一人一念之未釋然者常人以為緩而聖人以為急也上帝引逸者天生民而立君以安之也故凡天之所以引長人之國者以其能安天下也而有夏不之安則惟帝降格嚮于時夏蓋出災異以警示之也夫天之於君也德則降格而否德則亦降格何也周內史過之言曰國之將興明神降之監其德也將亡神又降之觀其惡也善惡之積皆足以感動天地治亂之際其諸天心之尤可見者與弗克庸帝大淫泆有辭辭者祝史昭告之辭也桀為淫泆而善其辭説矯舉以祭宜帝之罔念聞也仲虺之誥所謂矯誣上天以布命于下帝用不臧式商受命是也是以廢元命降致罰乃命爾先祖成湯革夏而湯以俊民定四方自成湯至于帝乙其間聖賢分量雖有不同大抵皆明其明德憂恤宗祀此則其一代之大略也夫以殷之多先哲王歷年之久亦惟天實佑之在殷王亦罔敢失天之意故施諸天下者周流公溥無不配天其澤也在今後嗣王誕罔顯于天矧曰其有聼念于先王勤家誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰今後嗣王謂紂也天下大姦元惡未有不由人欲之長而天理之蔽者惟紂之誕罔顯于天况能聼念于先王之勤勞有家者乎夫不念祖宗之艱難創造者未有不以位為樂也是以誕淫厥泆罔顧于天理之顯與民之所當敬者夫桀之淫泆猶有辭焉以自釋于天紂為淫泆雖天威之臨民嵒之險弗之顧也故曰桀之弗克庸帝自棄也紂之罔顧自暴也桀紂之惡甚矣皆其自棄自暴為之至於國亡而身為戮可不懼哉商之君其明德者天丕建保乂之其不明于德者天不畀焉自古小邦大邦未有無罪而亡國亦未有無辭而亡人之國商罪貫盈我有周奉辭罰罪而已豈無其故而遂亡商也哉王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告勑于帝惟我事不二適惟爾王家我適豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正前言天之喪殷於是言周之順天以喪殷而及於今日之遷殷也今惟我周王大善順上天之事奉割殷之命夫天之命周以有事于商也豈諄諄然命之乎知化則善述其事窮神則善繼其志周之靈承蓋得於不言之表者矣告勑于帝武成篇所謂告于皇天后土曰有大正于商是也惟我不敢二于天惟爾殷家亦當順乎我豫其曰猶云豈意謂爾殷民大惟無度從武庚以亂非我震動爾多士以遷也禍亂之萌自爾商邑豫亦念天之就殷邦以降大戾于殷者紂死於是武庚死於是何不正如是生乎其地而為良者鮮矣是所以有洛邑之遷也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有册有典殷革夏命今爾又曰夏迪簡在王庭有服在百僚豫一人惟聼用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命朝歌至洛濟河而西故曰遷居西爾非我一人奉行其德而若是喜動惡靜不康寧也時惟天命不可違故朕不敢以後之爾其不可惟我之怨惟爾亦知殷先人典册之所傳革夏之事矣何獨至於周而疑之殷之典册不多見意者革夏之初湯於夏士皆迪簡在王庭而有服於百僚故殷民以是責周也夫以夏士之質直知天固所宜用而豈若殷民之反覆好亂乎故律之曰豫惟聼用德爾德則用之而奚間商周然即其言則其怨周者在身之貴賤非必在商之存亡也使周而富貴之吾知殷民無遺恨矣而周家不爾也夫富貴其人求其服已是利而得商非公也以此示民得無有忘君父而求富貴者乎幾於勸矣謂商天邑以昔王之都也聖人於名言之際猶若此其忠厚慈祥可想矣肆豫敢求爾于天邑商而西之洛者是所以大愛乎爾也非豫有罪時惟天命蓋命德討罪顧天意何如爾夫周之化商也而未嘗不言天人而至于知天則安義命而樂循理商民知此不以頑稱矣王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜昔朕來自奄此多方所謂王來自奄者其時伐淮踐奄各伏其罪時爾四國之民罪皆在死而王皆降減爾民之死命所以明致天罰者不過移爾于洛以離逖爾土使親比臣事于我宗周習為多遜夫移爾遐逖罰之也比事臣我宗多遜化之也遷殷民于洛固所以化之也而小人懷土實離爾居是亦有罪比于罰者與商民固自以為不幸而豈知其為甚幸也哉王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷王曰又曰時豫乃或言爾攸居今豫惟不爾殺惟之為辭明示以恩意也豫惟時命有申於是反覆而告之如此篇之書也今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜洛邑之營固以四方無賔禮之地亦以使爾多士奔走臣我而習為多遜也蓋一舉而業在焉爾乃尚有爾土爾乃尚寧幹止期之以安居樂業也今爾惟時宅爾邑繼爾居期之以永建乃家也敬則循理而行褒賞加焉天之畀矜乎爾也不敬則業廢家亡而身為戮是天之罰之也爾邑者井田之制四井為邑或曰受田於郊受居於邑古者五畝之宅在邑者二畝有半焉殷民之遷洛也其子弟親戚猶有在殷者使爾有幹有年生理遂於兹洛則爾小子亦興起而從爾遷矣蓋寬其懷土念舊之思然亦理勢之必至也王曰又曰之間以多方例求之闕有間矣然多士之末其辭婉而多方之終其辭嚴所以言之時異也若其諄勤反覆之意則同召誥篇曰厥既命殷庶庶殷丕作命侯甸男邦伯書曰梓材惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治曰孔氏傳作王曰封按伏生今文當作周公曰而無封字以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見疑作為厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬疑作矜寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟惟曰若稽田既勤敷災惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命已若兹監惟曰欲至于萬年惟王子子孫孫永保民履祥按梓材之書本出伏生今文而伏生大傳以為周公命伯禽之書及孔安國以所聞伏生之書考定乃以為成王命康叔之書故王介甫吳才老朱子蔡仲默皆疑之以其辭氣非王之自言其辭事非命康叔之事也然吳才老斷自王其效邦君以下非康叔之誥似洛誥之文朱子是之蔡氏斷自今王以下非康叔之誥乃人臣告君之語亦朱子意也愚嘗考之梓材一篇首尾可疑吳氏朱子以為洛誥之文以集庶邦丕享和懌先後迷民皆宅洛之議也夫宅洛之事其總敘見於召誥曰三月惟丙午朏云云甲子周公乃朝用書命庶殷侯甸男邦伯厥既命殷庶庶殷丕作其命庶殷之書即多士之書敘所謂惟三月周公初于新邑洛用誥商王士者也其命侯甸男邦伯亦必有書矣其書安在曰梓材之書是也其敘即康誥之敘所謂惟三月周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治者也蘇氏所謂洛誥之敘也朱子亦嘗以為然夫蘇氏既以康誥之敘為洛誥之敘吳氏又以梓材之文似洛誥之文而朱子皆然之則是前儒之意俱以為宅洛之書矣今以康誥之敘冠梓材之首合為一書豈不昭然明白也哉然則篇首王曰封之語何也曰此非梓材之本文也何以知之以伏生之傳知之也夫梓材之書為周公道王德意以誥諸侯之書故伏生誤以為周公命伯禽之書大傳所説喬梓之事固非梓材之本意然既以為周公命伯禽之書則篇首當有周公曰之語無王曰封之語矣縱王曰之辭容或有之若封之一字決所必無矣此則安國以後誤之也蓋是書也本在多士之前而今文古文躐於召誥之前繼於康誥酒誥之後故其敘誤冠於康誥之首而其文誤衍於酒誥之尾是敘也蘇氏知其不可冠於康誥則不得不歸之洛誥但洛誥乃告卜往復成王往來周公留後之文非咸勤誥治之事而梓材之書其前章皆周公咸勤之意其後章則乃洪大誥治之辭其問辭意亦無不􅀈合焉者左氏曰成王合諸侯城成周以為東都崇文德焉是作洛之際築城攻位為宫室畫郊里必合諸侯各率其卿士大家將其徒衆以受役焉所謂四方民大和會侯甸男邦采衛百工播民和見士于周也周公咸勤則勞來撫恤之也大家如殷民六族殷民七族懷姓九宗之類皆將其醜類從於諸侯以聼役於王室者為諸侯者當以其臣民下通意於大家以其臣上通意於王室承上勞下邦君之常職也故曰以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恆也古者動大衆興大役則司徒率徒衆司空畫土疆司馬以軍法治之君行師從師師者一師之長也即三卿也卿行旅從尹旅者一旅之長即三卿之副也周公喻邦君又欲邦君告其卿大夫曰豫罔暴厲殺人蓋不欲其以軍法從事也然亦必邦君先能敬以勞來其民則自此以往三卿尹旅皆能敬以勞來其民故曰越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞也古者徒役起於夫家丘甸而罪𨽻之人又服役於其下故凡往日姦宄殺人者自有本罪而其所連歷之人古法所謂胥靡今法所謂干連知情藏匿者與為公家之事而並緣傷人者皆入於罪𨽻今既與此大役服勞王事皆與赦除同於良民故曰肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥也凡此優恤赦宥之事皆侯甸邦君之所當承流則又述王啓侯監之言在於為民不在於厲虐故曰王啓監厥亂為民曰無胥戕無胥虐也古者興役動衆孤寡之人無所與不幸而在焉必加優恤之若晉師之歸老疾句踐反耆老之子是也古者徒役之中亦有臣妾如女子入于舂稿之類蓋供樵㸑之役於此亦必優恤之故曰至于敬寡至于屬婦合由以容也則又繼述王教邦君之命皆為恬養之仁而不在他故曰王其效邦君越御事厥命曷以引養引恬也自此以上皆為咸勤之事而又以自古王若兹監罔攸辟結之宅洛之事上承武王定鼎之意而繼志述事以文太平故即作洛之時田里居室器用之事為喻自此以下既字為多故曰惟曰若稽田既勤敷災惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘者此遷洛之議而又述今王惟曰以繼之夫營洛之事一為四方朝貢道里之均故曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享一為殷民密邇王室之化故曰皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命而又終之曰已若兹監惟曰欲至于萬年惟王子子孫孫永保民則乂述王之德意使諸侯皆知之不惟作洛之際敬勞其民而所以為國家久長之計者亦無出於保民者此又召誥之意凡此已上所謂洪大誥治也周家營洛之事總敘于召誥而又各自為書各自有敘其後備召公之誥者則名召誥命庶殷者則名多士侯甸男邦伯者則名梓材述君臣往復之辭成王往來之事周公留洛之册者則總曰洛誥意者周書當有兩大誥前大誥爾多邦一大誥也此乃洪大誥治又一大誥也前既名大誥故此周公道王之德意者不復名大誥而以篇內梓材之語名之爾今以後大誥之敘逸在康誥後大誥之文名為梓材者合為一篇以既前哲之意而俟後之君子庶幾復見古書之舊云太保作誥召誥篇曰太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公朱子曰傳以為王與公俱至洛下見王無事故諸侯公卿並覲于王以下篇告卜事觀之恐不然也又云公至洛皆書其日以謹之不應詳臣略君如此陳氏以為旅陳也成王在鎬而諸侯在洛以幣陳于王以及周公者周公攝王事故也葉氏曰禮諸俟朝于廟事畢出復束帛加璧入享謂之幣既致于王復奉束帛以請覿大夫之私相見也亦謂之幣君臣不同時今旅王及公非常禮也吕氏曰洛邑事畢周公將歸宗周召公因陳戒成王乃取諸侯贄見幣物以與周公且言其拜手稽首所以陳王及公之意蓋召公雖與周公言乃欲周公聯諸侯之幣與召公之誥達之王履祥謂周公在洛既以王命誥庶殷及諸侯召公將陳戒于王故亦因公以達故曰旅王若公此亦事從其長不敢専達之意也誥告庶殷越自乃御事蔡氏曰欲誥告殷民其根本乃自爾御事不敢指言成王謂之御事猶今稱人為執事也朱子曰王時在鎬豈亦如告卜既吉而後遣使奉幣具此辭以告之與嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬朱子曰元子者天之元子陳氏曰元子不可改而天改之大國未易亡而天亡之天命之無常如此今王受天命誠無疆之福然亦無疆之憂也此數句者一篇之大指也天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德朱子曰遐逺也遐終者去而不返之辭瘝病也籲呼也天既絶殷命矣此殷之初多先哲王謂湯至武丁賢聖之君六七作也雖死而其精神在天故能保佑及其後王後民使之服其命而不替其後至紂之時賢聖之人退藏病民之人在位其民困於虐政痛而呼天往而逃亡出見拘執天哀下民故眷命於能勉敬者以代殷位而周家受之故王不可不疾敬德恐無以承天眷命又將如紂也朱子發云人之死各返其根體魄隂也故降而在下魂氣陽也故升而在上則無不之矣衆人物欲蔽之故魄散而氣不能升惟聖人清明在躬志氣如神故其死也精神在天與天為一葉氏曰智藏瘝在言至紂而愚其智則藏而獨病民之心存也籲和也言祈和於天也此與舊説不同履祥按此章監殷之休與其恤天哀民而眷周其命方懋不可不敬以保之相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命朱子曰此一節間有不可曉處舊説有夏敬德故天道降格以保之面向也稽考也若順也嚮天所順而考其意也皆未知是否然亦不害大意言既監于殷又當逺觀有夏歷代廢興存亡之迹不過敬德順天則天保佑之後王不敬故墜其命也履祥謂此章監二代之休與其恤面稽天若謂其天脊方隆之時天意若可面質而今皆墜命天眷之難保如此今沖子嗣則無遺夀耉曰其稽我古人之德矧曰其有能稽謀自天朱子曰已陳夏商敬德墜命所由又戒王也王氏曰勿棄老成而考古人之德則善矣况曰能考謀自天則又善也陳氏曰老成人多識前言往行故考古人之德必資老成稽謀自天言觀天命所去就則知敬德之不可緩矣履祥謂惟老成之人能稽古已不可遺况其能稽天意乎嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞蘇氏曰王雖幼國之元子也其大能以諴感民矣當及今休其德不敢後者疾敬其德不敢遲也用顧畏于民碞者碞險也民猶水也水能載舟亦能覆舟物無險于民者矣或曰元子謂天之元子也履祥按此二節勉王敬德之事敬老敬民其實也王來紹上帝自服于土中朱子曰言王今來居洛邑繼天為治服事也土中洛邑為天下中也林氏以此句王來為王亦至洛邑之驗恐未必然但王命來此定邑耳履祥謂此亦勉王來宅洛之辭旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休朱子曰稱周公言當作大邑而自此以祀上帝以及慎祀上下神祗又自此居中以為治則是王受天成命以治民矣蓋召公述周公宅洛之意履祥謂召公因周公以達王言于周公曷名之蓋君前臣名將達於王雖公亦名之此言今日之休王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德林氏曰周王遷殷頑民于洛蓋與洛之舊民雜居其善惡之習不同倘非有以和一之不能相安以處故必有以服殷御事使之親比介助於周之御事然後可蓋周御事習於教令無事於服之故以服殷御事為先也然服殷御事在節其性而已蓋人性無不善殷人特化紂之惡是以不義之習遂與性成而忘返爾上之人有以節之使之日進于善則與周人亦何異哉然欲節民之性又在王之所化故王又當敬為其所不可不敬之德以率之非政刑所及也或曰服亦事也猶任也任殷人為御事使之佐我周之御事蓋欲其共事相習以成善且使上下通情易以行化然後有以節其性而日進於善王則惟作所不可不敬德以率之而已履祥按化商乃今日之恤不可不敬德我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功王氏曰言夏殷所受天命歷年長短我皆不敢知也我所敢知者惟不敬厥德乃早墜命也陳氏曰召公言我王嗣二代而受命我亦惟以此二國長短之命告于王而繼其功蓋欲王之敬德也履祥按此謂繼二代而受命當繼二代所以有休美之功者不可踵其所以亡也王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年朱子曰王之初服不可不慎其德猶子之初生不可不慎其所習蓋習于上則智習于下則愚矣故今天命正在初服之時敬德則哲則吉則永年不敬則愚則凶則短祚也知今我初服宅新邑肆惟王其疾敬德王其德之用祈天永命朱子曰天無一物之不體已知我初服宅洛矣王其可不疾敬德哉所以祈夭永命者只在德而已矣履祥按此二節應前章謂天之命其休否不可知我所知者王初服新邑惟疾敬其德以德保天而已其惟王勿以小民淫用非彛亦敢殄戮用乂民若有功其惟王位在德元小民乃惟刑用于天下越王顯蘇氏曰商俗靡靡其過用非常也久矣召公戒王勿以小民過用非常之故亦敢於法外殄戮以治之蓋民之有過罪實在我及其有功則王亦有德何也王之位民德之先倡也如此則法行於天下而王亦顯矣或曰下文有欲王以小民受天永命以字如以某師之以此戒王勿用此小民淫用非彞而復以殄戮治之也言當正身率下不務刑罰其下乃與蘇説同葉氏曰刑儀刑也上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命蘇氏曰君臣一心以勤恤民庶幾王受命歷年如夏殷且以民心為天命也陳氏曰小民之心歸則受天永命矣林氏曰王其能敬德于上而小民儀刑于下則天永命之矣所謂用小民以受天命也履祥按此篇旅王若公所以欲其上下勤恤拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯蘇氏曰庶殷雖已丕作然召公憂其間尚有反側自疑者故因其大和會而協同之讎民殷之頑民與三監叛者友民周民也百君子者殷周之賢士大夫也自今以往殷人周人與百君子皆同保受王之威德王當終受天之成命以顯于後世林氏曰讎民百君子猶頑民而謂之多士也我非敢勤惟恭奉幣用供王能祈天永命蘇氏曰我非敢以此為勤勞也奉幣以贊王祈天永命而已王氏曰奉幣以供王毖祀上下而祈永命履祥按此末章旅王之辭洛誥篇曰洛誥篇內非一時之言周公拜手稽首曰朕復子明辟王如弗敢及天基命定命豫乃胤保大相東土其基作民明辟此以下周公授使者獻圖卜之辭也復反命也又如有復於王者如願有復也之復蓋告也後儒遂謂周公攝王至此復辟為王莽篡漢張本可謂繆矣基命定命謂定都配天所以基天命於始而定天命於後也王如弗敢及謂王謙退如不敢預此而使豫繼太保相宅於東土之洛自此建立基址以為君臨天下之地也豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜卜黎水卜澗東瀍西舊云卜王城卜瀍東舊云卜下都下都者以處殷民也按召公以戊申之朝至洛卜宅則王城為已卜厥既得卜則經營則卜之為已吉後七日而周公至又已達觀于新邑營矣遷都至重質神明至肅已營而卜澗瀍定洛而卜河朔召公卜之周公又改卜之聖人不爾為也召公戊申之所卜卜王城也周公乙卯之所卜卜下都也先卜河朔以殷民懷土遷焉者便也且自黎入河自河入洛其地亦不為逺既而三者皆不吉而為洛之食食者卜龜之時史先定墨而灼之正食其墨也召公卜王城於洛吉矣周公卜下都而亦惟洛之吉則是洛邑之地利於君亦利於民真王者之都與圖者召公攻位之圖卜者周公食洛之兆或曰作洛之事周公主之召公不敢専達凡周公所獻圖及卜即召公之卜而周公逹之王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言此王授使者復公之辭也拜手稽首尊周公也吕氏曰宅土中而作大邑天之休命也周公之來相宅乃敬天之休命非出於己私也曰敬天之休足矣而曰不敢不敬益明見天命之當然而不敢不然也見之明而後畏之篤周公之於天命也知之深然後言之力成王之於周公也知周公則知天矣敬天之休而相宅所以為周配答上天之休也休常之吉成王期與周公共當之於周公不敢臣也故曰我二人然其以成王享歷年敬天之休則公也以猶春秋師能左右之曰以周公親則叔父職則大臣流言之變可以去矣而東正來歸之後可以間矣而作洛周公非固好為之畏天命也畏天命故不敢不為也周公曰王肇稱殷禮祀于新邑咸秩無文此下乃周公率百工迎成王於周以居洛而告之也觀豫齊百工伻從王於周與惟以在周工往新邑之辭可見王氏曰殷盛也如五年再殷祭之殷周公既制禮作樂而成王於新邑舉盛禮以祀凡典籍所無而於義當祀者咸次秩而祀之也朱子曰自此以下漸不可曉蓋不知是何時所言豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往此百工即作洛時見士之百工也周公整齊百官使從王于周蓋欲成王躬率百官往洛邑也周公教羣臣事君之道惟曰庶盡其所有之職事耳不當自以為有功也然在王則當即命之曰記功宗以功作元祀蓋於元祀之時以其有功者告于神明所謂銘於太常藏在盟府者也惟與也乂命之曰汝受君命益當加厚於輔贊之事而視此記功之籍不可自隳前功也蓋於羣臣使其以有功見知為喜而又戒其恃功勉其保功此成王之所以悉自教工也朋友之也謂友羣臣也其往謂往洛邑也後漢書引此作慎其往無若火始𦦨𦦨厥攸灼敘弗其絶厥若彝及撫事如豫𦦨小明也此戒其以明察自用也火始𦦨𦦨自是彰灼次第不可撲遏人君以小明自用機熟而日熾則不可救矣故王之順若彛常及其撫治政事皆當如豫不可聰明亂舊苛察生事也惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭周公欲王以所從于周之百工率之以往新邑使嚮往即就其僚采之事浚明奮揚以成其功而惇厚圖大以裕其俗則成王其永有辭於後世矣蓋建都之始治體風俗於是關係勵精者乏寬大之體而寬大者少振勵之功二者兼之於振勵奮發之中有優柔寬大之意此一代治體之所以為全美而成王之所以永有辭於世也王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀此成王答周公祀于新邑及教王撫事明作有功等語舊本類附于後章之下今附于此王意謂公明保豫沖子舉大明之德以我對揚文武之功奉答上天之命和久四方之民而居宅洛師加厚功宗之大禮以稱秩元祀咸秩無文至於教工撫事明作有功等事則惟公德之明光著于上下勤施于四方而旁達之人皆作興和敬以迎治平皆曉然知文武之所勤教耳豈豫沖子所能及哉豫但夙夜齋戒毖謹奉祀而已其餘非我所能及也公曰己汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聼朕教汝于棐民彞汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾此周公答成王沖子毖祀之説而又教成王以統御諸侯教養其民之道也舊本在汝永有辭之下今附于此蓋成王於是年既長矣而以沖子退托自居故周公告之曰己者欲其勿為退託也汝為沖子亦既長矣當思終之之責夫有天下宅土中朝諸侯必知諸侯之誠偽而後黜陟各當其知之者無他術亦曰敬而已矣享獻也凡諸侯朝貢於天子謂之享有者或有之辭也其或有不享非不供職貢之謂也諸侯貢享之禮視其秩固有定數但其時拜跪升降揖遜俯仰其儀為多使其於儀不及其物是謂不享蓋其輕傲存於中則惰容見於外惟諸侯不用心於享上故國人化之亦將曰不必享於天子矣舉國不知有天子則其施之政事必有爽亂王度而侮蔑禮法者此識察諸侯之要也天下之事無窮聖人之心不已周公固有施行未及者而平日所以告成王棐輔民彛之道固亦甚悉也故於此又勉成王以頒我所不暇者聼我所教輔民彛者於此二者而不勉則非所以為長國計也乃正父武王也周公平日惟篤厚繼敘武王之事在成王亦能如此則天下不敢廢乃命矣王往洛邑其敬之哉我其退休田野惟明農事王其往彼洛邑寬裕我民則無逺而皆至矣蓋京師天下之本寬裕之政行焉則四方歸之不待言者吕氏曰武王殁周公如武王天下所以不廢周公之命周公去成王如周公天下所以不廢成王之命也王曰公功棐迪篤罔不若時此答周公之辭與明農之請謂公之功已至然所以輔導于者願益加厚罔不如今日未可去也朱子曰此下疑有缺文王至新邑十有二月蒸于文武命周公其後王歸宗周洛誥曰王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔洛誥自此以下疑皆成王在洛之言上下必有缺文迪亂謂向進於治也宗禮即謂周公所制六典禮制猶未定也敉公功謂久安於公之成效而不變也迪將向導而大之二後字皆謂王歸周留公於後以治洛也朱子謂與唐留後之後同義王命周公謂豫小子其自洛退即君于周而命公在後以治洛蓋洛邑天下中四方方向導於治而周公所制之禮尚未底定則人心亦豈能久安於公之已效而不變乎公其開導而將大之其在後監我多士與師衆與百工誕保文武受民治為四方之輔朱子曰四輔猶四鄰也王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享朱子曰此王與公訣而歸之言也公定居洛豫往歸周蓋公之功人心方肅而迎之祇而説之公無困我而求去使我不勝其任也然我亦惟無怠其所以康乂之事公但勿替其所以儀刑百辟者則四方其世享公之功矣吳氏曰前漢書多引公無困我當是周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德此周公許成王留之辭也謂王命豫來此洛邑承保文祖及乃光烈考武王受命之民且益大我以恭敬其事此答上文誕保文武受命民之語也孺子來視宅洛之新規增重周官之制加厚殷獻臣之賢其治為四方之新辟為周家敬德之始王蓋定都之初觀望一新故謂之新辟而始遷之君亦後世之所倡始故謂之恭先曰其自是宅中出治萬邦咸休則為王之成績蓋成王雖歸周然洛邑為東都則朝覲會同政令皆出於此王但不常居耳故周公以自時中乂望之若豫以此多子衆卿大夫及凡治事之臣增厚前人之成烈以答天下之衆望為周家誠臣之首成我明辟儀刑天下之道益殫盡文祖之德使無未盡之事此答勿替刑等語也伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德此又述成王命留之禮而周公以告於文武也蓋成王既面留周公又使人以留公之意告殷民而以秬鬯二卣錫公安定於洛邑蘇氏謂黑黍為酒合以鬱鬯所以祼也宗廟之禮莫重於祼王使人來告諭庶殷且以秬鬯綏寧周公曰明禋曰休享者何也事周公如事神明也古者有大賔客以享禮禮之酒清人渴而不飲肉乾人飢而不食也故享有體薦豈非敬之至者則其禮如祭也與然周公則不敢當此禮故不敢宿宿肅也則以此二卣禋于文武而為成王祈福其辭若曰惠徼篤厚繼敘之福使王無有疾厲使子孫萬年厭飽乃文武之德殷民亦長有化成之效王其使殷民承順治敘雖萬年之逺其永觀化懷德此蓋祈治洛化商之福歸之成王也戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後王賔殺禋咸格王入太室祼王命周公後作册逸誥在十有二月戊辰十二月日也王至洛或久戊辰祭告爾蒸者每嵗冬常祭也牲用騂周尚赤也此為周公留後於洛故不用太牢常禮而各以特牲逸史逸也成王時大典册皆史逸為之此祝册所告惟告王歸周而周公在後治洛餘無他辭賓迎也謂迎牲也禋精意以享也咸格諸侯羣臣皆助祭也太室者清廟中央之室祼鬱鬯以降神也王命周公後者命之於廟也作册逸誥上册祝册也此册册命也逸誥史逸讀册以告公也惟周公誕保文武受命惟七年舊説惟七年者即作洛之年係年於篇終也履祥按洛誥召誥相為始終然惟洛誥之紀散無倫次有周公在洛使告圖卜往復之辭有周公歸周迎王往洛對答之辭有成王在洛留周公于後而歸周之辭有周公為王留洛而相勉敘述之辭然辭從其辭事從其事各以類附而無往來先後之序蓋其月日先後已具在繫年之史故此篇事辭各以類附不嫌於辭雜也然是篇當亦多有缺文錯簡此必伏生口授之訛而安國於錯亂磨滅者又多以伏生之書為定亦或於此失之清廟之頌曰於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯集傳曰言於穆哉此清靜之廟其助祭之公侯皆敬且和而其執事之人又無不執行文王之德既對越其在天之神而又駿奔走其在廟之主如此則是文王之德豈不顯乎豈不承乎信乎其無有厭斁於人也朱子曰書稱王在新邑蒸祭歲文王騂牛一武王騂牛一實周公攝政之七年而此其升歌之辭也書大傳曰周公升歌清廟茍在廟中嘗見文王者愀然如復見文王焉樂記曰清廟之瑟朱弦而疏越一倡而三歎有遺音者矣履祥按不顯不承説者曰豈不顯乎豈不承乎於義不通不字當讀作丕凡詩美辭而加不者皆丕字也如古祝詞曰不顯大神蓋謂丕顯大神也古字通用或傳寫誤也是又當為讀詩者言之逸周書作雒解曰周公敬念于後曰豫畏周室克延俾中天下宗及將致政乃作大邑成周于土中城方千七百二十丈郛十七里南繫于洛水北因于郟山以為天下湊制郊甸方六百里國西土為方千里西土岐周通為圻內分以百縣縣有四郡郡有鄙大縣立城方王城三之一小縣立城方王城九之一郡鄙不過百室以便野事農居鄙得以庶士居國家得以諸公大夫居治也鄙以衆士治國家以大夫得當作治凡工賈市臣僕州里俾無交為不相雜交也乃設丘兆于南郊以祀上帝配后稷日月星辰先王皆與食諸侯受命于周乃建太社于國中其疆東青土南赤土西白土北驪土中央黃土凡將建諸侯則鑿取其方一面之土苞以黃土苴以白茅以為土封故曰受削土于周室苞覆苴裹土封封之為社也乃立五宫太廟宗宫考宫路寢明堂咸有四阿反坫重元據注元字下合有重廊二字重常復格藻稅移旅盈蠢常畫宫廟四下曰阿反坫外向室也重元纍棟也重廊纍屋也常纍係也復格三襦也藻梲畫梁上之柱也丞屋曰移旅别也蠢謂藻井之飾也言皆畫列柱為之也內階玄陛堤塘山牆以黑石為階塘中庭道堤謂為髙之也牆謂畫山雲應門庫臺玄間門者皆有臺於庫門見之從可知矣又以黑石為門限八年周公分正東都命蔡仲邦之蔡蔡仲之命篇曰惟周公位冡宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡蔡氏曰周公位冡宰正百工武王崩時也郭鄰孔氏曰中國之外地名蘇氏曰郭虢也周禮六遂五家為鄰管霍國名武王崩成王幼周公居冡宰百官總已以聼者古今之通道也當是時三叔以主少國疑乘商人之不靖謂可惑以非義遂相與流言倡亂以搖之是豈周公一身之利害乃欲傾覆社稷塗炭生靈天討所加非周公所得已也故致辟管叔于商致辟云者誅戮之也囚蔡叔于郭鄰以車七乘囚云者制其出入而猶從以七乘之車也降霍叔于庶人三年不齒三年之後方齒録以復其國也三叔刑罰之輕重因其罪之大小而已仲叔之子克常敬德周公以為卿士叔卒乃命之成王而封之蔡也周公留佐成王食邑于圻內圻內諸侯孟仲二卿故周公用仲為卿非魯之卿也蔡左傳在淮汝之間仲不别封而命邦之蔡者所以不絶叔于蔡也封仲以他國則絶叔于蔡矣吕氏曰象欲殺舜舜在側微其􅊣止于一身故舜得遂其友愛之心周公之位則係于天下國家雖欲遂友愛于三叔不可得也舜與周公易地皆然史臣先書惟周公位冢宰正百工而繼以羣叔流言所以結正三叔之罪也後言蔡仲充庸祗德周公以為卿士叔卒即命之王以為諸侯以見周公蹙然于三叔之刑幸仲充庸祗德則亟擢用分封之也王若曰小子胡惟爾率德改行克慎厥猷肆豫命爾侯于東土往即乃封敬哉胡名仲字言仲循文祖之德改蔡叔之行能謹其所行之道故侯爾于東土仲往之國益當敬之吕氏曰命書之辭雖稱成王實周公之意爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彞訓無若爾考之違王命此又因其率德改行而加勉之蓋前愆孝也順王命忠也常言孝則可以移忠為蔡仲言忠則可以為孝違王命蓋自流言之後成王既知周公之德必有戒諭之命而管蔡卒挾武庚以叛也皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉上文言其改行而已此又推廣之言天人之向背靡常而善惡之事幾亦衆凡不善之事皆足以為亂非但不為蔡叔之為亦非但如今日之所為而止也慎厥初惟厥終終以不困不惟厥終終以困窮上言治亂此言差失亦推言邁迹垂憲之意懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民蔡氏曰五者諸侯職之所當盡也率自中無作聰明亂舊章詳乃視聼罔以側言改厥度則豫一人汝嘉中則無過不及本聰明者舉動必中自不亂舊非聰明而強為聰明者必以妄作為智此其所以亂舊章也厥度即舊章作聰明者以私意亂之以側言者聽人言改之人言之側非視聼詳審不可而詳視聼者亦惟無作聰明者能之王曰嗚呼小子胡汝往哉無荒棄朕命大紀曰八年蔡仲之國過洛見周公周公曰不如吾者勿與處纍我也與我齊者勿與處無益我也惟賢于已者可與處也履祥讀蔡仲之命與棠棣之詩未嘗不悲周公之意也嗟夫周公亦幸有蔡仲耳然命人子以改于其父之惡一言足矣而曰改行曰蓋愆甚而又曰無若爾考之違王命也夫幸之深故憂之切憂之切故言之詳周公閔管蔡之失道固不容再有懿親之變也是以丁寧言之如棠棣之詩自死喪急難甚而至于鬪鬩之事辭愈詳事愈下而感嘆愈深其志切其情哀蓋處兄弟之變其情辭若此觀者蓋當思其言外之意云九年封弟叔虞于唐國語曰董因謂公子重耳曰嵗在大梁將集天行元年始受實沈之星也實沈之虛晉人是居所以興也今君當之無不濟矣君之行也嵗在大火大火閼伯之星也是謂大辰辰以成善后稷是相唐叔以封且以辰出而以參入皆晉祥也而天之大紀也履祥按舊説成王三年封唐叔大紀從之而唐厯志遂言成王三年嵗在丙午星在大火唐叔始封今按諸厯各有短長年數不同武王十三年克商之嵗嵗在鶉火則十六年嵗在大火至成王九年嵗復在大火太初厯間以周公攝位之年則成王九年乃為三年嵗次甲午星在大火此國語所謂嵗在大火是謂大辰唐叔以封也厯志以甲午為丙午二字誤或厯不同爾今係之成王几年子産曰當武王邑薑方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐封大叔焉故參為晉星實沈參神也史記曰唐有亂周公誅滅唐遂封叔虞傳曰成王滅唐遷之於杜史記曰成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐故曰唐叔虞字子干按平王錫晉文侯之命稱先王明事厥辟云云又曰昭乃顯祖則叔虞之賢可知翦桐之封非實録殆不可信秦穆公曰吾聞唐叔之封也箕子曰其後必大衛祝鮀曰昔武王克商成王定之謂成王滅武庚定四國之亂也選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周是使之職事于魯以昭周公之明德分之土田陪敦祝宗卜史備物典䇿官司彞器因商奄之民命以伯禽而封於少皡之墟分康叔以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏飢氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以會王之東搜聃季授土陶叔授民命以康誥而封於殷墟皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏姑洗懷姓九宗職官五正命以唐誥而封於夏墟啓以夏政疆以戎索三者皆叔也而有令德故昭之以分物管蔡啓商惎間王室王於是乎殺管叔而囚蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為巳卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也武王之母弟八人周公為太宰康叔為司冦聃季為司空五叔無官曹文之昭也晉武之穆也曹為伯甸非尚年也按祝鮀言王之封建舉武王成王時事不復論前後其分殷氏諸侯族則或東征以後之事不可考矣十有一年周公在豐作無逸大紀附此年書無逸篇曰周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依人主者小民之主而所處則安逸之地易縱於逸無逸者謂其勿縱于酒色耽樂與遊觀田獵之娛也君子所以無逸者必其先知稼穡之艱難故處安逸之地則知小人之依所以能體恤小民不自縱逸故能致小人之無怨亦足以介吾身之夀康人主而不先知稼穡之艱難則處安逸之地不知小人之依不知小人之依則但知縱一身之欲夫不知小人之依則下致民怨但知縱一身之欲則享年不永此一篇大意篇首舉其端而篇內詳之相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知諺俗語也誕虛誇也皆謂其習為遊談誇誕也視彼小人其父母勤勞稼穡其子尚有不能知者乃逸之時其為不善無所不至况人主處尊安之地乎此周公所以為後嗣王懼而首援此以為戒也周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年無逸本一篇之書周公曰者史臣所加中宗太戊也嚴莊重也寅明肅也嚴恭敬之齊於外也寅畏敬之存於中也天命天所付豫之理也自度以天理為已尺度不敢踰越也此言商中宗之無逸也中宗惟無不敬故自能知小人之依所以治民敬畏而不敢逸凡荒縱怠弛之事皆無之此所以凝固持養能躋上夀享國七十有五年則其年夀蓋可知矣其在髙宗句時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年髙宗武丁也舊勞于外小乙欲武丁習知民事使之處于民間爰暨小人謂於是乃與小人處而知小人之依也亮隂説見説命雍和也所謂言乃歡也嘉謂其教化風俗之美靖謂其安寧富阜之效也至于小大蓋不獨小民無怨凡羣臣在位者皆無怨也此言髙宗之無逸也髙宗惟舊在民間故能知小人之依所以即位之初謹於出令言而小民皆歡在位之間不敢荒寧嘉以美化其民靖以保安其民非惟小人無怨而羣臣上下皆然此髙宗所以無逸於民既無怨而於身遂夀康也其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年祖甲事説見祖甲紀此言祖甲之無逸惟其舊逃民間身為小民之事所以為天子之日能知小人之依而保之惠之尤不敢忽忘窮困之民此祖甲之無逸而享國亦永也詳見前紀自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年此言後王之逸也厥後謂中宗而後髙宗而後與祖甲而後也生則逸謂其生長於安逸之中也惟其生則逸所以不知稼穡之艱難惟其不知稼穡之艱難所以不知小人之依惟其不知小人之依所以惟耽樂之從惟其荒於耽樂所以傷生伐性罔或克夀夫不知小人之依而惟耽樂之從此亂亡之所必至亦以享年之促而僅免耳或疑年夀之修短命也周公以是為逸與無逸之由不已迂乎要之人主所處與常人異子女之奉聲色之娛酒醴之甘驅騁田獵之好嗜欲玩好何求不獲一有縱逸之心則必溺於此皆伐性之斧斤傷生之蟊賊也其能克夀者鮮矣然其間世主亦有縱逸而能夀者又何也是亦稟受之偶厖者爾然而禍亂隨之如商辛是也其患有甚於不夀者矣吕氏曰周公既論無逸之理復舉無逸之君以告成王也嚴恭寅畏蓋中宗無逸之實嚴則謹重恭則降下寅則肅莊畏則兢業合而言之則敬而已矣惟敬故夀也主靜則悠逺博厚自強則堅實精明操存則血氣循軌而不亂收斂則精神內守而不浮凡此皆敬之力而夀之理也髙宗之嘉靖不徒與民休息之謂蓋禮樂教化蔚然安居於樂業之中也髙宗享國五十有九年於小大無時或怨之後蓋民氣太和導迎善氣是亦夀考之理也祖甲保養惠愛庶民雖鰥寡之微亦不敢侮故享國之久亦操敬之力也厥後立王生則逸是無逸之反也耽樂之極伐性喪生無所不至故自時厥後亦罔或克夀又歷數悉陳其年謂耽樂愈甚則享年愈促也大抵守身之本自天子至于庶人惟先知自愛不失其身然後萬事自此次第而舉起其敬而收其肆者莫大於是此則周公忠愛拳拳之意也商去周未逺故周公以成王耳目所接者言之其論逸王則從其後者槩言之非謂三君之後其君皆逸以意逆志可也周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年此言我周無逸之家法而文王為詳蓋成王所聞見為尤近也抑畏謙畏嚴敬也抑畏則無逸不在言也卑服謂自卑下以服勤其事也即就也康功謂安民之事田功即教民稼穡之事如孟子所述制其田里教之樹畜耕者九一關梁無征之類是也徽柔則平易近民而非姑息之柔懿恭則即之溫良而非外貌之恭懷保小民其心常在於保養小民而小民之中有鰥寡無告者文王發政施仁尤先於此惠鮮利澤之也其生意蓋郁然矣自朝至于日中昃不遑安暇而食蓋聼政之勤所以和理萬民之事也即康功田功則知稼穡之艱難不足言懷保小民則知小人之依不足言蓋上文所引三宗皆守成之賢主而文王則創業之聖君所以不同也不敢盤于遊田蓋省耕省斂非不遊也不敢盤于遊恐流連以廢事耳教民講武乾豆賓客非不田獵也不敢盤于田恐暴殄或擾民耳以如師能左右之曰以蓋文王為西伯則西諸侯咸聼命焉文王率之以正能使庶邦以正應之所謂正己而物正觀諸二南之化可見矣受命謂為方伯其時已中年又享國五十年蓋文王夀九十七嵗也此其無逸之所致也周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉此勉成王之無逸也夫觀以廣視逸以安身遊以省農田以講武皆人君所不能無但不可淫于此淫則為縱逸之私欲且病民矣故周公不戒之使無而但戒其淫茍必絶之使無不惟廢禮且使人君苦于拘則未必不樂于肆矣以萬民惟正之供蓋人主正身以率之則能使萬民以正應之無皇曰皇大也猶云自寬也人君之縱逸未必便沈溺也其始不過自寬曰且今日耽樂而已明日不復爾也然即此一説已不足以訓民亦非所以順天蓋此心有一日之逸則天理有一日之間斷也况于此隙一開日復一日此必將大有過愆矣雖紂之不善安保其不至是哉故終戒之曰無若殷王受之沈迷昏亂又酗于酒德紂亡國之主也以是為成王戒蓋深警之也雖然為紂非難凡以一日之耽樂為無傷者紂之徒也終亦必紂而已矣周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聼人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝此章言所以致小人之怨也保惠猶云保也者保其身體以歸諸道者也訓告教誨義同而復出猶云師導之教訓傅傅之德義者與譸張以俗語誇誑之也猶上文乃諺既誕也此篇大意勉人主知小人之依而後章復戒其致小人之怨所以致怨必有其由蓋古之人其為人已足以表于世而猶資賢人君子相訓告之相保養之相教誨之故無敢有以俗語誇説誑惑之者茍人主於此師保之言不聼則必有導之為非者矣彼先王之正法皆體悉小人之依而為之者邪人既導人主以變亂之則小大之民皆失所依民否則怨於心又否則詛於口矣周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒此厥不聼人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身迪哲蹈行明哲之德也此四君者既深知小人之依必不致小人之怨設或有告之曰小人怨詈則反躬自省大自敬德所謂無則加勉也厥愆曰朕之愆允若時所謂有則改之也不止於不敢含怒而已其責己而不尤人如此夫含怒怒之微也而猶曰不敢又曰不止於不敢而已其至厚至誠可想也人主於此四君之事不知聼人乃或譸張以誑之曰小人怨汝詈汝則信之則以為必若是不永念其為君之道則不知自責不寬裕其心則惟務責人亂罰無罪殺無辜於是小人遂同怨之怨遂叢于其身矣夫壅民之口甚於防川使其果有怨詈猶當自反况聼譸張之幻不審有無而肆刑殺此怨之所必聚而禍亂之所必生也夫始以一邪人之譸張而終以聚天下之怨甚矣讒邪之為􅊣人主不可不深戒也周公曰嗚呼嗣王其監于兹承上文警戒以終之胡氏曰以無逸繫于周公將沒者考於君奭立政洛誥諸篇周公於成王皆有沖孺幼小之稱而無逸獨無故知其為最後也履祥按無逸之書七發端皆曰嗚呼其警戒之意蓋切真周公垂殁丁寧之書也一嗚呼言人主必先知稼穡之艱難故處安逸之地知小人之依而無逸然稼穡艱難雖小人子弟猶有不知者何况人主此所當戒也二嗚呼援商守成三君皆先知小人稼穡之艱難故其治民無逸身亦期夀商後王不知小人稼穡之艱難故惟耽樂之從亦罔克夀三嗚呼敘有周無逸之家法文王尤為憂勤四嗚呼勉成王繼無逸之德防耽樂之源五嗚呼戒所以致小人之怨六嗚呼言小人之怨有則改之無則加勉自責所以弭怨責人祗以重怨七嗚呼總丁寧以終之稼穡之艱難周公嘗備陳於七月之詩而此又首述於無逸之書是二篇者人主當相對為圖左右觀省也周公薨于豐葬周文公于畢書序曰周公在豐將沒欲葬成周公薨成王葬于畢世家曰周公在豐病將沒曰必葬我成周以明吾不敢離王周公既卒成王亦讓葬周公于畢從文王以明不敢臣周公也大傳曰三年之後周公老于豐心不敢逺成王而欲事文武之廟然後周公疾曰吾死必葬于成周示天下臣於成王成王曰周公生欲事宗廟死欲聚骨於畢畢者文王之墓地故周公死成王不葬於周而葬之於畢示天下不敢臣也所以明有功尊有德故忠孝之道咸在成王周公之間故魯郊成王所以禮周公也蔡氏曰此言周公在豐漢孔氏謂致政歸老之時下文君陳之序乃曰周公既沒命君陳分正東郊成周方未命君陳時成周蓋周公治之公沒故命君陳然則公蓋未嘗去洛也而此又以為在豐將沒則其致政歸老果在何時耶愚按周公治洛或此時偶以朝覲在豐耳古史曰周公之子封者八人伯禽在魯其弟嗣周公食采於周世輔王室邢凡蔣胙茅祭或在畿內或在畿外禮記曰成王以周公有勳勞於天下命魯公世世祀周公以天子之禮樂是以季夏六月以禘禮祀周公於太廟牲用白牡尊用犧象山罍鬱尊用黃目灌用玉瓚大圭薦用玉豆雕纂爵用玉盞仍雕加以璧散璧角爼用梡嶡升歌清廟下管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏朱子曰趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勳勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣程子曰周公之功固大矣皆臣子之分所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也其因襲之弊皆用之羣公之廟遂使季氏僣八佾三家僣雍徹故仲尼譏之命君陳分正東郊成周君陳篇曰王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉克施有政論語作施於有政君陳令德孝恭惟其孝則在內能友愛于兄弟在外能施于有政蓋本立則善推之也成王營洛邑為東都此云東郊蓋主鎬京而言陳氏謂主東都王城而言則下都商民所居謂之東郊尹正也昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂師教之保安之周公以德教安其民民方思之君陳治洛但率循其治勉明其訓則其民自治不必别有作為也我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫凡人未見聖若不克見既見聖亦不克由聖爾其戒哉至治馨香四語吕氏謂周公精微之訓蓋成王聞諸周公者也治道之極和氣發達感通神明謂之馨香非黍稷薦祭而謂之馨香也蓋清明之德則自然精華發達無非和氣也明德言其本至治言其效式時猷訓惟日孜孜無敢逸豫與由聖之戒皆勉君陳以明德之事也君陳逮事周公令德昭聞但患其間斷則為人欲所昏又患其玩於見忽於行則明德不續矣兼常人之情雖莫不有好德景行之心而少有克己蹈道之力以周公聖人不問今古孰不願見而不可得然當時親見周公者亦不少而少有能學為周公者蓋恃有聖人玩於習見而省察克治之功不能自加此其所當戒也爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹此已下告之以至治之事也爾惟風下民惟草風行草偃不疾而速此即至治馨香之謂故必謹所以感之者是以圖厥政不可不艱難謹重也故於政事廢興之際出則與國人入則與僚友共虞度之師衆之言同矣則又思繹之蓋在我之德既明則不蔽於私而又有以度之此政之所以善也爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉葛氏曰成王始失斯言矣欲其臣善則稱君善則稱君人臣之細行也然君既有此心至於有過則將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣嗚呼此其所以為成王與愚謂此成王因師虞之訓而述君陳之素行也君陳前日必嘗為親近之臣獻納之任其為人如此故成王嘉之然人臣如此固為良德而人主不可示此意向也下文豫曰辟爾惟勿辟豫曰宥爾惟勿宥其諸以此章之意勉君陳之所未及與王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和𢎞周公之訓以訓民不可執周公之法以責民蓋立法特以禁民而用之則又必有寬制從容於法之外者君陳未必依勢倚法而成王言此蓋勢者我之所乘而法者我之所執一以喜怒之私加之即易為威虐故上之人常欲忘勢而論法常主於與民則庶無此過寬而有制則寬意常行於法之中又非廢法以為寬也從容以和則其忘勢近民亦非勉強勉強則不能和矣蔡氏曰此篇言周公訓者三曰懋昭曰式時至此則曰𢎞周公丕訓欲其益張而大之也吕氏曰繼前人之政者茍止以持循因襲為心其所成必降前人數等惟奮然開拓期以光大前業然後僅能不替蓋造始之與繼成其力大不同也殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中上文述君陳善則稱君故此又勉君陳以執法揆理勿徇其君之意也中者審其輕重隨其時措之宜無過不及也有弗若于汝政弗化于汝訓辟以止辟乃辟狃于姦宄敗常亂俗三細不宥此終上文辟宥之意刑不泛加凡懲一而可以止百者則刑之關係者大而所犯者細小懲而大誡不可宥也爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大簡厥修亦簡其或不修進厥良以率其或不良承上文用刑之意而又以寬和終之君陳之治東郊不惟殷民凡殷士之在官者與凡庶正之官皆屬馬無忿疾于頑指民也無求備于一夫指官也頑者所未化求備者謂所未能事必有所忍則能有所成就量必有所容則德乃廣大修謂職業修舉良謂行義溫純於職業則兼簡其修廢使人勸功於行誼則進其賢者以率化之則人勵行惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭于永世斯民之生理無不具可謂厚矣但誘於習俗為物所遷耳然其心不從工之命而從上之好今欲教之以復其所本厚則不惟在於政教聲色之末而實在吾攸好如何敬典者厚典庸禮深信篤好之意在德者躬行心得之真攸好如此則民心觀感時乃罔不變化其氣習物欲之蔽而允躋於大道之中矣章首明德惟馨之意蓋如此書序曰周公既沒命君陳分正東郊成周吕氏曰君陳之命周公則既沒矣成王真得實造之學當於是篇求之周公之沒也厖臣碩輔尚多立於朝而分正東郊成王獨以屬之君陳是獨何哉斯時也東郊治體所冝盡循周公之典使付之舊臣則諸老固非作聰明亂舊章者然平日與周公比肩同功慮其兢兢循守者或未専固微有自用之意於其間則於治體已有間矣不若畀之後進端慤之人則一意奉承不敢毫髮增損成王微指蓋在此也至于成終之任開闔變化非四世元老莫能之故康王必付之畢公焉成康之於治體其觀時義者精矣三十有七年四月甲子王命太保奭芮伯彤伯畢公衛侯毛公保元子釗乙丑王崩癸酉元子釗受命朝諸侯于應門之內書曰惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几蔡氏曰王發大命臨羣臣必齋戒沐浴今疾病危殆故但洮盥頮面扶相者被衮冕憑玉几以發命乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事六卿百執之長各書其人太保畢公毛公皆三公周禮三公無職蓋六卿進兼或三公下兼六卿蔡氏曰平時則召六卿使帥其屬此則將發顧命故自六卿至御事同以王命召也吕氏曰召公以太保領冢宰固無可疑畢公與召公一體而班在四者蓋司馬兵權非元老重臣未易付也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝此下成王之顧命也漸進幾危疾甚曰病彌亦甚留連也嗣者立元子嗣位之事審重詳也成王其時年四十有九古人多夀故未及言太子嗣位之事或嘗言之而至此又詳審言焉重其事也昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命蔡氏曰言文武宣布重明之德定民所依麗陳列教條則民習服習而不違天下化之用能達於殷邦而集大命于周也在後之侗敬迓天威嗣守文武大訓無敢昏逾侗愚也成王自謂也今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦釗康王名元子者正其統也成王在位雖四十年天下太平然先王終而嗣君立乃一時艱難之運昔者成王幼沖親罹其禍四國相延而起王室幾危故成王之終以𢎞濟艱難柔逺能邇安勸小大庶邦為託然合逺近大小又以見君德所施公平周溥不可有所偏滯也思夫人自亂于威儀爾無以釗冒貢于非幾亂治也有威而可畏謂之威有儀而可象謂之儀舉一身之則而言也劉子所謂民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也此言蓋有自來周家士大夫蓋相傳以為立身之本也成王謂思夫人之所以為人者自治於威儀耳此固元子釗所當自治然左右大小之臣俱有保傅輔翼之責不可茍投其君以為非之幾也夫當時諸臣固非引其君於非者然或幾微之事徇之而不謹自微而大將自是滋矣此人主之所甚畏而輔君者不可不謹也吕氏曰甲子之命去崩才一日耳猶盥洗而致潔冠服以致嚴顧託之言淵奧精明蓋臨衆之敬不以困憊廢而素定之理雖垂沒固炯然也惟善治氣者為能歷病疾而不惰惟善養心者為能臨死生而不昏此豈一朝一夕之積哉又曰斯言也蓋成王平日至親至切之學至此始發其祕也周公精微之傳成王得之將終方以示羣臣孔子精微之傳曽子得之將終方以示孟敬子皆近在於威儀容貌顔色辭氣之際然則周孔豈惟同道其用工之次第品目亦莫不同也兹既受命還出綴衣于庭越翼日乙丑王崩蔡氏曰綴衣幄帳也羣臣既受命王還內徹去幄帳于庭喪大記云疾病君徹懸東首於北牖下是也於其明日王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗太保以冢宰攝政出命南宫毛當是括之後齊侯吕伋太公子入為虎賁氏爰於也逆迎也南門路寢之門也延引也引入路寢之旁翼室為憂居宗主翼室即東夾室也天子居喪之次曰梁暗比諸侯倚廬而加楣梁此初喪未為梁暗故以東夾室為宅宗之地此下文東夾所以不陳設也吕氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防微慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主於宫掖而外庭猶不聞然後知周家之制曲盡備豫雖一條一節不可廢也丁卯命作册度命即太保命之也作册以傳顧命古者册書自有常度此重顧命故其册之度又異於常太保定其制焉送死事固大而顧命亦大故於崩之再明日即命作册度其他喪事自有常職此不復書越七日癸酉伯相命士須材天子七日而殯癸酉即殯之明日也既殯始傳顧命殯前以送死為重也伯相即太保也太保以西伯為相故謂伯相士者凡幕人掌次司几筵朝士諸職皆士也材物也凡朝庭所須器物如下文禮器几席車輅戈鉞之類是也自此以下皆癸酉之事舊説須材為供喪者與上下文不相入狄設黼扆綴衣狄下士祭統謂樂吏之賤者喪大記狄人設階蓋供設張之事者即幕人司几之類也黼扆天子之屛黼以白黑為文畫如斧形古畫文之圓而相紏者謂之罍以象雷也文之方而四鋭腰兩旁曲內首尾曲外者謂之黼以象斧也即今銀樣畫也扆以繒為之設黼扆幄帳如成王存之日也牖間南嚮敷重篾席黼純華玉仍几此平時見羣臣覲諸侯之坐古者前為堂後為室室中以東向為尊戶在其東南牖在其南户牖之外為堂以南向為尊其位在户外之西牖外之南故爾雅戶牖之間謂之扆謂設扆之處也此所謂牖間南嚮之坐也天子之席三重篾孔鄭諸儒皆謂桃枝竹席黼純以黑白文繒為緣也華玉黃玉也仍几因生時所設黃玉飾几也西序東嚮敷重底席綴純文貝仍几此朝夕聼事之坐也爾雅東西牆謂之序蓋古者宫室之內以墉牆為隔猶今以壁隔也東西牆猶言東西壁壁之外即夾室故又曰東西廂謂之序自堂言之則東西壁為序自夾室言之則牆乃夾室之牆也夾之前謂之廂故夾室亦通可謂之廂矣賈氏注禮曰序以西為正堂序東有夾室蓋士惟東房西室乃以室戶房間為中房前東壁為序序東有夾惟天子諸侯則有東西房有東西夾郭氏曰序者序别內外也然左右進以至戶牖間者必先由序故謂之序猶云次第經由處也底者蒲席也綴雜彩文貝車渠也東序西嚮敷重豐席畫純雕玉仍几此養老饗羣臣之坐也豐莞席也畫繪五彩雕刻鏤也西夾南嚮敷重筍席玄紛純漆仍几越玉五重此親屬私燕之坐也天子之屋四霤為四阿四個而有東西夾大夫士維止有東夾然亦不敢為阿個也今此書不言東夾獨無陳設惟言西夾而又南向與當扆同又越玉五重蓋東夾者即初喪宅宗之翼室而西夾者則新陟王西階之殯宫也卿大夫無西夾則殯西階之上士殯於客位惟天子有西夾其殯畢塗屋故於西夾為之所以西夾既設几席又加玉五重而别不陳寶漢天子殮以玉札謂之玉棺所以不腐周天子殯而五重設玉意可見矣東夾之外未為梁暗西夾設位未畢塗屋以將傳顧命未備喪禮也筍席吕氏謂緝竹籜以為席也紛雜也漆黑漆親親不尚飾故此坐之設如此陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房朝廷尊敬不設寶玉於東西序夾室則設之寶者先王之寶器赤刀博物志昆吾鍊鋼赤刀切玉如泥者大訓即典謨帝王之書河圖即伏羲所獲龍馬負圖也胤兌和垂或地名或人名其物皆精堅久逺世所傳寶者蔡氏曰器物之陳非徒以為國容觀美意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能傳也大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前蔡氏曰大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王乘玉輅綴之者金輅也最逺者木輅故木輅謂之先輅則革輅象輅為次輅矣賔西階阼東階面南嚮也孰門側堂也五輅陳列亦象成王之生存也周禮典輅云若有大祭祀則出輅大喪大賔客亦如之是大喪出輅為常禮也又按所陳寶玉器物皆以西為上者成王殯在西夾故也二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階辨士服凡執器者皆士也雀辨赤黑色革辨也綦辨鹿胎皮為之惠三隅矛形如圭也畢門即路寢門也上刃外向也兩階戺賓阼兩階之隅也堂亷曰戺正義曰堂廉者堂基南畔亷稜也廉即隅角也堂為兩階則兩階接堂皆有隅角故每階以二人夾之然堂廉既主於南畔則兩階之間每廉二人夾立也冕大夫冠也制如辨但加藻耳劉鉞皆斧屬東堂西堂即東西夾之前堂也夾之前有廂則曰東廂西廂不為廂則曰東堂西堂也戣瞿皆矛屬東垂西垂路寢東西之階上也垂下階之處也一云垂堂兩邉也鋭按古文作鈗説文同讀若允側階者北階也東房半以北為北堂其堂西直室墉東直房戶而為北階以下蓋通宫闈之路也故惟一人守之自門而階則立衛者皆士至堂則立衛者皆大夫吕氏曰古者執戈戟以宿衛王宫皆士大夫之職無事而奉燕私則從容養德有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢陛楯執戟尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也王麻冕黼裳由賓階隮卿士邦君麻冕蟻裳入即位隮升也由西階未敢為主也蟻玄色卿士邦君皆同服亦廟中之禮即就也位者平日侍朝之班次也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳纁今蟻裳者蓋無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間示禮之變也太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮彤纁也祭服也介圭王之大圭長尺有二寸同爵名瑁方四寸邪刻之以冒諸侯之圭璧齊瑞信也蔡氏曰太保宗伯以先王之命奉符寶以傳嗣王有主道焉故升自阼階太史秉書書即册也以成王之殯在西階之上故亦由賓階升御王册命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞變和天下用答揚文武之光訓御奉持也此即丁卯所作册也吕氏以此即為册命之辭蔡氏以成王顧命已書之册此則太史口陳之辭也皇后大君也末命臨終之命也大卞字書無正訓孔氏訓法按卞本從升與辨同是恭拱之義則當訓為禮或云大辨即謂天子之冕謂服天子之服以朝也惟有此命故康王冕服見諸侯行顧命也此數辭固櫽括成王之命而約言之命汝嗣訓則嗣守文武大訓之謂也率循大卞則自亂于威儀之謂也燮和天下則柔逺能邇安勸小大庶邦之謂也然成王之命蓋為命羣臣相康王之辭亦必别有勑康王之語若此册所云者史書前後互見故不屢書耳若本無其語而虛為此册則是後世遺詔儷語不情之言非古人所為也王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威眇小而如也顧命有敬迓天威之語故此亦有敬忌天威之説乃受同瑁王三宿三祭三吒上宗曰饗受同以祭受瑁以為主宿肅也祭祭酒也吒嘆也王受上宗同瑁則受太保命圭可知王搢大圭以同爵祭告受命也祭訖以同授太保三吒嘆也親沒而始受顧命雖不敢死其親用祭服祭禮而不哭然三吒之情則不可遏也上宗曰饗傳神命以饗告也猶嘏以饗告也太保受同降盥以異同秉璋以酢授宗人同拜王答拜同白虎通作銅蓋同必銅爵之名太保受同則王三祭以同授太保可知降反同于篚又盥洗更用他同秉璋以酢酢祭也祭禮君執圭瓚祼尸大宗執璋瓚亞祼故此報祭亦秉璋也以同授宗人而拜王答拜者明為後也古者始喪雖卑者亦拜之此雜用喪禮又如代尸拜也宗人小宗伯之屬也大宗以供王小宗以供太保太保受同祭嚌宅授宗人同拜王答拜在喪祭告王不飲福故太保攝飲福所以受同祭而飲福嚌者至齒而已方在喪疚雖歆神之賜而不能甘也宅亦當作吒太保降收太保下堂有司徹諸侯出廟門俟吕氏曰廟門路寢門成王在殯故名廟也俟見康王於門外下篇康王亦出外朝告諸侯蓋在廟門內則子道也出廟門則君道也新天子之尊屈於門內而伸於門外父子君臣之義著矣王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜太保暨芮伯咸進相揖王出畢門則立應門之內蓋外朝也周制分天下以為左右曰二伯陜以東周公主之陜以西召公主之周公沒畢公繼之故此二公各率其方之諸侯入門而左而右亦各從其方布陳也乘駟馬也黃色朱鬛陳之以為庭實賓諸侯也稱舉也圭守圭幣籍幣以薦圭也曰一二者明非一曰臣衛者謂諸侯蕃衛王國者也壤奠謂以土地所出為奠贄也皆再拜稽首於地以致敬義審宜也王審宜以在喪而嗣先德朝諸侯宜答拜也王答拜故太保芮伯咸進贊相王揖吳氏曰穆公使人弔公子重耳重耳稽顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也蓋為後者拜不拜以未為後也弔者含者襚者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜而不拜則疑未為後也且純乎吉也答拜既正其為後且知其以喪見也皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命上文再拜稽首贄見也王答之二相進贊揖遜故諸侯又再拜稽首答君也亦進戒也羑若蘇氏謂羑里之厄於此能順則天下之理無乎不順矣蔡氏疑即下文厥若謂其所當順從者皆非也按字書羑進善也即今誘字説文羑或作誘羑若蓋天誘其𠂻之意言皇天以大邦之命而改命周亦以文武大能承受其誘𠂻助順之理而憂勤西土之民耳此其受命之原亦非有甚髙難行之説也惟新升遐之王又能盡協文武賞罰之公而戡黜武庚伐淮踐奄以定文武之功以能施及後人有此休福今王其敬之哉張皇六師無廢壞我文武艱難寡特之基命六師即謂天子六軍之制猶言萬乘也張者弛之反六軍王國之常制張則不弛其備皇則不輕其事猶云張舉天子之事耳然武備乃承平易弛之事故諸公又特言之與蔡氏曰召公此言若導王以尚威武者然守成之世多溺宴安而無立志茍不詰爾戎兵奮揚武烈則廢弛怠惰而凌遲之漸見矣成康之時病正在是故周公於立政亦懇懇言之後世墜先王之業忘祖父之讐上下茍安甚至口不言兵亦異於召公之見矣可勝嘆哉王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎砥至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞康王在喪故稱名諸侯言文武及新陟王而康王惟言文武蓋未忍言成王之遺事又方述求助之意而諸公皆文武勳舊又武王所封以屏王室者故惟述文武以感之而不及成王也丕平富者制其田里薄其稅斂去其貪暴使人人各得其養也不務咎者刑罰雖不可廢然不以是為務而取咎於是也砥至者發已自盡必欲至其極齊信者隨事所處無不盡其實也誠之所積固自不可掩所以用昭明于天下然所以戮力創造王室者又皆勇鋭之士忠實之臣之助用是文武能正受其命於上天而上天亦順文武之道付之以天下文武又命封建侯國立為藩屏其意正在於衛輔我後人今豫一二伯父指同姓大諸侯也天子謂同姓諸侯曰伯父叔父異姓諸侯曰伯舅叔舅此惟言伯父蓋指太保以及其餘不屢數也尚胥暨顧綏爾先公之臣服于先王欲顯諸侯胥及天下之諸侯觀守爾先公之所以臣服于先王之道雖身守國於外而乃心當常在王室用奉我一人以憂其所當奉行之事其無遺我孤子之羞也羣公既皆聼命相揖趨出王釋冕反喪服前相揖蓋以王答拜而贊揖也此相揖蓋太保諸公相率揖而退也王釋冕反喪服此處喪禮之變冕服亦不宜久也蘇氏曰成王崩未葬君臣皆冕服禮與曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可也孔子曰將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉册授王于次諸侯入哭於路寢而見王於次王喪服受教戒哭踊答拜聖人復起不易斯言矣春秋傳曰鄭子皮如晉葬平公將以幣行子産曰喪焉用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著明足以為後世法孔子何為不取哉然則失禮則不可以不辨吕氏曰堯舜禹湯文武無顧命而成王獨有顧命始終授受之際國有常典矣成王之初經三監之變王室幾搖故於此正其終始特詳焉顧命成王所以正其終康王之誥康王所以正其始舜除堯之喪格廟而咨嶽牧成王除武王之喪朝廟而訪羣臣皆百代之正禮然成湯方沒伊尹遽偕羣后侯甸訓太甲焉禮固有時而變矣説者不疑太甲受伊尹羣后之訓于居憂之時乃疑康王受召畢諸侯之戒于宅恤之日甚者或以晉辭諸侯為證然則隆周之元老反不若衰晉之陪臣耶朱子曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十二月朔亦新喪也伊尹亦祠于先王奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣癸亥康王元年甲子二年十有二年六月壬申命畢公保釐東郊書畢命篇曰惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊朏月三日生明壬申六月五日也宗周鎬京豐文王之都在鎬京之西二十五里成周在鎬京之東八百里商民所居在王城之東二十五里王朝步自宗周至于豐命之於文王之廟也保者安全之釐者疏理之吕氏曰保釐二字一篇之體要也王若曰書序謂康王命作册則此以下康王之意而命內史修飾之也嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧此敘述其原委也惟文武能以大德受命惟周公能左右綏安毖謹也周公固無事不謹而化商一事尤所謹重故遷之洛邑親近王化商民亦敬化於周公之訓故自周公之沒今三十六年世已變而風俗亦漸移天下之內安平無事豫一人賴是以寧是皆周公風化之力也周公沒今三十七年言三紀者舉全數也道有升降政由俗革不臧厥臧民罔攸勸此論治道旌别之宜也升降猶記言道隆道汚蓋道有所當升有所當降初無執一之用故為政者當視時俗而為之更張不可膠於一定也當周公之時商民反覆未定故公遷之教之寬之警之至君陳之時不善者尚多故猶務含容皆以漸治之至畢公之時世變風移老死少長熏習滋變不善者亦希矣然而猶有未善者在正所當分别之也蓋不善其善則民無所勸慕矣是則分别者乃所以使之皆為善也惟公懋德克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王豫小子垂拱仰成此述畢公之賢必能體道之用也吕氏曰畢公天下之元老康王不稱其成德而稱其懋德不稱其總大體而稱其勤小物蓋以成德自居則止矣於小物而忽焉則亦間斷矣惟勉於德者貫稚耄而不息敬於事者一小大而無間康王於師傅可謂觀之詳察之審而善於形容矣又言畢公輔導四世風采凝峻表儀昭著小大之臣罔不祗服父師之訓德容之重衆望之孚養之者蓋非一日之積矣蔡氏曰休嘉之績多於在先王之時故我小子垂衣拱手以仰其成而已王將付畢公以保釐之寄故敘其德業之盛知畢公之必能終此事也王曰嗚呼父師今豫祗命公以周公之事往哉鎮東都化商民此周公之事故敢以命公吕氏曰言之敬而待之尊體貌重臣也旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕此東郊之政也所以釐之也旌淑别慝東郊之政由俗革者莫大於此其旌淑也則表其宅里以彰為善者之閭而使惡者病不能焉蓋立善者之風流聲聞使聞者興起此先王所以為風俗無窮之計也其别慝也則弗率訓典者殊其井疆若記所謂不變移之郊不變移之遂蓋使之畏踈斥之醜而慕為善之美卒亦同歸於善而已申畫郊圻慎固封守以康四海此承上文因以推廣東郊之政所以保之也蓋因表里殊井之政亦以申畫郊圻因申畫郊圻之制可以謹固封守因謹固封守可以用康四海夫郊甸之畫舊矣然井田之制歷嵗久則溝澮易堙分畫疏則經界易失故必因時而申畫之又先王井田之制澮塗縱橫溝封有截亦寓封域設險之意焉故申畫郊圻所以謹固封守也京師畿甸諸夏根本王畿安則天下安矣故謹固封守所以康四海也政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世祿之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓此章又明化商之要不徒别殊之又必化訓之也大抵商民不善之餘習有二利口也驕淫也利口則化之以政令之靜重驕淫則化之以德義之成法政事貴平常而戒詭異辭令務大體而尚簡要吕氏曰此深懲作聰明趨浮末之異好凡論治體者皆然在化商言之尤為對病之藥蓋其俗靡靡利口惟賢政當以渾厚敦朴鎮之畢公所當深念也又曰古人論世族之病必舉而歸之驕侈此商民受病之原也世祿之家不可槩謂之無禮法也逸樂豢養之所移其能由禮者鮮矣既不由禮則心無所制肆其驕蕩陵蔑有德悖棄天道甚矣夫衰弊之化未有不侈麗者此古今同一流耳此古人之論也而茲殷庶士席寵惟舊率多世族怙侈滅義則以蕩陵德也服美于人則敝化奢麗也流而不反驕淫矜誇百邪並見殆將以惡終矣賴洛邑之遷式化厥訓拯其將亡而更生之教育之久雖已收其放心所以間之使久而不渝則甚難此畢公所當講也資富而能訓所以使之永年商民席寵又承三紀富庶涵養之餘資之富矣訓典之而間其邪蓋不可緩也然所以訓之者豈外立其教以訓之哉德者心之理義者事之宜人所同有訓莫大於是然善無證則不信而德義非可以空言也當稽古以為之説不由古以為訓于何以為訓乎王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修是時太平無事獨殷民未盡化耳而康王猶以為安危所係不恃其治不忽於微如此剛則激亂柔則容姦此化商之所以為難惟不剛不柔時措適中此所以為德之允修也惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同砥于道道洽政治澤潤生民四夷左衽罔不咸賴豫小子永膺多福前後之時不同由革之政亦異而云協心同砥于道者蓋此心所處俱至於所當然之則也京師首善之地而周畢二公又皆以東伯鎮東都故推其餘效至四夷左衽罔不咸賴也蔡氏曰殊厥井疆非治之成使商民皆善然後可謂之成愚按自畢公以後周家無復有事於東郊而人心風俗與周始終矣畢公真能踐成終之命哉公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂總上文立風聲革舊俗申畫謹固而成其終皆所以為成周無窮之基也吕氏曰畢公四世元老豈區區立後世名者而勳德之隆亦豈少此康王所以望之者蓋相期以無窮乃尊之至也嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政畢公重德而有弗克之戒又有民寡之戒三代君臣相與警戒固無事不存未嘗以盛德廢也推畢公克勤小物之心則或以商民之難化為憚推畢公多嘉之績則或以商民之蕞爾而忽毋憚其難惟當盡心毋忽其少惟當謹事休于前政謂成終也周公君陳其道固盡而商民猶未盡化是尚有餘責也成終則無復餘責矣此之謂休于前政非求勝於前之謂也履祥按殷自中葉以來士大夫世家巨室殖貨謾令風俗浸不美盤庚亦嘗正之歷髙宗諸賢君風俗固嘗正矣至紂又以淫酗驕奢倡之一時風靡而又為天下逋逃主聚諸亡命是崇是長凡億兆之心如林之旅計皆是放蕩無廉恥一旦周師至則倒戈迎降之不暇爾武王入殷固已慮之曰若殷之士衆何太公亦已有誅斥之意矣獨周公不然而兼包并容之然商民之意得氣滿終不若在紂之日故其後從武庚以叛於是分遷畿甸而處之而誘之亦殊勞矣昔子王子謂迹商民之所為自秦漢言之坑戮誅夷之而已矣而乃待之如此此所以為周公之德而所以為周家之忠厚也然觀於多士多方君陳畢命諸書大抵殷民之為頑自其染紂之惡於是有淫放之習自其從武庚之叛於是又有思商之心以淫放之習而行思商之心奚為其不亂也周公之時洛邑雖遷而思商未釋也君陳以後思商之念釋而化紂之習未除也思商之心未釋故多方多士開諭之辭詳化紂之惡未除故君陳畢命簡别之政肅周公成康不惟其思商而化之不以其忘商而置之分正之命拳拳於生厚之遷保釐之册汲汲於餘風之殄噫是特為風俗人心計耳前儒謂東遷之後衛之俗淫鄭之俗靡魏之俗嗇齊之俗詐獨東周之民忠厚之風歷數百年而不弊及其亡也九鼎寶器皆入於秦而周民遂東亡先王之化所以入人者深矣十有六年魯公禽父薨子酋嗣是為考公徐廣曰皇甫謐云伯禽以成王元年封四十六年康王十六年卒按世家伯禽無年而徐廣注如此若以四十六年為正則伯禽之卒當在康王九年若卒於康王十六年則當云五十三年未詳孰是楚子謂右尹子革曰昔我先王熊繹注楚始封君與吕伋齊太公子丁公王孫牟衛康叔之子燮父晉康叔之子禽父並事康王四國皆有分我獨無有對曰昔我先王熊繹辟在荆山篳路藍縷以處草莽跋涉山林以事天子惟是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有二十年魯考公薨弟熙立是為煬公二十有一年魯侯築茅闕門史記曰伯禽卒子考公酋立四年卒立弟熙是為煬公煬公築茅闕門世本曰煬公徙魯二十有六年王崩子瑕踐位史記曰成康之際天下安寧刑措四十年不用大紀曰康王敬恭神人四夷賔服海內晏然百姓興於禮義囹圄空虛刑措不用四十餘年有唐虞氏之風焉揚雄曰康后之世頌聲作於上按漢諸家言詩者多謂康后晏朝關睢興刺其説與今傳不合而揚雄又以關睢為康王時美詩今皆不取魯煬公薨子宰嗣是為幽公御批資治通鑑綱目前編卷八
