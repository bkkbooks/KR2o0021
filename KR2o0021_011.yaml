body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷十一庚子周僖王元年齊侯宋人陳人蔡人邾人會于北杏胡氏曰春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟跡此而為之者也桓非受命之伯諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國而免民於左衽則雖與之可也誅諸侯者正也與桓公者權也陳氏曰春秋非主兵皆序爵也於是序齊於宋之上而獨爵齊將予齊以伯也晉文公之簡曰晉侯齊師宋師秦師皆始伯之辭也自是無特相㑹者矣齊人滅遂齊侯魯侯盟于柯左氏曰會于北杏以平宋亂遂人不至齊人滅遂而戍之盟于柯始及齊平也世家曰齊桓公五年伐魯魯將師敗魯莊公請獻遂邑以平桓公許與魯柯而盟魯將盟曹沬以匕首劫桓公於壇上曰反魯之侵地桓公許之已而曹沬去七首北靣就臣位桓公後悔欲無與魯地而殺曹沬管仲曰夫許之而倍信殺之愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹沬三敗所亡地於魯諸侯聞之皆信齊而欲附焉公羊氏曰莊公將會于桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹乎桓莊公升壇曹子手劒而從之管子進曰君何求乎曹子曰城壊壓竟君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾公曰諾曹子請盟桓公下與之盟已盟曹子摽劒而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始皇極經世曰齊㑹宋陳蔡邾之師伐魯三敗之取遂又會魯于柯遂復其侵地曹沬劫盟故也履祥按左氏於莊公之篇多缺無傳雖有不詳獨晉楚之事雖未見於經而傳獨詳焉然終春秋之傳晉楚事獨詳於諸國蓋其時晉之乘楚之檮杌與魯春秋竝行故晉楚之事左氏得以參考備書之齊桓始覇左氏於其事獨畧豈齊之史䇿有未備耶如北杏之㑹左氏以為平宋邵氏以為伐魯遂之滅左氏以為北杏之不至史記以為魯之獻邑邵氏以為取魯之邑柯之盟史記公羊以為曹沬之劫也夫北杏之會當不止為一事魯亦豈無故而即為柯之盟春秋於齊桓之事凡齊之侵伐皆不書書及書敗而已遂在濟北必魯之附庸也齊未得魯必有來伐之師伐遂而卒滅之以滅魯也是以魯忍而與齊平為柯之盟此其事實也故當從邵氏之説然管仲得君之初固常曰南伐以魯為主反其侵地矣至是而始反之也曹沬之劫不見於左氏而世多稱之今存之以待參攷二年齊人陳人曹人伐宋左氏曰宋人背北杏之㑹胡氏曰諸侯伐宋其稱人者將卑師少也齊自管仲得政滅譚之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐蓋以制用兵而賦於民薄矣故能南摧强楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣履祥按宋有弑君之亂既已討賊立君矣而北杏之會方且曰平宋亂今又伐之豈齊桓念宋殤之從已欲立其子而宋人不從也耶此必有攷也齊侯使來請師王命單伯會伐宋左氏曰宋人背北杏之會諸侯伐宋齊請師于周單伯會之取成于宋而還陳氏曰春秋之初王室猶甚威重也衛之定州吁也陳之妻鄭忽也紀之求成於齊也皆欲假寵於王齊桓之興亦必請王師而後專伐自伯者之令行諸侯不知有王矣鄭人弑其君子儀鄭厲公自櫟入于鄭左氏曰厲公自櫟侵鄭獲傅瑕與之盟而赦之傅瑕殺鄭子而納厲公公入遂殺傅瑕荆入蔡左氏曰蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋楚入蔡單伯㑹齊侯宋公衛侯鄭伯于鄄左氏曰宋服也履祥按單伯三時于外桓公挾之以令諸侯必不止於為宋也是以明年桓公自主鄄之會而齊始覇矣三年齊侯宋公陳侯衛侯鄭伯會于鄄左氏曰齊始霸也宋人齊人邾人伐郳鄭人侵宋晉曲沃伯稱滅晉弑其君緡四年宋人齊人衛人伐鄭左氏曰諸侯為宋伐郳鄭人間之侵宋諸侯伐鄭宋故也荆伐鄭履祥按鄭有虎牢之險為中原襟喉故齊晉之霸而常與楚爭鄭為是故也先師子王子有曰新鄭之境前嵩後河右洛左濟虎牢之險天下之所聳目豈不足以屏王室而伯諸侯然春秋被兵之煩未有甚於鄭者何哉歴十六君無一起人意者不能運地勢之所長反為地勢之所累其國則中原之咽喉也東有齊北有晉欲伯諸侯其勢不容於捨鄭南有楚西有秦必得鄭而後西伯是所以為天下戰爭之的也使其有英君出於其間内連王室之親外守山川之固挾王命以令諸侯禮樂征伐必自天子出是則東周之周召也五伯何敢䟦扈崛強於後先哉齊侯宋公魯侯陳侯衛侯鄭伯許男滑伯滕子同盟于幽左氏曰鄭成也公羊氏曰同欲也榖梁氏曰同尊周也林氏曰衣裳之㑹四也王使虢公命曲沃伯以一軍為晉侯是為武公史記曰曲沃桓叔之孫武公伐晉侯緡滅之盡以寳器賂獻于周釐王王命武公為晉君列于諸侯于是盡併晉地而有之武公已即位三十七年矣更號曰晉武公始都晉國自桓叔初封曲沃至武公滅晉凡六十七嵗而卒代晉為諸侯秦武公卒弟立是為徳公史記曰武公葬雍平陽初以人從死楚滅鄧左氏曰初楚文伐申過鄧鄧祈侯曰吾甥也止而享之騅甥𥅆甥養甥請殺楚子曰亡鄧國者必此人也若不早圖後君噬臍鄧侯弗從還年楚子伐鄧是年楚復伐鄧滅之吕氏曰鄧之三甥不知國之存亡係于我之治亂反謂係于楚子之死生汲汲然欲殺之忘内而憂外何其疎也環楚而國者如陳蔡鄭許下至江黃道栢之屬不可一二數楚不先加兵而唯急于滅鄧者豈非見鄧有可乘之釁乎吾有可乘之釁而不憂顧以鄰敵為憂雖楚子可得而殺猶有楚國存焉雖楚國可得而滅猶有諸侯存焉為吾憂者未始有極也當是時強凌弱衆暴寡之風徧于天下齊人滅譚晉人滅虢書于諸侯之䇿矣國有釁可乘諸侯將爭欲滅之亡鄧豈獨一楚哉三甥之謀謬戾明矣而世猶有追恨鄧侯不用其言者蓋小人之情咎人而不咎己宜其咎楚而不咎鄧也蒍國以晉師伐夷詭諸殺之周公忌父出奔虢左氏曰初曲沃武公伐夷執夷詭諸蒍國請而免之既而弗報故子國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸周公忌父出奔虢至惠王立復之杜氏曰夷詭諸周大夫夷采地名周公忌父王卿士辟子國之難邾子克卒子瑣嗣杜氏曰邾國曹姓周武王封邾挾為附庸居邾自挾至儀父十二世儀父從齊桓公尊王室始進爵稱子儀父克之字也甲辰五年秦徳公元年春齊人執鄭詹秋鄭詹自齊逃于魯晉武公卒子詭諸嗣是為獻公王崩太子閬踐位是為惠王秦徙居雍史記曰徳公元年初居雍城大鄭宫以犧三百牢祠鄜畤楚文卒子囏嗣是為杜敖按左氏惠王二年楚文卒今從經世乙巳惠王元年三月日有食之虢公晉侯來朝左氏曰虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人履祥按曲沃賂周而伐晉必虢公實為之請故釐王亦使虢公命之虢公為王卿士不俟旅朝此蓋導晉也晉之朝王以曲沃始列於諸侯而詭諸又新為諸侯也虢公晉侯鄭伯使原伯逆王后于陳杜氏曰虢晉朝王鄭伯以齊執其卿故求王為援皆在京師故倡義為王定昬得同姓宗國之禮履祥按三年之䘮自天子逹虢晉不能以禮導天子而及其咸在亟為迎昏非禮矣秦徳公卒子嗣是為宣公二年蒍國邊伯詹父子禽祝跪奉王子頽作亂頽出奔温蘇子奉子頽奔衛衛人燕人入宼立頽左氏曰初王姚嬖于莊王生子頽有寵蒍國為之師及惠王即位取蒍國之圃以為囿邊伯之宫近於王宫王取之王奪子禽祝跪與詹父田收膳夫石速也之秩故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏秋五大夫奉子頽以伐王不克出奔温蘇子奉子頽以奔衛衛師燕師伐周冬立子頽履祥按蒍國為子頽之師僖王之末以晉師伐夷詭諸周公忌父所為出奔也則其權勢恣横非一日矣惠王立不能去之而徒復忌父且奪其田此所以養亂也齊人宋人陳人伐魯西鄙春秋莊十有七年齊人執鄭詹鄭詹自齊逃來十有九年公子結媵陳人之婦于鄄遂及齊侯宋公盟齊人宋人陳人伐我西鄙蔡哀侯卒子肸嗣是為穆侯三年鄭伯執燕仲父王處于櫟左氏曰鄭伯和王室不克執燕仲父杜氏曰南燕伯為伐周故夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于鄔遂入成周取其寶器而還冬王子頽享五大夫樂及徧舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司宼行戮君為之不舉而况敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也齊人伐戎履祥按是時蒍國立子頽惠王越在鄭鄙王室可謂騷矣齊桓方覇而於此反舉伐戎之師於王室若不聞知覇者之心蓋中立以觀其變也是時齊方惡鄭執其大夫而鄭假寵於惠王又專救周之事以王居櫟此齊桓之所不樂也所以置而不救後七年王使召伯賜齊侯命而後齊始為之伐衛然又取賂而還霸者設心舉措如此宜孔門之所羞稱也自同盟于幽之後中國無事者十數年矣而獨於周室之亂不加之意惜哉四年虢公鄭伯胥命于弭奉王復歸於王城殺子頽王與鄭伯虎牢以東左氏曰春胥命于弭夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備王與之武公之略自虎牢以東原伯曰鄭伯效尤其亦將有咎鄭厲公卒子捷嗣是為文公履祥按春秋書鄭伯突卒突與忽爭國忽正而突不正然突得稱鄭伯卒𦵏皆書於春秋忽猶稱世子卒葬皆不書焉忽固自失突蓋終有王室之功也功罪自不相揜然諸侯受國於天子承國於先君茍有天子之命雖本爭國而立猶正也况有勤王之功乎春秋為諸侯之無王其諸假鄭伯突以示褒與王廵虢守左氏曰王廵虢守虢公為王宫于玤王與之酒泉鄭伯之享王也王以后之鞶鑑予之虢公請器王予之爵鄭伯由是始惡於王冬主歸自虢五年秦作密畤史記曰秦作密畤與晉戰河陽勝之晉伐驪戎獲姬以歸史記曰晉獻公五年伐驪戎得驪姬驪姬娣俱愛幸之莊子曰驪之姬艾封人之子也陳人殺其公子御宼公子完奔齊史記曰陳厲公二年生子敬仲完左氏曰其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也若在異國必姜姓也姜大嶽之後也物莫能兩大陳衰此其昌乎史記曰陳宣公後有嬖姬生子款欲立之二十一年乃殺其太子御宼御宼素愛厲公子完完懼禍及己乃奔齊左氏曰齊侯使敬仲為卿辭曰羈旅之臣幸若獲宥君之惠也敢辱髙位以速官謗使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌竝于正卿八世之後莫之與京及陳之初亡也魯昭八年陳桓子始大於齊其後亡也魯哀十七年成子得政楚熊惲弑其君杜敖而自立是為成史記曰楚杜敖五年欲殺其弟熊惲惲奔隨與隨襲弑杜敖代立是為成王六年祭叔聘于魯榖梁氏曰祭叔來聘其不言使何也天子之内臣也不正其外交故不與使也陳氏曰聘未有不稱使者此私相為好也自魯桓之中年王室無聘魯者莊僖崩𦵏蓋不見於春秋而莊僖之際諸侯來聘乎盟主矣楚人脩好于諸侯使人入獻春秋止書荆人來聘王賜楚子胙史記曰成王惲元年初即位布徳施惠結舊好於諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國履祥按春秋之中凡簒弑之人必求列於諸侯之會盟以定其位或賂王室而請命焉楚之不王乆矣熊惲弑其君兄而自立故脩好諸侯入獻天子以自文也其後十有五年齊桓責包茅之不入則位定之後䟦扈如故可知矣曹莊公卒子羈嗣七年魯侯逆姜氏于齊以入使宗婦覿用幣左氏曰秋丹桓宫之楹春刻其桷御孫諫曰臣聞之儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎哀姜至公使宗婦覿用幣御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎履祥按魯莊公不能以禮防閑其母君子猶以為譏况娶者下主乎已上王乎宗廟是可婚齊襄之女乎莊公於是年三十有七矣制於其母長而不婚必齊女也而後娶文姜薨葬一以小君之禮借曰於母不敢貶然擇婚可以自制矣而汲汲昬齊不敢少倍慈訓未及除䘮而如齊納襄女之幣遇于榖盟于扈皆為是也莊公於母可謂重如存之感矣獨不思桓公之所以死乎至是將親迎以歸於其心必有礙焉故特為桓公丹楹刻桷崇飾宫廟以表其不敢忘父之意非以為侈亦非以誇姜也人心天理本不可泯不能充之顧又絶滅焉噫其不仁甚矣至於使宗婦覿而用幣此則誇媚哀姜也誇媚之則必驕縱之慶父叔牙之通閔公之弑蓋有自來矣戎侵曹曹羈出奔陳赤歸於曹郭亡三傳皆曰郭公左氏缺文二傳謂郭公赤歸於曹按郭無公爵而經有梁亡之例當作郭亡為是胡氏曰此郭公也義不可曉先儒或以為郭亡於傳有之齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事謂之郭亡理或然也八年衛惠公卒子赤嗣是為懿公六月辛未朔日有食之晉侯盡殺羣公子左氏曰晉桓莊之族偪獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譛富子而去之晉士蒍又與羣公子謀使殺游氏之二子士蒍告晉侯曰可矣不過二年君必無患士蒍使羣公子盡殺游氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子履祥按晉自曲沃桓叔莊伯奪宗故其子孫亦忌宗族之偪聚而殺之桓莊之支無孑遺矣是亦可為世鍳哉九年晉始都絳左氏曰士蒍城絳以深其宫史記曰獻公九年始城絳都之世家有誤今從年表虢人侵晉史記曰晉羣公子既亡奔虢虢以故再伐晉弗克十有二年癸亥朔日有食之十年齊侯宋公魯侯陳侯鄭伯同盟于幽左氏曰陳鄭服也杜氏曰陳亂而齊納敬仲鄭獲成於楚皆有二心於齊今始服也榖梁氏曰同者有同也於是而授之諸侯也桓會不致安之也桓盟不日信之也信其信仁其仁衣裳之㑹十有一未嘗有㰱血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也晉伐虢左氏曰晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀䘮而後可用也虢弗畜也亟戰將饑經世曰責内羣公子也王使召伯廖賜齊侯命左氏曰且請伐衛以其立子頹也十有一年齊人伐衛衛人及齊人戰衛人敗績左氏曰齊侯伐衛戰敗衛師數之以王命取賂而還吕氏曰管仲在而齊侯不以王命為重取賂而還則桓公之所為管仲有不能盡致力者於此事可見矣履祥按此齊侯奉王命以伐衛也而春秋皆稱人以戰齊衛皆無王室也衛侯朔抗莊王而入國其後又抗惠王以立頽至是雖朔死赤立然未聞其蓋前人之愆也齊侯伐之而不一引咎抗焉以戰此衛之無王也惠王有子頽之亂固不使一介行李告難于齊而即安於鄭然齊桓方霸天子䝉塵而不一顧省至是使召伯賜命且命伐衛而桓公不為㑹諸侯臨之顧㣲焉以與之戰幸而敗之又不能執衛侯歸于京師以聼天子之誅赦顧取賂而還如是而伐是兩下相為戰而已故皆人之也邾子瑣卒蘧蒢立是為文公荆伐鄭左氏曰楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎御人以告子元子元曰婦人不忘襲讎我反忘之子元以車六百乘伐鄭入于桔柣之門子元鬬御疆鬬梧耿之不比為斾鬭班王孫游王孫喜殿衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止子元歸自鄭而處王宫又明年申公鬬班殺子元鬬榖於莬為令尹齊人宋人魯人救鄭履祥按楚以戱興兵齊以㣲救患此春秋所以狄楚而人齊也陳氏曰救鄭無功何終失鄭也首止之會鄭伯逃歸為之圍新城盟世子華而鄭少詘桓公卒鄭遂朝于楚諸夏之變於夷鄭為亂階也晉侯驪姬子奚齊生使太子申生居曲沃重耳居蒲夷吾居屈左氏曰初晉獻公齊姜生秦穆夫人太子申生申生既是世子則齊姜當是元妃左氏所載或失其傳大戎狐姬生重耳小戎子生夷吾及伐驪戎以驪姬歸生奚齊史記晉獻公十二年生奚齊當是十一年其娣生卓子驪姬嬖欲立其子賂外嬖使言於公曰曲沃君之宗也蒲與二屈君之疆也或曰二當作比宗邑無主則民不威疆埸無主則啟戎心若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎晉侯説之使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳驪姬卒譖羣公子而立奚齊十有二年鄭人侵許事不見於傳許在當時必尚從楚也十有三年王命虢公討樊執樊皮歸于京師左氏曰樊皮叛王王命虢公討樊皮虢公入樊執樊仲皮歸於京師陳氏曰自齊桓公不以王命討衛而後王師不出向也王室有四方之事雖伐鄭不服救衛無功而執芮伯立晉侯於是猶討樊仲皮也自討樊仲皮而王命不見於傳記桓公為之也九月庚午朔日有食之齊人伐山戎俾燕修貢於王左氏曰遇於魯濟謀山戎也以其病燕故也國語曰北伐山戎刜令支斬孤竹而南歸海濵諸侯莫不來服史記世家曰山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至於孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕命燕君復脩召公之政納貢於周如成康之時諸侯聞之皆從齊履祥按齊桓山戎之役諸書多載其深入之跡論者率以為多而春秋人之榖梁氏曰危之也愛齊侯平山戎也春秋之例凡師君在稱君將卑師衆稱師將卑師少稱人君在焉而稱人則貶也自管仲得政未嘗命大夫為主將亦未嘗興大衆出侵伐故自魯莊十一年而後凡用兵皆稱人以將卑師少爾伐衛人之貶也此齊侯亦人之以其深入者將士邀功者之事非伯主攘夷保夏之大畧也秦宣公卒弟立是為成公十有五年魯人殺公子牙而立叔孫氏魯莊公卒子般嗣慶父弑子般季友奔陳公子慶父如齊啟立是為閔公傳曰初公築臺臨黨氏見孟任從之閟以夫人許之割臂盟公生子般圉人犖自牆外與女公子戱子般鞭之公曰不如殺之犖有力焉公疾問後於叔牙對曰慶父材魯一生一及成季曰是將為亂乎使以君命酖僖叔曰飲此則有後於魯國不然死且無後飲之卒立叔孫氏公薨於路寢子般即位次於黨氏共仲使圉人犖賊子般於黨氏成季奔陳立閔公左氏公羊氏履祥按魯自隠公將予其弟桓而桓公弑之以立卒為文姜所謀見殺於齊其子莊公制於母而忘其父又婚於齊哀姜卒與叔牙慶父亂殺般弑閔叔牙慶父皆不良死禍猶未已而叔孫孟孫季孫三家者自是立其後魯自是分而桓公子孫卒不自相容也不弟不忠不孝之報其禍如此夫狄伐邢曹僖公卒子班嗣是為昭公十有六年魯閔公元齊人救邢左氏曰狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懐也齊人救邢魯侯及齊侯盟於落姑季子歸魯履祥按左氏稱閔公哀姜之娣叔姜之子故齊人立之昔者子般之弑季友奔陳公子慶父如齊而閔公立則齊之立閔公亦豈慶父請之耶閔公立而即為落姑之盟請復季友齊侯使召諸陳公次於郎以待之則是閔公亦知仗季子之忠防慶父之亂矣而卒戕於慶父惜哉晉侯作二軍滅耿霍魏為太子申生城曲沃封趙夙於耿畢萬於魏左氏曰晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳太伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚太子其無晉乎卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啟之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆履祥按晉獻公方滅耿滅霍滅魏同姓之國而還卒殺其子趙魏之封即種分晉之根天理報應亦㣲而速也哉十有七年魯慶父弑其君閔公季友以公子申如邾姜氏慶父皆出奔齊髙子盟魯公子申入立是為僖公取慶父於莒殺之而立仲孫氏左氏曰閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之秋八月辛丑共仲使卜齮賊公於武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲於莒莒人歸之及密乃縊閔公之死也哀姜與知之故孫於邾齊人取而殺之於夷以其尸歸公羊氏曰齊髙子來盟何以不名喜之正我也莊公死子般弑閔公弑比三君死曠年無君設以齊取魯曾不興師徒以言而已矣桓公使高子將南陽之甲立僖公而城魯魯人至今以為羙談曰猶望高子也履祥按閔公之立也齊侯使仲孫至魯僖之立也齊侯使高子至魯春秋雖氏仲孫然不如稱高子之羙盖仲孫之謀不如髙子也夫仲孫之於魯非不知慶父之當去也齊侯問所以去之顧曰難不已將自斃君其待之卒存慶父以亂魯國弑閔公雖魯誅慶父齊殺哀姜不其費力已乎此仲孫所以不及髙子也又按左氏於晉楚之事皆不係春秋之筆削率先經以詳其始未蓋其時晉之乘楚之檮杌與魯春秋並行此左氏所得參攷致詳也然於魯春秋獨莊閔之篇齊魯之事多闕不詳何耶若莊閔之際雖間因經觧事而前後事情多不具若閔弑季友出夫人慶父何以出奔僖公得入之先後高子來盟之所為皆無考也狄人殺衛懿公衛衆潰濟河立戴公以廬於曹卒齊人立其弟燬是為文公左氏曰狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴戰於熒澤衛師敗績遂滅衛狄人囚史華龍滑與禮孔二人曰我掌其祭不先國不可得乃先之至則告守曰不可待也夜與國人出狄入衛遂從之又敗諸河宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬於曹許穆夫人賦載馳齊桓公使公子無虧帥車三百乗甲士三千人以戍曹史記曰自懿公父惠公朔之讒殺太子伋代立至於懿公百姓大臣皆不服常欲敗之翟殺懿公也衛人思復立太子伋之後伋子又死代伋死者壽又無子太子同母弟二人其一曰黔牟嘗代惠公為君八年復去其二曰昭伯公子頑昭伯黔牟皆已死故立昭伯子申為戴公戴公元年卒齊桓公率諸侯伐翟為衛築楚丘立戴公弟燬為衛君是為文公初文公為衛之多患也先適齊故齊人入之左氏曰衛文公大布之衣大帛之冠務材訓農通商惠工敬敎勸學授方任能元年革車三十乘季年乃三百乗秦成公卒弟任好立是為穆公十有八年魯僖公元齊師宋師曹師次於聶北救邢邢遷於夷儀齊師宋師曹師城邢左氏曰諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷於夷儀諸侯城之救患也凡侯伯救患分災討罪禮也胡氏曰三國稱師見兵力之有餘也聶北書次譏救邢之不速也春秋伐而書次其次為善救而書次其次為貶陳氏曰以齊晉之霸也而狄伐邢邢遷於夷儀狄圍衛衛遷於帝丘桓文亦受其咎矣楚人伐鄭齊侯宋公魯侯鄭伯曹伯邾人會於檉謀救鄭魯侯賜季友汶陽之田及費是為季孫氏十有九年諸侯城楚丘以封衛虞師晉師伐虢滅下陽左氏曰晉荀息以屈産之乗與垂棘之璧假道於虞以伐虢虞公許之且請先伐虢宫之竒諫不聼遂起師夏晉里克荀息帥師會虞師伐虢滅下陽齊侯宋公江人黃人盟於貫榖梁氏曰貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聼遂與之盟燕莊公卒子嗣是為襄公甲子二十年徐人取舒齊侯宋公江人黃人會於陽榖左氏曰謀伐楚也胡氏曰侵蔡次陘之師諸侯皆在江黃獨不與安知其為謀伐楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次於陘所謂聚而為正也江人黃人各守其地所謂散而為竒也次陘大衆聲罪致討以震中國之威江人黃人守境按兵以為八國之援此克敵制勝之謀也及盟於召陵執陳濤塗而後及江黄以伐陳則知侵蔡次陘而二國自為犄角之勢明矣楚人伐鄭左氏曰楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄徳不祥二十有一年齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次於陘許穆侯卒於師楚屈完來盟於師盟於召陵左氏曰齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使問師故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室爾貢包茅不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入罪也敢不共給昭王之不復君其問諸水濱師進次於陘楚子使屈完如師師退次於召陵齊侯陳諸侯之師與屈完乘而觀之曰豈不榖是為先君之好是繼與不榖同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以徳綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟公羊氏曰楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北夷交中國不絶若綫桓公救中國而攘夷狄卒怗荆榖梁氏曰以桓公得志為僅矣履祥按惠王之世北有狄人之患南滅至於邢衛矣南有荆楚之難北伐至於鄭矣所謂南夷與北夷交而中國不絶若綫也桓公北却狄而南怗荆其有功於諸華可謂大矣然其却狄也緩而怗荆也僅聶北之次待邢人之奔楚丘之城在二年之後此桓公之緩也若夫楚之為中國患又有什百於狄者吞噬羣蠻蓋不足道僣王號者數世盡漢陽之諸姬伐蔡滅息比年伐鄭鄭諸夏之襟喉也舍齊桓固未有問罪焉者然管仲之辭文而不及大桓公之言私而不及徳菁茅㣲物楚所易從昭王舊事楚所可脱也而不敢及其僣王猾夏之罪以為討其僣猾則楚未易卒服也此管仲之小也桓公知誇先君之好而不及天下之體知誇攻戰之衆而不及名義之大所以楚人之辭猶未服也僅得屈完之盟姑保不戰之勝齊桓兵車之會莫盛於召陵而僅僅乃爾曾西所謂功烈之卑孟子所謂小補以聖賢作用觀之是眞可謂卑小矣然以桓公管仲之資言之亦可如是而已矣齊人執陳轅濤塗魯及江人黃人伐陳諸侯侵陳陳成歸轅濤塗左氏曰陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯説與之虎牢執轅濤塗秋伐陳討不忠也冬叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗二十有二年晉侯殺其世子申生左氏曰閔之二年晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事也師在制命而已稟命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民敎之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立脩已而不責人則免於難太子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要遠災親以無災又何患焉狐突歎曰時事之徵也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之尨服遠其躬也佩以金玦棄其𠂻也服以遠之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有内讒不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之太子將戰狐突諫曰不可昔辛伯諗周桓公云内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也史記曰獻公私謂驪姬曰吾欲廢太子以奚齊代之姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庻佯譽太子而隂令人譛惡太子左氏曰姬謂太子曰君夢齊姜必速祭之太子祭於曲沃歸胙於公公田姬寘諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城公殺其傅杜原款或謂太子子辭君必辯焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎太子曰君實不察其罪被此名也以出人誰納我縊於新城姬遂譖二公子曰皆知之重耳奔蒲夷吾奔屈禮記曰晉獻公將殺其世子申生公子重耳謂之曰子蓋言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則蓋行乎世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為共世子也王世子會齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯於首止諸侯盟於首止鄭伯逃歸不盟左氏曰甘昭公有寵於惠后惠后將立之會於首止會王太子鄭謀寧周也杜氏曰惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯會王太子以定其位諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安故逃歸不盟孔叔止之曰國君不可以輕輕則失親病而乞盟所䘮多矣弗聼履祥按齊桓公殊會世子不以世子夷於諸侯定王世子也然是會也世子之出必以他故而諸侯會之耳世子無王命而會諸侯桓公率諸侯會之而世子定春秋羙之鄭伯有王命而逃諸侯春秋逃之此齊桓公之一正天下也周之為父子者定而諸侯之為夷夏者可以辨矣晉侯使寺人伐蒲公子重耳奔狄左氏曰晉獻公使寺人披伐蒲重耳曰君父之命不校校者吾讎也踰垣而走披斬其祛遂出奔翟楚人滅弦弦子奔黃左氏曰於是江黃道栢方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡九月戊申朔日有食之虞大夫百里奚奔秦秦始得志於諸侯晉滅虢虢公醜奔京師遂滅虞執虞公歸其職貢於王左氏曰晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啟宼不可翫一之謂甚其可再乎公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也虢仲虢叔王季之穆也為文王卿士勲在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯偪乎親以寵偪猶尚害之况以國乎公曰吾享祀豐絜神必據我對曰鬼神非人實親惟徳是依若晉取虞而明徳以薦馨香神其吐之乎弗聼許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月晉侯圍上陽十二月晉滅虢虢公醜奔京師師還館於虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而脩虞祀且歸其職貢於王孟子曰晉人假道於虞以伐虢宫之竒諫百里奚不諫知虞公之不可諫而去之秦年已七十矣相秦而顯其君於天下可傳於後世二十有三年晉人伐屈公子夷吾奔梁左氏曰晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁齊侯宋公魯侯陳侯衛侯曹伯伐鄭圍新城楚人圍許諸侯遂救許左氏曰諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也楚子圍許以救鄭諸侯救許乃還履祥按左氏此下叙許男面縛銜璧以見楚子於武城夫諸侯方救許許何為乎降楚且既云降楚明年又何為與乎洮之盟則左氏此説於經㫖事情皆無所當且其所引㣲子靣縛之事又非事實紂之末年㣲子已遜於荒武王入殷面縛非其事也左氏於此上誣㣲子下誣許男蓋兩失之二十有四年齊人伐鄭鄭殺其大夫申侯齊侯宋公魯侯陳世子欵鄭世子華盟於寗母左氏曰齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能彊又不能弱所以斃也請下齊以救國公曰吾知其所由來矣夏鄭殺申侯以説於齊秋盟於寗母管仲言於齊侯曰招攜以禮懐遠以徳齊侯修禮於諸侯諸侯官受方物鄭伯使太子華聼命於會言於齊侯曰洩氏孔氏子人氏三族實違君命若君去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉君若綏之以徳加之以訓辭而帥諸侯以討鄭豈敢不懼若總其罪人以臨之鄭有辭矣且夫合諸侯以崇徳也會而列姦何以示後嗣夫諸侯之會其徳刑禮義無國不記記姦之位君盟替矣作而不記非盛徳也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭曹昭公卒子襄嗣是為共公二十有五年王崩王人齊侯宋公魯侯衛侯許男曹伯陳世子款盟於洮鄭伯乞盟太子鄭踐位左氏曰僖之七年閏月惠王崩襄王惡大叔之難懼不立不發䘮而告難於齊八年春盟於洮謀王室也鄭伯乞盟請服也襄王定位而後發䘮胡氏曰王人下士也内臣之㣲者莫㣲於下士外臣之貴者莫貴於方伯公侯今以下士之㣲序乎方伯公侯之上外輕内重不亦偏乎春秋之法内臣以私事出朝者直書曰來以私好出聘者不稱其使以私情出計者止録其名不以其貴故尊之也以王命行者雖下士之㣲序乎方伯公侯之上不以賤故輕之也然則班列之髙下不在乎内外特繫乎王命耳聖人之情見矣尊君之義明矣庚午襄王元年宋桓公卒子兹父嗣是為襄公左氏曰宋公疾太子兹父固請曰目夷長且仁君其立之公命子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退襄公即位以目夷為仁使為左師以聼政於是宋治故魚氏世為左師履祥按宋故國也得一子魚為政遂足以霸惜其不能盡用子魚所以不遂霸爾王使宰周公賜齊侯胙宰周公會齊侯魯侯宋子衛侯鄭伯許男曹伯於葵丘傳曰會於葵丘王使宰孔賜齊侯胙曰天子有事於文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜桓公召管子而謀管子對曰為君不君為臣不臣亂之本也桓公懼出曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越於下以遺天子羞敢不下拜下拜登受齊侯盟諸侯於葵丘左氏國語孟子曰葵丘之會諸侯束牲載書而不㰱血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有徳三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好傳曰宰孔先歸遇晉侯曰可無會也齊侯不務徳而勤遠畧故北伐山戎南伐楚西為此會也譬之如室既鎭其甍矣又何加焉東畧之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還左氏國語履祥按宰孔後命桓公聞管子之言而後下拜則桓公初心至是滿矣此孔之所以科其終亂也其詳見國語而左氏不載又按宰孔之命國語史記皆有弓矢車服九旒之賜皇極經世書賜命為伯此所謂加賜一級者與然宰孔初命但以賜胙為辭蓋以宗廟為重也孔子朋友之饋雖車馬非祭肉不拜古人禮意所重蓋如此云晉獻公卒奚齊立晉里克殺其君之子奚齊荀息立奚齊之弟卓里克弑其君卓及其大夫荀息左氏曰初晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何對曰臣竭股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送徃事居耦俱無猜貞也及里克將殺夷齊先告荀息曰三怨將作秦晉輔之子將何如息曰死之克曰無益也息曰吾與先君言矣不可以貳能欲復言而愛身乎雖無益將焉避之且人之欲善誰不如我我欲無貳而能謂人已乎冬十月里克殺奚齊于次書曰殺其君之子未𦵏也荀息將死之人曰不如立卓子而輔之荀息立公子卓以𦵏十一月里克殺公子卓于朝荀息死之辛未二年春魯侯如齊林氏曰魯始屈于大國此魯侯朝齊之始也狄滅温温子犇衛左氏曰狄滅温蘇子無信也蘇子叛王即狄又不能于狄狄人伐之王不救故滅蘇子奔衛夏四月周公忌父王子黨會秦師及齊隰朋立晉公子夷吾為晉侯是為惠公傳曰既殺奚齊卓子里克及㔻鄭使屠岸夷告公子重耳於翟曰子盍入乎重耳告舅犯犯曰不可夫堅樹在始始不固本終必槁落父母死為大喪讒在兄弟為大亂今適當之是故難重耳出見使者曰父生不得供備灑掃之臣死又不敢莅䘮以重其罪且辱大夫敢辭夫固國者在親衆而善鄰在因民而順之茍衆所利鄰國所立大夫其從之重耳不敢違吕甥及郤稱亦使蒲城午告公子夷吾於梁曰子厚賂秦人以求入吾主子夷吾告冀芮芮曰子勉之國亂民擾大夫無常不可失也子盍盡國以賂外内無愛虛以求入既入而後圖聚夷吾出見使者再拜稽首許諾吕甥出告大夫曰盍請君於秦乎大夫許諾乃使梁由靡告於秦穆公曰天降禍於晉國讒言繁興延及寡君使寡君之紹續昆裔隠悼播越重以寡君之不禄喪亂並臻以君之靈鬼神降哀罪人克伏其辜羣臣莫敢寧處將待君命君若惠顧社稷不忘先君之好辱收其逋遷胄裔而建立之以主其祭祀且鎭撫其國家及其民人晉國其誰非君之羣𨽻臣也秦穆公許諾乃使公子縶弔公子重耳於翟曰寡君使縶弔公子之憂又重之以䘮寡君聞之得國恒於斯失國恒於斯䘮不可久時不可失公子其圖之重耳告舅犯舅犯曰不可䘮人無寳仁親以為寳父死之謂何又因以為利而天下其孰能説之孺子其辭焉重耳出見使者曰君惠弔亡臣重耳又重有命重耳身䘮父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私公子縶退弔夷吾於梁如弔重耳之命夷吾告冀芮冀芮曰公子勉之狷潔不行重賂配徳人實有之我以徼幸不亦可乎夷吾出見使者退而私於公子縶曰中大夫里克與我矣吾命之以汶陽之田百萬㔻鄭與我矣吾命之以負蔡之田七十萬君茍輔我入掃宗廟定社稷亡人何國之與有君實有郡縣且入河外列城五為君之東游津梁之上無有難急也黃金四十鎰白玉之珩六雙不敢當公子請納之左右公子縶反致命穆公曰吾與公子重耳重耳仁稽顙而不拜則未為後也哭而起則愛父也起而不私則逺利也公子縶曰君之言過矣君若求置晉君而載之置仁不亦可乎君若求置晉君以成名於天下則不如置不仁以滑其中且可以進退是故先置夷吾齊隰朋帥師㑹秦師納晉惠公秦伯謂公孫枝曰夷吾其定乎對曰唯則定國今其言多忌克難哉公曰忌則多怨又焉能克是吾利也國語禮記左氏履祥按重耳不求入夷吾求入秦穆公雖義重耳之仁而終貪夷吾之賂此公子縶之謀也秦穆天資本善而輔之者非人一有利心釀晉亂者十五年於此孟子惡有國者之言利其意深哉齊桓公志平晉亂而置君一唯秦之聼亦不能援立重耳惜哉晉殺其大夫里克左氏曰晉侯將殺里克以説使謂之曰㣲子則不及此雖然子弑二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死於是㔻鄭聘於秦且謝緩賂故不及履祥按惠公之殺里克前以掩奪國之嫌後以防重耳之入里克雖為社稷立賢之計拳拳於重耳然與其殺二君而成重耳孰若全申生以弭後患因優施一言之誘遂為中立之謀坐視申生之死於前而卒蹈弑逆之名於後惜哉三年王使召武公内史過賜晉侯命左氏曰晉侯受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昬何以長世王子帶以戎入宼秦晉伐戎晉侯平戎左氏曰揚拒泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也秦晉伐戎以救周晉侯平戎於王四年三月庚午日有食之楚人滅黄左氏曰黃人恃諸侯之睦於齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃履祥按黃之滅管仲之言卒騐齊桓霸業於是衰矣陳氏曰以陽榖之會貫之盟徒以亡其國焉耳王子帶奔齊齊侯使管夷吾入聘左氏曰王以戎難故討王子帶王子帶奔齊齊侯使管夷吾平戎於王王以上卿之禮饗之管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿徳謂督不忘徃踐乃職無逆朕命管仲受下卿之禮而還履祥按五伯桓公為盛而周室戎狄之禍自若王子帶以戎伐周天下之大罪也桓公不能討而平戎於王豈以受王子帶之奔為此姑息耶桓公身不能容子糾而為王容叔帶固將曲全襄王兄弟之愛未免卒釀王室異日之禍云陳宣公卒子款嗣是為共公五年齊侯使仲孫湫入聘左氏曰齊侯使仲孫湫聘於周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯會於鹹齊侯使仲孫湫來致諸侯之戍左氏曰淮夷病杞故且謀王室也為戎難故諸侯戍周齊仲孫湫致之六年諸侯城緣陵左氏曰諸侯城緣陵而遷杞焉不書其人有闕也蔡穆侯卒子甲午嗣是為莊侯七年楚人伐徐齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯盟於牡丘遂次於匡諸侯之大夫救徐五月日有食之齊師曹師伐厲宋人伐曹楚人敗徐於婁林齊大夫管仲卒管子書曰管仲寢疾桓公往問之曰仲父之疾甚矣不幸而不起此疾彼政我將安移之管仲未對桓公曰鮑叔之為人何如對曰鮑叔君子也千乗之國不以其道予之不受也雖然不可以為政其為人也好善而惡惡已甚見一惡終身不忘公曰然則孰可曰隰朋可朋之為人好上識而下問臣聞之以徳予人者謂之仁以財與人者謂之良以善勝人者未有能服人者也以善養人者未有不服人者也於國有所不知政於家有所不知事必隰朋乎且朋之為人也居其家不忘公門居公門不忘其家事君不二其心亦不忘其身舉齊國之幣握路家五十室其人不知也大仁也哉其朋乎公又問曰不幸而失仲父也二三大夫者其猶能以國寧乎管仲曰君請矍已乎鮑叔牙之為人也好直賓胥無之為人也好善寗戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也曰鮑叔之為人好直而不能以國詘賓胥無之為人也好善而不能以國詘寗戚之為人能事而不能以足息孫在之為人善言而不能以信黙臣聞之消息盈虛與百姓詘信然后能以國寧勿己者朋其可乎言終喟然嘆曰天之生朋以為夷吾舌也其身死舌焉得生哉史記曰是嵗管仲隰朋皆卒管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙如何對曰殺子以適君非人情不可開方如何曰倍親以適君非人情難近豎刁如何對曰自宫以適君非人情難親管仲死而桓公不用其言近用三子三子專權老泉蘇氏曰管仲相桓公霸諸侯攘戎狄終其身齊國富彊諸侯不叛管仲死豎刁易牙開方用桓公薨於亂五公子爭立其禍蔓延訖簡公齊無寧歲三子固亂人國者顧其使桓公得用三子者管仲也仲之疾也公問之相吾以仲且舉天下之賢者以對而其言乃不過曰豎刁易牙開方三子非人情不可近而已仲以為桓公果能不用三子矣乎桓公聲色不絶乎耳目非三子則無以遂其欲彼其初之所以不用者徒以有仲焉耳一日無仲則三子者可以彈冠相慶矣仲以為將死之言可以縶桓公之手足耶雖桓公幸而聼仲誅此三人而其餘者仲能悉數而去之耶因桓公之問舉天下之賢以自代則仲雖死而齊國未為無仲也夫何患三子者五伯莫盛於桓文文公之才不及桓公其臣又皆不及仲晉襲文公之餘威得為諸侯之盟主百有餘年何者其君雖不肖而尚有老成人焉桓公之死一亂塗地無惑也彼獨恃一管仲而仲死矣賢者不悲其身之死而憂其國之衰故必復有賢者而後可以死彼管仲者何以死哉履祥按管仲之死當在是年之春外則救徐而徐敗内則牡丘之盟伐厲之師方行而宋人伐曹西則與秦共立晉侯而秦伐晉獲其君以歸桓公於此皆末如之何矣晉侯及秦伯戰於韓獲晉侯左氏曰晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯烝於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山内及觧梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉三敗及韓晉侯謂慶鄭曰宼深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使歩揚御戎家僕徒為右乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道今乘異産及懼而變將與人易弗聼晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今叉擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰壬戌戰於韓原晉戎馬還濘而止秦獲晉侯以歸晉大夫反首拔舍從之王命秦伯釋晉侯史記曰周天子聞之曰晉我同姓為請晉君夷吾姊為穆公夫人夫人聞之衰絰跣以太子罃𢎞與女簡璧登臺而履薪焉穆公曰我得晉君以為功今天子為請夫人是憂乃與晉君盟許歸之更舍上舍而饋之七牢兼用左氏晉侯夷吾自秦歸於晉左氏曰子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使卻乞告瑕吕飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜貮圉也衆皆哭吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子衆説晉隂飴甥㑹秦伯盟於王城秦伯曰晉國和乎對曰不和小人恥失其君而悼䘮其親不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報徳有死無二以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君貳而執之服而舍之徳莫厚焉刑莫威焉服者懐徳貳者畏刑此一役也秦可以霸納而不定廢而不立以徳為怨秦不其然秦伯曰是吾心也十一月晉侯歸史記曰歸晉君夷吾夷吾獻其河西地使太子圉為質於秦秦妻子圉以宗女八年隕石於宋五六鷁退飛過宋都左氏曰隕石於宋五隕星也六鷁退飛過宋都風也狄侵晉王以戎難告於齊齊侯徵諸侯之師入戍齊侯宋公魯侯陳侯衛侯鄭伯許男邢侯曹伯會於淮左氏曰狄侵晉取狐㕑受鐸渉汾及昆都因晉敗也王以戎難告於齊齊徵諸侯而戍周會於淮謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還履祥按齊桓尚能伐厲以救徐城鄫以制淮夷豈不能伐戎以救周乎不務徳而勤遠畧於此見矣九年齊人徐人伐英氏報婁林之役英氏楚與國齊桓公卒五公子爭立易牙立無虧世子昭出左氏曰齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟無虧少衛姬生惠公公子元鄭姬生孝公公子昭葛嬴生昭公公子潘密姬生懿公公子商人宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯十年宋公曹伯衛人邾人伐齊鄭伯始朝於楚魯人救齊宋師及齊師戰於甗齊師敗績立公子昭是為孝公狄救齊邢人狄人伐衛左氏曰宋襄公以諸侯伐齊三月齊人殺無虧齊人將立孝公不勝四公子之徒遂與宋人戰宋敗齊師於甗立孝公而還八月葬齊桓公邢人狄人伐衛衛侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師於訾婁狄師還履祥按齊桓公卒而鄭伯始朝於楚邢狄伐衛矣諸侯之伐齊雖為桓公之故然以霸國而受伐天下之事固可知矣宋襄狃於伐齊之勝遂有圖覇之心焉説者以邢人狄人伐衛為進狄而救齊果進狄何不於救齊人之而於伐衛人之耶伐衛則與邢俱人之盟邢則與齊俱人之桓公歿而狄重稱人夷狄之盛也晉文霸而狄復稱狄伯圖之盛也十有一年宋人執滕子嬰齊宋公曹人邾人盟於曹南鄫子會盟於邾邾人執鄫子用之宋人圍曹左氏曰宋人執滕宣公夏宋公使邾文公用鄫子於次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一會而虐二國之君又用諸淫昬之鬼將以求霸不亦難乎得死為幸宋人圍曹討不服也子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降退脩教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動履祥按齊桓公晩始東畧宋襄公蓋繼其志欲以屬東夷首虐滕鄫之君本欲立威不知乃所以失諸侯也齊桓公假仁義而霸宋襄公假仁義而又不及其屬小國也將假義而失之暴其敵大國也將假仁而失之迂宋襄圖霸大槩如此然用鄫子者宋襄之命也而春秋歸罪於邾以邾之役於不義也夫以邾文公之賢不能自立而怵於震鄰䧟於賣友可惜也已衛人伐邢左氏曰衛人伐邢以報莵圃之役於是衛大旱卜有事於山川不吉寗莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨陳人魯人蔡人楚人鄭人盟於齊左氏曰陳穆公請脩好於諸侯以無忘齊桓之徳盟於齊修桓公之好也春秋書㑹陳人蔡人楚人鄭人盟於齊胡氏曰為此盟者乃公與陳蔡楚鄭之君或其大夫也曷為沒公而人諸侯與其大夫諱是盟也楚人之得與中國會盟自此始矣莊公十年荆敗蔡師始見於經其後入蔡伐鄭皆以號舉夷狄之也僖公元年改而稱楚經亦書人於是浸強矣然終桓公世皆止書人而不得與中國盟會者以齊修霸業能制其強故也桓公既没中國無霸鄭伯首朝於楚其後遂為此盟故春秋没公人陳蔡之君而以鄭列其下蓋深罪之也又二年復盟於鹿上至會於㿻遂執宋公以伐宋於是列位陳蔡之上而書爵矣聖人所以著夷狄之強傷中國之衰也梁亡左氏曰梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某宼將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁公羊氏曰梁亡魚爛而亡也榖梁氏曰梁亡自亡也湎於酒淫於色心昬耳目塞上無正長之治大臣背叛民為宼盜梁亡自亡也如加力役焉湎不足道也十有二年鄭人入滑齊人狄人盟於邢楚人伐隨左氏曰衛方病邢隨以漢東諸侯叛楚十有三年狄侵衛宋人齊人楚人盟於鹿上左氏曰宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋公楚子陳侯蔡侯鄭伯許男曹伯會於㿻執宋公以伐宋魯侯會諸侯盟於薄釋宋公左氏曰諸侯會宋公於㿻子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬會於薄以釋之子魚曰禍猶未也未足以懲君公羊氏曰宋公與楚子期以乘車之會公子目夷諫曰楚夷國也強而無義請君以兵車之會徃宋公曰吾與之約自我為之自我墮之不可終以乘車之會往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣國子之國也目夷曰君雖不言國固臣之國也於是歸設守械楚人謂宋人曰子不與我國吾將殺子君矣宋人曰吾頼社稷之神靈國已有君矣楚人知雖殺宋公猶不得宋國於是釋宋公公走之衛公子目夷復曰國為君守之迎襄公歸胡氏曰執宋公者楚子也不言楚子分惡於諸侯也諸侯皆在而蠻夷執其會主莫之敢違其不勇於為義亦甚矣故特列楚人於陳蔡之上而以同執為文夫以楚之強豈能勝秦五國之衆何弱於趙然澠池之會藺相如一奮其氣威信敵國秦雖虎狼猶不敢動况以五國之君而不能得志於荆楚乎然宋公欲繼齊桓之烈而與楚會盟豈攘戎狄尊王室之義乎故人宋公於鹿上之盟而盂之㑹直書不隠所以深貶之操縱大權自蠻夷出其事已傎矣故書會盟書釋皆不言楚子榖梁氏謂不與楚專釋是也陳氏曰楚初爭長也十有四年鄭伯如楚宋公衛侯許男滕子伐鄭秦晉遷陸渾之戎於伊川左氏曰初平王之東遷也辛有適伊川見披髮而祭於野者曰不及百年此其戎乎其禮先亡矣是年秋秦晉遷陸渾之戎於伊川履祥按先王視地畫井而計民授田凡地之可田者既已井授矣其依山阻險髙下不一地不可田田不可井者尚皆虛之用廣樵牧惟夷狄之俗則多依山阻險此所以有九州内之夷狄也然伊洛王畿天地之中雖曰曠土秦晉豈宜遷陸渾之戎居之秦晉之罪不惟亂華其偪周甚矣自此伊洛之戎世為周患他日王謂晉人曰先王居檮杌於四裔以禦魑魅故允姓之祖居於𤓰州伯父惠公歸自秦而誘以來使逼我郊甸戎有中國誰之咎也然則秦晉之罪不可勝誅矣晉子圉自秦逃歸王召叔帶於齊左氏曰富辰言於王曰請召大叔詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王説王子帶自齊復歸於京師王召之也宋公及楚人戰於泓宋師敗績左氏曰鄭伯如楚宋公伐鄭子魚曰所謂禍在此矣楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商乆矣君將興之弗可赦也已弗聼及楚人戰於泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲威致志鼓儳可也鄭文夫人芈氏姜氏勞楚子於柯澤楚子使師縉示之俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器楚子入饗於鄭九獻庭實旅百加籩豆六品饗畢夜出文芉逆於軍取鄭二姬以歸叔詹曰楚王其不没乎為禮卒於無别無别不可謂禮將何以没諸侯是以知其不遂霸履祥按宋襄求霸之初虐二國之君何其暴也至泓之戰不重傷不禽二毛又何其仁也無他前日氣鋭而今日氣怯爾十有五年齊侯伐宋圍緡宋襄公卒子王臣嗣是為成公左氏曰齊侯伐宋以討其不與盟於齊也宋襄公卒傷於泓故也楚人伐陳左氏曰楚成得臣伐陳討其貳於宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾王命狄師伐鄭取櫟以狄女隗氏為后左氏曰鄭之入滑也滑人聼命師還又即衛鄭人伐滑王使伯服游孫伯如鄭請滑鄭伯怨王之與衛滑也不聼王命而執二子王怒將以狄伐鄭富辰諫曰不可太上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周徳之不類故糾合宗族於成周曰凡今之人莫如兄弟兄弟䦧於牆外禦其侮左氏以召穆公作詩曰凡今之人莫如兄弟吕成公謂舉已成之詩而作樂然考國語則曰周文公之詩曰兄弟䦧於墻外禦其侮則左氏文蓋誤其曰周之有懿徳也猶曰莫如兄弟召穆公亦云則是自救其前之誤也今節其文如此如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄徳崇姦禍之大者也鄭有平惠之勲又有厲宣之親棄嬖寵而用三良於諸姬為近四徳具矣耳不聼五聲之和為聾目不别五色之章為眛心不則徳義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿徳也猶曰莫如兄弟故以親屏周召穆公亦云今周徳既衰於是乎又渝周召以從諸姦無乃不可乎王弗聼使頽叔桃子出狄師伐鄭取櫟王徳狄人將以其女為后富辰諫曰臣聞之曰報者倦矣施者未厭狄固貪惏王又啟之女徳無極婦怨無終狄必為患又弗聼晉惠公卒子圉嗣是為懐公左氏曰晉太子圉為質於秦逃歸惠公卒圉立命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召懐公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服已則不明而殺人以逞不亦難乎民不見徳而唯戮是聞其何後之有十有六年晉公子重耳入於晉以立是為文公晉人殺懐公於髙梁傳曰初晉公子重耳奔狄從者狐偃趙衰顚頡魏武子司空季子狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾處狄十二年左氏狐偃曰日吾來此也非以狄為可以成事也奔而易逹困而有資休以擇利可以戾矣戾久將底誰能興之蓄力一紀可以遠矣齊侯長矣管仲沒矣謀而無正衷而思始必追擇前言求善以終兹可以親皆以為然乃行國語過衛衛文公不禮焉出於五鹿乞食於野人與之塊怒子犯曰天賜也左氏民以土服必獲此土受而載之國語及齊齊桓公妻之公子安之左氏桓公卒孝公即位諸侯畔齊子犯知齊之不可以動與從者謀於桑下蠶妾在其上聞之告姜氏殺之而言於公子曰從者將以子行其聞之者吾已除之矣子必從之自子之行晉無寧歲民無成君天未喪晉無異公子有晉國者非子而誰公子曰吾不動矣姜曰不然西方之書曰懐與安實疚大事昔管敬仲有言畏威如疾民之上也從懐如流民之下也見懐思威民之中也齊國之政敗矣晉之無道久矣從者之謀忠矣時日及矣敗不可處時不可失忠不可棄懐不可從子必速行公子弗聼國語姜與子犯謀醉而遣之及曹曹共公聞其駢脅浴薄而觀之僖負覊之妻曰晉公子之從者皆足以相國夫子必反其國反必得志於諸侯得志而誅無禮曹其首也子盍蚤自貳焉乃饋盤飱置璧焉左氏負覊言於曹伯弗聼國語及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啟人弗及也晉公子離外之患而天不靖晉國殆將啟之有三士足以上人而從之晉鄭同儕其過子弟固將禮焉况天之所啟乎弗聼及楚楚子饗之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎左氏於是懐公自秦逃歸秦伯召公子於楚楚子厚幣以送公子於秦國語秦伯納女五人懐嬴與焉他日享之趙衰從公子賦河水公賦六月趙衰曰重耳拜賜君稱所以佐天子者命重耳敢不拜左氏十月惠公卒十二月秦伯納公子國語濟河圍令狐入桑泉取臼衰懐公奔髙梁二月甲午晉師軍於廬桞秦伯使公子縶如晋師師退軍于郇辛丑狐偃及秦晉之大夫盟於郇壬寅公子入於晉師丙午入于曲沃丁未朝於武宫戊申使殺懐公於髙梁左氏國語曰晉人殺懐公於髙梁而授重耳經世曰秦人殺晉懐公入公子重耳於晉吕郤畏逼將焚公宮而弑晉侯寺人披請見公使辭焉曰蒲城之役君命一宿女即至其後為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫祛猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎公見之以難告三月晉侯潛會秦伯於王城己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衛於晉三千人實紀綱之僕左氏公屬百官賦職任功棄責薄歛施舍分寡救乏振滯匡困資無輕關易道通商寛農懋穡勸分省用足財利器明徳以厚民性舉善援能官方定物正名育類昭舊族愛親戚明賢良尊貴寵賞功勞事耉老禮賓旅友故舊胥籍狐箕欒郤栢先羊舌董韓寔掌近官諸姬之良掌其中官異姓之能掌其遠官公食貢大夫食邑士食田庻人食力工商食官皁𨽻食職官宰食加政平民阜財用不匱國語王使王子虎内史興錫晉侯命國語曰襄王使大宰文公及内史興錫晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命於武宫設桑主布几筵大宰涖之晉侯端委以入内史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好内史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道也成禮義徳之則也則徳以道諸侯諸侯必歸之且禮所以觀忠信仁義也忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不攜若民不怨而財不匱令不偷而動不攜其何事不濟中能應外忠也施徳服義仁也守節不淫信也行禮不疚義也臣入晉境四者不失王其善之樹於有禮艾音刈人必豐王從之使於晉者道相逮也王廢狄后王子帶以狄入宼王出居鄭左氏曰大叔帶通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頽叔桃子奉大叔以狄師伐周大敗周師王出適鄭處於汜大叔以隗氏居於溫鄭伯與孔將鉏石甲父侯宣多省視官具於汜而後聽其私政王使告難於諸侯左氏曰王使來告難曰不榖不徳得罪於母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子䝉塵於外敢不奔問官守王使簡師父告於晉使左鄢父告於秦宋公如楚左氏曰宋及楚平宋成公如楚還入於鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有䘮拜焉豐厚可也鄭伯從之御批資治通鑑綱目前編卷十一
