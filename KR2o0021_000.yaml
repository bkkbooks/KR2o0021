body:
  text: 御批資治通鑑綱目全書序朕惟自古帝王言動必記而史事以興顧周禮外史所掌卷帙寖繁即記傳亦異千百年來微言大義昭接天壤必以尼山筆削為斷所從來尚矣粵自龍門而降纍朝國乘體製略同涑水司馬氏易分類為合編蓋猶左氏法也紫陽朱子特起而振舉之綱以提要目以備詳嵗時列於上而天統明章程繫於下而人紀立增損精切豫奪謹嚴庶幾春秋大居正之宗指與雖其間事例櫽括稍有脫誤大都門人一時采輯之過實非晦庵本意也自時厥後有前編有外紀有大紀續編以及考證集覽發明質實之類諸家論著不一而足要皆商確折衷互相參訂明儒陳仁錫裒集而剞劂之不可謂非先哲之功臣也朕幾務之暇留神披閲博稽詳考纎悉靡遺取義必抉其精徴辭必搜其奧析疑正陋釐異闡幽務期法戒昭彰質文融貫前後所著論斷凡百有餘首兹允諸臣請並以付梓頒布宇內俾士子流傳誦習開卷瞭然不特天人理欲之微古今治忽之故一一臚如指掌即子朱子祖述宣尼維持世教之苦衷並可潛孚默契於數千載之下是則朕敦崇古學作新蒸民之至意也爰叙述以冠篇端用昭示於無窮焉康熙四十六年正月十七日欽定四庫全書史部十五御批資治通鑑綱目前編史評類提要臣等謹案御批資治通鑑綱目前編十八卷外紀一卷舉要三卷元金履祥撰履祥字吉父婺之蘭溪人從學於同郡王柏何基得朱子之傳當宋末造嘗上書獻海道搗虛之䇿不用德祐初以迪功郎史館編校起之弗就閉户著書居仁山之下學者稱為仁山先生大德初卒至正中追諡文安其學務為有用凡天文地形禮樂田乘兵謀陰陽律算之書罔不切究所著大學章句疏義尚書表注諸書已别著録是編用皇極經世皇王大紀之例凡綱目所未載者編年紀事一以尚書為主下及詩禮春秋經傳旁及舊史諸子采托條繫凡所引書多加訓釋以裁正其義有出於前儒所未發者蓋朱子綱目本於資治通鑑斷自三晉分封迄於五代之季是編則上溯帝堯下逮威烈準劉恕外紀以記前事而舉要三卷為其標目亦猶通鑑之有目録也又取上古之事為外紀一卷以冠其首每條悉標出處以示傳信書成以授其門人許謙而曰微言懿行後王所當法苛法亂政後王所當戒可謂得著書之要矣明陳仁錫始與綱目合刻我聖祖仁皇帝既取綱目之書加以御批乃並此刋布以為考古之助洵可以昭示無窮矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書御批資治通鑑綱目前編卷首三皇紀索隱曰紀者記也本其事而記之故曰本紀帝王書稱紀者言為後代之綱紀也總論雙湖胡氏曰三皇之號昉於周禮外史掌三皇五帝之書而不指其名其次則見於秦博士有天皇地皇人皇之議秦去古未遠意三皇之稱此或庶幾焉漢孔安國書序乃始以伏羲神農黃帝為三皇少昊顓頊高辛堯舜為五帝不知果何所本蓋孔子於家語自伏羲以下皆稱曰帝易大傳春秋內外傳有黃帝炎帝之稱吕氏月令雖不可為據然有曰帝太昊帝炎帝帝黃帝亦足以表先秦昧嘗以伏羲神農黃帝為三皇也至宋五峰胡氏直斷以孔子易大𫝊以伏羲神農黃帝堯舜為五帝不信𫝊而信經其論始定然三皇之號不可泯也則亦以天皇地皇人皇言之但此三者本無所稽意混茫初開先有天而後有地既有天地則氣化而人生焉皇極經世書以元經會所謂天開於子地闢於丑人生於寅至寅始為開物之初意三皇之號由此而稱而所謂三墳者亦必因文籍既生之後述上古之事而有定書大抵鴻荒闊遠不可得而詳矣况夫子於書首唐虞於易首伏羲伏羲以前皆未嘗道闕之可也盤古氏太極生兩儀兩儀生四象四象變化而庶類繁矣相傅首出御世者曰盤古氏又曰渾敦氏音釋盤舌氏釋名盤古猶言盤固也太極生兩儀張九韶曰太極者象數未形而理已具之稱兩儀者天地之謂也四象變化張九韶曰四象者太陽少陽太隂少隂之謂也邵子以日月星辰為天之四象水火土石為地之四象也釋名變者化之始化者變之終也渾敦氏釋名渾敦未昭晰之謂也敦或作沌總論五峰胡氏曰盤古生於大荒莫知其始明天地之道達隂陽之變為三才首君於是混茫開矣史論靜軒周氏曰天之立君以御世也君之立極以統衆也故易曰天地之大德曰生聖人之大寶曰位混沌之世天地始分即有盤古氏出自太極而生兩儀自兩儀而生四象變化無窮庶類繁夥由是天地始為天地人物始為人物而混茫開矣雖然鴻荒之世書契未立制度未備為君者不過穴居而野處茹毛而飲血俾是時不生盤古則天地何由以分日月何由以辨山川何以為山川草木何以為草木此盤古所以繼天而出治也厥後天開於子則有天皇氏地闢於丑則有地皇氏人生於寅則有人皇氏天地人判而三才以立世道漸開風氣漸盛人文宣著治教休明矣天之立君豈茍焉而已哉是以父天母地而謂之天子天子者首出庶物而萬國咸寧其任大責重不其然乎噫天皇氏一姓十三人繼盤古氏以治是曰天靈淡泊無為而俗自化始制干支之名以定歲之所在十干曰閼逢旃䝉柔兆彊圉著雍屠維上章重光𤣥黓昭陽十二支曰困敦赤奮若攝提格單閼執徐大荒落敦牂協洽涒灘作噩閼茂大淵獻兄弟各一萬八千歲音釋天皇氏釋名天陽氣上積而成形者也皇大君也氏姓氏也蓋天地未分之首元氣混而為一一氣既分之後先有天而後有地則氣化而人生焉謂之天皇氏者蓋取天開於子之義也干支之名蔡雍獨斷云干幹也其名有十亦曰十母即甲乙丙丁戊己庚辛壬癸是也支枝也其名一十有二亦曰十二子即子丑寅卯辰巳午未申酉戌亥是也史論靜軒周氏曰盤古氏既分天地天既開於子矣而天皇氏出焉繼盤古而為治天既開矣而干支之名則未製也地既闢矣而歲時之位則未定也由是制干支以定歲之所在甘淡薄以俟俗之自化𫝊曰非天子不議禮不制度不考文今天皇氏居天子之位操制作之權既立十干以定歲又立十二支以定時歲時既定民始知天道之所向矣夫有一代興王之君必立一代興王之制後王自是而相因百世俟之而不惑觀其律身行已淡薄無為誠足為帝王御世之良法後之瓊宫瑶臺糟丘池酒者自取滅亡何益之有俗化淡薄亦無奢僭而天下趨於清靜無欲之鄉上行下效捷於影響所謂家齊而國治也民風之盛為何如哉故通鑑大書特書以首外紀欲使時君世主法其淡薄無為之心兢兢業業罔敢侈肆毋輕民事惟艱無安厥位惟危見賢而思齊可也地皇氏一姓十一人繼天皇氏以治爰定三辰是分晝夜以三十日為一月兄弟各一萬八千歲音釋地皇氏釋名地隂氣下凝而成質者也謂之地皇氏者蓋取地闢於丑之義也爰定三辰爰所也三辰謂日月星也亦曰三光左傳三辰旗旗昭其明也史論靜軒周氏曰此地闢於丑而有地皇氏出焉所以主宰萬物而君臨天下者也天地開闢支干已名俾三辰不定晝夜不分則𡨕𡨕焉萬古皆如長夜矣由是明乎晝者則謂之日明乎夜者則謂之月在天成象在地成形而謂之星宿晝夜者隂陽之道也三辰既分而晝夜已判消長盈虛朔望相繼而遂以三十日為一月焉聖人創制立法垂憲萬世俾後之民人皆知日月之道星辰之理晝夜之所以然歲月之如此故不啻如披雲霧而覩青天剪荆棘而尋大道引醉生夢死之人心而登高明正大之域矣是以天生聖人精氣所萃天不能言語也而聖人言語之天不能動作也而聖人動作之天不能刑殺也而聖人刑殺之君師之位至尊至重位則天位祿則天祿天子代天理物繼天以出治者也人君敬天法祖節用愛人乃職分之當然耳詎可輕佻而已哉辨疑余宗海曰愚聞之師云八千之千當作百蓋邵子以自有天地至于窮盡謂之一元一元有十二㑹一㑹有一萬八百年子㑹生天丑㑹生地寅㑹生人至戌㑹則閉物而消天亥㑹則消天而消地至子㑹則又生天而循環無窮矣自寅㑹箕一度至午㑹星一度該四萬五千餘年正唐堯起甲辰之時也夫自開闢以來固有民物帝王第以書契未興無從稽考其曰天皇氏地皇氏人皇氏蓋亦傳聞其名而已故作史者以生民以來若千年歲灑派於天地人皇氏之下以足其數豈真有一萬八千歲之理哉然不以四萬五千六百年録之於唐堯之前而置之於此蓋亦誤矣學者不可不察人皇氏一姓九人繼地皇氏以治相厥山川分為九區人居一方故又曰居方氏當是時也萬物羣生淳風沕穆主不虛王臣不虛貴政教君臣所自起飲食男女所自始亦號九皇氏兄弟九人合四萬五千六百年音釋人皇氏釋名人者神也而為萬物之最靈者也謂之人皇氏者蓋取人生於寅之義也淳風沕穆淳實也亦作醇賈誼賦沕穆無窮注沕穆深微貌沕音勿史論靜軒周氏曰此人生於寅而人皇氏出所以繼天皇地皇而為治也是時風氣漸開而萬物為之羣生時序漸著而淳風為之沕穆君乃明君而主不虛王臣乃良臣而臣不虛貴制治漸敷而政教所由興禮義漸備而君臣所自起饑食渴飲而民食用漸著矣男交女媾而民婚姻漸長矣是時法網疏濶風俗淳厚為君者不以安富尊榮為心為臣者不以崇髙富貴為重逮夫林林總總之民但知花開為春葉落為秋饑則思食渴則思飲而已民僞猶未滋也人欲猶未侈也人雖羣生而僣奪之患不興物雖總聚而凌逼之念不舉故人皇氏兄弟九人分為九區各一方均享天祿非若後世視骨肉如寇讐待兄弟如芒刺分門割戶惡若賊讐也人心不古有如是哉噫總論愚按春秋元命苞曰天地開闢至春秋魯哀公蔣十四年獲麟之歲凡二百二十六萬七千年分為十紀其一曰九頭紀即人皇氏也古者謂一人為一頭人皇兄弟九人故也二曰五龍紀又謂之五姓兄弟五人曰皇伯皇仲皇叔皇季皇少治在五方司五行布山嶽繼人皇御世者也方是時也世亟巢穴日月貞明三曰攝提紀五十九姓繼五龍氏以治分天下而居焉四曰合雒紀三姓繼攝提氏以治始教民穴居者也五曰連通紀六姓繼合雒氏以治六曰叙命紀四姓繼連通氏以治七曰循蜚紀八曰因提紀九曰禪通紀十曰疏仡紀自人皇氏至敘命氏凡八十三君自循蜚而後皆有世次可紀禪通則終于炎帝疏仡則始于黃帝以迄于周言雖繁而事不經見聞者疑之夫人靈於萬物而氣禀不齊其才德出類者則為衆所宗此君道之始也蜂蟻尚然况于人哉以盤古之先為無君耶吾不得而知也以人皇之後為有君耶吾不得而泯也愼其世而著其號去其怪而存其常可也故謹列循蜚紀以下附諸人皇氏之末以備參考焉循蜚紀循蜚者以其時德厚信矼人循其化速若蜚也有號而無世凡二十二氏音釋德厚信矼厚深也矼苦江切信實貌巨靈氏出於汾脽握大象持化權揮五丁之士驅隂陽反山川居無恆處而跡躔于蜀音釋出於汾脽出猶生也汾脽謂汾隂脽上也按一統志汾隂古地名漢置縣屬河東郡宋改榮河縣而本朝因之屬平陽府蘇林曰脽音誰如淳曰脽者河東岸特堆堀長四五里廣一里餘高十丈汾隂縣治脽之上也句彊氏譙明氏涿光氏鉤陳氏黃神氏􅀈神氏音釋􅀈臼許切犂靈氏大騩氏音釋騩京媚切鬼騩氏弇兹氏音釋弇沽三切泰逢氏冉相氏蓋盈氏大敦氏靈陽氏巫常氏泰一氏是為皇人調大鴻之氣正神明之位蓋範無形嘗無味要㑹久視操法攬而長存者空桑氏音釋帝王世紀云陳留縣南一十五里有空桑城即空桑氏所都伊尹亦生於此神民氏又曰神皇蓋使神民異業精氣通行者徛帝氏次民氏次民之世穴處終矣因提紀因提者其世咸有制作俾後人可因以利時也有號有世凡十三氏辰放氏古初之人卉服蔽體辰放氏作教民􅠡木茹皮以禦風霜綯髮閐首以去靈雨而人從之命之曰衣皮之民𫝊四世音釋卉服蔽體孟康曰卉服島夷之服注卉音毁蔽猶遮也􅠡木茹皮􅠡居輦切兩手取也茹而預切相牽引貌綯髮閐首綯徒刀切絞之也閐未詳音切疑字之訛也以去靈雨去除之也詩定之方中篇靈雨既零注靈善也靈雨者方春時雨也蜀山氏蜀之為國肇自人皇其始蠶叢拍濩魚鳬三君各數百歲同號蜀山蠶叢居瞿上魚鳬治導江逮蒲澤俾明時人氓椎結左言不知文字事莫克𫝊最後望帝杜宇云音釋居瞿上居猶聚也瞿上古城名按一統志在成都府雙流縣東一十八里乃蠶叢氏所都治導江治理之也導江古邑名按一統志本漢都安縣唐改導江縣元省入灌縣屬成都府逮蒲澤逮及之也蒲澤古邑名按一統志本漢堂陽城晉置蒲澤縣宋省入南宫縣屬真定府人氓椎結左言氓眉庚切民也亦作氓周禮注氓猶懵懵無知貌服䖍曰椎一作魋今兵士作椎頭結也索隱曰魋𫝊追反結音計謂為髻一撮似椎而結之故字從結案魋結二字依字讀之亦通夷人俗本被髮今蜀民同其風俗但魋其髮而結之左猶戾也毛晃曰人道以右為尊故非正之言曰左言望帝杜宇九域志杜宇古蜀主也號望帝蜀嘗大水宇與居人避水於長平山後鱉靈開峽治水人得陸處宇禪位與之自居西山得道升天豗傀氏音釋豗呼回切一作虺傀始回切亦作瑰傳六世渾沌氏𫝊七世東戶氏子思子曰東戶氏之熙載也紹荒屯遺美好垂精拱默而九寰以承流當是之時禽獸成羣竹木遂長道上顔行而不拾遺耕者餘餼宿之隴首其歌樂而無謡其哭哀而無聲蓋至德之世也𫝊十七世音釋熙載書舜典有能奮庸熙帝之載注熙廣也舜言有能奮起事功以廣帝堯之事者九寰以承流九寰猶言九州也釋名寰天子封畿內縣也董仲舒䇿郡守縣令民之師帥所以承流而宣化也道上顔行而不拾遺道猶路也漢書注早行曰顔家語孔子與聞魯政道不拾遺注拾取也遺失也耕者餘餼宿之隴首餘食之賸也餼許意切饋客生食及芻米也隴力董切丘壟也顔師古曰田中高處也亦作隴皇覃氏又曰離光氏春秋命厯序曰皇覃氏之世也在而不治官天地府萬物信乎無假是故死生同兆而不可相陵𫝊七世啓統氏𫝊三世吉夷氏傳四世几蘧氏亢倉子曰凡蘧氏之在天下也不治而不亂狥耳目內通而外乎心知天下之人惟知母不知父鶉居鷇飲而不求不譽畫則旅行夜則類處及其死也槀舁風化而已命之曰知生之民天下蓋不足治也音釋鶉居鷇飲杜甫朝享太廟賦聖人鶉居鷇飲注鶉䳺鳥也鷇鳥子欲出者言聖人如鶉鳥之居無常處而飲食如鷇之待哺而活也槀舁風化槀古老切說文水莖為槀舁雲俱切說文共舉也詩序風以動之教以化之􅀈韋氏𫝊四世有巢氏𫝊二世說見後燧人氏𫝊八世說見後庸成氏羣玉之山平阿無隘四徹中繩庸成氏之所守先王之册府也𫝊八世音釋羣玉之山云云先王之册府穆天子𫝊天子西登崑崙見西王母癸巳至於羣玉之山先王之所謂䇿府注羣玉山西王母所居者册與䇿通言往古帝王以為藏書之府所謂藏書䇿之山也故祕書省謂之䇿府軒轅氏作于空桑之北紹物開智見轉蓬而制乘車橫木為軒直木為轅故號軒轅氏祝融氏又曰祝誦氏是時天下治和萬物咸若祝融聽弇州之鳴鳥以為樂歌諧神明而和人聲以火施化亦號赤帝故後世火官因以為號都于鄶葬衡山之陽音釋都于鄶說文天子所宫曰都鄶古邑名按一統志禹貢豫州之域周封黃帝後於此為鄶國春秋時為鄭武公之國名曰新鄭秦屬潁川郡漢置新鄭縣至本朝因之屬河南鈞州葬衡山之陽按一統志衡山在衡州府衡山縣西三十里五嶽之一也寰宇記云宿當翼軫度應機衡故曰衡山舜南巡狩至南嶽即此太昊伏羲氏𫝊十五世說見後史皇氏倉帝名頡有睿德生而能書及長登陽虛之山臨于𤣥扈洛水之汭靈龜負書丹甲青文倉帝受之遂窮天地之變仰觀奎星圓曲之勢俯察龜文鳥羽山川掌指而創文字文字成天為雨粟鬼為夜哭居陽武而葬利鄉音釋登陽虛之山登猶升也按一統志陽虛山在河南府永寧縣西五十里一名陽峪黃帝時倉頡隨帝南巡登陽虛之山即此臨于𤣥扈洛水之汭臨說文自上涖下也𤣥扈山名按一統志在西安府洛南縣西北一百里世𫝊黃帝時有鳳銜圖至此山帝拜受之洛水在洛南縣北五里發源冢嶺山東流入河南盧氏縣界入於河汭儒稅切孔安國曰水北曰汭杜預曰水之隈曲為汭靈龜負書丹甲青文帝王世紀大禹治水時神龜丹甲青文負書出於洛水禹因則之以序九疇居陽武而葬利鄉按一統志陽武古邑名秦為博浪沙地漢置陽武縣屬河南郡至本朝因之屬開封府利鄉未詳出處柏皇氏中央氏大庭氏栗陸氏昆連氏赫胥氏葛天氏尊盧氏昊英氏有巢氏朱襄氏隂康氏無懷氏女皇氏炎帝神農氏𫝊八世說見後考證愚按舊自史皇氏至無懷氏皆在太昊伏羲氏之前四明陳氏以為軒轅祝融當在太昊伏羲前餘各繫于太昊之後今從之疏仡紀疏以知遠仡以審斷仁義道德之所用也其世則自黃帝以訖于周考證右蓋三皇以來有天下者之號但載籍不紀莫知姓名年代所都之處然則人皇以後豈得謂無帝王邪今採四明陳氏世編增纂而分注之庶幾學者得有考焉而胡氏皇王大紀以有巢燧人二氏繼人皇氏之後今從之次于左云有巢氏太古之民穴居野處摶生咀華與物相友無有妎傷之心逮乎後世人民機智而物始為敵爪牙角毒槩不足以勝禽獸有聖者作構木為巢教民居之以避其害未知稼穡食草木之食未有火化飲禽獸之血而茹其毛先取其皮蔽前後取而蔽後號曰有巢氏之民音釋摶生咀華禮記曲禮篇毋摶飯注摶徒官切揑聚也鄭氏曰毋摶飯為欲飽不謙也韓愈進學解含英咀華注咀再吕切咀嚼也無有妎傷妎胡計切妬也又音害構木為巢構五豆切架也巢說文鳥在上曰巢在穴曰窠即陳桱所謂聚薪柴以居也教民居之以避其害皇王大紀曰有巢氏之時乃教民為櫓巢夏暑居之穴地為營堀冬寒居之未知稼穡書無逸篇先知稼穡之艱難注種曰稼斂曰穡食草木之食夏煚曰草木之食謂橡栗之屬是也史論靜軒周氏曰太古之時民物雖夥而猶穴居野處與物相友無有妎傷及有巢之世機智漸生民物相妬焉有巢氏受命而興深閔民物為害由是渙起宸斷研精殫思構木為巢教民居之而禽獸之毒始無以施其憂民之心深矣夏暑之極架木而為櫓巢冬寒之極穴居而為營窟其仁民之意切矣然而未知稼穡食草木之食末有火化飲禽獸之血而民生自爾其繁息也未有粒食茹禽獸之毛未有衣服蔽禽獸之皮而民生自爾其安恬也孟子曰人之所以異於禽獸者幾希觀太古之時穴居野處與物相友類本相同然而友愛之心則一也至有巢之民與物為敵固又異於太古之民矣使無聖人者出創制立法構巢以居則民必為禽獸所傷而無噍類焉此聖人所以有功於民物有功於後世而非私智穿鑿者所可伯仲其萬一也聖人之功用何其宏長乎噫燧人氏自有巢氏教民巢居然猶未知熟食也及燧人氏作觀星辰而察五行知空有火麗木則明於是鑽木取火教民以烹飪而民利之故號燧人氏以為燧者火之所生也乃别五木以改火順四時而遂天之意山是火之功用𢎞矣時未有文字燧人氏始作結繩之政立傳教之臺為日中之市興交易之道人情以遂故又謂之遂皇有四佐焉曰明由必育成博隕丘是已音釋鑽木取火鑽祖算切所以穿物也周禮注春取榆桞之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火教民以烹飪以用也烹普庚切煮也飪而甚切烹調生熟之節也燧者火之所生燧火燼或曰取火之木也蓋鑽火各異木是以鑽燧為鑽木出火故曰火之所生也始作結繩之政始初也朱氏附録曰上古未有文字大事則大結其繩小事則小結其繩以記之也今溪洞諸蠻猶有此又有刻板以為記者史論靜軒周氏曰有一代興王之君必立一代興王之治是時民雖巢居穴處然猶茹毛飲血熟肉猶未知也烹飪尚未諳也燧人氏作有見於此觀星辰之高下察五行之運動知空有火麗木則明由是鑽山間之木取空中之火教茹毛飲血之民為烹飪熟食之俗而火之功用大矣民之利益多矣值斯之際書契未興文字未作燧人氏作結繩之政立傳教之臺為日中之市興交易之道民用自此而通民財由之而遂君明臣良四佐並出有明由以裁成君德有必育以輔相君道成博寅亮乎天工隕丘贊襄乎治化天子雍雍默默居南面以聽天下賢相從從容容拱北面以理天下蒼生熙熙皥皥咸服役以安天下嗚呼雖三皇之時民物淳厚然亦能弗擾之而已是知君者盂也民者水也盂方則水方盂圓則水圓上焉不正安能使下之正乎故人君當正己以率物人臣當正心以事上上下正而天下一歸於正矣天下正斯世奚有不治哉總論五峯胡氏曰鴻荒之時亦猶日之夜月之晦時之冬焉生消升降終而復始於穆天命不已而成四時之造化於皇羣聖體是以為三綱之禮樂事本乎道道藏於事天生人人成天三皇尸其體五帝妙其用禹湯文武成其功孔子孟軻傳其學軻之死雖未有得其傳者惟皇上帝降衷于下民若有恆性何莫由斯道也總論臨江梁氏曰天地既分而後有民物民物既衆而後有帝王然書契未興之先雖有三皇何從而考其曰盤古氏天皇氏地皇氏人皇氏有巢氏燧人氏皆傳聞其名而已矣五帝紀總論雙湖胡氏曰天地肇判邃古遐邈厥詳曷聞孔子定書斷自唐虞他經則自周禮外惟易繫辭𫝊稱古者包羲氏王天下包羲氏沒神農氏作神農氏沒黃帝堯舜氏作如斯而已家語記孔子答宰我問五帝德答季康子問五帝及春秋內外傳於黃帝堯舜間又有少昊顓頊帝嚳焉大戴禮亦有五帝德篇其帝世皆取自黃帝次顓頊高辛堯舜與宰我所問合司馬氏史記紀五帝又與大戴禮宰我所問合意其本此二書也然皆缺而未備善乎胡氏之論曰皇者初冒天下者也帝王主宰天下者也自燧人而上即三皇之世也包羲神農黃帝堯舜是五君者有先天地開闢之仁後天地制作之義民到于今受其賜故孔子稱之黃帝之後少昊顓頊高辛雖嘗帝天下孔子所以越而遺之必稱堯舜者以三君居位僅可持其世而已未嘗有制作貽萬世故也則五帝之名實定矣今愚本之易參之胡氏以定五帝之世亦庶幾仲尼之意云耳太昊伏羲氏太昊之母居于華胥之渚履巨人跡意有所動虹且繞之因而始娠生帝于成紀以木德繼天而王故風姓有聖德象日月之明故曰太昊音釋居于華胥之渚居猶處也渚腫庾切小淵也華胥未詳何謂按一統志西安府藍田縣西三十里有華胥氏陵乃上古國君或疑即此處按史記伏羲母曰華胥履大人迹於雷澤而生帝于成紀蛇身人首二說未知孰是生帝于成紀按一統志成紀地名伏羲所生於此漢置成紀縣屬天水郡晉以後皆因之至本朝省入秦州屬鞏昌府以木德繼天而王故風姓家語云古之王者易代改號取法五行更旺相生先起於木太昊首以木德王天下索隱曰木德春令故易稱帝出乎震月令孟春其帝太昊是也王去聲治也國語云風者天地之正氣鼓動萬物之謂又王者之聲教也伏羲以木德王天下故以風為姓也作都于陳音釋作都于陳作造也都猶總也天子居於天下總㑹之所故曰都也陳邑名按一統志古為伏羲所都周封舜後於此為陳國漢置陳縣後魏置陳郡後周改陳州唐以後仍舊至本朝因之屬開封府教民佃漁畜牧以充庖厨人生之始也與禽獸無異知有母而不知其父知有愛而不知其禮卧則呿呿起則吁吁饑則求食飽則棄餘茹毛飲血而衣皮革太昊始作網罟以佃以漁以贍民用故曰伏羲氏養犧牲以充庖厨故又曰庖犧氏音釋卧則呿呿起則吁吁呿丘居切卧聲又開口也即莊子所謂口呿而不合也吁虛于切歎聲也以佃以漁佃亭年切獵獸也漁語居切捕魚也養犧牲以充庖厨陳殷曰牛羊豕曰牲犧色純者也宰殺之所曰庖烹飪之所曰厨畫八卦造書契太昊德合上下天應以鳥獸文章地應以河圖洛書於是仰觀象于天俯觀法于地中觀萬物之宜始畫八卦卦有三爻因而重之為卦六十有四以通神明之德作書契以代結繩之政書制有六一曰象形二曰假借三曰指事四曰㑹意五曰轉注六曰諧聲使天下義理必歸文字天下文字必歸六書音釋河圖洛書孔安國曰河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水神龜負文而列於背有數至九禹遂因而第之以成九類春秋緯乃云河以通乾出天苞洛之流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇始畫八卦八卦謂乾坤離坎震巽艮兌也作書契以代結繩之政書契謂刻木畫字也代更替也結繩之政注見前篇書制有六一曰象形二曰假借三曰指事四曰㑹意五曰轉注六曰諧聲鄭氏曰書畫字也一曰象形謂日月形體而為之也二曰㑹意謂武信之類人言為信止戈為武㑹合人意也三曰轉注謂考老之類建類一首文意相受左右相注故為轉注也四曰處事謂上下之類人在一上為上人在一下為下各有其處事得其宜故曰處事也五曰假借謂令長之類一字兩用也六曰諧聲謂形聲一也如江河之類皆以水為形以工可為聲也作甲厯起於甲寅支干相配為十二辰六甲而天道周矣歲以是紀而年不亂月以是紀而時不易晝夜以是紀而人知度東西南北以是紀而方不惑制嫁娶上古男女無别太昊始制嫁娶以儷皮為禮正姓氏通媒妁以重人倫之本而民始不瀆音釋制嫁娶以儷皮為禮釋名以女從夫曰嫁取女為妻曰娶儷偶數也上古未有布帛衣鳥獸皮故以為之禮後世納幣本於此也正姓氏通媒妁陳殷曰姓者統其祖考之所自出氏者别其子孫之所自分說文媒謀也謀合二姓也周禮注媒之為言謀也謀合異類使成親也說文妁酌也斟酌二姓以合配偶也以龍紀官太昊因龍馬負圖出于河之瑞始名官而以龍紀號曰龍師命朱襄為飛龍氏造書契昊英為潛龍氏造甲厯大庭為居龍氏治屋廬渾沌為降龍氏驅民害隂康為土龍氏治田里栗陸為水龍氏繁滋草木疏導泉源又命五官春官為青龍氏又曰蒼龍夏官為赤龍氏秋官為白龍氏冬官為黑龍氏中官為黃龍氏於是共工為上相柏皇為下相朱襄昊英常居左右栗陸居北赫胥居南昆連居西葛天居東隂康居下分理宇內而政化大洽音釋因龍馬負圖出于河之瑞孔安國云龍馬者天地之精其為形也馬身而龍鱗故謂之龍馬高八尺五寸類駱有翼蹈水不沒聖人在位負圖出於孟河之中焉造琴瑟太昊作荒樂歌扶徠詠罔罟以鎮天下之人命曰立基斫桐為琴繩絲為絃絃二十有七命之曰離徽以通神明之貺以合天人之和絙桑為三十六絃之瑟以修身理性反其天真而樂音自是興焉音釋造琴瑟琴瑟俱樂器世本曰伏羲氏削桐為琴靣圓法天底平象地龍池八寸通八風鳳池四寸象四時五絃象五行長七尺二寸以修身理性反天真也達靈成性象物昭功也廣韻曰瑟琴類庖羲所作長七尺二寸廣一尺八寸本五十絃後折而用其半在位百十五年崩葬于陳傳十五氏音釋崩禮記天子死曰崩王者尊居民上其死如從天墜地故曰崩葬于陳按一統志伏羲氏陵在陳州城北三里至本朝祀典有祭女媧氏與太昊同母生而神靈佐太昊正婚姻以重萬民之判是為神媒太昊沒共工氏作亂振滔洪水以禍天下女媧氏與共工氏較卒滅共工氏而誅之以治天下都于中皇之山是為女皇命臣隨作笙簧以通殊風娥陵制都良管以一天下之音用五十絃之瑟於澤丘以郊天侑神聽之極悲乃破為二十五絃以抑其情而樂乃和治百三十載而沒音釋作笙簧以通殊風笙樂器笙中金葉曰簧嚴氏曰笙以匏為之十三管列匏中而施簧管中吹笙則鼓動其簧以發聲也殊異也别也於澤丘以郊天侑神澤丘謂澤中之方丘也羣書考索曰古者祀天於南郊而地上之圓丘者南郊之丘也丘圓而高所以象天此所謂為高必因丘陵也祭地於北郊而澤中之方丘者北郊之丘也丘方而下所以象地此所謂為下必因川澤也泰壇南郊之壇也以之燔柴泰折北郊之折也以之瘞埋言泰壇則自然之丘言泰折則人為之壇也祭禮必於自然之丘所以致敬燔瘞必於人為之壇所以盡宗廟之禮侑配食也柏皇氏其治世也為而不有應而不永居于皇人之山中央氏亦曰中皇氏大庭氏其膺録也三辰增輝五鳳異色都于曲阜故魯有大庭氏之庫亦曰朱顔氏栗陸氏其為政也敖愎自用民始擕叛其臣東里子諫而被殺天下益二栗陸遂亡驪連氏亦曰昆連氏渾沌氏亦曰混敦氏赫胥氏其為治也尊民而重事方是之時人居不知所為行不知所之鼓腹而游含哺而嬉晝動夕息渴飲饑食莫知作善而作惡也尊盧氏其立政也官天地府萬物革天下之故而世用寧治居嵹臺之陽昊英氏其居位也人民少而草木鳥獸繁蓋衣薪之代也又曰子英氏有巢氏昔在上古人多禽獸之難聖人教之巢居人獲安焉及其久也木處而顚有聖人教之編槿而廬緝藋而扉塓塗茨翳以違其禍以其革有巢之化故亦號有巢氏是曰古皇蓋屋廬之始也音釋編槿而廬槿居忍切木名廬陵如切舍也緝藋而扉藋杜弔切草名扉芳微切户扉也塓塗茨翳塓莫歷切濕泥也塗同都切抹之也茨疾資切茅茨也翳於計切障之也朱襄氏其時恆風振蕩果木不實朱襄命士達作五絃之瑟以來隂氣定羣生而天下治又曰子襄氏葛天氏其治世也不言而信不化而行蕩蕩乎無能名之俗以熙熙其作樂也三人操牛尾投足以歌八闋一曰載民二曰𤣥鳥三曰遂草木四曰奮五穀五曰謹天常六曰達帝功七曰依地德八曰總萬物之極是謂廣樂隂康氏其時水瀆不疏隂凝而易閟人鬱于內腠理殢著而多重膇隂康思所以利其關節乃制舞焉治于華原音釋隂凝而易閟凝急陵切結也聚也閟兵媚切閉也幽也腠理殢著而多重膇腠千侯切膚理也殢徒計徒結二切隱蔽貌膇未詳音義治于華原按一統志華原邑名秦為內史地漢置華原縣元省入耀州本朝因之屬西安府無懷氏其撫世也以道存生以德安形其民甘食而樂居懷土而重生形有動作心無好惡雞犬之音相聞民至老死不相往來命之曰無懷氏之民考證世傳伏羲之後凡十五氏為天子而後神農氏作况太昊命官而十五氏多預焉則是皆佐伏羲為治之臣也豈當時各君一方以理民如後世諸侯之國邪按此亦以本易繫辭包羲氏沒神農氏作而言耳共工氏太昊之沒共工氏曰康回者髦身朱髮任智自神俶亂天常竊保冀方自謂水德乃以水紀官師虞于湛樂淫泆其身欲壅防百川隳高堙卑以害天下皇天弗福庶民弗助女媧氏戮之共工氏遂亡音釋俶亂天常俶尺竹切始也天常即五常也隳高堙卑隳呼回切毁也本作墮堙伊真切塞也總論定守陳氏曰易曰古者包羲氏之王天下也河出圖洛出書則而書之始作八卦以通神明之德以類萬物之情因而重之為六十有四又幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦教民決嫌疑定猶豫使不迷於吉凶悔吝之塗蓋非特為萬世文字之祖實開物成務之學也造化之祕泄於此聖道之統亦始於此矣史論靜軒周氏曰八卦既畫書契始成罷結繩之政明吉凶之理由是政事益明吉凶已判此固聖人憂天下之大經大法也然而夫婦有别綱常有敘而教化可明胡文定公曰夫婦人倫之本風化之原治國之首務也上古之時男女無别夫婦茍合瀆禮亂倫伏羲有見於此乃制嫁娶之儀以儷皮為禮正其姓氏通其媒妁淫奔之事氷消茍合之風瓦解天下之為男女者始知非父母之命媒妁之言則終身不能求通而鑽穴相窺踰牆相從之事少沮矣雖然禮始於謹夫婦為宫室辨內外自三代之時未免有鶉奔之失故詩三百篇存而弗削欲以警乎後世也奈之何禮義乖違亷恥道喪近代以來淫風荐盛有夫未亡而與人私通夫已亡而改容再嫁求其斷臂剔目以示信者百無一二嗚呼世有古今心無古今上古此人心也中古此人心也近世亦此人心也古今人心安有異乎所以然者私欲之心勝天理之心亡得乎此則失乎彼耳人心至明豈可不知從一而終之道哉辨疑雪􅀈膚見曰外紀載諸侯共工氏與祝融氏戰不勝而怒乃頭觸不周山崩天柱折地維缺女媧乃鍊五色石以補天以愚膚見不周山既云天柱必千仞之高也共工氏之身雖長不過一丈而已其力雖大亦不過百鈞而已豈能以頭觸其山而崩之又若女媧補天之說尤甚謬也若夫宫室之破漏器物之毁缺衣服之破壞冠履之弊穿皆可補之至若天有輕清之氣積於上去地之遙不知幾千萬丈也女媧雖君臨天下不過一婦人耳豈能飛身萬丈之高鍊石以補之乎且天乃一元之氣恢恢浩浩覆燾無垠從何處以補之耶此蓋列子寓言之妄與其斷鼇足以立四極聚灰以止滔水皆虛謬之辭漢晉南北朝儒者宗其文辭以為實事蓋弗窮其理也觀者不可不察炎帝神農氏少典氏之君娶于有蟜氏之女曰安登生二子焉長曰石年育于姜水故以姜為姓以火德代伏羲氏治天下故曰炎帝其起本於烈山又號烈山氏亦曰連山氏其初國伊繼國耆合而稱之故又號曰伊耆氏音釋育于姜水育養也按一統志鳳翔府寶雞縣南七里有姜氏城城南有姜水帝王世紀炎帝神農氏母有蟜氏女登為少典妃遊華陽感神而生炎帝長於姜水即此其起本於烈山烈當作厲按一統志厲山在德安府隨州城東北百八十里禮記祭法云厲山氏之有天下也其子曰農能殖百穀注云厲山氏炎帝也起於厲山西漢志注隨故厲國也皇甫謐云今隨之厲鄉荆州記山有二穴云是神農所生遂即此地為神農社常年祀之都陳遷曲阜初藝五穀嘗百草古者民茹草木之實食禽獸之肉而未知耕稼炎帝因天時相地宜斫木為耜揉木為耒始教民藝五穀而農事興焉民有疾病未知藥石炎帝始味草木之滋察其寒溫平熱之性辨其君臣佐使之義嘗一日而遇七十毒神而化之遂作方書以療民疾而醫道立矣復察水泉甘苦令人知所避就由是民居安食力而無天札之患天下宜之故號神農氏音釋斫木為耜揉木為耒斫竹角切削之也耜詳子切田器所以起土者揉忍尤切調順也耒耜之柄也無夭札之患夭伊鳥切短折也札側八切左傳注夭死曰札始為日中之市炎帝之世其俗朴重端慤不忿爭而財足無制令而民從威厲而不殺法省而不煩始列廛于國日中為市致天下之民聚天下之貨交易而退各得其所音釋列廛于國日中為市廛呈延切市中空地一曰居也說文一畝半一家之居也市貿易居貨之所也又貿易曰市以火紀官因火德王故以火紀官為火師春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火音釋夏官為鶉火廣韻鶉火星名其次在己楚之分野楚辭惜誓篇晦庵集注南方七宿曰鶉首鶉尾鶉火蓋鶉鳥無尾故以翼為尾云在位百四十年崩于長沙之茶鄉炎帝之世諸侯夙沙氏叛不用帝命其臣箕文諫而被殺炎帝益修厥德夙沙之民自攻其君而來歸其地於是南至交趾北至幽都東至𤾉谷西至三危莫不從其化也帝傳八世至榆罔而亡音釋崩于長沙之茶鄉長沙地名按一統志本禹貢荆州之域周為長沙地秦置長沙郡漢為長沙國唐為長沙府至本朝因之屬湖廣道茶鄉亦地名在長沙府城南四百八十里漢置茶陵縣宋置茶陵軍元升為州至本朝復為縣屬長沙府南至交趾交趾地名按一統志古南交之地秦屬象郡漢置交趾郡唐為安南都護府元為安南國至本朝因之置府縣於其間厥後冦孽黎利攻劫郡邑朝廷討之黎利來降詔封安南王至今朝貢不絶北至幽都幽都地名按一統志禹貢冀州之域高陽氏謂之幽陵陶唐曰幽都周武王封召公奭於燕即此漢為涿郡唐為幽州元為大興府至本朝改為順天府號北直𨽻東至𤾉谷淮南子曰𤾉谷日出之所西至三危三危山名按一統志在沙州城東南二十里其山三峯峭絶因名舜竄三苗于此今屬陜西行都司帝臨魁神農氏納莽水氏之女曰聽詙生臨魁是為炎帝在位八十年子承立帝承帝臨魁子在位六十年子明立帝明帝承之子在位四十九年子宜立帝宜帝明之子又曰帝直在位四十五年子來立帝來帝宜之子亦曰帝克在位四十八年子裏立帝裏帝來之子又曰帝居在位四十三年帝裏生節莖節莖生克及戲節莖克戲皆不在帝位克生子榆罔立帝榆罔帝裏之曾孫也居于空桑為政束急務乘人而鬭其捷於是諸侯擕二其臣蚩尤作亂帝遂居于涿鹿有熊國君曰公孫軒轅實懋聖德諸侯歸之帝之五十五年諸侯尊軒轅為天子降封帝于潞神農氏遂亡炎帝别子曰柱有聖德佐帝播種五穀後世德之祀以為稷有子曰慶甲或云嘗嗣炎帝云戲生器器生祝融為黃帝司徒祝融生術囂術囂生勾龍為顓頊后土能平九州辨土地之宜以教兆民後世祀之以配社勾龍生垂垂為堯共工實生伯夷封于吕為舜四嶽其後吕尚周封於齊音釋諸侯携二廣韻携二離心也居于涿鹿涿鹿山名按一統志在直𨽻保安州城西南九十里一名獨鹿山涿水出焉黃帝破蚩尤於涿鹿即此降封帝于潞降猶貶也潞邑名按一統志禹貢冀州之域商為黎國周為赤狄潞子國後周置潞州唐以後仍舊至本朝因之以上黨縣省入屬山西道播種五穀播補過切布也種之仲切藝也夏煚云五穀者黍稷稻菽麥也垂為共工書注共工官名蓋古之世官族也為舜四嶽書注四嶽官名一人而總四嶽諸侯之事也史論靜軒周氏曰天之立君以為民也君之立國以行保民之政也自三皇訖籙五帝迭興民物雖夥代有制作然而茹草木之實食禽獸之肉自若也炎帝初王天下即興憂民之心斫木為耜揉木為耒教民樹藝五穀躬親畎畝春耕夏耘秋收冬藏之農事興矣然天時寒燠不常黎民疾病難免須仗藥石庶幾延生殊不知草木有寒溫平熱之性君臣佐使之義炎帝始味其滋察其性分寒溫平熱為四等辨君臣佐使為二區一日之間逢毒七十皆能化之而無侵害由是方書以興醫道以立民有疾疢皆可療治炎帝憂世救民之功用何其切哉夫以五穀既樹而民食已足藥石既攻而民生已賴斯世斯民熙熙然咸樂於春臺之中仁夀之域澤及當時恩垂萬世至於今尚賴帝無窮之德是知聖人一心即天地其洪纎高下飛潛動植無一物不遂其生育之成無一民不遂其長養之性一至公至仁之心也天即聖人也聖人即天也夫何間然之有總論雪􅀈膚見曰按大易繫辭有曰古者伏羲氏之王天下也仰則觀象于天俯則觀法于地旁觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情先正謂造化之祕泄於此聖道之統始於此矣神農氏斫木為耜揉木為耒以教天下之耕日中為市以教天下之民嘗百草治醫藥以濟人之疾後世醫農商技所由而興斯民生養之道略備於此時也著外紀者載伏羲人首蛇身神農人身牛首殊不知天地開闢自盤古之後有天地人三皇氏兄弟相繼而立凡一百五十世合四萬五千六百年當此混茫之時初無此等異相之人羲農二聖乃繼天立極之君開物成務之祖顧乃有此怪異之貌乎史載伏羲在位一百一十四年神農在位一百四十年當時天下諸侯北面而朝咸遵其制度禀其命令也豈有蛇身牛首之怪異者坐天位之上主宰天下乎此不足信也明矣黃帝有熊氏初神農氏母弟世嗣少典氏為諸侯帝榆罔之代少典國君之妃曰附寶者感電光繞斗而有身生帝于軒轅之丘因名軒轅姓公孫軒轅生而神靈弱而能言幼而狥齊長而敦敏成而聰明國于有熊故號有熊氏長于姬水故又以姬為姓音釋黃帝有熊氏索隱云按有土德之瑞土色黃故稱黃帝猶神農火德王而稱炎帝然也號有熊氏者以其本是有熊國君之子故也世嗣少典氏為諸侯索隱曰少典者諸侯國號非人名也又按國語云少典娶有蟜氏女而生炎帝然則炎帝亦少典之子炎黃二帝雖則承帝王代紀中間凡隔八帝五百餘年若以少典是其父名豈黃帝經五百餘年而始代炎帝後為天子乎何其年之長也又按秦本紀云顓頊氏之裔孫曰女修吞𤣥鳥之卵而生大業大業娶少典氏而生柏翳明少典是國號非人名也黃帝即少典氏後代之子孫賈逵亦以左傳髙陽氏有才子八人亦謂其後代子孫而稱為子是也生帝于軒轅之丘因名軒轅姓公孫按一統志軒轅丘在開封府新鄭縣境古有熊氏之國黃帝生于此故名索隱曰按皇甫謐云黃帝生於夀丘長於姬水因以為姓都軒轅之丘因以為名又以為號是本姓公孫長居姬水因改姓姬也弱而能言索隱曰弱謂幼弱時也蓋未合能言之時而黃帝即言所以為神異也潘嶽有哀弱子篇其子未七旬曰弱幼而狥齊徐廣曰墨子曰年踰十五則聰明心慮無不狥通矣駰案狥疾齊速也言聖德幼而齊速也索隱曰斯文未明今按狥齊皆德也書曰聰明齊聖左傳曰子雖齊聖齊謂聖德齊肅又按孔子家語及大戴禮並作睿齊一本作慧齊睿慧皆智也大史公採大戴禮而為此紀今彼文無作狥者史記舊本亦有作濬齊蓋古字假借狥為濬濬深也義亦並通國于有熊皇甫謐曰有熊地名今河南新鄭是及炎帝戰于阪泉神農氏衰諸侯相侵伐炎帝榆罔弗能征於是軒轅習用干戈以征不享諸侯咸來賓從榆罔欲侵陵諸侯諸侯益叛之軒轅修德振兵治五氣藝五種撫萬民度四方教熊羆貔貅貙虎以與榆罔戰于阪泉之野三戰然後得其志音釋神農氏衰索隱曰衰謂神農氏後代子孫道德衰薄非指炎帝之時即班固所謂參虛皇甫謐所云帝榆罔是也習用干戈以征不享釋文云干楯也戈㦸也王子年拾遺記曰伏羲造干戈以飾武此干戈之始也則兵器起于太昊矣吕氏春秋云蚩尤造五兵此其一也習用干戈以征諸侯之不朝享者本或作亭亭直也以征諸侯之不直也治五氣王肅曰五氣五行之氣也謂春甲乙木氣夏丙丁火氣之屬是也藝五種索隱云藝音藝種也樹也五種即五穀也種朱用反撫萬民度四方王肅曰度四方而安撫也教熊羆貔貅貙虎廣韻云熊胡容切獸似豕山居冬蟄也羆逋眉切獸似熊黃白色貔蒲麋反執夷豹屬貅虛尤切猛獸豹屬貙敕朱切似狸白色虎火五切西方猛獸也爾雅曰此六者猛獸可以教戰周禮有服不氏掌教擾猛獸即古服牛乘馬亦其類也及帝戰于阪泉之野春秋傳曰我所欲曰及故戰有弗獲己者而汲汲欲焉服䖍曰阪泉地名在上谷郡誅蚩尤于涿鹿蚩尤姜姓炎帝之裔也好兵喜亂作刀㦸大弩以暴虐于天下兼并諸侯貪欲無度炎帝榆罔不能制之命居少皓以臨西方蚩尤益肆其惡出羊水登九淖以攻炎帝于空桑炎帝遜居涿鹿軒轅乃徴師諸侯與蚩尤戰于涿鹿之野蚩尤作大霧軍士昏迷軒轅為指南車以示四方遂擒蚩尤戮于中冀因名其地曰絶轡之野音釋兼並諸侯慈湖王氏曰兼并謂大家兼役小民富者并役貧者諸侯爵名廣韻曰古者以射選賢射中者獲封爵故因謂之諸侯周人祭侯之辭曰惟若寧侯毋或若女不寧侯不屬於王所故抗而射女此蓋因物命名因名取義轉相明也蚩尤作大霧軍士昏迷陳殷曰霧者隂陽䝉冒之氣蚩尤能為之以昏迷軍士作指南車陳殷曰指南車古制不可考唐憲宗始定其制車上有樓四角刻木為龍又刻仙人於上車雖回轉手常指南軒轅用之以定四方示軍士也或曰車上用子午盤針以定四方亦通擒蚩尤戮于中冀擒捉也戮殺之也索隱曰黃帝使應龍殺蚩尤于凶黎之谷按一統志蚩尤墓在兖州府夀張縣治東北又巨野縣東北九里亦有蚩尤髀家世傳黃帝殺蚩尤於涿鹿之野身首異處故别葬焉諸侯尊為黃帝代神農氏以治天下軒轅自涿鹿還諸侯咸尊為天子以代神農氏因其有土德之瑞故號曰黃帝以雲紀官帝初受命適有雲瑞乃以雲名官為雲師立六相帝舉風后力牧太山稽常先大鴻以治民劉恕外紀曰黃帝得六相而天地治神明至風后明乎天道故為當時太常察乎地利故為稟者奢龍辨乎東方故為土師祝融辨乎南方故為司徒大封辨乎西方故為司馬后土辨乎北方故為李音釋祝融辨乎南方故為司徒祝融注見前篇司徒官名書周官篇司徒掌邦教敷五典擾兆民注地官卿主國教化敷五倫之教以馴擾兆民之不順者而使之順也唐虞司徒之官故此職掌如此大封辨乎西方故為司馬大封黃帝臣名司馬官名書周官篇司馬掌邦政統六師平邦國注夏官卿主戎馬之事掌國征伐統御六軍平治邦國軍政莫急於馬政故以司馬名官后土辨乎北方故為李后土黃帝臣名齊職儀曰李古官也管子曰黃帝得后土辨于四方使為李春秋元命苞曰堯為天子得臯陶聘為大理舜時為士師韓詩外傳有晉文公使李離為大理劉向新序楚平王以伍奢為大理大理之名自古有矣秦為廷尉漢初因之至景帝中元中更名大理蓋復古號也孟詵錦帶前書載三代法官之名則曰虞曰士夏曰大理也立占天之官帝既受河圖得其五要乃設靈臺立五官以敘五事命鬼㬰蓲占星鬭苞授規正日月星辰之象於是乎有星官之書命羲和占日尚儀占月車區占風音釋帝既受河圖翰墨全書曰黃帝之時夢見兩龍授圖乃齊戒往河求之忽有大魚泝流而上負圖而進帝跪受之圖見蔡氏書傳乃設靈臺設立也事物紀原云黃帝置靈臺以為測候之所唐改太史為司天監掌天文厯數風雲氣色其小吏有靈臺郎時乾元元年也命大撓作甲子帝命大撓探五行之情占斗柄所建始作甲子甲乙丙丁戊己庚辛壬癸謂之幹子丑寅卯辰巳午未申酉戌亥謂之枝枝幹相配以名日而定之以納音命容成作蓋天及調厯帝命容成作蓋天以象周天之形綜六術以定氣運因問於鬼㬰蓲曰上下周紀其可數乎對曰天以六節地以五制周天氣者六期為備終地紀者五歲為周五六合者歲三千七百二十氣為一紀六十歲千四百四十氣為一周太過不及斯以見矣乃因五量治五氣起消息察發斂以作調厯歲紀甲寅日紀甲子而時節定是歲己酉朔旦日南至而獲神䇿得寶鼎冕侯問於鬼㬰蓲對曰是謂得天之紀終而復始乃迎日推䇿造十六神厯積斜分以置閏配甲子而設蔀於是時惠而辰從矣音釋容成作蓋天以象周天之形事物紀原云蓋天即渾天儀也髙陽氏造渾儀黃帝為蓋天則是渾儀始于高陽氏矣蔡氏書傳曰渾天儀者天文志云言天體者三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師說不知其狀如何周髀之術以為天似覆盆蓋以斗極為中中高而四邊下日月旁行繞之日近而見之為晝日逺而不見為夜蔡雍以為考驗天象多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也渾天說曰天之形狀似鳥卵地居其中天包渾地外猶卵之裹黃圓如彈丸故曰渾天言其形體渾然也其術以為天半覆地上半在地下此必古有其法遭秦而滅漢武帝時洛下閎始經營之鮮于妄人又量度之至宣帝時耿壽昌始鑄銅而為之象宋錢樂又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圓周二丈五尺彊轉而望之以知日月星辰之所在即璿璣玉衡之遺法也綜六術以定氣運綜猶總也六術者謂羲和占日常儀占月㬰蓲占星氣伶倫造律𨽻首作算數大撓作甲子也氣運注見下篇五氣五運迎日推䇿晉灼曰䇿數也迎者數之也薛瓚曰日月朔望未來而推之故曰迎日也索隱曰封禪書黃帝得寶鼎神䇿下文云於是迎日推䇿則是神䇿者神蓍也黃帝得神蓍遂因以推算厯數於是乃逆知節氣與日辰之將來故曰推䇿迎日也命𨽻首作數帝命𨽻首定數以率其羡要其㑹而律度量衡由是而成焉音釋𨽻首作數𨽻首黃帝臣名數謂算數即九章算法也律度量衡律即律吕也記陽氣之初者月令章句曰上古聖人本隂陽别風聲乃截竹為管謂之律詳見下文明堂位周公制禮作樂頒度量而天下大服正義曰度者分寸尺丈引也所以度長短也夲起黃鐘之管長以子穀秬黍中者一黍為一分十分為一寸十寸為一尺十尺為一丈十丈為一引而五度審矣量者籥合升斗斛也所以量多少也本起黃鐘之籥以子穀秬黍中者千有二百實為一籥十籥為一合十合為一升十升為一斗十斗為一斛而五量嘉矣衡即權衡也王幼學云權重衡平也權者銖兩斤鈞石也權與物鈞同而生衡所以知物之輕重也命伶倫造律吕帝命伶倫自大夏之西阮隃之隂取竹於嶰溪之谷以生空竅厚鈞者斷兩節間長三寸九分而吹之以為黃鐘之宫制十二筒以聽鳳凰之鳴而别十二律其雄鳴為六雌鳴亦六以比黃鐘之宫生六律六吕候氣之應以立宫商角徴羽之聲治隂陽之氣節四時之變推律厯之數起消息正閏餘音釋命伶倫造律伶倫黃帝臣名按律吕志云昔黃帝使伶倫自大夏之西昆崙之隂取嶰谷之竹生空竅厚鈞者斷兩節間吹之以為黃鐘之宫又制十二筒以象鳳凰之鳴其雄鳴為六雌鳴亦六陽六為律隂六為吕六律六吕總謂之十二律以配十二月黃鐘太蔟姑洗㽔賔夷則無射陽聲也大吕應鍾南吕林鍾仲吕夾鍾隂聲也蓋日月㑹於十二次而右轉聖人制六吕以象之斗柄運於十二辰而左旋聖人制六律以象之故陽律左旋以合隂隂律右轉以合陽而天地四方隂陽之聲具焉凡十二律相生之位自黃鍾之律數八至林鍾林鍾數八至太蔟太蔟數八至南吕南吕數八至姑洗姑洗數八至應鍾應鍾數八至㽔賔周而復始也以為黃鍾之宫律厯志云黃者中之色也鍾種也陽氣潛萌於黃泉萬物滋萌於子而黃鐘子之氣也其候冬至其卦乾之初九故合於大吕而下生林鍾焉制十二筒按律厯志其一曰黃鐘之筒長九寸圍九分積實八百一十分三分損一下生林鍾其二曰大吕之筒長八寸二百四十三分寸之一百四圍九分積實七百五十八分四釐强三分損一下生夷則其三曰太蔟之筒長八寸積實七百二十分三分損一下生南吕其四曰夾鍾之筒長七寸二千一百八十七分寸之千七十五圍九分積實六百七十四分二釐三分損一下生無射其五曰姑洗之筒長七寸九分寸之一圍九分積實六百四十分三分損一下生應鍾其六曰仲吕之筒長六寸萬九千六百八十三分寸之萬二千九百七十四圍九分積實五百九十分二釐三分損一下生黃鍾其七曰㽔賔之筒長六寸八十一分寸之二十六圍九分積實五百六十八分八釐强三分益一上生大吕其八曰林鍾之筒長六寸圍九分積實五百四十分三分益一上生太蔟其九曰夷則之筒長五寸七百二十九分寸之四百五十一圍九分積實五百五分七釐三分益一上生夾鍾其十曰南吕之筒長五寸三分寸之一圍九分積實四百八十分三分益一上生姑洗其十一曰無射之筒長四寸六千五百六十分寸之六千五百二十四圍九分積實四百四十九分四釐三分益一上生仲吕其十二曰應鍾之筒長四寸二十七分寸之二圍九分積實四百草六分三分寸之二三分益一上生㽔賔六律六吕東匯澤陳氏曰六律陽聲黃鐘子太蔟寅姑洗辰㽔賔午夷則申無射戌也六吕隂聲大吕丑應鍾亥南吕酉林鍾未仲吕巳夾鍾卯六律六吕皆是候氣管名律法也又云述也吕助也言助陽宣氣也長短之數各有損益又有娶妻生子之例長短損益者如黃鍾長九寸下生者三分去一故下生林鍾長六寸也上生者三分益一如林鍾長六寸上生太蔟長八寸也上下之生五下六上蓋自林鍾未至應鍾亥皆在子午以東故謂之下生自大吕丑至㽔賔午皆在子午以西故謂之上生子午皆是上生當云七上而云六上者以黃鍾為諸律之首故不數也律娶妻而吕生子者如黃鍾九以林鍾六為妻太蔟九以南吕六為妻隔八而生子則林鍾生太蔟夷則生夾鍾之類是也各依此推之可見宫為君主之義十二管更迭為主自黃鍾始當其為宫五聲皆從黃鍾第一宫下生林鍾為徴上生太蔟為商下生南吕為羽上生姑洗為角餘倣此林鍾第二宫太蔟三南吕四姑洗五應鍾六蕤賔七大吕八夷則九夾鍾十無射十一仲吕十二也此非十二月之次序乃律吕相生之次序也命滎猿作十二鍾帝命滎猿鑄十二鍾協月筒以和五音立天時正人位焉音釋滎猿黃帝臣名猿于元切命大容作咸池之樂帝命大容作承雲之樂是為雲門大卷著之椌楬以道其和中春之月乙卯之辰日在奎始奏之命曰咸池音釋是為雲門大卷著之椌楬豫章熊氏曰雲門大卷俱樂名黃帝所作言其德象雲氣出入周人冬至舞之以祀天神也椌驅羊切柷也楬丘瞎切敔也俱樂器鄭𤣥曰柷狀如漆桶中有椎連底動之令左右擊以起樂者敔狀如伏虎脊有草七鉏鋙刻以木長尺戞之以止樂亦作楬命曰咸池樂書曰咸池樂名黃帝所作堯修而用之言其德象池水周遍周人夏至舞之以祭地祇也作冕旒正衣裳帝作冕垂旒充纊為𤣥衣黃裳以象天地之正色旁觀翬翟草木之華乃染五采為文章以表貴賤於是衮冕衣裳之制興音釋作冕旒說文曰冕冠有旒也旒也旒垂玉也釋名云冕之言俯也後仰前俯主於恭也旒垂玉過目所以蔽明也周禮王五冕圖云衮冕十二旒以則天數繅玉五采前後各用玉百四十四王祀昊天五帝先王朝覲諸侯則服之輿服志云冕昏廣七寸長尺二寸前圓後方前垂四寸後垂三寸旁觀翬翟草木之華旁猶側也翬呼回切飛舉貌翟徒的切山雉也爾雅云伊洛而南素質五采皆備成章曰翬又翬衣后服也禮記作褘當為讀如翬翟雉名也刻繪而畫之著於衣服以為飾因以為名按周禮王后六服圖有褘衣褕狄闕狄釋云褘當為翬即翬雉其色𤣥也婦人尚專一德無所兼衣裳相連其色不異祭先王則后服褘衣以從之䄖當為搖狄當為翟則搖雉其色青也上二翟並刻繪為雄形而五采畫之后從王祭先公之服也闕與屈音相近其色赤亦刻繪為雄形不畫之故名闕狄或以無正文直意量之也從王祭羣小祀則服之褘于歸反於是衮冕衣服之制興說文衮龍衣事始曰黃帝作畫象日月星辰于衣上以似天故有裳龍之頌黃帝內傳曰帝伐蚩尤乃服衮冕至舜始備十二章書稱豫欲觀古人之象日月星辰山龍華蟲作會宗彜藻火粉米黼黻絺繡以五采彰施于五色作服是也周登日月于太常九章而已餘五服俱周制也通典曰上古衣毛後代以麻易之先知為上以制衣後知為下以制裳易曰黃帝垂衣裳而天下治世本曰胡曹作衣宋𠂻曰黃帝臣吕氏春秋亦云淮南子曰伯余初作衣許愼注云黃帝臣也一云伯余黃帝也世本又云伯余制衣裳孟詵錦帶前書曰十紀合雒紀四始教人食鳥獸衣其皮毛家語五帝德篇孔子曰黃帝始垂衣裳作器用帝命寧封為陶正赤將為本正以利器用揮作弓夷牟作矢以威天下岐伯作鼓吹鐃角靈鞞神鉦以揚德建武音釋揮作弓夷牟作矢太白隂經曰庖犧氏弦木為弓剡木為矢易繫辭神農氏沒黃帝堯舜氏作弦木為􅋃剡木為矢弧矢之利以威天下蓋取諸暌山海經曰少昊生般始制弓矢世本又曰牟夷作矢揮作弓宋𠂻云牟夷揮皆黃帝臣也郭璞曰弓矢一器而作者兩人於理可疑以般為是岐伯作鼓吹鐃角靈鞞神鉦唐樂志云鼓吹本軍容黃帝戰涿鹿以為警衛也王幼學曰鼓吹音律管熏之樂也本北狄馬上之聲漢以後以為鼓吹亦軍中樂於馬上奏之唐制鼓吹有五部吹音尺僞反鐃尼交切如鈴無舌有秉周禮以金鐃止鼓也角吹器也徐廣車服儀制曰角前書記所不載或云本出羌胡一云出于越黃帝內傳曰𤣥女請帝製角二十四以警象通禮義纂曰蚩尤師蝄蝄與黃帝戰帝命始吹角作龍鳴以禦之蓋角肇于黃帝氏也谷儉角賦夫角蓋黃帝㑹羣臣于泰山作清角之音號令之限度也軍中置之以司昏曉故角為軍容也鞞逋眉切唐韻曰鼙騎上鼓鼙裨也裨助鼓節亦作鞞今軍行馬上所擊是也黃帝內傳曰𤣥女請帝制鼓鼙以當雷霆是則黃帝制之以伐蚩尤也吕氏春秋曰帝警令倕作鼙鼓之樂又云倕作鞞以節鼓也鉦之盈切內傳曰𤣥女請帝鑄鉦鐃以擬雹之聲今之銅鑼是其遺制也作舟車帝命共鼓化狐刳木為舟剡木為楫以濟不通邑夷法斗之周旋魁方杓直以擕龍角作大輅以行四方由是車制備服牛乘馬引重致遠而天下利矣音釋作舟車淮南子曰見竅木浮而知為舟吕氏春秋曰虞姁音調作物理論曰化狐作舟墨子曰工倕作山海經曰番虞作束晢發䝉記曰伯益作世本曰共鼓化狐作注云並黃帝之臣也拾遺記曰軒皇變束桴以造舟楫黃帝內傳帝既斬蚩尤乃創舟楫易繫辭曰黃帝刳木為舟剡木為楫蓋以黃帝為是又淮南子說山訓曰見飛蓬轉而知為車又記輪訓曰古者肩擔背負之勤而為之剡輪建輿駕馬服牛民以致遠而不勞通典曰上古聖人觀蓬轉而為輪輪行可載因物知生復為之輿輿輪相承流運罔極任重致遠以利天下此車之始也世本曰奚仲造車山海經曰番虞生奚仲奚仲生吉光是始以木為車郭璞注云世本曰奚仲造車此云吉光明其父子創意也古史考曰黃帝作車引重致遠其後少昊時駕牛禹時奚仲駕馬今按繫辭言黃帝服牛乘馬引重致遠蓋取諸隨是則車造自黃帝始奚仲但改制之妙也刳木為舟剡木為楫刳空胡切虛其中也剡以冉切削也楫音集說文所以進舟者亦作楫作大輅說文云大輅玉輅也天子祀天所乘輅本作路陸佃云天子五輅其玉輅一曰大輅言於金輅為大賈逵曰謂之路言行路也作合宫帝廣宫室之制遂作合宫祀上帝接萬靈而敷教焉音釋廣宫室之制蘇氏演義云宫中也言處都邑之中也又曰宫方也為宫必以雉堞方正也風俗通曰室其外也宫其內也易曰上古穴居野處後世聖人易之以宫室上棟下宇以待風雨謂黃帝也白虎通曰黃帝作宫室以避寒暑此宫室之始也作貨幣帝范金為貨制金刀立五幣設九棘之利為輕重之法以制國用而貨幣行矣音釋范金為貨范房啖切以模鑄金也禮記范金合土亦作範鄭康成曰金玉曰貨布帛曰賄廣韻曰貨者化也變化交易之物故字從化制金刀食貨志貨寶於金利於刀故曰金刀如淳曰名錢為刀以其利於民也莽造錯刀蓋身形如刀以黃金錯其文曰一刀直五千錯塗也作內經帝以人之生也負隂而抱陽食味而被色寒暑蕩之於外喜怒攻之於內夭昏凶札君民代有乃上窮下際察五氣立五運洞性命紀隂陽咨於岐伯而作內經復命俞跗岐伯雷公察明堂究息脉巫彭桐君處方餌而人得以盡年音釋察五氣五氣謂五行之氣即所謂濕涼寒燥溫是也立五運五運謂甲巳土乙庚金丙辛水丁壬木戊癸火也命元妃西陵氏教民蠶西陵氏之女嫘祖為帝元妃始教民育蠶治絲繭以供衣服而天下無皴瘃之患後世祀為先蠶音釋無皴瘃之患皴七旬切皵也瘃涉玉切寒瘍也趙充國傳瘃墮之患顔師古曰因寒瘃而墮指也畫野分州經土設井帝內行刀鋸外用甲兵制陳法設旗麾天下有不順者從而征之平者去之披山通道未嘗寧居東至于海西至于空峒南至于江北逐葷粥合符釡山而邑于涿鹿之阿遷徙無常處以師兵為營衛於是畫野分州得百里之國萬區命匠營國邑置左右太監監于萬國萬國以和遂經土設井以塞爭端立步制畝以防不足使八家為井井開四道而分八宅井一為鄰鄰三為朋朋三為里里五為邑邑十為都都十為師師十為州分之於井而計於州則地著而數詳音釋披山通道徐廣云披地本亦作陂字蓋當為詖詖者旁其邊之謂也披語誠合今世然古今不必同也索隱曰披音如字謂披山林草木而行以通道也徐廣音詖恐稍紆也西至于空峒按一統志崆峒山名在陜西肅州衛城東南六十里舊屬歸祿縣史記黃帝披山通道西至崆峒謂此北逐葷粥胸奴傳曰唐虞以上有山戎獫狁葷粥居于北蠻索隱曰胸奴别名也唐虞已上曰山戎亦曰薰粥夏曰淳維殷曰鬼方周曰玁狁漢曰胸奴合符釡山符信也契也說文符之為言扶也兩相符合而不差也古者以竹為之故字從竹後世詐僞蜂起以竹易得之物不足為之防於是有銅鐵金銀鑄為物象而用之漢文帝初與郡國為銅虎符竹使符應劭曰銅虎符長六寸第一至五國家發兵遣使至郡合符符合乃聽受之竹使符以竹箭五枚長五寸旁鐫篆書亦一至五出入徴發用之張晏曰符以代古之圭璋從簡易也顔師古曰與郡國為符各分一半右留京師左以與之此漢制也唐高祖入長安罷隋竹使符班銀莬符其後改為銅魚木契朝廷徴發下敕書契魚都督郡府參驗皆合然後遣之索隱曰合諸侯符契圭瑞而朝之於釡山猶禹㑹諸侯於塗山然也又按郭子橫洞𡨕記稱東方朔云東海大明之墟有釡山山出瑞雲應王者之符命如堯符有赤雲之祥之類蓋黃帝黃雲之瑞故曰合符應於釡山也置左右大監監于萬國正義云上監去聲下監平聲則地著而數詳地著猶言土著也著直略切謂著土地而有常居非行國隨畜牧遷徙者比也屈軼生于庭鳳皇巢于閣麒麟遊于囿帝順天地之紀幽明之占死生之說存亡之難時播百穀草木淳化鳥獸蟲蛾旁羅日月星辰水波土石金玉勞勤心力耳目節用水火財物由是民不習僞官不懷私市不預價城郭不閉見利不爭風雨時若人無夭扎物無疵厲虎豹不妄噬鷙鳥不妄摶裔夷之人罔不來享有草生于庭佞人入則指之名曰屈軼鳳皇巢于阿閣麒麟遊于苑囿焉音釋幽明之占東萊吕氏曰正義云幽隂明陽也占數也言隂陽五行黃帝占數而知之此文見大戴禮存亡之難索隱曰存亡猶安危也易曰危者安其位亡者保其存是也難猶說也凡事是非未盡假以往來之詞則曰難又上文有死生之說故此云存亡之難所以韓非著書有說林說難也時播百穀草木句絶王肅曰時是也播種之也淳化鳥獸蟲蛾索隱曰蛾音牛綺反一作蟻蟻言淳化廣被及之旁羅日月星辰水波土石金玉徐廣曰波一作沃索隱曰旁非一方羅廣布也今按大戴禮作歷離離即羅也言帝德旁羅日月星辰水波及至土石金玉謂日月揚光海水不波山不藏珍皆是帝德廣被也物無疵厲疵疾資切病也厲鬼疫也在位百年崩于荆山之陽帝採首山之銅鑄三鼎於荆山之陽八月既望鼎成崩焉年百十有一歲葬橋山其臣左徹感思取衣冠几杖而廟祀之帥諸侯羣臣歲時朝焉音釋採首山之銅鑄三鼎於荆山之陽按一統志首山在開封府襄城縣西南五里史記申公曰天下名山八而三在夷狄五在中國皆黃帝所嘗游首山其一也或謂黃帝陵葬於首山者荆山在河南府閿鄉縣南二十五里近有鑄鼎原昔軒轅采首陽之銅鑄鼎於此葬橋山按一統志橋山在延安府中部縣北下有沮水或云水從山底經過如橋故名帝子二十有五人帝元妃西陵氏之女曰嫘祖生昌意𤣥囂龍苗二妃方纍氏之女曰節生休及清三妃彤魚氏之女生揮及夷彭四妃曰嫫母貌惡德充生蒼林禺陽其衆妾之子十六人總四妃之子為二十有五其得姓者十有四人别為十二姓曰神已滕針任荀嬉姞儇依二姬二酉及有虞氏有天下封帝後為侯伯者十有九焉或云休嬉姓黃帝之崩諸侯尊休為帝號有鴻氏無思無為不慮不圖而臻至治在位四十七年而崩葬于雍有子曰白民曰嘻嘻生季格格生帝魁白民銷姓降居于夷其别子為防風氏又曰帝鴻氏有别子曰縉雲氏不才子曰混沌縉雲氏娶士敬氏之女曰炎融實生歡兜堯放之崇山歡兜生三苗堯竄之三危三苗氏有弟曰叨餮又曰蒼林生始均是為北狄之祖音釋嫘祖嫘力追切𤣥囂囂曉平聲得姓者十有四人生人以來得姓之始實由於此葬于雍雍地名按一統志禹貢雍州之域周為召穆公采邑秦置雍縣漢屬右扶風唐改曰鳳翔縣至本朝因之屬鳳翔府有弟曰叨餮叨他刀切貪財也餮他結切貪食也是為北狄之祖狄北方之夷也陳殷曰金元之祖起於沙漠出在北方自稱為黃帝之後吾不知其然否此云是為北狄之祖似乎有所據矣總論雙湖胡氏曰羲農二聖人去洪荒之世未遠也其風猶為杜略至黃帝之世實為文明之漸故昔之穴居野處者今始有宫室昔之汙樽抔飲者今始有什器昔之結繩而治者今始有書契文字昔之皮革蔽體者今始有冠冕章服其諸制器用利難以枚舉駸駸乎非復前日朴野之俗矣善乎胡氏之論曰是謂德配天地道之至也制度之經也德澤流天下至于今人䝉其惠雖死猶生也後世乃傳帝得仙術騎龍升天者真妖妄矣㫖哉言乎史論靜軒周氏曰炎帝之時五穀既樹矣算數猶未作也藥石既興矣律吕猶未造也算數未作則民㑹計之不精律吕未造則民五音之不正黃帝命𨽻首以作算數命伶倫以造律吕由是金鐘已鑄月筒已協不惟和五音然又立天時正人位焉夫以音律雖明禮樂未制遂作咸池之樂製冕旒之冠天之正色𤣥也作衣以象之地之正色黃也作裳以象之衣服冠冕粲然有章音律大樂秩然有敘可以祀郊廟可以享百僚矣蓋水中之行非舟楫則不通也帝乃刳木為舟剡木為楫以濟不通焉陸中之行非車輅則不達也帝乃圜木為車斫木為輅以行四方焉音樂既備而上帝猶未祀也器用既周而百靈猶未接也帝遂作為宫室于以祀上帝于以接萬靈則人依人而血食人享神而有所聖人範圍天地而不過曲成萬物而不遺有如是哉嗚呼一代聖王繼天立極而為萬世之師法足以淑諸人而𫝊諸後嵬嵬功德安可以企及耶少昊金天氏名摰姓巳黃帝之子𤣥囂也母曰嫘祖感大星如虹下臨華渚之祥而生帝黃帝之世降居江水邑于窮桑故號窮桑氏國于青陽因號青陽氏以金德王天下遂號金天氏能修太昊之法故曰少昊或云黃帝之子清是為青陽氏娶于類氏之女曰皇娥生摰于河之湄音釋降居江水索隱曰降下也言帝子為諸侯降居江水而江水若水皆在蜀即所封國也水經曰水出旄牛徼外東南至故關為若水南過卭都又東北至朱提縣為盧江水是蜀有此二水也邑于窮桑窮桑地名按一統志在兖州府魯城北史記少昊氏自窮桑登帝位後徙曲阜即此處國于青陽青陽地名未詳出處索隱曰𤣥囂帝嚳之祖按皇甫謐及宋𠂻皆云𤣥囂青陽即少昊也今此紀下云𤣥囂不得在帝位則太史公意青陽非少昊明矣而此又云𤣥囂是為青陽當是誤也謂二人皆黃帝于並列其名所以前史因誤以𤣥囂青陽為一人耳宋衷又云𤣥囂青陽是為少昊繼黃帝位者而史不敘蓋少昊金德王非五運之次故敘五帝不數之也故曰少昊陳殷曰少昊以金德王位在西方象晚日之明故號少昊金天氏也都于曲阜以鳥紀官少昊之立也鳳鳥適至因以烏紀官鳳烏氏歷正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也雎鳩氏司馬也鳴鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也音釋鳳鳥適至說文云鳳瑞禽羽毛之長王者德盛則至作大淵之樂帝之御世也諸福之物畢至爰書鸞鳳立建鼓制浮磬以通山川之氣作大淵之樂以諧人神和上下是曰大淵在位八十四年崩夀百歲葬于雲陽故後世又曰雲陽氏帝元妃生倍伐降處緡淵次妃生殷為弓正是制弓矢主祝弧星封于尹城有子曰昧為𤣥𡨕師于高陽之世少昊别子四人曰重該修熙其不才子曰窮竒音釋葬于雲陽雲陽地名未詳出處按一統志少昊陵在兖州曲阜縣東北二里軒轅陵之東前有石壇石像又有八卦石每歲祭祀則設祭器于上總論五峰胡氏曰邪說之為人害也久矣以五帝之時九黎猶亂風教矧漢以來聖學絶滅世衰一世在上之人茍且僥幸功成而氣盈利得而志怠崇尚勢力而不知仁義者衆矣故釋氏巫祝得以其說誑惑斯民為之薦死求生祈福免禍天下靡然從之在上者恬然不復知禮制刑賞之本在下者安焉不復知正身修行之實鬼教浮虛之言遍天下風俗既移孰能不外飾事君之禮內懷背上之心志在仗節死義以三綱為已在臨事不茍免乎史論靜軒周氏曰嗚呼此姦臣僭叛異端簧惑之始天道為之小變矣夫以泰極而否盛極而衰固天運循環之數也是時九黎亂拂天常不遵王命而為萬世亂臣賊子之魁桀其罪可勝誅乎少昊衰微弗克弔伐謂之何哉由是天下之人相懼以神相惑以怪家為巫史民瀆于祀天地為之晦𡨕山川為之崩竭變禮義之俗而為鬼魅之鄉矣雖然上者源也下者流也上者表也下者影也表端則影正源潔則流清自然之理也天下如人之一身元氣固則百邪不能入元氣既衰邪氣由之而入焉今九黎亂德民惑神怪皆少昊有以啓之也先正有以一念之善祥風和氣一念之惡妖星厲鬼吾之心正則天地之心亦正吾之氣順則天地之氣亦順自然災害不生禍亂不作天心仁愛人君信有之矣少昊溺於宴安不能反身修德九黎之亂德固自若也天下之神怪固自如也夫以少昊之時去古未遠朴略之風尚在淳厚之俗未亡而有亂德神怪之事者不惟天道小變是亦人君失德也俾吾身之元氣既正則外惑之百邪何從而入哉有天下國家之寄者不可不作事謀始吁顓頊高陽氏姬姓祖曰黃帝父曰昌意昌意娶蜀山氏之女曰昌僕是為女樞感瑶光貫月之祥生帝于若水年十歲佐少昊年二十即帝位以水德紹金天氏政初國高陽故號高陽氏或云昌意娶昌僕生乾荒乾荒娶于母家曰女樞實生顓頊音釋顓頊高陽氏索隱曰宋𠂻云顓頊名高陽有天下號也陳殷曰高陽蓋顓頊所興之地名因以為氏或謂開封府杞縣是也顓頊音專旭生帝于若水若水注見前篇江水都于帝丘音釋皇甫謐曰帝丘地名今東郡濮陽是也按一統志大名府滑縣東北七十里土山村有帝丘城春秋時衛成公遷于此又開州城東二十五里有顓頊城一名東郭城蓋顓頊古都也又臨河廢縣東北三里亦有顓頊城未知孰是命五官顓帝之世不能紀逺始為民師而命以民事以少昊之四子重該修熙實能金木及水乃俾重為木正曰句芒該為金正曰蓐收修熙相代為水正曰𤣥𡨕又以炎帝之子句龍為土正而帝之孫為火正曰祝融是謂五官命南正重司天北正黎司地以屬神民古者民神異業是以禍災不至而求用不匱少昊氏衰九黎亂德民神雜揉不可方物家為巫史無有要質民匱于祀嘉生不降無物以享禍災荐臻莫盡其氣顓帝受之乃命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆民用安生音釋九黎亂德正義云黎氏九人當時之諸侯作亂者民神雜揉不可方物陳殷曰雜揉混處也方猶分辨也南正重司天以屬神北正黎司地以屬民南正北正並官名楊子法言重黎篇重黎人名重少昊子勾芒也黎顓頊子祝融也司主也屬神謂明其祭祀之禮以聨屬之也屬民謂明其綱常之道以聨屬之也無相侵瀆瀆猶褻也言神不侵民而民不瀆神也以斗杓建寅之月為厯元帝作厯以孟春之月為元是歲正月朔日立春五星㑹于天厯營室冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝為厯宗也音釋㑹于天歷營室營室天之宿名作承雲之樂帝命飛龍氏㑹八風之音為圭水之曲以召氣而生物浮金效珍於是鑄為之鐘作五基六英之樂以調隂陽享上帝朝羣侯名曰承雲音釋㑹八風之音為圭水之曲按羣書備數云八風謂條風明庶風清明風景風涼風閶闔風不周風廣莫風是也圭水曲未詳其義在位七十八年崩帝靜淵而有謀疏通而知事養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀北至于幽陵南至于交趾西至于流沙東至于蟠木動靜之物大小之神日月所照莫不砥屬年九十一而崩葬濮陽帝娶鄒屠氏之女生駱明蒼舒隤敳檮戭大臨龎降庭堅仲容叔達又娶勝濆氏之女生卷章庶子曰窮蟬其不才子曰檮杌自蒼舒至叔達所謂齊聖廣淵明允篤誠天下之人謂之八䅱者也駱明姒姓生伯鯀鯀生禹是為夏后氏卷章妻曰女嬌生黎及回黎與回代為祝融于高辛之世吳回生陸終陸終生子六人曰樊曰惠連曰籛鏗曰㑹人曰曹姓曰季連樊封于昆吾籛鏗封于彭是為彭祖其孫元哲封于韋是為豕韋昆吾豕韋當夏之世代為侯伯季連芈姓其後為楚窮蟬生敬康敬康生句望句望生橋牛橋牛生瞽叟瞽叟生舜是為有虞氏或曰敬康之先國于虞非顓帝之裔也顓帝之裔孫曰女修生大業大業之妻曰女莘生大費是為伯益佐禹治水有功舜賜姓嬴氏禹薦于天者其長子曰大亷其後為秦為趙音釋養材以任地索隱曰言能養財物以任地大戴禮作養財載時以象天索隱曰載行也言行西時以象天大戴禮作履時以象天履亦踐而行也依鬼神以制義索隱曰鬼神聰明正直當盡心敬事因制尊卑之義故禮曰降于祖廟之謂仁義是也治氣以教化索隱曰謂理四時五行之氣以教化萬人也北至于幽陵幽陵地名注見前篇幽都南至交趾交趾地名注見前篇西至流沙流沙河名即弱水也按一統志在陜西甘州衛城西環合黎山東北入東莎界禹貢導弱水至于合黎餘波入于流沙按西域𫝊弱水在條支自長安西行萬二千里又百餘日方至其地疑别有所謂弱水也杜佑云流沙河在沙州西八十里其沙隨風流行故曰流沙東至蟠木海外經曰東海中有山名曰度索上有大桃樹屈蟠三千里名曰蟠木莫不砥屬王肅曰砥平也四遠皆平而來服屬索隱曰依王肅音止蜀據大戴禮作砥礪也葬濮陽濮陽地名按一統志古顓頊之墟曰帝丘夏為昆吾氏所居春秋衛成公遷都此地漢置鄄城縣晉置濮陽郡隋置濮州唐宋元仍舊而本朝因之屬東昌府又按東昌府城西北二十里有高陽氏陵前有聖水井旱禱輒應舊有壇廟久廢惟祈雨禱雪感應碑尚存樊封于昆吾昆吾地名按一統志在開州城東二十五里古顓頊城內相傳為夏昆吾氏所築夏昆吾五伯之一籛鏗封于彭是為彭祖按一統志籛鏗古陸終氏第三子彭祖也自堯歷夏殷封于大彭周衰始浮遊四方晚入蜀抵武陽留家焉神仙傳彭祖壽八百歷三代喪四十九妻五十四子彭地名按一統志本禹貢徐州之域本古大彭氏國秦置彭城縣漢置徐州晉宋以後俱仍舊至本朝因之直𨽻京師封為韋是為豕韋韋地名按一統志禹貢冀州之域本古豕韋氏之國春秋為衛地晉為濮陽國地唐為滑州宋金元仍舊至本朝改為滑縣屬大名府史論靜軒周氏曰民心歸之則為天子天下叛之則為獨夫故書曰天視自我民視天聽自我民聽是知天下之治亂由君德之賢否也史稱少昊之衰九黎亂德民神為之雜揉矣顓頊繼體承祧奮發中興命南正重司天以屬神北正黎司地以屬民絶地通天無相侵瀆向之民懼於神今神不民懼也向之民惑於怪今怪不民惑也九黎昔嘗梗化今則稽首而歸命焉殆見神人自是而不雜萬物自是而有序斯民自是而安生矣五帝以來歷法未正帝乃以孟春之月為元冰凍始泮蟄蟲始發是謂建寅之月為歲首也夫以少昊之民即顓頊之民顓頊之位即少昊之位地不改闢民不改聚上之一心邪正而民從違之間捷於影響由上之德有以使之也上有好者下必有甚焉者矣君子之德風小人之德草草上之風必偃故人君一念之善足以召乎禎祥一念之不善足以致乎災異是以兢兢業業罔敢怠荒如臨深淵如履薄冰而豐亨豫大之態不萌於心胸之間亦何亡國敗家之有哉帝嚳高辛氏名夋姓姬祖曰少昊父曰橋極生而神靈年十五佐顓帝受封于辛年三十以木德代高陽氏為天子以其肇基于辛故號高辛氏音釋帝嚳高辛氏張晏曰少昊之前天子之號象其德顓頊以來天子之號因其名高陽高辛皆所興之地名顓頊與嚳皆以字為號上古質朴故也索隱曰宋𠂻曰高辛地名因以為號嚳名也皇甫謐云帝嚳名夋也都于亳音釋都于亳按一統志亳城在歸德府城東南四十五里契父帝嚳都亳湯自商丘遷焉鄭𤣥曰亳今河南偃師縣漢書音義曰濟隂亳縣杜預曰梁國蒙縣皇甫謐曰孟子稱湯居亳與葛伯為鄰葛即今寧陵縣葛鄉亳乃今穀熟縣也䝉為北亳即景亳湯受命之地穀熟為南亳湯所都偃師為西亳即盤庚所徙書立政所謂三亳是也古書亡滅未知孰得其實作九招之樂帝命咸黑典樂為聲歌命曰九招在位七十年崩帝普施利物不私其身聽以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之歷日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士帝溉執中而遍天下日月所照風雨所至莫不服從年百五歲而崩葬頓丘帝元妃有邰氏女曰姜嫄生棄為舜后稷其後為周次妃有娀氏女曰簡狄生契為舜司徒其後為商三妃陳鋒氏女曰慶都生堯是為陶唐氏四妃娵訾氏女曰常儀生摰庶子曰伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之人謂之八元其不才子曰實沈閼伯音釋歷日月而迎送之東萊吕氏曰正義云言作厯弦望晦朔日月未至而迎之過而送之即迎日推䇿是也其色郁郁其德嶷嶷史記索隱曰郁郁猶穆穆也嶷嶷德高也嶷鄂力反其動也時其服也士索隱曰舉動應天時衣服服士服言其公且亷也帝溉執中而遍天下徐廣曰古既字作水旁遍字一作伊索隱曰即尚書允執厥中是也葬頓丘頓丘地名按一統志頓丘城在清豐縣西南二十五里衛風送子涉淇至于頓丘即此亦謂之隂安右城漢置頓丘縣晉於縣置頓丘郡五代晉置德清軍宋省入清豐屬大名府今滑縣東北七十里有帝嚳陵在焉子摰即天子位九年而廢帝嚳崩摰嗣立荒淫無度不修善政居九年諸侯廢之而尊堯為天子總論五峯胡氏曰天地之間有氣化有形化人之生雖以形相禪固天地之精也姜嫄克禋克祀以弗無子志之所至氣亦至焉氣之所至精亦至焉故若履天帝之武而敏歆其祀於是有子不可謂怪而諸儒不悟惑可知也至於䜟緯之書謂慶都感赤龍之精而生堯簡狄吞𤣥鳥之卵而生契則誣矣何者人也乃與繁氣交而生子則無是理矣是以載其事而削其詞焉西漢薄太后有蒼龍據腹之祥而生文帝若非史氏記之詳明則後世必謂薄與龍交而生子矣是故儒者莫要於窮理理明然後物格而知至知至然後意誠而心不亂史論靜軒周氏曰聖人應昌期而生扶輿之精孕之山川之英育之河海之秀鍾之五行範其體萬善羅其躬固有禎祥之兆矣然不過乎氣化形化之理姜嫄禋祀上帝而生稷豈上帝悅其禋祀而錫之以嗣乎此猶可信者至若慶都有赤龍之祥而生堯簡狄有飛燕之祥而生契嫘祖感大星如虹下臨華渚之神而生少昊女樞感瑶光貫月之祥而生顓頊嗚呼有是理乎無是理乎不得不辨以祛童䝉之惑也夫以父天母地而謂之天子天子雖以形相禪固天地之精也天生聖人為生民主其亦異於常人赤龍鱗蟲耳何必其祥而後生飛燕羽蟲耳何必其瑞而後育逮虹臨華渚之神尤其怪誕安有人之一身可與鬼神交感而孕畜耶其瑶光貫月容或有之矣蓋窮理儒者之要道也理不明則物不格物不格則知不至知不至則意不誠意不誠則心不正心不正則邪媚得以搖吾天德之剛異端得以奪吾浩然之氣是謂儒名而墨行矣孟子曰盡信書則不如無書此固當時記載𫝊疑之失不足深信也君子其諒之帝堯陶唐氏姓伊耆名放勳帝嚳之子以火德王天下都平陽在位九十八年以子丹朱不肖乃遜位於舜詳見金氏通鑑前篇總論雙湖胡氏曰書稱帝德曰欽明文思安安者帝之心法也曰允恭克讓者帝之身法也欽存於中恭見於外敬為聖學始終之要也克明峻德以親九族則身修而家齊矣九族既睦平章百姓則家齊而國治矣百姓昭明協和萬邦則國學治而天下平矣聖經明德二字實自堯發之大八條亦始於此不但是也中者天下之大本事事物物莫不有一中道舉天下以與人大事也而授受之際不過曰允執厥中聖經中之為義亦自堯發之中庸九經亦始於此然則開于萬世聖學之源者堯之功顧不巨乎仲尼祖述堯舜韓子所謂堯以是道𫝊之舜禹湯文武周公孔子者即此是也道散於三極之間所望於聖人者裁成天地之道以立人極云耳總論勿軒熊氏曰洪荒之世氣浮而為天者不過茫茫一太虛耳固未有度數之分黃帝顓頊雖云造歷蓋未詳也至帝始命羲和分掌天地四時於是推步之法愈密日月星辰之麗於天者始則而象之歲分為四時又分為十二月又分為三百六十日因其氣盈朔虛又為置閏以應周天之度於是天道可得而成矣質凝為地者亦不過茫茫一塊土耳固未有彊理之别也黃帝雖曰分州畫野亦未詳也至帝始咨四嶽舉其能治水者以拯斯民墊溺一朝之命鯀不能治而禹繼之其施功之最難者莫如冀壺口龍門等處此蓋混沌初分水未有泄積之歲久衝決奔放愈甚則懷襄之害愈烈禹因其勢疏鑿而順導之若其次第則先青兖徐揚之下流而荆豫梁雍以次砥績弼成五服自甸侯至綏而封建之制以立咸則三壤自畎澮至川而井田之法以成於是地道可得而平矣自羲農黃帝之後又適當一元文明之㑹風氣駸開創制立法維其時也五典敦五禮庸五服章五刑用法度禮樂彰彰然著明如日月行天亘古常見此又立人之道以參贊天地化育之所不及者蓋萬世之功也總論雪航膚見曰自天地開闢至帝堯之世七政已齊九州已别風氣駸開大物駸著書曰光被四表格于上下協和萬邦黎民於變時雍以此論之舉天地間盡在春風和氣中矣孔子曰惟天為大惟堯則之德之至盛上下與天地同流又豈有十日並出焦禾殺稼之妖患乎至若使羿仰射十日之說尤甚謬也夫日在天距地萬里人雖有千鈞之力所射不過二三百步而已豈能射及萬里之日乎且射天乃無道之所為帝堯大聖詎為此乎王充於論衡辨射日之說曰日火也雖中安能滅之世稱桀紂之惡射天杖地高宗之德能消桑穀今堯不能以德滅十日而必射之是德不若高宗惡與桀紂同也㫖哉斯言足以解後進之惑蓋淮南王與賔客方士作內外書此言出于外書鴻烈解作史君子收于外紀中殆若莊列荒唐之言也豈可以為實事耶總論古史通略曰唐堯之德聰明文思光宅天下允恭克遜光被四表而又克明峻德以睦九族之親平章百姓以致昭明之效協和萬邦以成時雍之化乃命羲和欽若昊天而步占夫日月星辰敬授人時而明示以析因夷隩其為治之道有序如此至於嘉言罔伏野無遺賢則有以合天下之善諌鼓之立謗木之設則有以來天下之諌衢室之訪下民之問則有以通天下之情土階三尺茅茨不剪而其儉可知也不虐無告不廢困窮而其仁如天也辨共工有滔天之罪聞舜德於側微之際而其智如神也當時之治雖曰庶績咸熙萬邦咸寧而問之在朝在朝不知問之在野在野不知蕩蕩乎民無能名焉若夫康衢之謡曰立我蒸民莫匪爾極華封之祝曰壽曰富曰多男子其必有見於此也然堯在位七十載遜而授之於舜以天下與人而能為天下得人夫豈輕於付托之際哉史論靜軒周氏曰人莫知其子之惡莫知其苗之碩古有是言也帝堯之心廓然大公非溺愛不明之比故知子之不肖不足以主神器而𫝊大後寶所以求乎賢人焉此公天下之大端大本也若世之欺人孤兒寡婦狐媚以取天下皆以禪位為說者等而上之何啻霄壤而徑庭之乎逮夫妻堯二女攝堯天下無驕色無喜容雍雍默默躬修德化不耽乎衽席之私情不溺乎房幃之偏愛二女傾心樂從皆執婦道以帝女而下嫁匹夫以天子而下友庶人不妬忌不驕矜何德如之有夫婦然後有父子有父子然後有君臣夫婦人倫之大綱也易曰夫夫婦婦而家道正正家而天下定矣大舜能盡夫婦之道二女能修夫婦之德近而家庭夫婦之道藹然也遠而天下夫婦之道粲然也自非聖人至公無我之心則二女必有爭長之心大舜必有偏愛之意而夫妻必有反目之嫌也若漢光武之廢郭后唐高宗之廢王后宋仁宗之廢郭后哲宗之廢孟后皆由君德不剛以致三綱頽敗君不君而臣不臣夫不夫而婦不婦天下自是而傾覆矣何以君臨天下而主宰羣辟哉帝舜有虞氏姓姚名重華顓頊五世孫受堯禪以土德王天下都蒲坂在位五十年遜位于禹詳見金氏通鑑總論雙湖胡氏曰堯舜禹三聖授受堯之命舜曰允執厥中舜之命禹復益以三言者蓋以中之為道汨於人心之危者易陷隱於道心之微者難明故必察之以精而不雜守之以一而不離則危者安微者著自無過不及之差信能執乎此中則天下之大以之𫝊賢者此中也以之𫝊子者亦此中也推之而為湯武之放伐亦不外乎此中也此舜所以别白人心道心之危微而且誨之以精一用工之要者其慮至深遠矣吁精者明也即堯之所謂明德一者誠也即堯之所謂欽敬此十六字之𫝊為萬世心學之要也總論五峯胡氏曰讀五帝書而後知聖人澤及斯民之遠也後世有立功於一時興利於一邦者人猶追思而祀之是數聖人者有功於天下萬世曽不得推苗裔立宗子建廟庭春秋四時饗天下之報也有天下者端拱九重之內治其國家上之天文下之地理中之人倫衣食之原器用之利法度之章禮樂之則誰推明制作之也戎狄之人駕一偏空說失事理之正而其神像乃得蟠據中華名山巍嶪相望又聽其雕梁畫棟毁羣倫滅三綱之人而豢養之此何道也其不耕不植侵漁民利耗蠧民財乃細事耳為政者恬不以為慮可悲之甚矣總論古史通略曰大舜有大焉善與人同樂取諸人以為善雖有大智之資而好問好察邇言聞一善言見一善行若決江河沛然莫之能禦也故能明於庶物察於人倫由仁義行業業而致孝孳孳而為善由是堯聞之聰明將使嗣位歷試諸難謹徽五典則五典克從而無違教納于百揆則百揆時敘而無違事賓于四門則四門穆穆而無凶人謳歌獄訟歸之而無異辭朝覲㑹同歸之而無異意逮其既陟帝位也謂奉天之道所當先也故在璿璣玉衡以齊七政謂事神之禮所當講也故類于上帝禋于六宗望于山川遍于羣神四凶未去則去之遠方十六相未舉則舉之在朝四嶽之咨則曰明四目達四聰十二牧之咨則曰食哉惟時柔遠能邇若夫九官之命則命禹以宅百揆命稷以播百穀命契以敷五教命臯陶以明五刑垂益分掌虞工之事命䕫分典禮樂之職以至納言之官則命龍任之當時設官內外相維敷納以言明試以功則責實之法既嚴於始三載考績三考黜陟幽明則責成之法尤嚴於終然舜之為治雖有資於人而實本乎天也咨汝二十有二人則曰欽哉惟時亮天功無曠庶官則曰天工人其代之天敘有典則勑五典而使益厚天敘有禮則庸五禮而使益明天命有德而五服之章以示其賞天討有罪而五刑之用以示其罰是以一時之間法度彰禮樂著德洽民心而有司之不犯恩被動植而海隅之蒼生共惟帝臣內則比屋之可封外則四夷之來王不事詔而萬物成不下席而天下治孔子以為恭己南面無為而天下治者此其時也當時大治猶有庶頑讒說之未化苗民負固而不服得以梗聖人之治自常情處之非誅之以嚴刑則必置之於度外而舜不忍為故其化庶頑也既以納言命龍於先又以納言咨禹於後侯以明撻以記而使之知所愧恥格則承否則威而使之有所勸懲必欲其並生斯世咸臻太和而後已其待苗也首遷其君而不服又從而分北之既分北其民而不服始命禹以徂征之及徂征之命猶違而文德之教誕敷卒至於干羽舞於兩階而來格見於七旬則普天之下盡歸泰和之中矣由是功成作樂堂上之樂奏而祖考之來格堂下之樂奏而鳥獸之蹌蹌至於簫韶九成則鳯凰亦為之來儀至治之應有如此者而君臣之間未嘗以己治自足猶且以保治相勉克艱之戒大禹陳之警戒無虞罔失法度伯益陳之兢兢業業一日二日萬幾臯陶又陳之至舜之作歌也亦曰敇天之命惟時惟幾臣言之而君聽之君唱之而臣和之君臣之間夫豈為是私憂過計哉蓋當泰之時而審復隍之戒居豫之時而存介石之心聖賢保治於無窮其道固如此也後世孔子稱頌其德不能自已載於魯語則曰韶盡美矣又盡善也載於禮記則曰德為聖人尊為天子富有四海之內宗廟享之子孫保之大德必得其位必得其祿必得其名必得其壽又曰後世雖有作者虞舜弗可及也子民如父母有憯怛之愛有忠利之教親而尊威而愛富而有禮惠而能散甫刑云德威惟畏德明惟明非虞舜其孰能如此乎至於季札見舞韶簫者亦曰德至矣功大矣如天之無不覆如地之無不載雖甚盛德其蔑以加於此矣史論靜軒周氏曰明君以求言為急聖學以得賢為要不求言則聰明必為之壅蔽不得賢則政事必為之墮弛故諫諍輔弼之臣非人臣之利乃社稷之福也人君之所當重也帝舜以生知安行之聖非學知利行之質不以己之聰明為聰明而必求人之聰明不以己之賢聖為賢聖而必求人之賢聖立誹謗之木於國都雖言涉誹謗不罪也豈若後世有誹謗妖言之令乎𫝊曰舜好問而好察邇言執其兩端用其中於民其恭己無為而天下自治矣彈五絃之琴歌南風之詩氣象何從容也觀其南風之薰可以解吾民之愠惟恐民之不安生息而致忿怒也南風之時可以阜吾民之財惟恐民之不樂生息而致貧窶也民已安矣而猶以為未安治已至矣而猶以為未至聖人不自滿足謙尊而愈光之意可見矣鳴呼視聽求賢自輔而又歌解愠阜財之詩一舉而聽言求賢恤民之事皆在其中宜乎恭己無為垂衣裳而天下治也聖人道大德宏有如是哉總論太史公曰學者多稱五帝尚矣然尚書獨載堯以來而百家言黃帝其文不雅馴薦紳先生難言之孔子所𫝊宰豫問五帝德及帝繫姓儒者或不𫝊余嘗西至崆峒北過涿鹿東漸于海南浮江淮矣至長老皆各往往稱黃帝堯舜之處風教固殊焉總之不離古文者近是豫觀春秋國語其發明五帝德帝繫姓章矣顧第弗深考其所表見皆不虛書缺有間矣其軼乃時時見於他說非好學深思心知其意固難為淺見寡聞道也余并論次擇其言尤雅者故著為本紀書首以便學者觀矣總論劉氏恕曰六經惟春秋及易彖象文言說卦稱序卦雜卦仲尼所作詩書仲尼所刪定皆不三皇五帝三王易下繫曰古者包犧氏之王天下也包犧氏沒神農氏作神農氏沒黃帝堯舜氏作繼世更王而無三五之數或以包犧至舜為五帝孔子未嘗道學者不可附㑹臆說也管子稱明一者皇察道者帝通德者王謀得兵勝者伯孔穎達曰管子書或是後人所録非本書也莊子列子皆寓言誕妄秦漢學者采其文辭論議故競稱三皇五帝而不知古無其人仲尼未嘗道也梁武帝以伏羲神農燧人為三皇黃帝少昊帝嚳帝摰帝堯為五帝舜非三皇亦非五帝與三王為四代其指不通歷世紛紛莫知定論也御批資治通鑑綱目前編卷首
