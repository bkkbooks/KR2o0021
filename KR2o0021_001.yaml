body:
  text: 欽定四庫全書御批資治通鑑綱目前編卷一陶唐氏帝堯羅氏路史曰堯生於母家伊侯之國後徙耆故曰伊耆氏年十有三佐鄞封植受封于陶通鑑外紀曰年十五長十尺受封唐年十六即天子位耆左氏傳作祁漢史曰伊氏書曰粤若稽古帝堯曰放勲粤起語若稽追記之辭古崇之也堯名古者世質雖天子不諱其名放大也放勲者總名其德業之大也一曰放如推而放諸之放謂推廣以成其功也聖人亦善推其所為而已意與下文二章相應二字本史官稱堯之語後世因以為堯稱焉欽明文思安安允恭克讓光被四表格于上下此敘堯之徳也欽誠敬也明精明也文文理也經緯天地曰文謂其彌綸天地之道倫理明順煥乎其有文章也思言其運量裁處意思周宻所謂其智如神也安安舊説止其所止然二字氣象自别盖其盛德從容之極難以形容故以安安言之恭讓欽之接於人也謂之允克則其至誠之發真實氣象又自不同光被四表言其發越覆冐之盛格于上下言其充塞感通之極也史臣敘堯之德而以欽為首此聖人之心法也允恭以下即四德之推恭讓者欽之發被四表者明文之著格于上下則思之感通也朱子常言聖人之心精明純粹而已則欽明二字已足以盡聖人之德矣而又曰文思陳文蔚曰兼語其用也文者明之用思者欽之用欽明即惟精惟一文思即允執厥中也子王子曰欽明文思猶言仁義禮智克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍明推明也俊德大學作峻盖其得乎天而出乎其類者即上文所敘之德也平者和同之章者品節之百姓者帝畿之民昭明則民心風俗之俱新也萬邦諸侯也協考比也如協時月如國語司民協孤終司徒協旅之協皆考比之義和調齊也萬邦諸侯豈無賢庸之不齊聖人朝覲廵省考禮正刑一德黜幽陟明皆所以協和之也黎民黒首之民舉天下生靈之衆也上文紀聖德之盛此章紀治化之序聖人治天下其機有二一則盛德發越自然感化一則布政施化推而廣之也甲辰元載乃命羲和邵子皇極經世書係之元年又東漢志晉志皆引春秋文㬬鉤曰唐堯即位羲和立象儀則是命羲和帝堯即位之初政也又按國語楚觀射父曰少皥之衰也九黎亂德顓頊受之乃命南正重司天以屬神命北正黎司地以屬民堯復育重黎之後不忘舊職使復典之以至夏商故重黎氏世敘天地而别其分主楊子曰羲近重和近黎韋昭曰即羲氏和氏也乃命羲和欽若昊天厯象日月星辰敬授人時羲和二氏也厯紀數之書也言天者所謂堯厯也象者觀天之器後篇所謂璣衡之屬是也言天者謂渾儀實始于此上古以來因時作事而厯法盖未傋帝堯始為厯象之制定其財成輔相之節以授其民遂為後世常行之凖焉朱子曰此所命盖羲伯和伯下文分命其仲叔履祥按尚書大傳舜廵四嶽祀泰山霍山皆奏羲伯之樂華山𢎞山奏和伯之樂其方與時與二氏所掌者合則羲伯和伯當有其人盖四子分職必有二伯總之不然厯法無所統矣分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交劉氏云宅南日交陳氏云宅南交曰明都平秩南訛史記索隠作為敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛宅度也蔡邕石經作度朱子云宅度古文通厯法以日行起度以日出入方隅定晷刻氣候宅嵎夷南交西朔方出納敬致皆所以定卯酉子午之中推日道出入之方候朝夕之景及致日中之景寅敬賓餞謹其事也永短中星皆自是推然候中星又所以定日度也宅嵎夷曰𤾉谷周禮所謂日東則景夕多風之地也南交日南則景短多暑之地也昧谷日西則景朝多隂之地也幽都日北則景長多寒之地也四方地勢不同風氣亦異各有宜也故測候之際因度其所宜為授時之節所謂平秩東作南訛西成朔易者也易如周官所謂一易再易三易作訛成易皆謂民事各以方異辭耳平秩史記依今文作便程其義尤明日宵永短與中星連言者初分而候中星以星之初見為晝夜之分又分摺四中以得日度之的以日宵之中立二分以永短之極立二至參之民生析因夷隩而為四時之政鳥獸孳尾等語則候之物生此厯家七十二候之法所由起也此皆授羲和以作厯之綱要四子分為四節毎節自作訛成易以上分方自日宵永短以下分時二載定閏法帝曰咨汝羲暨和朞三百有六旬有六日有古文作又以閏月定四時成歳允釐百工庶績咸熙帝既命羲和厯象又四時推候皆合矣積一朞而天有餘度歲有餘日於是又置閏法而日月氣候始參㑹今厯家所定章法昉乎此隆古風氣未開民淳事簡厯數既定因時頒政而已他無為也故允釐百工而庻績咸熙焉朱子書傳曰歲周三百六十五日四分日之一而曰三百六旬有六日者舉成數也天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與初躔㑹是一歳日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二㑹得全日三百四十八餘分之積五千九百八十八如日法九百四十而一月得六日不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歳月行之數也歳有十二月月有三十日三百六十者歳之常數也故日行而多五日九百四十分日之二百三十五者為氣盈月行而少五日九百四十分日之五百九十二者為朔虚合氣盈朔虚而閏生焉故一歲閏餘率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五至十有九歲七閏則氣朔分齊是為一章也履祥按章法雖云氣朔齊然猶有分秒之餘至二十七章為㑹三㑹為統三統為元積四千六百一十七年則日月皆無餘分却得十一月甲子朔子時半冬至則又為厯元矣今立成法率三十二月而置一閏朱子曰按帝堯時冬至日在虚昬中昴今冬至日在斗昬中壁中星不同者盖天有三百六十五度四分度之一歲有三百六十五日四分日之一天度四分之一而有餘歲日四分之一而不足故天度常平運而舒日道常内轉而縮天漸差而西歲漸差而東此歲差之由古厯簡易未立差法但隨時占候以與天合至東晉虞喜始以天為天歲為歲乃立差法以追其變約以五十年退一度何承天以為太過乃倍其年而反不及至隋劉焯取二家中數七十五年為近之然亦未為精宻也履祥按帝堯之言天常寛而厯則宻後世言天者常宻而厯則疎盖帝堯生知即事洞要其於周天固已知圓竒之妙四分一不足以盡天矣其命羲和不過授之以作厯之綱要如於中星互舉辰象於朞數槩舉全日至於推歩度數隨時占候則羲和有司之事帝堯固不必數數然也後世日不足而始為度度不足而更為分秒分秒愈多則算法當愈宻矣然久亦未嘗不差也盖聖人因時制厯雖舉要而不遺後世定厯推天始積分以求宻因時制厯則厯與天常相竒應定厯推天而厯與天常易差無他天圓以動圓故動故不測而後世就定法以拘之也然嘗就其説而考之所謂四分度之一也析為九百四十分日之二百三十五果若所言則止日四分之一可也何必析為小分哉太初草創乃以八十一分日之二十分少固不足論晉志載劉洪王蕃之法則析為五百八十九分度之百四十五如此則四分度之一者乃其大約而於四分一之外天舒日縮又餘小分之九也十年則九十分計百三十年而積差二日矣唐開元大衍厯又析一度為三千四十分毎歲日餘三十七分太積八十年而差一度又餘六分自唐至今皆用之然自開元至寳祐五百四十年而差十度則唐厯積分雖多反不如晉志之近宻也紹興統元厯漢上朱震典之析一度為萬分每歲氣周三百六十五日二千四百四十六分七十二秒半而周天則三百六十五度二千五百七十二分二十五秒又按堯仲春星鳥宋東井二十一度中仲夏星火宋亢七度中仲秋星虚宋斗十一度中仲冬星昴宋璧一度中堯厯中星與日所次至是差四十餘度矣去堯之世三千五百餘歳而差四十餘度至景定甲子冬至之日已在斗初漸入東陸後此三千六百年已在東陸又三千六百年過東陸之中又三千六百餘年冬至之日遂行南陸則冬長夏短幾相貿易造化不幾於變乎曰非然也唐張説一行厯議曰日之所行即為黄道日差則黄道與之俱差必不至於冬長夏短矣抑後世豈無聖人隨世裁成良太史隨時推移者此固不必長慮也七載麒麟遊於藪澤路史曰堯在位七年民不作忒鴟乂逃於絶域麒麟遊於藪澤則能信於人也十有二載廵狩發例于此後不悉書孔子曰舜臨民以五堯臨民以十二註十二載一廵狩也路史註曰杜佑謂十二載廵嶽者非甲子二十有一載甲申四十有一載虞舜生於諸馮孟子曰舜生於諸馮蘇氏古史曰舜生於諸馮之姚墟故為有姚居於溈汭故為有媯履祥按舜生姚墟因生為姓故為姚姓居潙汭後世復因居潙而爲嬀姓非舜有二姓也諸馮溈汭皆在今河中府河東縣溈水源出首山入西河孟子以舜生諸馮為東夷之人盖對文王西夷而言猶云東方西方爾故曰地之相去千有餘里盖自河中至岐周千餘里也而説者指齊之歷山濮之雷夏為舜側微耕漁之地甚者指㑹稽上虞牛羊村百官渡為舜所居盖因孟子之言而附㑹之也路史曰其先國于虞始為虞氏河東虞阪系出虞幕春秋外傳周太史伯曰虞幕能聽協風以成樂物生傳曰自幕至于瞽瞍無違命謂能服事帝朝舜重之以明德史記曰父瞽瞍盲索隠曰母握登史記據世本敘窮蟬橋牛者非五十載帝遊於康衢列子曰堯治天下五十年遊於康衢兒童謡曰立我蒸民莫匪爾極不識不知順帝之則列子書出三代之末尚多傳聞之辭而此語亦自得聖人之意學者稱之今不敢棄文中子曰堯有衢室之問時有老人擊壤而歌曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉叶入聲胡氏附此歌於九十載間今以類附此六十載舜以孝聞史記曰舜母死瞽瞍更娶妻而生象象傲瞽瞍愛後妻子常欲殺舜舜避逃及有小過則受罪順適不失子道孝而慈於弟日以篤謹年二十以孝聞耕歴山歴山之人皆讓畔歷山今河中府漁雷澤雷澤之人皆讓居今河中府有雷水出雷首山入河鄭康成謂兖州雷夏澤陶河濱河濵之器皆不苦窳水經曰河水南遶陶城酈道元註即舜陶處在蒲阪北南去歴山不逺不苦窳言民皆務為厚正之器不薄惡喎斜也作什器於壽丘就時於負夏負夏衛地一年而所居成聚二年成邑三年成都胡氏皇王大紀作一遷二遷三遷莊子又有至鄧之墟而十有萬家大紀曰舜年二十孝友聞於人有友七人焉雄陶方囘續牙伯陽東不訾秦不虛靈甫常輔翼之淮南子曰當此之時口不説言手不指麾執𤣥德於心而化馳若神使舜無其志雖口辯而户説之不能化一人萬章曰父母使舜完廪捐階瞽瞍焚廪謂舜已下階而瞍焚之也使浚井出從而揜之謂舜已出去而瞍塞之也澠水燕談曰今河中府舜泉坊二井相通所謂為匿空旁出者也其廟名之曰孝感泉象曰謨盖都君咸我績象徃入舜宮舜在牀琴象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其于予治不識舜不知象之將殺己與孟子曰奚而不知也象憂亦憂象喜亦喜程子曰人情天理於是為至古史曰孟子曰堯將舉舜妻以二女瞽瞍不順不告而娶既而猶欲殺舜而分其室舜終不以為怨余考之書孟子盖失之矣四嶽之薦舜曰烝烝乂不格姦益之稱舜曰䕫䕫齊慄瞽亦允若則舜之為庻人既已能順其親使不至於姦矣父子相賊姦之大者也豈有既已用之而猶欲殺之哉履祥按瞽瞍之欲殺舜也象之欲殺兄也史記曰舜母死瞽瞍更娶妻而生象象傲瞍愛後妻子常欲殺舜也然瞽瞍特出於愛憎而舜又非有大過惡何至欲殺之哉嘗考其情則虞氏自幕故有國至瞽瞍亦無違命則粗能守其國者也其欲殺舜盖欲廢嫡立幼而象之欲殺其兄亦欲奪嫡故爾不然豈以匹夫之微愛憎之故而遽欲殺之哉然則舜固有國之嫡而其為耕稼陶漁之事何也曰古之國家子弟固非如後世之豢養舜之為田漁而人從之又非必如今之漁人陶工也或者見逐於父母故勞役之或避世嫡不敢居而自歸於田漁亦因是以行其政敎而濟時之窮故雜書有謂舜見器之苦惡而陶河濵見時之貴糴而販負夏孔子曰耕漁陶販非舜事也而徃為之以救敗爾此説雖出雜書而實得聖人之意又瞽象之欲殺舜在其初年之間而堯之舉舜則在其克諧之後史記反覆重出而莫之辯固也然孟子當時亦不辯萬章之失何也盖孟子不在於辯世俗傳訛之迹而在於發明聖人處變之心務使學者得聖人之心以推天理人倫之至則其事迹之前後有無皆不必辯矣六十有一載洪水咨四嶽舉鯀俾乂帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂四嶽者掌四方方嶽之官古者大事則咨四嶽使詢訪四方之言也方割始為害也懷山襄陵敘其實也浩浩滔天言其勢也滔天當時方言云爾滿望皆水而天影其中若滔天然僉曰於鯀哉帝曰吁咈哉方命圯族嶽曰异哉試可乃已僉曰者四嶽以衆言告也鯀有崇伯也方命舊説逆命史作負命按堯典上文方鳩方割皆作方始之義則此當云我始命為他職時即敗羣自用則治水大任弗可為也圯族猶詩言敗類嶽日者上舉衆言此因獨對异義未詳列子註及桺文與異字同言但用其才可以治水則已不必病其圯族也帝曰徃欽哉帝順衆言而使之徃復云欽哉以救其失盖能敬謹則必不圯族自恃而事功成矣六十有九載鯀績用弗成九載績用弗成程子曰治水天下之大任也非其至公之心能捨己從人盡天下之議則不能成其功豈方命圯族者所能哉鯀雖九年而功弗成然其所治固非他人所及也惟其功有緒故其自任益强咈戾圯族益甚公議隔而人心離矣是其惡愈顯而功卒不可成也履祥按周漢以來諸史多稱堯有九年之水今考其時自洪水方割即舉鯀俾乂九載無成而後舉舜又二三年始舉禹禹八年於外而始告成功前後計二十餘年矣而曰九年者盖指鯀九載之間也計自方割以來洪水之害無歳無之如後世歲有河決之患鯀於其間多為隄防以鄣之而患日滋甚孟子敘泛濫之禍在舉舜敷治之上則九年之云盖謂此時也然洪水之害一日不可緩而待鯀九載無功始易之何也傳稱禹能脩鯀之功則九載之間非盡無功但無成耳而三考黜陟之典不可廢是以有羽山之貶焉或曰僉之舉鯀也方命圯族帝已知之矣知而使之何與盖為天下擇人天下之公也當是時舜禹未興在廷諸人固皆舊德乃若其才則無出鯀之右者人皆知鯀之才足以集事惟聖人知其剛悻違衆易於敗事爾帝將戒其所短以用其所長則曰欽哉以勉之夫欽者心法之要萬事之所由成也以鯀之才加之敬謹何患無成惟其棄帝之命忽不務此是以輕視愎言訖潰于成然則帝固將全鯀之才而鯀則棄帝之命矣天下之以才自負而忽不加謹祗以取敗者皆是也寧獨鯀哉又按經稱鯀堙洪水傳稱鯀障洪水國語又稱其墮髙堙卑經稱禹決九川孟子稱禹疏九河㵸濟漯決汝漢掘地而放之海然則鯀之治水也障之禹之治水導之也其成敗之由以此當其在鯀也禹何以不諫曰禹安得不諫以鯀之方命圮族况其子之言乎故禹必有諌鯀必有所不從舜之知禹亦必以此舜之罪也殛鯀其舉也興禹大公之道聖人無容心焉抑鯀既以方命圯族失之禹念父功之未就於是暨益暨稷思日孜孜以成之非惟克勤于邦以為忠而補前人之愆以濟天下乃所以為大孝也然以禹之聖猶八年於外何也禹八年之間非但導水濬川而已中間畫井田為溝洫定經制酌土宜立賦法通朝貢廣敎化於八年之間定千萬世之計此禹之功所以為不可及也七十載舉舜登庸帝曰疇咨若時登庸放齊曰𦙍子朱啓明帝曰吁嚚訟可乎登庸之命不言所職帝之意固有在矣朱丹朱也放齊以嗣子朱為對啟明者謂其才智之開明也朱之為不肖也亦以此朱子曰此下為舉舜張本帝曰疇咨若予采驩兠曰都共工方鳩僝功帝曰吁静言庸違象㳟今本滔天二字下文之衍孔頴逹曰經三言衆人未必一時之事但歴言朝臣不賢為求舜本也帝曰咨四嶽朕在位七十載汝能庸命㢲朕位岳曰否德沗帝位㢲入也使入居帝位也或曰㢲與遜同曰明明揚側陋師錫帝曰有鰥在下曰虞舜師錫四岳以衆議對也錫予也以衆言對而曰錫重之也薦聖人於帝此天子也安得不重為之辭老而無妻曰鰥舜三十未娶而即曰鰥古者聖人繁育人民三十而娶者期之極也至此而未娶即鰥也書大𫝊曰父頑母嚚而不見室家之端故謂之鰥帝曰兪予聞如何予聞者已知其人也如何者更詳其實也以舜之𤣥德年二十而聞於天下以堯之明思天下固無遺照也然聞之而不自舉之盖為天下擇人必盡天下之議聖人見大心平大公無我意象於此可想見也岳曰瞽子父頑母嚚象傲克諧以孝烝烝又不格姦舜處頑嚚之下非可以諫諍囘父母之心非可以言語喩父母於道加之傲狠之弟又豈聲音笑貎可以得其歡心哉克諧以孝烝烝又是盖真誠之充積和氣之薰烝也不格姦則衆亦不至於為惡矣家難而天下易觀諸克諧烝烝之氣象則舜治天下神化之功用於此可見矣帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉孟子曰堯之於舜也使其子九男事之二女女焉百官牛羊倉廪備以養舜於畎畆之中後舉而加諸上位故曰王公之尊賢也舜尚見帝帝館甥于貳室亦饗舜迭為賔主是天子而友匹夫也按荀子莊子皆有堯舜間答之辭胡氏大紀亦取之然疑信相半今不取履祥按史稱黄帝之曾孫嚳嚳之子堯則堯黄帝之𤣥孫也又稱黄帝生昌意昌意生顓頊歴窮岼敬康句望橋牛以至瞽腴而生舜則舜黄帝八世孫也堯舜俱出於黄帝則二女之妻不亦亡宗嬻姓亂序無别已乎或曰晉胥臣曰黄帝之子二十五人得姓者十四人為十二姓其同姓者二人而已異姓則異德異德則異類異類雖近男女相及以生民也又記曰繋之以姓而弗别雖百世而婚姻不通者周道然也然則古已别姓則婚姻不可以通乎曰非也黄帝氏十四人之得姓猶髙陽髙辛氏之十六族爾胥臣之言為納懷贏故附㑹而言非正也禮記之言用周道以正諸矦之失也皆非此之謂也世系之傳史記之失考也昔者歐陽氏固論之矣見六一丈集且司馬談遷漢史也其紀漢之初已不知髙祖之世系於父曰太公而猶不知其名母曰劉媼而猶不知其氏而其上紀五帝之世母妻嫡庻子孫名氏一無所遺耳目所及尚如此則二千餘年所傳聞者其詳尚足信乎或曰世本也非談遷之所自言也抑世本又豈果出於三代之時乎以世本為三代之書猶以爾雅為周公之書也縱使果出於三代之季則周衰傳説已不可信故朱子謂世本或出於附㑹假託不可憑據今以其敘舜之世推之其不可憑也審矣曰然則舜果何出乎考之於書曰虞舜曰嬪于虞是虞者有國之稱也叅之國語史伯之言曰成天地之大功者其子孫未嘗不章虞夏商周是也虞幕能聽協風以成樂物生者也夏禹能平水士以處庻類者也商契能和合五敎以保于百姓者也周棄能播殖榖疏以衣食民人者也其後皆為王公侯伯夫以虞幕竝契稷而言則幕為有功始封之君虞為有國之號而舜所自出以王天下者也考之左氏史趙之言曰自幕至于瞽瞍無違命舜重之以明德夫自幕以至于瞽瞍則非自黄帝昌意顓頊窮蟬敬康句望橋牛以至瞽䏂也或曰然則昌意窮蟬以下之説固妄矣國語不曰幕能帥顓頊乎左氏不曰陳顓頊之族乎曰幕之出於顓頊左氏國語之説固足徴也然謂顓頊之必出於黄帝史記之説其果足徵乎黄帝氏歿則少昊氏作是為五帝之首國語稱少昊氏之衰九黎亂德顓頊受之則少昊似一代之通稱後世始衰非少昊帝之世即衰也而史記於黄帝之後不及少昊懸紀顓頊指為黄帝之孫隔逺無序少昊之代何所往而黄帝之孫何其壽也莫難明者譜牒莫易知者朝代史記序朝代尚有遺則其序譜牒豈足信乎夫顓頊未必黄帝之孫則五帝豈必皆黄帝之後伏羲神農黄帝是為三皇皆有功德於天下果如史記五帝三王皆黄帝之後則伏羲神農子孫何以皆無帝王者商周猶曰世逺也若顓頊髙辛陶唐皆黄帝後則一家伯仲子孫逓相傳授又何必殊徽號易五運後世又何必曰五帝官天下云哉況少昊氏上與伏羲聯曰太皥少皥不必廢少昊為黄帝之青陽顓頊氏下與帝嚳氏對曰髙陽髙辛不必附帝嚳為顓頊之族子也古之王者必有庻子之官盖公卿大夫之子凡天下之俊秀與天子之子遊焉學焉者則十四人為十二姓焉又不必皆為黄帝之子也若曰皆黄帝之子則有姓無姓何其偏同姓異姓何其雜也上古之時有同産而為夫婦者帝髙陽投諸海外之野以為夷狄況一父之子各易其姓而遂使之男女相及是率天下而為夷狄禽獸也豈理也哉書稱帝堯克明俊德以親九族使堯舜果同出於黄帝如史記之世系則堯之視舜為同髙祖之族為羣從𤣥孫之行正九族之内也舜在九族之内為父母弟所惡屢瀕於死耕稼陶漁而堯不一顧省豈足謂之親睦九族迨四岳明揚又直妻以二女豈足謂之克明俊德以天下之大聖人推而納諸天下之大夷狄禽獸則史記世本誣陷聖人之罪不可勝誅矣然則堯舜之不同出於黄帝以書決之書無明文以堯之妻舜決之也或者又曰堯舜之不同出黄帝若前所云固決矣傳稱有虞氏禘黄帝而郊嚳祖顓頊而宗堯何也曰此亦小戴収國語之言而又失之者國語論禘郊祖宗皆以其有功於民而祀之初不論其世也故注者謂虞以上尚德夏以下親親戴氏祭法易其前後故讀者不覺耳此朱子固嘗言之矣無已則又決之於書乎書稱舜格于文祖即受終于堯之祖也稱禹受命于神宗即舜宗堯之廟也其禘黄帝其郊嚳即宗堯之意爾是以有虞子孫猶郊堯而宗舜以天下相傳則有天下之大統焉有虞氏受堯之天下則宗堯宗堯則禘郊堯之宗祖計堯以前亦或有然者矣况國語固云禘郊祖宗與報為五則禮固有並行而不相悖者近世有為之説者曰祖考來格虞賓在位此有虞祭顓報幕以至瞽瞍之祖考也胡氏大意國語所謂祖顓頊與有虞氏報焉者也禘黄帝郊嚳宗堯書所謂文祖神宗舜受堯之天下故宗堯為宗而祖堯之祖也路史大意大傳所謂帝入唐郊以丹朱為尸者也祖顓頊報幕以至瞽䏂者一家之私親也禘郊宗堯者天下之公義也然韶之為樂正以紹堯而得名則祖考來格者即文祖神宗之謂而虞賔在位者安知非丹朱之在尸位乎况禘郊祖宗報五者各有所尊自不相厭而虞賓之位亦不相妨也故曰以天下相傳則有天下之大統焉至商周以征伐革命始與古異而諸儒之論亦始膠矣慎徽五典納于百揆慎徽五典五典克從納于百揆百揆時敘左傳太史克曰昔髙陽氏有才子八人蒼舒隤敳檮戭大臨龍降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時敘地平天成舉八元使布五敎于四方父義母慈兄友弟恭子孝内平外成故虞書數舜之功曰慎徽五典五典克從無違敎也納于百揆百揆時敘無廢事也髙陽顓頊也氏謂其朝代才子謂髙陽氏之世其故家遺族也髙辛氏才子之云亦然故總謂之十六族或者不知遂真以為二帝之子則髙陽八子何其壽而髙辛氏之八子豈果堯之庻弟與賓于四門流凶族殛鯀于羽山放驩兜于崇山莊子釋丈謂堯六十年放驩兜于崇山六十四年流共工于幽都六十六年竄三苖于三危按賓于四門舜歴試之時鯀考績弗成之明年也鯀無成功舜臣堯舉黜幽之典於是有羽山之貶驩兜之比周罔上亦亟黜之至於三苖就竄疑未能若是速也所以書敘四罪總於攝位之季太史克以舜賓四門殛鯀放驩兜故併以流四凶族繫之爾事之前後舊必有考然四罪之行皆堯七十載舜登庸之後非六十年間事也意者六字之訛與今追正其訛繫之七十年以後賓于四門四門穆穆左傳太史克曰舜臣堯賓于四門流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦螭魅螭魅山林異氣所生為人害者古者聖人為民驅其龍蛇惡物而處之平土故四裔無人之境螭魅聚焉故虞書曰賓于四門四門穆穆無凶人也程子曰四凶之材皆可用堯之時聖人在上皆以才任大位而不敢露其不善之心堯非不知其不善也伏則聖人亦不得而誅之及帝舉舜於匹夫之中而授之位則是四人者始懷憤怨不平之心而顯其惡故得以因其迹而誅竄之也履祥按太史克敘四凶之辭疑多溢惡蘇氏古史亦謂左氏所言皆後世流傳之過今故畧之七十有二載舜納于大麓使禹平水土益掌火棄敎民播種契為司徒書敘納于大麓為舜歴試之終事今係之歴試之三年兼鯀以七十載殛死至是禹三年之喪畢而舜舉之也大紀命禹益棄皆係之此年今從之或曰此時方舉禹則鯀殛之後禹未舉之前三年之水孰治之與太史克固曰舉八愷使主后土矣但不如舉禹之專掌爾一云納于大麓盖納于泰山之麓使之主祭也烈風雷雨弗迷百神享之也盖堯時曽有風雷之變使舜禱之泰山而息也按淮南子外紀亦言堯有大風之變今不敢信用且依史記蘇氏之説納于大麓烈風雷雨弗迷淮南子曰四岳舉舜而薦之堯堯妻以二女以觀其内任以百官以觀其外既入大麓烈風雷雨而不迷太史公曰堯使舜入山林川澤暴風雷雨舜行不迷蘇氏曰洪水為患堯使舜入山林相視原隰雷雨大至衆懼失常而舜不迷其度量有絶人者而天地鬼神亦或相之與孟子曰天下之生久矣一治一亂當堯之時天下猶未平洪水横流汜濫於天下草木暢茂禽獸繁殖五榖不登禽獸偪人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹疏九河㵸濟漯決汝漢排淮泗然後中國可得而食也當是時也禹八年於外三過其門而不入后稷敎民稼穡樹藝五榖五榖熟而民人育人之有道也飽食煖衣逸居而無敎則近於禽獸聖人有憂之使契為司徒敎以人倫父子有親君臣有義夫婦有别長幼有敘朋友有信放勲曰勞之來之匡之直之輔之翼之使自得之又從而振德之履祥按洪水之為患也堯使舜治之舜於是使益掌火禹敷土稷敎稼穡矣舜使禹治之禹於是暨益奏鮮食暨稷奏艱食矣二聖人之規模其視鯀之方命圮族者不其相逺乎故觀書者必得聖人之規模焉又按孟子稱天下之生一治一亂則是氣化消息固有定勢矣獨不關諸人事與曰朱子固曰氣化盛衰人事得失反覆相尋理之常也大抵氣化有盛則必有衰人事處盛則必有失此一治所以一亂也氣衰則必復盛人事失則必復變此一亂所以一治也惟聖人在上則能以道御氣治制亂此所以常盛常治而無衰亂也古今之言堯舜者皆曰極治之時而不知帝堯乃善制亂之主何則帝堯治天下天下雍熙者至是六十餘年氣化可謂極盛天下可謂極治矣盛則必衰惟其人事無致亂之因故散而為子朱之不肖洪水之横流四罪在朝聖人在下是亦一亂矣惟帝堯善於制亂故水之為灾也則敷治子之不肖也則與賢舜禹並興四罪終去所以處亂而迄不害其為治也然則世皆以堯為極治之主愚獨謂堯舜皆善治亂之君後之為君者無徒曰氣數云丙辰七十有三載薦舜於天舜受終于文祖帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于德弗嗣帝曰咨爾舜天之厯數在爾躬不允其讓也允執其中授之以治天下之道也四海困窮天禄永終戒之也子王子曰堯之試舜如此之詳而讓德弗嗣之下無再命之辭㢲位之際亦無可寧告戒之語何也按論語堯曰篇首二十四字乃二典之脱文也正月上日受終于文祖堯老而舜攝也堯終其事而舜受之也在璿璣玉衡以齊七政以玉為璣以象天體之運轉以璿珠飾之以象星辰之位次以王為横筩推其分度時節以窺天而與璣合羲和之法至是益宻後世渾天儀象盖其法也朱子曰渾天説曰天之形狀似鳥卵地居其中天包地外猶卵之裹黄圓如彈丸故曰渾天其術以為天半覆地上半在地下其天居地上見者一百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩髙正當天下之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端其天與日月星宿斜而㢠廻轉此必古有其法遭秦而滅漢武帝時洛下閎鮮于妾人始經營量度之宣帝時耿夀昌始鑄銅而為象宋錢樂又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圓周二丈五尺强轉而望之以知日月星辰之所在即璿璣王衡之遺法也歴代以來其法漸宻本朝因之為儀三重其在外者曰六合儀平置黑單環上刻十二辰八千四隅在地之位以凖地靣而定四方側立黑雙環背刻去極度數以中分天脊直跨地平使其半出地上半入地下而結於其子午以為天經斜倚赤單環背刻赤道度數以平分天腹横繞天經亦使半出地上半入地下而結於其卯酉以為天緯三環表裏相結不動其天經之環則南北二極皆為圓軸虚中而内向以挈三辰四遊之環以其上下四方於是可考故曰六合次其内曰三辰儀側立黑雙環亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則為赤單環外依天緯亦刻宿度而結為黑雙環之卯酉其黄道則為黄單環亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其内以為春分後之日軌半出其外以為秋分後之日軌又為白單環以承其交使不傾墊下設機輪以水激之使其日夜隨天東西運轉以象天行以其日月星辰於是可考故曰三辰其最在内者曰四遊儀亦為黑雙環如三辰儀之制以貫天經之軸其環之内則兩靣當中各施直距外指兩軸而當其要中之内靣又為小窽以受玉衡要中之小軸使衡既得隨環東西運轉又可隨處南北低昻以待占候者之仰窺焉以其東西南北無不周徧故曰四遊此其法之大畧也儀禮經傳通觧歴象篇曰渾天儀唐貞觀中李淳風為之開元中浮屠一行梁令瓚又為之宋太平興國中張思訓創為元祐中蘇頌更造其法尤宻置渾儀於上以仰觀置渾象於下以俯視樞機輪軸隠於中以水激輪則儀象皆動不假人力肆類于上帝禋于六宗望于山川徧于羣神朱子曰類禋望皆祭名類謂非常祀而祭告于天其禮依郊祀為之上帝天也禋精意以享之謂宗尊也所尊祭者其祀有六祭法曰埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也山川名山大川五嶽四瀆之屬望而祭之故曰望羣神謂丘陵墳衍古昔聖賢之類言受終觀象之後祭祀以攝位告也輯五瑞既月乃日覲四岳羣牧班瑞于羣后合五等諸侯朝攝于都各執命圭璧為信以合符于天子盡正月皆至於是日日覲見四岳九牧以察問五等諸侯之政班還其命圭璧如新受命也七十有四載廵狩舜以攝位初年輯五等諸侯盡正月皆至其二月乃日日覲四岳羣牧考察諸侯以還其瑞則二月未暇廵狩也故逾歲而廵狩今附于攝位之明年歲二月東廵狩至于岱宗柴望秩于山川禮記作柴而望祀山川盖古者祭山埋之祭川沈之今於東嶽之下祀東嶽而及東方山川不能徧埋沈也故柴而望祭取其氣之旁逹也舊説柴句謂燔柴以祭天古者祭天必於郊有大事特告則放郊禮而謂之類天子將出類於上帝未聞至岱宗而始祭告也餘三岳皆如岱禮則一歲廵狩而四祭天不已瀆乎當從禮記以柴望秩于山川為句肆覲東后五玉三帛二生一死䞇五玉至䞇舊在脩五禮之下朱子謂當在覲東后之下盖東方五等諸侯及公侯之子附庸之君與卿大夫命士䞇見之儀等也聖人制為覲享之禮五玉三帛二生一死皆取服食器用而已古時多玉故公侯以玉為䞇以共天子之器用賜予古者𤣥衣纁裳黄亦為裳故侯之世子執纁公之孤執𤣥附庸之君執黄以共夜服卿羔大夫鴈士雉以共飲食也羔羊舒鴈二物皆可以生得士異於庻人故執雉取其文也而雉不能生得故必死者為贄可以見聖人制禮詳宻而簡易也如此協時月正日同律度量衡脩五禮如五器卒乃復朱子曰時謂四時月謂月之大小日謂日之甲乙諸侯之國有不齊者則協而正之也同審而一之也律謂十二律黄鍾太蔟姑洗蕤賔夷則無射六律為陽大吕炎鍾仲呂林鍾南吕應鍾六吕為隂凡十二管皆徑三分有竒空圍九分而黄鍾之長九寸大吕以下律吕相間以次而短至應鍾而極焉以之制樂而節聲音則長者聲下短者聲髙下者則重濁而舒遲上者則輕清而剽疾以之審度而度長短則九十分黄鍾之長一為一分而十分為寸十寸為尺十尺為丈十丈為引以之審量而量多少則黄鍾之管其容子榖秬黍中者一千二百以為龠而十龠為合十合為升十升為斗十斗為斛以之平衡而權輕重則黄鍾之龠所容千二百黍其重十二銖兩龠則二十四銖為兩十六兩為斤三十斤為鈞四鈞為石此黄鍾所以為萬事根本諸侯之國其有不一者則審而同之也時月之差由積日而成其法則先粗而後精度量衡受法於律其法則先本而後末故言正日在協時月之後同律在度量衡之先立言之敘盖如此也五禮吉凶軍賔嘉也修之所以同天下之風俗如同也五器即五禮之器卒乃復者舉祀禮覲諸侯一正朔同制度脩五禮如五器數事皆畢則不復東行而遂西向且轉而南行也今按如五器即禮記所謂考制度衣服正之之類是也五月南廵狩至于南嶽如岱禮八月西廵狩至于西嶽如初十有一月朔廵狩至于北嶽如西禮歸格于藝祖用特朱子曰南嶽衡山西嶽華山北嶽恒山二月東五月南八月西十一月北各以其時也格至也言至于其廟而祭告也藝祖疑即文祖或曰文祖藝祖之所自出未有可考特特牲也謂一牛也古者君有出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反靣之義也王制曰歸格于祖禰鄭注曰祖下及禰皆一牛程子以為但言藝祖舉尊爾實皆告也但止就祖廟共用一牛不如時祭各設主於其廟也二説未知孰是今兩存之五載一廵狩羣后四朝敷奏以言明試以功車服以庸林氏曰天子廵狩則有協時月以下等事諸侯來朝則有敷奏明試以下等事文中子曰舜一歲而廵四嶽兵衛少而徴求寡也履祥按李氏心傳辨周禮五嶽謂周都豐鎬則華山乃中嶽嵩髙不得為中嶽據爾雅河西嶽河南華河東泰江南衡則嶽山乃西嶽而華乃中嶽爾崧髙之為中嶽盖東遷之後也今以此説推之禹貢冀州自有泰嶽今猶謂之霍太山則堯都冀州盖以泰嶽為中嶽爾雅河西嶽周禮雍州其山鎮曰嶽山即禹貢岍山一名嶽山又名吳嶽今在隴州者是也然則唐虞五嶽當以岍為西嶽泰嶽為中嶽而東岱南衡北恒爾衡山最逺黄帝以潛霍為山之副然則秦以岍為西嶽漢武徙衡山之神於霍山歴代加封岷山多以西嶽為言盖有自來矣虞書獨東嶽稱岱宗而南西北三嶽不名盖當時廵狩四嶽取肆覲羣后道里之宜爾不必拘於嵩華之為嶽也敢因李氏之言以傳其疑流共工于幽洲流共工于幽洲幽洲北裔也當是遼東之地七十有六載竄三苖于三危竄三苗于三危西裔也隋書曰党項羌者盖三苖之後也其種有宕昌白狼皆自稱獮猴種東接臨洮西平西接葉護南北數千里三危山名舊云沙洲燉煌縣東四十里卑兩山是然三危乃因山以名其地不必拘曰居此山也吕刑曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵㭬黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方吿無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下乃命重黎絶地天通罔有降格楚語曰少皥之衰也九黎亂德民神雜糅不可方物夫人作享家為巫史無有要質民瀆齊盟無有嚴威禍災荐臻顓頊受之乃命南正重司天以屬神火正黎火當作北司地以屬民使復舊常無相侵瀆是謂絶地天通其後三苖復九黎之德履祥按諸儒言書者稱苖民繼蚩尤之暴而楚語稱三苖復九黎之德孔安國遂謂蚩尤為九黎之君夫蚩尤炎帝之末諸侯也九黎少昊之末諸侯也其時相去逺矣孔氏合而言之故説者疑辯特詳然皆不得書之意夫吕刑之書為訓刑作也則推所以立刑之由楚語觀射父為絶地天通而言也則推巫鬼之由推立刑之由則本蚩尤之為亂推巫鬼之由則述九黎之為昬上古之世其民淳朴在下無罪在上無刑至蚩尤始為亂延及平民無不寇賊䲭義姦宄奪攘於是聖人矯正而䖍劉之此刑之所為作也刑以制亂非有國者所尚也不得已而後用之爾而有苗遂並刑以為虐民始有不得其生者矣於是㒺中于信以覆詛盟而巫祝之事興焉巫祝之事盖九黎之遺習也呂刑楚語所指不同學者多合而言之其失久矣象以典刑流宥五刑鞭作官刑扑作敎刑金作贖刑𤯝災肆赦怙終賊刑欽哉欽哉惟刑之恤哉朱子曰象如天之垂象示人典常也示人以常刑所謂墨劓剕宮大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬淫邪凡罪之不可宥者也流流遣之使逺去宥寛也所以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勲勞而不可加以刑者則以此而寛之也鞭木末垂革官府之刑扑夏楚學校之刑皆以待夫罪之輕者也金罰其金也贖贖其罪也所以待夫罪之極輕雖入於鞭扑之刑而惰法猶有可議者也此五句者寛猛輕重各有條理法之正也肆縱也𤯝謂過誤災謂不幸若人有如此而入於刑則又不待流宥金贖而直赦之也怙謂有恃終謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聼其贖而必刑之也此二句者或由重而即輕或由輕而即重盖用法之權衡所謂法外意也聖人立法制刑之本末此七言者大畧盡之矣雖有輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也盖其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也流共工于幽洲放驩兠于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服書敘四罪在舜攝位之末盖作書者紀舜象刑之法與其恤刑之意因記二十八年之間所刑者四人而已外是無刑者是則因而係諸典刑之下非攝位季年之事也若果季年之事則崇鯀羽山之殛稽諸於三考之後而追罪於三十年之餘也且是時禹已成功而罪鯀人情之必不然者而謂聖人為之乎八十載禹告成功按孟子稱禹八年於外而唐虞之法九載三考大紀載禹成功於八十一載之間盖自七十二載舉禹至是九年矣其後夏史敘禹之功是為禹貢之書今附于此云史記漢史皆稱禹治水十三年盖本作十有三載乃同之文此特兖州貢賦始同爾禹貢夏史之追書故及十有三載之事其實告成則在此年也禹貢夏史敘禹平水土之功總以貢名識其成也每州有賦有貢有篚而貢則夏后氏田賦之總名也故以為名禹貢敘水土之事在唐虞之際禹謨敘功謨之事則在有虞之時舊皆名夏書以夏史之所述也夫子定書升禹謨於虞書以著三聖相傳之道冠禹貢於夏書以明大禹有天下之本也禹敷土隨山刋木奠髙山大川敷如敷治之敷有布置周徧之義禹治九州非一手足之為烈亦布置規畫之有道耳隨山刋木禹功之始奠髙山大川禹功之終其始洪水泛濫草木繁興禽獸逼人種藝無地禹於是隨山刋木使益掌火烈山澤而焚之奏庶鮮食且使民居髙種藝以給粒食又以升髙望逺規畫䟽導其後懷襄之患悉定則又定其髙山大川以為每州表鎮望祀之典焉此禹功之終也乂古者州域既廣國小而多地無定名凡禹貢所書山川皆因山以名其地非謂專導其山也此讀禹貢之凡例今表見於此云冀州冀為帝都故為九州之首不言所至春秋王者無外之義也九州豫為中帝畿實跨冀豫然自唐虞都冀天下遂指冀為中州如楚詞謂中州為冀州是也聲教自冀四逹則自冀以北所及固廣矣此異日并幽所以分也冀之為州三面皆河水患特甚盖河自崑崙東北流阻隂山一帶則折而南流為冀西河至華隂又折而東流為冀南河至大伾折而北流為冀東河自西河出孟門之上南河壅砥柱之西東河旋淤大陸之野此冀州水患所以為甚也而兖在冀東又為下流之衝故先冀而及兖自禹載壺口治梁岐闢龍門疏砥柱豬大陸而冀之患息播為九河使之北流釃為灉漯使之東殺通于淮泗使之甚則可以南泄於是兖之患平而青徐次第皆平矣冀州之境今之河東燕雲遼西河北四路皆是既載壺口載始事也壺口山名在今隰州吉鄉縣冀雍之交夾河而南皆山也壺口盖受河之口龍門則河南出之門也治梁及岐梁吕梁山也在今石州離石縣北吕不韋謂吕梁未闢河出孟門之上春秋梁山崩傳謂壅河三日不流水經注謂吕梁之山巖孱岫紆澗曲崖深巨石崇竦壁立千仞河流激盪震天動地盖大禹所闢以通河也孟門亦在石州今有孟門關岐狐岐山也在今汾州介休縣勝水所出統為西山古河逕之險阨治二山以廣河道也舊説雍之梁岐者非九州凡山之言治者或水道之衝有疏闢之功也或表山以該水士也言藝者剪其蓊鬰與民種藝也傳所謂以啟山林也言旅者祭之以為其州之鎮望記所謂民所瞻仰取材出雲為雨者也既脩太原至于岳陽修治也記曰禹能修鯀之功蔡氏謂因其舊而修之也太原在今太原府楡次縣鄭漁仲謂乃今平定軍按平定軍亦本以太原府廣陽樂平二縣置爾雅髙平曰原河東視天下最髙率多山險今太原府亦險阻但楡次與平定諸處為髙平爾嶽即太嶽今晉州霍邑縣霍泰山也山南曰陽今晉州岳陽縣也汾水出太原諸山經晉州蔡氏謂此條為治汾水而言然禹經理水土濬畎澮畫井疆物土宜凡事盖並手皆作不獨汾也覃懷底績至于衡漳覃大也懷地名太行為河北脊其山脊諸州皆山險至太行山盡頭地始平廣田皆腴美俗謂小江南古所謂覃懷也即今懷州其地亦有懷水入河衡漳即今漳河有兩源其一出今平定軍樂平縣少山者曰清漳其一出潞州長子縣發鳩山者曰濁漳沈存中謂凡二水合流而有文者皆名漳􅐱道元以濁漳為衡水以清漳東南流而濁漳横入之也按唐志冀州以衡水名縣而漳水在縣治之南一里洺州舊清漳名縣而其地有衡漳瀆則非二名也漳河本入河自河徙之後漳自至今滄州清池縣入海唐時有請以漳水傋四瀆者以其獨逹于海也禹治冀州載壺口治梁岐則冀之西河患息修太原至岳陽則冀之中郊甸治覃懷底績至衡漳則冀之東南水土平至於恒衛島夷則冀之東北皆可知矣此神禹治冀之次第也厥土惟白壤此辯地也白其色也無塊曰壞言其性也顔師古謂柔土曰壤周官大司徒辯十有二壤之名物而知其種以敎稼穡樹藝而草人又有糞種之法亦因其色性而名異𫝊所謂先王物土之宜而制其利者也先王辯地敎民不失其宜故五榖熟而民人育厥賦惟上上錯厥田惟中中賦者田所岀榖米兵車皆是也禹貢田賦上中下三分而三之中又三之為九等以人功之有多寡也其實則皆什一諸州先田而後賦以賦之出於田也冀州先賦而後曰以賦之不專出於田也冀為帝都地大人衆天子所自治鄉遂正軍羡卒必雄於外服粟米黍秸併與漆林雜物並征之亦不别立貢篚總其數之入為九州第一但聖人取民不盡其力又有時錯出於次等河東太行地勢全體皆石土載其上但壤性柔細故其地為九州第五恒衛既從大陸既作恒水名出恒嶽之北谷合于滱而入易衛出真定府靈壽縣古入河今合于滹沱古書謂舜分衛水以北為并州又按滹沱河出恒嶽諸谷而衛水與之合流恐恒衛既從即滹沱為是大陸爾雅在九藪之數今邢州鉅鹿猶有廣河澤唐杜佑李吉甫謂今邢趙㴱三州皆大陸之土按地説大河東北流過洚水千里至大陸為地腹盖古河本穿西山之麓以北流既出枯浲西山勢斷地勢平廣脊上諸水鍾匯於此為藪河水泛溢又盤洄其間是為大陸沈存中謂大陸皆濁泥所堙今為平土矣又按禹貢諸州山澤地水皆敘厥田之上貢篚包匭皆敘田賦之下末惟言入都水道耳冀為帝都不别出貢篚固矣而恒衛大陸復敘於田賦之下何也此非治水施功之例亦言入都水道因以見其成功爾盖冀為帝都而自平陽四逹甸服之外東北最逺又限以太行之脊其北境侯采則自恒衛入河其東偏則自大陸入河其東北島夷則自碣石入河也島夷皮服夾右碣石入于河島夷海島之夷冀東北邊之國如遼潼朝鮮之地不附庸于青而徑屬于冀者也其貢皮服爾雅所謂東北方之文皮者夾旁行也右碣石負海之山也碣石有二故有左右之名舊以右為太行山之右非也右碣石在平州石城縣南舊為大河入海之處今河徙海淪碣石去岸五百里矣其山頂踵皆石頂又有大石如柱世名天橋柱云其左碣石唐通典云在髙麗界中濟河惟兖州濟古文作泲兖州西北界河東南跨泲其時黄河北流泲入河而南溢以東又北東入海爾雅所謂泲河之間為兖州自周定王五年河決而東漢孝文時河決東郡武帝元光中繼決瓠子又決於館陶遂分為屯氏河元帝時大河分流而屯河塞其後又決於平原而下流與漯一王莽末河遂行漯川泲水亦不復南出後世代有河決之患其後遂行泲水故道則兖州之境土無非河患淪徙之地漢王横言往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸則兖州之境北已海淪西又河徙南則泲洑其川澤源委咸非其舊矣今河北東路大名開德恩博德濵棣滄永静京東之泲濮京西之滑小海以東距于營平皆故兖之地也九河既道河至大伾折而北流則兖當其東又地平曠無髙山之限而當河勢之衝禹於是播為九河以殺其勢爾雅所謂徒駭太史馬頰覆釡胡蘇簡潔鉤盤鬲津是也言地理者多謂徒駭即滹沱在今滄州之清池馬頰鉤盤在今德州之平昌胡蘇在今滄州之臨津覆釡在今瀛州之樂壽鬲津在今滄州之無棣簡即今大名之澗溝潔在今滄州之南皮按河自大伾北流過大陸以北方播為九而今於魏瀛德棣之間便求其故迹逺矣據王横所言大風海溢即今小海碣石古河入海之處在今海中五百餘里則九河之地淪為小海久矣況自河徙之後經流既息枝流尚可尋乎雷夏既澤今濮州雷澤縣西北雷夏陂東西二十里南北十五里計古雷夏必大於今灉沮會同晁氏曰爾雅水自河出為灉泲出為濋沮有楚音二水河泲之别也然則河遷泲洑則灉沮不可復尋矣説者以為濮耀二水古入雷澤一説灉即汳水張明謂禹開隂溝以通河泗許氏謂汳受隂溝至䝉為灉水東入于泗即汳也汳今作汴沮即今濉水首受滎澤過應天今入南清河古時黄河亦入此路但經稱㑹同古當合入泲後世導之入淮入泗爾桑土既蠶是降丘宅土兖土宜桑後世所謂桑間亦一證也今水平桑長而蠶事興矣兖土無山洪水則民居髙丘今土平而降丘宅土矣厥土黑墳墳謂土性起發也厥草惟繇厥木惟條九州土田連舉惟兖徐揚三州又入草木一條盖三州皆東方下流之地洪水泛濫草木不生至是始繇茂條長也厥田惟中下厥賦貞作十有三載乃同田第六賦第九貞字本下下字也古篆凡重字者或於上字下添二兖賦下下篆從下二或誤作正通為貞又篆文貞字作􅀢與下下相類因以致誤學者不知古文説多不通兖地平下被害特甚水患雖平而水道居多人民鮮少盖十有三年而治田興賦始同他州厥貢漆絲厥篚織文黑鹵之地宜漆桑土宜絲篚者幣帛之類以篚盛貢之織文者織絲成文也浮于濟漯逹于河此兖入都水道也泲入河而南出故浮泲可以逹河史記禹釃二渠引河其一漯也薛氏謂古漯自今開德府朝城縣受河而東入海故浮漯可以逹河西漢末河并行漯川其後河徙而漯亦不復存矣海岱惟青州青州於中國為正東故名從東方之色其地東北跨海西南距岱岱即泰山是名岱宗在今襲慶府奉符縣西北三十里其山特起東方為中國水口表鎮連延而生諸山北即原山汶出其西淄出其東東即䝉艾為沂水諸源又東濰山濰水所出西南即泗水所出青州之地即今青齊濟南淄濰登萊宻東跨海西髙麗北跨河西遼東但小海所淪則青之北境亦非全壤不獨兖州為然嵎夷既略首書嵎夷諸州無此例也但青州實跨海而有東夷兼堯命羲仲宅嵎夷以侯正東之景故特表於前或云即今登州之地略者經略之也濰淄其道濰出今宻州莒縣東北濰山至濰州昌邑入海淄出今淄州淄川縣東南原山今入北清河厥土白墳海濱廣斥濱古文作瀕青之土色白而性墳起其海瀕之地則廣大而斥鹵可煮為鹽故齊有魚鹽之利今登州千里長沙是其地厥田惟上下九州冀田第一青徐即次之後世所謂秦得百二齊得十二亦言其地利之饒非獨形勢也百二十二猶言百倍十倍厥賦中上田第三賦第四厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧鹽廣斥所出絺細葛布也海物非一種皆雜貢之岱畎泰山之谷其所出絲枲枲麻也鉛黑錫松泰山之名材怪石異石也如今萊之温石可為器今青州黑山紅絲石紅黄相參文如林木或如月暈如白峰如雲霞如花卉即古怪石也淄川梓桐山石門澗石色若青金紋如銅屑理極細宻亦竒石但不如紅絲石之堅凡此諸品皆可為器用今取以為硯萊夷萊山夷俗地宜畜牧亦取其畜以貢今萊州之東是其地厥篚檿絲檿山桑也其絲堅韌宜絃琴瑟故篚以貢之一説通上文謂萊夷貢檿絲蓋今萊人猶謂之山繭云浮于汶逹于濟汶水出今襲慶府萊蕪縣原山古入泲今入北清河兖州浮泲達河故青州止書達泲則達河可知海岱及淮惟徐州東至海北至岱南被淮今襲慶泗沂淮揚漣水海鄆宿西接單陳蔡潁之地淮沂其乂䝉羽其藝淮出今唐州桐栢山行千七百里至海州入海徐之水以沂名者非一其出兖州泗水縣尼丘山過魯城南入泗者曽㸃浴沂之沂也今海州沭陽縣有沂河口者周禮沂沭之沂也出沂州新泰縣艾山西南至淮陽下邳入泗者此沂為最大即禹貢之沂也䝉山在今沂州費縣羽山在今海州朐山縣藝種藝也淮沂之水既平則䝉羽之墟皆可種藝矣大野既豬東原底平大野即鉅野澤在今濟州鉅野縣唐鉅野屬鄆州石晉時混於梁山濼鄆今東平府即東原之地大野之水既豬則東原之地底平厥土赤埴墳草木漸包埴細而粘若今陶器之泥考工記摶埴老子埏埴是也漸包古文作蔪包厥田惟上中厥賦中中徐土粘埴而墳起故田視九州為第二當時生聚人工未及故賦第五厥貢惟土五色貢土五色用以立社逸周書曰建太社于國中其壝東青土南赤土西白土北驪土中央舋以黄土將建諸侯則鑿取其方面之土包以黄土苴以白茅以為侯社羽畎夏翟羽畎羽山之谷夏五色翟雉也左傳注南方曰翟雉古者車服旌旄以雉羽為飾羽山出夏翟山以此得名嶧陽孤桐嶧山在兖州鄒縣名鄒嶧山九域志以為嶧山在淮陽下邳所謂嶧陽者是山南曰陽孤桐者特生之桐也桐性虚特生於山陽則清虚特異貢之以為琴瑟後世難得則取凡桐之舊者為之謂桐不百年則木之生氣不盡木生氣盡而後能與天地隂陽之氣相應也泗濱浮磬泗水之濱浮生之石可以為磬如今硯石之取子石者蓋石根不著巖崖而自特生者故謂之浮今下邳猶有石磬山乃其遺跡又宿州亦有靈壁石但浮生者不可得耳淮夷蠙珠暨魚淮出唐州其百餘里内尚淺而多潭有蠙珠潭今其地凡十四潭而不復生珠矣魚即淮白魚若蠙珠玉磬古今風氣不同蓋不常有厥篚𤣥纎縞𤣥黑赤色沈括謂今深紫類皁者是古人以為上衣纎黑經白緯者縞素繒也記有虞氏縞衣而養老又古者祥而縞禫而纎浮于淮泗逹于河古文尚書作逹于菏説文引書亦作菏今俗本誤作河爾泗出兖州泗水縣陪尾山有四源故謂之泗菏澤與泲水相連而泗水上可以通菏下可以入淮徐州浮淮入泗自泗逹菏青州書逹于泲則逹河可知故徐州書逹于菏則達泲可知河泲泗淮在古必有相通之道禹所以殺河流使之可以南泄通南北使之可以朝貢灌輸後世河徙而南會于菏澤匯于鉅野分為南清河并行于泗以入淮蓋亦其故道也淮海惟揚州北至淮東南至海即今淮南江南東西二浙之地福建廣東亦屬焉彭蠡既豬陽鳥攸居彭蠡今鄱陽湖自洪宫亭受江西嶺北江東諸水在江饒南康興國之間至池州湖口入江漢志所謂湖漢九水者即是也禹豬彭蠡廢其旁地為蘆葦以傋浸淫故陽鳥居之陽鳥鴈也如漢築河隄去河各二十五里以防泛濫其後民頗居作其間故河水漲溢之時動成漂沒以此知神禹廢彭蠡之濱以居陽鳥其為民防患之意蓋深三江既入震澤底定震澤今太湖三江太湖之下三江入海者一説吳松江七十里分流為三入海中為松江東南為東江北為婁江吳越春秋所謂三江之口是也一説太湖之下元有三江吳松乃其一陳述古在浙西嘗尋故道開其一以泄白水之患蓋後世故道多湮雖松江尚存然亦淺故浙西歲有白水太湖謂之震澤者震動也今湖翻是也在今湖州烏程之北北入常州無錫晉陵東入蘇州吳江縣周回六百五十四里按舊三江之説不一其可據者二一説謂古名漢為北江江為中江則彭蠡之水為南江至揚雖已合為一然以其三水合流謂之三江猶洞庭九水俱匯謂之九江也范蠡所謂吳之與越三江環之民無所移謂俱在大江之南爾今通州福山鎮猶名三江渡是也然三江既以彭蠡為一則上文既出彭蠡不應下文又出三江且經文二既字對舉皆本效之辭彭蠡既豬矣則陽鳥攸居三江既入矣則震澤底定是三江者乃震澤下流之三江也北方之水河為大故凡水名皆以河為總稱南方之水江為大故凡水名皆以江為總稱然則三江之江不必疑為大江之江也今按揚州之境嶺至郴䖍北枝趨敷淺原水皆東流又自建嶺一枝轉而北趨介衢為歙嶺亘宣而抵建康其閻脊以西之水皆西流是俱匯為彭蠡其岡脊以東之水南則浙江北則震澤也彭蠡之水不豬則今江西江東諸州之水為揚西偏之患震澤之水不泄則今浙西諸州之水為揚東偏之患揚雖北邊淮而於徐已書乂雖中貫江而於荆已書朝宗獨大江之南西偏莫大於彭蠡東偏莫大於震澤二患既平則揚之土田皆治矣故特舉二湖以見揚之告成若其南偏率是山險浙亦山溪計不勞施功故餘不書也篠簜既敷厥草惟天厥木惟喬篠箭竹簜闊節竹也爾雅東南之美者有㑹稽之竹箭焉厥土惟塗泥厥田惟下下厥賦下上上錯揚江湖之區下流之地其土塗泥而其田反居第九古人尚黍稷田雜五種故雖水潦旱乾而各有所收塗泥之土其田獨宜稻不利他種故第為最下厥賦第七又有時雜出於七等之上則人功亦稍脩矣自唐以來則江淮之田號為天下最漕餉皆仰給於東南厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服三品金銀銅也瑶石之美似玉古有瑶爵今瑪瑙水晶壽山石皆可為杯器蓋瑶之類琨今崐山石是篠以為矢箭簜以為管儀禮簜在建鼓之間是也齒象齒革犀兕之皮羽翟雉毛旄牛尾古為揚貢今嶺海之間有之凡此皆為器服車甲旌旗繁纓之飾惟木惟與也木豫章之屬島夷海島之夷卉服草服也如今黄草蕉布之類厥篚織貝慱物續志曰閩中多木綿植之數千株採其華紡以為布名吉貝南史言林邑等國出吉貝木薛氏云織貝今木綿也或曰織貝即島夷所貢如今南海諸畨皆以木綿為服謂之撘布其細者則名吉貝厥包橘柚錫貢小曰橘大曰柚惟荆揚有之踰淮而北則為枳橘頌所謂受命不遷者也沈存中謂本草柚皮甘今所謂柚其皮極苦而橙皮甘古之柚蓋橙云錫貢錫命則貢聖人不常以口腹之味擾民也沿于江海逹于淮泗徐州已言淮泗逹菏故此但言逹于淮泗荆及衡陽惟荆州北抵荆山南跨衡山以南荆山在今襄陽府南漳縣衡山在今衡州之北九十里屬潭州湘潭縣荆州即今荆湖南北路北接京西西侵䕫峽南控廣西江漢朝宗于海蔡氏曰江漢合流于荆去海尚逺然水道已安下流無壅奔趨于海猶諸侯之朝宗于王也九江孔殷九江洞庭也孔殷甚得其中也朱子謂國初胡祕直近世晁詹事陳冠之皆以九江為洞庭按江海經亦云洞庭沅澧之水瀟湘之泉是為九江今按禹貢東至于澧過九江則是古者澧先入江而後九江入也澧當在九江數外今考朱子文集及漢史及江陵新志更定九江源委一曰瀟江出道州營道縣九疑山亦名營水過零陵下與湘江合二曰湘江出静江府興安縣陽海山東北名鏵觜東北至潭州入洞庭三日蒸江出衡州衡陽縣西㑹衡山諸源而下合于湘以其水氣特盛故名為蒸舊説不在九江之數朱子文集言九江云湖南有蒸湘之屬而記文亦云蒸湘之會今入于此四曰澬江出武岡軍唐糺山又名邵陵江亦名益陽江至益陽縣西北入洞庭五曰沅江出沅州西蠻界中至辰州與酉江合據西漢志則沅水出牂柯郡界故且蘭縣山東北流二千五百三十里至益陽入洞庭且蘭今屬播州是與牂柯江隔嶺而分者也六曰漸江出索縣東流與沅合七曰溆江出辰州溆浦縣鄜梁山西流與沅合八曰辰江出辰州西南蠻界中東流與酉合九曰酉江出會溪城西山中至辰州東合沅辰北流至鼎州東入洞庭此九江也但郴江亦一州之水其源出嶺至郴城下始勝舟又五十里與東江合而始大北入湘江舊皆不在九江之數但不知其與漸溆二水孰為大小今不敢更有升降已上九江㑹為洞庭計禹時九江入江㑹合未甚廣故未有洞庭之名其後會聚日廣方八百里而洞庭山遂在其中故因山得名云今所謂荆湖南北路自是而分沱潛既道爾雅江出為沱漢出為潛今江陵府松滋縣南枝江縣北江分三十餘所下流復合曰笊籬江公安縣有沱潛港此沱之證也潛出今江陵府潛江縣漢志謂華容有夏水首受江東入海説者以為潛水華容今監利縣北即潛江縣雲土夢作乂舊雲夢土作乂太宗得古本尚書改焉江北為雲左氏所謂濟江入于雲中沈存中鄭漁仲謂今監利玉沙景陵等處是江南為夢左氏所謂田于江南之夢沈鄭謂今公安石首建寧等處是然二氏之説皆在今江陵府之境但今德安府有雲夢縣而荆門之長林縣岳州之巴陵縣亦皆有雲夢司馬相如謂雲夢方八百里其所連亘固廣楚之藪澤不一後人既以雲夢兼稱故所在藪澤皆謂雲夢爾又按荆州之地中間卑濕江漢至此支分沮洳故藪澤為廣今枝分為沱潛者既道則其沮洳為雲者皆為平土為夢者皆可作乂矣厥土惟塗泥厥田惟下中厥賦上下荆揚之土皆塗泥性止宜稻故田為第八視揚稍髙爾今世謂江陵為魚稻之鄉其餘類此然而賦入第三以近中土人功脩也厥貢羽毛齒革惟金三品杶榦栝柏荆貢畧與揚同羽毛齒革所謂利盡南海也金次于揚而木加焉杶古文作杻爾雅杻一名檍郭璞謂材中車輞榦栝也材中弓弩之榦周官所謂荆之榦是也栝檜也揚止言木荆又傋言羣材礪砥砮丹礪砥石可用磨者粗曰礪細曰砥今郢石是也砮者石可以為矢鏃今思播有之周初肅慎氏貢楉矢石砮家語孔子嘗以對陳侯石砮之問蘇氏謂孔子不近取諸荆梁而逺取之肅慎則荆梁之不貢此久矣丹朱砂也今辰錦所出光明砂及溪洞老鵶井所出尤佳惟箘簵楛三邦底貢厥名箘簵竹也趙宣子所謂箘簵之勁楛其本堅小而直陸璣謂葉如荆而赤莖似蓍三物皆中矢笴三邦所貢又為名材三邦之名不傳考工記曰妢胡之笴鄭氏謂胡子之國在楚之旁者唐志零陵貢葛笴蓋此類云包匭菁茅菁茅一茅三脊管子謂出江淮之間召陵之師責楚貢包茅不入無以縮酒朱子謂古人醡酒不以絲帛而以編茅王室祭祀之酒則以菁茅取其至潔包者苴之匭者匣之也劉蕡謂辰州盧溪縣包茅山一茅三脊今屬麻陽縣然鄂州山上亦有之祥符東封取諸此厥篚𤣥纁璣組爾雅一染謂之縓再染謂之赬三染謂之纁考工記曰三入為纁一説謂六入為𤣥古人𤣥衣纁裳璣珠生於水類玉組辮絲以貫珠以為冠纓佩以貫玉帶以為紐約是三者皆冕服所需九江納錫大龜尺有二寸以上謂之大龜龜之神在甲故可以卜納錫神之也浮于江沱潛漢逾于洛至于南河荆之諸國或從江或從沱或從潛以入于漢自漢入丹河白水河即踰山路入洛逹于南河荆河惟豫州豫於九州為中土南跨漢而抵荆山北距南河即今東西南三京潁許汝亳陳曹孟鄭唐隨襄均鞏陜虢商鄧諸州之地伊洛瀍澗既入于河世傳禹闢伊闕今河南伊闕縣兩山相對如門闕伊流出其間北至洛陽縣南入洛洛出熊耳山在商州上洛縣今虢州盧氏縣河南永寧縣皆有熊耳山邵康節謂當以上洛者為是瀍水出今河南府河南縣榖城山至偃師縣入洛澗水出河南府澠池縣東北白石山至河南縣入洛洛至鞏入河滎波既豬滎波孔氏以為一水周官職方其川滎雒其浸波溠則二水也泲水入河而南出溢為滎今鄭州滎澤是其處爾雅水自洛出為波而山海經曰婁涿之山波水出其隂北流注于榖二説未知就是西漢末泲水不復南溢而滎涸漢明帝使王景即滎故瀆東注浚儀名浚儀渠導菏澤被孟諸菏澤在今曹州泲隂縣孟諸在今應天府虞城縣自菏澤至孟諸凡百四十里二水舊相通今菏澤自分南北清河近時大河亦被孟諸併行睢水矣厥土惟壤下土墳壚其上者無塊而柔其下者或膏而起或剛而疎如今轘轅之濘淖汜關之沙䧟皆所謂下土者厥田惟中上厥賦錯上中田第四賦第二雜出第一唐虞甸服跨河而南故豫之賦與冀相埒計皆上上冀言上上錯豫言錯上中特異文耳厥貢漆枲絺紵厥篚纎纊錫貢磬錯紵以為布纊綿也餘見上磬錯磬玉不可多琢以錯磨成錯鑄鐵為之今鑢是有用則錫命而貢浮于洛逹于河華陽黑水惟梁州東北距華山之陽西南扺黑水即今興元成都潼川䕫州四路及松外諸戎東西珥河諸蠻漢永昌唐姚州今大理之地岷嶓既藝岷山江源嶓冢漢源説見下文岷山之下沃野千里與漢中俱號天府之土江漢之源既滌則岷嶓之墟皆種藝矣沱潛既道沱自今永康軍導江縣大江分流入成都及彭蜀諸州至新津縣與大江復合此皆沃野灌注之利也水自漢出為潜然地志巴郡宕渠縣有潜水西南入江今渠州流江縣也又漢中安陽縣有潜谷水出西南北入漢今洋州真符縣也然此潜自指西漢水出秦州清水縣亦名嶓冢山東南流徑西和州南名犀牛江東合于嘉陵江以入江梁州不言江漢以岷嶓沱潜源流之治見之蔡䝉旅平蔡山在今雅州嚴道縣南諸葛武侯征南夢周公於此遂立周公廟因以周公名山䝉山在今雅州名山縣東謂之䝉頂山雲霧常蒙其頂上合下開沫水徑其中出為溷涯水沬即大渡河也旅祭也平謂蔡蒙之墟水土皆平也和夷厎績雅州嚴道以西地名和川即青衣水也夷人所居今為羈縻州有和良和都之名禹之治梁西則導江東則導漢而青衣大渡諸水又在岷山之南以東故禹於䝉山致平者為大渡河諸水於蔡山和夷致功者為青衣水諸源也青衣水與大渡河合至今嘉州南岸青衣山下入于岷江青衣蠶業氏之神也厥土青黎厥田惟下上厥賦下中三錯黎細而疎也梁土色青故生物易性疏故散而不實向聞吏牘謂成都土疏難以築城蓋此也田第七賦第八或七或九厥貢璆鐵銀鏤砮磬熊羆狐狸織皮梁州産鐵漢書蜀卓氏程氏皆以鐵冶富擬邦君銀白金鏤鋼鐵磬石磬漢於犍為水濱得古磬十六枚盖其土人所琢也熊羆狐狸四獸其皮可以為裘其毳可以織為金罽西傾因桓是來浮于潛逾于沔入于渭亂于河西傾雍州山在今洮州臨潭縣西一百八十里洮水出其北入河柦水出其東南今名白水江又一源名墊江出洮及其南疊州岷州宕昌諸處東南合嘉陵江以南入江嘉陵江者出大散關嘉陵谷西傾諸國雖𨽻雍牧而水道則於梁有桓水之可因梁州通都水道或自潛或自沔潛沔於渭無可通之道乃逾山而後可以入渭經當言入于沔逾于渭如上文逾于洛之例今本誤也盖潛即西漢水沔即褒水自江沂嘉陵江而上至大散關一至秦州天水則踰關可以入渭矣河水出京兆武功褒中南至褒城縣褒城鎮入漢斜水亦出武功而北入渭漢時人上言通漕謂褒絶水至斜間百餘里以車轉從斜下渭經自沔入渭不言斜者因大以見小也由渭入河絶流而渡曰亂黑水西河惟雍州西南距黑水東北距西河卽今永興秦鳯涇源環慶鄜坊麟府熙河等路及唐隴西西凉吐蕃吐谷渾疊宕丼肅𤓰沙等地弱水既西説見導水涇屬渭汭見下文導水涇水出原州百泉縣南流至京兆府髙陵縣入渭屬注也漆沮既從漆水今同州白水縣即漢志西洛水或云出西夏界中歴保安鄜同之境而入渭沮出今坊州昇平縣北子午嶺與漆水合至同州朝邑縣東南入渭灃水攸同灃水出今京兆府鄠縣終南山東北流入渭荆岐既旅終南惇物至于鳥䑕荆北條荆山在今耀州富平縣岐山在今鳯翔府岐山縣旅定其祭秩也終南在今京兆府南自西傾秦隴東亘雍南以至泰華故謂之終南惇物在武功鳥䑕即渭源説見下文三山不言所治皆即山以名其地自東而西舉其起止中間水土之平可見矣原隰厎績至于豬野原隰詩所謂度其隰原者在今邠州豬野在今涼州姑臧縣名休屠澤魏太武伐涼謂姑臧城東西門外湧泉合于城北其大如河其餘溝渠流入澤中其間乃無燥地澤草茂盛按水土如此此禹所以厎績也三危既宅三苗丕敘沙州燉煌縣東四十里有卑兩山一名化雨山有三峰甚髙人以為三危又宕昌羌即三苗之種其地有疊州山多重疊三危山有三重或在其地戎人凡山有三峰者便指以為三危故漢志西指化雨樊綽又指麗水之山但禹貢即山以名地而自唐以來地屬吐蕃難於考定聖人黜惡以逺為罰經理則不以逺為間故於三危之地亦安定之而三苖之在其地者亦知順序矣厥土惟黄壤厥田惟上上厥賦中下黄上之正色而又細柔故厥田為九州第一後世號關中為沃野謂之天府蓋以此也然就其間較之亦惟涇渭灃漆之區最為沃壤西邊近沙磧北邊山狄故禹於雍州自終南至鳥䑕則自東而西自原隰至豬野三危則自内而外賦出第六生聚盖不同也雍州之地至戰國秦漢富庶甲天下漢衰地力耗自唐漸復然不能及東南歴宋朝滋不及然雍冀之非古西以夏北以契丹也揚州厥田下下而賦下上自唐以來雖關中亦仰東南之粟至宋朝則軍國之需皆仰給於東南矣生聚之繁於此為盛古今地方風土其不同蓋有由矣厥貢惟球琳琅玕球玉可以為磬琳美玉琅玕青玉雍之西有崑崙之玉其類非一皆球琳也其東有藍田青玉蓋琅玕也浮于積石至于龍門西河㑹于渭汭渭為雍中巨流南則澧北則涇漆沮皆入之至西河為甚徑但自岍隴以西則皆浮于積石河而下至龍門之上其入于西河者至華隂㑹于渭汭則浮渭而下者至是㑹于河可知也朱子按潏水集云邢恕奏乞下熙河路造船五百隻於黄河順流載兵下㑹州以取興州熙河路漕臣李復奏黄河過㑹州入韋精山石峽險窄自上埀流直下髙數十尺船豈可過至西安州之東大河分六七道散流渭之南山逆流數十里方再合逆澑水淺灘不勝舟此聲若出必為夏人侮笑事遂寢朱子謂浮于積石至于龍門西河則古來河道固可通舟矣而復之言如此何也履祥按神禹導水濬川必有通道但天地人事每亦相因自三代之衰河源皆為戎狄不通朝貢至秦兼并而河源亦在長城之外漢武帝極力開拓僅得河南空無匈奴開朔方始得渠搜之地受休屠之降始得豬野之澤然自積石以下源委未盡得也則故道堙廢其來乆矣如蜀南大渡河自吐蕃界經雅州諸部落至黎州為南邊要害之地建隆三年平蜀以地圖來上太祖皇帝見大渡之南城寨勞逺以玉斧畫河為界曰此外吾不有也此後河流怱中陷五六十丈澎湃如瀑船筏不通名為噎口蠻人不復可以窺伺殆天設險以限戎蠻也又如自荆入蜀素號水險近四十年四川請於荆湖和糴運米入蜀舟人貫習三峽遂為安流以此推之李復所奏河道一則固恐出於吏民之託辭一則故道乆廢岸谷變遷亦恐非復禹迹之舊也織皮崑崙析支渠搜西戎即敘蘇氏謂此錯簡當在厥貢球琳琅玕之下然雍州西界黑水此諸國又在黒水之外故附於後以織皮冠之者此皆皮服之國貢織皮者也崑崙國名崑崙山旁小國也崑崙無定所而莊騷雜書皆云西王母所居為是則在今肅州酒泉郡南山石室玉堂珠璣鏤飾尚在事具晉書張駿傳太守馬岌所言是必古崑崙國也今西北别有崑崙都國去中國甚逺析支國名有折支河唐與吐蕃舊界也當在唐北庭金滿縣西漢書西域傳言輪臺以東捷枝渠犂捷枝即析支渠犂即渠搜與然漢武帝開朔方又自有渠搜縣為漢北極界今屬夏州西戎班孟堅謂即西域導岍及岐至于荆山逾于河壺口雷首至于太岳厎柱析城至于王屋大行恒山至于碣石入于海此以下導山也岍岐荆雍山也岍在今隴州吳山縣一名吳嶽山虞周之世疑以此為西嶽故又有嶽山之名汧水出其西而南入渭芮水出其北而東入涇岐荆説見雍州壺口而下九山冀山也禹於帝都所親治導故冀山為多壺口㤗嶽碣石説見冀州雷首在今河中府河東縣雷水出焉山臨大河北去蒲坂三十里底柱在今陜州陜縣三門鎮大河中流有石如柱世言禹鑿底柱為之三門至今為河流之險唐時又嘗鑿之不能殺其勢也然三門乂分天門地門人門惟地門不可過耳析城在今澤州陽城縣山峯四面如城王屋在今孟州西北王屋縣泲水出焉太行在今懷州之北連亘數州為河北脊以接恒嶽程子謂太行山千里片石衆山皆石上起峰爾恒山北嶽在今定州之北碣石一在平州之南一在髙麗界中至于碣石入于海一説謂恒碣之間諸水皆入于海亦通禹貢一篇經緯脉絡舉天下山川分載九州北南以緯之又合為導山導水西東以經之然後源委脉絡可指諸掌不爾則散而無統矣導岍而下鄭王諸儒分為三條四列條之説導岍而下北條西傾而下中條嶓冢以下而條也列之説導岍而下正隂列西傾而下次隂列嶓冢而下次陽列岷山而下正陽列列之説比條為宻然皆不離地脉之説就地脉之説論之則西傾嶓冢岷山三列猶可通導岍而下一列為不可通盖雍之西其山隴自南而北冀之諸山皆又自北而南今北條隂列所紀乃自西而東此其説之不可通者也言地理者謂太行西南跨大河與商􅉑秦楚諸山相接諸山總在山形之内則北條逾河之説固有此理然此亦天地全體之常形爾大抵禹貢所書多是即山以名其地故導山之説所以治水土也然隨山刋木禹功之始而經敘導山又在導水之前而其導山又必自西而下則聖人之規模次第槩可知矣盖其治水之初利在奠民擊鮮續食固是一時之急者然必自西而下者天下山川相為綱紀必且自西徂東窮源極委廣覧天下之形勢周知川源之險阻而後分畫賦功次第而舉故導山乃所以為導水計也自其大者言之導岍而下為河漆沮泲浲陸也西傾而下為渭涇澧也為洛為淮泗也嶓冡而下為漢沔潛三澨也自岷山而下為江沱九江彭蠡也自其細而言之則固多矣如導岍則汧汭可知及岐則杜漆可知至荆則合洛池瀕可知析城則汾綘可知太行則懷沁淇池國蕩諸水可知恒山則恒衛潞滋易桑乾可知至碣石則大小遼水可知導西傾則西黑北洮南桓可知朱圉鳥䑕至于泰華則西漢嘉陵褒斜灞滻可知熊耳外方則丹白波榖伊潁可知桐柏至于陪尾則汝渦濠泗沂可知導嶓冡至于荆山則漳沮潛夏可知岷山之陽則青衣大渡馬湖涪黔江可知至于衡山則九江諸源至于敷淺原則水之西入洞庭東㑹彭蠡者又皆不言可知矣凡此諸説禹盖兼舉竝行不可以一説斷也西傾朱圉鳥䑕至于泰華熊耳外方桐柏至于陪尾西傾至泰華雍山也西傾説見梁州一名嵹臺山謂之西傾則其西地勢反下而水皆西流入黑水矣自此而東則洮出其北白水江出其南朱外方圉山在今秦州伏羗縣一名白巖山泰華今華州熊耳桐柏豫山也熊耳見下文外方舊説嵩山非也嵩髙世名中嶽安得反謂外方又與江夏内方相為内外哉按今河南府伊陽縣伊闕鎮之西陸渾山據唐志一名方山盖古為外方春秋時秦晉遷陸渾之戎居此因名陸渾云其山固嵩髙之聯峰然謂為嵩髙則非爾桐柏見下文陪尾徐山也泗出陪尾在今襲慶府泗水縣桃虚西北舊説拘於地脉以陪尾即漢志横尾山在安州安陸縣今屬信陽軍導嶓冡至于荆山内方至于大别嶓冢説見梁州其形如冡荆山説見荆州漳水所出舊南入江近世導之東流入諸湖濼合潛江以通漢内方山漢志竟陵縣章山古文以為内方今荆門軍長林縣也大别山在今漢陽軍漢陽縣其形如鼈西有小别山漢水至此入江謂之沔口云岷山之陽至于衡山過九江至于敷淺原岷山梁州説見下文山南曰陽盖岷山一帶南出為大渡之源又包青衣以東馬湖江黔江諸源東出一枝為衡山其南行而東者為嶺包瀟湘之原而又一枝北向以至敷淺原故禹自衡山過洞庭而至敷淺原也敷古文作傅通典註江州潯陽縣有蒲塘驛前有敷淺原原西有傅陽山朱子親至其處謂廬山當其地而敷陽山乃在廬阜之西南則是敷淺原之陽也蓋廬山雖髙而其中原田連亘人民奠居所以有敷淺原之名後世匡俗結廬居之遂名廬阜而其支隴林麓猶存舊名爾導山而云過九江則導山即所以導水可知也導弱水至于合黎餘波入于流沙此以下導水蓋總敘水之原委泝源而及流即大以統細也弱水出吐谷渾界窮石山至丼州張掖縣合黎山下唐志言自合黎峽口西出即居延澤經云至于合黎餘波入于流沙則居延乃古合黎澤爾水溢則被流沙也雜書言西域使者乗毛車以渡弱淵豈非指此為弱淵與盖弱水散漫無力不能負芥投之則委靡墊溺及底而後止惟皮船可渡其間一渡名娑夷水廣盡一矢用藤為橋極費工力以水沙不可施柱故用藤橋也流沙通典謂在沙州西八十里其沙隨風流行大抵西北之地多是沙磧史書所謂河沙諸國佛書所謂沙界恒河沙是也沙則水滲而下如沙州以西山北之地即連流沙弱水滲其下山南之地即連蒲昌海西域二河潛其中王元章云山東孫氏子自少為兵嘗乘皮船以渡久之又船行至南詔蓋軍人不知典籍此非但渡弱水而西又循黑水而南矣又嘗問西域賈人識流沙否曰識之非惟沙流石亦隨之流也導黑水至于三危入于南海漢志黑水出張掖雞山南至燉煌過三危山張掖今丼州燉煌今沙州也按黑水出雍之西而南入于南海為雍梁二州之西界蓋出崑崙之南谷也自積石西傾岷山青衣岡脊以西諸水天竺以東諸水皆入之故黑水諸源亦非一唐樊綽云西夷之水南流而入于南海者凡四曰區江曰西珥河曰麗水曰彌渃江其曰麗水者古黑水也三危山峙其上程泰之以為麗水逺小其所謂西珥河却與漢志葉榆澤相貫廣處可二十里又漢滇池即葉楡之地漢武初開滇池其地有黑水祠乃蜀之正西北距宕昌不逺宕昌即三苖之種又與敘于三危者合履祥按二氏所考諸源非一其實則合而為瀘水沈存中謂夷人謂黒為盧則瀘水即黑水也蠻中固有西珥河亦有東珥河東西二珥皆因諸蠻而得名安知其不指正流為西珥也唐以漢永昌故地置姚州有西瀘蓋唐既以馬湖江為瀘故遂以姚州之瀘為西瀘而雲南之地又有瀘南懸諸葛孔明征南中五月渡瀘即此水也但兩漢志以瀘為温字從省誤後人失考爾故東漢志謂黑水祠為温水者即此瀘水也今按西南夷圖西珥河北合龍德河中合印鴻川南合導江川其印鴻川東過葉楡之水又東合流名西珥河過滇池則黑水祠在焉東南與麗水合而區江亦合于麗水者此皆黒水諸源也故黑水經過雲南但名瀘水至交趾又名歸化江廣如江漢合流處東南入海而海道圖自名黑水口在大理國東南大理即雲南也唐名南詔至宋名大理云導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過浲水至于大陸又北播為九河同為逆河入于海爾雅河出崑崙而説崑崙者多誕妄今不盡辯而説其總論積石在今積石軍其下蘭州臯蘭山石門黄河所出西南涵漫轉而東北流洮水北流入之又北而湟水㑹星海諸水入之其祁連山青海之水出浩亹東流合于湟水皆入焉皆崑崙北谷諸水也又北入北狄界中漸轉而東至唐受降城折而南流為冀西河大抵盤束山硤之間千數百里禹載壺口治梁岐皆為冀河已見冀州故此不書又南至河中府龍門縣之西山開岸闊自髙而下奔放傾㵼聲如萬雷是為龍門南至華州華山之隂渭水入焉水勢撞擊地名潼關折而東流為冀南河至陜州陜縣底柱壅河中流世傳禹鑿三門以通之又名三門山又東至今孟州孟津河流始緩南北通津謂之孟津東過今河南府鞏縣洛水入焉名為洛汭又東至澶州黎陽縣大伾山即今黎陽山也折而北流為冀東河至今冀之信都洚水入焉今名枯洚河是也又北至大陸説見冀州又北播為九河説見兖州逆河之得名以潮至而水逆流也漢志作迎河謂迎接九河也亦通古河入海之地蓋在右碣石自周定王五年河始徙蓋自禹以前河決而北故禹播九釃漯以東殺之至漢河決而東故幷行於漯而泲亦為河所并至宋則河決而南矣蓋古河北流既久濁流舊淤土膏日息則地形反髙故河不復北趨漸次東決至五代晉漢時河遶梁山以東北入海至紹熙甲寅南連大野幷行泗水以入于淮於是有南北清河之分北清河即泲水故道南清河并泗水入淮今淮安之西二十里對岸清河口是也今梁山又塞而黄河遂西浸睢陽之境此古今之變也嶓冡導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海嶓冡説見梁州漢水初出舊名為漾至漢中為漢又一源名沔水故世以漢沔通稱然據書意則沔蓋褒水也又東為滄浪之水今均州武當之北四十里名滄浪洲三澨即汊河其一源名三家河其一源名三里河西河流至鄧州東南合白河清水河入漢是名三澨也又東南至今漢陽軍大别山而南入江是名沔口自嶓冢至此凡二千四百二十里東匯澤為彭蠡朱子以為多句東為北江入于海鄭漁仲以為羡文意禹治水之時與今不同方江漢未奠今江西諸水壅遏不通匯而為湖雖非江漢所匯而勢實匯之史官追記固易差失而古書多是隐見互見若先敘江而匯澤在江條之内似無甚失惟先敘漢以及彭蠡而後敘江如此互見則首尾横決反為失之中江北江想當時方言如此以識江漢合流之别彭蠡淺源而與江漢竝列為北中南此恐亦當時東西之方言爾岷山導江東别為沱又東至于澧過九江至于東陵東迤北㑹于匯東為中江入于海江出岷山岷山數百峰大酉山為最大雪山三峰闖其後冬夏如爛銀山一谷名鐵豹嶺者有西嶽廟廟下名羊膊石江水正源也其西南分一源又為大渡河矣江至永康軍導江縣諸源既盛遂分為沱東至眉州彭山縣復合于江江南受青衣大渡馬湖江北受嘉陵江又南受黔江出三峽而後東至于澧不書諸水以梁州蔡䝉和夷潛沔皆互見而三峽天險非入都通道計不施工故不書東至于澧過九江則禹時澧自入江而九江始入今則澧與九江俱匯為洞庭而併入江矣故説者遂以澧亦在九江之數非也詳見荆州至于東陵今岳州巴陵也東迤北㑹于匯當作㑹于漢盖江勢迤北處正受漢口若至彭蠡則東流久矣匯字必因上文而誤也禹於導江之功在荆為多葢荆地卑濕沮洳江漢朝宗則揚自彭蠡而下不復致力矣導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海泲出王屋在今孟州王屋縣西北始發源山頂崖下曰沇水既見而伏東出於泲源縣湧為二源東源周㢠廻七百歩其深不測西源周㢠廻六百八十五歩其深一丈合流至温縣是為泲水至懐州武德縣入河伏而南出溢為榮澤東出于陶丘北則今曹州濟隂縣又東至于菏説見豫州又東北㑹于汶在今東平府中都縣又北東入于海今青州北海也泲水性沈勁太行為河北脊其西水皆西流其東水皆東流泲出王屋本太行脊西之山而伏流以東南出及既入河叉伏横而南出至王莽末泲入河不復南出而河南無泲瀆滎自受河為浚儀渠然泲則未嘗不伏流地中今阿井煮膠為性鎮墜能清濁水吳興陳氏謂今歴下凡發地皆水蓋皆泲水過其下也導淮自桐柏東㑹于泗沂東入于海地理並見前章淮出桐柏初甚湧復潛流三十里然後東馳亦尚淺其深處為十四潭至幷汝潁始大東㑹泗沂説見徐州今水之入淮者不獨沂泗汝潁渦禹時不費治導故不書豫之沮隋唐之汴今之黄河皆入淮矣自桐柏至海凡千七百里導渭自鳥䑕同穴東㑹于灃又東㑹于涇又東過漆沮入于河鳥䑕山見雍州爾雅其鳥為鵌其䑕為鼵穴地三四尺䑕在内鳥在外孔氏書傳共為雌雄張氏地理記不為牝牡乂其山一名青雀山渭自鳥䑕至入河一千八百七十里導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河説見豫州北方諸水雖大河亦氷惟洛水不冰所以謂之温洛一是天地之中二是其北連山以障北風三則前人謂其中有礬石東漢都洛陽以漢運火德故去水加佳為雒後世仍從水名九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同此總結平治之功也九州攸同者言九州之内經理無間也四隩既宅者言九州之外四海之限亦已安居也刋者去蓊鬰驅猛獸興種藝也旅者定祭秩立表鎮也九川凡九州之川不曰通流而曰滌源者此所謂濬畎澮距川則田里無水潦壅塞之患也陂者九州之澤有陂障無潰決也四海㑹同凡水皆㑹同于海各得所歸無復横流也六府孔脩庶土交正厎慎財賦咸則三壤成賦中邦此總敘貢賦之典也府官府也六府水火金木土榖之府也水土既平故六者之利無不興而六者之官無不舉也庶土交正厎慎財賦此土賦也咸則三壤成賦中邦此田賦也庶土謂凡山澤丘陵墳衍原隰之土交皆也謂皆物其土地之所宜以任土事也厎定慎謹也謂定庶土之所出謹財賦之所入則任民所宜貢土所冇不强其無不盡其有也則等其土田為上中下而各定其什一之賦也中邦中國也古者田之可井者則整齊經理謂之中國其田不可井者則隘塞之地疆以戎索故有九州内之夷狄蔡氏曰土賦或及於四夷田賦則止於中國也錫土姓祇台德先不距朕行水土既平田制既定於是脩封建之法各使守之錫土者賞其功勞定其限制也錫姓者表其勲德輯其分族也封建之來固乆經洪水之患則限制多不明有水上之功則庸勞所宜賞此所以修封建之制也當時堯舜在上封建雖非禹所專而實出禹所畫所謂弼成五服者此章以下是也台朕指禹也如春秋我魯也禹既任天下之事則率屬倡牧儀刑百辟者固其職此所以祇敬我德以為率先而其所行諸侯自無所違距也周公謂作周孚先是也五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米此節以下大約言逺近征役朝貢疆理之宜也服事也皆所以供王事也五百里甸服自都城以外四靣各廣五百里商周所謂王畿千里者也甸田也千里之内天子所自治是為天子之田而畿内百姓所供事也賦納總者其賦則禾連槀束之以納也禾以為糧槀以茨屋以飼國馬以為薪芻凡雜用也銍者刈其穗也若今刈粟刈黍者惟刈取其穗也其工省於總矣秸槀也服役事也謂輸將之事也有殻曰粟無殻曰米總納繁重故惟百里之内納之若二百里則去總而納銍四百里逺則簡銍而納粟五百里又逺則去殻而納米近者重而逺者輕重者粗而輕者精賦皆什一力則以逺近為輕重爾古人九數有粟米均輸二法盖本於此然獨三百里之民納槀而不粟視他處為甚輕而有服役之事焉服役獨在三百里者盖酌五百里之中為轉輸粟米之賦也史記謂古之善賈者百里不販樵千里不販糶以其逺而重也然則聖人賦民必不使之四百里而負粟五百里而負米矣故制為田賦自百里而止於二百里焉乃若四百里粟五百里米不言賦納蓋不逺納於帝都亦行百里或二百里而使三百里之民轉而輸之於都爾夫二百里之民受逺郊之米粟而為轉輸力若勞而賦則省又以見古者賦役不兩重此帝王之良法而後世之所可行者也五百里侯服百里采二百里男邦三百里諸侯甸服之外四靣各五百里為諸侯之服侯維也所以維衛天子也一曰侯后也為民羣后也采朝廷公卿大夫元士食采之邑也甸服千里固不以封而凡公卿大夫之食邑亦取於侯服則千里之畿天子專之後世不然故天子之地浸弱男邦小國也諸侯大國也内小國則弱有所依外大國則内無所逼而外足以禦蔡氏曰甸服分為五等侯服分為三等外諸服分各二等五百里綏服三百里揆文敎二百里奮武衛侯服之外四靣各五百里為綏服綏安也内則侯甸外則要荒而綏服當其中故取綏安之義内三百里揆文敎所以接華夏之敎以撫要荒外二百里奮武衛所以禦要荒之蠻以安華夏優文儉武又有深意然内三百里揆文敎則自此以外凡有國者文敎可知外二百里奮武衛則自此以外凡有國者武傋可知五百里要服三百里夷二百里蔡綏服之外四靣各五百里為要服要如裳之有要也所以綱統四裔也舊説要約也其地逺於畿甸雜於夷狄雖州牧侯伯為之綱領控制而其文法則畧於中國矣又於其中分三百里為夷二百里為蔡夷者易也取簡易之意蔡者放也如蔡蔡叔之蔡有罪者則蔡放於此焉五百里荒服三百里蠻二百里流要服之外四靣各五百里為荒服此為四逺蠻夷之地田野不井人民不多故謂之荒所以經畧之者又簡於要服矣其中三百里謂之蠻因其俗也二百里謂之流則有罪者流徙於此如流其工于幽州是也蔡流皆放逐罪人之地罪有輕重故地有逺近云右五服二靣各二千五百里四靣相距方五千里雖幅員二萬里而夷蠻又在其中聖人不務廣地如此然此亦大約限制以為朝貢之節詳畧之宜耳每服之中又自分為二三節此周制九服之所由起也東漸于海西被于流沙朔南暨聲敎訖于四海漸如漸民以仁之漸被如被四表之被此統言聲敎之達也聲如樹之風聲之聲敎則上行下效之謂禹迹所至不惟治水土而已其聲律身度觀民設敎本末備舉東漸于海則敎化漸淪于海西被于流沙則敎化冐覆于流沙至於北雖止於恒碣南雖止於衡陽而南北地長聲敎旁逹不可為限故南北不言所至總而言之其敎化則盡於四海矣聖人為後世訃雖立為五服之限而敎化所及感慕無外故外薄四海咸建五長以經理之焉禹錫𤣥圭告厥成功此告成也錫如師錫之錫𤣥水色也禹既平水土故以𤣥圭為贄入覲而告成于帝焉一説禹治水獲𤣥玉之瑞故謂之錫禹不自居以歸之帝而告成功焉履祥按禹貢一篇盖夏史之追書也夫既夏史之追書則紀成功之書爾夫既紀成功之書則禹之治水其先後次第規模不盡見於此而於此可以推見爾何者禹貢於九州獨冀州載脩治之辭於上餘州則皆曰某山既藝既旅某水既道既從某澤既豬底定是皆記其成功耳其先後次第不盡見於此矣而謂於此可以推見何也曰禹貢一篇分敘九州以經之總敘山川以緯之每州之下奠山川豬藪澤而後繼之以物土宜定田制又繼之以經賦法通朝貢其總敘於後則列山川敘源委總成功定封建别限制同敎化是禹八年之間其先後次第經理規模廣大周宻本末備具蓋可想也而其先後次第則證諸禹所自言者而尤可見禹曰洪水滔天懐山㐮陵予乘四載隨蛇山刊木暨益奏庶鮮食此禹功之始也孟子所謂龍禽獸之害烈山澤而焚之者也此禹貢分敘所以先於導山是也禹曰予決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食此禹功之中也孔子所謂盡力乎溝洫者也此禹貢分敘所以定川澤辯厥土等田制總敘所以有導川則壤成賦甸服等事也蓋禹之治水不但疏決河患鑿阻濬川而已凡天下平土皆制其井畆疏為溝澮以達于川所謂畎澮者即田間之畎一同之澮也所謂溝洫者即一井之溝一成之洫也則是井田之制自禹定之此禹中間功庸最為周宻至於所謂懋遷有無萬邦作乂所謂弼成五服至于五千外薄四海咸建五長則禹功之終也分敘之浮于某水達於某水總序之六府孔脩庶土交正迄于四海皆是也或曰書曰洪水滔天既曰滔天矣則禹之治水若何用功耶曰滔天云者當時方言形容其勢耳愚昔聞之家庭曰洪水滔天即如後世滛雨大水河決之災但堯末年連歲有此然彭蠡諸水而指為漢匯此則尤有可疑者予已釋而辯之矣抑蓋有天地自然之變者如河徙而南泲涸而洑而冀兖青豫徐之支流水澤皆易其源委甚至九河淪而為小海碣石陷而在海中此尤其變之大者也大扺天地之間山陵水石自有消長顧其消長之數甚長而人之年壽有限則不及見其消長遂以為古今有定形爾山與土石且有消長而况水乎昔沈存中奉使河北邊太行而北山崖之間往往銜螺蚌之殻及石子横亘石壁如帶謂必昔之海濵今東距海已千里以愚觀之此即昔之河濵也所謂自東河至東海千里而遥者也夫以昔之河濵而今在山崖石壁之間即河日遷山日長石日凝蓋可知也此皆天地之間今人尚可考見之理其類非一而人鮮不謂迂者朝菌不知晦朔夏蟲不可語冰其斯之謂矣然則禹貢地理古今之不同又安知其非天地之變遷消長若河碣之比耶或曰條列之説如之何曰予嘗疏於前矣王鄭分每章為條每叚為列可爾若指為山勢其之脉絡恐未然也夫天地常形固相為句連貫通然條理亦各有脉絡若以脉絡之可見者言之崑崙四埀而為海天下諸山皆起於崑崙而崑崙無定名地之最髙山之所聚江河諸源之所出即崑崙爾崑崙之山綿亘紏繆句連盤錯其南為岷山而岷山最大其東北為積石諸峯其東為西傾朱圉鳥鼠諸峯其西北諸山尤為綿亘紛錯河之所以北弱水之所以西黑水之所以南皆是也惟江河渭漢行乎中國自崑崙而東北言之則自積石而北為湟水星海青海以至浩亹皆河源也入匈奴以東為隂山又東南自代北雲朔分而南趨為北嶽以至太行是為河北之脊壺口雷首泰嶽析城王屋皆其羣峯河之折而南汾晉諸水之所以西入河涿易寇漳恒衛之所以東入海也分而東趨者行幽燕之北為五關之險以至營平而為碣石此北絡也自崑崙以東言之則東為西傾而洮水出其北入河恒水出其南入江又東為朱圉鳥鼠諸隴則為渭之源自渭源以北即夾河源而北以東若岍岐若荆山諸峯涇水漆沮諸源也自渭以南即西傾而下諸峯亘為終南屹為泰華東北為殽陜東南為熊耳外方嵩髙伊洛之源又南為桐柏淮源以逹于淮西諸山此中絡也又自西傾朱圉而南分是為嶓冢漢源夾漢而趨者北則終南華熊諸隴南則蜀束諸峯説者謂蜀東諸山皆嶓冢正謂其岡岫綿亘爾又東則為荆山内方此中絡之次也自崑崙之東南言之是為岷山江源夾江而東者北支即西傾以南嶓冡以西之脉為桓水西漢水嘉陵江諸源其南支即南趨為䝉蔡諸山青衣大渡馬湖江諸源又東包涪黔一盤而北為三峽其東出者包絡九江之源中盤中為衡山其再盤而北為廬阜其嶺之東出者又為袁吉章貢盱信諸江之源至分水魚梁嶺三盤而北趨過新安峙天目盡昇潤凡再盤之間其水聚為洞庭三盤之間其水聚為彭蠡三盤以東則南為閩浙北為震澤此南絡也惟泰山則特起東方横亘左右以障中原此所以為異與大抵水者山之液故山盤而水之源出焉此所以聚為川流之盛地道以句連為固故山東而水之流壅焉此所以資於疏闢之功凡此其大約云爾或曰古今天下廣狹一也禹貢五服四距五千里而周制九服自王畿以外每方自為五千里何也或謂尺有長短則周尺不應半禹之尺或謂禹五服之外外薄四海不在其數周則盡外薄所至而經畫之此説為近然亦不應外薄之地與五服之地相半也攷之經文甸服方千里而曰五百里則凡所謂五百里者舉一靣計之也若周官則曰規方千里曰王畿又其外方五百里曰某服則舉兩靣通計之也是則禹貢所謂五百里甸服者乃千里而周官所謂外方五百里者乃二百五十里也至漢地志又言東西九千餘里南北一萬三千餘里則漢東西視禹貢幾一倍南北視禹貢幾二倍然攷其所載山川乂不盡出禹迹之外何也古者聖人制數周宻其制方田之數以御田疇廣狹制句股之數以御逺近髙深方田之制行則自井畝徑遂之直積而為道路川澮截然直方無有迂曲故中邦之地雖廣而里數則徑自秦漢開阡陌於是道里始迂逺矣此古今里數多少之不同一也周髀之經曰數之法始出於圓方圓出於方方出於矩矩出於九九故折矩以為句句廣三股脩四徑隅五禹之所以治天下者此矩之所由生也是則句股算法自禹制之蓋積矩以為方田而句股以測髙下淺湥逺近此禹之所以疆理天下而弼成五服者也句股之數宻則於山川迂囘之處與道理曲折之間以句股之多計弦之直而得逺近之實大率句三股四弦直五以正五斜七取之自秦漢以來誇多務廣固盡外薄之逺其計道理又但以人迹為數不復論句股弦直故漢之九千里大約準古六千五百里漢三千里準古一千九百七十一里而尺歩長短之異制又不在此數此古今里數多少之不同二也至於禹貢外薄之地在五服之外而後世斥候所到盡在里數之内此其多少之不同又不在言者或者又曰冀在九州為北堯都冀州則自甸服之外北短南長五服之地北無所展而南有所棄則如之何曰隆古都冀政敎四逹則冀北之野生聚敎訓必不如後世之為窮漠所以冀賦為九州第一而水平之後分為幽并其廣可知兼堯都平陽雖曰在冀自平陽以南渡河至陜於今地理三百七十五里正五斜七於古蓋二百六十餘里耳則是甸服之地自跨冀豫冀山而豫平𬗟想當時甸服之地當亦如周室王畿之制蓋成周之制雖云規方千里以為王畿然西自邠岐豐鎬為方八百里東則洛陽四達方六百里總為千里爾五服之制其間截長補短計亦如此何則周都豐鎬西至犬戎約餘千里而犬戎之地自為荒服先王之制賓服者享荒服者王自穆王以犬戎地近責其從賔服之享自是荒服者不至則是五服之制計古亦有因地而為長短者盖諸侯之分特以為朝貢之限制亦有在近而視逺雖逺而視近者大率地有廣狹俗有夷夏未必四靣截然如此正方聖人立為限制之經於中固必有通變之義讀書者不可拘於一説而不知聖人體用之大也甲子八十有一載肇十有二州以時考之并用大紀甲子紀例肇十有二州封十有二山濬川禹貢九州奠髙山大川此分為十二州故又分表其山及通朝貢水道吳氏曰此節在禹治水之後其次敘不當在四罪之前盖史官泛記舜所行之大事初不計前後之序是也九州之來舊矣而冀為其北自陶唐都冀其聲名文敎自冀四逹冀之北土所及固廣矣及水上既平人民加聚於是分冀州自衛水以北為并州醫無閭之地為幽州碣石以東接青州之北為營州是為十有二州焉考詩書傳記所紀其後復為九州蓋九州為正而幽并營不過分統青冀之故地是以殷之制合并為幽合青為營分梁以入于雍荆周之制合梁為雍合徐為青而并與幽冀復三焉略見爾雅詳見職方氏所記職方幽州其山鎮曰醫無閭其川河泲并州其山鎮曰恒山其川滹沱嘔夷然則營州其山碣石其川遼水與吳越春秋曰堯號禹曰伯禹盖封之為侯伯也官曰司空總掌天下水土賜姓姒氏領統州伯以廵十二部吳越春秋敘禹治水成功而後廵十二部則分十二州在此時可知封伯禹於有夏封四岳於有呂國語太子晉曰伯禹念前之非度釐改制量象物天地比類百則儀之于民而度之于羣生共之從孫四岳佐之髙髙下下疏川道滯鍾水豐物封崇九山決汨九川陂障九澤豐殖九藪汨越九原宅居九隩合通四海莫非嘉績克厭帝心賜姓曰姒氏曰有夏謂其能以嘉祉殷富生物也胙四岳國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐民人也加賜伯益史記秦紀曰帝顓頊之苗裔孫曰女脩生子大業大業取少典之子曰女華生大費與禹平水土已成禹曰非予能成亦大費為輔帝曰咨爾費賛禹功其賜爾皁斿爾後嗣將大出乃妻之姚姓之玉女佐舜調馴鳥獸鳥獸多馴服是為柏翳即伯益也柏亦作伯舜賜姓嬴氏不言封國舊必已有封國此命為侯伯賜姓以榮之爾索隠曰此秦趙之祖一名柏翳尚書謂之益世本漢書謂之伯益是也尋檢史記上下諸文柏翳與伯益是一人不疑而陳杞世家即敘伯翳與伯益為二未知太史公疑而未決耶而亦謬誤也履祥按伯益即柏翳也秦聲以入為去故謂益為翳也字有四聲古多轉用如益之為翳契去聲之為禼入聲臯之為咎音告君牙之為君雅是也此古聲之通用也有同音而異文者如陶之為繇埀之為倕鯀之為鮌虺之為儡紂之為受冏之為是也此古字之通用也太史公見書孟子之言益也則五帝本紀言益見秦記之為翳也則秦本紀從翳盖疑而未决也疑而未決故於陳杞世家之末又言垂益䕫龍不知所封則遂謬矣胡不合二書而思之乎夫秦記不燒太史所據以紀秦者也秦紀所謂佐禹治水豈非書所謂隨山刋木暨益奏庶鮮食者乎所謂馴服鳥獸豈非書所謂益作朕虞若予上下鳥獸者乎其事同其聲同而獨以二書字異乃析一人而二之可謂誤矣唐虞功臣獨四岳不名耳而姜姓則見於書傳甚明也其餘未有無名者夫豈别有柏翳其功如此而反不見於書又豈有馴服鳥獸者孰加於伯益雖朱虎熊羆亦以類見果又伯翳才績如此而書反不及乎夫以柏翳不得為伯益則禼不得為契咎繇不得為臯陶倕不得為垂鮌不得為鯀他如仲儡不得為仲虺紂不得為受不得為冏君雅不得為君牙乎史記本紀世家及總敘之謬如此者多不惟敘益為然也重黎二人而合為一則楚有二祖也四岳為齊世家之祖而總敘齊又伯夷之後則齊又二祖也此其前後必出於談遷二手矣故其乖刺如此而羅氏路史因之真以益翳為二人又以柏翳為臯陶之子則嬴郾李三姓無辯矣且楚人滅六之時秦方盛於西徐延於東趙基於晉使柏翳果臯陶之子臧文仲安得云臯陶不祀乎又以益為髙陽氏之才子隤敳至夏啓時則二百有餘歲矣夫堯老而舜攝舜耄期而薦禹豈有禹且老而薦二百歳之益以為身後之計乎其非事實不可以不辯封契於商商頌長發之詩曰濬哲維商長發其祥洪水芒芒禹敷下土方集傳曰絶句楚辭天問禹降省下土方盖用此語外大國是疆幅員既長有娀方將帝立子生商集傳曰方四方也外大國逺諸侯也有娀契之母家也将大也言商世世有濬哲之君其受命之祥發見也久矣方禹治水以外大國為中國之境幅員廣大之時有娀氏始大故帝立其女之子而造商室也盖契於時始為舜司徒掌布五敎于四方而商之受命實基於此履祥謂帝立子生商子女也生猶甥也謂帝立有娀氏女所生者為商盖其時帝舜封契於商也史記本紀曰簡狄有娀氏女為帝嚳次妃三人行浴見𤣥鳥墮其卵簡狄吞之因孕生契契長而佐禹治水有功帝舜乃命契為司徒封於商賜姓子氏索隠曰契生堯代舜始舉之必非嚳子以其父微故不著名其母有娀氏女與宗婦三人浴于川則非帝嚳次妃明也老泉蘇氏曰史記載簡狄行浴見燕墮卵取而吞之因生契為商始祖神竒妖濫不亦甚乎使聖人而有異於衆庶也天地必將儲隂陽之和積元氣之英以生又焉用此微禽之卵哉燕墮卵於前取而吞之簡狄其䘮心乎史遷之意必以詩有天命鳦鳥降而生商而言之此遷求詩之過也毛公之傳詩也以鳦降為祀郊禖之候及鄭之箋而後有吞踐之事遷之説出於疑詩而鄭之説又出於從遷矣甚矣遷之以不祥誣聖人也履祥按史記自謂以頌次契之事然不得頌之意𤣥鳥之頌曰天命𤣥鳥降而生商盖古人以𤣥鳥至之日祠于髙禖以祈子也簡狄以是日祈焉而孕故詩述其感生之祥史以行浴墮卵之事附之幾於罔矣長發之頌禘祫之詩也推其祖之所自出者不過敘禹敷土之時有娀外氏之盛而契始受封有國是開有商一代之基亦未見其為嚳子也豈以太史克有髙辛氏才子之言傳者有殷人禘嚳之説遂繫之嚳與然以頌次之則史傳之言為不可信矣其後十四世而湯有天下祖契始封之君追王𤣥王云封棄於邰稷之受封詩書不載所始但禹之治水暨益暨稷而後賢毎以禹稷竝稱當是之時禹以成功受封契亦以禹功之成始封益又以佐禹之功加命則稷之封在此時無疑也今附于禹功之後甲子之紀焉生民之詩曰厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷姜嫄炎帝後有邰氏女姜姓嫄名禋祀者髙禖之祭也禖即先媒盖上古始為婚姻者後世祀之未嫁者祈婚未育者祈子帝武巨人跡也姜嫄見地有巨人之跡履之而敏然歆歆若人道之感焉於是即其攸介攸止之處而震動夙肅震書作娠震肅即孕也由是有娠而生后稷也魯頌亦云上帝是依謂天之神馮依姜嫄之身彌月而生后稷也誕彌厥月先生如逹不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子彌月滿十月也達詩傳他逹反小羊也羊子易生愚謂達如字亦通先生如達不坼不副無菑無害以赫厥靈詩人異之也異之者神之也上帝不寧不康禋祀居然生子姜嫄疑之也疑之者恥之也恥之故棄之誕置之隘巷牛羊腓字之誕置之平林㑹伐平林誕置之寒冰鳥覆翼之鳥乃去矣后稷呱矣實覃實訂厥聲載路不夫而育疑而棄之其異如此神而收之誕實匍匐克岐克嶷以就口食蓺之荏菽荏菽斾斾禾役穟穟麻麥幪幪𤓰瓞唪唪蓺種也荏菽大豆也役列也麻子可食皮可績為衣麥麥牟也𤓰瓞以為茹也稷自幼已能辯物惟知種植其天性然也誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實頴實栗即有邰家室后稷之穡凡上章荏菽禾麥𤓰瓞之類但后稷所種歛則各有助其成實之道蓋知其性及其漬種之法與地之宜天之時故實有以方苞種褎發秀堅好頴栗之也至下章秬秠糜芭則又自后稷而始知種之爾堯以棄敎民稼穡冇功生人故封之乂以其母感化而育不由有父故使其繼母氏之國胙之土而命之氏也邰又作􅘭在京兆武功縣元和志曰邰在渭水之南漢渭縣是也縣西二十里有􅘭城有后稷祠姜嫄祠史記取詩紀稷而不實今止取詩為證不及下文史記曰初欲棄之因名曰棄及為成人遂好耕農相地之宜宜穀者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功封棄於邰號曰后稷别姓姬氏路史曰稷字度展鄭石癸曰姞吉人也后稷之元妃也履祥按史記姜嫄帝嚳元妃蘇氏古史因之遂以后稷為帝嚳之子嫄果元妃何嫌於不夫而棄其子稷果嚳元妃之子何為舍嫡不立而别立堯周郊太祖何為祖稷而不祖嚳周杞姜嫄何為舍祖而獨祀妣命禹治水之時堯之年已七十有餘矣而禹猶暨稷嚳之遺嫡何其少堯之嫡兄弟何其賢勞也堯有嫡兄弟不能立又不能舉待舜而後舉之則堯何足以為堯乎鄭康成知史記之説為不通則謂姜嫄當堯之時為髙辛氏世妃盖其世胄之妃也二王之後得用天子之禮故有郊禖弓韣之禮焉其説固足以濟史記之不通矣抑以世胄之妃生子又何嫌疑而棄之哉然則嫄稷母子果何若人耶曰證諸詩而已矣生民之詩謂姜嫄履帝武而敏歆閟宮之詩謂上帝依姜嫄而生稷則固不必捨二詩而他考也朱子曰巨跡之説先儒或頗疑之而張子曰天地之始固未嘗先有人也則人固有化而生者矣蓋天地之氣生之也而蘇氏亦曰凡物之異於常物者其取天地之氣常多故其生也特異物固有然者矣神人之生而有以異於人何足怪哉故今以詩為斷不復上附於嚳焉又按易大傳曰神農氏作斵木為耜揉木為耒以敎天下則耕稼之利其來久矣書曰播時百榖詩稱誕降嘉種貽我來牟則百穀之備自稷始也趙過曰后稷始畎田則畎壠之法自稷始也晉董史曰辰以成善后稷是相則農時之節自后稷始也大哉后稷之為天下烈矣其慶流子孫光有天下宜哉九十載孔子曰舜其至孝矣五十而慕孟子曰五十而慕者予於大舜見之矣癸未一百載帝乃殂落書曰二十有八載舜攝二十八載也帝乃殂落百姓如䘮考妣三載四海遏宻八音䰟氣歸天為殂體魄歸地為落鬼神之義盡矣聖人在上又鬼神之盛故言其崩曰殂落百姓者畿内之民四海則凡天下之民也孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章文章謂其禮樂制度所以經緯乎天下者也路史曰帝堯之子十其長號監明先死監明之子式封于劉其後有劉累事存漢紀生有文在手曰劉鐂畱同富宜氏史漢作散宜氏生朱驁佷􅎱克兄弟為䦧嚚訟嫚淫帝悲之制奕以閑其情使出就丹虞氏國之房夏后封之唐庶子九其後傅鑄冀郇櫟函髙唐上唐唐杜皆其後御龍豕韋魯今在汝范隨士劉見左氏鄭康成曰堯遊城陽而死葬焉外紀曰葬穀林古史曰堯後有劉累者學擾龍於豢龍氏事夏孔甲賜氏曰御龍以更豕韋之後為豕韋氏商之衰徙居於唐周以唐封叔虞復自唐徙杜為唐杜氏宣王誅杜伯其子隰叔適晉為范氏范武子奔秦自秦復歸于晉其處者為劉氏履祥按堯老而舜攝二十有八年堯與天下相忘久矣一朝殂落而百姓如考妣之䘮孟子曰堯之所以治民舜之所以事君於此俱可知矣甲申百有一載乙酉百有二載舜避于南河之南孟子曰舜相堯二十有八載非人之所能為也天也堯崩三年之䘮畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宮逼堯之子是簒也非天與也古史論曰舜禹之攝格于祖考郊祀天地朝見諸侯廵守方嶽行天子之事矣及其終而避之何哉使舜禹避之天下歸之而其子不順將從天下而廢其子歟將奉其子而違天下歟此事之至逆由避致之也至益不度天命而受位於禹避之而天下不從然後不敢為匹夫猶且恥之而謂益為之哉大紀曰既除䘮舜委政於臯陶退避於南河之南論曰堯命舜舜命禹行天子之事舜禹亦既受命行天子之事矣及堯舜既終又避其子何哉人臣至於代天子行天下之政已亢矣况又將去人臣以為天子乎堯舜之䘮甫除舜禹政自己出使丹朱商均去其宮室可則可矣是用九為首非所以明微也故舜禹避之以展天下之情成揖讓之禮其心與計利害者遼乎如天地之不相及也使舜禹而有計利害之心則是以爭奪行尚何授受之有若夫益則又異於舜禹矣啟賢能敬承繼禹之道益歴事三代年亦老矣奉身而退順天道也讀書者能無以文害辭無以辭害意則孟軻氏之言粲然明白無可疑者張氏紀年敘曰孟子謂堯舜三年之䘮畢舜禹避堯舜之子而天下歸之然後踐天子位此乃見帝王奉天命之大㫖其可闇而弗章故以甲申書服堯之䘮乙酉書踐位之實丙戍書元載格于文祖自乙酉至丁巳是踐位三十有三載也則書薦禹於天與尚書命禹之辭合自丁巳至癸酉是薦禹十有七年也與孟子之説合於禹受命之際書法亦然然而書稱舜在位五十載則是史官自堯崩之明年通數之爾朱子曰舜禹避朱均而天下歸之蘇子慮其避之足以致天下之逆至益避啟而天下歸啟蘇子又譏其避之為不度而無恥於是凡孟子史遷之所傳者皆以為誕妄而不之信今固未暇質其有無然蘇子之所以為説者類皆以世俗不誠之心度聖賢則不可以不之辯也聖賢之心淡然無欲豈有取天下之意哉顧辭讓之發則有根於所性而不能已者茍非所據則雖巵酒豆肉猶知避之況乎秉權據重而天下有歸己之勢則亦安能無所惕然於中而不逺引以避之哉避之而彼不吾釋則不獲已而受之何病於逆避之而幸其舍則固得吾本心之所欲而又何恥焉唯不避而强取之乃為逆偃然當之而彼不吾歸乃可恥耳如蘇子之言則是凡世之為辭讓者皆隂取之而陽為遜避是以其言反於事實至於如此而不自知其非也舜禹之事世固不以為疑今不復論至益之事則亦有不能無惑於其説者殊不知若太甲賢而伊尹告歸成王冠而周公還政宣王有志而共和罷此類多矣當行而行當止而止而又何恥焉蘇子蓋賢共伯而尚何疑於益哉若曰受人之寄則當遂有之而不可歸歸之則為不度而無恥則是王莽曹操司馬懿父子之心而揚堅夫婦所謂騎虎之勢也乃欲以是而言聖賢之事其誤甚矣履祥按春秋以上君薨嗣君踰年即位于廟夫即位必踰年者當䘮未君也踰年而即位者不可曠年無君也獨唐虞之際三年之䘮畢而始即位何以知其然書稱帝乃殂落三載四海遏宻八音矣而後書月正元日舜格于文祖則是舜之即位在三載之後也書注舜服堯䘮三年畢將即位故復至文祖廟司馬稽古録亦云然即位於三載之後則聖人之心可見矣河南之避河足疑乎且謂避之非者以勢言也聖人有天下而不與固不以勢之利害入其心者而况五帝之世世質民淳帝堯陶天下於禮遜雍睦之中百有餘載禹岳諸聖賢咸萃朝廷當是時也帝舜從容其間勢亦無不可者夫聖經者事之衷也聖心者理之主也論事而折𠂻於聖經以求聖人之心焉是為得之矣御批資治通鑑綱目前編卷一
